<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarih Disiplinleri Atlası — İslam Medeniyeti Haritası</title>
  <meta name="description" content="16 tarihî dönem, 9 disiplin, 9 İslam medeniyeti: interaktif harita, zaman akış animasyonu ve disiplinler arası bağlantılar.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <!-- Design System -->
  <link rel="stylesheet" href="/lib/design-system/tokens.css">

  <!-- Atlas CSS -->
  <link rel="stylesheet" href="css/atlas.css">

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- D3.js -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>

  <!-- ═══════ HEADER ═══════ -->
  <header id="atlas-header">
    <div class="header-left">
      <a href="/" class="back-link" title="Ana Sayfa">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>Tarih Disiplinleri Atlası</h1>
    </div>
    <div class="header-center">
      <div id="active-period-badge" class="period-badge"></div>
    </div>
    <div class="header-right">
      <button id="btn-stories" class="header-btn" title="Harita Hikayeleri">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>Hikayeler</span>
      </button>
      <button id="btn-compare" class="header-btn" title="Karşılaştır">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Karşılaştır</span>
      </button>
      <button id="theme-toggle" class="header-btn" title="Tema Değiştir">
        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══════ MAIN LAYOUT ═══════ -->
  <main id="atlas-main">

    <!-- ── LEFT SIDEBAR: Filters ── -->
    <aside id="sidebar-left" class="sidebar">
      <div class="sidebar-section">
        <h3>Dönem</h3>
        <div id="period-list" class="filter-list"></div>
      </div>
      <div class="sidebar-section">
        <h3>Disiplin</h3>
        <div id="discipline-filter" class="filter-chips"></div>
      </div>
      <div class="sidebar-section">
        <h3>Medeniyet</h3>
        <div id="civilization-list" class="filter-list"></div>
      </div>
      <div class="sidebar-section">
        <h3>Katman</h3>
        <label class="layer-toggle"><input type="checkbox" id="layer-cities" checked> Şehirler</label>
        <label class="layer-toggle"><input type="checkbox" id="layer-institutions" checked> Kurumlar</label>
      </div>
    </aside>

    <!-- ── CENTER: Map + Timeline ── -->
    <div id="center-column">
      <!-- Map -->
      <div id="map-container">
        <div id="map"></div>
        <!-- Map Legend -->
        <div id="map-legend"></div>
      </div>

      <!-- Timeline + Streamgraph -->
      <div id="timeline-container">
        <div id="timeline-controls">
          <button id="btn-play" class="timeline-btn" title="Oynat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </button>
          <div id="timeline-slider-wrap">
            <input type="range" id="timeline-slider" min="-10000" max="2026" value="-10000" step="1">
            <div id="slider-year-label">MÖ 10000</div>
          </div>
          <button id="btn-reset" class="timeline-btn" title="Sıfırla">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          </button>
        </div>
        <div id="streamgraph-container">
          <svg id="streamgraph"></svg>
        </div>
      </div>
    </div>

    <!-- ── RIGHT PANEL: Detail View ── -->
    <aside id="panel-right" class="panel hidden">
      <button id="panel-close" class="panel-close-btn" title="Kapat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="panel-content"></div>
    </aside>
  </main>

  <!-- ═══════ STORY OVERLAY ═══════ -->
  <div id="story-overlay" class="hidden">
    <div id="story-header">
      <button id="story-close" class="story-nav-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h2 id="story-title"></h2>
      <span id="story-counter"></span>
    </div>
    <div id="story-body">
      <div id="story-text"></div>
      <div id="story-nav">
        <button id="story-prev" class="story-nav-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Önceki
        </button>
        <button id="story-next" class="story-nav-btn">
          Sonraki
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
    <!-- Story Picker -->
    <div id="story-picker" class="hidden">
      <h3>Harita Hikayeleri</h3>
      <div id="story-picker-list"></div>
    </div>
  </div>

  <!-- ═══════ COMPARE MODAL ═══════ -->
  <div id="compare-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Dönem / Medeniyet Karşılaştır</h2>
        <button id="compare-close" class="panel-close-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="compare-selectors">
        <div class="compare-col">
          <label>Sol</label>
          <select id="compare-left"></select>
          <div id="radar-left"></div>
          <div id="compare-info-left" class="compare-info"></div>
        </div>
        <div class="compare-col">
          <label>Sağ</label>
          <select id="compare-right"></select>
          <div id="radar-right"></div>
          <div id="compare-info-right" class="compare-info"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════ MOBILE MENU TOGGLE ═══════ -->
  <button id="mobile-menu-toggle" class="mobile-only" title="Filtreler">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
  </button>

  <!-- ═══════ SCRIPTS ═══════ -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
