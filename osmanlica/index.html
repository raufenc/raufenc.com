<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Osmanlıca Lügat — Rauf Enç</title>
  <meta name="description" content="454 Osmanlıca terim, hat görselleri ve anlamlarıyla interaktif sözlük." />
  <link rel="stylesheet" href="../lib/base.css" />
  <script src="veri.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #d4a054;
      --accent-soft: rgba(212,160,84,0.1);
      --accent-glow: rgba(212,160,84,0.25);
      --accent2: #c48a3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(212,160,84,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 80%, rgba(180,120,60,0.04) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes cardPop { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }

    .wrap { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* ── Header ── */
    header { padding: 48px 0 32px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted2); font-size: 12px; text-decoration: none;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 24px; transition: color 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; }

    .header-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.1;
      animation: fadeUp 0.5s 0.05s ease both;
    }
    h1 .accent {
      color: transparent;
      background: linear-gradient(135deg, #d4a054, #e8c47a, #c48a3a);
      -webkit-background-clip: text; background-clip: text;
    }

    .subtitle {
      color: var(--muted2); font-size: 14px; margin-top: 8px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .stat-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted2); font-size: 12px; padding: 6px 14px;
      border-radius: 100px; white-space: nowrap;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .stat-pill strong { color: var(--accent); font-weight: 700; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px; margin-top: 28px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s 0.2s ease both;
      overflow-x: auto;
    }
    .tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted2); font-size: 13px; font-weight: 600;
      padding: 10px 18px; cursor: pointer; font-family: inherit;
      transition: all 0.2s; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent); border-bottom-color: var(--accent);
    }

    /* ── Search ── */
    .search-area {
      padding: 20px 0 0;
      animation: fadeUp 0.5s 0.25s ease both;
    }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); width: 16px; height: 16px; pointer-events: none;
    }
    #search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 44px 12px 40px;
      color: var(--text); font-size: 14px; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search-count {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--muted); pointer-events: none;
    }

    /* ── Fihrist (A-Z) ── */
    .az-bar {
      display: flex; flex-wrap: wrap; gap: 4px;
      padding: 16px 0 8px;
    }
    .az-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted2); font-size: 13px;
      font-weight: 700; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .az-btn:hover { border-color: var(--accent); color: var(--text); }
    .az-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #0a0a0f;
    }
    .az-btn.disabled {
      opacity: 0.3; cursor: default; pointer-events: none;
    }

    /* ── Grid ── */
    .results-info {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 12px;
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .shuffle-btn {
      background: none; border: 1px solid var(--border); color: var(--muted2);
      font-size: 11px; padding: 5px 12px; border-radius: 100px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600;
    }
    .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding-bottom: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: cardPop 0.3s ease both;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(212,160,84,0.12);
    }

    .card-img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      background: var(--surface2);
      display: block;
    }

    .card-body { padding: 12px 14px 14px; }

    .card-word {
      font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
      color: var(--accent); margin-bottom: 4px;
    }
    .card-meaning {
      font-size: 12px; color: var(--muted2); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: var(--muted2);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .lightbox.open { opacity: 1; pointer-events: auto; }

    .lb-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 380px; width: 100%;
      overflow: hidden;
      transform: translateY(20px) scale(0.96);
      transition: transform 0.3s ease;
      max-height: 90vh; overflow-y: auto;
    }
    .lightbox.open .lb-content {
      transform: translateY(0) scale(1);
    }

    .lb-img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      display: block; background: var(--surface2);
    }

    .lb-body { padding: 20px 24px 24px; }

    .lb-word {
      font-size: 22px; font-weight: 800; color: var(--accent);
      letter-spacing: 0.02em; margin-bottom: 6px;
    }
    .lb-meaning {
      font-size: 14px; color: var(--muted2); line-height: 1.7;
    }
    .lb-letter {
      display: inline-block; margin-top: 12px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 100px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .lb-nav {
      display: flex; gap: 8px; margin-top: 16px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .lb-nav-btn {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; color: var(--muted2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .lb-nav-btn:hover { border-color: var(--accent); color: var(--text); }
    .lb-nav-btn svg { width: 14px; height: 14px; }

    .lb-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.1); border: none;
      color: white; width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 18px; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 2;
    }
    .lb-close:hover { background: rgba(255,255,255,0.2); }

    /* ── Keşfet: Instagram-style vertical scroll ── */
    .kesfet-feed {
      position: fixed; inset: 0; z-index: 50;
      background: var(--bg);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      display: none;
    }
    .kesfet-feed.open { display: block; }

    .kesfet-feed::-webkit-scrollbar { display: none; }
    .kesfet-feed { -ms-overflow-style: none; scrollbar-width: none; }

    .feed-slide {
      height: 100vh; height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .feed-slide img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
    }

    .feed-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.3) 35%,
        transparent 60%
      );
    }

    .feed-info {
      position: relative; z-index: 2;
      padding: 28px 24px 40px;
      width: 100%;
    }

    .feed-word {
      font-size: 28px; font-weight: 800; color: #fff;
      letter-spacing: 0.02em; margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .feed-meaning {
      font-size: 15px; color: rgba(255,255,255,0.8); line-height: 1.6;
      max-width: 340px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    .feed-letter {
      display: inline-block; margin-top: 12px;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      padding: 4px 12px; border-radius: 100px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .feed-counter {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 52;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      padding: 5px 14px; border-radius: 100px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    .feed-close {
      position: fixed; top: 14px; right: 16px; z-index: 52;
      background: rgba(255,255,255,0.12); border: none;
      color: white; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    .feed-close:hover { background: rgba(255,255,255,0.25); }

    .feed-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 52; color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      animation: pulse 2s infinite;
      pointer-events: none;
    }

    /* ── Keşfet panel (non-feed) ── */
    .kesfet-start {
      text-align: center; padding: 60px 0;
    }
    .kesfet-start-btn {
      background: var(--accent); border: none; color: #0a0a0f;
      font-size: 15px; font-weight: 700; padding: 14px 36px;
      border-radius: 100px; cursor: pointer; font-family: inherit;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    .kesfet-start-btn:hover {
      background: var(--accent2);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .kesfet-desc {
      color: var(--muted2); font-size: 13px; margin-top: 16px; line-height: 1.6;
    }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 32px 20px;
      color: var(--muted); font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    footer a { color: var(--muted2); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--text); }

    /* ── Hide redundant text (images already show everything) ── */
    .feed-word, .feed-meaning, .feed-tag { display: none; }
    .feed-overlay { display: none; }
    .lb-word, .lb-meaning, .lb-letter { display: none; }
    .card-body { display: none; }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      header { padding: 32px 0 24px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
      .card-body { padding: 10px 12px 12px; }
      .card-word { font-size: 13px; }
      .card-meaning { font-size: 11px; }
      .az-btn { width: 32px; height: 32px; font-size: 12px; }
      .lb-content { max-width: 100%; border-radius: 12px; }
      .tab { padding: 8px 12px; font-size: 12px; }
      .feed-word { font-size: 24px; }
      .feed-meaning { font-size: 14px; }
    }
  </style>
  <script src="/nav.js"></script>
</head>
<body>

<div class="wrap">
  <header>
    <a href="/" class="back-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Lab'a dön
    </a>
    <div class="header-row">
      <div>
        <h1>Osmanlıca <span class="accent">Lügat</span></h1>
        <p class="subtitle">Hat görselleri ve anlamlarıyla Osmanlıca terimler sözlüğü</p>
      </div>
      <div class="stat-pill"><strong id="total">0</strong> terim</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="arama">Arama</button>
      <button class="tab" data-tab="fihrist">Fihrist</button>
      <button class="tab" data-tab="kesfet">Keşfet</button>
    </div>
  </header>
</div>

<!-- ── ARAMA TAB ── -->
<div class="wrap" id="panel-arama">
  <div class="search-area">
    <div class="search-wrap">
      <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
      </svg>
      <input id="search" type="search" placeholder="Kelime veya anlam ara..." autocomplete="off" spellcheck="false" />
      <span class="search-count" id="search-count"></span>
    </div>
  </div>
  <div class="results-info">
    <span id="results-text">0 sonuç</span>
    <button class="shuffle-btn" onclick="karistir()">Karıştır</button>
  </div>
  <div id="grid"></div>
</div>

<!-- ── FİHRİST TAB ── -->
<div class="wrap" id="panel-fihrist" style="display:none;">
  <div class="az-bar" id="az-bar"></div>
  <div class="results-info">
    <span id="fihrist-count">0 sonuç</span>
  </div>
  <div id="fihrist-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; padding-bottom:24px;"></div>
</div>

<!-- ── KEŞFET TAB ── -->
<div class="wrap" id="panel-kesfet" style="display:none;">
  <div class="kesfet-start">
    <button class="kesfet-start-btn" onclick="openFeed()">Keşfetmeye Başla</button>
    <p class="kesfet-desc">Rastgele sıralanmış kelimeleri Instagram gibi kaydırarak keşfet</p>
  </div>
</div>

<!-- ── Keşfet Feed (fullscreen) ── -->
<div class="kesfet-feed" id="kesfet-feed">
  <button class="feed-close" onclick="closeFeed()">&times;</button>
  <div class="feed-counter" id="feed-counter"></div>
  <div class="feed-hint" id="feed-hint">Kaydır</div>
  <div id="feed-slides"></div>
</div>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">&times;</button>
  <div class="lb-content">
    <img class="lb-img" id="lb-img" src="" alt="" loading="lazy" />
    <div class="lb-body">
      <div class="lb-word" id="lb-word"></div>
      <div class="lb-meaning" id="lb-meaning"></div>
      <span class="lb-letter" id="lb-letter"></span>
      <div class="lb-nav">
        <button class="lb-nav-btn" onclick="navLB(-1)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Önceki
        </button>
        <button class="lb-nav-btn" onclick="navLB(1)">
          Sonraki
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="/">lab.raufenc.com</a>
  &nbsp;·&nbsp;
  Rauf Enç &copy; 2026
</footer>

<script>
// ── State ──
let currentList = [];
let lbIndex = -1;
let aktifHarf = null;
let aktifTab = 'arama';
let feedItems = [];

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('total').textContent = SOZLUK.length;

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => setTab(btn.dataset.tab));
  });

  document.getElementById('search').addEventListener('input', e => {
    renderArama(e.target.value.trim());
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLB();
  });

  document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    }
    if (document.getElementById('kesfet-feed').classList.contains('open')) {
      if (e.key === 'Escape') closeFeed();
    }
  });

  renderArama('');
});

// ── Tabs ──
function setTab(tab) {
  aktifTab = tab;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab)
  );
  document.getElementById('panel-arama').style.display = tab === 'arama' ? '' : 'none';
  document.getElementById('panel-fihrist').style.display = tab === 'fihrist' ? '' : 'none';
  document.getElementById('panel-kesfet').style.display = tab === 'kesfet' ? '' : 'none';

  if (tab === 'fihrist') renderFihrist();
}

// ── ARAMA ──
function renderArama(q) {
  const lower = q.toLowerCase();
  const filtered = q
    ? SOZLUK.filter(s =>
        s.kelime.toLowerCase().includes(lower) ||
        s.anlam.toLowerCase().includes(lower))
    : [...SOZLUK];

  currentList = filtered;
  document.getElementById('search-count').textContent = q ? filtered.length : '';
  document.getElementById('results-text').textContent =
    q ? `${filtered.length} / ${SOZLUK.length} sonuç` : `${SOZLUK.length} terim`;

  renderGrid('grid', filtered);
}

function karistir() {
  const arr = [...SOZLUK];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  currentList = arr;
  renderGrid('grid', arr);
  document.getElementById('search').value = '';
  document.getElementById('search-count').textContent = '';
  document.getElementById('results-text').textContent = `${SOZLUK.length} terim (karışık)`;
}

// ── FİHRİST ──
function renderFihrist() {
  const harfler = 'ABCDEFGHIKLMNOPRSTVYZÇÖŞÜİ'.split('');
  const mevcutHarfler = new Set(SOZLUK.map(s => s.kelime[0].toUpperCase()));

  const bar = document.getElementById('az-bar');
  bar.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'az-btn' + (!aktifHarf ? ' active' : '');
  allBtn.textContent = '*';
  allBtn.title = 'Tümü';
  allBtn.onclick = () => { aktifHarf = null; renderFihrist(); };
  bar.appendChild(allBtn);

  harfler.forEach(h => {
    const btn = document.createElement('button');
    const exists = mevcutHarfler.has(h);
    btn.className = 'az-btn' + (!exists ? ' disabled' : '') + (aktifHarf === h ? ' active' : '');
    btn.textContent = h;
    if (exists) btn.onclick = () => { aktifHarf = h; renderFihrist(); };
    bar.appendChild(btn);
  });

  const filtered = aktifHarf
    ? SOZLUK.filter(s => s.kelime[0].toUpperCase() === aktifHarf)
    : [...SOZLUK];

  currentList = filtered;
  document.getElementById('fihrist-count').textContent =
    aktifHarf ? `${aktifHarf} — ${filtered.length} terim` : `${SOZLUK.length} terim`;

  renderGrid('fihrist-grid', filtered);
}

// ── KEŞFET FEED ──
function openFeed() {
  // Shuffle for feed
  feedItems = [...SOZLUK];
  for (let i = feedItems.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [feedItems[i], feedItems[j]] = [feedItems[j], feedItems[i]];
  }

  const container = document.getElementById('feed-slides');
  container.innerHTML = '';

  // Render first batch (lazy load rest)
  const batchSize = 20;
  for (let i = 0; i < Math.min(batchSize, feedItems.length); i++) {
    container.appendChild(createSlide(feedItems[i], i));
  }

  const feed = document.getElementById('kesfet-feed');
  feed.classList.add('open');
  feed.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  updateFeedCounter(0);

  // Lazy load more slides on scroll
  let loaded = batchSize;
  feed.onscroll = () => {
    const idx = Math.round(feed.scrollTop / feed.clientHeight);
    updateFeedCounter(idx);

    // Hide hint after first scroll
    const hint = document.getElementById('feed-hint');
    if (idx > 0 && hint) hint.style.display = 'none';

    // Load more slides when near end
    if (idx >= loaded - 5 && loaded < feedItems.length) {
      const end = Math.min(loaded + batchSize, feedItems.length);
      for (let i = loaded; i < end; i++) {
        container.appendChild(createSlide(feedItems[i], i));
      }
      loaded = end;
    }
  };
}

function createSlide(item, index) {
  const div = document.createElement('div');
  div.className = 'feed-slide';
  div.innerHTML = `
    <img src="kitap/${item.img}" alt="${item.kelime}" loading="${index < 3 ? 'eager' : 'lazy'}" />`;
  return div;
}

function updateFeedCounter(idx) {
  document.getElementById('feed-counter').textContent = `${idx + 1} / ${feedItems.length}`;
}

function closeFeed() {
  const feed = document.getElementById('kesfet-feed');
  feed.classList.remove('open');
  feed.onscroll = null;
  document.body.style.overflow = '';
  document.getElementById('feed-hint').style.display = '';
}

// ── Grid Render ──
function renderGrid(containerId, items) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">&#128270;</div><div class="empty-text">Sonuç bulunamadı</div></div>';
    return;
  }

  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = `${Math.min(i, 20) * 30}ms`;
    el.onclick = () => openLB(i);
    el.innerHTML = `
      <img class="card-img" src="kitap/${item.img}" alt="${item.kelime}" loading="lazy"
           onerror="this.style.background='var(--surface2)'" />
      <div class="card-body">
        <div class="card-word">${item.kelime}</div>
        <div class="card-meaning">${item.anlam}</div>
      </div>`;
    grid.appendChild(el);
  });
}

// ── Lightbox ──
function openLB(index) {
  lbIndex = index;
  const item = currentList[index];
  if (!item) return;

  document.getElementById('lb-img').src = `kitap/${item.img}`;
  document.getElementById('lb-img').alt = item.kelime;
  document.getElementById('lb-word').textContent = item.kelime;
  document.getElementById('lb-meaning').textContent = item.anlam;
  document.getElementById('lb-letter').textContent = item.kelime[0];
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLB(dir) {
  let next = lbIndex + dir;
  if (next < 0) next = currentList.length - 1;
  if (next >= currentList.length) next = 0;
  openLB(next);
}
</script>
