<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BİA Yönetim</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

/* TOP BAR */
.topbar { background: #E20439; color: #fff; padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.topbar-title { font-weight: 700; font-size: 1rem; white-space: nowrap; }
.topbar-nav { margin-left: auto; display: flex; gap: 8px; align-items: center; overflow-x: auto; max-width: calc(100vw - 160px); padding-bottom: 2px; }
.topbar-nav::-webkit-scrollbar { height: 3px; }
.topbar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.3); border-radius: 2px; }
.topbar-btn { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer; font-weight: 600; white-space: nowrap; }
.topbar-btn:hover { background: rgba(255,255,255,.25); }
.topbar-btn.green { background: rgba(255,255,255,.9); color: #E20439; }
.topbar-btn.green:hover { background: #fff; }

/* LAYOUT */
.container { max-width: 860px; margin: 28px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: 28px; margin-bottom: 20px; }

/* LOGIN */
#loginScreen { display: none; }
.login-wrap { max-width: 380px; margin: 70px auto; }
.login-wrap h1 { font-size: 1.5rem; text-align: center; margin-bottom: 6px; }
.login-wrap p { text-align: center; color: #888; font-size: .9rem; margin-bottom: 28px; }
.login-logo { display: block; margin: 0 auto 20px; width: 60px; height: 60px; border-radius: 12px; background: #E20439; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #fff; font-weight: 800; }

/* FORM FIELDS */
.field { margin-bottom: 18px; }
.field label { display: block; font-size: .83rem; font-weight: 600; color: #555; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: .95rem; font-family: inherit; transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #E20439; box-shadow: 0 0 0 3px rgba(226,4,57,.08); }
.field textarea { min-height: 160px; resize: vertical; }
.field-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:600px) { .field-2 { grid-template-columns: 1fr; } }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; border: none; transition: background .15s; text-decoration: none; }
.btn-red { background: #E20439; color: #fff; }
.btn-red:hover { background: #B00030; }
.btn-gray { background: #f1f5f9; color: #334155; }
.btn-gray:hover { background: #e2e8f0; }
.btn-del { background: #fff; color: #dc2626; border: 1.5px solid #fca5a5; }
.btn-del:hover { background: #fef2f2; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* NOTICE */
.notice { padding: 12px 16px; border-radius: 8px; font-size: .88rem; margin-bottom: 16px; }
.ok { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

/* NEWS LIST */
#mainScreen { display: none; }
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.list-header h1 { font-size: 1.2rem; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filter { padding: 5px 13px; border-radius: 20px; font-size: .8rem; border: none; cursor: pointer; background: #f1f5f9; color: #475569; font-weight: 500; }
.filter.on { background: #E20439; color: #fff; }
.news-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
.news-item:hover { background: #fafafa; }
.news-item:last-child { border-bottom: none; }
.ni-date { font-size: .8rem; color: #888; white-space: nowrap; min-width: 90px; }
.ni-title { flex: 1; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ni-star { font-size: .85rem; }
.badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
.b-duyuru { background: #dbeafe; color: #1d4ed8; }
.b-haber { background: #dcfce7; color: #15803d; }
.b-etkinlik { background: #fef9c3; color: #854d0e; }
.b-icerik { background: #f3e8ff; color: #7e22ce; }
.empty { text-align: center; padding: 40px; color: #aaa; font-size: .9rem; }

/* EDIT FORM */
#editScreen { display: none; }
.edit-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.edit-header h1 { font-size: 1.2rem; }
.edit-footer { display: flex; gap: 10px; margin-top: 20px; align-items: center; }

/* SPINNER */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

  <span class="topbar-title">BİA Yönetim</span>
  <div class="topbar-nav" id="topNav" style="display:none">

<!-- GİRİŞ -->
<div id="loginScreen">

    <div class="login-wrap card">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="width:60px;height:60px;background:#E20439;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;font-weight:800;">B</div>
      </div>

<!-- HABER LİSTESİ -->

<script>
const API = '/api/bia-news';
const CATS = {haber:'Haber', duyuru:'Duyuru', etkinlik:'Etkinlik', icerik:'İçerik'};
const TR = {'ş':'s','ı':'i','ö':'o','ü':'u','ç':'c','ğ':'g','â':'a','î':'i','û':'u'};

let pw = '', news = [], sha = '', editIdx = null, filter = '';
let events = [], eventsSha = '', eventEditIdx = null;

function slugify(t) {
  return t.toLowerCase().replace(/[şıöüçğâîû]/g,c=>TR[c]||c)
    .normalize('NFKD').replace(/[^\w\s-]/g,'').replace(/[-\s]+/g,'-').replace(/^-|-$/g,'').slice(0,80);
}
function autoSlug() {
  const t = document.getElementById('fTitle').value;
  document.getElementById('fSlug').value = slugify(t);
}

// ── SCREEN HELPER ──
const ALL_SCREENS = ['loginScreen','mainScreen','editScreen','eventsScreen','eventEditScreen','siteScreen','homepageScreen','faqScreen','programsScreen'];
function showScreen(id) {
  ALL_SCREENS.forEach(s => { const el = document.getElementById(s); if(el) el.style.display = 'none'; });
  const target = document.getElementById(id);
  if (target) target.style.display = 'block';
}

// Keep legacy show() for any internal references
function show(id) { showScreen(id); }

async function doLogin() {
  pw = document.getElementById('pwInput').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Giriş yapılıyor...';
  document.getElementById('loginErr').innerHTML = '';
  try {
    const r = await fetch(`${API}?password=${encodeURIComponent(pw)}&type=news`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Hata');
    news = d.data; sha = d.sha;
    sessionStorage.setItem('biaPw', pw);
    document.getElementById('topNav').style.display = 'flex';
    showMain();
  } catch(e) {
    document.getElementById('loginErr').innerHTML = `<div class="notice err">${e.message}</div>`;
  }
  btn.disabled = false; btn.innerHTML = 'Giriş Yap';
}

function renderList() {
  const filtered = filter ? news.filter(n => n.category === filter) : news;
  // Filters
  let fb = `<button class="filter ${!filter?'on':''}" onclick="setFilter('')">Tümü (${news.length})</button>`;
  Object.entries(CATS).forEach(([k,v]) => {
    const cnt = news.filter(n=>n.category===k).length;
    fb += `<button class="filter ${filter===k?'on':''}" onclick="setFilter('${k}')">${v} (${cnt})</button>`;
  });
  document.getElementById('filterBar').innerHTML = fb;
  document.getElementById('countBadge').textContent = filter ? `${filtered.length} sonuç` : '';

  if (!filtered.length) {
    document.getElementById('newsList').innerHTML = '<div class="empty">Henüz kayıt yok</div>';
    return;
  }
  document.getElementById('newsList').innerHTML = filtered.map(item => {
    const i = news.indexOf(item);
    const cat = item.category || 'haber';
    const star = item.featured ? '<span class="ni-star">⭐</span>' : '';
    return `<div class="news-item" onclick="showEdit(${i})">
      <span class="ni-date">${item.date||''}</span>
      ${star}
      <span class="ni-title">${item.title||''}</span>
      <span class="badge b-${cat}">${CATS[cat]||cat}</span>
    </div>`;
  }).join('');
}

function setFilter(f) { filter = f; renderList(); }

function showMain() {
  renderList();
  showScreen('mainScreen');
  document.getElementById('mainNotice').innerHTML = '';
}

function showEdit(idx) {
  editIdx = idx;
  const item = idx !== null ? news[idx] : {};
  document.getElementById('editHeading').textContent = idx === null ? 'Yeni Haber Ekle' : 'Düzenle';
  document.getElementById('fTitle').value = item.title || '';
  document.getElementById('fSlug').value = item.slug || '';
  document.getElementById('fDate').value = item.date || new Date().toISOString().slice(0,10);
  document.getElementById('fCat').value = item.category || 'haber';
  document.getElementById('fExcerpt').value = item.excerpt || '';
  document.getElementById('fContent').value = item.content || '';
  document.getElementById('fImage').value = item.image || '';
  document.getElementById('fFeatured').checked = !!item.featured;
  document.getElementById('fSourceUrl').value = item.source_url || '';
  document.getElementById('deleteBtn').style.display = idx !== null ? 'inline-flex' : 'none';
  document.getElementById('editNotice').innerHTML = '';
  document.getElementById('imgUploadStatus').innerHTML = '';
  updateImgPreview(item.image || '');
  showScreen('editScreen');
}

async function saveItem() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('editNotice').innerHTML = '<div class="notice err">Başlık zorunlu.</div>'; return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Kaydediliyor...';
  const item = {
    title, slug: document.getElementById('fSlug').value || slugify(title),
    date: document.getElementById('fDate').value, category: document.getElementById('fCat').value,
    excerpt: document.getElementById('fExcerpt').value.trim(),
    content: document.getElementById('fContent').value.trim(),
    image: document.getElementById('fImage').value.trim(),
    featured: document.getElementById('fFeatured').checked,
    source_url: document.getElementById('fSourceUrl').value.trim(),
  };
  if (editIdx === null) news.push(item); else news[editIdx] = item;
  try {

function cleanHtml() {
  const ta = document.getElementById('fContent');
  let h = ta.value;
  if (!h.trim()) return;
  h = h.replace(/\s*(style|face|color|size|class|align|dir|lang|data-[^=]*)="[^"]*"/gi, '');
  h = h.replace(/<span>\s*<\/span>/gi, '');
  h = h.replace(/<div>\s*<\/div>/gi, '');
  h = h.replace(/<font[^>]*>([\s\S]*?)<\/font>/gi, '$1');
  h = h.replace(/<o:p[^>]*>[\s\S]*?<\/o:p>/gi, '');
  h = h.replace(/(<br\s*\/?>\s*){3,}/gi, '<br><br>');
  h = h.replace(/>\s{2,}</g, '> ');
  h = h.replace(/<p>\s*<\/p>/gi, '');
  ta.value = h.trim();
  document.getElementById('editNotice').innerHTML = '<div class="notice ok">✅ HTML temizlendi</div>';
  setTimeout(() => { document.getElementById('editNotice').innerHTML = ''; }, 2000);
}

// Also update preview when URL is typed manually
document.addEventListener('DOMContentLoaded', () => {
  const fi = document.getElementById('fImage');
  if (fi) fi.addEventListener('input', () => updateImgPreview(fi.value));
});

function updateImgPreview(url) {
  const prev = document.getElementById('imgPreview');
  const el = document.getElementById('imgPreviewEl');
  if (url && url.startsWith('http')) {
    el.src = url;
    prev.style.display = 'block';
  } else {
    prev.style.display = 'none';
  }
}

async function uploadImage(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('imgUploadStatus');
  const btn = document.getElementById('uploadImgBtn');
  btn.disabled = true;
  status.innerHTML = '<span style="color:#888;">⏳ Yükleniyor...</span>';

  try {
    // Read file as base64
    const base64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });

    // Unique filename: timestamp + original name
    const ext = file.name.split('.').pop().toLowerCase();
    const ts = Date.now();
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const filename = `${ts}_${safeName}`;

    const r = await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw, type: 'upload', filename, content: base64 }) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Yükleme hatası');

    document.getElementById('fImage').value = d.url;
    updateImgPreview(d.url);
    status.innerHTML = '<span style="color:#15803d;">✅ Yüklendi! URL kopyalandı.</span>';
    setTimeout(() => { status.innerHTML = ''; }, 3000);
  } catch(e) {
    status.innerHTML = `<span style="color:#dc2626;">❌ ${e.message}</span>`;
  }
  btn.disabled = false;
  input.value = '';
}

async function showEvents() {
  if (!events.length && !eventsSha) {
    try {
      const r = await fetch(`${API}?password=${encodeURIComponent(pw)}&type=events`);
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      events = d.data || []; eventsSha = d.sha;
    } catch(e) {
      document.getElementById('eventsMainNotice').innerHTML = `<div class="notice err">Yüklenemedi: ${e.message}</div>`;
      return;
    }
  }
  renderEventsList();
  showScreen('eventsScreen');
}

function renderEventsList() {
  const upcoming = events.filter(e => !e.past);
  const past = events.filter(e => e.past);

  let html = '';
  if (!events.length) {
    html = '<div class="empty">Henüz etkinlik yok</div>';
  } else {
    [...upcoming, ...past].forEach((ev, i) => {
      const idx = events.indexOf(ev);
      html += `<div class="news-item${ev.past ? ' opacity-50' : ''}" onclick="showEventEdit(${idx})" style="${ev.past ? 'opacity:.5' : ''}">
        <span class="ni-date">${ev.date||''}</span>
        <span class="ni-title">${ev.title||''}</span>
        <span class="badge b-${ev.type||'online'}">${ev.time||''} · ${ev.location||''}</span>
      </div>`;
    });
  }
  document.getElementById('eventsList').innerHTML = html;
}

function showEventEdit(idx) {
  eventEditIdx = idx;
  const ev = idx !== null ? events[idx] : {};
  document.getElementById('eventEditHeading').textContent = idx === null ? 'Yeni Etkinlik' : 'Etkinliği Düzenle';
  document.getElementById('efTitle').value = ev.title || '';
  document.getElementById('efSlug').value = ev.slug || '';
  document.getElementById('efDate').value = ev.date || new Date().toISOString().slice(0,10);
  document.getElementById('efTime').value = ev.time || '10:00';
  document.getElementById('efLocation').value = ev.location || '';
  document.getElementById('efType').value = ev.type || 'online';
  document.getElementById('efDesc').value = ev.description || '';
  document.getElementById('efRegUrl').value = ev.registration_url || '';
  document.getElementById('efPast').checked = !!ev.past;
  document.getElementById('deleteEventBtn').style.display = idx !== null ? 'inline-flex' : 'none';
  document.getElementById('eventEditNotice').innerHTML = '';
  showScreen('eventEditScreen');
}

function renderFaq() {
  document.getElementById('faqList').innerHTML = faqData.map((cat, ci) => `
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <input type="text" value="${cat.category}" onchange="faqData[${ci}].category=this.value" style="flex:1;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-weight:600;">
        <button class="btn btn-del" style="padding:6px 12px;font-size:.8rem;" onclick="removeFaqCategory(${ci})">✕ Kategori Sil</button>
      </div>
      ${cat.questions.map((q, qi) => `
        <div style="border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px;">
          <div class="field"><label>Soru</label><input type="text" value="${q.q.replace(/"/g,'&quot;')}" onchange="faqData[${ci}].questions[${qi}].q=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;"></div>
          <div class="field"><label>Cevap</label><textarea rows="2" onchange="faqData[${ci}].questions[${qi}].a=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;resize:vertical;">${q.a}</textarea></div>
          <button class="btn btn-del" style="padding:4px 10px;font-size:.78rem;" onclick="removeFaqQ(${ci},${qi})">Soruyu Sil</button>
        </div>`).join('')}
      <button class="btn btn-gray" style="width:100%;margin-top:4px;" onclick="addFaqQ(${ci})">+ Soru Ekle</button>
    </div>`).join('');
}

function addFaqCategory() {
  faqData.push({ category: 'Yeni Kategori', questions: [] });
  renderFaq();
}

function removeFaqCategory(ci) {
  if (!confirm('Bu kategoriyi silmek istiyor musunuz?')) return;
  faqData.splice(ci, 1); renderFaq();
}

function addFaqQ(ci) {
  faqData[ci].questions.push({ q: '', a: '' }); renderFaq();

function removeFaqQ(ci, qi) {
  faqData[ci].questions.splice(qi, 1); renderFaq();
