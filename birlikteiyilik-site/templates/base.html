<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.description }}{% endblock %}">
  <link rel="canonical" href="{{ site_url }}{{ current_path }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}{{ self.title() }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ site.description }}{% endblock %}">
  <meta property="og:image" content="{{ site_url }}/images/og-image.png">
  <meta property="og:url" content="{{ site_url }}{{ current_path }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="tr_TR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">

  <!-- Favicon -->
  <link rel="icon" href="/images/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
  {% block head_extra %}{% endblock %}

  <!-- Schema.org -->
  {% block schema %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "Birlikte İyilik Akademi",
    "url": "{{ site_url }}",
    "logo": "{{ site_url }}/images/logo.png",
    "description": "{{ site.description }}",
    "email": "{{ site.email }}",
    "telephone": "{{ site.phone }}"
  }
  </script>
  {% endblock %}
</head>
<body>
  <a href="#main-content" class="skip-link">Ana içeriğe geç</a>

  {% include 'partials/header.html' %}

  <main id="main-content">
    {% block breadcrumb %}{% endblock %}
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  <!-- WhatsApp Floating Button -->
  <a href="{{ site.whatsapp }}" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp ile iletişim" data-track="click_whatsapp">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <!-- Scroll to Top -->
  <button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Yukarı çık" style="display:none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
  </button>
  <script>
  window.addEventListener('scroll',function(){
    var btn=document.getElementById('scrollTopBtn');
    if(btn)btn.style.display=window.scrollY>600?'flex':'none';
  });
  </script>

  <!-- Scripts -->
  <script src="/js/main.js" defer></script>
  <script src="/js/counter.js" defer></script>
  <script src="/js/filter.js" defer></script>

  <!-- Article Modal -->
  <div id="articleModal" class="article-modal-overlay" style="display:none;" onclick="if(event.target===this)closeArticle()"></div>
  <script>
  var _articleCache={};
  function openArticle(slug){
    var ov=document.getElementById('articleModal');
    if(_articleCache[slug]){_renderArticle(_articleCache[slug]);return;}
    ov.style.display='flex';
    ov.innerHTML='<div class="article-modal"><div style="padding:60px;text-align:center;color:#888;">Yükleniyor...</div></div>';
    setTimeout(function(){ov.classList.add('open');},10);
    fetch('/api/bia-news?type=news&public=1').then(function(r){return r.json();}).then(function(d){
      var items=d.data||[];
      for(var i=0;i<items.length;i++){_articleCache[items[i].slug]=items[i];}
      if(_articleCache[slug])_renderArticle(_articleCache[slug]);
      else{ov.innerHTML='<div class="article-modal"><div style="padding:60px;text-align:center;"><h3>Bulunamadı</h3><button class="btn btn-secondary mt-4" onclick="closeArticle()">Kapat</button></div></div>';}
    })['catch'](function(){closeArticle();});
  }
  function _renderArticle(item){
    var TR_M=['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    function trD(d){if(!d)return'';var p=d.split('-');return parseInt(p[2])+' '+TR_M[parseInt(p[1])]+' '+p[0];}
    var CATS={haber:'HABER',duyuru:'DUYURU',etkinlik:'ETKİNLİK',icerik:'İÇERİK'};
    var cat=item.category||'haber';
    var img=item.image?'<img class="article-modal-img" src="'+item.image+'" alt="">':'';
    var ov=document.getElementById('articleModal');
    ov.style.display='flex';
    ov.innerHTML='<div class="article-modal">'+img+
      '<div class="article-modal-close"><button onclick="closeArticle()" title="Kapat">&times;</button></div>'+
      '<div class="article-modal-body">'+
      '<span class="card-category cat-badge-'+cat+'" style="margin-bottom:12px;display:inline-block;">'+
      (CATS[cat]||cat)+'</span>'+
      '<h1>'+item.title+'</h1>'+
      '<p class="meta">'+trD(item.date)+'</p>'+
      '<div class="content-body">'+(item.content||'<p>'+(item.excerpt||'')+'</p>')+'</div>'+
      '<div class="modal-share"><span style="font-size:.8rem;color:#888;">Paylaş:</span>'+
      '<a href="https://wa.me/?text='+encodeURIComponent(item.title+' — Birlikte İyilik Akademi')+'" target="_blank" rel="noopener" class="share-btn share-wa" title="WhatsApp">💬</a>'+
      '<a href="https://twitter.com/intent/tweet?text='+encodeURIComponent(item.title)+'" target="_blank" rel="noopener" class="share-btn share-tw" title="Twitter">𝕏</a>'+
      '<button onclick="navigator.clipboard.writeText(window.location.origin+\'/birlikteiyilik-v2/haberler/'+item.slug+'\').then(function(){this.textContent=\'✓\'}.bind(this))" class="share-btn share-copy" title="Linki kopyala">🔗</button>'+
      '</div></div></div>';
    setTimeout(function(){ov.classList.add('open');},10);
    document.body.style.overflow='hidden';
  }
  function closeArticle(){
    var ov=document.getElementById('articleModal');
    ov.classList.remove('open');
    setTimeout(function(){ov.style.display='none';ov.innerHTML='';},200);
    document.body.style.overflow='';
  }
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeArticle();});
  </script>

  {% block scripts %}{% endblock %}

  {% if site.ga_id %}
  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.ga_id }}');
  </script>
  {% endif %}
</body>
</html>
