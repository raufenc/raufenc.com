// MEKTUP
function renderMektup(){
  const mid=state.mektupId;
  if(!mid||!MEKTUPLAR[mid])return"";
  const m=MEKTUPLAR[mid],c=C(),r=PR[m.poz]||PR.ateist;
  const baslik=`${m.poz.charAt(0).toUpperCase()+m.poz.slice(1)} ${m.meslek} Arkadaşıma Mektup`;
  // Okuma süresi hesapla
  const kelimeSayisi=m.icerik.reduce((t,b)=>t+(b.m?b.m.split(/\s+/).length:0),0);
  const okumaDk=Math.max(1,Math.round(kelimeSayisi/200));
  const icerikHTML=m.icerik.map((b,i)=>{
    const rev=i>0?'class="reveal"':'';
    if(b.t==="giris") return`<p class="m-giris" style="color:${c.soluk};border-color:${c.cerç}">${b.m}</p>`;
    if(b.t==="h2") return`<h2 class="m-h2 reveal" style="color:${c.met}">${b.m}</h2>`;
    if(b.t==="p") return`<p class="m-p reveal" style="color:${c.soluk}">${b.m}</p>`;
    if(b.t==="alinti") return`<blockquote class="m-alinti reveal" style="border-color:${r.ana};color:${c.met};background:linear-gradient(135deg,${r.ana}08,transparent)">${b.m}</blockquote>`;
    if(b.t==="gecis") return`<div class="m-gecis reveal" style="background:linear-gradient(135deg,${r.ana}08,${r.ana}03);border-color:${r.ana}18;color:${c.soluk}">${b.m}</div>`;
    if(b.t==="kapatis") return`<p class="m-kapatis reveal" style="color:${c.met};border-color:${c.cerç}">${b.m}</p>`;
    return"";
  }).join("");
  // baglar: [0,1]=aynı meslek farklı görüş, [2,3]=aynı görüş farklı meslek
  const ayniGorus=m.baglar.slice(2); // üstte: aynı görüş, farklı meslek
  const ayniMeslek=m.baglar.slice(0,2); // altta: aynı meslek, farklı görüş
  function bagKartHTML(b){
    const bm=MEKTUPLAR[b.id];
    if(!bm)return"";
    const br=PR[bm.poz]||PR.ateist;
    const btitle=`${bm.poz.charAt(0).toUpperCase()+bm.poz.slice(1)} · ${bm.meslek}`;
    return`<div class="bag-kart" style="background:${br.bg};border-color:${br.ana}25;backdrop-filter:blur(4px)"
      onclick="navigate({screen:'mektup',mektupId:'${b.id}',poz:'${bm.poz}'})"
      onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 28px ${br.ana}15'" onmouseout="this.style.transform='';this.style.boxShadow='none'">
      <div style="font-size:clamp(11px,1.5vw,14px);color:${br.parlak};font-weight:600;margin-bottom:8px;opacity:.85;letter-spacing:.04em">${btitle}</div>
      <div style="font-size:clamp(15px,2.2vw,20px);font-weight:500;color:${c.met};margin-bottom:6px">${bm.meslek} Mektubu</div>
      <div style="font-size:clamp(12px,1.8vw,16px);color:${c.soluk};font-weight:300;line-height:1.6">${b.neden}</div>
      <div style="font-size:clamp(16px,2vw,22px);margin-top:12px;opacity:.4">${b.ikon}</div>
    </div>`;
  }
  const baglarHTML=`

// ── TOAST ──
let toastTimer=null;
function toast(msg,dur=2200){
  let el=document.getElementById("toastEl");
  if(!el){el=document.createElement("div");el.id="toastEl";el.className="toast";document.body.appendChild(el);}
  el.textContent=msg;el.classList.add("show");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),dur);
}

function getSoruForState(){
  const P=SORULAR[state.poz];if(!P)return null;

  if(state.kat){const k=P.kategoriler.find(x=>x.id===state.kat);if(k)k.sorular.forEach(s=>tumS.push({...s,katLabel:k.label}));}

function toggleFav(){

function isFav(){

let searchQuery="";
function handleSearch(val){
  searchQuery=val.toLowerCase().trim();
  const wrap=document.getElementById("soruListeWrap");
  if(!wrap)return;
  const P=SORULAR[state.poz];if(!P)return;
  const c=C(),r=P.r;

  if(state.kat){const k=P.kategoriler.find(x=>x.id===state.kat);if(k)k.sorular.forEach((s,i)=>tumS.push({...s,katLabel:k.label,gi:i}));}
  else{let gi=0;P.kategoriler.forEach(k=>k.sorular.forEach(s=>tumS.push({...s,katLabel:k.label,gi:gi++})));}
  const filtered=searchQuery?tumS.filter(s=>s.b.toLowerCase().includes(searchQuery)||s.s.toLowerCase().includes(searchQuery)):null;
  const list=filtered||tumS;
  wrap.innerHTML=searchQuery?`<div style="font-size:11px;color:${c.cs};text-align:center;margin-bottom:12px">${list.length} soru bulundu</div>`:"";
  if(!list.length){wrap.innerHTML+=`<div style="text-align:center;padding:24px;color:${c.soluk};font-size:14px">Sonuç bulunamadı 😔</div>`;return;}
  if(filtered){
    filtered.forEach(s=>{
      const div=document.createElement("div");
      div.style.cssText=`background:${c.kart};border:1px solid ${c.cerç};border-radius:13px;padding:14px;margin-bottom:9px;cursor:pointer;transition:transform .2s`;

        <div style="font-family:'Crimson Pro',serif;font-size:15px;font-weight:400;color:${c.met};line-height:1.35;margin-bottom:5px">${s.b}</div>
        <div style="font-size:11px;color:${c.soluk};font-weight:300;line-height:1.45">${s.s.substring(0,80)}…</div>`;
      div.addEventListener("mouseover",()=>div.style.transform="translateX(4px)");

      div.addEventListener("click",()=>{searchQuery="";const inp=document.getElementById("searchInp");if(inp)inp.value="";navigate({soruI:s.gi},null);});
      wrap.appendChild(div);
    });
  }
}

let shareFormat="square"; // "square" | "story"
function generateStoryCanvas(soru,pozLabel,katLabel){
  const canvas=document.getElementById("shareCanvas");
  const W=1080,H=1920;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");
  const r=PR[state.poz]||PR.ateist;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#07070F");grad.addColorStop(.6,"#0C0C18");grad.addColorStop(1,"#07070F");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=.08;ctx.beginPath();ctx.arc(W*.85,H*.18,340,0,Math.PI*2);ctx.fillStyle=r.ana;ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=.05;ctx.beginPath();ctx.arc(W*.1,H*.82,260,0,Math.PI*2);ctx.fillStyle=r.parlak;ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=.05;
  for(let x=60;x<W;x+=44)for(let y=60;y<H;y+=44){ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();}
  ctx.restore();
  const lg=ctx.createLinearGradient(80,0,W-80,0);
  lg.addColorStop(0,"transparent");lg.addColorStop(.5,r.ana);lg.addColorStop(1,"transparent");
  ctx.fillStyle=lg;ctx.fillRect(80,148,W-160,2);
  ctx.font="bold 40px sans-serif";ctx.fillStyle=r.parlak;ctx.globalAlpha=.9;
  ctx.fillText("✉ Davet Mektubu",80,128);ctx.globalAlpha=1;
  ctx.save();ctx.globalAlpha=.28;ctx.fillStyle=r.ana;roundRect(ctx,80,172,370,52,26);ctx.fill();ctx.restore();
  ctx.font="600 24px sans-serif";ctx.fillStyle=r.parlak;ctx.fillText(pozLabel+" · "+katLabel,107,205);
  const midY=H*.36;
  ctx.font="bold 66px Georgia,serif";ctx.fillStyle="#EDE8E0";
  wrapText(ctx,soru.b,80,midY,W-160,82);
  ctx.fillStyle=r.ana;ctx.fillRect(80,midY+130,70,3);
  ctx.font="300 38px Georgia,serif";ctx.fillStyle="rgba(237,232,224,.75)";
  wrapText(ctx,soru.s,80,midY+178,W-160,56);
  const botY=H-230;
  ctx.fillStyle=lg;ctx.fillRect(80,botY-10,W-160,1);
  ctx.save();ctx.globalAlpha=.18;ctx.fillStyle=r.ana;roundRect(ctx,60,botY+8,W-120,110,24);ctx.fill();ctx.restore();
  ctx.font="bold 36px sans-serif";ctx.fillStyle="#EDE8E0";ctx.globalAlpha=1;
  ctx.fillText("✉ davetmektubu.com",100,botY+62);
  ctx.font="600 26px sans-serif";ctx.fillStyle=r.ana;ctx.globalAlpha=.9;
  ctx.fillText("→ Bu soruyu sor",100,botY+100);ctx.globalAlpha=1;
  return canvas;
}

function generateStoryCanvas(soru,pozLabel,katLabel){
  const canvas=document.getElementById("shareCanvas");
  const W=1080,H=1920;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");
  const r=PR[state.poz]||PR.ateist;
  // Arka plan
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#07070F");grad.addColorStop(.6,"#0C0C18");grad.addColorStop(1,"#07070F");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Büyük dekor dairesi
  ctx.save();ctx.globalAlpha=.08;
  ctx.beginPath();ctx.arc(W*.85,H*.2,340,0,Math.PI*2);ctx.fillStyle=r.ana;ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=.05;
  ctx.beginPath();ctx.arc(W*.1,H*.8,260,0,Math.PI*2);ctx.fillStyle=r.parlak;ctx.fill();ctx.restore();
  // Nokta dokusu
  ctx.save();ctx.globalAlpha=.05;
  for(let x=60;x<W;x+=44)for(let y=60;y<H;y+=44){ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();}
  ctx.restore();
  // Üst alan — logo
  const lg=ctx.createLinearGradient(80,0,W-80,0);
  lg.addColorStop(0,"transparent");lg.addColorStop(.5,r.ana);lg.addColorStop(1,"transparent");
  ctx.fillStyle=lg;ctx.fillRect(80,140,W-160,2);
  ctx.font="bold 38px sans-serif";ctx.fillStyle=r.parlak;ctx.globalAlpha=.9;
  ctx.fillText("✉ Davet Mektubu",80,120);ctx.globalAlpha=1;
  // Badge
  ctx.save();ctx.globalAlpha=.28;ctx.fillStyle=r.ana;
  roundRect(ctx,80,180,360,52,26);ctx.fill();ctx.restore();
  ctx.font="600 24px sans-serif";ctx.fillStyle=r.parlak;
  ctx.fillText(pozLabel+" · "+katLabel,107,213);
  // İçerik — orta
  const midY=H*.38;
  ctx.font="bold 68px Georgia,serif";ctx.fillStyle="#EDE8E0";
  wrapText(ctx,soru.b,80,midY,W-160,84);
  ctx.fillStyle=r.ana;ctx.fillRect(80,midY+120,70,3);
  ctx.font="300 38px Georgia,serif";ctx.fillStyle="rgba(237,232,224,.75)";
  wrapText(ctx,soru.s,80,midY+168,W-160,58);
  // Alt panel
  const botY=H-220;
  ctx.fillStyle=lg;ctx.fillRect(80,botY-10,W-160,1);
  ctx.save();ctx.globalAlpha=.18;ctx.fillStyle=r.ana;
  roundRect(ctx,60,botY+8,W-120,100,24);ctx.fill();ctx.restore();
  ctx.font="bold 36px sans-serif";ctx.fillStyle="#EDE8E0";ctx.globalAlpha=1;
  ctx.fillText("✉ davetmektubu.com",100,botY+68);
  ctx.font="600 26px sans-serif";ctx.fillStyle=r.ana;ctx.globalAlpha=.9;
  ctx.fillText("→ Bu soruyu sor",100,botY+102);ctx.globalAlpha=1;
  return canvas;
}

function generateCanvas(soru,pozLabel,katLabel){
  const canvas=document.getElementById("shareCanvas");
  const W=1080,H=1080;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");
  const r=PR[state.poz]||PR.ateist;

  // Arka plan — koyu gradient
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,"#07070F");grad.addColorStop(1,"#0C0C18");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Dekoratif daireler
  ctx.save();ctx.globalAlpha=.08;
  ctx.beginPath();ctx.arc(W*.88,H*.12,260,0,Math.PI*2);
  ctx.fillStyle=r.ana;ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=.05;
  ctx.beginPath();ctx.arc(W*.08,H*.88,200,0,Math.PI*2);
  ctx.fillStyle=r.parlak;ctx.fill();ctx.restore();

  // Nokta dokusu
  ctx.save();ctx.globalAlpha=.06;
  for(let x=60;x<W;x+=44)for(let y=60;y<H;y+=44){
    ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);
    ctx.fillStyle="#fff";ctx.fill();
  }
  ctx.restore();

  // Üst çizgi
  const lg=ctx.createLinearGradient(80,0,W-80,0);
  lg.addColorStop(0,"transparent");lg.addColorStop(.5,r.ana);lg.addColorStop(1,"transparent");
  ctx.fillStyle=lg;ctx.fillRect(80,72,W-160,2);

  // Badge
  ctx.save();ctx.globalAlpha=.28;
  ctx.fillStyle=r.ana;
  roundRect(ctx,80,104,340,44,22);ctx.fill();
  ctx.restore();
  ctx.font="600 21px sans-serif";ctx.fillStyle=r.parlak;ctx.globalAlpha=1;
  ctx.fillText(pozLabel+" · "+katLabel,107,132);

  // Başlık
  ctx.font="bold 58px Georgia,serif";ctx.fillStyle="#EDE8E0";
  wrapText(ctx,soru.b,80,230,W-160,74);

  // Ayırıcı çizgi + nokta
  ctx.fillStyle=r.ana;ctx.fillRect(80,370,56,3);
  ctx.beginPath();ctx.arc(148,371.5,5,0,Math.PI*2);ctx.fill();

  // İçerik metin
  ctx.font="300 32px Georgia,serif";ctx.fillStyle="rgba(237,232,224,0.75)";
  wrapText(ctx,soru.s,80,428,W-160,50);

  // Alt panel — URL kutusu
  const panelY=H-150;
  ctx.save();ctx.globalAlpha=.18;
  ctx.fillStyle=r.ana;
  roundRect(ctx,60,panelY,W-120,88,20);ctx.fill();
  ctx.restore();

  // Alt çizgi
  ctx.fillStyle=lg;ctx.fillRect(80,panelY-8,W-160,1);

  // Logo ikonu + URL — büyük ve net
  ctx.globalAlpha=1;
  ctx.font="bold 32px sans-serif";ctx.fillStyle=r.parlak;
  ctx.fillText("✉",88,panelY+52);
  ctx.font="bold 32px sans-serif";ctx.fillStyle="#EDE8E0";
  ctx.fillText("davetmektubu.com",132,panelY+52);

  // "Bu soruyu sor →" çağrı
  ctx.font="600 22px sans-serif";ctx.fillStyle=r.ana;ctx.globalAlpha=.9;
  const urlW=ctx.measureText("davetmektubu.com").width;
  ctx.fillText("→ Bu soruyu sor",132+urlW+28,panelY+52);
  ctx.globalAlpha=1;

  return canvas;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  const words=text.split(" ");let line="";let cy=y;
  for(let w of words){
    const t=line?line+" "+w:w;
    if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,cy);line=w;cy+=lineH;}
    else line=t;
    if(cy>900)break;
  }
  if(line)ctx.fillText(line,x,cy);
}

// SCROLL REVEAL (IntersectionObserver)
// ═══════════════════════════════════════════════════════
let revealObserver;
function setupReveal(){
  if(revealObserver)revealObserver.disconnect();
  revealObserver=new IntersectionObserver((entries)=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        e.target.style.transitionDelay=`${Math.min(i*.04,.2)}s`;
        e.target.classList.add("visible");
        revealObserver.unobserve(e.target);
      }
    });
  },{threshold:.12,rootMargin:"0px 0px -40px 0px"});
  document.querySelectorAll(".reveal").forEach(el=>revealObserver.observe(el));
}
