<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Arapça Kelime Kartları — Rauf Enç</title>
  <meta name="description" content="224 Arapça kelime kartı, 18 kategori. Görsel, ses ve Türkçe karşılıklarıyla günlük Arapça ifadeler." />
  <script src="veri.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #222230;
      --text: #e8e8f0;
      --muted: #44445a;
      --muted2: #7777a0;
      --accent: #10b981;
      --accent-soft: rgba(16,185,129,0.1);
      --accent-glow: rgba(16,185,129,0.25);
      --accent2: #059669;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 0%, rgba(16,185,129,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 80%, rgba(5,150,105,0.04) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse  { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    @keyframes cardPop { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }

    .wrap { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

    /* -- Header -- */
    header { padding: 48px 0 32px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted2); font-size: 12px; text-decoration: none;
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 24px; transition: color 0.2s;
      animation: fadeUp 0.4s ease both;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; }

    .header-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.1;
      animation: fadeUp 0.5s 0.05s ease both;
    }
    h1 .accent {
      color: transparent;
      background: linear-gradient(135deg, #10b981, #34d399, #059669);
      -webkit-background-clip: text; background-clip: text;
    }

    .subtitle {
      color: var(--muted2); font-size: 14px; margin-top: 8px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .stat-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted2); font-size: 12px; padding: 6px 14px;
      border-radius: 100px; white-space: nowrap;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .stat-pill strong { color: var(--accent); font-weight: 700; }

    /* -- Tabs -- */
    .tabs {
      display: flex; gap: 4px; margin-top: 28px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.5s 0.2s ease both;
      overflow-x: auto;
    }
    .tab {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted2); font-size: 13px; font-weight: 600;
      padding: 10px 18px; cursor: pointer; font-family: inherit;
      transition: all 0.2s; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* -- Kategori Grid -- */
    .kat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 20px 0 24px;
    }
    .kat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      animation: cardPop 0.3s ease both;
    }
    .kat-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .kat-emoji { font-size: 32px; margin-bottom: 10px; }
    .kat-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .kat-count { font-size: 12px; color: var(--muted2); }

    .kat-back {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border);
      color: var(--muted2); font-size: 12px; padding: 6px 14px;
      border-radius: 100px; cursor: pointer; font-family: inherit;
      transition: all 0.2s; margin-bottom: 16px;
    }
    .kat-back:hover { border-color: var(--accent); color: var(--accent); }
    .kat-back svg { width: 12px; height: 12px; }

    .kat-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .kat-header-emoji { font-size: 28px; }
    .kat-header-title { font-size: 20px; font-weight: 800; color: var(--text); }
    .kat-header-count { font-size: 12px; color: var(--muted2); }

    /* -- Search -- */
    .search-area {
      padding: 20px 0 0;
      animation: fadeUp 0.5s 0.25s ease both;
    }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); width: 16px; height: 16px; pointer-events: none;
    }
    #search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 44px 12px 40px;
      color: var(--text); font-size: 14px; font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search-count {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 11px; color: var(--muted); pointer-events: none;
    }

    .results-info {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 0 12px;
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .shuffle-btn {
      background: none; border: 1px solid var(--border); color: var(--muted2);
      font-size: 11px; padding: 5px 12px; border-radius: 100px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
      letter-spacing: 0.05em; text-transform: uppercase; font-weight: 600;
    }
    .shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* -- Grid -- */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding-bottom: 24px;
    }

    /* -- Card -- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: cardPop 0.3s ease both;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .card-img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      background: var(--surface2);
      display: block;
    }

    .card-body { padding: 12px 14px 14px; }

    .card-word {
      font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
      color: var(--accent); margin-bottom: 4px;
    }
    .card-tag {
      font-size: 11px; color: var(--muted2);
      display: inline-block;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 100px;
    }

    .card-sound {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.45); border: none;
      color: rgba(255,255,255,0.7); width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); transition: all 0.2s; z-index: 2;
    }
    .card-sound:hover { background: rgba(0,0,0,0.7); color: white; }
    .card-sound.playing { background: var(--accent); color: #0a0a0f; }
    .card-sound svg { width: 16px; height: 16px; }
    .card-img-wrap { position: relative; }

    /* -- Empty state -- */
    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px; color: var(--muted2);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* -- Lightbox -- */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .lightbox.open { opacity: 1; pointer-events: auto; }

    .lb-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 380px; width: 100%;
      overflow: hidden;
      transform: translateY(20px) scale(0.96);
      transition: transform 0.3s ease;
      max-height: 90vh; overflow-y: auto;
    }
    .lightbox.open .lb-content {
      transform: translateY(0) scale(1);
    }

    .lb-img {
      width: 100%; aspect-ratio: 2/3; object-fit: cover;
      display: block; background: var(--surface2);
    }

    .lb-body { padding: 20px 24px 24px; }

    .lb-word {
      font-size: 22px; font-weight: 800; color: var(--accent);
      letter-spacing: 0.02em; margin-bottom: 6px;
    }
    .lb-tag {
      display: inline-block; margin-bottom: 12px;
      font-size: 11px; font-weight: 700; color: var(--muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 100px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .lb-actions {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .lb-play {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--accent); border: none; color: #0a0a0f;
      font-size: 13px; font-weight: 700; padding: 10px 20px;
      border-radius: 100px; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .lb-play:hover { background: var(--accent2); box-shadow: 0 4px 16px var(--accent-glow); }
    .lb-play svg { width: 16px; height: 16px; }

    .lb-nav {
      display: flex; gap: 8px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .lb-nav-btn {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; color: var(--muted2);
      font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .lb-nav-btn:hover { border-color: var(--accent); color: var(--text); }
    .lb-nav-btn svg { width: 14px; height: 14px; }

    .lb-close {
      position: absolute; top: 16px; right: 16px;
      background: rgba(255,255,255,0.1); border: none;
      color: white; width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; font-size: 18px; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 2;
    }
    .lb-close:hover { background: rgba(255,255,255,0.2); }

    /* -- Kesfet: Instagram-style vertical scroll -- */
    .kesfet-feed {
      position: fixed; inset: 0; z-index: 50;
      background: var(--bg);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      display: none;
    }
    .kesfet-feed.open { display: block; }
    .kesfet-feed::-webkit-scrollbar { display: none; }
    .kesfet-feed { -ms-overflow-style: none; scrollbar-width: none; }

    .feed-slide {
      height: 100vh; height: 100dvh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      position: relative;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

    .feed-slide img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
    }

    .feed-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.3) 35%,
        transparent 60%
      );
    }

    .feed-info {
      position: relative; z-index: 2;
      padding: 28px 24px 40px;
      width: 100%;
    }

    .feed-word {
      font-size: 28px; font-weight: 800; color: #fff;
      letter-spacing: 0.02em; margin-bottom: 8px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }
    .feed-tag {
      display: inline-block; margin-top: 8px;
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      padding: 4px 12px; border-radius: 100px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .feed-sound-btn {
      position: fixed; right: 14px; bottom: 24px; z-index: 52;
      background: rgba(120,80,20,0.5); border: none;
      color: rgba(255,255,255,0.8); width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
    }
    .feed-sound-btn:hover { background: rgba(120,80,20,0.7); }
    .feed-sound-btn.playing { background: rgba(160,110,30,0.85); color: #fff; }

    .feed-counter {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 52;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      padding: 5px 14px; border-radius: 100px;
      letter-spacing: 0.05em;
      pointer-events: none;
    }

    .feed-close {
      position: fixed; top: 14px; right: 16px; z-index: 52;
      background: rgba(255,255,255,0.12); border: none;
      color: white; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    .feed-close:hover { background: rgba(255,255,255,0.25); }

    .feed-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 52; color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      animation: pulse 2s infinite;
      pointer-events: none;
    }

    /* -- Kesfet panel (non-feed) -- */
    .kesfet-start {
      text-align: center; padding: 60px 0;
    }
    .kesfet-start-btn {
      background: var(--accent); border: none; color: #0a0a0f;
      font-size: 15px; font-weight: 700; padding: 14px 36px;
      border-radius: 100px; cursor: pointer; font-family: inherit;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    .kesfet-start-btn:hover {
      background: var(--accent2);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .kesfet-desc {
      color: var(--muted2); font-size: 13px; margin-top: 16px; line-height: 1.6;
    }

    /* -- Footer -- */
    footer {
      text-align: center; padding: 32px 20px;
      color: var(--muted); font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    footer a { color: var(--muted2); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--text); }

    /* -- Hide redundant text (images already show everything) -- */
    .feed-word, .feed-meaning, .feed-tag { display: none; }
    .feed-overlay { display: none; }
    .lb-word, .lb-meaning, .lb-tag { display: none; }
    .card-body { display: none; }

    /* -- Responsive -- */
    @media (max-width: 520px) {
      header { padding: 32px 0 24px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
      .kat-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
      .card-body { padding: 10px 12px 12px; }
      .card-word { font-size: 13px; }
      .lb-content { max-width: 100%; border-radius: 12px; }
      .tab { padding: 8px 12px; font-size: 12px; }
      .feed-word { font-size: 24px; }
    }
  </style>
  <script src="/nav.js"></script>
</head>
<body>

<div class="wrap">
  <header>
    <a href="/" class="back-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Lab'a dön
    </a>
    <div class="header-row">
      <div>
        <h1>Arapça <span class="accent">Kelime Kartları</span></h1>
        <p class="subtitle">Görsel, ses ve Türkçe karşılıklarıyla günlük Arapça ifadeler</p>
      </div>
      <div class="stat-pill"><strong id="total">0</strong> kelime · <strong id="kat-count">0</strong> kategori</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="kategoriler">Kategoriler</button>
      <button class="tab" data-tab="kesfet">Keşfet</button>
      <button class="tab" data-tab="arama">Arama</button>
    </div>
  </header>
</div>

<!-- KATEGORILER TAB -->
<div class="wrap" id="panel-kategoriler">
  <div id="kat-view"></div>
</div>

<!-- KESFET TAB -->
<div class="wrap" id="panel-kesfet" style="display:none;">
  <div class="kesfet-start">
    <button class="kesfet-start-btn" onclick="openFeed()">Keşfetmeye Başla</button>
    <p class="kesfet-desc">Rastgele sıralanmış kelimeleri Instagram gibi kaydırarak keşfet.<br>Her kart göründüğünde sesi otomatik çalar.</p>
  </div>
</div>

<!-- ARAMA TAB -->
<div class="wrap" id="panel-arama" style="display:none;">
  <div class="search-area">
    <div class="search-wrap">
      <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
      </svg>
      <input id="search" type="search" placeholder="Kelime ara..." autocomplete="off" spellcheck="false" />
      <span class="search-count" id="search-count"></span>
    </div>
  </div>
  <div class="results-info">
    <span id="results-text">0 sonuç</span>
    <button class="shuffle-btn" onclick="karistir()">Karıştır</button>
  </div>
  <div id="grid"></div>
</div>

<!-- Kesfet Feed (fullscreen) -->
<div class="kesfet-feed" id="kesfet-feed">
  <button class="feed-close" onclick="closeFeed()">&times;</button>
  <div class="feed-counter" id="feed-counter"></div>
  <button class="feed-sound-btn" id="feed-sound-btn" onclick="replayFeedAudio()">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.5 6.5 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
  </button>
  <div class="feed-hint" id="feed-hint">Kaydır</div>
  <div id="feed-slides"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">&times;</button>
  <div class="lb-content">
    <img class="lb-img" id="lb-img" src="" alt="" loading="lazy" />
    <div class="lb-body">
      <div class="lb-word" id="lb-word"></div>
      <span class="lb-tag" id="lb-tag"></span>
      <div class="lb-actions">
        <button class="lb-play" onclick="playLBSound()">
          <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.5 6.5 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
          Sesi Çal
        </button>
      </div>
      <div class="lb-nav">
        <button class="lb-nav-btn" onclick="navLB(-1)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Önceki
        </button>
        <button class="lb-nav-btn" onclick="navLB(1)">
          Sonraki
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="/">lab.raufenc.com</a>
  &nbsp;·&nbsp;
  Rauf Enç &copy; 2026
</footer>

<script>
// -- State --
let allItems = [];
let currentList = [];
let lbIndex = -1;
let aktifTab = 'kategoriler';
let feedItems = [];
let currentAudio = null;
let currentKategori = null;

// -- Init --
document.addEventListener('DOMContentLoaded', () => {
  // Flatten all items with category info
  KATEGORILER.forEach(kat => {
    kat.items.forEach(item => {
      allItems.push({ ...item, kategori: kat.baslik, emoji: kat.emoji });
    });
  });

  document.getElementById('total').textContent = allItems.length;
  document.getElementById('kat-count').textContent = KATEGORILER.length;

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => setTab(btn.dataset.tab));
  });

  document.getElementById('search').addEventListener('input', e => {
    renderArama(e.target.value.trim());
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLB();
  });

  document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    }
    if (document.getElementById('kesfet-feed').classList.contains('open')) {
      if (e.key === 'Escape') closeFeed();
    }
  });

  renderKategoriler();
});

// -- Tabs --
function setTab(tab) {
  aktifTab = tab;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab)
  );
  document.getElementById('panel-kategoriler').style.display = tab === 'kategoriler' ? '' : 'none';
  document.getElementById('panel-kesfet').style.display = tab === 'kesfet' ? '' : 'none';
  document.getElementById('panel-arama').style.display = tab === 'arama' ? '' : 'none';

  if (tab === 'kategoriler') renderKategoriler();
  if (tab === 'arama') renderArama('');
}

// -- KATEGORILER --
function renderKategoriler() {
  const view = document.getElementById('kat-view');

  if (currentKategori !== null) {
    const kat = KATEGORILER[currentKategori];
    currentList = kat.items.map(item => ({ ...item, kategori: kat.baslik, emoji: kat.emoji }));
    view.innerHTML = '';

    const backBtn = document.createElement('button');
    backBtn.className = 'kat-back';
    backBtn.innerHTML = '<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg> Tüm Kategoriler';
    backBtn.onclick = () => { currentKategori = null; renderKategoriler(); };
    view.appendChild(backBtn);

    const header = document.createElement('div');
    header.className = 'kat-header';
    header.innerHTML = `<span class="kat-header-emoji">${kat.emoji}</span><span class="kat-header-title">${kat.baslik}</span><span class="kat-header-count">${kat.items.length} kelime</span>`;
    view.appendChild(header);

    const grid = document.createElement('div');
    grid.id = 'kat-items-grid';
    grid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; padding-bottom:24px;';
    view.appendChild(grid);

    renderGrid('kat-items-grid', currentList);
    return;
  }

  // Show category cards
  currentList = allItems;
  view.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'kat-grid';

  KATEGORILER.forEach((kat, idx) => {
    const card = document.createElement('div');
    card.className = 'kat-card';
    card.style.animationDelay = `${idx * 40}ms`;
    card.onclick = () => {
      const items = kat.items.map(item => ({ ...item, kategori: kat.baslik, emoji: kat.emoji }));
      openFeed(items);
    };
    card.innerHTML = `
      <div class="kat-emoji">${kat.emoji}</div>
      <div class="kat-title">${kat.baslik}</div>
      <div class="kat-count">${kat.items.length} kelime</div>`;
    grid.appendChild(card);
  });

  view.appendChild(grid);
}

// -- ARAMA --
function renderArama(q) {
  const lower = q.toLowerCase();
  const filtered = q
    ? allItems.filter(s => s.kelime.toLowerCase().includes(lower))
    : [...allItems];

  currentList = filtered;
  document.getElementById('search-count').textContent = q ? filtered.length : '';
  document.getElementById('results-text').textContent =
    q ? `${filtered.length} / ${allItems.length} sonuç` : `${allItems.length} kelime`;

  renderGrid('grid', filtered);
}

function karistir() {
  const arr = [...allItems];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  currentList = arr;
  renderGrid('grid', arr);
  document.getElementById('search').value = '';
  document.getElementById('search-count').textContent = '';
  document.getElementById('results-text').textContent = `${allItems.length} kelime (karışık)`;
}

// -- KESFET FEED --
function openFeed(customItems) {
  if (customItems) {
    feedItems = [...customItems];
  } else {
    feedItems = [...allItems];
    for (let i = feedItems.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [feedItems[i], feedItems[j]] = [feedItems[j], feedItems[i]];
    }
  }

  const container = document.getElementById('feed-slides');
  container.innerHTML = '';

  const batchSize = 20;
  for (let i = 0; i < Math.min(batchSize, feedItems.length); i++) {
    container.appendChild(createSlide(feedItems[i], i));
  }

  const feed = document.getElementById('kesfet-feed');
  feed.classList.add('open');
  feed.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  updateFeedCounter(0);

  // Auto-play first slide audio
  setTimeout(() => playFeedAudio(0), 300);

  // Setup IntersectionObserver for auto-play
  setupFeedObserver();

  let loaded = batchSize;
  feed.onscroll = () => {
    const idx = Math.round(feed.scrollTop / feed.clientHeight);
    updateFeedCounter(idx);

    const hint = document.getElementById('feed-hint');
    if (idx > 0 && hint) hint.style.display = 'none';

    if (idx >= loaded - 5 && loaded < feedItems.length) {
      const end = Math.min(loaded + batchSize, feedItems.length);
      for (let i = loaded; i < end; i++) {
        const slide = createSlide(feedItems[i], i);
        container.appendChild(slide);
        if (feedObserver) feedObserver.observe(slide);
      }
      loaded = end;
    }
  };
}

let feedObserver = null;

function setupFeedObserver() {
  if (feedObserver) feedObserver.disconnect();

  feedObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
        const idx = parseInt(entry.target.dataset.index);
        playFeedAudio(idx);
      }
    });
  }, {
    root: document.getElementById('kesfet-feed'),
    threshold: 0.6
  });

  document.querySelectorAll('.feed-slide').forEach(slide => {
    feedObserver.observe(slide);
  });
}

function playFeedAudio(idx) {
  if (idx < 0 || idx >= feedItems.length) return;
  const item = feedItems[idx];
  if (!item.ses) return;

  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  const btn = document.getElementById('feed-sound-btn');
  btn.classList.add('playing');

  currentAudio = new Audio('sounds/' + item.ses);
  currentAudio.play().catch(() => {});
  currentAudio.onended = () => {
    btn.classList.remove('playing');
    currentAudio = null;
  };
}

function replayFeedAudio() {
  const feed = document.getElementById('kesfet-feed');
  const idx = Math.round(feed.scrollTop / feed.clientHeight);
  playFeedAudio(idx);
}

function createSlide(item, index) {
  const div = document.createElement('div');
  div.className = 'feed-slide';
  div.dataset.index = index;
  const katInfo = item.kategori || '';
  div.innerHTML = `
    <img src="images/${item.gorsel}" alt="${item.kelime}" loading="${index < 3 ? 'eager' : 'lazy'}" />
    <div class="feed-overlay"></div>
    <div class="feed-info">
      <div class="feed-word">${item.kelime}</div>
      <span class="feed-tag">${katInfo}</span>
    </div>`;
  return div;
}

function updateFeedCounter(idx) {
  document.getElementById('feed-counter').textContent = `${idx + 1} / ${feedItems.length}`;
}

function closeFeed() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (feedObserver) { feedObserver.disconnect(); feedObserver = null; }
  const feed = document.getElementById('kesfet-feed');
  feed.classList.remove('open');
  feed.onscroll = null;
  document.body.style.overflow = '';
  document.getElementById('feed-hint').style.display = '';
  document.getElementById('feed-sound-btn').classList.remove('playing');
}

// -- Grid Render --
function renderGrid(containerId, items) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">&#128270;</div><div class="empty-text">Sonuç bulunamadı</div></div>';
    return;
  }

  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.style.animationDelay = `${Math.min(i, 20) * 30}ms`;
    el.onclick = () => openLB(i);
    const soundBtn = item.ses ? `<button class="card-sound" data-ses="${item.ses}" onclick="event.stopPropagation(); playCardSound(this, '${item.ses}')"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5z"/></svg></button>` : '';
    el.innerHTML = `
      <div class="card-img-wrap">
        <img class="card-img" src="images/${item.gorsel}" alt="${item.kelime}" loading="lazy"
             onerror="this.style.background='var(--surface2)'" />
        ${soundBtn}
      </div>
      <div class="card-body">
        <div class="card-word">${item.kelime}</div>
        ${item.kategori ? '<span class="card-tag">' + item.kategori + '</span>' : ''}
      </div>`;
    grid.appendChild(el);
  });
}

// -- Lightbox --
function openLB(index) {
  lbIndex = index;
  const item = currentList[index];
  if (!item) return;

  document.getElementById('lb-img').src = `images/${item.gorsel}`;
  document.getElementById('lb-img').alt = item.kelime;
  document.getElementById('lb-word').textContent = item.kelime;
  document.getElementById('lb-tag').textContent = item.kategori || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
}

function navLB(dir) {
  let next = lbIndex + dir;
  if (next < 0) next = currentList.length - 1;
  if (next >= currentList.length) next = 0;
  openLB(next);
}

function playCardSound(btn, ses) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.card-sound.playing').forEach(b => b.classList.remove('playing'));
  btn.classList.add('playing');
  currentAudio = new Audio('sounds/' + ses);
  currentAudio.play().catch(() => {});
  currentAudio.onended = () => { btn.classList.remove('playing'); currentAudio = null; };
}

function playLBSound() {
  const item = currentList[lbIndex];
  if (!item || !item.ses) return;

  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio('sounds/' + item.ses);
  currentAudio.play().catch(() => {});
  currentAudio.onended = () => { currentAudio = null; };
}
</script>
