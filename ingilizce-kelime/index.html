<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>İngilizce Kelime Kartları — Rauf Enç</title>
  <meta name="description" content="238 İngilizce kelime kartı, 9 kategori. Görsel, ses ve Türkçe karşılıklarıyla İngilizce kelime öğren." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="İngilizce Kelime Kartları — Rauf Enç" />
  <meta property="og:description" content="238 İngilizce kelime kartı, 9 kategori. Görsel, ses ve Türkçe karşılıklarıyla İngilizce kelime öğren." />
  <meta property="og:url" content="https://raufenc.com/ingilizce-kelime/" />
  <meta property="og:image" content="https://raufenc.com/images/og-image.png" />
  <meta property="og:locale" content="tr_TR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="İngilizce Kelime Kartları — Rauf Enç" />
  <meta name="twitter:description" content="238 İngilizce kelime kartı, 9 kategori. Görsel, ses ve Türkçe karşılıklarıyla İngilizce kelime öğren." />
  <link rel="canonical" href="https://raufenc.com/ingilizce-kelime/" />
  <link rel="stylesheet" href="../lib/kelime-app/style.css" />
  <script src="/lib/design-system/theme.js"></script>
  <style>
    :root {
      --accent: #38bdf8;
      --accent-soft: rgba(56,189,248,0.1);
      --accent-glow: rgba(56,189,248,0.25);
      --accent2: #0ea5e9;
      --bg-gradient1: rgba(56,189,248,0.06);
      --bg-gradient2: rgba(14,165,233,0.04);
      --h1-gradient: linear-gradient(135deg, #38bdf8, #7dd3fc, #0ea5e9);
    }
  </style>
  <script>window.KELIME_SEARCH_ANLAM = true;</script>
  <script src="veri.js" defer></script>
  <script src="../lib/kelime-app/app.js" defer></script>
  <script src="/nav.js"></script>
</head>
<body>

<div class="wrap">
  <header>
    <a href="/" class="back-link">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      Lab'a dön
    </a>
    <div class="header-row">
      <div>
        <h1>İngilizce <span class="accent">Kelime Kartları</span></h1>
        <p class="subtitle">Görsel, ses ve Türkçe karşılıklarıyla İngilizce kelime öğren</p>
      </div>
      <div class="stat-pill"><strong id="total">0</strong> kelime · <strong id="kat-count">0</strong> kategori</div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="kategoriler">Kategoriler</button>
      <button class="tab" data-tab="kesfet">Keşfet</button>
      <button class="tab" data-tab="arama">Arama</button>
    </div>
  </header>
</div>

<!-- KATEGORILER TAB -->
<div class="wrap" id="panel-kategoriler">
  <div id="kat-view"></div>
</div>

<!-- KESFET TAB -->
<div class="wrap" id="panel-kesfet" style="display:none;">
  <div class="kesfet-start">
    <button class="kesfet-start-btn" onclick="openFeed()">Keşfetmeye Başla</button>
    <p class="kesfet-desc">Rastgele sıralanmış kelimeleri Instagram gibi kaydırarak keşfet.<br>Her kart göründüğünde sesi otomatik çalar.</p>
  </div>
</div>

<!-- ARAMA TAB -->
<div class="wrap" id="panel-arama" style="display:none;">
  <div class="search-area">
    <div class="search-wrap">
      <svg class="search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
      </svg>
      <input id="search" type="search" placeholder="Kelime veya anlam ara..." autocomplete="off" spellcheck="false" />
      <span class="search-count" id="search-count"></span>
    </div>
  </div>
  <div class="results-info">
    <span id="results-text">0 sonuç</span>
    <button class="shuffle-btn" onclick="karistir()">Karıştır</button>
  </div>
  <div id="grid"></div>
</div>

<!-- Keşfet Feed (fullscreen) -->
<div class="kesfet-feed" id="kesfet-feed">
  <button class="feed-close" onclick="closeFeed()">&times;</button>
  <div class="feed-counter" id="feed-counter"></div>
  <button class="feed-sound-btn" id="feed-sound-btn" onclick="replayFeedAudio()">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.5 6.5 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
  </button>
  <div class="feed-hint" id="feed-hint">Kaydır</div>
  <div id="feed-slides"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLB()">&times;</button>
  <div class="lb-content">
    <img class="lb-img" id="lb-img" src="" alt="" loading="lazy" />
    <div class="lb-body">
      <div class="lb-word" id="lb-word"></div>
      <div class="lb-meaning" id="lb-meaning"></div>
      <span class="lb-tag" id="lb-tag"></span>
      <div class="lb-actions">
        <button class="lb-play" onclick="playLBSound()">
          <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a6.5 6.5 0 010 13.42v2.06A8.5 8.5 0 0014 3.23z"/></svg>
          Sesi Çal
        </button>
      </div>
      <div class="lb-nav">
        <button class="lb-nav-btn" onclick="navLB(-1)">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
          Önceki
        </button>
        <button class="lb-nav-btn" onclick="navLB(1)">
          Sonraki
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="/">lab.raufenc.com</a>
  &nbsp;·&nbsp;
  Rauf Enç &copy; 2026
</footer>

</body>
</html>
