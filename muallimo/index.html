<!DOCTYPE html>
<html lang="tr">
<head>
<script src="/lib/design-system/theme.js"></script>
<link rel="stylesheet" href="/lib/design-system/tokens.css" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MUALLİMO — Resim Kartları Kütüphanesi</title>
<meta name="description" content="Çocuklar için eğitici resim kartları. 2.199 kart, 24 kitap, 6 seri.">
<link rel="canonical" href="https://raufenc.com/muallimo/" />
<style>
/* ── RESET & TEMEL ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg2:      #111420;
  --bg3:      #181c2e;
  --border2:  #252b42;
  --text3:    #4a5070;
  --accent:   #7c6fff;
  --accent2:  #a78bfa;
  --green:    #22c55e;
  --radius:   16px;
  --radius-sm:10px;
  --shadow:   0 8px 40px rgba(0,0,0,.5);
}
html.light {
  --bg2:      #f0f0f5;
  --bg3:      #e8e8f0;
  --border2:  #c8c8d4;
  --text3:    #888898;
  --accent:   #7c6fff;
  --accent2:  #6d5ce0;
  --shadow:   0 8px 40px rgba(0,0,0,.08);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────────────────── */
#header {
  position: sticky; top: 0; z-index: 200;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 16px;
}
.logo {
  font-size: 1.1rem; font-weight: 800;
  letter-spacing: .04em; cursor: pointer;
  background: linear-gradient(135deg, #fff 30%, var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.logo span { font-weight: 400; opacity: .7; }
#header-crumb {
  color: var(--text3); font-size: 0.82rem;
  display: none; align-items: center; gap: 6px;
}
#header-crumb.visible { display: flex; }
.crumb-sep { color: var(--text3); }
#header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.hdr-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); padding: 6px 14px;
  border-radius: 8px; cursor: pointer;
  font-size: 0.82rem; transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.hdr-btn:hover { background: var(--border2); color: var(--text); }
.hdr-nav-a {
  color: var(--text2); text-decoration: none; font-size: .78rem;
  padding: 5px 10px; border-radius: 7px; white-space: nowrap;
  transition: color .15s, background .15s;
}
.hdr-nav-a:hover { color: var(--text); background: var(--bg3); }
.hdr-nav-a.hdr-nav-home { padding: 5px 8px; }

/* ── EKRANLAR ───────────────────────────────────────────────── */
.screen { display: none; }
.screen.active { display: block; }

/* ── EKRAN 1: ANASAYFA ──────────────────────────────────────── */
#hero {
  padding: 64px 24px 48px;
  max-width: 860px; margin: 0 auto; text-align: center;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(124,111,255,.12); border: 1px solid rgba(124,111,255,.25);
  color: var(--accent2); padding: 5px 14px; border-radius: 20px;
  font-size: 0.78rem; font-weight: 600; margin-bottom: 24px;
  letter-spacing: .05em;
}
.hero-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#hero h1 {
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 800; line-height: 1.1;
  letter-spacing: -.02em; margin-bottom: 16px;
}
#hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#hero p {
  color: var(--text2); font-size: 1.05rem; line-height: 1.7;
  max-width: 520px; margin: 0 auto 36px;
}
.hero-stats {
  display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
  margin-bottom: 40px;
}
.stat { text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 800; color: var(--text); }
.stat-lbl { font-size: 0.75rem; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; margin-top: 2px; }

/* Seri kartları */
.section { max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
.section-title {
  font-size: 0.72rem; font-weight: 700; color: var(--text3);
  letter-spacing: .12em; text-transform: uppercase;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.seri-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.seri-kart {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 20px;
  cursor: pointer;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  position: relative; overflow: hidden;
}
.seri-kart::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--sc, rgba(124,111,255,.15)) 0%, transparent 70%);
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.seri-kart:hover { transform: translateY(-4px); border-color: var(--sc-border, var(--accent)); box-shadow: 0 12px 40px rgba(0,0,0,.4); }
.seri-kart:hover::after { opacity: 1; }
.seri-top-line {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--sc, var(--accent));
}
.seri-emoji { font-size: 2rem; margin-bottom: 12px; display: block; }
.seri-isim { font-size: 1rem; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
.seri-meta { color: var(--text3); font-size: 0.78rem; }
.seri-pill {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 14px;
  background: var(--bg3); border: 1px solid var(--border2);
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; color: var(--text3);
}

/* ── EKRAN 2: CİLT LİSTESİ ──────────────────────────────────── */
#cilt-hero {
  padding: 40px 24px 32px;
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: flex-start; gap: 20px;
}
.cilt-emoji-wrap {
  width: 60px; height: 60px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 2rem; flex-shrink: 0;
}
.cilt-hero-text h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; }
.cilt-hero-text p { color: var(--text2); font-size: 0.9rem; }
.cilt-grid {
  max-width: 1100px; margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.cilt-kart {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  cursor: pointer;
  transition: transform .2s, border-color .2s;
}
.cilt-kart:hover { transform: translateY(-3px); border-color: var(--sc, var(--accent)); }
.cilt-onizleme {
  height: 100px; display: flex; gap: 2px; overflow: hidden;
  background: var(--bg3);
}
.cilt-onizleme img {
  flex: 1; object-fit: cover; min-width: 0;
  background: var(--bg3);
}
.cilt-kart-body { padding: 14px 16px; }
.cilt-no-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 6px;
  font-size: 0.72rem; font-weight: 700;
  background: var(--sc-acik, rgba(124,111,255,.15));
  color: var(--sc, var(--accent));
  margin-bottom: 8px;
}
.cilt-ad { font-size: 0.95rem; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
.cilt-kart-cnt { color: var(--text3); font-size: 0.78rem; }

/* ── EKRAN 3: KART OKUYUCU ──────────────────────────────────── */
#reader-header {
  max-width: 700px; margin: 0 auto;
  padding: 32px 24px 0;
}
#reader-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
#reader-sub { color: var(--text2); font-size: 0.85rem; margin-bottom: 24px; }

/* Progress */
#progress-wrap {
  max-width: 700px; margin: 0 auto;
  padding: 0 24px;
}
.progress-track {
  height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden;
  margin-bottom: 16px;
}
.progress-fill {
  height: 100%; background: var(--sc, var(--accent));
  border-radius: 2px; transition: width .4s;
}

/* Kontroller */
#reader-controls {
  max-width: 700px; margin: 0 auto;
  padding: 0 24px 8px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.ctrl-btn {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text2); padding: 7px 14px;
  border-radius: 8px; cursor: pointer; font-size: 0.8rem;
  transition: all .15s; display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.ctrl-btn:hover { background: var(--border2); color: var(--text); }
.ctrl-btn.on { background: var(--sc, var(--accent)); border-color: var(--sc, var(--accent)); color: #fff; }

/* Scroll kart şeridi — TAM EKRAN */
#scroll-container {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  display: none;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
#scroll-container::-webkit-scrollbar { display: none; }
#scroll-container.active { display: block; }

.scroll-slide {
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: #000;
  padding: 0;
}
.scroll-img {
  max-height: 100dvh;
  max-width: 100vw;
  width: auto; height: auto;
  border-radius: 0;
  box-shadow: none;
  display: block;
  object-fit: contain;
}
.slide-counter {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.55); backdrop-filter: blur(8px);
  color: rgba(255,255,255,.8); font-size: 0.75rem; font-weight: 600;
  padding: 4px 12px; border-radius: 12px;
  white-space: nowrap; z-index: 2; pointer-events: none;
}
.slide-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,.3); font-size: 0.72rem;
  animation: fadeHint 3s ease 2s forwards;
  pointer-events: none; z-index: 2;
}
@keyframes fadeHint { 0%{opacity:1} 100%{opacity:0} }

/* Tam ekran scroll overlay butonları */
#sc-close-btn {
  position: fixed; top: 14px; right: 16px; z-index: 102;
  background: rgba(0,0,0,.6); border: none; color: #fff;
  width: 42px; height: 42px; border-radius: 50%;
  cursor: pointer; font-size: 1.2rem;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: background .15s;
}
#sc-close-btn:hover { background: rgba(60,60,60,.85); }
#sc-close-btn.visible { display: flex; }

#sc-grid-btn {
  position: fixed; bottom: 24px; right: 16px; z-index: 102;
  background: rgba(0,0,0,.6); border: none; color: rgba(255,255,255,.8);
  width: 42px; height: 42px; border-radius: 50%;
  cursor: pointer; font-size: 1rem;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: background .15s;
}
#sc-grid-btn:hover { background: rgba(60,60,60,.85); }
#sc-grid-btn.visible { display: flex; }

#sc-shuffle-btn {
  position: fixed; bottom: 24px; left: 16px; z-index: 102;
  background: rgba(0,0,0,.6); border: none; color: rgba(255,255,255,.8);
  width: 42px; height: 42px; border-radius: 50%;
  cursor: pointer; font-size: 1rem;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: background .15s;
}
#sc-shuffle-btn:hover { background: rgba(60,60,60,.85); }
#sc-shuffle-btn.visible { display: flex; }

/* Küçük kart grid — ikinci görünüm */
#grid-container {
  max-width: 1100px; margin: 0 auto;
  padding: 12px 16px 80px;
  display: none;
}
#grid-container.visible { display: block; }
.mini-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 8px;
}
.mini-kart {
  aspect-ratio: 2/3; border-radius: 10px; overflow: hidden;
  cursor: pointer; position: relative;
  border: 2px solid transparent; transition: border-color .15s, transform .15s;
  background: var(--bg3);
}
.mini-kart--916 { aspect-ratio: 9/16; }
.mini-kart:hover { border-color: var(--sc, var(--accent)); transform: scale(1.03); z-index: 2; }
.mini-kart img { width: 100%; height: 100%; object-fit: cover; display: block; }
.mini-no {
  position: absolute; bottom: 4px; right: 5px;
  background: rgba(0,0,0,.6); color: rgba(255,255,255,.7);
  font-size: 0.62rem; padding: 2px 6px; border-radius: 8px;
}

/* ── LIGHTBOX ───────────────────────────────────────────────── */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,.96);
  flex-direction: column; align-items: center; justify-content: center;
}
#lightbox.open { display: flex; }
#lb-img {
  max-height: calc(100dvh - 100px);
  max-width: min(94vw, 500px);
  border-radius: 14px;
  object-fit: contain;
  box-shadow: 0 0 80px rgba(0,0,0,.9);
}
#lb-nav {
  display: flex; align-items: center; gap: 24px;
  padding: 18px; position: absolute; bottom: 0; left: 0; right: 0;
  justify-content: center;
}
.lb-btn {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  color: #fff; width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.3rem; transition: background .15s;
}
.lb-btn:hover { background: rgba(255,255,255,.22); }
.lb-btn:disabled { opacity: .25; cursor: default; }
#lb-counter { color: rgba(255,255,255,.5); font-size: 0.85rem; min-width: 70px; text-align: center; }
#lb-close {
  position: fixed; top: 14px; right: 16px;
  background: rgba(255,255,255,.1); border: none; color: #fff;
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.1rem;
}
#lb-close:hover { background: rgba(255,255,255,.2); }

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media (max-width: 600px) {
  #hero h1 { font-size: 2rem; }
  .seri-grid { grid-template-columns: 1fr 1fr; }
  .cilt-grid { grid-template-columns: 1fr 1fr; }
  .mini-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .scroll-img { max-width: 96vw; }
}
</style>
  <script src="/nav.js"></script>
</head>
<body data-nav-skip="true">

<!-- HEADER -->
<header id="header">
  <div class="logo" onclick="goHome()" style="cursor:pointer">MUALLİMO</div>
  <div id="header-crumb">
    <span id="crumb-seri" style="cursor:pointer;color:var(--text2)" onclick="goSeri()"></span>
    <span class="crumb-sep" id="crumb-sep" style="display:none">›</span>
    <span id="crumb-cilt" style="color:var(--text2)"></span>
  </div>
  <div id="header-right">
    <a href="/" class="hdr-nav-a" title="Lab ana sayfası">← Lab</a>
    <a href="https://raufenc.com" class="hdr-nav-a hdr-nav-home" title="raufenc.com">🏠</a>
    <button class="hdr-btn" id="hdr-back" style="display:none" onclick="goBack()">← Geri</button>
  </div>
</header>

<!-- EKRAN 1: ANASAYFA -->
<div class="screen active" id="screen-home">

    <div class="hero-badge">✦ MUALLIMO</div>
    <h1>Öğrenmek<br><em>eğlenceli</em> olabilir</h1>

    <div class="hero-stats">
      <div class="stat"><div class="stat-num">2,199</div><div class="stat-lbl">Kart</div></div>

      <div class="stat"><div class="stat-num">6</div><div class="stat-lbl">Seri</div></div>
    </div>

    <div class="section-title">Seriler</div>

<!-- EKRAN 2: CİLT LİSTESİ -->
<div class="screen" id="screen-cilt">
  <div id="cilt-hero">
    <div class="cilt-emoji-wrap" id="cilt-emoji"></div>
    <div class="cilt-hero-text">
      <h2 id="cilt-seri-baslik"></h2>
      <p id="cilt-seri-sub"></p>
    </div>
  </div>
  <div class="cilt-grid" id="cilt-grid"></div>
</div>

<!-- EKRAN 3: OKUYUCU -->
<div class="screen" id="screen-reader">
  <div id="reader-header">
    <div id="reader-title"></div>
    <div id="reader-sub"></div>
  </div>
  <div id="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div id="reader-controls">
    <button class="ctrl-btn on" id="btn-scroll" onclick="setView('scroll')">📜 Kaydır</button>
    <button class="ctrl-btn" id="btn-grid" onclick="setView('grid')">⊞ Küçük</button>

  <!-- Grid görünümü -->
  <div id="grid-container">
    <div class="mini-grid" id="mini-grid"></div>
  </div>
</div>

<!-- TAM EKRAN SCROLL OVERLAY BUTONLARI -->
<button id="sc-close-btn" onclick="kapatScrollView()" title="Geri">✕</button>
<button id="sc-grid-btn" onclick="kapatScrollView('grid')" title="Küçük görünüm">⊞</button>
<button id="sc-shuffle-btn" onclick="scShuffle()" title="Karıştır">🔀</button>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close" onclick="lbKapat()">✕</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-nav">
    <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <div id="lb-counter"></div>
    <button class="lb-btn" id="lb-next" onclick="lbNav(1)">›</button>
  </div>

// Seri renkleri
const SERİ_RENKLER = {
  okuryazarlik: { renk:'#2E7D6E', acik:'rgba(46,125,110,.15)', border:'rgba(46,125,110,.4)' },
  saglik:       { renk:'#C55A11', acik:'rgba(197,90,17,.15)',  border:'rgba(197,90,17,.4)'  },
  teknoloji:    { renk:'#6b7280', acik:'rgba(107,114,128,.15)',border:'rgba(107,114,128,.4)'},
  kultur:       { renk:'#BF8F00', acik:'rgba(191,143,0,.15)',  border:'rgba(191,143,0,.4)'  },
  csuite:       { renk:'#7030A0', acik:'rgba(112,48,160,.15)', border:'rgba(112,48,160,.4)' },
  'fen-bilimleri': { renk:'#1565C0', acik:'rgba(21,101,192,.15)', border:'rgba(21,101,192,.4)' },
};

// ── Durum ──────────────────────────────────────────────────────
let aktifSeri = null, aktifCilt = null;
let kartlar = [], aktifKartlar = [];
let gorunum = 'scroll';
let aktifFormat = '2:3';
let lbIdx = 0;

// ── Yardımcı ───────────────────────────────────────────────────
const img = (yol) => 'https://cdn.jsdelivr.net/gh/raufenc/muallimo-images@main/WEBP_Final/' + yol;
function $(id) { return document.getElementById(id); }
function screen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function setCSSRenk(slug) {
  const r = SERİ_RENKLER[slug] || { renk:'#7c6fff', acik:'rgba(124,111,255,.15)', border:'rgba(124,111,255,.4)' };
  document.documentElement.style.setProperty('--sc', r.renk);
  document.documentElement.style.setProperty('--sc-acik', r.acik);
  document.documentElement.style.setProperty('--sc-border', r.border);
}

// ── NAVİGASYON ─────────────────────────────────────────────────
function goHome() {
  $('scroll-container').classList.remove('active');
  $('sc-close-btn').classList.remove('visible');
  $('sc-grid-btn').classList.remove('visible');
  $('sc-shuffle-btn').classList.remove('visible');
  document.body.style.overflow = '';
  screen('screen-home');
  aktifSeri = aktifCilt = null;
  $('header-crumb').classList.remove('visible');
  $('hdr-back').style.display = 'none';
  document.documentElement.style.setProperty('--sc', '#7c6fff');
}
function goSeri() { if (aktifSeri) seriAc(aktifSeri); }
function goBack() {
  $('scroll-container').classList.remove('active');
  $('sc-close-btn').classList.remove('visible');
  $('sc-grid-btn').classList.remove('visible');
  $('sc-shuffle-btn').classList.remove('visible');
  document.body.style.overflow = '';
  if (aktifCilt !== null) { seriAc(aktifSeri); }
  else { goHome(); }
}

// ── EKRAN 1: SERİ GRİD ────────────────────────────────────────
function renderAnasayfa() {
  const g = $('seri-grid');
  g.innerHTML = '';
  Object.entries(VERİ).forEach(([slug, seri]) => {
    const toplam = seri.ciltler.reduce((a,c) => a + c.kart_sayisi, 0);
    const r = SERİ_RENKLER[slug] || { renk:'#7c6fff' };
    const div = document.createElement('div');
    div.className = 'seri-kart';
    div.style.setProperty('--sc', r.renk);
    div.style.setProperty('--sc-border', r.renk);
    div.innerHTML = `
      <div class="seri-top-line"></div>
      <span class="seri-emoji">${seri.emoji}</span>
      <div class="seri-isim">${seri.baslik}</div>
      <div class="seri-meta">${seri.ciltler.length} kitap</div>
      <div class="seri-pill">📄 ${toplam} kart</div>`;
    div.onclick = () => seriAc(slug);
    g.appendChild(div);
  });
}

// ── EKRAN 2: CİLT LİSTESİ ─────────────────────────────────────
function seriAc(slug) {
  aktifSeri = slug;
  aktifCilt = null;
  const seri = VERİ[slug];
  const r = SERİ_RENKLER[slug] || { renk:'#7c6fff', acik:'rgba(124,111,255,.15)' };
  setCSSRenk(slug);

  $('cilt-emoji').textContent = seri.emoji;
  $('cilt-seri-baslik').textContent = seri.baslik;
  const top = seri.ciltler.reduce((a,c) => a+c.kart_sayisi, 0);
  $('cilt-seri-sub').textContent = `${seri.ciltler.length} kitap · ${top} kart`;

  // Header crumb
  $('crumb-seri').textContent = seri.baslik;
  $('crumb-sep').style.display = 'none';
  $('crumb-cilt').textContent = '';
  $('header-crumb').classList.add('visible');
  $('hdr-back').style.display = 'flex';

  const g = $('cilt-grid');
  g.innerHTML = '';
  seri.ciltler.forEach((cilt, idx) => {
    const div = document.createElement('div');
    div.className = 'cilt-kart';
    div.style.setProperty('--sc', r.renk);
    div.style.setProperty('--sc-acik', r.acik);

    const prevHTML = cilt.kartlar.slice(0,4).map(k =>
      `<img src="${img(k)}" alt="" loading="lazy" decoding="async">`
    ).join('');

    div.innerHTML = `
      <div class="cilt-onizleme">${prevHTML}</div>
      <div class="cilt-kart-body">
        <div class="cilt-no-badge">${cilt.no}</div>
        <div class="cilt-ad">${cilt.ad}</div>
        <div class="cilt-kart-cnt">${cilt.kart_sayisi} kart</div>
      </div>`;
    div.onclick = () => ciltAc(slug, idx);
    g.appendChild(div);
  });

  screen('screen-cilt');
}

// ── EKRAN 3: OKUYUCU ──────────────────────────────────────────
function ciltAc(slug, ciltIdx) {
  aktifSeri = slug; aktifCilt = ciltIdx;
  const seri = VERİ[slug];
  const cilt = seri.ciltler[ciltIdx];
  setCSSRenk(slug);

  kartlar = [...cilt.kartlar];
  aktifKartlar = [...kartlar];
  aktifFormat = seri.format || '2:3';

  $('reader-title').textContent = cilt.ad;
  $('reader-sub').textContent = seri.baslik + ' · ' + cilt.kart_sayisi + ' kart';
  $('reader-cnt').textContent = cilt.kart_sayisi + ' kart';

  // Header crumb
  $('crumb-seri').textContent = seri.baslik;
  $('crumb-sep').style.display = 'inline';
  $('crumb-cilt').textContent = cilt.ad;
  $('header-crumb').classList.add('visible');
  $('hdr-back').style.display = 'flex';

  gorunum = 'scroll';
  $('btn-scroll').classList.add('on');
  $('btn-grid').classList.remove('on');

  renderScroll();
  screen('screen-reader');
  $('scroll-container').scrollTop = 0;
}

// ── TAM EKRAN SCROLL AÇ/KAPAT ────────────────────────────────
function acScrollView() {
  document.getElementById('header').style.display='none';
  $('scroll-container').classList.add('active');
  $('sc-close-btn').classList.add('visible');
  $('sc-grid-btn').classList.add('visible');
  $('sc-shuffle-btn').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function kapatScrollView(mode) {
  document.getElementById('header').style.display='';
  $('scroll-container').classList.remove('active');
  $('sc-close-btn').classList.remove('visible');
  $('sc-grid-btn').classList.remove('visible');
  $('sc-shuffle-btn').classList.remove('visible');
  document.body.style.overflow = '';
  if (mode === 'grid') {
    gorunum = 'grid';
    $('btn-scroll').classList.remove('on');
    $('btn-grid').classList.add('on');
    renderGrid();
  } else {
    goBack();
  }
}
function scShuffle() {
  aktifKartlar = [...aktifKartlar].sort(() => Math.random() - .5);
  renderScroll();
}

// ── SCROLL GÖRÜNÜMÜ ───────────────────────────────────────────
function renderScroll() {
  $('grid-container').classList.remove('visible');
  const sc = $('scroll-container');
  sc.innerHTML = '';
  acScrollView();

  aktifKartlar.forEach((yol, i) => {
    const slide = document.createElement('div');
    slide.className = 'scroll-slide';

    if (i === 0) {
      const hint = document.createElement('div');
      hint.className = 'slide-hint';
      hint.textContent = '↓ Kaydır';
      slide.appendChild(hint);
    }

    const counter = document.createElement('div');
    counter.className = 'slide-counter';
    counter.textContent = `${i+1} / ${aktifKartlar.length}`;

    const im = document.createElement('img');
    im.className = 'scroll-img';
    im.alt = '';
    im.loading = i < 3 ? 'eager' : 'lazy';
    im.decoding = 'async';
    im.src = img(yol);

    slide.appendChild(counter);
    slide.appendChild(im);
    sc.appendChild(slide);
  });

  // Progress güncelle (scroll ile)
  sc.addEventListener('scroll', updateProgress, {passive: true});
  updateProgress();
}

function updateProgress() {
  const sc = $('scroll-container');
  const pct = sc.scrollTop / (sc.scrollHeight - sc.clientHeight) * 100;
  $('progress-fill').style.width = Math.min(pct, 100) + '%';
}

// ── MİNİ GRID GÖRÜNÜMÜ ────────────────────────────────────────
function renderGrid() {
  $('scroll-container').classList.remove('active');
  $('sc-close-btn').classList.remove('visible');
  $('sc-grid-btn').classList.remove('visible');
  $('sc-shuffle-btn').classList.remove('visible');
  document.body.style.overflow = '';
  $('grid-container').classList.add('visible');
  const g = $('mini-grid');
  g.innerHTML = '';
  aktifKartlar.forEach((yol, i) => {
    const div = document.createElement('div');
    div.className = 'mini-kart' + (aktifFormat === '9:16' ? ' mini-kart--916' : '');
    const im = document.createElement('img');
    im.alt = '';
    im.loading = i < 30 ? 'eager' : 'lazy';
    im.decoding = 'async';
    im.src = img(yol);
    const no = document.createElement('div');
    no.className = 'mini-no';
    no.textContent = i + 1;
    div.appendChild(im); div.appendChild(no);
    div.onclick = () => lbAc(i);
    g.appendChild(div);
  });
}

// ── VIEW TOGGLE ───────────────────────────────────────────────
function setView(v) {
  gorunum = v;
  $('btn-scroll').classList.toggle('on', v === 'scroll');
  $('btn-grid').classList.toggle('on', v === 'grid');
  if (v === 'scroll') {
    renderScroll();
  } else {
    renderGrid();
  }
}

// ── KARIŞTIR ─────────────────────────────────────────────────
function shuffle() {
  aktifKartlar = [...aktifKartlar].sort(() => Math.random() - .5);
  if (gorunum === 'scroll') renderScroll();
  else renderGrid();
}
// scShuffle: scroll overlay içindeyken karıştır
// (yukarıda tanımlandı, tekrar tanımlamamak için burada referans)

// ── LIGHTBOX ─────────────────────────────────────────────────
function lbAc(idx) {
  lbIdx = idx;
  lbGoster();
  $('lightbox').classList.add('open');
  document.addEventListener('keydown', lbKey);
}
function lbKapat() {
  $('lightbox').classList.remove('open');
  document.removeEventListener('keydown', lbKey);
}
function lbGoster() {
  $('lb-img').src = img(aktifKartlar[lbIdx]);
  $('lb-counter').textContent = `${lbIdx+1} / ${aktifKartlar.length}`;
  $('lb-prev').disabled = lbIdx === 0;
  $('lb-next').disabled = lbIdx === aktifKartlar.length - 1;
}
function lbNav(d) { lbIdx = Math.max(0, Math.min(aktifKartlar.length-1, lbIdx+d)); lbGoster(); }
function lbKey(e) {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') lbNav(1);
  else if (e.key==='ArrowLeft'||e.key==='ArrowUp') lbNav(-1);
  else if (e.key==='Escape') lbKapat();
}
let touchX = 0;
$('lightbox').addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
$('lightbox').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
}, {passive:true});

// Scroll container'da swipe (mobil dikey kaydırma zaten var, yatay lightbox için)
let scTouchX = 0;
$('scroll-container').addEventListener('touchstart', e => { scTouchX = e.touches[0].clientX; }, {passive:true});

// ── BAŞLAT ────────────────────────────────────────────────────
renderAnasayfa();
</script>
