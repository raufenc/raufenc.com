<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NöroTerbiye Sözlüğü — 131 Kavram</title>
  <meta name="description" content="NöroTerbiye sözlüğü: Dopamin, serotonin, kortizol, nefs, akıl ve 131 kavramı aranabilir şekilde keşfet.">
  <meta property="og:title" content="Sözlük — NöroTerbiye">
  <meta property="og:description" content="131 kavram, aranabilir ve filtrelenebilir. Beynin dilini öğren.">
  <meta property="og:image" content="https://raufenc.com/images/noroterbiye.webp">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
  <script src="/lib/design-system/theme.js"></script>
</head>
<body>
  <script src="/nav.js"></script>

  <section class="nt-section" style="padding-top:80px">
    <div class="nt-wrap">
      <h1 class="nt-title nt-fade-in" style="font-size:2rem;margin-bottom:8px">📚 NöroTerbiye Sözlüğü</h1>
      <p class="nt-subtitle nt-fade-in" style="animation-delay:0.1s;margin-bottom:28px">
        Kitaptaki 131 kavramı ara, filtrele, keşfet.
      </p>

      <!-- Arama -->
      <div class="nt-search nt-fade-in" style="animation-delay:0.15s">
        <span class="nt-search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="search" placeholder="Kavram ara... (örn. dopamin, nefs, bağımlılık)" autocomplete="off">
      </div>

      <!-- Filtreler -->
      <div class="nt-filters nt-fade-in" style="animation-delay:0.2s" id="filters"></div>

      <!-- Sonuç sayısı -->
      <p id="count" class="nt-label" style="margin-bottom:16px"></p>

      <!-- Terimler -->
      <div id="terms" class="nt-grid nt-grid-2"></div>

      <!-- Terim Detay Modal -->
      <div class="nt-modal-overlay" id="modal">
        <div class="nt-modal" id="modal-content"></div>
      </div>
    </div>
  </section>

  <script src="/noroterbiye/data/sozluk.js"></script>
  <script src="/noroterbiye/js/common.js"></script>
  <script>
    let activeFilter = 'Tümü';
    const categories = ['Tümü', ...new Set(SOZLUK_DATA.map(t => t.kategori))];

    // Filtre butonları
    const filtersEl = document.getElementById('filters');
    categories.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'nt-filter-btn' + (c === 'Tümü' ? ' active' : '');
      btn.textContent = c;
      btn.onclick = () => {
        activeFilter = c;
        filtersEl.querySelectorAll('.nt-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      filtersEl.appendChild(btn);
    });

    function render() {
      const q = document.getElementById('search').value;
      let filtered = SOZLUK_DATA;
      if (activeFilter !== 'Tümü') filtered = filtered.filter(t => t.kategori === activeFilter);
      filtered = NT.filterBySearch(filtered, q, ['terim', 'tanim', 'kitapBaglami']);

      document.getElementById('count').textContent = `${filtered.length} kavram gösteriliyor`;

      const container = document.getElementById('terms');
      container.innerHTML = filtered.map(t => {
        const renk = NT.kategoriRenk(t.kategori);
        return `
          <div class="nt-card nt-card-clickable" onclick="showTerm('${t.id}')" id="term-${t.id}">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
              <span class="nt-tag nt-tag-${renk}">${t.kategori}</span>
            </div>
            <h3 style="font-size:1.05rem;font-weight:700;margin-bottom:6px">${t.terim}</h3>
            <p style="font-size:0.85rem;color:var(--text-secondary);line-height:1.5">${t.tanim}</p>
          </div>
        `;
      }).join('');
    }

    function showTerm(id) {
      const t = SOZLUK_DATA.find(x => x.id === id);
      if (!t) return;
      const renk = NT.kategoriRenk(t.kategori);

      // İlgili terimler bul (aynı kategori)
      const related = SOZLUK_DATA.filter(x => x.kategori === t.kategori && x.id !== t.id).slice(0, 5);

      document.getElementById('modal-content').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">
          <span class="nt-tag nt-tag-${renk}">${t.kategori}</span>
          <button class="nt-btn nt-btn-ghost nt-btn-sm" onclick="closeModal()">✕</button>
        </div>
        <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:12px">${t.terim}</h2>
        <p style="font-size:1rem;line-height:1.7;margin-bottom:16px">${t.tanim}</p>
        ${t.kitapBaglami ? `
          <div style="padding:16px;background:var(--surface2);border-radius:var(--radius-md);margin-bottom:16px">
            <p class="nt-label" style="margin-bottom:6px">Kitap Bağlamı</p>
            <p style="font-size:0.88rem;color:var(--text-secondary);line-height:1.6">${t.kitapBaglami}</p>
          </div>
        ` : ''}
        ${t.kitapKaynagi ? `<p style="font-size:0.78rem;color:var(--muted);margin-bottom:20px">📖 ${t.kitapKaynagi}</p>` : ''}
        ${related.length > 0 ? `
          <p class="nt-label" style="margin-bottom:8px">İlgili Kavramlar</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${related.map(r => `<button class="nt-tag" onclick="showTerm('${r.id}')" style="cursor:pointer">${r.terim}</button>`).join('')}
          </div>
        ` : ''}
        <div style="margin-top:20px;text-align:center">
          <button class="nt-btn nt-btn-ghost nt-btn-sm" onclick="NT.share('${t.terim} — NöroTerbiye Sözlüğü', '${t.tanim}')">Paylaş</button>
        </div>
      `;
      document.getElementById('modal').classList.add('active');
      window.location.hash = t.slug || t.id;
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      history.replaceState(null, '', window.location.pathname);
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('search').addEventListener('input', render);

    // Hash'ten terim aç
    if (window.location.hash) {
      const slug = window.location.hash.slice(1);
      const t = SOZLUK_DATA.find(x => x.slug === slug || x.id === slug);
      if (t) setTimeout(() => showTerm(t.id), 300);
    }

    render();
    NT.renderNav();
    NT.renderFooter();
  </script>
</body>
</html>
