<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beslenme-Zihin Checklist — NöroTerbiye</title>
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
  <script src="/lib/design-system/theme.js"></script>
  <style>
    .check-item { display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); margin-bottom:8px; cursor:pointer; transition:all 0.15s; user-select:none; }
    .check-item:hover { border-color:var(--nt-primary); }
    .check-item.done { opacity:0.6; border-color:var(--nt-green); }
    .check-item.done .check-box { background:var(--nt-green); border-color:var(--nt-green); }
    .check-item.done .check-box::after { content:'✓'; color:#fff; font-size:0.75rem; }
    .check-box { width:22px; height:22px; border-radius:var(--radius-sm); border:2px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .check-label { flex:1; }
    .check-label .title { font-size:0.9rem; font-weight:600; }
    .check-label .desc { font-size:0.75rem; color:var(--text-secondary); margin-top:2px; }
    .check-icon { font-size:1.3rem; flex-shrink:0; }
    .progress-ring { width:140px; height:140px; margin:0 auto 16px; }
    .progress-ring svg { transform:rotate(-90deg); }
    .progress-ring circle { fill:none; stroke-width:8; }
    .progress-ring .bg { stroke:var(--surface2); }
    .progress-ring .fg { stroke:var(--nt-green); stroke-linecap:round; transition:stroke-dashoffset 0.6s; }
    .progress-center { font-size:1.8rem; font-weight:800; }
    .streak-badge { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:var(--nt-amber-soft); border-radius:var(--radius-full); font-size:0.82rem; font-weight:600; color:var(--nt-amber); }
    .cat-title { font-size:0.9rem; font-weight:700; margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
  </style>
</head>
<body>
  <script src="/nav.js"></script>
  <section class="nt-section" style="padding-top:80px">
    <div class="nt-wrap nt-narrow">
      <p class="nt-label nt-fade-in" style="margin-bottom:8px">NöroTerbiye Araç</p>
      <h1 class="nt-title nt-fade-in" style="font-size:1.8rem;margin-bottom:8px;animation-delay:0.05s">🥗 Beslenme-Zihin Checklist</h1>
      <p class="nt-subtitle nt-fade-in" style="animation-delay:0.1s;margin-bottom:12px">
        Beyin sağlığını etkileyen günlük alışkanlıkları takip et. Her gün tamamla, seriyi koru.
      </p>
      <p class="nt-fade-in" style="animation-delay:0.12s;font-size:0.78rem;color:var(--muted);margin-bottom:32px" id="today-label"></p>

      <!-- Progress -->
      <div class="nt-card nt-fade-in" style="padding:32px;text-align:center;margin-bottom:24px;animation-delay:0.15s">
        <div class="progress-ring" id="progress-ring">
          <svg width="140" height="140">
            <circle class="bg" cx="70" cy="70" r="62"></circle>
            <circle class="fg" cx="70" cy="70" r="62" stroke-dasharray="389.56" stroke-dashoffset="389.56" id="progress-circle"></circle>
          </svg>
          <div class="progress-center" id="progress-pct" style="margin-top:-95px;position:relative">0%</div>
        </div>
        <div style="margin-top:16px" id="streak-area"></div>
      </div>

      <!-- Checklist -->
      <div id="checklist" class="nt-fade-in" style="animation-delay:0.2s"></div>

      <!-- Save & History -->
      <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">
        <button class="nt-btn nt-btn-primary nt-btn-sm" onclick="saveDay()">💾 Günü Kaydet</button>
        <button class="nt-btn nt-btn-secondary nt-btn-sm" onclick="NT.downloadPDF('checklist','Beslenme-Checklist.pdf')">📄 PDF İndir</button>
        <button class="nt-btn nt-btn-ghost nt-btn-sm" onclick="resetDay()">Sıfırla</button>
      </div>

      <h3 class="nt-section-title" style="margin-top:40px">📅 Son 7 Gün</h3>
      <div id="history-list"></div>
    </div>
  </section>

  <script src="/noroterbiye/js/common.js"></script>
  <script>
    const items = [
      { cat:'Hidrasyon', id:'su', icon:'💧', title:'En az 8 bardak su', desc:'Dehidrasyon konsantrasyonu ve iradeyi düşürür' },
      { cat:'Hidrasyon', id:'kafein', icon:'☕', title:'Kafein limiti (2 fincan)', desc:'Aşırı kafein anksiyete ve uyku bozukluğu yapar' },
      { cat:'Beslenme', id:'protein', icon:'🥩', title:'Yeterli protein', desc:'Serotonin üretimi için triptofan gerekli' },
      { cat:'Beslenme', id:'sebze', icon:'🥬', title:'Sebze-meyve yedim', desc:'Bağırsak-beyin aksı için lif şart' },
      { cat:'Beslenme', id:'seker', icon:'🚫', title:'İşlenmiş şekerden kaçındım', desc:'Şeker dopamin spike\'ı yapar, çöküş takip eder' },
      { cat:'Beslenme', id:'omega', icon:'🐟', title:'Omega-3 / sağlıklı yağ', desc:'Beyin hücrelerinin yapı taşı' },
      { cat:'Hareket', id:'yuruyus', icon:'🚶', title:'En az 20 dk yürüyüş', desc:'BDNF üretimini artırır, stres azaltır' },
      { cat:'Hareket', id:'egzersiz', icon:'💪', title:'Fiziksel aktivite', desc:'Endorfin ve serotonin doğal kaynağı' },
      { cat:'Uyku', id:'uyku7', icon:'😴', title:'7+ saat uyku', desc:'Prefrontal korteks onarımı için zorunlu' },
      { cat:'Uyku', id:'ekransiz', icon:'📵', title:'Yatmadan 1 saat ekransız', desc:'Melatonin üretimi için mavi ışıktan uzak dur' },
      { cat:'Zihin', id:'tefekkur', icon:'💭', title:'5 dk tefekkür', desc:'Amigdala aktivitesini düşürür' },
      { cat:'Zihin', id:'okuma', icon:'📖', title:'En az 10 dk okuma', desc:'Prefrontal korteksi güçlendirir' },
      { cat:'Sosyal', id:'sohbet', icon:'👥', title:'Gerçek yüz yüze sohbet', desc:'Oksitosin salgısı, yalnızlık azalması' },
      { cat:'Sosyal', id:'iyilik', icon:'🤲', title:'Bir iyilik yaptım', desc:'Başkası için yapılan şeyler serotonin üretir' },
    ];

    const today = new Date().toLocaleDateString('tr-TR');
    document.getElementById('today-label').textContent = today;

    let todayData = NT.load('beslenme_' + today, {});
    let history = NT.load('beslenme_history', []);

    function renderChecklist() {
      const container = document.getElementById('checklist');
      container.innerHTML = '';
      let currentCat = '';
      items.forEach(item => {
        if (item.cat !== currentCat) {
          currentCat = item.cat;
          container.innerHTML += `<div class="cat-title">${currentCat}</div>`;
        }
        const done = todayData[item.id] || false;
        container.innerHTML += `
          <div class="check-item ${done?'done':''}" onclick="toggleItem('${item.id}')">
            <div class="check-icon">${item.icon}</div>
            <div class="check-box"></div>
            <div class="check-label">
              <div class="title">${item.title}</div>
              <div class="desc">${item.desc}</div>
            </div>
          </div>`;
      });
      updateProgress();
    }

    function toggleItem(id) {
      todayData[id] = !todayData[id];
      NT.save('beslenme_' + today, todayData);
      renderChecklist();
    }

    function updateProgress() {
      const total = items.length;
      const done = items.filter(i => todayData[i.id]).length;
      const pct = Math.round((done / total) * 100);

      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-pct').style.color = pct >= 80 ? 'var(--nt-green)' : pct >= 50 ? 'var(--nt-amber)' : 'var(--text)';

      const circle = document.getElementById('progress-circle');
      const circumference = 389.56;
      circle.style.strokeDashoffset = circumference - (circumference * pct / 100);

      // Streak
      let streak = 0;
      const sortedHistory = [...history].sort((a,b) => b.ts - a.ts);
      for (const h of sortedHistory) {
        if (h.pct >= 70) streak++;
        else break;
      }
      const streakArea = document.getElementById('streak-area');
      if (streak > 0) {
        streakArea.innerHTML = `<div class="streak-badge">🔥 ${streak} gün seri</div>`;
      } else {
        streakArea.innerHTML = '<span style="font-size:0.78rem;color:var(--muted)">Seriyi başlat: her gün %70+ tamamla</span>';
      }
    }

    function saveDay() {
      const total = items.length;
      const done = items.filter(i => todayData[i.id]).length;
      const pct = Math.round((done / total) * 100);

      const existing = history.findIndex(h => h.tarih === today);
      const entry = { tarih: today, ts: Date.now(), done, total, pct };
      if (existing >= 0) history[existing] = entry;
      else history.push(entry);

      NT.save('beslenme_history', history);
      renderHistory();
      updateProgress();
      NT.toast('Gün kaydedildi!');
    }

    function resetDay() {
      todayData = {};
      NT.save('beslenme_' + today, todayData);
      renderChecklist();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const last7 = [...history].sort((a,b) => b.ts - a.ts).slice(0, 7);
      if (last7.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Henüz kayıt yok.</p>';
        return;
      }
      list.innerHTML = last7.map(h => {
        const color = h.pct >= 80 ? 'var(--nt-green)' : h.pct >= 50 ? 'var(--nt-amber)' : 'var(--nt-red)';
        return `<div class="nt-card" style="margin-bottom:8px;padding:14px 18px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-weight:600;font-size:0.85rem">${h.tarih}</span>
            <span style="font-weight:700;color:${color}">${h.done}/${h.total} (%${h.pct})</span>
          </div>
          <div class="nt-meter" style="margin-top:8px"><div class="nt-meter-fill" style="width:${h.pct}%;background:${color}"></div></div>
        </div>`;
      }).join('');
    }

    renderChecklist();
    renderHistory();
    NT.renderNav();
    NT.renderFooter();
  </script>
</body>
</html>
