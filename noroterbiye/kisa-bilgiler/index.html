<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kısa Kısa Bilgiler — NöroTerbiye</title>
  <meta name="description" content="NöroTerbiye'den paylaşımlık kısa bilgi kartları. Dopamin, serotonin, modern tuzaklar ve daha fazlası.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
  <script src="/lib/design-system/theme.js"></script>
</head>
<body>
  <script src="/nav.js"></script>

  <section class="nt-section" style="padding-top:80px">
    <div class="nt-wrap">
      <h1 class="nt-title nt-fade-in" style="font-size:2rem;margin-bottom:8px">🃏 Kısa Kısa Bilgiler</h1>
      <p class="nt-subtitle nt-fade-in" style="animation-delay:0.1s;margin-bottom:28px">
        Her biri paylaşılabilir, her biri bir farkındalık kıvılcımı.
      </p>

      <div class="nt-search nt-fade-in" style="animation-delay:0.15s">
        <span class="nt-search-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="search" placeholder="Kart ara..." autocomplete="off">
      </div>

      <div class="nt-filters nt-fade-in" style="animation-delay:0.2s" id="filters"></div>
      <p id="count" class="nt-label" style="margin-bottom:16px"></p>
      <div id="cards" class="nt-grid nt-grid-3"></div>
    </div>
  </section>

  <!-- ROL MODELLER -->
  <section class="nt-section" id="rol-modeller">
    <div class="nt-wrap">
      <h2 class="nt-title nt-fade-in" style="font-size:1.5rem;margin-bottom:8px">🌟 Rol Modeller</h2>
      <p class="nt-subtitle nt-fade-in" style="margin-bottom:16px">Peygamberlerden bilim insanlarına — 100 rol model. Tanı, öğren, ilham al.</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px" class="nt-fade-in">
        <a href="/noroterbiye/oyunlar/rol-model-tahmini/" class="nt-btn nt-btn-primary nt-btn-sm">🏅 Tahmin Oyunu</a>
        <a href="/noroterbiye/oyunlar/besli-secimler/" class="nt-btn nt-btn-secondary nt-btn-sm">🤲 5'li Seçimler</a>
      </div>
      <input type="text" class="nt-input nt-fade-in" id="rm-search" placeholder="İsim, tema veya dönem ara..." oninput="renderRM()" style="width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-md);background:var(--surface);color:var(--text);font-size:1rem;margin-bottom:12px">
      <div id="rm-filters" class="nt-filters nt-fade-in" style="margin-bottom:12px"></div>
      <p id="rm-count" class="nt-label" style="margin-bottom:16px"></p>
      <div class="nt-grid nt-grid-2" id="rm-cards"></div>
    </div>
  </section>

  <script src="/noroterbiye/data/kisa-bilgiler.js"></script>
  <script src="/noroterbiye/data/rol-modeller.js"></script>
  <script src="/noroterbiye/js/common.js"></script>
  <script>
    let activeFilter = 'Tümü';
    const themes = ['Tümü', ...new Set(KISA_BILGILER_DATA.map(k => k.tema))];
    const temaRenkler = { 'Biyoloji': 'green', 'Modern Tuzak': 'red', 'Nefs Türleri': 'purple', 'Terbiye': 'cyan', 'Çevre': 'amber' };

    const filtersEl = document.getElementById('filters');
    themes.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'nt-filter-btn' + (t === 'Tümü' ? ' active' : '');
      btn.textContent = t;
      btn.onclick = () => {
        activeFilter = t;
        filtersEl.querySelectorAll('.nt-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      };
      filtersEl.appendChild(btn);
    });

    function render() {
      const q = document.getElementById('search').value;
      let data = KISA_BILGILER_DATA;
      if (activeFilter !== 'Tümü') data = data.filter(k => k.tema === activeFilter);
      data = NT.filterBySearch(data, q, ['baslik', 'kisaBilgi', 'aciklama']);

      document.getElementById('count').textContent = `${data.length} kart gösteriliyor`;

      document.getElementById('cards').innerHTML = data.map(k => {
        const renk = temaRenkler[k.tema] || 'primary';
        return `
          <div class="nt-info-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <span class="nt-tag nt-tag-${renk}">${k.tema}</span>
              <button class="nt-btn nt-btn-ghost" style="padding:4px 8px;font-size:0.75rem" onclick="NT.share('${k.baslik.replace(/'/g,"\\'")} — NöroTerbiye', '${k.kisaBilgi.replace(/'/g,"\\'")}')">
                Paylaş
              </button>
            </div>
            <div class="nt-info-card-title">${k.baslik}</div>
            <div class="nt-info-card-text">${k.kisaBilgi}</div>
            ${k.aciklama ? `<p style="font-size:0.8rem;color:var(--muted2);line-height:1.5;font-style:italic">${k.aciklama}</p>` : ''}
            ${k.ilgiliKavram ? `<div style="margin-top:10px"><a href="/noroterbiye/sozluk/#${k.ilgiliKavram.toLowerCase().replace(/\s+/g,'-')}" class="nt-tag" style="text-decoration:none">📚 ${k.ilgiliKavram}</a></div>` : ''}
          </div>
        `;
      }).join('');
    }

    document.getElementById('search').addEventListener('input', render);
    render();

    // ── Rol Modeller ──
    let rmFilter = 'Hepsi';
    const KAT_EMOJI = { 'Peygamber':'🕊️','Sahabi / Ehl-i Beyt':'⭐','Âlim / İmam':'📚','Evliya / Mürşid':'💚','Sultan / Komutan':'⚔️','Bilim / Mucit':'🔬' };
    const KAT_RENK = { 'Peygamber':'cyan','Sahabi / Ehl-i Beyt':'green','Âlim / İmam':'purple','Evliya / Mürşid':'amber','Sultan / Komutan':'red','Bilim / Mucit':'primary' };

    (function() {
      const cats = ['Hepsi', ...new Set(ROL_MODELLER_DATA.map(r => r.kategori))];
      const counts = {};
      ROL_MODELLER_DATA.forEach(r => counts[r.kategori] = (counts[r.kategori] || 0) + 1);
      counts['Hepsi'] = ROL_MODELLER_DATA.length;
      const bar = document.getElementById('rm-filters');
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'nt-filter-btn' + (c === 'Hepsi' ? ' active' : '');
        btn.innerHTML = (KAT_EMOJI[c] || '🎯') + ' ' + c + ' <span style="font-size:0.7rem;opacity:0.7">(' + counts[c] + ')</span>';
        btn.onclick = () => {
          bar.querySelectorAll('.nt-filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          rmFilter = c;
          renderRM();
        };
        bar.appendChild(btn);
      });
    })();

    function renderRM() {
      const q = document.getElementById('rm-search').value.toLowerCase().trim();
      let data = rmFilter === 'Hepsi' ? ROL_MODELLER_DATA : ROL_MODELLER_DATA.filter(r => r.kategori === rmFilter);
      if (q) {
        data = data.filter(r =>
          r.isim.toLowerCase().includes(q) || r.temalar.toLowerCase().includes(q) ||
          r.donem.toLowerCase().includes(q) || r.cografya.toLowerCase().includes(q) ||
          r.altKategori.toLowerCase().includes(q) || r.nedenRolModel.toLowerCase().includes(q)
        );
      }
      document.getElementById('rm-count').textContent = data.length + ' rol model';
      document.getElementById('rm-cards').innerHTML = data.map(r => `
        <div class="nt-card" style="padding:16px">
          <div style="display:flex;gap:12px;align-items:start;margin-bottom:10px">
            <div style="font-size:1.8rem;flex-shrink:0">${KAT_EMOJI[r.kategori] || '🌟'}</div>
            <div style="flex:1">
              <div style="font-size:1rem;font-weight:700">${r.isim}</div>
              <div style="font-size:0.72rem;color:var(--muted);margin-top:2px">${r.altKategori} · ${r.donem} · ${r.cografya}</div>
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">
            <span class="nt-tag nt-tag-${KAT_RENK[r.kategori] || 'primary'}">${r.kategori}</span>
            ${r.temalar.split(',').slice(0, 3).map(t => '<span class="nt-tag">' + t.trim() + '</span>').join('')}
          </div>
          <div style="font-size:0.82rem;color:var(--text-secondary);line-height:1.6">${r.nedenRolModel}</div>
          <div style="font-size:0.75rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">📖 ${r.oneCikan}</div>
        </div>
      `).join('');
    }
    renderRM();

    NT.renderNav();
    NT.renderFooter();
  </script>
</body>
</html>
