<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nefs Merdiveni — NöroTerbiye</title>
<link rel="stylesheet" href="/lib/design-system/tokens.css">
<link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
<script src="/lib/design-system/theme.js"></script>
<style>
/* ── Background gradient: dark red at bottom → dark indigo at top ── */
.nm-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background: linear-gradient(
    to top,
    rgba(127,29,29,0.18) 0%,
    rgba(120,53,15,0.10) 15%,
    rgba(92,45,10,0.06) 28%,
    rgba(6,78,59,0.06) 42%,
    rgba(8,51,68,0.08) 58%,
    rgba(49,46,129,0.12) 75%,
    rgba(67,56,124,0.14) 90%,
    rgba(55,48,107,0.16) 100%
  );
}

/* ── Page ── */
.nm-page {
  position: relative;
  z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 20px 40px;
}

/* ── Header ── */
.nm-header {
  text-align: center;
  margin-bottom: 40px;
}
.nm-header h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  background: linear-gradient(135deg, #ef4444, #f97316, #f59e0b, #10b981, #06b6d4, #6366f1, #e2b53f);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.nm-header p {
  color: var(--text-secondary);
  font-size: 0.92rem;
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Direction hint ── */
.nm-hint {
  text-align: center;
  margin-bottom: 12px;
  color: var(--text-secondary);
  font-size: 0.78rem;
  opacity: 0.55;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.nm-hint svg {
  animation: nm-float 2.5s ease-in-out infinite;
}
@keyframes nm-float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* ── Ladder wrapper ── */
.nm-ladder {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 20px 0 20px 56px;
}

/* ── Luminous vertical line ── */
.nm-ladder::before {
  content: '';
  position: absolute;
  left: 26px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(
    to top,
    #ef444466 0%,
    #f9731688 15%,
    #f59e0b99 30%,
    #10b981aa 45%,
    #06b6d4bb 60%,
    #6366f1cc 75%,
    #e2b53fdd 100%
  );
  border-radius: 1px;
}
/* Glow layer on the line */
.nm-ladder::after {
  content: '';
  position: absolute;
  left: 22px;
  top: 0;
  bottom: 0;
  width: 10px;
  background: linear-gradient(
    to top,
    rgba(239,68,68,0.05) 0%,
    rgba(249,115,22,0.08) 15%,
    rgba(245,158,11,0.10) 30%,
    rgba(16,185,129,0.12) 45%,
    rgba(6,182,212,0.14) 60%,
    rgba(99,102,241,0.16) 75%,
    rgba(226,181,63,0.20) 100%
  );
  filter: blur(6px);
  border-radius: 4px;
  pointer-events: none;
}

/* ── Upward-flowing particles on the line (CSS only) ── */
.nm-particles {
  position: absolute;
  left: 20px;
  top: 0;
  bottom: 0;
  width: 14px;
  overflow: hidden;
  pointer-events: none;
  z-index: 1;
}
.nm-particle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  opacity: 0;
  animation: nm-rise linear infinite;
}
@keyframes nm-rise {
  0% {
    transform: translateY(0) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 0.6;
  }
  90% {
    opacity: 0.3;
  }
  100% {
    transform: translateY(-800px) translateX(var(--drift, 0px));
    opacity: 0;
  }
}

/* ── Stage row ── */
.nm-stage {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 0 18px 0;
  cursor: pointer;
  transition: background 0.3s;
  border-radius: var(--radius-lg, 12px);
}
.nm-stage:hover {
  background: rgba(255,255,255,0.02);
}

/* ── Node circle ── */
.nm-node {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1rem;
  color: #fff;
  position: relative;
  z-index: 2;
  transition: transform 0.3s, box-shadow 0.3s;
  margin-left: -22px; /* center on the vertical line */
}
.nm-node::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  border: 2px solid var(--stage-color);
  opacity: 0.2;
  transition: opacity 0.3s, inset 0.3s;
}
.nm-stage:hover .nm-node {
  transform: scale(1.1);
}
.nm-stage:hover .nm-node::after {
  opacity: 0.4;
  inset: -8px;
}
.nm-stage.active .nm-node {
  transform: scale(1.15);
  animation: nm-pulse 2.5s ease-in-out infinite;
}
.nm-stage.active .nm-node::after {
  opacity: 0.5;
  inset: -8px;
}
@keyframes nm-pulse {
  0%, 100% { box-shadow: 0 0 16px var(--stage-glow), 0 0 32px var(--stage-glow); }
  50% { box-shadow: 0 0 24px var(--stage-glow), 0 0 48px var(--stage-glow); }
}

/* ── Stage text ── */
.nm-stage-text {
  flex: 1;
  min-width: 0;
}
.nm-stage-name {
  font-size: 1.02rem;
  font-weight: 700;
  transition: color 0.3s;
  color: var(--text);
}
.nm-stage:hover .nm-stage-name,
.nm-stage.active .nm-stage-name {
  color: var(--stage-color);
}
.nm-stage-subtitle {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 2px;
}
.nm-stage-oneliner {
  font-size: 0.82rem;
  color: var(--text-secondary);
  margin-top: 4px;
  opacity: 0.7;
  line-height: 1.5;
}

/* ── Expand arrow ── */
.nm-expand-icon {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  color: var(--text-secondary);
  opacity: 0.4;
  transition: transform 0.3s, opacity 0.3s;
}
.nm-stage.active .nm-expand-icon {
  transform: rotate(180deg);
  opacity: 0.7;
  color: var(--stage-color);
}

/* ── Detail panel ── */
.nm-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s, margin 0.4s;
  opacity: 0;
  margin: 0 0 0 0;
  position: relative;
  z-index: 3;
}
.nm-detail.open {
  max-height: 400px;
  opacity: 1;
  margin: 0 0 8px 0;
}

.nm-card {
  background: var(--nt-glass, rgba(255,255,255,0.04));
  border: 1px solid var(--nt-glass-border, rgba(255,255,255,0.08));
  border-radius: var(--radius-lg, 12px);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 20px 24px;
  margin-left: 34px;
  position: relative;
  overflow: hidden;
}
.nm-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--stage-color);
  border-radius: 12px 12px 0 0;
}

.nm-card-desc {
  font-size: 0.92rem;
  line-height: 1.7;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── Quotation box for ayet/hadis ── */
.nm-quote {
  background: rgba(255,255,255,0.03);
  border-left: 3px solid var(--stage-color);
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin: 0;
}
.nm-quote-text {
  font-size: 0.88rem;
  line-height: 1.6;
  font-style: italic;
  color: var(--text);
  opacity: 0.9;
}
.nm-quote-source {
  font-size: 0.76rem;
  color: var(--text-secondary);
  margin-top: 6px;
  font-style: normal;
  opacity: 0.7;
}

/* ── Connector dots between stages ── */
.nm-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  height: 24px;
  justify-content: center;
  position: relative;
  z-index: 1;
  margin-left: 4px;
}
.nm-conn-dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  opacity: 0.3;
  animation: nm-conn-pulse 2.5s ease-in-out infinite;
}
.nm-conn-dot:nth-child(2) { animation-delay: 0.3s; }
.nm-conn-dot:nth-child(3) { animation-delay: 0.6s; }
@keyframes nm-conn-pulse {
  0%, 100% { opacity: 0.15; transform: scale(0.7); }
  50% { opacity: 0.5; transform: scale(1.2); }
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .nm-page { padding: 50px 14px 32px; }
  .nm-header { margin-bottom: 28px; }
  .nm-ladder { padding: 16px 0 16px 48px; }
  .nm-ladder::before { left: 22px; }
  .nm-ladder::after { left: 18px; }
  .nm-particles { left: 16px; }
  .nm-node {
    width: 38px;
    height: 38px;
    font-size: 0.9rem;
    margin-left: -19px;
  }
  .nm-card { margin-left: 24px; padding: 16px 18px; }
  .nm-stage { padding: 14px 0; gap: 12px; }
  .nm-stage-name { font-size: 0.95rem; }
  .nm-connector { height: 18px; margin-left: 3px; }
}
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="nm-bg"></div>

<div class="nm-page">
  <header class="nm-header">
    <h1>Nefs Merdiveni</h1>
    <p>Nefsin yedi mertebesi: Emmâre'den Kâmile'ye uzanan mânevî yükseliş. Her basamak, nefsi terbiye etmenin bir aşamasıdır.</p>
  </header>

  <div class="nm-hint">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3 8M8 3l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Yolculuk aşağıdan yukarıya
  </div>

  <div class="nm-ladder" id="nmLadder">
    <!-- Upward-flowing CSS particles -->
    <div class="nm-particles" id="nmParticles"></div>
  </div>
</div>

<script>
const stages = [
  {
    id: 'kamile', num: 7,
    name: 'Nefs-i Kâmile / Sâfiye',
    subtitle: 'Olgunlaşmış nefs',
    color: '#e2b53f',
    oneliner: 'Tam denge, tam teslimiyet. Hikmet ve rehberlik.',
    desc: 'Nefsin en yüksek mertebesidir. Kul, nefsini tamamen terbiye etmiş, ilâhî iradeye tam teslim olmuştur. Hikmet sahibidir; hâli, etrafına rehberlik eder.',
    quote: 'Nefsini bilen Rabbini bilir.',
    source: 'Hadis-i Şerif'
  },
  {
    id: 'marziyye', num: 6,
    name: 'Nefs-i Marziyye',
    subtitle: 'Razı olunan nefs',
    color: '#6366f1',
    oneliner: 'Allah\'ın kendisinden razı olduğu kul. İhsan hâli.',
    desc: 'Allah Teâlâ\'nın kendisinden razı olduğu mertebedir. Kul, ihsan hâline ulaşmıştır; sanki Allah\'ı görüyormuşçasına ibadet eder. Fedakârlık ve başkalarına fayda bu mertebenin alâmetlerindendir.',
    quote: '...O da senden razı olarak.',
    source: 'Fecr Sûresi, 28'
  },
  {
    id: 'raziye', num: 5,
    name: 'Nefs-i Râziye',
    subtitle: 'Razı olan nefs',
    color: '#06b6d4',
    oneliner: 'Her hâlde Allah\'tan razı. Kadere rıza, şikâyet yok.',
    desc: 'Kul, başına gelen her şeyde Allah\'ın hikmetini görür ve rıza gösterir. Şikâyet kalmamıştır; belâda da nimette de tevekkül ve rıza hâli hâkimdir.',
    quote: 'Rabbinden razı olarak...',
    source: 'Fecr Sûresi, 28'
  },
  {
    id: 'mutmainne', num: 4,
    name: 'Nefs-i Mutmainne',
    subtitle: 'Huzura ermiş nefs',
    color: '#10b981',
    oneliner: 'Allah\'ın rızasıyla tatmin olur. Sabır, şükür, iç huzur.',
    desc: 'Nefs, dünya arzularından kurtulup Allah\'ın rızasıyla huzur bulmuştur. Sabır, şükür ve iç sükûnet bu mertebenin alâmetleridir. Kul, îmanında istikrar kazanmıştır.',
    quote: 'Ey huzura ermiş nefs!',
    source: 'Fecr Sûresi, 27'
  },
  {
    id: 'mulheme', num: 3,
    name: 'Nefs-i Mülheme',
    subtitle: 'İlham alan nefs',
    color: '#f59e0b',
    oneliner: 'Doğru ile yanlışı sezmeye başlar. İyilik eğilimi artar.',
    desc: 'Nefse doğru ile yanlışı ayırt etme kabiliyeti ilham edilmiştir. Kul, iyiliğe meyil etmeye ve kötülükten uzaklaşmaya başlar. Firâset ve basîret nişaneleri belirir.',
    quote: 'Ona kötülüğü ve iyiliği ilham etti.',
    source: 'Şems Sûresi, 8'
  },
  {
    id: 'levvame', num: 2,
    name: 'Nefs-i Levvâme',
    subtitle: 'Kendini kınayan nefs',
    color: '#f97316',
    oneliner: 'Hata yapıp pişman olur, ama tekrar düşer.',
    desc: 'Kul, günah işledikten sonra vicdan azabı duyar, pişman olur ve kendini kınar. Ancak nefs henüz yeterince terbiye olmadığından tekrar aynı hatalara düşebilir. Bu mertebe, uyanışın başlangıcıdır.',
    quote: 'Kendini kınayan nefse yemin ederim.',
    source: 'Kıyâme Sûresi, 2'
  },
  {
    id: 'emmare', num: 1,
    name: 'Nefs-i Emmâre',
    subtitle: 'Kötülüğü emreden nefs',
    color: '#ef4444',
    oneliner: 'Dürtülerine teslim. Haz odaklı. Sorumluluk almaz.',
    desc: 'Nefsin en aşağı mertebesidir. Kişi, nefsinin her arzusuna boyun eğer; haz ve şehvet peşindedir. Sorumluluk duygusu zayıftır, haram-helâl ayrımı gözetmez.',
    quote: 'Nefs, kötülüğü emredicidir.',
    source: 'Yûsuf Sûresi, 53'
  }
];

function buildLadder() {
  const ladder = document.getElementById('nmLadder');
  let html = '';

  stages.forEach((s, i) => {
    const glowColor = s.color + '55';

    html += `
      <div class="nm-stage" data-id="${s.id}" style="--stage-color:${s.color};--stage-glow:${glowColor}" onclick="toggleStage('${s.id}')">
        <div class="nm-node" style="background:${s.color};box-shadow:0 0 12px ${glowColor}">${s.num}</div>
        <div class="nm-stage-text">
          <div class="nm-stage-name">${s.name}</div>
          <div class="nm-stage-subtitle">${s.subtitle}</div>
          <div class="nm-stage-oneliner">${s.oneliner}</div>
        </div>
        <svg class="nm-expand-icon" viewBox="0 0 20 20" fill="none"><path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="nm-detail" id="detail-${s.id}" style="--stage-color:${s.color}">
        <div class="nm-card">
          <div class="nm-card-desc">${s.desc}</div>
          <blockquote class="nm-quote">
            <div class="nm-quote-text">"${s.quote}"</div>
            <div class="nm-quote-source">— ${s.source}</div>
          </blockquote>
        </div>
      </div>`;

    if (i < stages.length - 1) {
      const nextColor = stages[i + 1].color;
      html += `
      <div class="nm-connector">
        <div class="nm-conn-dot" style="background:${s.color}"></div>
        <div class="nm-conn-dot" style="background:${nextColor}"></div>
      </div>`;
    }
  });

  ladder.insertAdjacentHTML('beforeend', html);
}

function toggleStage(id) {
  const allStages = document.querySelectorAll('.nm-stage');
  const allDetails = document.querySelectorAll('.nm-detail');
  const targetStage = document.querySelector(`.nm-stage[data-id="${id}"]`);
  const targetDetail = document.getElementById('detail-' + id);

  const wasActive = targetStage.classList.contains('active');

  allStages.forEach(s => s.classList.remove('active'));
  allDetails.forEach(d => d.classList.remove('open'));

  if (!wasActive) {
    targetStage.classList.add('active');
    targetDetail.classList.add('open');
    setTimeout(() => {
      targetStage.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 120);
  }
}

// Generate CSS-only particles along the vertical line
function initParticles() {
  const container = document.getElementById('nmParticles');
  const colors = ['#ef4444','#f97316','#f59e0b','#10b981','#06b6d4','#6366f1','#e2b53f'];
  const count = 18;
  let html = '';

  for (let i = 0; i < count; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    const left = 3 + Math.random() * 8;
    const bottom = Math.random() * 100;
    const duration = 8 + Math.random() * 12;
    const delay = Math.random() * duration;
    const size = 2 + Math.random() * 2;
    const drift = (Math.random() - 0.5) * 6;

    html += `<div class="nm-particle" style="
      left:${left}px;
      bottom:${bottom}%;
      width:${size}px;
      height:${size}px;
      background:${color};
      animation-duration:${duration}s;
      animation-delay:-${delay}s;
      --drift:${drift}px;
      box-shadow:0 0 ${size + 2}px ${color}88;
    "></div>`;
  }

  container.innerHTML = html;
}

buildLadder();
initParticles();
</script>

<script src="/noroterbiye/js/common.js"></script>
<script>NT.renderNav(); NT.renderFooter();</script>
</body>
</html>
