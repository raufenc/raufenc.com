<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nefs Merdiveni — NöroTerbiye</title>
<link rel="stylesheet" href="/lib/design-system/tokens.css">
<link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
<script src="/lib/design-system/theme.js"></script>
<style>
/* ── Page-level overrides ── */
body::before {
  background:
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(239,68,68,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(192,132,252,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(99,102,241,0.06) 0%, transparent 50%);
}

.nm-page {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 60px 20px 40px;
}

/* ── Header ── */
.nm-header {
  text-align: center;
  margin-bottom: 48px;
}
.nm-header h1 {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800;
  background: linear-gradient(135deg, #ef4444, #f97316, #f59e0b, #10b981, #06b6d4, #6366f1, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.nm-header p {
  color: var(--text-secondary);
  font-size: 0.95rem;
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

/* ── Ladder container ── */
.nm-ladder {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  padding: 40px 0;
}

/* Central neural path (SVG drawn) */
.nm-path-svg {
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  width: 80px;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ── Stage row ── */
.nm-stage {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1fr 72px 1fr;
  align-items: center;
  gap: 16px;
  width: 100%;
  max-width: 780px;
  padding: 24px 0;
  cursor: pointer;
}

/* Left label */
.nm-label-left {
  text-align: right;
  padding-right: 8px;
}
.nm-stage-name {
  font-size: 1.05rem;
  font-weight: 700;
  transition: color 0.3s;
}
.nm-stage-subtitle {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Right label */
.nm-label-right {
  text-align: left;
  padding-left: 8px;
}
.nm-brain-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.nm-brain-icon {
  font-size: 0.85rem;
  opacity: 0.6;
}

/* ── Node (center circle) ── */
.nm-node-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.nm-node {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.1rem;
  color: #fff;
  position: relative;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  cursor: pointer;
  z-index: 2;
}
.nm-node::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid currentColor;
  opacity: 0.25;
  transition: opacity 0.3s, inset 0.3s;
}
.nm-node::after {
  content: '';
  position: absolute;
  inset: -14px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.4s;
}

.nm-stage:hover .nm-node {
  transform: scale(1.12);
}
.nm-stage:hover .nm-node::before {
  opacity: 0.45;
  inset: -10px;
}
.nm-stage:hover .nm-stage-name {
  color: var(--stage-color);
}

/* Active / expanded */
.nm-stage.active .nm-node {
  transform: scale(1.18);
  animation: nm-pulse 2s ease-in-out infinite;
}
.nm-stage.active .nm-node::before {
  opacity: 0.5;
  inset: -10px;
}
.nm-stage.active .nm-stage-name {
  color: var(--stage-color);
}

@keyframes nm-pulse {
  0%, 100% { box-shadow: 0 0 20px var(--stage-glow), 0 0 40px var(--stage-glow); }
  50% { box-shadow: 0 0 30px var(--stage-glow), 0 0 60px var(--stage-glow); }
}

/* ── Synapse dots along the path ── */
.nm-synapse-segment {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  height: 48px;
  justify-content: center;
}
.nm-synapse-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  opacity: 0.4;
  animation: nm-synapse-flow 2.5s ease-in-out infinite;
}
.nm-synapse-dot:nth-child(2) { animation-delay: 0.4s; width: 3px; height: 3px; }
.nm-synapse-dot:nth-child(3) { animation-delay: 0.8s; width: 5px; height: 5px; }

@keyframes nm-synapse-flow {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 0.7; transform: scale(1.3); }
}

/* ── Detail card (glassmorphism) ── */
.nm-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.4s, margin 0.4s;
  opacity: 0;
  margin: 0 auto;
  width: 100%;
  max-width: 640px;
  z-index: 3;
  position: relative;
}
.nm-detail.open {
  max-height: 500px;
  opacity: 1;
  margin: 4px auto 8px;
}

.nm-card {
  background: var(--nt-glass);
  border: 1px solid var(--nt-glass-border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 24px 28px;
  position: relative;
  overflow: hidden;
}
.nm-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.nm-card-desc {
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 16px;
  color: var(--text);
  font-style: italic;
}

.nm-card-section {
  margin-bottom: 12px;
}
.nm-card-section:last-child { margin-bottom: 0; }
.nm-card-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  opacity: 0.7;
}
.nm-card-section p {
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--text-secondary);
}

/* ── Ascending particles (canvas) ── */
#nm-particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Background gradient overlay ── */
.nm-bg-gradient {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background: linear-gradient(
    to top,
    rgba(239,68,68,0.06) 0%,
    rgba(249,115,22,0.04) 15%,
    rgba(245,158,11,0.03) 30%,
    rgba(16,185,129,0.03) 45%,
    rgba(6,182,212,0.04) 60%,
    rgba(99,102,241,0.05) 75%,
    rgba(192,132,252,0.06) 90%,
    rgba(192,132,252,0.08) 100%
  );
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .nm-stage {
    grid-template-columns: 1fr;
    text-align: center;
    gap: 8px;
    padding: 16px 0;
  }
  .nm-label-left { text-align: center; padding: 0; order: 2; }
  .nm-label-right { text-align: center; padding: 0; order: 3; }
  .nm-node-wrap { order: 1; }
  .nm-node { width: 48px; height: 48px; font-size: 1rem; }
  .nm-synapse-segment { height: 32px; }
  .nm-card { padding: 20px; }
  .nm-header { margin-bottom: 32px; }
  .nm-page { padding: 50px 16px 32px; }
}

/* ── Journey arrow hint ── */
.nm-arrow-hint {
  text-align: center;
  margin-bottom: 16px;
  color: var(--text-secondary);
  font-size: 0.8rem;
  opacity: 0.6;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.nm-arrow-hint svg {
  animation: nm-bounce 2s ease-in-out infinite;
}
@keyframes nm-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="nm-bg-gradient"></div>
<canvas id="nm-particles"></canvas>

<div class="nm-page">
  <header class="nm-header">
    <h1>Nefs Merdiveni</h1>
    <p>Nefsin yedi basamağı: Emmâre'den Kâmile'ye uzanan yolculuk. Her basamak bir sinir bilim gerçeğiyle buluşuyor.</p>
  </header>

  <div class="nm-arrow-hint">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 13V3M8 3L3 8M8 3l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Yolculuk aşağıdan yukarıya
  </div>

  <div class="nm-ladder" id="nmLadder"></div>
</div>

<script>
const stages = [
  {
    id: 'kamile', num: 7,
    name: 'Nefs-i Kâmile', subtitle: 'Olgunlaşmış Nefs',
    color: '#c084fc', brain: 'Tam nöral entegrasyon',
    desc: 'Olgunlaşmış nefs. Tam denge, tam teslimiyet.',
    brainDetail: 'Tüm beyin bölgeleri uyum içinde çalışır. Prefrontal korteks, limbik sistem ve ödül devreleri tam entegrasyon halinde.',
    symptoms: 'Hikmet, rehberlik, kemâl. Başkalarına yol gösterme.'
  },
  {
    id: 'marziyye', num: 6,
    name: 'Nefs-i Marziyye', subtitle: 'Razı Olunan Nefs',
    color: '#6366f1', brain: 'Ayna nöronlar aktif',
    desc: "Allah'ın razı olduğu nefs. Kuldan da razı.",
    brainDetail: 'Ayna nöron sistemi ve empati devreleri yoğun çalışır. Oksitosn ve serotonin dengesi optimal.',
    symptoms: 'İhsan hâli, başkalarına fayda, fedakârlık.'
  },
  {
    id: 'raziye', num: 5,
    name: 'Nefs-i Râziye', subtitle: 'Razı Olan Nefs',
    color: '#06b6d4', brain: 'Stres ekseni sakinleşir',
    desc: "Razı olan nefs. Her hâlde Allah'tan razı.",
    brainDetail: 'HPA ekseni (stres ekseni) sakinleşir. Kortizol seviyeleri düşük, parasempatik sistem baskın.',
    symptoms: 'Kadere rıza, şikâyet yok, tevekkül.'
  },
  {
    id: 'mutmainne', num: 4,
    name: 'Nefs-i Mutmainne', subtitle: 'Huzura Ermiş Nefs',
    color: '#10b981', brain: 'Prefrontal korteks güçlü',
    desc: "Huzura ermiş nefs. Allah'ın rızasıyla tatmin olur.",
    brainDetail: 'Prefrontal korteks güçlü ve aktif, dopamin dengeli. Meditasyon ve zikir ile güçlenen varsayılan mod ağı (DMN) optimize.',
    symptoms: 'Sabır, şükür, iç huzur, istikrar.'
  },
  {
    id: 'mulheme', num: 3,
    name: 'Nefs-i Mülheme', subtitle: 'İlham Alan Nefs',
    color: '#f59e0b', brain: 'İnsüla aktifleşir',
    desc: 'İlham alan nefs. Doğru ile yanlışı sezmeye başlar.',
    brainDetail: 'İnsüla korteksi aktifleşir — iç farkındalık (interoception) artar. Sezgisel karar alma güçlenir.',
    symptoms: 'İyilik eğilimi, kötülükten uzaklaşma, feraset.'
  },
  {
    id: 'levvame', num: 2,
    name: 'Nefs-i Levvâme', subtitle: 'Kendini Kınayan Nefs',
    color: '#f97316', brain: 'Anterior singulat korteks',
    desc: 'Kendini kınayan nefs. Hata yapıp pişman olur.',
    brainDetail: 'Anterior singulat korteks (ACC) devrede — hata fark ediliyor. Hata izleme sistemi çalışıyor ama dürtü kontrolü henüz zayıf.',
    symptoms: 'Vicdan azabı var ama tekrar düşme riski yüksek.'
  },
  {
    id: 'emmare', num: 1,
    name: 'Nefs-i Emmâre', subtitle: 'Kötülüğü Emreden Nefs',
    color: '#ef4444', brain: 'Amigdala baskın',
    desc: 'Kötülüğü emreden nefs. Dürtülerine teslim.',
    brainDetail: 'Amigdala ve ödül sistemi (nucleus accumbens) baskın. Prefrontal korteks zayıf, dürtü kontrolü yok.',
    symptoms: 'Kontrol yok, haz odaklı, sorumluluk almaz.'
  }
];

function buildLadder() {
  const ladder = document.getElementById('nmLadder');
  let html = '';

  stages.forEach((s, i) => {
    const glowColor = s.color + '55';

    html += `
      <div class="nm-stage" data-id="${s.id}" style="--stage-color:${s.color};--stage-glow:${glowColor}" onclick="toggleStage('${s.id}')">
        <div class="nm-label-left">
          <div class="nm-stage-name">${s.name}</div>
          <div class="nm-stage-subtitle">${s.subtitle}</div>
        </div>
        <div class="nm-node-wrap">
          <div class="nm-node" style="background:${s.color};color:#fff;box-shadow:0 0 16px ${glowColor}">${s.num}</div>
        </div>
        <div class="nm-label-right">
          <div class="nm-brain-label">
            <span class="nm-brain-icon">🧠</span>
            <span>${s.brain}</span>
          </div>
        </div>
      </div>

      <div class="nm-detail" id="detail-${s.id}">
        <div class="nm-card" style="border-color:${s.color}22">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${s.color};border-radius:16px 16px 0 0"></div>
          <div class="nm-card-desc">"${s.desc}"</div>
          <div class="nm-card-section">
            <div class="nm-card-section-title" style="color:${s.color}">🧠 Beyin Bağlantısı</div>
            <p>${s.brainDetail}</p>
          </div>
          <div class="nm-card-section">
            <div class="nm-card-section-title" style="color:${s.color}">📋 Belirtiler</div>
            <p>${s.symptoms}</p>
          </div>
        </div>
      </div>
    `;

    // Synapse connector dots between stages (not after last)
    if (i < stages.length - 1) {
      const nextColor = stages[i + 1].color;
      // Gradient between current and next color
      html += `
        <div class="nm-synapse-segment">
          <div class="nm-synapse-dot" style="background:${s.color}"></div>
          <div class="nm-synapse-dot" style="background:linear-gradient(${s.color},${nextColor})"></div>
          <div class="nm-synapse-dot" style="background:${nextColor}"></div>
        </div>
      `;
    }
  });

  ladder.innerHTML = html;
}

function toggleStage(id) {
  const allStages = document.querySelectorAll('.nm-stage');
  const allDetails = document.querySelectorAll('.nm-detail');
  const targetStage = document.querySelector(`.nm-stage[data-id="${id}"]`);
  const targetDetail = document.getElementById('detail-' + id);

  const wasActive = targetStage.classList.contains('active');

  // Close all
  allStages.forEach(s => s.classList.remove('active'));
  allDetails.forEach(d => d.classList.remove('open'));

  if (!wasActive) {
    targetStage.classList.add('active');
    targetDetail.classList.add('open');
    // Smooth scroll
    setTimeout(() => {
      targetStage.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

// ── Ascending particle animation ──
function initParticles() {
  const canvas = document.getElementById('nm-particles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const particles = [];
  const colors = ['#ef4444', '#f97316', '#f59e0b', '#10b981', '#06b6d4', '#6366f1', '#c084fc'];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w;
      this.y = h + Math.random() * 40;
      this.size = Math.random() * 2.5 + 0.5;
      this.speed = Math.random() * 0.6 + 0.2;
      this.opacity = Math.random() * 0.3 + 0.05;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.drift = (Math.random() - 0.5) * 0.3;
    }
    update() {
      this.y -= this.speed;
      this.x += this.drift + Math.sin(this.y * 0.005) * 0.3;
      // Fade based on position — brighter near top
      const pct = 1 - this.y / h;
      this.currentOpacity = this.opacity * (0.3 + pct * 0.7);
      if (this.y < -10) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = this.currentOpacity;
      ctx.fill();
    }
  }

  const count = Math.min(60, Math.floor(w / 20));
  for (let i = 0; i < count; i++) {
    const p = new Particle();
    p.y = Math.random() * h; // Start scattered
    particles.push(p);
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
  }
  animate();
}

// ── Init ──
buildLadder();
initParticles();
</script>

<script src="/noroterbiye/js/common.js"></script>
<script>NT.renderNav(); NT.renderFooter();</script>
</body>
</html>
