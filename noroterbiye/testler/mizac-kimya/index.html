<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mizaç ve Kimya Mini Testi — NöroTerbiye</title>
  <meta name="description" content="Baskın hareket tarzını keşfet. Dopamin avcısı mısın, serotonin arayıcısı mı, yoksa kortizol mağduru mu?">
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
  <script src="/lib/design-system/theme.js"></script>
</head>
<body>
  <script src="/nav.js"></script>

  <section class="nt-section" style="padding-top:80px">
    <div class="nt-wrap nt-narrow">
      <p class="nt-label nt-fade-in" style="margin-bottom:8px">NöroTerbiye Testi</p>
      <h1 class="nt-title nt-fade-in" style="font-size:1.8rem;margin-bottom:8px;animation-delay:0.05s">🧬 Mizaç ve Kimya Mini Testi</h1>
      <p class="nt-subtitle nt-fade-in" style="animation-delay:0.1s;margin-bottom:32px">
        Baskın hareket tarzını ve kimyasal eğilimini keşfet. 10 soru, 3 dakika.
      </p>
      <div id="test-area" class="nt-card nt-fade-in" style="padding:32px;animation-delay:0.2s"></div>
    </div>
  </section>

  <script src="/noroterbiye/js/common.js"></script>
  <script src="/noroterbiye/js/test-engine.js"></script>
  <script>
    TestEngine.init({
      containerId: 'test-area',
      title: 'Mizaç ve Kimya Mini Testi',
      slug: 'mizac-kimya',
      questions: [
        {
          soru: 'Yeni bir şey keşfetmek seni nasıl hissettirir?',
          secenekler: [
            { text: 'Heyecan duyarım, hemen denemek isterim', puan: 4 },
            { text: 'İlginç bulurum ama temkinli yaklaşırım', puan: 2 },
            { text: '"Eski düzenim bozulur mu?" diye endişelenirim', puan: 3 },
            { text: 'Değerlendiririm, gerekiyorsa öğrenirim', puan: 0 },
          ],
          aciklama: 'Yenilik arayışı dopamin baskın mizacın göstergesidir. Temkinlilik serotonin, endişe ise kortizol eğilimini yansıtır.'
        },
        {
          soru: 'Stres altında en belirgin tepkin hangisi?',
          secenekler: [
            { text: 'Huzursuzluk, sürekli bir şeyler yapma dürtüsü', puan: 4 },
            { text: 'Öfke patlaması, sinirlilik', puan: 3 },
            { text: 'Donma, karar verememe', puan: 3 },
            { text: 'Sakinleşmeye çalışır, plan yaparım', puan: 0 },
          ]
        },
        {
          soru: 'Ödülü beklemek sana ne kadar zor gelir?',
          secenekler: [
            { text: 'Çok zor, hemen istiyorum', puan: 4 },
            { text: 'Zorlanırım ama bekleyebilirim', puan: 2 },
            { text: 'Sabırlıyımdır, beklemek sorun değil', puan: 0 },
            { text: 'Ödülden çok süreçten keyif alırım', puan: 0 },
          ],
          aciklama: 'Marshmallow testi prensibi: Anlık haz isteği dopamin baskınlığını gösterir. Sabır, prefrontal korteks olgunluğunun işaretidir.'
        },
        {
          soru: 'Sosyal ortamlarda kendini nasıl hissedersin?',
          secenekler: [
            { text: 'Enerji alırım, ne kadar kalabalıksa o kadar iyi', puan: 3 },
            { text: 'Tanıdıklarla iyiyim, yabancılarla zorlanırım', puan: 2 },
            { text: 'Küçük grupları tercih ederim', puan: 1 },
            { text: 'Yalnızlık beni dinlendirir', puan: 1 },
          ]
        },
        {
          soru: 'Rutin bozulduğunda ne olur?',
          secenekler: [
            { text: 'Hiç sorun değil, esnek biriyim', puan: 2 },
            { text: 'Rahatsız olurum ama uyum sağlarım', puan: 1 },
            { text: 'Stres yaparım, kontrol kaybı hissederim', puan: 4 },
            { text: 'Rutinim zaten yok, anı yaşarım', puan: 3 },
          ],
          aciklama: 'Rutin bağımlılığı serotonin düzenleme ihtiyacını, rutinsizlik ise dopamin baskınlığını gösterir.'
        },
        {
          soru: 'Risk almak seni nasıl hissettirir?',
          secenekler: [
            { text: 'Adrenalin veriyor, severim', puan: 4 },
            { text: 'Hesaplı risk alırım', puan: 1 },
            { text: 'Mümkün olduğunca kaçınırım', puan: 3 },
            { text: 'Duruma göre değişir', puan: 1 },
          ]
        },
        {
          soru: 'Günlük enerji düzenin nasıl?',
          secenekler: [
            { text: 'İnişli çıkışlı, bazen çok enerjik bazen çöküş', puan: 4 },
            { text: 'Sabah yüksek, akşama düşer', puan: 1 },
            { text: 'Genelde düşük, kendimi zorlarım', puan: 3 },
            { text: 'Dengeli ve istikrarlı', puan: 0 },
          ],
          aciklama: 'Enerji dalgalanmaları dopamin-kortizol dengesizliğini gösterir. İstikrar, sağlıklı bir nörokimyasal denge işaretidir.'
        },
        {
          soru: 'Hayal kırıklığı yaşadığında ne yaparsın?',
          secenekler: [
            { text: 'Hemen yeni bir heyecan ararım', puan: 4 },
            { text: 'Uzun süre üzülür, ruminasyon yaparım', puan: 3 },
            { text: 'Kızar ve suçlu ararım', puan: 3 },
            { text: 'Kabullenir ve ders çıkarırım', puan: 0 },
          ]
        },
        {
          soru: 'Bir şeye odaklanmak sana ne kadar kolay?',
          secenekler: [
            { text: 'Çok zor, sürekli dikkatim dağılır', puan: 4 },
            { text: 'Kısa süre odaklanırım sonra kayarım', puan: 3 },
            { text: 'İlgimi çekerse uzun süre odaklanırım', puan: 1 },
            { text: 'Genelde odaklanmak kolay gelir', puan: 0 },
          ]
        },
        {
          soru: 'Aşağıdakilerden hangisi seni en iyi tanımlar?',
          secenekler: [
            { text: 'Heyecan avcısı — yeni deneyimler, hız, değişim', puan: 4 },
            { text: 'Statü takipçisi — pozisyon, saygınlık, düzen', puan: 3 },
            { text: 'Endişe taşıyıcısı — güvenlik, kontrol, temkin', puan: 3 },
            { text: 'Denge kurucusu — sabır, ölçü, istikrar', puan: 0 },
          ],
          aciklama: 'Heyecan avcısı = dopamin baskın, statü takipçisi = serotonin baskın, endişe taşıyıcısı = kortizol baskın, denge kurucusu = olgun prefrontal korteks.'
        },
      ],
      resultRanges: [
        { min: 0, max: 20, label: 'Dengeli Mizaç', text: 'Nörokimyasal dengen güçlü görünüyor. Prefrontal korteks dürtüleri yönetebiliyor. Bu dengeyi koru.', emoji: '⚖️' },
        { min: 21, max: 45, label: 'Hafif Eğilimler', text: 'Belirli bir kimyasal eğilimin var ama yönetilebilir düzeyde. Farkındalık ve bilinçli pratiklerle dengeyi güçlendirebilirsin.', emoji: '🔬' },
        { min: 46, max: 70, label: 'Belirgin Baskınlık', text: 'Bir veya daha fazla nörokimyasal sistem baskın çalışıyor. Bu bilgiyi avantaja çevir — zayıf yönlerini bilmek en büyük güçtür.', emoji: '🧬' },
        { min: 71, max: 100, label: 'Güçlü Kimyasal Çekim', text: 'Dürtüsel eğilimlerin çok güçlü. Ama bu doğuştan gelen bir kader değil — beyin plastisitesi sayesinde yeni devreler kurabilirsin.', emoji: '⚡' },
      ]
    });

    NT.renderNav();
    NT.renderFooter();
  </script>
</body>
</html>
