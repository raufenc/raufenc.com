<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyunlar — NöroTerbiye</title>
  <meta name="description" content="NöroTerbiye oyunları: Dopamin Dedektifi, Hile Avcısı, Nefs Gemisi ve daha fazlası. Oynayarak öğren.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <link rel="stylesheet" href="/noroterbiye/css/noroterbiye.css">
  <script src="/lib/design-system/theme.js"></script>
</head>
<body>
  <script src="/nav.js"></script>

  <section class="nt-section" style="padding-top:80px">
    <div class="nt-wrap">
      <h1 class="nt-title nt-fade-in" style="font-size:2rem;margin-bottom:8px">🎮 Oyunlar</h1>
      <p class="nt-subtitle nt-fade-in" style="animation-delay:0.1s;margin-bottom:8px">
        Oynayarak öğren, deneyimleyerek kavra. Her oyun bir kavramı hayata geçirir.
      </p>
      <p class="nt-fade-in" style="animation-delay:0.15s;font-size:0.78rem;color:var(--muted);margin-bottom:32px">
        12 interaktif oyun — toplam ~50 dakikalık keşif.
      </p>

      <div class="nt-grid nt-grid-2 nt-stagger" id="game-list"></div>
    </div>
  </section>

  <script src="/noroterbiye/data/oyunlar.js"></script>
  <script src="/noroterbiye/js/common.js"></script>
  <script>
    const ikonlar = {
      'GM01':'🔍','GM02':'🕵️','GM03':'⚡','GM04':'⚖️','GM05':'🪞','GM06':'🔄',
      'GM07':'🏃','GM08':'🏰','GM09':'🎯','GM10':'🌙','GM11':'🃏','GM12':'⛵'
    };

    const slugMap = {
      'GM01': 'dopamin-dedektifi',
      'GM02': 'hile-avcisi',
      'GM03': 'odul-mu-beklenti-mi',
      'GM04': 'ssg-dengesi',
      'GM05': 'ayna-noron-aynasi',
      'GM06': 'alternatifini-ikame-et',
      'GM07': 'savsaklama-kacisi',
      'GM08': 'cevre-kalesi',
      'GM09': 'dogrudan-mi-dolayli-mi',
      'GM10': 'ramazan-ritmi',
      'GM11': 'kahraman-kartlari',
      'GM12': 'nefs-gemisi',
    };

    const container = document.getElementById('game-list');
    OYUNLAR_DATA.filter(g => g.id !== 'ID').forEach(g => {
      const slug = slugMap[g.id] || g.id.toLowerCase();
      container.innerHTML += `
        <a href="/noroterbiye/oyunlar/${slug}/" class="nt-card nt-card-clickable" style="text-decoration:none;color:var(--text)">
          <div style="display:flex;gap:16px;align-items:start">
            <div style="font-size:2.2rem;flex-shrink:0">${ikonlar[g.id] || '🎮'}</div>
            <div style="flex:1">
              <h3 style="font-size:1.05rem;font-weight:700;margin-bottom:6px">${g.ad}</h3>
              <p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.5;margin-bottom:10px">${g.amac}</p>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                <span class="nt-tag">${g.kitle}</span>
                <span class="nt-tag nt-tag-${NT.temaRenk(g.tema)}">${g.tema}</span>
                <span class="nt-tag" style="margin-left:auto">${g.sure}</span>
              </div>
            </div>
          </div>
        </a>
      `;
    });

    NT.renderNav();
    NT.renderFooter();
  </script>
</body>
</html>
