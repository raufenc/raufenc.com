<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7C6CF7"/>
      <stop offset="100%" stop-color="#4A3ABA"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="210" fill="url(#glow)" opacity="0.3"/>
  <!-- 8-point star -->
  <polygon points="256,74 288,192 406,160 320,256 406,352 288,320 256,438 224,320 106,352 192,256 106,160 224,192" fill="url(#star)" opacity="0.95"/>
  <!-- Inner glow circle -->
  <circle cx="256" cy="256" r="52" fill="#FFFDE7" opacity="0.8"/>
  <!-- Center sparkle -->
  <circle cx="256" cy="256" r="16" fill="#FFFFFF"/>
</svg>
