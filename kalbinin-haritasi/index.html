<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8" />

  <title>Kalbinin Haritası — Ahlak Pusulası</title>

  <link rel="canonical" href="https://raufenc.com/kalbinin-haritasi/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f0d878;
      --gold-dark: #b8960c;
      --emerald: #059669;
      --emerald-light: #34d399;
      --teal: #0d9488;
      --bg-deep: #0a0f1e;
      --bg-card: rgba(15, 23, 42, 0.75);
      --bg-card-hover: rgba(20, 30, 55, 0.85);
      --border-gold: rgba(212, 175, 55, 0.25);
      --border-gold-hover: rgba(212, 175, 55, 0.5);
      --text-primary: #f1e8d0;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --glow-gold: 0 0 30px rgba(212, 175, 55, 0.15);
      --glow-gold-hover: 0 0 40px rgba(212, 175, 55, 0.25), 0 0 80px rgba(212, 175, 55, 0.1);
      --glow-emerald: 0 0 30px rgba(5, 150, 105, 0.2);
    }

    /* Light Theme */
    [data-theme="light"] {
      --bg-deep: #f5f0e6;
      --bg-card: rgba(255, 248, 235, 0.85);
      --bg-card-hover: rgba(255, 245, 225, 0.95);
      --border-gold: rgba(139, 105, 20, 0.2);
      --border-gold-hover: rgba(139, 105, 20, 0.4);
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a5e;
      --text-muted: #7a7a8e;
      --glow-gold: 0 0 20px rgba(212,175,55,0.08);
      --glow-gold-hover: 0 0 30px rgba(212,175,55,0.15);
      --glow-emerald: 0 0 20px rgba(5,150,105,0.1);
    }
    [data-theme="light"] body {
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(212,175,55,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(5,150,105,0.04) 0%, transparent 50%);
    }
    [data-theme="light"] body::before { opacity: 0.3; }
    [data-theme="light"] .option-label { background: rgba(255,248,235,0.6); }
    [data-theme="light"] .btn-subtle { background: rgba(0,0,0,0.04); border-color: rgba(139,105,20,0.2); color: var(--text-primary); }
    [data-theme="light"] .led-bar-track { background: linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.08)); }
    [data-theme="light"] .led-bar-fill.tefrit { box-shadow: 0 0 10px rgba(251,191,36,0.3); }
    [data-theme="light"] .led-bar-fill.fazilet { box-shadow: 0 0 10px rgba(52,211,153,0.3); }
    [data-theme="light"] .led-bar-fill.ifrat { box-shadow: 0 0 10px rgba(248,113,113,0.3); }
    [data-theme="light"] .led-bar-pct { text-shadow: none; }
    [data-theme="light"] .text-tefrit { color: #92700c; }
    [data-theme="light"] .text-fazilet { color: #047857; }
    [data-theme="light"] .text-ifrat { color: #b91c1c; }
    [data-theme="light"] .font-display, [data-theme="light"] h1, [data-theme="light"] h2, [data-theme="light"] h3 { -webkit-text-fill-color: initial; background: none; }
    [data-theme="light"] [style*="color:var(--gold)"] { color: #7a5c00 !important; }
    [data-theme="light"] [style*="color:var(--gold-light)"] { color: #6b4f00 !important; }
    [data-theme="light"] .card { border-color: rgba(139,105,20,0.15); }
    [data-theme="light"] .progress-wrap { background: rgba(0,0,0,0.06); }
    [data-theme="light"] .progress-fill { background: linear-gradient(90deg, #8B6914, #b8960c); }
    [data-theme="light"] .badge-completed { background: #047857; }
    [data-theme="light"] .divider::before, [data-theme="light"] .divider::after { background: linear-gradient(90deg, transparent, rgba(139,105,20,0.2), transparent); }
    [data-theme="light"] .star { color: #b8960c; opacity: 0.2; }

    * { box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(ellipse at 10% 10%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(5, 150, 105, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(13, 148, 136, 0.04) 0%, transparent 60%);
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    /* Islamic geometric pattern overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg 30deg, rgba(212,175,55,0.015) 30deg 60deg);
      background-size: 120px 120px;
      pointer-events: none;
      z-index: 0;
    }

    #app { position: relative; z-index: 1; }

    /* Typography */
    .font-display { font-family: "Playfair Display", serif; }
    .font-arabic { font-family: "Amiri", serif; }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(212,175,55,0.1); }
      50% { box-shadow: 0 0 40px rgba(212,175,55,0.25); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes countUp {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(212,175,55,0.2); }
      50% { border-color: rgba(212,175,55,0.5); }
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .fade-in { animation: fadeInUp 0.5s ease both; }
    .fade-in-delay-1 { animation: fadeInUp 0.5s ease 0.1s both; }
    .fade-in-delay-2 { animation: fadeInUp 0.5s ease 0.2s both; }
    .fade-in-delay-3 { animation: fadeInUp 0.5s ease 0.3s both; }

    /* Premium Card */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-gold);
      border-radius: 1rem;
      padding: 1.75rem;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.4;
    }
    .card.clickable:hover {
      transform: translateY(-6px);
      border-color: var(--border-gold-hover);
      box-shadow: var(--glow-gold-hover);
      background: var(--bg-card-hover);
    }
    .card.clickable { cursor: pointer; }

    /* Decorative corner */
    .card-decorated::after {
      content: '✦';
      position: absolute;
      top: 8px; right: 12px;
      color: var(--gold);
      opacity: 0.3;
      font-size: 0.75rem;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      padding: 0.875rem 2.5rem;
      border-radius: 0.75rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1rem;
      font-family: "Inter", sans-serif;
      letter-spacing: 0.025em;
      position: relative;
      overflow: hidden;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
      color: #0a0f1e;
      box-shadow: 0 4px 20px rgba(212,175,55,0.3);
    }
    .btn-gold:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 30px rgba(212,175,55,0.4);
    }
    .btn-gold:active { transform: scale(0.97); }

    .btn-emerald {
      background: linear-gradient(135deg, #047857, var(--emerald), var(--emerald-light));
      color: white;
      box-shadow: 0 4px 20px rgba(5,150,105,0.3);
    }
    .btn-emerald:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 30px rgba(5,150,105,0.4);
    }
    .btn-emerald:active { transform: scale(0.97); }

    .btn-ghost {
      background: rgba(212,175,55,0.08);
      color: var(--gold-light);
      border: 1px solid var(--border-gold);
    }
    .btn-ghost:hover {
      background: rgba(212,175,55,0.15);
      border-color: var(--border-gold-hover);
      transform: scale(1.03);
    }

    .btn-subtle {
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-subtle:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }

    .btn:disabled {
      background: rgba(75,85,99,0.3);
      color: rgba(255,255,255,0.3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Options */
    .option-label {
      display: block;
      padding: 1.125rem 1.25rem;
      border-radius: 0.75rem;
      cursor: pointer;
      border: 1.5px solid rgba(212,175,55,0.12);
      transition: all 0.3s ease;
      margin-bottom: 0.75rem;
      background: rgba(15,23,42,0.4);
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .option-label:hover {
      border-color: var(--border-gold-hover);
      background: rgba(212,175,55,0.06);
      transform: translateX(4px);
    }
    .option-label.selected {
      background: rgba(212,175,55,0.1);
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212,175,55,0.1), inset 0 0 20px rgba(212,175,55,0.03);
      transform: translateX(6px);
    }

    /* Progress Bar */
    .progress-wrap {
      background: rgba(212,175,55,0.08);
      border-radius: 9999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
      border: 1px solid rgba(212,175,55,0.1);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
      border-radius: 9999px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }

    /* Spinner */
    .spinner {
      width: 3rem; height: 3rem;
      border: 3px solid rgba(212,175,55,0.15);
      border-bottom-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
    }
    .divider-icon {
      color: var(--gold);
      opacity: 0.5;
      font-size: 0.75rem;
    }

    /* Completed badge */
    .badge-completed {
      position: absolute;
      top: 12px; right: 12px;
      width: 24px; height: 24px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #0a0f1e;
      box-shadow: 0 2px 8px rgba(212,175,55,0.3);
    }

    /* Result colors */
    .text-tefrit { color: #fbbf24; }
    .text-fazilet { color: var(--emerald-light); }
    .text-ifrat { color: #f87171; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,0.4); }

    /* Welcome decorative stars */
    .star {
      position: absolute;
      color: var(--gold);
      opacity: 0.3;
      animation: starTwinkle 3s ease-in-out infinite;
    }

    /* 3D LED Bars */
    .led-bars-container { display: flex; justify-content: center; gap: 2rem; padding: 2rem 0; }
    .led-bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; flex: 1; max-width: 160px; }
    .led-bar-track {
      width: 100%; height: 200px; border-radius: 12px; position: relative; overflow: hidden;
      background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .led-bar-fill {
      position: absolute; bottom: 0; left: 0; right: 0; height: 0%;
      border-radius: 0 0 11px 11px;
      transition: height 1.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .led-bar-fill.tefrit {
      background: linear-gradient(0deg, #f59e0b, #fbbf24, #fde68a);
      box-shadow: 0 0 20px rgba(251,191,36,0.5), 0 0 60px rgba(251,191,36,0.2), inset 0 0 30px rgba(255,255,255,0.15);
    }
    .led-bar-fill.fazilet {
      background: linear-gradient(0deg, #059669, #34d399, #6ee7b7);
      box-shadow: 0 0 20px rgba(52,211,153,0.5), 0 0 60px rgba(52,211,153,0.2), inset 0 0 30px rgba(255,255,255,0.15);
    }
    .led-bar-fill.ifrat {
      background: linear-gradient(0deg, #dc2626, #f87171, #fca5a5);
      box-shadow: 0 0 20px rgba(248,113,113,0.5), 0 0 60px rgba(248,113,113,0.2), inset 0 0 30px rgba(255,255,255,0.15);
    }
    .led-bar-fill::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.25), transparent);
      border-radius: 0;
    }
    .led-bar-glow {
      position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
      width: 120%; height: 20px; border-radius: 50%; filter: blur(12px); opacity: 0;
      transition: opacity 1.8s ease;
    }
    .led-bar-glow.tefrit { background: #fbbf24; }
    .led-bar-glow.fazilet { background: #34d399; }
    .led-bar-glow.ifrat { background: #f87171; }
    .led-bar-pct {
      font-size: 2rem; font-weight: 800; letter-spacing: -1px;
      text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
    }
    .led-bar-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; }
    .led-bar-fill .led-segments {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(0,0,0,0.12) 8px, rgba(0,0,0,0.12) 10px);
    }
    .led-pulse { animation: ledPulse 2s ease-in-out infinite; }
    @keyframes ledPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15); }
    }

    /* Stream cursor */
    .stream-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      animation: pulse-gold 1s ease-in-out infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    /* Question number badge */
    .q-number {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
      border: 1px solid var(--border-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Playfair Display", serif;
      font-weight: 700;
      color: var(--gold);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* Quiz compact */
    .quiz-question { font-size: 1rem; }
    .quiz-card { padding: 1.25rem; }

    /* Responsive */
    @media (max-width: 640px) {
      .card { padding: 1.25rem; }
      .btn { padding: 0.75rem 1.5rem; font-size: 0.9rem; }
      .quiz-card { padding: 0.875rem; }
      .quiz-question { font-size: 0.9rem; margin-bottom: 0.75rem !important; }
      .option-label { padding: 0.75rem 0.875rem; font-size: 0.82rem; margin-bottom: 0.5rem; line-height: 1.45; }
    }
  </style>
</head>
<body>
  <button id="auth-btn" onclick="showAuthModal()" aria-label="Giriş Yap" style="position:fixed;top:12px;right:56px;z-index:50;width:36px;height:36px;border-radius:50%;border:1px solid var(--border-gold);background:var(--bg-card);color:var(--gold);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all 0.3s" title="Giriş Yap">👤</button>
  <button id="theme-toggle" onclick="toggleTheme()" aria-label="Tema Değiştir" role="switch" style="position:fixed;top:12px;right:12px;z-index:50;width:36px;height:36px;border-radius:50%;border:1px solid var(--border-gold);background:var(--bg-card);color:var(--gold);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all 0.3s" title="Tema Değiştir">☀️</button>
  <a href="#app" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:bg-white focus:text-black focus:p-2 focus:rounded">İçeriğe Atla</a>
  <main id="app" role="main" aria-label="Ahlak Pusulası Uygulaması" class="container mx-auto max-w-4xl p-4 sm:p-6 py-8"></main>
<script>
/* Theme */
function toggleTheme(){
  const h=document.documentElement, cur=h.getAttribute('data-theme');
  if(cur==='light'){h.removeAttribute('data-theme');localStorage.setItem('themePreference','dark');}
  else{h.setAttribute('data-theme','light');localStorage.setItem('themePreference','light');}
  updateThemeIcon();
}
function updateThemeIcon(){
  const btn=document.getElementById('theme-toggle');
  if(btn) btn.textContent=document.documentElement.getAttribute('data-theme')==='light'?'🌙':'☀️';
}
(function(){
  if(localStorage.getItem('themePreference')==='light') document.documentElement.setAttribute('data-theme','light');
  updateThemeIcon();
})();

};

function saveHistory(){ localStorage.setItem('ahlakHistory', JSON.stringify(S.history)); }
function saveAndSync(testKey, scores){ saveHistory(); if(typeof syncToCloud==='function') syncToCloud(testKey, scores); }

function pct(s){
  const t=s.tefrit+s.fazilet+s.ifrat;
  if(!t) return {tefrit:0,fazilet:0,ifrat:0};
  const a=Math.round((s.tefrit/t)*100), b=Math.round((s.fazilet/t)*100);
  return {tefrit:a, fazilet:b, ifrat:Math.max(0,100-a-b)};
}

function completedCount(){
  return Object.keys(S.history).filter(k=>TESTS[k]).length;
}

function render(){
  const app=document.getElementById('app');
  app.className='container mx-auto max-w-4xl p-4 sm:p-6 py-8 fade-in';
  const screens={welcome:screenWelcome,start:screenStart,quiz:screenQuiz,result:screenResult,history:screenHistory,about:screenAbout,
    profile:typeof screenProfile==='function'?screenProfile:screenWelcome,
    classDetail:typeof screenClassDetail==='function'?screenClassDetail:screenWelcome,
    admin:typeof screenAdmin==='function'?screenAdmin:screenWelcome};
  app.innerHTML=(screens[S.screen]||screenWelcome)();
  window.scrollTo({top:0,behavior:'smooth'});
  pushRoute();
}

/* ═══════════════════════════════════════════════

   ═══════════════════════════════════════════════ */
function pushRoute(){
  const map={
    welcome:'#/',start:'#/start',quiz:'#/test/'+(S.testKey||''),
    result:'#/result/'+(S.testKey||''),history:'#/history',about:'#/about',
    profile:'#/profile',classDetail:'#/class/'+(S.classId||''),admin:'#/admin'
  };
  const h=map[S.screen]||'#/';
  if(window.location.hash!==h) history.pushState(null,'',h);
}

function applyRoute(){
  const hash=window.location.hash.replace(/^#\/?/,'');
  const parts=(hash||'').split('/');
  const seg0=parts[0]||'',seg1=parts[1]||'';
  if(!seg0){S.screen='welcome';}
  else if(seg0==='start'){S.screen='start';}
  else if(seg0==='test'&&seg1&&typeof TESTS!=='undefined'&&TESTS[seg1]){
    S.testKey=seg1;S.answers={};S.qi=0;S.scores=null;S.gemini=null;S.loadingGemini=false;S.screen='quiz';
  }else if(seg0==='history'){S.screen='history';}
  else if(seg0==='about'){S.screen='about';}
  else if(seg0==='profile'){S.screen='profile';}
  else if(seg0==='class'&&seg1){S.classId=seg1;S.screen='classDetail';}
  else if(seg0==='admin'){S.screen='admin';}
  else{S.screen='welcome';}
  render();
  if(S.screen==='profile')setTimeout(()=>{if(typeof isTeacher==='function'&&isTeacher())loadTeacherClasses();else loadStudentClasses();},100);
  else if(S.screen==='classDetail')setTimeout(()=>{if(typeof loadClassDetail==='function')loadClassDetail(S.classId);},100);
  else if(S.screen==='admin')setTimeout(()=>{if(typeof loadAdminPanel==='function')loadAdminPanel();},100);
}

window.addEventListener('popstate',applyRoute);

    <div class="option-label${S.answers[S.qi]===opt.puan?' selected':''}" data-action="answer" data-score="${opt.puan}">${opt.text}</div>`).join('');

  return `

}

   API

async function fetchGemini(scores){
  S.loadingGemini=false; S.gemini={streaming:true,text:'',sonraki_test:{key:'',gerekce:''}};
  // render() çağırmıyoruz — barları sıfırlamamak için sadece değerlendirme alanını güncelliyoruz
  const gemBox=document.getElementById('gemini-box');
  if(gemBox) gemBox.innerHTML='<div class="leading-relaxed whitespace-pre-wrap" style="color:var(--text-secondary)" id="gemini-stream"><span class="stream-cursor"></span></div>';
  const test=TESTS[S.testKey], p=pct(scores);
  const otherKeys=Object.keys(TESTS).filter(k=>k!==S.testKey).join(', ');
  const system=`Sen derin bir irfan ve hikmet ehlisin. Yazıların Osmanlı nesrinin letafetini taşır; her cümle mütefekkir, ağırbaşlı ve ruhani bir derinlikle yoğrulmuştur. Şu kelimeleri ve benzerlerini MUTLAKA kullan: kalb, nefis, ruh, cehd, itidal, ihsan, muhabbet, irade, fıtrat, inkisar, azm, tevekkül, rıza, gaflet, saadet, hüzün, müteşekkir, mütevazı, ledün, irfan, feyz, bâtın, zâhir, himmet, halvet, istikamet, mertebe, makam, kemal, zillet, izzet, nükte, letafet, hamiyet, hakikat, keşf, tecelli. Cümleler lirik, derin ve akıcı olsun. Klişe ve yüzeysel ifadelerden kaçın.

ÇOK ÖNEMLİ İSLAMİ HASSASİYET KURALLARI:
- Müslümanlara yazıyorsun. "Yaratmak", "yaratıcılık", "yaratıcı güç" gibi kelimeleri ASLA kullanma. Yaratmak yalnızca Allahu Teala'ya mahsustur.
- Bunların yerine "halk etmek", "var etmek", "ikram etmek", "ihsan etmek", "nasip etmek", "lütfetmek" kullan.
- "Tanrı" deme, "Allahu Teala", "Cenab-ı Hak", "Rabbimiz", "Mevla" de.
- "Evren", "doğa", "kader" gibi kelimeleri İslami çerçevede kullan: "Allahu Teala'nın takdiri", "Cenab-ı Hakk'ın hikmeti" gibi.
- Ayet ve hadis numarası verme, sadece genel manevi mesajlar ver.`;
  const prompt=`Kullanıcı "${test.title}" testini tamamladı.\nKavramlar: Tefrit (eksik uç)=${test.concepts.tefrit}, Fazilet (denge)=${test.concepts.fazilet}, İfrat (aşırı uç)=${test.concepts.ifrat}.\nSonuçlar: %${p.tefrit} ${test.concepts.tefrit}, %${p.fazilet} ${test.concepts.fazilet}, %${p.ifrat} ${test.concepts.ifrat}.\n\nŞu başlıkları sırayla kullanarak yaz (başlıkları **başlık** formatında yaz):\n**Selamlama** (2-3 cümle samimi karşılama)\n**Sonuçların Bir Aynası** (en az 6 cümle derin tahlil, sayısal sonuçları yorumla)\n**Tefekkür Köşesi** (en az 5 cümle hikmet geleneği)\n**İlahi Rehberlik** (en az 5 cümle manevi yönlendirme)\n**Pratik Adımlar** (en az 5 cümle somut öneriler)\n\nEn son satıra yalnızca şunu yaz: SONRAKI_TEST:key|gerekce (key şu listeden biri olmalı: ${otherKeys})`;
  try{
    const res=await fetch('/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system,prompt})});
    const reader=res.body.getReader(), decoder=new TextDecoder();
    let fullText='', buf='';
    while(true){
      const{done,value}=await reader.read(); if(done) break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: ')||line==='data: [DONE]') continue;
        try{
          const token=JSON.parse(line.slice(6)).choices?.[0]?.delta?.content||'';
          if(token){
            fullText+=token;
            S.gemini.text=fullText;
            const el=document.getElementById('gemini-stream');
            if(el){
              const cur=el.querySelector('.stream-cursor');
              if(cur) cur.remove();
              el.insertAdjacentText('beforeend',token);
              el.insertAdjacentHTML('beforeend','<span class="stream-cursor"></span>');
            }
          }
        }catch{}
      }
    }
    const flines=fullText.split('\n'), last=flines[flines.length-1].trim();
    if(last.startsWith('SONRAKI_TEST:')){
      const[k,g]=last.slice(13).split('|');
      S.gemini.sonraki_test={key:(k||'').trim(),gerekce:(g||'').trim()};
      fullText=flines.slice(0,-1).join('\n').trim();
    }
    S.gemini={streaming:false,text:fullText,sonraki_test:S.gemini.sonraki_test};
    S.history[S.testKey]={percentages:scores,geminiData:S.gemini,previousPercentages:S.previousScores}; saveAndSync(S.testKey, scores);
    // Barları sıfırlamamak için render yerine sadece gerekli alanları güncelle
    const gemBox2=document.getElementById('gemini-box');
    if(gemBox2) gemBox2.innerHTML=renderGeminiText(fullText);
    // Paylaş butonunu etkinleştir
    const shareBtn=document.querySelector('[data-action="share"]');
    if(shareBtn) shareBtn.disabled=false;
    // Sonraki test kartını ekle
    if(S.gemini.sonraki_test?.key&&TESTS[S.gemini.sonraki_test.key]){
      const nTest=TESTS[S.gemini.sonraki_test.key];
      const nextCard=document.getElementById('next-test-slot');
      if(nextCard) nextCard.innerHTML=`<div class="card mt-8 text-center">
        <p class="text-xs uppercase tracking-widest mb-2" style="color:var(--gold);opacity:0.6">Sıradaki Adım</p>
        <h3 class="font-display text-xl font-bold mb-3" style="color:var(--gold-light)">${nTest.concepts.fazilet}</h3>
        <p class="text-sm mb-4" style="color:var(--text-muted)">${S.gemini.sonraki_test.gerekce}</p>
        <button class="btn btn-emerald" data-action="startTest" data-key="${S.gemini.sonraki_test.key}">Teste Başla</button>
      </div>`;
    }
  }catch(e){
    S.gemini={streaming:false,text:'Bir hata oluştu. Lütfen tekrar deneyin.',sonraki_test:{key:'',gerekce:''}};
    const gemBox3=document.getElementById('gemini-box');
    if(gemBox3) gemBox3.innerHTML='<p style="color:#f87171">Bir hata oluştu. Lütfen tekrar deneyin.</p>';
  }
}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */
function animNums(){
  if(S.screen!=='result'||!S.scores) return;
  const p=pct(S.scores);

  // Animate numbers
  [['pt',p.tefrit],['pf',p.fazilet],['pi',p.ifrat]].forEach(([id,target])=>{
    const el=document.getElementById(id); if(!el) return;
    const t0=performance.now(), dur=1400;
    function step(now){
      const pr=Math.min((now-t0)/dur,1), ease=1-Math.pow(1-pr,3);
      el.textContent=Math.round(ease*target)+'%';
      if(pr<1) requestAnimationFrame(step);
    } requestAnimationFrame(step);
  });

  // Animate LED bars
  setTimeout(()=>{
    ['tefrit','fazilet','ifrat'].forEach(k=>{
      const bar=document.getElementById('bar-'+k);
      const glow=document.getElementById('glow-'+k);
      if(bar){ bar.style.height=Math.max(p[k],3)+'%'; }
      if(glow){ glow.style.opacity=p[k]>5?'0.6':'0'; }
    });
  },100);
}

/* ═══════════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════════ */
function attachEvents(){
  document.getElementById('app').addEventListener('click',e=>{
    const el=e.target.closest('[data-action]'); if(!el||el.disabled) return;
    const {action,key,score}=el.dataset;
    if(action==='goWelcome'){S.screen='welcome';render();}
    else if(action==='goStart'){S.screen='start';render();}
    else if(action==='goAbout'){S.screen='about';render();}
    else if(action==='goHistory'){S.screen='history';render();}
    else if(action==='goProfile'){S.screen='profile';render();setTimeout(()=>{if(typeof isTeacher==='function'&&isTeacher())loadTeacherClasses();else loadStudentClasses();},100);}
    else if(action==='createClass'){const n=document.getElementById('new-class-name');if(n?.value.trim()){createClass(n.value.trim()).then(()=>{n.value='';loadTeacherClasses();});}}
    else if(action==='joinClass'){const c=document.getElementById('join-code-input'),m=document.getElementById('join-msg');if(c?.value.trim()){joinClass(c.value.trim()).then(r=>{m.textContent=r.error||('Katıldın: '+r.data.name);m.style.color=r.error?'#f87171':'var(--emerald-light)';c.value='';loadStudentClasses();});}}
    else if(action==='viewClass'){S.classId=el.dataset.id;S.screen='classDetail';render();setTimeout(()=>loadClassDetail(S.classId),100);}
    else if(action==='goAdmin'){S.screen='admin';render();setTimeout(loadAdminPanel,100);}
    else if(action==='startTest'){S.testKey=key;S.answers={};S.qi=0;S.scores=null;S.gemini=null;S.loadingGemini=false;S.screen='quiz';render();}
    else if(action==='answer'){
      S.answers[S.qi]=parseInt(score); render();
      const test=TESTS[S.testKey];
      if(S.qi<test.questions.length-1) setTimeout(()=>{S.qi++;render();},350);
      else setTimeout(()=>calcAndShow(),350);
    }
    else if(action==='next'&&S.answers[S.qi]!==undefined){S.qi++;render();}
    else if(action==='prev'&&S.qi>0){S.qi--;render();}
    else if(action==='share') shareImg();
    else if(action==='toggleHistory'){S.expandedHistory=S.expandedHistory===key?null:key;render();}
    else if(action==='historyPdf'){generatePdfFromHistory(key);}
    else if(action==='shareWhatsapp'){
      const tk=key||S.testKey, sc=key?S.history[key].percentages:S.scores;
      window.open('https://wa.me/?text='+encodeURIComponent(buildShareText(tk,sc)),'_blank');
    }
    else if(action==='copyResult'){
      const tk=key||S.testKey, sc=key?S.history[key].percentages:S.scores;
      navigator.clipboard.writeText(buildShareText(tk,sc)).then(()=>{
        el.textContent='Kopyalandı!'; setTimeout(()=>{el.textContent='Kopyala';},2000);
      });
    }
  });
  if(S.screen==='result') setTimeout(animNums,100);
}

function calcAndShow(){
  let scores={tefrit:0,fazilet:0,ifrat:0};
  Object.values(S.answers).forEach(s=>{
    if(s===1)scores.tefrit+=2; else if(s===2)scores.tefrit+=1;
    else if(s===3)scores.fazilet+=2; else if(s===4)scores.ifrat+=1; else scores.ifrat+=2;
  });
  // Önceki sonucu kaydet (karşılaştırma için)
  S.previousScores=S.history[S.testKey]?{...S.history[S.testKey].percentages}:null;
  S.scores=scores; S.screen='result'; S.gemini=null; S.loadingGemini=false; render(); animNums();
  setTimeout(()=>fetchGemini(scores), 2200);
}

function compArrow(type,prev,curr){
  if(prev===curr) return '<span style="color:var(--text-muted)">→ %'+prev+'</span>';
  const isGood=type==='fazilet'?curr>prev:curr<prev;
  const arrow=curr>prev?'↑':'↓';
  const color=isGood?'var(--emerald)':'#f87171';
  return '<span style="color:'+color+'">'+arrow+' %'+prev+'</span>';
}

function buildPdf(testKey, scores, geminiText){
  const test=TESTS[testKey], p=pct(scores);
  const rawText=(geminiText||'').replace(/SONRAKI_TEST:.*/,'').trim();

  // Metni başlıklara göre parse et
  const sections=[];
  const parts=rawText.split(/\*\*(.+?)\*\*/g);
  for(let i=0;i<parts.length;i++){
    const txt=parts[i].trim();
    if(!txt) continue;
    if(i%2===1) sections.push({title:txt,body:''});
    else if(sections.length>0) sections[sections.length-1].body=txt;
    else sections.push({title:'',body:txt});
  }

  const gold='#8B6914', textCol='#1a1a2e', mutedCol='#555566';

  // Bar canvas fonksiyonu
  function makeBar(label, val, color){
    return {
      columns:[
        {text:label, fontSize:10, color:color, width:80, margin:[0,4,0,0]},
        {canvas:[
          {type:'rect',x:0,y:0,w:330,h:14,r:7,color:'#e8e8ee'},
          {type:'rect',x:0,y:0,w:Math.max((val/100)*330,4),h:14,r:7,color:color}
        ], width:'*', margin:[0,2,0,0]},
        {text:'%'+val, fontSize:14, bold:true, color:'#1a1a2e', width:50, alignment:'right', margin:[0,1,0,0]}
      ],
      margin:[0,6,0,6]
    };
  }

function buildShareText(testKey, scores){
  const test=TESTS[testKey], p=pct(scores);
  return `Kalbinin Haritası — ${test.concepts.fazilet}\n\n`+
    `${test.concepts.tefrit}: %${p.tefrit}\n`+
    `${test.concepts.fazilet}: %${p.fazilet}\n`+
    `${test.concepts.ifrat}: %${p.ifrat}\n\n`+
    `Sen de kalbinin haritasını çıkar:\nhttps://raufenc.com/kalbinin-haritasi/`;
}

function shareImg(){
  if(!S.gemini||S.gemini.streaming) return;
  buildPdf(S.testKey, S.scores, S.gemini.text);
}

function generatePdfFromHistory(key){
  const h=S.history[key];
  if(!h||!h.geminiData||!h.geminiData.text) return;
  buildPdf(key, h.percentages, h.geminiData.text);
}
