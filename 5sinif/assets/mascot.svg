<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- Body / Dress -->
  <path d="M62 148 C58 148 52 260 52 260 L148 260 C148 260 142 148 138 148 Z" fill="#2C3E6B"/>
  <!-- Dress collar -->
  <ellipse cx="100" cy="150" rx="40" ry="10" fill="#243258"/>
  <!-- Buttons on dress -->
  <circle cx="100" cy="170" r="3" fill="#243258"/>
  <circle cx="100" cy="185" r="3" fill="#243258"/>
  <!-- Crescent on dress -->
  <path d="M95 200 A7 7 0 1 1 95 214 A5 5 0 1 0 95 200" fill="#F0C040" opacity="0.85"/>
  <!-- Feet -->
  <ellipse cx="78" cy="262" rx="16" ry="7" fill="#1A2744"/>
  <ellipse cx="122" cy="262" rx="16" ry="7" fill="#1A2744"/>
  <!-- Left arm down -->
  <path d="M62 160 C48 172 44 200 50 218" stroke="#2C3E6B" stroke-width="16" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="220" r="9" fill="#E8B87A"/>
  <!-- Right arm pointing up -->
  <path d="M138 155 C155 140 158 115 150 100" stroke="#2C3E6B" stroke-width="16" stroke-linecap="round" fill="none"/>
  <circle cx="149" cy="97" r="9" fill="#E8B87A"/>
  <!-- Pointing finger hint -->
  <line x1="149" y1="97" x2="147" y2="85" stroke="#E8B87A" stroke-width="5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M138 245 C160 240 178 222 172 198" stroke="#D4945A" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M140 244 C162 239 176 224 170 202" stroke="#E8B87A" stroke-width="5" stroke-linecap="round" fill="none" stroke-dasharray="10 8"/>
  <!-- Head base -->
  <circle cx="100" cy="95" r="50" fill="#E8B87A"/>
  <!-- Ears poking through hijab -->
  <path d="M60 60 L52 22 L82 52 Z" fill="#E8B87A"/>
  <path d="M140 60 L148 22 L118 52 Z" fill="#E8B87A"/>
  <!-- Inner ears -->
  <path d="M63 55 L58 30 L78 52 Z" fill="#F4AAAA"/>
  <path d="M137 55 L142 30 L122 52 Z" fill="#F4AAAA"/>
  <!-- Hijab -->
  <path d="M46 82 C46 48 64 30 100 27 C136 30 154 48 154 82 L154 115 C154 132 142 148 100 153 C58 148 46 132 46 115 Z" fill="white" stroke="#E8E8E8" stroke-width="0.5"/>
  <!-- Hijab subtle folds -->
  <path d="M52 105 C58 120 72 138 85 148" stroke="#F0F0F0" stroke-width="1.5" fill="none"/>
  <path d="M148 105 C142 120 128 138 115 148" stroke="#F0F0F0" stroke-width="1.5" fill="none"/>
  <!-- Face -->
  <ellipse cx="100" cy="92" rx="37" ry="34" fill="#E8B87A"/>
  <!-- Forehead stripes -->
  <path d="M88 66 L93 58 L100 67 L107 58 L112 66" stroke="#D4945A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes - big anime style -->
  <ellipse cx="80" cy="88" rx="12" ry="13" fill="white"/>
  <ellipse cx="120" cy="88" rx="12" ry="13" fill="white"/>
  <circle cx="83" cy="88" r="8" fill="#4A3020"/>
  <circle cx="123" cy="88" r="8" fill="#4A3020"/>
  <!-- Eye shine -->
  <circle cx="86" cy="85" r="3.5" fill="white"/>
  <circle cx="126" cy="85" r="3.5" fill="white"/>
  <circle cx="80" cy="91" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="120" cy="91" r="1.5" fill="white" opacity="0.7"/>
  <!-- Cheek blush -->
  <ellipse cx="66" cy="98" rx="10" ry="6" fill="#F4AAAA" opacity="0.55"/>
  <ellipse cx="134" cy="98" rx="10" ry="6" fill="#F4AAAA" opacity="0.55"/>
  <!-- Nose -->
  <path d="M96 100 L100 105 L104 100 Z" fill="#D4945A"/>
  <!-- Mouth -->
  <path d="M92 108 Q100 115 108 108" stroke="#D4945A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="48" y1="94" x2="68" y2="98" stroke="#C4844A" stroke-width="1.2" opacity="0.5"/>
  <line x1="48" y1="103" x2="68" y2="103" stroke="#C4844A" stroke-width="1.2" opacity="0.5"/>
  <line x1="48" y1="112" x2="68" y2="108" stroke="#C4844A" stroke-width="1.2" opacity="0.5"/>
  <line x1="132" y1="98" x2="152" y2="94" stroke="#C4844A" stroke-width="1.2" opacity="0.5"/>
  <line x1="132" y1="103" x2="152" y2="103" stroke="#C4844A" stroke-width="1.2" opacity="0.5"/>
  <line x1="132" y1="108" x2="152" y2="112" stroke="#C4844A" stroke-width="1.2" opacity="0.5"/>
</svg>
