<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hilali Gördüm mü? — İnteraktif Ders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0e1a;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    width: 100%;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #1e3a5f;
  }

  .header h1 {
    font-size: 1.2rem;
    color: #f0c040;
    font-weight: 600;
  }

  .progress-bar-container {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    width: 200px;
    height: 8px;
    background: #1e3a5f;
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f0c040, #e8a020);
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 0.85rem;
    color: #8899aa;
    white-space: nowrap;
  }

  .main-container {
    width: 100%;
    max-width: 960px;
    padding: 20px;
    flex: 1;
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .video-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  /* Overlay — soru ekranı */
  .quiz-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(10, 14, 26, 0.92);
    backdrop-filter: blur(8px);
    z-index: 10;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 24px;
    overflow-y: auto;
    animation: fadeIn 0.4s ease;
  }

  .quiz-overlay.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quiz-badge {
    background: #f0c040;
    color: #0a0e1a;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .quiz-topic {
    font-size: 0.85rem;
    color: #8899aa;
    margin-bottom: 8px;
    text-align: center;
  }

  .quiz-question {
    font-size: 1.05rem;
    line-height: 1.6;
    text-align: center;
    max-width: 700px;
    margin-bottom: 24px;
    color: #f0f0f0;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 600px;
  }

  .quiz-option {
    background: rgba(30, 58, 95, 0.6);
    border: 2px solid #1e3a5f;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 0.95rem;
    line-height: 1.5;
    color: #d0d8e0;
    transition: all 0.25s ease;
    text-align: left;
  }

  .quiz-option:hover {
    border-color: #f0c040;
    background: rgba(240, 192, 64, 0.1);
    color: #fff;
    transform: translateX(4px);
  }

  .quiz-option.correct {
    border-color: #2ecc71;
    background: rgba(46, 204, 113, 0.15);
    color: #2ecc71;
  }

  .quiz-option.wrong {
    border-color: #e74c3c;
    background: rgba(231, 76, 60, 0.1);
    color: #e74c3c;
  }

  .quiz-option.disabled {
    pointer-events: none;
    opacity: 0.5;
  }

  /* Cevap sonrası açıklama */
  .quiz-feedback {
    display: none;
    max-width: 600px;
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 0.9rem;
    line-height: 1.6;
    text-align: left;
  }

  .quiz-feedback.show { display: block; }

  .quiz-feedback.correct-fb {
    background: rgba(46, 204, 113, 0.1);
    border: 1px solid #2ecc71;
    color: #a8e6cf;
  }

  .quiz-feedback.wrong-fb {
    background: rgba(231, 76, 60, 0.08);
    border: 1px solid #e74c3c;
    color: #f5b7b1;
  }

  .quiz-feedback strong {
    display: block;
    margin-bottom: 6px;
    font-size: 1rem;
  }

  .quiz-continue-btn {
    margin-top: 18px;
    background: linear-gradient(135deg, #f0c040, #e8a020);
    color: #0a0e1a;
    border: none;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: none;
  }

  .quiz-continue-btn.show { display: inline-block; }

  .quiz-continue-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 16px rgba(240, 192, 64, 0.4);
  }

  /* Skor paneli */
  .score-panel {
    margin-top: 20px;
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .score-card {
    background: rgba(30, 58, 95, 0.4);
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 14px 20px;
    text-align: center;
    min-width: 120px;
  }

  .score-card .label {
    font-size: 0.75rem;
    color: #6688aa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .score-card .value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #f0c040;
  }

  /* Konu zaman çizelgesi */
  .timeline {
    margin-top: 20px;
    display: flex;
    gap: 4px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .timeline-dot {
    width: 40px;
    height: 6px;
    border-radius: 3px;
    background: #1e3a5f;
    transition: background 0.3s;
  }

  .timeline-dot.answered-correct { background: #2ecc71; }
  .timeline-dot.answered-wrong { background: #e74c3c; }
  .timeline-dot.current { background: #f0c040; animation: pulse 1.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Bitiş ekranı */
  .completion-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }

  .completion-screen.active { display: flex; }

  .completion-icon {
    font-size: 4rem;
    margin-bottom: 16px;
  }

  .completion-title {
    font-size: 1.6rem;
    color: #f0c040;
    margin-bottom: 8px;
  }

  .completion-subtitle {
    font-size: 1rem;
    color: #8899aa;
    margin-bottom: 24px;
  }

  .completion-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }

  .completion-stat {
    background: rgba(30, 58, 95, 0.4);
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 20px 28px;
    text-align: center;
  }

  .completion-stat .num {
    font-size: 2rem;
    font-weight: 700;
    color: #f0c040;
  }

  .completion-stat .lbl {
    font-size: 0.8rem;
    color: #6688aa;
    margin-top: 4px;
  }

  .restart-btn {
    background: transparent;
    border: 2px solid #f0c040;
    color: #f0c040;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: #f0c040;
    color: #0a0e1a;
  }

  @media (max-width: 600px) {
    .quiz-question { font-size: 0.9rem; }
    .quiz-option { font-size: 0.85rem; padding: 10px 14px; }
    .header h1 { font-size: 1rem; }
    .progress-bar { width: 120px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>&#9790; Hilali Gördüm mü?</h1>
  <div class="progress-bar-container">
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-text" id="progressText">0 / 5 soru</span>
  </div>
</div>

<div class="main-container">
  <div class="video-wrapper" id="videoWrapper">
    <div id="player"></div>
    <div class="quiz-overlay" id="quizOverlay">
      <div class="quiz-badge" id="quizBadge">Soru 1/5</div>
      <div class="quiz-topic" id="quizTopic"></div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="quiz-continue-btn" id="quizContinue" onclick="continueVideo()">Videoya Devam Et &#9654;</button>
    </div>
  </div>

  <div class="timeline" id="timeline"></div>

  <div class="score-panel">
    <div class="score-card">
      <div class="label">Doğru</div>
      <div class="value" id="correctCount">0</div>
    </div>
    <div class="score-card">
      <div class="label">Yanlış</div>
      <div class="value" id="wrongCount">0</div>
    </div>
    <div class="score-card">
      <div class="label">Başarı</div>
      <div class="value" id="scorePercent">—</div>
    </div>
  </div>

  <div class="completion-screen" id="completionScreen">
    <div class="completion-icon">&#9790;</div>
    <div class="completion-title">Ders Tamamlandı!</div>
    <div class="completion-subtitle" id="completionMsg"></div>
    <div class="completion-stats">
      <div class="completion-stat">
        <div class="num" id="finalCorrect">0</div>
        <div class="lbl">Doğru</div>
      </div>
      <div class="completion-stat">
        <div class="num" id="finalWrong">0</div>
        <div class="lbl">Yanlış</div>
      </div>
      <div class="completion-stat">
        <div class="num" id="finalScore">0%</div>
        <div class="lbl">Başarı</div>
      </div>
    </div>
    <button class="restart-btn" onclick="restartLesson()">Tekrar İzle</button>
  </div>
</div>

<script>
// =====================================================
// SORU VERİLERİ
// =====================================================
const quizData = [
  {
    time: 137, // 02:17
    topic: "Yeni Ay ve Kavuşum (İçtimai Neyyireyn)",
    question: "Güneş, Ay ve Dünya'nın aynı hizaya geldiği 'Yeni Ay' evresinde, dünyadan gökyüzüne baktığımızda Ay'ı neden göremeyiz?",
    options: [
      "Ay, Dünya'nın gölgesinde kaldığı için (Ay tutulması gibi)",
      "Ay'ın bize dönük yüzü tamamen karanlıkta kalır ve Güneş'in ışıkları arasında kaybolur",
      "Ay o sırada ufkun altında olduğu için görünmez",
      "Atmosfer kirliliği ve hava koşulları nedeniyle"
    ],
    correct: 1,
    explanation: "Yeni Ay evresinde Ay'ın bize dönük olan yüzü tamamen karanlıkta kalır. Arka planda Güneş olduğu için Ay'ın karanlık yüzü Güneş'in şiddetli ışıkları arasında kaybolur. Bu evrede hilal henüz oluşmamıştır."
  },
  {
    time: 431, // 07:11
    topic: "Ay'ın Evreleri ve Zaman Tahmini",
    question: "Kuzey yarım kürede gökyüzüne baktığınızda Ay'ın sağ alt tarafının aydınlık olduğunu görüyorsanız, İslami ayların hangi yarısındasınızdır?",
    options: [
      "Ayın son yarısındayızdır, Ay küçülüyor demektir",
      "Dolunay evresindeyizdir, tam ortadayızdır",
      "Ayın ilk yarısındayızdır, Ay büyüyor demektir",
      "Bu bilgiyle ayın hangi yarısında olduğumuz anlaşılmaz"
    ],
    correct: 2,
    explanation: "Kuzey yarım kürede ışık sağ alttan başlıyorsa Ay doğuyor (büyüyor) demektir, yani ayın ilk yarısındasınızdır. Sol alttan geliyorsa Ay batıyor (küçülüyor) demektir, ayın son yarısındasınızdır."
  },
  {
    time: 681, // 11:21
    topic: "Hilalin İlk Görülme Şartları (Astronomik Boyut)",
    question: "Yeni Ay evresinden sonra hilalin dünyadan ilk defa görülebilir hale gelmesi için Güneş ile Ay arasındaki açının en az kaç derece açılması gerekir?",
    options: [
      "En az 2 derece (yaklaşık 3-4 saat)",
      "En az 5 derece (yaklaşık 8-10 saat)",
      "En az 8 derece (yaklaşık 14-22 saat)",
      "En az 15 derece (yaklaşık 1-2 gün)"
    ],
    correct: 2,
    explanation: "Hilalin görülebilmesi için Güneş ile Ay arasındaki açının minimum 8 derece açılması gerekir. Bu da yaklaşık 14 ile 22 saat arasında bir süreye denk gelir. Bu süre geçmeden hilal, Güneş'in ışık alanından yeterince uzaklaşamaz."
  },
  {
    time: 1561, // 26:01
    topic: "Temel Fıkhi İhtilaflar (Dini Boyut)",
    question: "İslami takvimde yeni ayın başlangıcını belirlerken, 'kavuşum mu baz alınsın yoksa hilal mi görülsün?' sorusunun yanı sıra diğer iki temel ihtilaf konusu nedir?",
    options: [
      "Hilalin rengi ve büyüklüğü ile gözlem yapılacak saat dilimi",
      "Hilal çıplak gözle mi teleskopla mı görülmeli ve bir yerdeki gözlem tüm dünyayı bağlar mı",
      "Astronomik hesap mı yoksa tanık beyanı mı esas alınmalı ve hangi mezhep doğrudur",
      "Ramazan'ın 29 mu 30 gün mü süreceği ve bayram namazının vakti"
    ],
    correct: 1,
    explanation: "İki temel ihtilaf: 1) Hilal mutlaka çıplak gözle mi görülmeli yoksa teleskopla görülmesi yeterli midir? 2) İhtilaf-ı Metali: Dünyanın herhangi bir yerinde hilalin görülmesi tüm Müslümanları bağlar mı, yoksa herkes kendi bölgesinde mi görmelidir? Takvim farklılıkları hesap hatalarından değil, bu fıkhi yorumlardan kaynaklanır."
  },
  {
    time: 1989, // 33:09
    topic: "Çözüm ve İhtiyat (Pratik Boyut)",
    question: "Hilal gözlemindeki fıkhi ihtilaflar ve takvim farklılıklarından dolayı ibadetleri riske atmamak için, Ramazan ayı bittikten sonra ne yapılması tavsiye edilir?",
    options: [
      "Sadece Diyanet'in takvimine uymak yeterlidir, ek bir şey gerekmez",
      "Ramazan'dan sonra ihtiyaten 2 gün kaza veya nafile orucu tutulması tavsiye edilir",
      "Üç farklı ülkenin takvimini karşılaştırıp en uzun olanını takip etmek gerekir",
      "Bir sonraki Ramazan'a kadar her ay 1 gün oruç tutmak gerekir"
    ],
    correct: 1,
    explanation: "Olası 1-2 günlük hesap kaymalarına veya gözlem farklılıklarına karşı garantici davranarak, Ramazan'dan sonra ihtiyaten 2 gün kaza veya nafile orucu tutulması tavsiye edilir. Bu, karmaşık ihtilaflar içinde boğulmadan ibadet güvenliğini sağlamanın en pratik yoludur."
  }
];

// =====================================================
// DURUM YÖNETİMİ
// =====================================================
let player;
let currentQuizIndex = 0;
let correctCount = 0;
let wrongCount = 0;
let answeredQuestions = new Set();
let checkInterval;
let videoEnded = false;
let maxWatchedTime = 0; // İleri sarma engeli için

// =====================================================
// SCORM API
// =====================================================
let scormAPI = null;

function findSCORMAPI(win) {
  let attempts = 0;
  while (win && attempts < 10) {
    if (win.API) return win.API;
    if (win.API_1484_11) return win.API_1484_11;
    if (win === win.parent) break;
    win = win.parent;
    attempts++;
  }
  if (window.opener) {
    let opWin = window.opener;
    attempts = 0;
    while (opWin && attempts < 10) {
      if (opWin.API) return opWin.API;
      if (opWin.API_1484_11) return opWin.API_1484_11;
      if (opWin === opWin.parent) break;
      opWin = opWin.parent;
      attempts++;
    }
  }
  return null;
}

function scormInit() {
  scormAPI = findSCORMAPI(window);
  if (scormAPI) {
    scormAPI.LMSInitialize('');
    scormAPI.LMSSetValue('cmi.core.lesson_status', 'incomplete');
    scormAPI.LMSCommit('');
    console.log('SCORM initialized');
  } else {
    console.log('No SCORM API found — standalone mode');
  }
}

function scormSetScore(score) {
  if (!scormAPI) return;
  scormAPI.LMSSetValue('cmi.core.score.min', '0');
  scormAPI.LMSSetValue('cmi.core.score.max', '100');
  scormAPI.LMSSetValue('cmi.core.score.raw', String(score));
  scormAPI.LMSCommit('');
}

function scormComplete(passed) {
  if (!scormAPI) return;
  scormAPI.LMSSetValue('cmi.core.lesson_status', passed ? 'passed' : 'failed');
  scormAPI.LMSCommit('');
  scormAPI.LMSFinish('');
}

// =====================================================
// YOUTUBE PLAYER
// =====================================================
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: 'zMzdmhMURRs',
    playerVars: {
      rel: 0,
      modestbranding: 1,
      cc_load_policy: 0,
      iv_load_policy: 3
    },
    events: {
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  scormInit();
  buildTimeline();
  startTimeCheck();
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    onVideoEnd();
  }
}

function startTimeCheck() {
  checkInterval = setInterval(() => {
    if (!player || typeof player.getCurrentTime !== 'function') return;
    if (player.getPlayerState() !== YT.PlayerState.PLAYING) return;

    const currentTime = player.getCurrentTime();

    // İleri sarma engeli: izlenen en ileri noktanın 2sn ötesine atlamayı engelle
    if (currentTime > maxWatchedTime + 3) {
      player.seekTo(maxWatchedTime, true);
      return;
    }

    // İzlenen en ileri noktayı güncelle
    if (currentTime > maxWatchedTime) {
      maxWatchedTime = currentTime;
    }

    for (let i = 0; i < quizData.length; i++) {
      if (!answeredQuestions.has(i) && currentTime >= quizData[i].time && currentTime < quizData[i].time + 2) {
        showQuiz(i);
        break;
      }
    }
  }, 500);
}

// =====================================================
// SORU GÖSTERİMİ
// =====================================================
function showQuiz(index) {
  player.pauseVideo();
  currentQuizIndex = index;

  const q = quizData[index];
  const overlay = document.getElementById('quizOverlay');
  const badge = document.getElementById('quizBadge');
  const topic = document.getElementById('quizTopic');
  const question = document.getElementById('quizQuestion');
  const optionsDiv = document.getElementById('quizOptions');
  const feedback = document.getElementById('quizFeedback');
  const continueBtn = document.getElementById('quizContinue');

  badge.textContent = `Soru ${index + 1} / ${quizData.length}`;
  topic.textContent = q.topic;
  question.textContent = q.question;

  optionsDiv.innerHTML = '';
  feedback.className = 'quiz-feedback';
  feedback.style.display = 'none';
  continueBtn.className = 'quiz-continue-btn';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'quiz-option';
    btn.textContent = String.fromCharCode(65 + i) + ') ' + opt;
    btn.onclick = () => selectAnswer(index, i);
    optionsDiv.appendChild(btn);
  });

  overlay.classList.add('active');
  updateTimeline(index, 'current');
}

function selectAnswer(qIndex, selectedIndex) {
  const q = quizData[qIndex];
  const isCorrect = selectedIndex === q.correct;
  const options = document.querySelectorAll('.quiz-option');
  const feedback = document.getElementById('quizFeedback');
  const continueBtn = document.getElementById('quizContinue');

  // Tüm seçenekleri devre dışı bırak
  options.forEach((opt, i) => {
    opt.classList.add('disabled');
    if (i === q.correct) opt.classList.add('correct');
    if (i === selectedIndex && !isCorrect) opt.classList.add('wrong');
  });

  // Skor güncelle
  if (isCorrect) {
    correctCount++;
    feedback.className = 'quiz-feedback show correct-fb';
    feedback.innerHTML = '<strong>&#10004; Doğru!</strong>' + q.explanation;
  } else {
    wrongCount++;
    feedback.className = 'quiz-feedback show wrong-fb';
    feedback.innerHTML = '<strong>&#10008; Yanlış</strong>' + q.explanation;
  }

  answeredQuestions.add(qIndex);
  updateScoreDisplay();
  updateTimeline(qIndex, isCorrect ? 'answered-correct' : 'answered-wrong');

  continueBtn.classList.add('show');
}

function continueVideo() {
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.remove('active');
  player.playVideo();
}

// =====================================================
// SKOR & İLERLEME
// =====================================================
function updateScoreDisplay() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;

  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePercent').textContent = total > 0 ? pct + '%' : '—';

  const progressPct = (total / quizData.length) * 100;
  document.getElementById('progressFill').style.width = progressPct + '%';
  document.getElementById('progressText').textContent = total + ' / ' + quizData.length + ' soru';
}

function buildTimeline() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  quizData.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'timeline-dot';
    dot.id = 'dot-' + i;
    dot.title = quizData[i].topic;
    timeline.appendChild(dot);
  });
}

function updateTimeline(index, state) {
  const dot = document.getElementById('dot-' + index);
  if (dot) {
    dot.className = 'timeline-dot ' + state;
  }
}

// =====================================================
// BİTİŞ
// =====================================================
function onVideoEnd() {
  if (videoEnded) return;
  videoEnded = true;

  // Cevaplanmamış soruları kontrol et
  if (answeredQuestions.size < quizData.length) {
    // Atlanmış sorular var — bunları sırayla göster
    for (let i = 0; i < quizData.length; i++) {
      if (!answeredQuestions.has(i)) {
        player.seekTo(quizData[i].time, true);
        showQuiz(i);
        videoEnded = false;
        return;
      }
    }
  }

  showCompletionScreen();
}

function showCompletionScreen() {
  clearInterval(checkInterval);

  const total = quizData.length;
  const pct = Math.round((correctCount / total) * 100);

  document.getElementById('finalCorrect').textContent = correctCount;
  document.getElementById('finalWrong').textContent = wrongCount;
  document.getElementById('finalScore').textContent = pct + '%';

  let msg = '';
  if (pct >= 80) msg = 'Mükemmel! Konuyu çok iyi anlamışsınız.';
  else if (pct >= 60) msg = 'İyi! Birkaç noktayı tekrar gözden geçirebilirsiniz.';
  else msg = 'Konuyu tekrar izlemenizi tavsiye ederiz.';

  document.getElementById('completionMsg').textContent = msg;
  document.getElementById('completionScreen').classList.add('active');

  // SCORM raporla
  scormSetScore(pct);
  scormComplete(pct >= 60);
}

function restartLesson() {
  correctCount = 0;
  wrongCount = 0;
  answeredQuestions.clear();
  videoEnded = false;
  currentQuizIndex = 0;
  maxWatchedTime = 0;

  updateScoreDisplay();
  buildTimeline();

  document.getElementById('completionScreen').classList.remove('active');
  document.getElementById('quizOverlay').classList.remove('active');

  player.seekTo(0, true);
  player.playVideo();
  startTimeCheck();
}
</script>
