<!DOCTYPE html>
<html lang="tr">
<head>
<script src="/lib/design-system/theme.js"></script>
<link rel="stylesheet" href="/lib/design-system/tokens.css"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kesfet — Islam Bilim Yildizlari</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <div class="sec-header" style="padding-top:24px">
    <h2>🔭 Kesfet</h2>
    <p>85 Islam bilginini filtrele, ara ve tani.</p>
  </div>

  <div class="controls">
    <div class="controls-inner">
      <div class="controls-row">
        <div class="autocomplete-wrap">
          <input type="text" class="search-box" id="search" placeholder="🔍 Alim, eser veya katkı ara..." autocomplete="off"/>
          <div class="autocomplete-dropdown" id="ac-dropdown"></div>
        </div>
        <button class="fav-filter-btn" id="fav-filter" onclick="toggleFavFilter()">❤️ Favorilerim</button>
        <button class="filter-btn" id="compare-toggle" onclick="toggleCompareMode()">⚖️ Karşılaştır</button>
      </div>
      <div class="controls-row" id="filter-alan-row">
        <span class="filter-label">Alan:</span>
      </div>
      <div class="controls-row" id="filter-donem-row">
        <span class="filter-label">Donem:</span>
      </div>
      <div class="controls-row" id="filter-bolge-row">
        <span class="filter-label">Bolge:</span>
      </div>
    </div>
  </div>

  <div class="results-count" id="results-count"></div>
  <div class="cards-grid" id="cards-grid"></div>

  <div class="compare-bar" id="compare-bar" style="display:none">
    <span id="compare-count">0</span> alim seçildi
    <button class="btn-primary" style="padding:6px 14px;font-size:11px" onclick="showCompare()">Karşılaştır</button>
    <button class="btn-secondary" style="padding:6px 10px;font-size:11px" onclick="clearCompare()">Temizle</button>
  </div>

  <div class="modal-overlay" id="compare-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal-box" style="max-width:900px">
      <button class="modal-close" onclick="document.getElementById('compare-modal').classList.remove('open')">✕</button>
      <div class="modal-header"><div class="modal-header-bar"></div><h3 style="font-size:18px;font-weight:900;margin-top:8px">⚖️ Karşılaştırma</h3></div>
      <div class="modal-body" id="compare-body"></div>
    </div>
  </div>
</div>

<script src="data/bilginler.js"></script>
<script src="data/bolgeler.js"></script>
<script src="js/shared.js"></script>
<script src="js/alimler.js"></script>
</body>
</html>
