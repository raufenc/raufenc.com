<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>BİA Yönetim Paneli</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

/* TOP BAR */
.topbar { background: #E20439; color: #fff; padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
.topbar-title { font-weight: 700; font-size: 1rem; white-space: nowrap; }
.topbar-nav { margin-left: auto; display: flex; gap: 8px; align-items: center; overflow-x: auto; max-width: calc(100vw - 160px); padding-bottom: 2px; }
.topbar-nav::-webkit-scrollbar { height: 3px; }
.topbar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.3); border-radius: 2px; }
.topbar-btn { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 6px 14px; border-radius: 6px; font-size: .85rem; cursor: pointer; font-weight: 600; white-space: nowrap; }
.topbar-btn:hover { background: rgba(255,255,255,.25); }
.topbar-btn.green { background: rgba(255,255,255,.9); color: #E20439; }
.topbar-btn.green:hover { background: #fff; }

/* LAYOUT */
.container { max-width: 860px; margin: 28px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: 28px; margin-bottom: 20px; }

/* FORM FIELDS */
.field { margin-bottom: 18px; }
.field label { display: block; font-size: .83rem; font-weight: 600; color: #555; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: .95rem; font-family: inherit; transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #E20439; box-shadow: 0 0 0 3px rgba(226,4,57,.08); }
.field textarea { min-height: 160px; resize: vertical; }
.field-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:600px) { .field-2 { grid-template-columns: 1fr; } }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; border: none; transition: background .15s; text-decoration: none; }
.btn-red { background: #E20439; color: #fff; }
.btn-red:hover { background: #B00030; }
.btn-gray { background: #f1f5f9; color: #334155; }
.btn-gray:hover { background: #e2e8f0; }
.btn-del { background: #fff; color: #dc2626; border: 1.5px solid #fca5a5; }
.btn-del:hover { background: #fef2f2; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* NOTICE */
.notice { padding: 12px 16px; border-radius: 8px; font-size: .88rem; margin-bottom: 16px; }
.ok { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.err { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
.info { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

/* NEWS LIST */
.list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.list-header h1 { font-size: 1.2rem; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filter { padding: 5px 13px; border-radius: 20px; font-size: .8rem; border: none; cursor: pointer; background: #f1f5f9; color: #475569; font-weight: 500; }
.filter.on { background: #E20439; color: #fff; }
.news-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .1s; }
.news-item:hover { background: #fafafa; }
.news-item:last-child { border-bottom: none; }
.ni-date { font-size: .8rem; color: #888; white-space: nowrap; min-width: 90px; }
.ni-title { flex: 1; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ni-star { font-size: .85rem; }
.badge { display: inline-block; padding: 2px 9px; border-radius: 12px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
.b-duyuru { background: #dbeafe; color: #1d4ed8; }
.b-haber { background: #dcfce7; color: #15803d; }
.b-etkinlik { background: #fef9c3; color: #854d0e; }
.b-icerik { background: #f3e8ff; color: #7e22ce; }
.empty { text-align: center; padding: 40px; color: #aaa; font-size: .9rem; }

/* EDIT FORM */
.edit-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.edit-header h1 { font-size: 1.2rem; }
.edit-footer { display: flex; gap: 10px; margin-top: 20px; align-items: center; }

/* SPINNER */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SESSION TIMEOUT BAR */
#sessionBar { position: fixed; bottom: 0; left: 0; right: 0; background: #fef3c7; color: #92400e; text-align: center; padding: 6px; font-size: .8rem; display: none; z-index: 200; }
</style>
</head>

<!-- SESSION TIMEOUT BAR -->
<div id="sessionBar"></div>

<script>
// ── GÜVENLİK: Oturum kontrolü ──
if (!sessionStorage.getItem('biaToken') && !sessionStorage.getItem('biaPw')) {
  window.location.replace('index.html');
  throw new Error('Unauthorized');
}

const API = '/api/bia-news';
const CATS = {haber:'Haber', duyuru:'Duyuru', etkinlik:'Etkinlik', icerik:'Icerik'};
const TR = {'ş':'s','ı':'i','ö':'o','ü':'u','ç':'c','ğ':'g','â':'a','î':'i','û':'u'};

// Kullanıcı adını göster
const biaName = sessionStorage.getItem('biaName');
if (biaName && biaName !== 'Admin') {
  document.getElementById('userBadge').textContent = biaName;
}

// ── GÜVENLİK: Upload dosya tipi kontrolleri ──
const ALLOWED_UPLOAD_TYPES = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
const ALLOWED_UPLOAD_EXTS = ['.jpg', '.jpeg', '.png', '.webp', '.gif'];
const MAX_UPLOAD_SIZE = 5 * 1024 * 1024; // 5MB

// ── GÜVENLİK: DOMPurify yapılandırması ──
const PURIFY_CONFIG = {
  ALLOWED_TAGS: ['p','br','strong','em','b','i','u','h2','h3','h4','ul','ol','li','a','img','blockquote','span','div','hr','sub','sup','table','thead','tbody','tr','td','th'],
  ALLOWED_ATTR: ['href','src','alt','class','target','rel','width','height'],
  FORBID_TAGS: ['script','iframe','object','embed','form','input','style','link','meta','base','svg','math'],
  FORBID_ATTR: ['onerror','onclick','onload','onmouseover','onfocus','onblur','onchange','onsubmit','style'],
  ALLOW_DATA_ATTR: false,
};

function sanitizeHTML(html) {
  if (typeof DOMPurify !== 'undefined') {
    return DOMPurify.sanitize(html, PURIFY_CONFIG);
  }
  // Fallback: temel temizlik
  return html.replace(/<script[\s\S]*?<\/script>/gi, '')
    .replace(/on\w+\s*=\s*["'][^"']*["']/gi, '')
    .replace(/javascript\s*:/gi, '');
}

let pw    = sessionStorage.getItem('biaPw') || '';
let token = sessionStorage.getItem('biaToken') || '';
let news = [], sha = '', editIdx = null, filter = '';
let events = [], eventsSha = '', eventEditIdx = null;

// ── GÜVENLİK: Session timeout (30 dakika) ──
const SESSION_TIMEOUT = 30 * 60 * 1000;
const SESSION_WARN = 5 * 60 * 1000;
let lastActivity = Date.now();

function resetActivity() { lastActivity = Date.now(); hideSessionBar(); }
document.addEventListener('click', resetActivity);
document.addEventListener('keypress', resetActivity);
document.addEventListener('scroll', resetActivity);

function hideSessionBar() { document.getElementById('sessionBar').style.display = 'none'; }

setInterval(() => {
  const elapsed = Date.now() - lastActivity;
  const remaining = SESSION_TIMEOUT - elapsed;
  if (remaining <= 0) {
    logout();
    alert('Oturum zaman asimina ugradi. Lutfen tekrar giris yapin.');
  } else if (remaining <= SESSION_WARN) {
    const mins = Math.ceil(remaining / 60000);
    const bar = document.getElementById('sessionBar');
    bar.textContent = `Oturum ${mins} dakika icinde sona erecek. Devam etmek icin herhangi bir yere tiklayin.`;
    bar.style.display = 'block';
  }
}, 30000);

// ── API HELPER (JWT Bearer > X-Admin-Key > legacy) ──
function authHeaders() {
  if (token) return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  return { 'Content-Type': 'application/json', 'X-Admin-Key': pw };
}

async function apiFetch(params) {
  // GET ile veri oku (token veya password ile)
  const qs = new URLSearchParams(params);
  if (!token) qs.set('password', pw);
  const r = await fetch(`${API}?${qs}`, {
    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
  });
  if (r.status === 401) { logout(); throw new Error('Oturum suresi doldu'); }
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Sunucu hatasi');
  return d;
}

async function apiSave(params) {
  const body = token ? { ...params } : { ...params, password: pw };
  const r = await fetch(API, {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (r.status === 401) { logout(); throw new Error('Oturum süresi doldu'); }
  if (!r.ok) throw new Error(d.error || 'Sunucu hatasi');
  return d;
}

function slugify(t) {
  return t.toLowerCase().replace(/[şıöüçğâîû]/g,c=>TR[c]||c)
    .normalize('NFKD').replace(/[^\w\s-]/g,'').replace(/[-\s]+/g,'-').replace(/^-|-$/g,'').slice(0,80);
}
function autoSlug() {
  const t = document.getElementById('fTitle').value;
  document.getElementById('fSlug').value = slugify(t);
}

// ── SCREEN HELPER ──
const ALL_SCREENS = ['mainScreen','editScreen','eventsScreen','eventEditScreen','siteScreen','homepageScreen','faqScreen','programsScreen'];
function showScreen(id) {
  ALL_SCREENS.forEach(s => { const el = document.getElementById(s); if(el) el.style.display = 'none'; });
  const target = document.getElementById(id);
  if (target) target.style.display = 'block';
  resetActivity();
}

// ── HABERLERİ YÜKLE ──
async function loadNews() {
  try {
    const d = await apiFetch({ type: 'news' });
    news = d.data; sha = d.sha;
    showMain();
  } catch(e) {
    alert('Haberler yuklenemedi: ' + e.message);
    logout();
  }
}

function renderList() {
  const filtered = filter ? news.filter(n => n.category === filter) : news;
  let fb = `<button class="filter ${!filter?'on':''}" onclick="setFilter('')">Tumu (${news.length})</button>`;
  Object.entries(CATS).forEach(([k,v]) => {
    const cnt = news.filter(n=>n.category===k).length;
    fb += `<button class="filter ${filter===k?'on':''}" onclick="setFilter('${k}')">${v} (${cnt})</button>`;
  });
  document.getElementById('filterBar').innerHTML = fb;

  if (!filtered.length) {
    document.getElementById('newsList').innerHTML = '<div class="empty">Henuz kayit yok</div>';
    return;
  }
  document.getElementById('newsList').innerHTML = filtered.map(item => {
    const i = news.indexOf(item);
    const cat = item.category || 'haber';

function cleanHtml() {
  const ta = document.getElementById('fContent');
  let h = ta.value;
  if (!h.trim()) return;
  h = h.replace(/\s*(style|face|color|size|class|align|dir|lang|data-[^=]*)="[^"]*"/gi, '');
  h = h.replace(/<span>\s*<\/span>/gi, '');
  h = h.replace(/<div>\s*<\/div>/gi, '');
  h = h.replace(/<font[^>]*>([\s\S]*?)<\/font>/gi, '$1');
  h = h.replace(/<o:p[^>]*>[\s\S]*?<\/o:p>/gi, '');
  h = h.replace(/(<br\s*\/?>\s*){3,}/gi, '<br><br>');
  h = h.replace(/>\s{2,}</g, '> ');
  h = h.replace(/<p>\s*<\/p>/gi, '');
  ta.value = sanitizeHTML(h.trim());
  document.getElementById('editNotice').innerHTML = '<div class="notice ok">HTML temizlendi ve guvenli hale getirildi.</div>';
  setTimeout(() => { document.getElementById('editNotice').innerHTML = ''; }, 2000);
}

// ── GÜVENLİK: Dosya yükleme kontrolleri ──
async function uploadImage(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('imgUploadStatus');
  const btn = document.getElementById('uploadImgBtn');

  // Dosya tipi kontrolü
  if (!ALLOWED_UPLOAD_TYPES.includes(file.type)) {
    status.innerHTML = '<span style="color:#dc2626;">Gecersiz dosya tipi. Yalnizca JPG, PNG, WebP ve GIF kabul edilir.</span>';
    input.value = '';
    return;
  }

  // Uzanti kontrolü
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  if (!ALLOWED_UPLOAD_EXTS.includes(ext)) {
    status.innerHTML = '<span style="color:#dc2626;">Gecersiz dosya uzantisi. Yalnizca .jpg, .png, .webp, .gif kabul edilir.</span>';
    input.value = '';
    return;
  }

  // Cift uzanti kontrolü (ornek: foto.php.jpg)
  const nameParts = file.name.split('.');
  if (nameParts.length > 2) {
    const dangerousExts = ['php','js','html','htm','svg','exe','bat','sh','py','rb','pl','cgi','asp','aspx','jsp'];
    for (let i = 0; i < nameParts.length - 1; i++) {
      if (dangerousExts.includes(nameParts[i].toLowerCase())) {
        status.innerHTML = '<span style="color:#dc2626;">Supheli dosya adi reddedildi.</span>';
        input.value = '';
        return;
      }
    }
  }

  // Boyut kontrolü
  if (file.size > MAX_UPLOAD_SIZE) {
    status.innerHTML = '<span style="color:#dc2626;">Dosya cok buyuk (max 5MB).</span>';
    input.value = '';
    return;
  }

  btn.disabled = true;
  status.innerHTML = '<span style="color:#888;">Yukleniyor...</span>';

  try {
    const base64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });

    const ts = Date.now();
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const filename = `${ts}_${safeName}`;

    const d = await apiSave({ type: 'upload', filename, content: base64 });

    document.getElementById('fImage').value = d.url;
    updateImgPreview(d.url);
    status.innerHTML = '<span style="color:#15803d;">Yuklendi!</span>';
    setTimeout(() => { status.innerHTML = ''; }, 3000);
  } catch(e) {
    status.innerHTML = `<span style="color:#dc2626;">${e.message}</span>`;
  }
  btn.disabled = false;
  input.value = '';
}

      <div class="field-2">
        <div class="field"><label>Ikon</label><input type="text" value="${safeIcon}" onchange="programsData[${i}].icon=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;"></div>
        <div class="field"><label>Baslik</label><input type="text" value="${safeTitle}" onchange="programsData[${i}].title=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;"></div>
      </div>
      <div class="field"><label>Kisa Aciklama</label><input type="text" value="${safeShort}" onchange="programsData[${i}].short=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;"></div>
      <div class="field-2">
        <div class="field"><label>Hedef Kitle</label><input type="text" value="${safeTarget}" onchange="programsData[${i}].target=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;"></div>
        <div class="field"><label>Model</label><input type="text" value="${safeModel}" onchange="programsData[${i}].model=this.value" style="width:100%;padding:8px 12px;border:1.5px solid #d1d5db;border-radius:8px;"></div>
      </div>
    </div>`;
  }).join('');
}

async function savePrograms() {
  const btn = document.getElementById('saveProgramsBtn');
  btn.disabled = true; btn.textContent = 'Kaydediliyor...';
  try {
    const d = await apiSave({ type: 'programs', data: programsData, sha: programsSha, message: 'BIA: Programlar guncellendi' });
    programsSha = d.sha;
    document.getElementById('programsNotice').innerHTML = '<div class="notice ok">Kaydedildi!</div>';
  } catch(e) {
    document.getElementById('programsNotice').innerHTML = `<div class="notice err">${e.message}</div>`;
  }
  btn.disabled = false; btn.textContent = 'Tumunu Kaydet';
}

function logout() {
  sessionStorage.clear();
  document.cookie = 'bia_auth=; path=/birlikteiyilik-v2/yonetim; max-age=0; SameSite=Lax';
  window.location.replace('index.html');
}

// ── BAŞLANGIÇ ──
loadNews();
