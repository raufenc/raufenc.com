a.\nAnime AI:\nTanımı: Kullanıcıların yapay zekâ destekli araçlar kullanarak \nanime tarzında görseller oluşturmasına olanak tanıyan bir \nplatformdur. Bu tür platformlar, genellikle çizim becerisi ol -\nmayan kullanıcıların bile anime karakterleri, sahneleri veya \ntamamen özgün sanatsal tasarımlar oluşturmasına yardımcı \nolur. Anime AI, özellikle anime severler, dijital sanatçılar ve \niçerik üreticileri için popülerdir. \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n188"}, {"page": 189, "text": "Temel Özellikler:\n ¬ Anime Karakteri Oluşturma: Anime AI, kullanıcıların metin \ngirdileri, referans görselleri veya belirli özelliklere dayalı \nolarak anime tarzında karakterler oluşturmasını sağlar. \nKullanıcılar, saç rengi, göz şekli, kıyafetler ve pozlar gibi \nçeşitli detayları özelleştirebilirler.\n ¬ Sanatsal Stil ve Efektler: Platform, farklı anime stilleri ve \nefektleri sunarak kullanıcıların istedikleri estetik görünümü \nelde etmelerine olanak tanır. Kullanıcılar, daha geleneksel \nanime tarzından modern ve stilize edilmiş görsellere kadar \nçeşitli seçenekler arasından seçim yapabilirler.\n ¬ Yapay Zekâ Destekli Düzenleme: Anime AI, kullanıcıların \noluşturdukları görseller üzerinde yapay zekâ destekli dü -\nzenlemeler yapmalarına olanak tanır. Bu özellik, görsellerin \ndetaylarını ayarlamak, renkleri değiştirmek veya belirli \nefektler eklemek için kullanılabilir.\n ¬ Otomatik Sahne Oluşturma: Kullanıcılar, belirli bir senaryo \nveya sahneye dayalı olarak otomatik anime sahneleri oluş -\nturabilirler. Bu özellik, hikâye anlatımı veya oyun tasarımı \ngibi projelerde kullanılabilir.\n ¬ Kullanıcı Dostu Arayüz: Anime AI, kullanıcıların kolay -\nca anime tarzı görseller oluşturmasına olanak tanıyan \nsezgisel ve kullanıcı dostu bir arayüze sahiptir. Teknik \nbilgi gerektirmeden kullanılabilir ve hızlı sonuçlar elde \nedilmesini sağlar.\nEğitimde Kullanımı:\n ¬ Sanat ve Tasarım Eğitimi: Anime AI, dijital sanat ve tasa -\nrım derslerinde kullanılabilir. Öğrenciler, anime tarzında \nkarakterler ve sahneler oluşturabilir, bu da yaratıcılıklarını \nve sanatsal becerilerini geliştirmelerine yardımcı olur.\n ¬ Yaratıcı Yazarlık ve Hikâye Anlatımı: Yaratıcı yazarlık ders -\nlerinde, öğrenciler hikâyelerini destekleyen anime karak -\nterleri ve sahneleri oluşturabilirler. Bu, hikâye anlatımını \ngörselleştirerek daha etkili bir anlatım sağlar.\n ¬ Oyun Tasarımı: Anime AI, oyun tasarımı derslerinde kul -\nlanılabilir. Öğrenciler, oyunları için anime tarzında karak -\nterler ve ortamlar oluşturabilir, bu da projelerine görsel \nbir derinlik katar. ¬ Proje Sunumları: Öğrenciler, projelerini görsel olarak des -\nteklemek için Anime AI'yi kullanabilirler. Özellikle anime \ntemalı projelerde, bu araç profesyonel ve estetik açıdan \nçekici görseller oluşturmalarına yardımcı olabilir.\n ¬ Manga ve Çizgi Roman Üretimi: Anime AI, manga ve çizgi \nroman üretimi derslerinde kullanılabilir. Öğrenciler, ka -\nrakter ve sahneleri hızlı bir şekilde oluşturarak kendi çizgi \nromanlarını veya manga hikâyelerini yaratabilirler.\nCapCut:\nTanım: CapCut, ByteDance tarafından geliştirilen ücretsiz ve \nkullanıcı dostu çok platformlu (mobil, web, masaüstü) video \ndüzenleme yazılımıdır. Kısa video içerikleri oluşturmak için \nsosyal medya kullanıcıları, eğitimciler ve iç Temel Özellikler\n ¬ AI destekli düzenleme araçları: Otomatik sahne bölme, \nmetin-to-video oluşturma, otomatik altyazı, ses metin \nçevirisi, script-to-video, video netleştirme ve renk düzeltme \ngibi gelişmiş özellikler içerir.\n ¬ Basit arayüzle profesyonel efektler:  Katmanlı düzenleme, \nfiltre, metin animasyonu, çıkartma ve geçiş efektleri sunar.\n ¬ Çoklu platform desteği: iOS, Android, Windows, Mac ve \ntarayıcı üzerinde çalışır.\n ¬ Eğitim odaklı araçlar: Eğitim videoları için metin vurgula -\nma, açıklama çizimleri, quiz ve not ekleme gibi özellikler \nbarındırır.\nEğitimde Kullanımı\n ¬ Ders video materyalleri hazırlama: Öğretmenler ders \niçeriklerini görsel ve işitsel olarak zenginleştiren videolar \nüretip öğrencilerle paylaşabilir.\n ¬ Öğrenci projeleri: Öğrenciler, sunum, belgesel veya tanıtım \nvideoları hazırlayarak medya okuryazarlığını geliştirebilir.\n ¬ Yaratıcılık ve iş birliği: Grup çalışmaları, medya projelerin -\nde CapCut sayesinde iş bölümü, düzenleme ve paylaşım \nsüreçleri pratik yapılabilir\n189\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 190, "text": "¬ Kodlama ve AI entegrasyonu: API ve otomatik iş akışları \nkullanılarak multimedya projelerinde kodlama ile video \nüretimi senaryoları uygulayabilirlererik üreticiler arasında \noldukça popülerdir. ¬ Etkileşimli Öğrenme: Kişiselleştirilmiş avatarlar ile öğren -\ncilerin öğrenme sürecine aktif katılımını sağlama.\n ¬ Uzaktan Eğitim: Online dersler ve e-öğrenme içeriklerini \ndaha canlı ve ilgi çekici hâle getirme.\nD-ID AI, eğitimde görsel ve etkileşimli içeriklerin önemini ar -\ntırarak, öğretmenler ve öğrenciler için öğrenme süreçlerini \nzenginleştiren bir araçtır. \nD-ID AI:\nTanım:  D-ID AI, metin veya ses girdilerinden yapay zekâ destekli \nvideolar oluşturmak için kullanılan bir platformdur. Özellikle \ndijital avatarlar ve konuşan yüz animasyonları üretmek için \ngeliştirilmiştir. Bu araç, eğitim, pazarlama ve içerik üretiminde \nyenilikçi çözümler sunar.\nTemel Özellikler:\n ¬ Metinden Videoya (Text-to-Video): Kullanıcıların yazdığı \nmetinleri konuşan bir dijital avatar aracılığıyla videoya \ndönüştürür.\n ¬ Gerçekçi Yüz Animasyonu: Avatarlar, insan benzeri yüz \nifadeleri ve doğal konuşma tarzıyla dikkat çeker.\n ¬ Ses Desteği: Kullanıcılar, kendi seslerini kullanabilir veya \nplatformun sunduğu doğal seslerden seçim yapabilir.\n ¬ Çoklu Dil Desteği: Farklı dillerde videolar oluşturabilir.\n ¬ Kişiselleştirme: Avatarın görünümünü, ses tonunu ve dilini \nözelleştirme imkânı sunar.\nEğitimde Kullanımı:\n ¬ Ders Materyalleri: Konu anlatımlarını videolara dönüş -\ntürerek öğrencilerin dikkatini çekecek etkileyici içerikler \nhazırlama.\n ¬ Dijital Rehberlik: Öğrenciler için rehberlik videoları hazır -\nlayarak bilgileri daha etkili bir şekilde aktarma.\n ¬ Dil Eğitimi: Farklı dillerde örnek konuşmalar oluşturarak \ndil öğrenim süreçlerini destekleme.Vision Story:\nTanım: kullanıcıların fikirlerini ve hikâyelerini görselleştirmelerini \nsağlayan bir yapay zekâ destekli hikâye anlatım platformudur. \nGörsel ve metin tabanlı içerik üretimiyle yaratıcı projeler ve \nöğretici materyaller oluşturulmasını kolaylaştırır.\nTemel Özellikler:\n ¬ Görsel Hikâye Anlatımı: Metinlerden etkileyici görseller \nve hikâye sunumları üretir.\n ¬ Otomatik Görselleştirme: Kullanıcı girdilerini analiz ederek \notomatik olarak görsel içerik oluşturur.\n ¬ Çoklu Format Desteği: Görseller, videolar ve etkileşimli \nmateryaller üretme.\n ¬ Kolay Kullanım: Kullanıcı dostu arayüzle hızlı ve etkili içerik \noluşturma.\nEğitimde Kullanımı:\n ¬ Ders Materyalleri Görselleştirme: Karmaşık konuları gör -\nseller ve infografiklerle açıklama.\n ¬ Hikâye Tabanlı Öğrenme: Öğrenciler için interaktif hikâye \nbazlı öğrenme içerikleri hazırlama.\n ¬ Proje ve Sunum Desteği: Öğrenci projeleri ve sunumlarını \ngörsel olarak zenginleştirme.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n190"}, {"page": 191, "text": "¬ İlgi Çekici Anlatım: Derslerde kullanılacak etkileyici hikâye \nanlatım araçları oluşturma.\n ¬ Kavram Haritaları: Kavramları görselleştirerek öğrencilerin \ndaha kolay öğrenmesini sağlama.\nVision Story, hem öğretmenlerin hem de öğrencilerin hikâye \nve projelerini yaratıcı bir şekilde sunmalarına yardımcı olan \ngüçlü bir araçtır. ¬ Anında Önizleme: Kullanıcılar, dönüştürdükleri görselleri \nanında önizleyebilir ve sonuçları gerçek zamanlı olarak \ndeğerlendirebilirler. Bu, yapılan düzenlemelerin anında \ngörülebilmesini sağlar.\nEğitimde Kullanımı:\n ¬ Dijital Sanat ve Tasarım Eğitimi: LeiaPix Converter, diji -\ntal sanat ve tasarım derslerinde kullanılabilir. Öğrenciler, \nstatik görüntülerine derinlik ve hareket katarak yaratıcı \nprojeler geliştirebilirler.\n ¬ Görsel Anlatım ve İletişim Dersleri: Bu araç, görsel anlatım \nve iletişim derslerinde etkili içerikler üretmek için kulla -\nnılabilir. Öğrenciler, mesajlarını daha etkileyici bir şekilde \niletmek için 3D efektli görseller oluşturabilirler.\n ¬ Proje Sunumları: Öğrenciler, projelerini sunarken daha \ndinamik ve dikkat çekici görseller kullanabilirler. LeiaPix \nConverter, sunumlara görsel bir derinlik katarak izleyicilerin \nilgisini çekmeye yardımcı olabilir.\n ¬ Pazarlama ve Reklamcılık Eğitimi: LeiaPix Converter, pa -\nzarlama ve reklamcılık derslerinde de kullanılabilir. Öğren -\nciler, ürünlerini veya hizmetlerini tanıtmak için etkileyici 3D \ngörseller oluşturabilir ve dijital pazarlama kampanyalarını \ndaha etkili hâle getirebilirler.\n ¬ Sosyal Medya İçerik Üretimi: Sosyal medya derslerinde, \nöğrenciler LeiaPix Converter'ı kullanarak sosyal medya \nplatformları için dikkat çekici içerikler oluşturabilirler. 3D \nefektli görseller, sosyal medya gönderilerinin daha fazla \netkileşim almasına yardımcı olabilir.\nLeiapix Conventer: \nTanım: LeiaPix Converter, 2D görüntüleri 3D efektli görsellere \ndönüştürmek için kullanılan bir yapay zekâ destekli platform -\ndur. Bu araç, özellikle görsel içerik üreticileri, dijital sanatçılar \nve pazarlama profesyonelleri için yararlıdır. LeiaPix Converter, \nkullanıcıların statik görüntülerine derinlik katmak ve bu gö -\nrüntüleri hareketli, üç boyutlu hâle getirmek için basit ama \netkili bir çözüm sunar. \nTemel Özellikler:\n ¬ 2D Görselleri 3D'ye Dönüştürme: LeiaPix Converter, kul -\nlanıcıların iki boyutlu görüntülerini hızla üç boyutlu efektli \ngörsellere dönüştürür. Bu sayede statik görseller, daha \ndinamik ve etkileyici hâle gelir.\n ¬ Parallax Efekti: Platform, görüntülere derinlik katan parallax \nefekti ekler. Bu efekt, özellikle sosyal medya gönderileri, \ndijital sanat ve pazarlama materyalleri için görsel olarak \nçekici içerikler oluşturmak için kullanılır.\n ¬ Kullanıcı Dostu Arayüz: LeiaPix Converter, herhangi bir \nteknik bilgi gerektirmeden kullanılabilen sezgisel bir ara -\nyüze sahiptir. Kullanıcılar, görsellerini yükleyerek birkaç \nbasit adımda 3D efektli sonuçlar elde edebilirler.\n ¬ Çoklu Format Desteği: Platform, farklı görüntü formatlarını \ndestekler ve dönüştürülen görsellerin çeşitli cihazlarda \nve platformlarda sorunsuz bir şekilde görüntülenmesine \nolanak tanır.\nRemini:\nTanım: Remini, derin öğrenme destekli bir fotoğraf ve video \niyileştirme uygulamasıdır. Eskimiş, bulanık veya düşük çö -\nzünürlüklü görselleri tek dokunuşla yüksek kaliteye yükseltir.\n191\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 192, "text": "Temel Özellikler:\n ¬ Fotoğraf İyileştirme: Remini, eski veya düşük kaliteli fo -\ntoğrafları yüksek çözünürlüklü hâle getirme yeteneğine \nsahiptir. Bu özellik, özellikle nostaljik aile fotoğrafları veya \neski anıların yeniden canlandırılması için faydalıdır.\n ¬ Yüz Netleştirme: Uygulama, bulanık yüzleri netleştirme \nkonusunda oldukça etkilidir. Remini, yüz hatlarını belir -\nginleştirir, gözleri keskinleştirir ve genel olarak portre \nfotoğraflarının kalitesini artırır.\n ¬ Renk Düzeltme: Remini, fotoğraflardaki renkleri daha canlı \nve doğal hâle getirir. Bu, eski fotoğrafların renk dengesini \ndüzeltmek veya düşük kaliteli dijital görüntülerin renklerini \niyileştirmek için kullanılabilir.\n ¬ Otomatik Düzenleme: Uygulama, kullanıcılara fotoğraf -\nlarını manuel olarak düzenlemeye gerek kalmadan, tek \nbir dokunuşla fotoğraf iyileştirme imkanı sunar. Remini, \nfotoğrafların görünümünü optimize etmek için gelişmiş \nyapay zekâ algoritmalarını kullanır.\n ¬ Video İyileştirme: Remini, yalnızca fotoğrafları değil, aynı \nzamanda video karelerini de iyileştirme yeteneğine sa -\nhiptir. Bu özellik, düşük çözünürlüklü videoları daha net \nve izlenebilir hâle getirmek için kullanılabilir.\n ¬ Eski Fotoğrafları Canlandırma: Remini, eski siyah-beyaz \nfotoğrafları renklendirebilir ve canlandırabilir. Bu, aile ar -\nşivlerinde bulunan eski fotoğrafların modernleştirilmesi \niçin harika bir araçtır.\nEğitimde Kullanımı:\n ¬ Fotoğrafçılık ve Görsel Sanatlar Eğitimi: Remini, fotoğ -\nrafçılık derslerinde öğrencilerin eski veya düşük kaliteli \nfotoğrafları iyileştirmelerine yardımcı olabilir. Öğrenciler, \nfotoğrafları restore etme ve görüntü kalitesini artırma \ntekniklerini öğrenebilirler. ¬ Tarih ve Kültürel Miras Dersleri: Remini, tarih derslerinde \neski fotoğrafların canlandırılması için kullanılabilir. Öğ -\nrenciler, tarihsel olayları veya figürleri daha net ve canlı \nbir şekilde görselleştirerek öğrenebilirler.\n ¬ İçerik Üretimi: Dijital içerik üretimi derslerinde, öğrenciler \nRemini'yi kullanarak düşük kaliteli görüntüleri iyileştirebilir \nve projelerinde daha profesyonel görseller kullanabilirler.\n ¬ Arşiv Çalışmaları: Arşiv ve kütüphanecilik alanlarında, eski \nbelgelerin ve fotoğrafların dijital olarak iyileştirilmesi için \nRemini kullanılabilir. Bu, kültürel mirasın korunmasına ve \ndijitalleştirilmesine katkıda bulunabilir.\n ¬ Sosyal Medya ve Pazarlama Eğitimi: Remini, sosyal medya \nve dijital pazarlama derslerinde öğrencilerin eski fotoğraf -\nları yenileyerek veya düşük kaliteli görselleri iyileştirerek \ndaha etkileyici içerikler oluşturmalarına yardımcı olabilir.\nRemini eski, bulanık veya düşük kaliteli fotoğrafları iyileştiren \nbir yapay zekâ uygulamasıdır. Nasıl kullanılır:\n1. Uygulamayı İndirin ve Açın: Remini'yi mobil cihazınıza \nindirip kurun.\n2. Fotoğraf Seçin: Düzenlemek istediğiniz eski veya bulanık \nfotoğrafı seçin.\n3. Fotoğrafı İyileştirin: Yapay zekâ fotoğrafı analiz eder ve \nnetleştirir.\n4. Sonucu Gözden Geçirin ve Kaydedin: Düzenlenmiş fotoğrafı \ninceleyin ve galerinizde kaydedin.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n192"}, {"page": 193, "text": "6.2.2. Grafik ve Sanat Uygulamaları\nDesignify:\nTanım: Designify, görüntüleri hızlı ve profesyonel bir \nşekilde düzenlemek için yapay zekâ kullanan bir araçtır.\nTemel Özellikler:\n ¬ Arka Plan Kaldırma: Görsellerin arka planını oto -\nmatik olarak kaldırır.\n ¬ Otomatik Düzenleme: Renk, ışık ve kontrast gibi \nayarları optimize eder.\n ¬ Şablon Desteği: Hazır tasarım şablonları sunar.\nEğitimde Kullanımı:\n ¬ Ders materyallerini özelleştirmek için görseller \ndüzenleme.\n ¬ Etkileşimli sunumlar için görsel şablonlar hazırlama.Eğitimde Kullanımı:\n ¬ Etkileşimli ders içerikleri ve sunumlar hazırlama.\n ¬ Eğitim projeleri için poster ve görseller oluşturma.\nCrello (VistaCreate):\nTanım: Crello, yaratıcı görseller ve videolar oluşturmak için \nkullanılan bir tasarım platformudur.\nTemel Özellikler:\n ¬ Hazır Şablonlar: Farklı amaçlar için binlerce tasarım \nşablonu.\n ¬ Video Düzenleme: Kısa ve etkileyici videolar oluşturma.\n ¬ Kolay Özelleştirme: Sürükle ve bırak arayüzüyle kullanıcı \ndostu deneyim.\nSnappa:\nTanım: Kullanıcıların sosyal medya, pazarlama ve eğitim amaçlı \ngörsel içerikler oluşturmasını sağlayan bir araçtır.\nTemel Özellikler:\n ¬ Basit Tasarım Araçları: Hızlı ve kolay görsel tasarım.\n ¬ Stok Görsel Desteği: Binlerce ücretsiz stok görsele erişim.\n ¬ Hazır Şablonlar: Kolay özelleştirilebilir şablonlar.\nEğitimde Kullanımı:\n ¬ Eğitim materyalleri ve posterler oluşturma.\n ¬ Ders içeriklerini görselleştirme\nLooka:\nTanım: Yapay zekâ destekli logo tasarım ve marka oluşturma \nplatformudur.\nTemel Özellikler:\n ¬ Logo Tasarımı:  Markalara ve projelere özel logolar oluşturur.\n ¬ Marka Kitleri: Tüm marka görsellerini tek bir yerde toplar.\n ¬ Hızlı Düzenleme: Logoları ve tasarımları kişiselleştirme.\n193\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 194, "text": "Eğitimde Kullanımı:\n ¬ Okul projeleri veya öğrenci kulüpleri için logo tasarımı.\n ¬ Eğitim etkinlikleri için görsel kimlik oluşturma.Eğitimde Kullanımı:\n ¬ Öğrencilere kullanıcı arayüzü tasarımı öğretme.\n ¬ Eğitim projelerinde uygulama prototipleri oluşturma.\nGalileo AI:\nTanım: Kullanıcı girdilerine göre görsel prototipler ve tasarımlar \noluşturan bir yapay zekâ platformudur.\nTemel Özellikler:\n ¬ Prototip Oluşturma: Dijital projeler için hızlı tasarımlar \noluşturur.\n ¬ Kullanıcı Odaklı Tasarım: Kullanıcı girdilerine uygun içe -\nrikler üretir.\nEğitimde Kullanımı:\n ¬ Proje tabanlı öğrenmede prototipler geliştirme.\n ¬ Öğrencilere tasarım odaklı düşünme becerileri kazandırma.\nUizard:\nTanım: Hızlı kullanıcı arayüzü (UI) tasarımı yapmak için kulla -\nnılan bir yapay zekâ platformudur.\nTemel Özellikler:\n ¬ Çizimden Dijitale: Elle yapılan taslakları dijital arayüzlere \ndönüştürür.\n ¬ Prototip Geliştirme: Hızlı ve kolay arayüz tasarımı.AVCLabs Photo Enhancer AI: \nTanım: AVCLabs Photo Enhancer AI, derin öğrenme tabanlı bir \nfotoğraf iyileştirme yazılımıdır. Görüntü çözünürlüğünü 4 kat \n(400%) yükseltebilir, parazitleri azaltabilir, renkleri düzeltebilir \nve arka planı silebilir.\nTemel Özellikler:\n ¬ AI Upscaler: Düşük çözünürlüklü görüntüleri HD/4K/8K \nkalitesine kadar yükseltir (standart ve yüksek kalite mod -\nlarıyla).\n ¬ AI Denoiser: Gürültü ve gren azaltımı sağlar, netleme yapar.\n ¬ Color Calibration ve Colorizer: Renklerde otomatik dengele -\nme ve siyah -beyaz fotoğrafları renklendirme imkânı sunar.\n ¬ Face Enhancement: Yüz tanıma ile portrelerde detay \nvurgusu sağlar.\n ¬ Background Removal: Arka planı tek tıkla şeffaf veya başka \ngörsellerle değiştirmeye imkân verir.\n ¬ Batch Processing: Çok sayıda fotoğraf için toplu işlem \ndesteği mevcuttur.\n ¬ Platform desteği: Windows, Mac uygulamasıyla birlikte \nweb üzerinden tarayıcıda da çalışır.\nEğitimde Kullanımı\n ¬ Tarih ve kültürel derslerde, eski fotoğrafları restore ederek \ngeçmişi canlı anlatım aracı hâline getirme.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n194"}, {"page": 195, "text": "¬ Medya ve dijital sanat derslerinde, düşük çözünürlüklü \ngörsellerin kalitesini artırarak sunum zenginliği sağlama.\n ¬ İngilizce/Edebiyat projelerinde, metin içinde geçen tari -\nhi veya görsel sahnelerde önce-sonra dönüşümle görsel \nanaliz yapma.\n ¬ Teknik atölyelerde, renk kalibrasyonu, çözünürlük artışı, \nyüz iyileştirme gibi AI tekniklerini pratikte öğretmek.\n ¬ Kodlama atölyelerinde, toplu iş mantığı ve otomasyonun \ntemelini kavratmak için batch işlevlerin demo olarak öğ -\nrencilerin kullanımı.Eğitimde Kullanımı\n ¬ Web geliştirme derslerinde: Öğrenciler görsel tasarımın \nkod haline nasıl dönüştüğünü adım adım görebilir.\n ¬ Tasarım-mühendislik iş birliği:  Tasarımcı öğrencilerin ha -\nzırladığı mock-upların doğrudan canlı siteye dönüşümü \nuygulamalı şekilde gösterilebilir.\n ¬ No-code ve yazılım entegrasyonu:  Kod bilmeyen öğrenciler \nFronty’le tasarım yaparken, isteyenler editör arayüzünü \nkullanarak içerik ve stil düzenlemesi yapabilir.\n ¬ SEO ve erişilebilirlik eğitimi: Oluşan semantic HTML ve \nARIA kullanımı, SEO dostu yapı gibi unsurlar teknik olarak \ndeğerlendirilebilir.\n ¬ Proje hazırlığı:  Kısa sürede prototip web sayfaları oluşturu -\nlarak fikir aşamasından canlı yayına hızlı geçiş sağlanabilir. Fronty: Yapay Zekâ Destekli Görüntüden HTML/CSS \nTanım: Fronty, resim veya tasarım ekran görüntülerini AI kul -\nlanarak HTML ve CSS koduna dönüştüren bir web geliştirme \naracıdır. Kullanıcı dostu no-code düzenleyici ile kod çıktısı canlı \nolarak düzenlenip yayınlanabilir.\nTemel Özellikler\n ¬ Image-to-HTML/CSS dönüştürme: AI, görseldeki navbar, \nbaşlık, metin ve görsel bölümleri tanır ve temiz, düzen -\nlenebilir biçimde kod üretir.\n ¬ Responsive & SEO-uyumlu yapı: Oluşan kod Bootstrap \ntabanlı, mobil öncelikli, erişilebilir özelliklerde ve SEO \ndostudur.\n ¬ No-code görsel editör: Kodla uğraşmadan site tasarım \nve içerik düzenlemesi yapılabilir; düzenlemeler anında \nyayına alınır.\n ¬ Barındırma ve yayın: fronty.live alt alan adıyla ücretsiz \nyayın imkânı; özel alan adı bağlama ve bakım durumunda \naltyapı desteği sunulur .\n ¬ Kod kalitesi ve performans: Kod satır sayısı düşürülmüş, \nSCSS tabanlı, yorumlu ve minify edilmiş; erişilirlik ve Pa -\ngeSpeed performansı optimize halindedir.\nKhroma: Yapay Zekâ Destekli Renk Paleti Oluşturma Aracı\nTanım: Khroma, tasarımcıların kendi renk tercihlerini öğre -\nnen ve bu doğrultuda kişiselleştirilmiş renk paletleri oluşturan \nücretsiz bir AI tabanlı renk aracıydır. Kullanıcılar başlangıçta \nsevdikleri 50 rengi seçer, sistem bu seçimlere göre sınırsız \nkombinasyon üretir.\nTemel Özellikler\n ¬ Makine öğrenimi destekli renk öğrenimi: Seçilen renkler \nüzerinden AI algoritması kullanıcı zevkini öğrenir.\n ¬ Sürekli üretim: Tipografi, arka plan, gradyan, grafik ya \nda yüklenen görsel üzerinde renk kombinasyonları oluş -\nturulabilir.\n ¬ Arama ve filtreleme: Hue, tint, RGB, hex gibi kriterlerle \nözelleştirilmiş arama imkânı sunar.\n ¬ Kaydetme ve erişim kolaylığı: Sonsuz paletler tarayıcıda \nsaklanıp dilediğiniz zaman CSS veya erişilebilirlik dere -\ncesiyle kaydedilebilir.\n195\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 196, "text": "¬ Tamamen ücretsiz & web tabanlı çözüm ile herhangi bir \nkurulum gerekmez.\nEğitimde Kullanımı\n ¬ Görsel tasarım dersleri: Renk teorisi ve estetik uyumu \nöğrenciler kendi zevklerine göre keşfedip analiz edebilirler.\n ¬ UX/UI eğitimleri: Erken tasarım aşamasında mood board \nhazırlığı, prototip için uygun palet seçimi pratiği yapılabilir.\n ¬ Kodlama ve front-end çalışmaları: Renklerin CSS karşılık -\nları (hex/RGB) derhal elde edilebilir, böylece web tasarım \npratiği yapılabilir.\n ¬ Erişilebilirlik eğitime katkı: WCAG renk kontrast oranları \nüzerinden görünürlük analizi, renk körlüğü testi gibi konular \nsınıfta öğretilip tartışılabilir. ¬ AI Writer: Pazarlama, SEO dostu içerik, senaryo, e-posta \ngibi metinleri üretir.\n ¬ Tasarım araçları: Color Matcher, Font Pairer, Graphic Maker, \nCalendar gibi yaratıcı iş akışına yardımcı modüller içerir.\n ¬ Entegre iş akışı: Tek abonelikle tüm araçlar kullanılabilir; \nücretsiz başlangıç kredisi sunar. \nEğitimde Kullanımı:\n ¬ Dijital medya & pazarlama dersleri: Öğrenciler, gerçek \nmarka ve içerik projelerinde logo, video, görsel ve metin \nüretimini bir platformda deneyimleyebilir.\n ¬ Yaratıcı yazım & iletişim: AI Writer ile ödev/metin taslağı \noluşturup, SpeechMaker’la seslendirme pratiği yapılabilir.\n ¬ Multimedya proje üretimi:  Tek bir araçla içerik üretiminin \nfarklı aşamaları (tasarım, görsel, video, ses) bir arada \nişlenebilir.\n ¬ Kodlama & API entegrasyonu: Öğrenciler platformun \nAPI'siyle içerik otomasyonu ya da düğüm tabanlı iş akışları \noluşturabilirler.\n ¬ İş dünyası eğitimi: Girişimcilik atölyelerinde hızlı prototip \nüretimi için ideal; marka kimliği ve pazarlama malzemeleri \nbirlikte yaratılabilir.\nDesigns.ai :\nTanım: Bir yapay zekâ destekli tasarım platformudur ve kulla -\nnıcıların profesyonel görsel içerikler, videolar, logolar, sunum -\nlar ve sosyal medya tasarımları oluşturmasına olanak tanır. \nHedef kitlesi genellikle tasarım bilgisi olmayan, ancak etkili \nve profesyonel içerik üretmek isteyen bireylerdir. \nTemel Özellikler:\n ¬ Logo Maker: 10.000+ ikon ve marka kimliği oluşturma \npaketleriyle güçlü logo üretimi.\n ¬ AI Design (ImageMaker): Metinle görsel, sosyal medya \ngörselleri, banner ve ürün kapakları oluşturur; stiller (3D, \nneon, minimal vb.) sunar.\n ¬ Video Maker: Yazılı betimlemeyi otomatik olarak videoya \ndönüştürür; milyonlarca stok görsel/clip ve metin-işlenmiş \nkonuşmalar içerir .\n ¬ SpeechMaker: Metni doğal seslendirmeye dönüştürür; \nfarklı diller ve tonlar desteklenir.Let's Enhance: Yapay Zekâ Destekli Görüntü İyileştirme Aracı\nTanım: Let’s Enhance, Ukrayna merkezli bir AI destekli görsel \niyileştirme platformudur. Kullanıcıların düşük çözünürlüklü, \nbulanık veya JPEG sıkıştırma artefact’lı fotoğrafları yüksek \nçözünürlükte, net ve profesyonel görsellere dönüştürmesini \nsağlar.\nTemel Özellikler\n ¬ Super-resolution & Upscaling (2x–16x):  Düşük çözünür -\nlüklü görüntülerin boyutunu artırır, detay ve netlik ekler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n196"}, {"page": 197, "text": "¬ Smart Sharpen & Denoise: Bulanıklığı giderir, gürültüyü \nazaltır ve renk dengesini düzeltir.\n ¬ JPEG Artefact Cleaner: Sıkıştırılmış görsellerdeki blokları \nve bozulmaları otomatik düzeltir.\n ¬ Batch Processing:  Toplu yükleme desteğiyle düzinelerce \ngörseli aynı anda iyileştirebilir.\n ¬ Text-to-Image Generator: Prompt üzerinden görsel üret -\nme özelliğiyle 4K kalitesine kadar resimler oluşturabilir \n(1024 × 1024 boyut starting) \n ¬ API Entegrasyonu: E -ticaret, pazarlama gibi iş uygula -\nmaları için otomatik görsel iyileştirme süreçleri kurmaya \nimkân sunar.\nEğitimde Kullanımı\n ¬ Tarih ve Arşiv Çalışmaları: Eskimiş, taranmış fotoğrafları \nrestore ederek derslerde görsel materyal olarak kullanabilir, \nöğrencilerin ilgisini çekebilir.\n ¬ Grafik & Fotoğrafçılık Dersleri: Öğrenciler, detay iyileştirme, \ngürültü azaltma ve renk düzeltme tekniklerini karşılaş -\ntırmalı öğrenebilir.\n ¬ E-ticaret/ Pazarlama Projeleri: Ürün görsellerini netleşti -\nrerek profesyonel portfolyolar veya sunumlar hazırlanabilir.\n ¬ Kodlama & API Eğitimi: API arayüzü sayesinde dijital içe -\nrik otomasyonunda kodlama alıştırmaları yapılabilir (örn: \nbatch resim iyileştirme senaryosu).\n ¬ Multimedya Projeleri: Video veya sunum projelerindeki \ngörseller, yüksek kaliteye çektikten sonra etkili bir içerik \nsunumu haline getirilebilir.Adobe Firefly:\nTanım: Adobe’nin yapay zekâ destekli görsel oluşturma ve dü -\nzenleme platformudur. Metinden görsele, vektör tasarımına \nve fotoğraf düzenlemeye kadar geniş bir yaratıcı üretim yel -\npazesi sunar. Özellikle tasarımcılar, sanatçılar, eğitimciler ve \niçerik üreticileri için hızlı ve profesyonel görseller oluşturmayı \nkolaylaştırır.\nTemel Özellikler:\n ¬ Metinden Görsele (Text-to-Image) Üretim: Yalnızca me -\ntin komutları girerek AI ile benzersiz görseller oluşturma \nimkânı sunar.\n ¬ Stil ve Renk Uyarlamaları: Farklı sanatsal stillerde, belirli \nrenk tonlarında veya vektör formatında görseller oluş -\nturabilir.\n ¬ Akıllı Fotoğraf ve Grafik Düzenleme: Var olan görüntüleri \ngeliştirmek, nesne eklemek veya kaldırmak için yapay zekâ \naraçları sunar.\n ¬ Tipografi ve Logo Tasarımı: Yapay zekâ destekli metin \nefektleriyle kreatif tipografi çalışmaları yapılmasını sağlar.\n ¬ Photoshop ve Adobe Ekosistemi ile Entegrasyon: Firefly, \nAdobe Photoshop, Illustrator ve diğer Adobe Creative Cloud \naraçlarıyla doğrudan entegre çalışır.\nEğitimde Kullanımı:\n ¬ Ders Materyalleri İçin Görsel Üretimi: Öğretmenler, ders -\nlerde kullanmak için özelleştirilmiş görseller oluşturabilir.\n ¬ Öğrenci Projeleri İçin Görsel Destek: Öğrenciler, sunumlar, \nprojeler veya bilimsel çalışmalar için estetik ve etkileyici \ngörseller tasarlayabilir.\n ¬ Sanat ve Grafik Tasarım Eğitiminde Kullanım: Sanat ders -\nlerinde öğrencilerin AI destekli sanat eserleri ve grafik \nçalışmaları üretmelerini sağlar.\n197\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 198, "text": "¬ Etkileyici Sunum ve Bilgilendirme Materyalleri Üretme: \nÖğretmenler ve öğrenciler, Firefly’ı infografikler, sunum \ntasarımları ve interaktif ders içerikleri oluşturmak için \nkullanabilir. ¬ Bilim ve Teknoloji Eğitiminde Kullanım: Öğrenciler, bilim \nkurgu, mühendislik ve fizik projeleri için görsel simülas -\nyonlar oluşturabilir.\nStable Diffusion\nTanım: Stable Diffusion, açık kaynaklı ve yapay zekâ destekli bir \nmetinden görsele (Text-to-Image) üretim modelidir. Kullanıcılar \nbasit metin komutları girerek yüksek kaliteli, gerçekçi veya \nsanatsal görseller oluşturabilir. Özellikle sanatçılar, tasarımcılar \nve eğitimciler için yaratıcı projelerde güçlü bir araçtır.\nTemel Özellikler:\n ¬ Metinden Görsele (Text-to-Image) Üretim: Basit veya de -\ntaylı açıklamalarla benzersiz sanat eserleri, illüstrasyonlar \nveya fotoğraf benzeri görseller oluşturur.\n ¬ Tam Özelleştirme: Renk, stil, perspektif ve kompozisyon \nayarları üzerinde yüksek kontrol sunar.\n ¬ Açık Kaynak ve Ücretsiz Kullanım: Kendi sisteminize indi -\nrerek veya çevrim içi platformlar üzerinden kullanabilirsiniz.\n ¬ Yüksek Çözünürlüklü Çıktılar: Detaylı ve kaliteli görseller \nüretir, illüstrasyon veya ticari projeler için uygundur.\n ¬ Gelişmiş Stil Transferi: Belirli sanatçı stillerini taklit ederek \nbenzersiz içerikler oluşturabilir.\nEğitimde Kullanımı:\n ¬ Sanat ve Tasarım Derslerinde Kullanım: Öğrenciler ve \nöğretmenler, sanatsal çalışmalar için yaratıcı görseller \noluşturabilir.\n ¬ Tarih ve Edebiyat İçin Görsel Destek: Tarihsel figürleri, olay -\nları veya edebi karakterleri görselleştirmek için kullanılabilir.\n ¬ Sunum ve Ders Materyalleri Üretme: Öğretmenler, infog -\nrafikler, bilimsel görseller ve illüstrasyonlar oluşturarak \nders içeriklerini daha etkileyici hâle getirebilir.NVIDIA Canvas:\nTanım: NVIDIA Canvas, kullanıcıların basit fırça darbeleriyle \ngerçekçi manzara görüntüleri yaratmasını sağlayan AI destekli \nbir dijital boyama aracıdır. RTX GPU'ların yapay zekâ ve Ten -\nsor çekirdeklerini kullanarak gerçek zamanlı olarak taslakları \ndetaylı görsellere dönüştürür.\nTemel Özellikler\n ¬ Gerçek zamanlı dönüşüm: Sert fırça çizimlerini AI ile fo -\ntogerçekçi manzara resimlerine anında çevirir.\n ¬ Materyal ve stil seçenekleri: Su, çimen, toprak gibi doğal \nelementler; farklı preset stiller ve dokular sunar (örneğin \nçiçek, çamur, ot) .\n ¬ Yüksek çözünürlük çıkış: Son güncellemelerle 4X artırıl -\nmış piksel yoğunluğu mümkün hale gelmiş, 1K gerçekçi \nsonuçlar üretilir.\n ¬ Photoshop entegrasyonu: Oluşturulan görseller doğrudan \nPhotoshop veya diğer yaratıcı araçlara aktarılabilir.\n ¬ RTX GPU gereksinimi: Çalışması için NVIDIA RTX serisi \nGPU ve uygun Studio sürücüsü gereklidir.\n ¬ Beta statüsünde ve araştırma odaklı: Eğitim amaçlı model \nkaynakları paylaşılmamış, Getty Images gibi iş birlikleriyle \netik veri kullanımı hedefleniyor.\nEğitimde Kullanımı\n ¬ Konsept tasarımı: Sanat, animasyon ve tasarım kursların -\nda, öğrenciler hızlıca iddialı manzara ve ortam taslakları \noluşturabilir.\n ¬ Yaratıcılığı hızlandırma: İlk 100 taslak gibi fikir üretim \nsüreçlerinde hızlı ön görselleştirme sağlar; sonucu gra -\nfikler karşılaştırılabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n198"}, {"page": 199, "text": "¬ GPU ve AI bilgilendirme: Bilgisayarla Görme ve AI ders -\nlerinde, RTX tabanlı gerçek zamanlı AI uygulamalarını \ndeneyimlemeye olanak tanır.\n ¬ Multidisipliner projeler: Mimarlık, oyun tasarımı gibi \nalanlarda, çevresel modelleme ve görsel fikir geliştirme \nçalışmaları yapılabilir.\n ¬ Araç entegrasyonu: Oluşturulan taslaklar Photoshop’a \naktarılıp düzenlenerek asıl tasarım süreçlerine entegre \nedilebilir.Eğitimde Kullanım Önerileri\n ¬ Grafik & UI tasarım dersleri: Öğrenciler ikon seçim, renk \nuyumu ve responsive tasarım konularını pratik yaparak \nöğrenebilir.\n ¬ Web geliştirme atölyeleri: Tasarım mockup'larını kod içinde \nkullanarak özgün arayüzler yaratma deneyimi sağlanabilir.\n ¬ Multimedia projeleri: Sunum, video edit veya dijital içerik \nderslerinde ikon, arka fon müziği ve illüstrasyonlarla zengin \niçerikler üretilebilir.\n ¬ API ile kodlama öğrenimi: Icons8 API’siyle otomasyon, \nikon generasyonu ve grafik iş akışı senaryoları kodlanabilir.\n ¬ Veri gizliliği & copyright eğitimi: AI araçlarının kullanımında \ntelif hakları, kullanım koşulları ve etik üzerine tartışmalar \nyapılabilir.\nIcons8:\nTanım: Icons8, profesyonel tasarımcılar ve geliştiriciler için \nikon, illüstrasyon, stok fotoğraf, müzik ve çeşitli AI araçları \nsunan kapsamlı bir tasarım platformudur.\nTemel Özellikler\n ¬ 1,4 milyon+ ikon farklı stillerde (SVG/PNG/GIF/Lottie), \nrenk ve boyutları anında düzenlenebilir.\n ¬ Lunacy: Figma benzeri masaüstü tasarım uygulaması; \nauto-layout, vektörel düzenleme ve AI destekli şablonlar \niçerir.\n ¬ AI araçları:\n »Smart Upscaler: Görsel artırma\n »Background Remover: Arka plan silme\n »Face Swapper ve AI Anonymizer: Yüz değişimi/gizleme \n ¬ Stok varlıklar: Fotoğraf, vektör, animasyonlu ikonlar, 3D \nmodeller, royalty -free müzik içerikleri.\n ¬ Geniş eklenti desteği: Figma, Adobe Photoshop, Illustrator, \nGoogle Docs, Webflow gibi popüler araçlarla entegrasyon \nsağlar.\n ¬ API & geliştirici araçları: Programlı erişim, URL ile ikon \nüretimi, emoji ve ikon jeneratörleri sunar .\n ¬ GitHub Öğrenci Paketi içinde ücretsiz premium erişim sunar.BaedLabs:\nTanım: BasedLabs, kullanıcıların metin promptları, fotoğraflar \nve videolar kullanarak AI destekli görsel ve video içerikler oluş -\nturduğu ve paylaştığı bir yaratıcılık platformudur. Hem statik \nişin hem de hareketli içerik üretimi amaçlanmıştır.\nTemel Özellikler\n ¬ Text-to-image/video ve image-to-video: Detaylı metin \ngirdileriyle görsel ve kısa video içerik üretimi yapılabilir.\n ¬ Face swap, image upscaler, AI avatar/video oluşturucu \ngibi araçları tek platformda barındırır \n ¬ Hazır içerik uygulamaları: “AI Influencer”, “Anime PFP”, \n“Tattoo Design” gibi spesifik modüller ile temalı üretimler \nyapılabilir.\n ¬ Topluluk odaklı üretim, paylaşım ve keşif alanı: Kullanıcılar \ngaleride eserlerini sergileyip diğer üretimleri inceleyebilir.\n ¬ Freemium model + kredili sistem: Ücretsiz kullanım imkânı \nsunarken, yüksek hacimli üretimler için kredi paketi veya \nabonelik gerektirir.\n199\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 200, "text": "Eğitimde Kullanımı\n ¬ Görsel hikâye anlatımı projeleri:  Metine dayalı promptlarla \nöğrenciler kendi karakterlerini, hikâye sahnelerini yahut \nkısa animasyon videolarını oluşturabilir.\n ¬ Medya ve sosyal içerik üretimi: Öğrenciler grup çalışma -\nlarıyla YouTube, Instagram içerikleri tasarlayıp üretim \nsüreçlerini deneyimleyebilir.\n ¬ Yüz tanıma ve swap:  Fotoğrafla yüz değiştirme çalışmaları \nile dijital etik, yapaylık ve gerçeklik tartışmaları yapılabilir.\n ¬ Kodlama / API entegrasyon eğitimi: Topluluk modülleri \nveya araçlar API olarak kullanılarak öğrenciler proje tabanlı \nkodlama pratikleri gerçekleştirebilir.\n ¬ Multimedya içerik atölyeleri: Ses, video, metni birleştirerek \nstoryboard ya da kısa film çalışmaları gerçekleştirilebilir. ¬ Ses Merkezi: AI ses iyileştirme, ses klonlama ve ses dö -\nnüştürücü modüllerle entegre bir çözüm sunar.\n ¬ Online Suite: HitPaw Online portalinde ücretsiz araçlar \n(photo/video enhancers, background remover vb.) 48 \nsaat içinde dosya silinmesiyle güvenli bir kullanım sağlar.\nEğitimde Kullanımı Önerileri\n ¬ Tarih/Dijital Arşiv: Eski ve düşük çözünürlüklü fotoğrafları \nrestore ederek tarihi materyalleri sınıf içi sunuma hazır \nhale getirmeyi sağlar.\n ¬ Medya ve iletişim atölyeleri: Öğrenciler kendi videolarını \nAI ile netleştirip altyazı veya çeviri ekleyerek çok dilli su -\nnumlar hazırlayabilir.\n ¬ Görsel sanat projeleri: Metinden görsele modülüyle yara -\ntıcı görseller üretip sanat, grafik veya hikâye anlatımında \nkullanılabilir.\n ¬ Kodlama/otomasyon çalışmaları: API ile batch görüntü/\nvideo işleme senaryoları oluşturularak teknoloji-okurya -\nzarlık geliştirilebilir.\n HitPaw:\nTanım: HitPaw, AI destekli fotoğraf, video ve ses iyileştirme/\nedit araçları sunan çok yönlü bir multimedya platformudur. \nHem mobil (iOS/Android), masaüstü (Windows/Mac) hem de \nweb üzerinde çalışır.\nTemel Özellikler\n ¬ Photo Enhancer (FotorPea):\n »9 farklı AI modeliyle çözünürlük artırımı (2×–16×), net -\nleştirme, gürültü giderme, yüz detay iyileştirme ve renk \ndüzeltme sağlar.\n »Arka plan/nesne kaldırma modülleri mevcuttur.\n ¬ AI Art Generator: Metinden–görsele görsel oluşturur, kulla -\nnıcı arayüzü ve mobil uygulama üzerinden basit kullanılabilir.\n ¬ Video Enhancer & Editor (VikPea & Edimakor):\n »Videoları 4K/8K’ya kadar otomatik yükseltme, zaman \nçizgisiz düzenleme, altyazı ve otomatik çeviri desteği \nsunar.\nLet's Enhance:\nTanım: Yapay zekâ destekli bir görüntü iyileştirme aracıdır. Bu \nplatform, düşük çözünürlüklü fotoğrafları kalite kaybı olmadan \nyüksek çözünürlüğe dönüştürmeye ve detaylarını artırmaya \nolanak tanır. Fotoğrafların renk, netlik, kontrast gibi özellik -\nlerini iyileştirir, aynı zamanda görüntülerin boyutunu artırır \nve gürültüleri azaltır.\nTemel Özellikler:\n ¬ Fotoğraf iyileştirme ve kalite artırma.\n ¬ Gürültü azaltma ve netlik artırma.\n ¬ Çözünürlük artırma.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n200"}, {"page": 201, "text": "Eğitimde Kullanımı:\n ¬ Dijital Sanat ve Fotoğrafçılık Dersleri: Görsellerin netli -\nğini artırmak ve yüksek kaliteli projeler geliştirmek için \nkullanılabilir.\n6.3. Ses OluşturmaEğitimde Kullanımı\n ¬ E-öğrenme ve ders videoları: Genny ile öğretmenler pro -\nfesyonel seslendirmeli videolar hazırlayabilir. Öğrenciler \nde proje sunumlarını seslendirerek pratiğe dökebilir .\n ¬ Dil eğitimi: Çok dilli ses seçenekleriyle telaffuz ve aksan \nçalışması yapılabilir, yerel varyasyonlar üzerinden dil öğ -\nrenme desteklenebilir.\n ¬ İşitsel öğrenme materyalleri: Metin eşliğinde ses dos -\nyaları oluşturularak görme engellilere yönelik içerikler \nhazırlanabilir.\n ¬ Sesli ödev ve podcast teknolojisi: Öğrenci projelerinin \nsesli ödev, hikâye anlatımı, okul içi podcast çalışmala -\nrıyla zenginleştirilmesi sağlanabilir.\n ¬ Metodolojik analiz: Farklı ton, vurgu ve hızları karşılaştırarak \nsöyleniş ve anlatım biçimlerinin etkisi üzerine çalışma \nyapılabilir.Lovo.ai: \nTanım: Yapay zekâ destekli ses oluşturma ve seslendirme plat -\nformudur. Lovo.ai, 500+ ses ve 100+ dil desteğiyle metinden \ninsan benzeri seslendirmeler (voiceover) oluşturabilen güçlü bir \nAI tabanlı ses platformudur. Genny adlı entegre video düzenle -\nyici sayesinde seslendirmeyi direkt videolarla senkronize eder.\nKullanıcılar, Lovo.ai sayesinde doğal ve insan benzeri seslerle \nyüksek kaliteli seslendirmeler üretebilirler. Platform, metni \nsese dönüştürme, çeşitli dillerde ve tonlarda ses oluşturma \ngibi olanaklar sunar. Özellikle içerik üreticileri, reklam ajansları \nve eğitimciler için faydalıdır. \nTemel Özellikler\n ¬ Geniş ses kütüphanesi: 500’den fazla gerçekçi ses, 100'den \nfazla dil ve yöresel aksan seçeneği sunar.\n ¬ Duygu ve ton özelleştirme: Söyleniş hızı, vurgu, duygu \n(mutlu, ciddi vb.) ayarlanabilir; özel telaffuz düzenleme \nözelliği ile akronim ve isim hataları önlenebilir.\n ¬ Voice cloning: Kendi sesinizi klonlayabilir, tutarlı marka \nsesi ya da eğitim sesi oluşturabilirsiniz.\n ¬ Vestiyer video desteği: Genny video düzenleyicisi ile ses+ -\nvideo dublajı, altyazı ekleme ve senkronizasyon yapılabilir.\n ¬ API entegrasyonu: Otomatik seslendirme içeren uygula -\nmalar veya sesli bot projeleri için ideal.\n ¬ Ücretsiz + Pro planlar: Ücretsiz deneme süresi, ardın -\ndan Pro planlarda ticari kullanım hakları ile genişletilmiş \nözellikler sunulur.\nMurf.ai:\nTanım: Murf.ai, metninizi insan benzeri, yüksek kaliteli seslen -\ndirmeye dönüştüren güçlü bir yapay zeka tabanlı seslendirme \nplatformudur. 200’den fazla profesyonel ses ve 20+ dilde destek \nsağlar; kurumsal ve bireysel kullanım için uygundur\nTemel Özellikler\n ¬ 200+ ses, 20+ dil: Farklı ton, yaş, cinsiyet, aksan ve duy -\ngularda geniş ses seçeneğiyle doğal bir deneyim sunar.\n ¬ Voice cloning: Kendi sesinizi klonlayarak özgün projelerde \nmarka sesi olarak kullanabilirsiniz.\n ¬ AI dubbing & voice changer: Videolara çok dilli dubbing \nekleme ve mevcut ses kaydını profesyonel bir sese dö -\nnüştürme imkânı.\n ¬ Pace, pitch, vurgu kontrolü: Hız, ton, vurgu ayarları sa -\nyesinde anlatım tarzınızı tamamen özelleştirebilirsiniz.\n201\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 202, "text": "¬ Entegrasyonlar & API desteği: Canva, PowerPoint, Google \nSlides gibi uygulamalara doğrudan ses eklemenizi sağlar; \nayrıca API aracılığıyla otomasyon ve platform içi kullanım \nmümkündür.\nEğitimde Kullanımı Önerileri\n ¬ Ders video seslendirmeleri: Öğretmenler kısa sürede kaliteli \nsesli içerikler hazırlayıp sunumlarına profesyonellik katabilir.\n ¬ Dil öğrenimi ve telaffuz pratiği: Aksan ve ton varyasyon -\nlarıyla çok dilli çalışmalarda destek sağlar.\n ¬ Podcast, sesli ödev, hikâye anlatımı: Öğrenciler ken -\ndi projelerinde doğal sesler kullanarak içerik üretimini \ntecrübe edebilir.\n ¬ Erişilebilir içerik oluşturma: Görme engelli öğrenciler için \nders materyalleri seslendirilerek erişilebilirlik sağlanabilir.\n ¬ Kodlama & API entegrasyonu: Sesli botlar ya da dijital \nasistan projeleri için Murf API’si kullanılabilir. ¬ Overdub (ses klonlama): Kendi sesinizde eksik bölümleri \nAI ile tamamlayabilirsiniz.\n ¬ Otomatik Altyazı: Videolar için otomatik altyazı oluşturur.\nEğitimde Kullanımı:\n ¬ Ders videoları ve podcast içeriklerini düzenleme.\n ¬ Altyazı ekleyerek erişilebilirliği artırma.\n ¬ Dil eğitimi: Transkript ve metin temelli düzenleme ile içerik \nüzerinde dilbilgisi ve telaffuz çalışmaları yapılabilir.\nClipto AI\nDescript:\nTanım: Descript, medya düzenlemeyi bir belge düzenlemek kadar \nkolaylaştıran bir \"doc gibi\" arayüzle ses ve video düzenlemeyi \nsağlayan AI platformudur. Otomatik transkripsiyon, ekran kay -\ndı, çok parçalı multitrack düzenleme ve AI ses klonlama gibi \nözellikleriyle podcast, eğitim ve pazarlama içerikleri üretimi \niçin güçlü bir araçtır.\nTemel Özellikler:\n ¬ Metinden Sese Düzenleme: Metni düzenleyerek ses ve \nvideoları otomatik düzenler.\n ¬ Metin tabanlı düzenleme & transkripsiyon: Yüklenen \nmedyayı hızlı şekilde yazıya çevirir, kelime bazlı kesme/\ndüzenleme imkânı sunar.\n ¬ Transkripsiyon: Ses dosyalarını metne dönüştürür.\nTanım: Clipto AI, ses ve video içeriklerini analiz ederek metne \ndönüştüren, özetleyen ve önemli noktaları vurgulayan bir yapay \nzekâ destekli içerik yönetim aracıdır. Özellikle içerik üreticileri, \nöğretmenler ve öğrenciler için zaman kazandıran bir araçtır.\nTemel Özellikler:\n ¬ Ses ve Video İçeriğini Metne Dönüştürme: Podcast’ler, \nders kayıtları ve konuşmaları otomatik olarak yazıya çevirir.\n ¬ Akıllı Özetleme: Uzun içerikleri en önemli noktalarıyla \nözetler.\n ¬ Anahtar Kelime Analizi: İçeriklerdeki önemli kelimeleri ve \ntemaları belirler.\n ¬ Çoklu Format Desteği: Videoları, ses dosyalarını ve yazılı \ndokümanları analiz edebilir.\nEğitimde Kullanımı:\n ¬ Ders Kayıtlarını Metne Dönüştürme: Öğretmenler, ders \nanlatımlarını metin formatında sunabilir.\n ¬ Araştırma ve Not Alma: Öğrenciler, sesli dersleri yazıya dö -\nkerek kolayca not alabilir.Etkileşimli Ders İçeriği: İçeriklerin \nönemli bölümlerini vurgulayıp interaktif hâle getirebilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n202"}, {"page": 203, "text": "¬ Ödev ve Rapor Hazırlığı: Öğrenciler, araştırmalarını ve \nprojelerini daha hızlı organize edebilir.\nClipto AI, eğitimde ses ve video tabanlı içerikleri daha verimli \nkullanmayı sağlayan güçlü bir yapay zekâ aracıdır.Eğitimde Kullanımı:\n ¬ Etkileşimli ders içerikleri hazırlama.\n ¬ E-öğrenme için sesli rehberlik oluşturma.\nAuphonic:\nTanım: Auphonic, ses dosyalarını otomatik olarak optimize \neden bir platformdur.\nTemel Özellikler:\n ¬ Ses Düzeltme: Gürültü temizleme ve ses dengeleme.\n ¬ Otomatik Dosya Dönüştürme: Farklı formatlarda çıktı \noluşturma.\n ¬ Çoklu Kanal Destek: Podcast ve röportajlar için kanal \ndüzenleme.\nEğitimde Kullanımı:\n ¬ Ders kayıtlarının ses kalitesini artırma.\n ¬ Eğitim podcastlerini profesyonel hâle getirme.\nSonic AI:\nTanım: Sonic AI, yapay zekâ destekli ses oluşturma ve düzen -\nleme platformudur.\nTemel Özellikler:\n ¬ Seslendirme: Metinleri gerçekçi seslere dönüştürür.\n ¬ Ses Efektleri: Eğitim içerikleri için özelleştirilmiş ses \nefektleri ekler.\n ¬ Hızlı Entegrasyon: Eğitim materyallerine kolay entegrasyon.\nWhisper Memos\nWhisper Memos, sesli notlarınızı yazıya döken bir transkrip -\nsiyon aracıdır.\nTemel Özellikler:\n ¬ Sesli Not Dönüşümü: Kayıtları hızlıca metne çevirir.\n ¬ Hızlı Not Alma: Mobil cihazlarda sesli not tutma.\n ¬ Diller Arası Çeviri: Farklı dillerde metin çıktıları.\nEğitimde Kullanımı:\n ¬ Derslerde sesli notları yazıya dönüştürme.\n ¬ Öğrenci toplantılarından hızlı notlar çıkarma.\nNaturalReader\nNaturalReader, metinleri doğal sesli konuşmaya dönüştüren \ngüçlü bir metinden sese (text-to-speech, TTS) yapay zekâ \naracıdır.\nTemel Özellikler:\n ¬ Metinden Sese Dönüştürme: Her türlü metni (belge, web \nsayfası, e-kitap vb.) yüksek kaliteli doğal sesle okur.\n ¬ Farklı Ses Seçenekleri: Erkek/kadın, farklı diller ve aksan -\nlarda geniş ses kütüphanesi sunar.\n203\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 204, "text": "¬ Dosya Dışa Aktarma:  Ses dosyası (MP3) olarak kaydetme \nimkanı sağlar.\n ¬ Tarayıcı ve Uygulama Entegrasyonu: Web sayfalarını \ndoğrudan seslendirebilir, mobil ve masaüstü uygulama \ndesteği bulunur.\nEğitimde Kullanımı:\n ¬ Görme engelli veya okuma güçlüğü yaşayan öğrenciler \niçin erişilebilir öğrenme materyalleri sağlamak.\n ¬ Öğrencilerin yabancı dil telaffuzlarını geliştirmek için \ndinleme çalışmaları hazırlamak.\n ¬ Ders kitapları veya uzun metinleri sesli içerik hâline ge -\ntirerek öğrenmeyi desteklemek.\n ¬ Sınav ve etkinlik öncesi sesli tekrar materyalleri hazırlamak.Eğitimde Kullanımı:\n ¬ Okuma güçlüğü yaşayan öğrenciler için metinlerin sesli \nhâle getirilmesi.\n ¬ Yabancı dil öğreniminde dinleme ve telaffuz geliştirme \nmateryali oluşturma.\n ¬ Online ders materyallerine sesli anlatımlar ekleyerek öğ -\nrenme deneyimini zenginleştirme.\n ¬ Erişilebilirlik amaçlı sesli içerikler oluşturma (örneğin sesli \nödev yönergeleri veya duyurular).\nPlay.ht\nTanım: Play.ht, ileri seviye yapay zekâ destekli metinden sese \n(text-to-speech, TTS) dönüştürme platformudur. Profesyonel \nseslendirmeler ve doğal konuşma üretimi sağlar.\nTemel Özellikler:\n ¬ Yapay Zekâ Tabanlı Seslendirme: Gerçek insan sesine çok \nyakın, doğal ve akıcı ses üretir.\n ¬ Geniş Ses ve Dil Kütüphanesi: 100+ dil ve aksanda farklı \nses seçenekleri sunar.\n ¬ Dosya Dışa Aktarma: MP3 veya WAV formatında yüksek \nkaliteli ses dosyası olarak kaydedilebilir.\n ¬ Senaryo ve Podcast Üretimi: Uzun metinlerden profesyonel \npodcast veya sesli kitap üretimi yapabilir.Soundful:\nSoundful, yapay zekâ destekli müzik üretim platformudur. Eği -\ntim materyallerini zenginleştirmek için müzik ve ses efektleri \noluşturur.\nTemel Özellikler:\n ¬ Otomatik Müzik Üretimi: İhtiyaca özel müzik oluşturur.\n ¬ Kapsamlı Kütüphane: Farklı temalara uygun müzikler.\n ¬ Kolay Entegrasyon:  Videolara ve sunumlara kolayca eklenir.\nEğitimde Kullanımı:\n ¬ Eğitim videolarına arka plan müziği ekleme.\n ¬ Öğrenciler için rahatlatıcı çalışma müzikleri oluşturma.\nPrompt:\n\"Bir tarih dersinde kullanılacak 2 dakikalık bir video için arka \nplanda çalacak etkileyici ve dramatik bir müzik oluştur. Müzik, \nöğrencilerin dikkatini çekecek şekilde tempolu olmalı.\"\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n204"}, {"page": 205, "text": "Steno:\nSteno, sesli toplantıları otomatik olarak kaydeden ve trans -\nkripsiyon yapan bir araçtır.\nTemel Özellikler:\n ¬ Otomatik Kayıt ve Transkripsiyon: Ses kayıtlarını metne \ndönüştürür.\n ¬ Arama Özelliği: Transkripsiyon içinde belirli kelimeleri \nhızlıca bulma.\n ¬ Paylaşım: Kaydedilen metinleri kolayca paylaşma.\nEğitimde Kullanımı:\n ¬ Online ders kayıtlarını metne dönüştürme.\n ¬ Toplantı ve grup çalışmaları için not oluşturma. ¬ Çeviri & dubbing: Tek tıkla 29+ dile video tercümesi; çok \ndilli içerik üretiminde güçlü destek.\n ¬ İşbirliği & sürüm kontrolü: Canlı iş birliği, yorumlama, \nsürüm geçmişi gibi ekip odaklı araçlar içerir.\n ¬ Kurumsal güvenlik: SOC 2, GDPR, ISO 42001 uyumluluğu; \ngüçlendirilmiş AI etik politikası ile avatar güvenliği sağlanır.\nEğitimde Kullanımı:\n ¬ Uzaktan eğitim & e-öğrenim: Üniversite, kurumsal ve çev -\nrimiçi eğitimde ders anlatımları, mikro dersler ve uyum \nvideoları oluşturulabilir.\n ¬ Dil öğrenimi: Farklı aksan ve dillere çeviri/dubbing ile çok \ndilli içerikler oluşturulup aksan analizi yapılabilir.\n ¬ Teknik & uyum eğitimleri: IT, güvenlik, süreç eğitimleri için \nşablon ve avatar tabanlı anlatımlarla hızlı içerik üretimi \nmümkündür.\n ¬ Sunum & medya projeleri: Öğrenciler video sunumlarını \navatarlarla zenginleştirebilir; senaryo/script temelli üre -\ntimle medya okuryazarlığı gelişir.\n ¬ Güncelleme kolaylığı: Bir kere hazırlanan içeriği güncel -\nlemek, yeniden çekim gerekmeden sadece metni değiş -\ntirerek yapılabilir.\n Synthesia AI \nTanım: Synthesia, metin girdilerinden gerçekçi AI avatarlarıyla \nyüksek kaliteli video üretimini sağlayan bir AI video iletişim \nplatformudur. Kullanıcılar, stüdyo ortamı olmadan doğal gö -\nrünümlü konuşmacılarla eğitim, satış, pazarlama, iç iletişim \ngibi içerikleri hazırlayabilirler\nTemel Özellikler:\n ¬ 230+ AI avatar & 140+ dil desteğiyle metni konuşmaya \ndönüştürür; yüz senkronizasyonlu konuşmalar sağlar.\n ¬ Metin-tabanlı video düzenleyici: Prompt/script girerek \notomatik video oluşturma, kapalı altyazı ve otomatik çeviri \nözellikleri.\n ¬ Brand Kit & şablonlar: Kurumsal renk, font ve logolar en -\ntegre edilebilir; eğitim, satış, pazarlama için 250+ hazır \nşablon sunulur.\nSpeechify \nTanım: Speechify, metinleri yapay zekâ destekli doğal insan \nsesiyle sesli içeriklere dönüştüren bir text-to-speech (TTS) \nplatformudur. Kullanıcılar, web sayfaları, PDF’ler, dokümanlar \nve e-kitaplar gibi içerikleri uygulama veya uzantı üzerinden \ndinleyebilir.\nTemel Özellikler\n ¬ Geniş ses ve hız seçenekleri: Farklı aksanlarda, çeşitli \ntonlarda ve hızlarda seslendirmeler yapılabilir.\n205\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 206, "text": "¬ Platformlar arası erişim: iOS, Android, Chrome uzantısı \nve web uygulaması üzerinden senkronize kullanım imkânı \nsağlar.\n ¬ PDF, e-kitap ve web metin okuma: Uzun içerikleri otomatik \nalgılayıp seslendirebilir; görme bozukluğu, disleksi gibi \ndurumlarda destek sağlar.\n ¬ OCR destekli resimden okuma: Görsel içindeki metinleri \ntarayıp sesli hale getirebilir.\n ¬ Sürükle bırak altyapı: Doküman yükleyip dinleme listesine \neklemeye uygun kolay arayüz desteği sunar.\nEğitimde kullanımı\n ¬ Okuma güçlüğü olan öğrenciler için erişilebilirlik: Disleksi \nveya görme sorunları olan bireyler metinleri dinleyerek \nöğrenebilir.\n ¬ Multitasking çalışma desteği: Ders notları veya makaleler \nmobil cihazda sesli dinlenebilir; yolculukta veya egzersiz \nsırasında öğrenim sürdürülür.\n ¬ Dil öğreniminde pratik: Örnek cümle ve metinleri farklı \naksanlarla dinleyerek telaffuz öğrenimi yapılabilir.\n ¬ Dinleme temelli ödevler: Öğrenciler, ödevlerini dinleyerek \nanaliz edebilir, podcast benzeri ödev formatları oluşturabilir.\n ¬ Profesyonel içerik üretimi: Blog, sunum, tanıtım metinleri \niçin yüksek kaliteli ses dosyaları oluşturulabilirTemel Özellikler\n ¬ Gerçekçi konuşma sentezi: Alfa “Caruso” modeli ile duygu, \nnefes, duraklama gibi insan sesine ait paradox imperfe -\nctions içeren doğal ses üretimi.\n ¬ 120+ aksan ve lehçe: Çok sayıda dil, bölgesel aksan ve \nses seçeneği mevcut. \n ¬ Custom Voice Avatars: Kendi sesinizi klonlayarak marka \nveya bireysel kimlik oluşturabilirsiniz (izinli veri kullanılarak) \n ¬ API entegrasyonu: E -öğrenme, IVR, sesli bot gibi sistem -\nlere kolay eklenebilir.\n ¬ Ekip ve güvenlik desteği: Takımlarla çalışma, sürüm takibi, \nSOC 2, GDPR gibi kurumsal düzey uyumluluk.\n ¬ Pronunciation kontrolü: Oxford Languages iş birliğiyle \ngeliştirilen respelling sistemi ile doğru telaffuz garanti edilir.\nEğitimde Kullanımı:\n ¬ Uzaktan eğitim ve e-öğrenme: Eğitim videolarına pro -\nfesyonel seslendirme ekleyerek içerik kalitesi ve erişi -\nlebilirliği artırır.\n ¬ Dil öğrenimi: Farklı aksanlarla dinleme pratiği yapılabilir, \nton-hız kontrolü sayesinde telaffuz eğitimi desteklenir .\n ¬ Erişilebilir içerik üretimi: Görme engelliler ve disleksi gibi \nokuma güçlüğü yaşayan bireyler için sesli materyaller \noluşturulabilir .\n ¬ Projeye özel voice avatar kullanımı: Öğrenciler kendi \nseslerini klonlayarak sunumlarda kullanabilir ve kişisel \nmarka geliştirebilir.\n ¬ TTS sistemi entegrasyonu: Kodlama derslerinde API üze -\nrinden sesli bot veya otomatik içerik üretimi senaryoları \noluşturulabilir. \nWellSaid Nasıl Kullanılır?\n1. Web Sitesine Git\n »Ana sayfadan \"Get Started\" veya \"Try for Free\" buto -\nnuna tıklayın.\nWellSaid :\nTanım: WellSaid, metinleri insan benzeri yüksek kaliteli ses -\nlendirmeye dönüştüren bir AI text-to-speech platformudur. \nKurumsal eğitimden pazarlama içeriklerine kadar geniş kulla -\nnım alanı sunar. 50+ Fortune 500 şirketi tarafından kullanılan \ngüvenli ve etik bir çözüm olarak öne çıkar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n206"}, {"page": 207, "text": "2. Hesap Oluştur\n »E-posta ile kayıt olabilir ya da Google hesabınızla giriş \nyapabilirsiniz.\n3. Dashboard’a Giriş Yap\n »Giriş yaptıktan sonra sizi metin yazabileceğiniz ve ses \nseçebileceğiniz bir panel karşılar.\n4. Metni Yazın veya Yapıştırın\n »Okutmak istediğiniz metni paneldeki alana yazın veya \nbaşka bir yerden kopyalayarak yapıştırın.\n5. Ses Seçin (Voice Avatar)\n »Erkek/kadın, yaş, aksan gibi kriterlere göre ses seçimi \nyapabilirsiniz.\n »Dilerseniz ses önizlemesi ile dinleyip en uygun olanı \nbelirleyin.\n6. Ayarları Yapılandırın\n »Hız, vurgu, duraklama, telaffuz gibi özellikleri ayarla -\nyabilirsiniz.\n »Gelişmiş kullanıcılar için \"Respelling\" özelliği ile telaffuz \ndüzeltmesi yapılabilir.\n7. Seslendirmeyi Üretin (Generate)\n »“Build Audio” veya “Generate” tuşuna basarak ses üre -\ntimini başlatın.\n »Birkaç saniye içinde sesli çıktı hazır olur.\n8. İndir veya Paylaş\n »Üretilen sesi MP3 formatında indirebilir veya doğrudan \npaylaşabilirsiniz.\nEğitimde Örnek Kullanım:\nÖrnek: Hazırladığınız ders notlarını WellSaid’e yapıştırarak \nprofesyonel bir sesle seslendirip öğrencilerine podcast gibi \nsunabilirsiniz.ElevenLabs:\nTanım: ElevenLabs, metinden insana çok yakın doğal sesler \nüreten güçlü bir text-to-speech (TTS) ve voice cloning plat -\nformudur. 32+ dilde, duygusal nüans ve doğal vurgularla ses \nrekonstrüksiyonu sunar. Ayrıca, konuşmanızı kopyalayarak \nkişisel AI sesi oluşturmak da mümkündür.\nTemel Özellikler\n ¬ Doğal TTS: Konteksti algılayarak tonlama, hız, duygu ile \nvurguları doğru şekilde üreten sesler.\n ¬ Voice Cloning & değiştirme: Kendi sesinizi klonlayabilir \nveya mevcut sesinizi farklı bir sese dönüştürebilirsiniz.\n ¬ Çok dilli destek: 30–32 dil arasında otomatik tespit ve \nkonuşma; çok dilli anlatı, eğitim ve erişilebilir içerik üre -\ntimi kolaylaşır.\n ¬ API & entegrasyon: Geliştiriciler için robust API’lar, SDK’lar; \neğitim teknolojisi, botlar, medya ve yayın araçlarına kolay \nentegre edilebilir.\n ¬ Voice Marketplace & projeler: Kullanıcıların paylaştığı hazır \nsesler; ayrıca uzun içerikler için “Projects” özelliği mevcut.\n ¬ AI Dubbing & Reader uygulaması: Videoları dublajlama, \nPDF ve makaleleri sesli okutma özelliğiyle birlikte.\n ¬ Güvenlik & etik: Derin sahte içerik riskine karşı tespit \naraçları, kullanıcı tanıma, ödeme gereksinimi ile kontrol \nmekanizmaları kullanıyor.\nEğitimde Kullanım\n ¬ Erişilebilir e- öğrenme:  Görme engelli, disleksi gibi öğren -\nciler için metinlerin dinletilmesi; Reader uygulamasıyla \nmobil erişim \n ¬ Dil öğrenimi: Farklı aksanlarla ve duygu tonlarıyla seslen -\ndirme; telaffuz, vurgulama analizleri yapılabilir.\n ¬ Podcast / ders seslendirmesi: Öğrenciler kendi hikâye, \nproje veya sunumlarını sesli hale getirebilir; öğretmenler \nprofesyonel tonda ders içeriği hazırlayabilir.\n207\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 208, "text": "¬ Konuşan AI eğitim asistanı: Öğrencilerle etkileşim deneyimi \nverecek sesli eğitim botları geliştirilebilir.\n ¬ Multimedya entegrasyonu: Eğitim videolarına dublaj, sınıf \niçi sunumlara sesli açıklama gibi zengin içerikler üretilebilir.\nElevenLabs Nasıl Kullanılır?\n1. Web Sitesine Git\n »∂ https://www.elevenlabs.io adresine girin.\n2. Hesap Oluştur / Giriş Yap\n »“Sign up” ile e posta veya Google hesabı üzerinden kayıt \nolabilirsiniz.\n »Giriş yaptıktan sonra ana kontrol paneline yönlendi -\nrilirsiniz.\n3. Dashboard’dan “Text to Speech” seçin\n »Ana menüden \"Speech Synthesis\" veya “Create” bö -\nlümünü seçin.\n4. Metni Yazın veya Yapıştırın\n »Metin kutusuna konuşmaya çevrilmesini istediğiniz \niçeriği yazın.\n5. Ses Seçimi Yapın\n »Varsayılan seslerden birini seçebilir veya “Voice Library” \nüzerinden farklı aksan ve tonlar deneyebilirsiniz.\n »İsterseniz “Voice Cloning” kısmından kendi sesinizi \nyükleyerek klonlayabilirsiniz (Premium gerektirir).\n6. Ayarları Yapın (Opsiyonel)\n »Dil, ses hızı, duygu yoğunluğu gibi ayarları belirleye -\nbilirsiniz.\n7. “Generate” Butonuna Tıklayın\n »Ses üretimi birkaç saniye sürer. Oluşan sesi doğrudan \ndinleyebilir veya MP3 olarak indirebilirsiniz.8. (İsteğe Bağlı) Uzun Projeler için \"Projects\" özelliğini \nkullanın\n »Parça parça uzun metin seslendirmeleri için daha pro -\nfesyonel senaryo paneli sunar.\nÖrnek Kullanım – Dil Eğitimi Uygulaması\nSenaryo:\nBir İngilizce öğretmeni, öğrencilerine belirli bir metni farklı \naksanlarla dinletmek istiyor (örneğin: Amerikan, İngiliz, Avust -\nralya İngilizcesi).\nAdımlar:\n1. Öğretmen ElevenLabs’e girip kısa bir diyalog metni yazıyor:\n“Hi! I’m really excited to travel to London this summer. \nHave you ever been there?”\n2. Ses kütüphanesinden önce Amerikan İngilizcesi konuşan \nbir AI ses seçiyor ve “Generate” tuşuna basıyor.\n3. Aynı metni bu kez Britanya aksanı olan bir sesle tekrar \noluşturuyor.\n4. Son olarak Avustralya aksanı olan bir sesi seçip aynı iş -\nlemi yapıyor.\n5. Elde edilen 3 farklı sesli dosyayı öğrencilerine göndererek \nşunları söylüyor:\n“Aynı cümleyi üç farklı aksanla dinleyin. Hangi kelimeler, vurgu \nveya tonlama değişti? Not alın ve sınıfta tartışalım.\nFliki: \nTanım: Fliki, girilen metni seslendirme ve buna uygun görsellerle \nvideoya dönüştüren bir AI metinden videoya platformudur. Tek \nbir araçta script yazma, AI ses seçimi, stok medya kullanımı \nve altyazı oluşturma gibi tüm adımları içerir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n208"}, {"page": 209, "text": "Temel Özellikler\n ¬ Text-to-Video & Text-to-Speech: 2.000+ insana yakın \nses ve 80+ dil desteğiyle, metni yüksek kaliteli videolara \ndönüştürür.\n ¬ AI Avatarlar: Çekim yapmadan videoya konuşmacı (avatar) \nekleme imkânı sunar (70+ avatar) .\n ¬ Zengin stok medya: Milyonlarca görsel, video klip ve müzik \nile sahnelere uygun otomatik medya seçimi yapılır.\n ¬ Kolay düzenleme: Script tabanlı düzenleme, altyazı özel -\nleştirme, marka renkleri/font kullanımı desteklenir.\n ¬ Şablonlar: Eğitim, tanıtım, sosyal medya gibi farklı kon -\nseptler için hazır formatlar sunar.\n ¬ Web tabanlı & ücretsiz: Tarayıcıdan erişilir; sınırlı aylık \nkullanım kredileriyle ücretsiz denenebilir.\nEğitimde Kullanımı\n ¬ E-öğrenim videoları: Ders metinleri hızlıca videoya dö -\nnüştürülerek öğrencinin ilgisi artırılabilir.\n ¬ Sunuş videoları: Öğrenciler kendi hazırladıkları sunumları \navatar ve sesle profesyonel bir içerik haline getirebilir.\n ¬ Blog/metin video dönüştürmesi: Eğitim bloglarını video \niçeriğe çevirmek, geniş izleyici kitlesine erişim sağlar.\n ¬ Çok dilli içerik: Farklı dillerde altyazı ve ses senkronizas -\nyonlu videolarla yabancı dil eğitimi desteklenir.Ana özellikleri şunlardır:\n ¬ Belirli bir ses oluşturun. Bu, ünlü bir aktörün, büyüleyici \nbir seslendirme sanatçısının, bir arkadaşın veya bir bü -\nyükanne ve büyükbabanın sesi olabilir.\n ¬ Gerçek gibi kullan Konuşma metni içeriğinize Voice-Over \neklemek için 70'dan fazla dil.\n ¬ Kişisel sesli notlardan uzun toplantı konuşmalarına, hızlı \nve doğru transkripsiyon sadece bir tık uzağınızda.\n ¬ Google Drive entegrasyonu, her yerden kolayca çalışın ve \ndosyaları kolayca paylaşın.\n ¬ Voice Editor, mikrofon veya başka herhangi bir kayıt cihazı \naracılığıyla doğrudan tarayıcıdan kayıt yapabilir.\n ¬ Dosyalarınızı birçok farklı formatta, kayıpsız ve ham olarak \niçe ve dışa aktarın.\n ¬ Ayrıntılı frekans analizi için spektrogram ve spektrum \ngörselleştirmesi bir tık uzağınızda.\nEğitimde Kullanımı:\n ¬ Ders Materyalleri ve Videolar: Öğrenciler veya öğretmenler, \nseslendirme projelerinde ve videolarda farklı ses efektleri \nve karakter sesleri kullanabilir.\n6.4. Müzik Üretme \nAltered Studio:\nYapay zekâ destekli ses değiştirme ve düzenleme platformu -\ndur. İçerik üreticileri, podcast yapımcıları, video editörleri ve \neğitimciler için ideal olan bu araç, sesin tonunu, hızını ve stilini \ndeğiştirme yeteneği sunar. Özellikle karakter seslendirmeleri, \ndublaj, ses manipülasyonu ve farklı ses profilleriyle çalışmayı \nkolaylaştırır. \nAmper Music \nTanım: Yapay zekâ destekli müzik üretim platformudur. Kullanıcı -\nların çeşitli ses dosyaları ve müzik türleri üzerinde hızlıca orijinal \nmüzik oluşturmasına olanak tanır. Özellikle içerik üreticileri, \noyun geliştiricileri ve video yapımcıları için faydalıdır, çünkü \nyapay zekâ yardımıyla kişiselleştirilmiş müzikler oluşturulabilir. \n209\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 210, "text": "Özellikleri:\n ¬ Otomatik müzik oluşturma.\n ¬ Farklı müzik tarzları ve ruh hallerine göre ayarlamalar \nyapma.\n ¬ Kişiselleştirilmiş müzik üretimi.\nNasıl Kullanılır:\n1. Platforma Giriş Yapın: Amper Music web sitesine girin \nve kaydolun.\n2. Stil Seçin: Oluşturmak istediğiniz müzik türünü ve ruh \nhalini seçin.\n3. Kişiselleştirin: Parça uzunluğu, tempo ve enstrümanları \nayarlayın.\n4. Müziği İndirin: Oluşturulan müziği inceleyin ve projenize \ndahil edin. ¬ Volume Match & Genlik Eşleştirme\n »Orijinal ve master edilmiş versiyonlar ses seviyesine \ngöre eşleştirilerek gerçek değişiklikler duyulabilir \n ¬ Analiz & İşlem Kontrolleri\n »3-band EQ, stereo genişlik, sıkıştırma, doygunluk, pre -\nsence, de-esser, loudness gibi kontroller sunulur \n ¬ Stem Separation (Stems)\n »Sesleri vokal, davul, bas gibi ayrı stem’lere ayırmak için \nplugin araç sunar \n ¬ Villeşme & Dağıtım\n »Master edilmiş parçaların Spot, Apple Music gibi plat -\nformlara dağıtımını sağlayan sistem mevcuttur.\n ¬ Samples & Collaboration\n »1M+ royalty-free sample, kurslar, remote iş birliği ve \nDAW-based video sohbet özelliklerini içerir.\nEğitimde Kullanımı Önerileri\n ¬ Müzik prodüksiyon atölyeleri:\nÖğrenciler, kendi kaydettikleri parçaları ayrıştırıp mastering \nsürecini deneyimler. Farklı mastering stillerini karşılaştı -\nrarak duyum analizleri yapılır.\n ¬ Podcast / yayın dersleri:\nSeslerin netlenmesi, heavy compression’ın dinleme üze -\nrindeki etkisi ve amplitude homogenizasyonu örneklerle \nöğretilir.\n ¬ Bilgisayarlı müzik / STEM entegre projeleri:\nStem ayırma ve remix çalışmaları, kodlab ortamlarında \nmedya analizi eşliğinde gerçekleştirilir.\n ¬ Sunum & Pitch araçları:\nMasterlenmiş hazırlık sesleriyle portfolyo / sunum vide -\nolarına profesyonel boyut kazandırılır.\nLANDR: \nTanım: LANDR, Montreal merkezli MixGenius tarafından ge -\nliştirilen; müzik yapımcıları, podcastçiler ve topluluklar için \nAI destekli mastering, dağıtım, örnek kütüphane ve iş birliği \naraçları sunan kapsamlı bir ses platformudur. 2014’te baş -\nlayan mastering servisi zamanla DAW eklentisi ve dağıtım \nçözümleriyle genişlemiştir\nTemel Özellikler\n ¬ Online & DAW içi AI Mastering\n »Parça analiz edilip türüne göre özelleştirilmiş mas -\ntering zinciri uygulanır; kullanıcı üç stilden (“Warm”, \n“Balanced”, “Open”) birini seçebilir \n »Real-time DAW eklentisiyle canlı analiz ve ince ayar \nyapılabilir \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n210"}, {"page": 211, "text": "Soundraw :\nTanım: Soundraw, içerik üreticileri, müzisyenler ve öğrenciler \niçin yapay zekâ destekli bir AI müzik üretim platformudur.\n ¬ Mood, tür, tempo, tema seçenekleriyle tamamen özgün, \nroyalty free parçalar oluşturur \n ¬ Akademik kullanım için de \"Academic Plan\" sunar; müzik \neğitimi ve araştırma projeleri için uygundur \nTemel Özellikler\n ¬ Mood/Tür/Tempo kontrollü üretim: Pop, hip-hop, elekt -\nronik gibi türlerde; enerjik, dramatik gibi ruhlara uygun \nmüzik üretir.\n ¬ Şarkı yapısında özelleştirme: Giriş-koro-bölüm gibi yapı -\nların yerini değiştirebilir, enstrümanları düzenleyebilirsiniz.\n ¬ Royalty free, etik içerik: Platformun iç müzik üretimi sa -\nyesinde telif hakkı sorunları yaşanmaz.\n ¬ Format ve kalite: MP3, WAV ve hatta stem (çok parçalı) \ndosyalar indirilebilir (Pro plan ile) \n ¬ API erişimi: Kurumsal/akademik entegrasyon için API \ndesteği bulunur.\nEğitimde Kullanımı\n ¬ Müzik teorisi & kompozisyon: Farklı türlerde müzik örnekleri \nçıkarılabilir, öğrenciler düzenlemeler yaparak kompozisyon \nbecerilerini geliştirebilir.\n ¬ Multimedya projeleri: Film, video, sunum vb. çalışmaları \niçin orijinal müzikler atayabilirler. Podcast veya animasyon \nprojelerine zenginlik katar.\n ¬ Yaratıcılık ve deneye dayalı öğrenme: Yapay zekâ des -\ntekli müzik yaratımı ile öğrenciler müzik yapım mantığını \npratikle öğrenir.Soundraw Nasıl Kullanılır?\n1. Web Sitesine Git\n »∂ https://soundraw.io\n2. Hesap Oluştur / Giriş Yap\n »Ücretsiz denemek için e-posta ile kayıt olabilirsiniz.\n »Daha fazla özellik için ücretli plana geçebilirsiniz.\n3. \"Create Music\" Butonuna Tıklayın\n »Ana sayfada “Create music” veya “Start creating” gibi \nbir buton göreceksiniz.\n4. Tarz, Ruh Hali ve Tempo Seçin\n »Örnek:\n »Mood (Ruh Hali): Chill, Energetic, Dramatic\n »Genre (Tür): Hip-Hop, Cinematic, Pop\n »Length (Süre): 30 saniye – 5 dakika\n »Tempo: Yavaş, Orta, Hızlı\n5. Oluşturulan Müzikleri Dinleyin\n »Seçimlerinize uygun birkaç öneri müzik üretilir.\n »Dilediğinizi dinleyebilir, favorilerinize ekleyebilirsiniz.\n6. Müziği Düzenleyin (Edit)\n »Müzik yapısını (intro, verse, chorus vs.) değiştirin.\n »Bazı enstrümanları çıkarabilir veya tonlamaları ayar -\nlayabilirsiniz.\n211\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 212, "text": "7. İndir / Paylaş\n »Ücretsiz hesapla dinleyebilirsiniz ama indirmek için Pro \nplana geçmeniz gerekir.\n »MP3, WAV gibi formatlarda indirebilirsiniz.\nÖrnek Kullanım:\nÖğrencilerinizden kısa bir video projesi hazırlamalarını isteyin.\nHer öğrenci, Soundraw'da kendi müziğini oluşturur ve vide -\nolarına özgün bir arka plan müziği ekler.ROLI:\nTanım: ROLI, Londra merkezli bir müzik teknolojisi şirketidir. \nYenilikçi, çok dokunsal MIDI enstrümanlar (Seaboard, BLOCKS \ngibi) ve eğitim-entegrasyon uygulamaları geliştirir \nTemel Özellikler\n ¬ Seaboard (5D Touch teknolojisi): Esnek, kauçuk yüzeyler; \nbasış, sürükleme, gliss, yan kayma ve bırakma hareketle -\nrini algılayarak enstrümanın tonunu ve ifadesini kontrol \netmenizi sağlar \n ¬ BLOCKS modüler sistemi: Seaboard Block, Lightpad, Loop/\nLive/Touch Block gibi parçalar Bluetooth/Bluetooth BLE \nyoluyla bağlanarak modüler bir müzik stüdyosu oluşturur \n ¬ NOISE & ROLI Connect yazılımları: iOS/Android için NOISE \nuygulaması beat yapımı sağlar; ROLI Connect üzerinden \ncihazlar kaydedilir, sürücüler güncellenir \n ¬ Joystick-like kontrol: Lightpad üzerinde çoklu dokunma -\ntik padler; loop/sahne kontrolü ve akor/arp gibi modlar \ndesteklenir \n ¬ Airwave eğitici aksesuar: Roli Airwave; kamerayla el ha -\nreketlerini izleyip gerçek zamanlı piyano öğretimi ve not \nrehberliği sunar \nEğitimde Kullanımı\n ¬ Müzik eğitimi ve erişilebilirlik: Spektrum bozukluğu ya \nda özel gereksinimi olan öğrenciler için Lightpad temelli \nkolay dokunsal öğrenme imkânı sağlar.\n ¬ Ders müziği ve teknoloji entegrasyonu: Öğrenciler kendi \nblok devrelerini kurarak müzik üretiminde kodlama, ses \nteknolojisi ve interaktif yaratım süreçlerini öğrenir.\n ¬ AI destekli piyano eğitimi: Airwave + ROLI Learn kom -\nbinasyonu; gerçek zamanlı el pozisyonu takibi ve geri \nbildirimle bireysel ilerleme sağlar \nBoomy:\nTanım: Boomy, kullanıcıların yapay zekâ ile dakikalar içinde \nkendi müziklerini oluşturabildiği, AI destekli müzik üretim \nplatformudur.\nTemel Özellikler\n ¬ Tür seçerek otomatik müzik üretimi\n ¬ Şarkıya vokal ekleme ve düzenleme\n ¬ Spotify ve Apple Music gibi platformlara doğrudan ya -\nyınlama\n ¬ Telif hakkı size ait, gelir kazanma imkânı\n ¬ Kullanıcı dostu arayüz, kod veya müzik bilgisi gerektirmez\nEğitimde Kullanımı\n ¬ Öğrencilerin kendi şarkılarını oluşturarak yaratıcılıklarını \nifade etmeleri\n ¬ Podcast veya video projelerine özgün müzik üretimi\n ¬ Müzik türleri, yapı ve kompozisyon üzerine deneysel ça -\nlışmalar\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n212"}, {"page": 213, "text": "¬ STEM ve yaratıcılık: 5D Touch teknolojisi müzikal ifade ve \nSTEM tabanlı değerlendirme süreçlerinde interdisipliner \nbir öğrenme ortamı yaratır \nSOUNDFUL: \nTanım: Soundful, içerik üreticileri ve müzisyenler için geliştirilen \nbir AI müzik üretim platformudur. Tek tıkla royalty free, özgün \nmüzik parçaları oluşturmanızı sağlar.\nTemel Özellikler\n ¬ Mood/tür/tempo seçimiyle müzik üretimi: Lo Fi, EDM, \nHip Hop gibi 50+ stil; tempo ve ruh hali seçenekleriyle \nözelleştirme imkânı \n ¬ Yapı düzenleme: Giriş, nakarat gibi bölümler düzenlenebilir; \nenstrümanlar kontrol edilebilir.\n ¬ Royalty free lisans: Üretilen müzikler kişisel ve ticari kul -\nlanıma uygun, telif gerektirmez.\n ¬ İndirilebilir formatlar: MP3, WAV, stem paketi (çok parçalı) \nindirme imkânı \n ¬ API ve entegrasyon: İçerik, video, podcast, sosyal medya \nve oyunlarla kullanılabilir.\nEğitimde Kullanımı\n ¬ Müzik eğitimi: Öğrenciler farklı tür, tempo ve yapı para -\nmetreleriyle kompozisyon becerilerini geliştirir.\n ¬ Multimedya projeleri: Öğrenciler sunum, video ve podcast \nprojeleri için özgün müzik oluşturabilir.\n ¬ Yaratıcılık ve deneme: AI destekli müzik üretimiyle kom -\npozisyon mantığını hızlıca öğrenme imkânı tanır.\nSpleeter: \nTanım: Spleeter, Deezer tarafından geliştirilen açık kaynaklı bir \nses ayırma aracıdır. Tek bir karışık ses dosyasından vokaller, \nbateri, bas, piyano gibi ayrı “stem” bileşenleri çıkarabilir \nTemel Özellikler\n ¬ 2/4/5 stem ayrımı: Ses, ritm, bas, piyano gibi farklı par -\nçalar halinde ayırabilir \n ¬ Hızlı ve verimli: GPU kullanıldığında dört stem ayrımı gerçek \nzamanın 100 katı hızla yapılabilir \n ¬ Çok modlu kullanım: Komut satırı, Python kütüphanesi \nveya Docker üzerinden çalıştırılabilir.\n ¬ Batch işlemler: Birden fazla dosyayı tek seferde işleyerek \nverim sağlar.\nEğitimde Kullanımı\n ¬ Müzik analizi atölyeleri: Öğrenciler, bir parçayı ayrı ens -\ntrüman temsillerine bölerek analiz edebilir (ritm, melodi).\n ¬ Dijital prodüksiyon dersleri: Remix, karaoke veya video \niçin temiz müzik/stem dosyaları oluşturulabilir.\n ¬ Ses teknolojisi eğitimi: AI temelli ses işleme simülasyonları \nüzerinden öğretici deneyimler sunulabilir.\n ¬ Podcast veya film derslerine katkı: Diyalog, müzik ve ortam \nsesleri ayrılarak altyazı ve ses analiz çalışmaları yapılabilir.\n213\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 214, "text": "Loudly: \nLoudly – Tanım\nLoudly, içerik üreticileri, müzisyenler ve yaratıcı projeler için \ntasarlanmış bir AI destekli müzik üretim platformudur. Kendi \nmüziğinizi saniyeler içinde oluşturabilir, kendi ses örneklerinizi \nyükleyebilir ve dinleyici kitlesine dağıtabilirsiniz. Tüm parçalar \n%100 royalty free olarak telif sorunu olmadan kullanılabilir\nTemel Özellikler\n ¬ AI Müzik Oluşturma: Tür, tempo, ruh hali, enstrüman ve \nyapı gibi parametrelerle birkaç tıklamada özel parçalar \nüretebilirsiniz.\n ¬ Text-to-Music: Kısa metinlerle müzik oluşturma desteği \nsunar (“enerjik pop,” “lo-fi dinlenme”).\n ¬ Ses/Klip Yükleyip Remix: Kendi örnek seslerinizi yükleyerek \nAI ile remix ve mashup oluşturabilirsiniz.\n ¬ Stem İndirimi: Davul, bas, melodi gibi parçaları ayrı stem \nolarak indirip düzenleyebilirsiniz.\n ¬ Yayın Özelliği: Parçanızı doğrudan Spotify, Apple Music, \nYouTube gibi platformlara dağıtabilir, gelire dönüşmesini \nsağlayabilirsiniz.\n ¬ Etik ve Telif Güvenliği: Sanatçılardan izinli veri kullanımı \nile güvenli lisans sağlar.\nEğitimde Kullanımı (Loudly)\n ¬ Müzik üretiminde yaratıcılığı destekler: Öğrenciler ken -\ndi parçalarını AI yardımıyla kolayca üretip müzik yapım \nsürecini deneyimleyebilir.\n ¬ Multimedya projelerinde orijinal içerik: Video, sunum ve \npodcast gibi projeler için özgün, telifsiz müzikler oluş -\nturulabilir. ¬ Müzik yapısı ve kompozisyon eğitimi: Öğrenciler tempo, \nyapı (intro, verse, chorus), enstrüman seçimi gibi kav -\nramları uygulamalı öğrenebilir.\n ¬ Yapay zekâ ve sanat entegrasyonu: AI ile yaratım süreci \nüzerinden dijital sanat ve teknolojiyi birleştiren dersler \nplanlanabilir.\n ¬ Ses mühendisliği temel bilgileri: Stem dosyaları indirerek \nmiksleme ve ses katmanlarını öğrenme fırsatı sunar.\nBrain.fm: \nTanım: Kullanıcıların odaklanma, rahatlama ve uyku gibi du -\nrumlar için özel olarak tasarlanmış müzik ve sesler sunan bir \nplatformdur. Bu platform, yapay zekâ ve nörobilim prensiple -\nrini kullanarak, kullanıcıların zihinsel durumlarını iyileştirmeye \nyardımcı olacak sesler ve müzikler üretir. Kullanıcılar, Brain.\nfm'i kullanarak çalışırken odaklanmayı artırabilir, rahatlamak \niçin müzik dinleyebilir veya uyumadan önce rahatlamak için \nseslerden yararlanabilirler. Brain.fm, kullanıcıların zihinsel du -\nrumlarına göre özelleştirilmiş ses deneyimleri sunarak, daha \niyi bir zihinsel performans ve refah sağlamayı hedefler. \nEğitimde Kullanımı:\n ¬ Odaklanma ve Konsantrasyon: Öğrenciler ders çalışırken \nveya öğrenme süreçlerinde daha iyi odaklanmak için Brain.\nfm müziklerini kullanabilirler.\nNasıl Kullanılır:\n1. Hesap Oluşturun: Brain.fm'e kaydolun.\n2. Mod Seçin: Odaklanma, rahatlama veya uyku gibi bir mod \nseçin.\n3. Müziği Dinleyin: Seçilen müziği dinleyerek zihinsel duru -\nmunuzu optimize edin.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n214"}, {"page": 215, "text": "6.5. Video Oluşturma \nYapay zekâ destekli video yapım araçları, içerik üreticileri, \neğitimciler ve pazarlamacılar için hızlı, etkili ve profesyonel \ngörünümlü videolar oluşturmayı mümkün kılar. Bu araçlar, \nmetin tabanlı girdilerle otomatik video üretimi, seslendirme \nentegrasyonu, sahne düzenleme, altyazı ekleme ve görsel \nefektler gibi özellikler sunarak video prodüksiyon süreçlerini \nbüyük ölçüde kolaylaştırır.\nEğitimde, ders anlatım videoları, simülasyon içerikleri ve ani -\nmasyonlar oluşturmak için kullanılırken; pazarlama ve sosyal \nmedya alanında tanıtım videoları, reklam içerikleri ve kısa klipler \nüretmek için tercih edilir. Yapay zekâ, içeriklerin hikâye anlatımı, \ngörsel tasarım ve ses uyumu açısından daha etkili olmasını \nsağlarken, zamandan tasarruf edilmesine de yardımcı olur.\nBu araçların sunduğu otomatik senaryo oluşturma, avatar \ntabanlı sunucular, yapay zekâ destekli video düzenleme ve \ndil sentezleme gibi yenilikçi özellikler, video prodüksiyonunu \nher seviyeden kullanıcı için erişilebilir hâle getiriyor. Ancak, etik \nkullanımı, özgün içerik üretimi ve telif hakları gibi konular göz \nönünde bulundurularak bilinçli bir şekilde değerlendirilmelidir.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla deği -\nşebilir. Güncellenen ve yeni eklenen araçlar için üretici web \nsitelerinden bilgi alabilirsiniz.\n6.5.1. Video Yapım AraçlarıTemel Özellikler:\n ¬ Geniş video şablon koleksiyonu.\n ¬ Yapay zekâ destekli video düzenleme ve metin tabanlı \nvideo oluşturma.\n ¬ Sürükle-bırak arayüz ile kullanıcı dostu video düzenleme.\n ¬ Çok sayıda medya varlığı: müzik, ses, görseller ve videolar.\nEğitimde Kullanımı: \nInVideo, öğretmenlerin ve öğrencilerin eğitim içeriklerini video \nformatında sunmalarını sağlar. Öğretmenler, ders anlatımları, \nrehber videolar veya açıklayıcı içerikler hazırlayabilirler. Öğ -\nrenciler ise projelerini video sunumlar hâline getirerek, görsel \naçıdan zengin ve etkileyici içerikler üretebilirler. Video içerikleri, \neğitim sürecini daha dinamik ve ilgi çekici hâle getirir.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: InVideo’nun web sitesine gidin: InVideo\n ¬ Şablon Seçimi: Farklı video formatları için hazır şablon -\nlardan birini seçin (eğitim, iş, sosyal medya vb.).\n ¬ İçerik Yükleme ve Düzenleme: Metinlerinizi, videolarınızı \nveya görsellerinizi yükleyin. InVideo, yapay zekâ yardımıyla \nvideolarınızı düzenlemenize yardımcı olur.\n ¬ Özelleştirme: Video içeriğinizi, sürükle-bırak arayüzü ile \nkolayca özelleştirin. Metin ekleyebilir, müzik ve ses efektleri \nkullanabilir, videoları kesip düzenleyebilirsiniz.\n ¬ Videoyu Paylaşma veya İndirme: Videonuzu tamamladıktan \nsonra, indirin veya sosyal medya platformlarında paylaşın.\n ¬ Web Sayfası: InVideoInVideo:\nTanım: InVideo, kullanıcıların yapay zekâ destekli araçlarla hızlı \nve kolay bir şekilde video içerikleri oluşturmasını sağlayan bir \nplatformdur. InVideo, kullanıcıların videolarını özelleştirmele -\nrine, şablonlar kullanarak video düzenlemeleri yapmalarına ve \nprofesyonel görünümlü videolar oluşturmasına olanak tanır. \nPlatform, sosyal medya gönderileri, sunumlar, eğitim video -\nları ve tanıtım filmleri gibi çeşitli formatlarda içerik üretmeyi \nkolaylaştırır. https://invideo.io/ \n215\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 216, "text": "Eğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: InVideo, öğretmenlerin ders anlatımlarını \nvideo formatında sunmalarına olanak tanır. Eğitim ma -\nteryalleri ve ders içeriği, kısa videolar halinde hazırlanarak, \nuzaktan eğitimde veya sınıf içinde kullanılabilir. Ayrıca \nrehber videolar, sınav açıklamaları veya proje tanıtımları \ngibi eğitim içerikleri oluşturmak için idealdir.\n ¬ Öğrenciler: Öğrenciler, projeleri ve sunumlarını görsel \nve dinamik hâle getirmek için InVideo’yu kullanabilirler. \nProjelerini video formatında sunarak bilgilerini daha etkili \nbir şekilde aktarabilirler. Ayrıca grup projeleri için de video \noluşturma süreci iş birliğine dayalı olabilir.Eğitimde Kullanımı:\n ¬ Ders Videolarını Parçalara Ayırma: Öğretmenler, uzun ders \nanlatımlarını daha sindirilebilir kısa videolara dönüştürebilir.\n ¬ Öğrenci Sunum
