h, içerik yerleşimi ve tasarımı konusunda öneriler sunar.\n ¬ İşbirliği Yapma: Ekip üyelerini sunuma davet edin ve gerçek \nzamanlı olarak birlikte çalışın. Herkes aynı anda düzen -\nlemeler yapabilir ve yorum ekleyebilir.\n ¬ Sunumu Paylaşma veya İndirme: Sunumu tamamladık -\ntan sonra çevrim içi paylaşabilir veya PDF, PowerPoint \nformatında indirebilirsiniz.\n ¬ Web Sayfası: https://pitch.com/ \nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Pitch, öğretmenlerin ders sunumlarını iş \nbirliği içinde hazırlamalarına yardımcı olur. Ders planları \nve sunumlar üzerinde ekip çalışması yapılabilir, öğret -\nmenler birbirlerinin fikirlerinden faydalanabilirler. Ayrıca, \nders içeriklerinin görsel açıdan daha etkileyici hâle geti -\nrilmesine olanak tanır.\n ¬ Öğrenciler: Öğrenciler, grup projelerinde Pitch’i kullanarak \netkili sunumlar oluşturabilirler. Gerçek zamanlı işbirliği \nsayesinde, projelerde tüm ekip üyeleri katkı sağlayabilir. \nAynı zamanda profesyonel şablonlar ve yapay zekâ des -tekli tasarım önerileri, öğrencilerin projelerini daha etkili \nbir şekilde sunmalarını sağlar.\nPresentations AI:\nTanım: Presentations AI, yapay zekâ destekli bir sunum oluştur -\nma platformudur. Bu platform, kullanıcıların sadece içeriklerini \ngirmesiyle otomatik olarak düzenlemeler yapar ve profesyonel \nsunumlar üretir. Presentations AI, slayt tasarımı, düzenleme \nve içerik optimizasyonu konularında yapay zekâdan faydala -\nnarak, kullanıcıların daha hızlı ve verimli bir şekilde etkileyici \nsunumlar oluşturmasına olanak tanır. \nTemel Özellikler:\n ¬ Yapay zekâ destekli otomatik tasarım ve slayt düzenleme.\n ¬ Metin ve görsellerin en uygun şekilde yerleştirilmesi için \niçerik analizi.\n ¬ Hızlı ve profesyonel sunum şablonları.\n ¬ Google Slides ve PowerPoint ile uyumlu çalışabilme.\nEğitimde Kullanımı: \nPresentations AI, öğretmenler ve öğrenciler için sunum oluş -\nturmayı hızlı ve kolay hâle getirir. Öğretmenler, ders materyal -\nlerini hızla sunuma dönüştürebilirken, öğrenciler projelerini ve \naraştırmalarını profesyonel görünümlü sunumlarla sunabilirler. \nYapay zekâ, içerikleri analiz ederek en uygun slayt yerleşimini \nönerir, bu da içerik üretme sürecini hızlandırır.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Presentations AI’nin web sitesine \ngidin: Presentations AI\n ¬ Şablon Seçimi: Farklı sunum şablonlarından birini seçin \nveya sıfırdan oluşturun.\n ¬ İçerik Ekleme:  Metinlerinizi ve görsellerinizi yükleyin. Pre -\nsentations AI, yapay zekâ ile bu içerikleri düzenleyerek en \nuygun slayt düzenini önerir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n242"}, {"page": 243, "text": "¬ Düzenleme ve Özelleştirme: Yapay zekâ önerilerine göre \ndüzenlemeler yapın ve sunumunuzu özelleştirin.\n ¬ Sunumu Paylaşma veya İndirme: Tamamladığınız sunumu \nGoogle Slides veya PowerPoint formatında paylaşabilir ya \nda indirebilirsiniz.\n ¬ Web Sayfası: https://www.presentations.ai/tr\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Presentations AI, öğretmenlerin ders içerikle -\nrini hızlıca organize etmelerine yardımcı olur. Öğretmenler, \niçeriklerini girip yapay zekânın düzenleme önerilerini takip \nederek profesyonel sunumlar oluşturabilirler. Bu sayede \nders anlatımları daha etkili ve görsel açıdan zengin hâle gelir.\n ¬ Öğrenciler: Öğrenciler, projeleri ve sunumları için Pre -\nsentations AI’yi kullanarak profesyonel görünümlü ve iyi \norganize edilmiş sunumlar hazırlayabilirler. Yapay zekâ \ndesteği, sunumların tasarımını otomatikleştirir ve öğren -\ncilerin yalnızca içeriklerine odaklanmasını sağlar.için hızlı bir başlangıç sağlar. Öğrenciler projelerini görsel açıdan \nzengin ve profesyonel bir şekilde sunarken, öğretmenler de \nders sunumlarını daha ilgi çekici hâle getirebilirler. Özellikle \nöğretmenler, sınıf içi aktiviteler ve ders planlaması için özel -\nleştirilebilir şablonları kullanabilir.\nWeb Sayfası: https://slidesgo.com/ \nSlidesgo, eğitimde sunum hazırlarken kullanıcıya zaman kazan -\ndırır ve görsel olarak zengin, etkili sunumlar oluşturulmasına \nolanak tanır. Öğrenciler ve öğretmenler için yaratıcılığı artırır -\nken aynı zamanda sunumları profesyonel bir seviyeye çıkarır.\nSlidesgo Nasıl Kullanılır?\nSlidesgo'nun kullanımı oldukça kolay ve sezgiseldir. Aşağıda \nadım adım Slidesgo'nun nasıl kullanılacağını açıklıyorum:\n1. Web Sitesine Erişim\n »Adım: Slidesgo'nun web sitesine giriş yapın: Slidesgo\n »Not: Ücretsiz şablonlar mevcuttur ancak premium \nşablonlara erişmek için bir üyelik oluşturabilirsiniz.\n2. Kategorilere Göz Atma\n »Adım: Web sitesinde farklı kategorilerde (Eğitim, İş, \nYaratıcı Sunumlar, Sağlık, Pazarlama vb.) sunum şab -\nlonlarına göz atabilirsiniz.\n »Not: Eğitim kategorisi, öğretmenler ve öğrenciler için \nen uygun şablonları sunar.\n3. Şablon Seçimi\n »Adım: İlgilendiğiniz şablonu seçin. Şablonun ön izle -\nmesine bakarak sunum stilini değerlendirebilirsiniz.\n »Not: Şablonlar hem Google Slides hem de PowerPoint \niçin kullanılabilir.\n4. Şablonu İndirme\n »Adım: Seçtiğiniz şablonun altında bulunan \"Google \nSlides ile Düzenle\" veya \"PowerPoint ile İndir\" seçe -\nneklerinden birine tıklayın.\nSlidesgo: \nTanım: Slidesgo, kullanıcıların ihtiyaçlarına uygun profesyo -\nnel şablonlar sunan bir platformdur. Eğitim, iş, yaratıcılık gibi \nfarklı kategorilerde çok sayıda ücretsiz ve premium sunum \nşablonuna erişim sağlar. Slidesgo, PowerPoint ve Google Sli -\ndes ile uyumludur, bu da içeriklerin hızlı ve kolay bir şekilde \ndüzenlenmesini sağlar.\nTemel Özellikler:\n ¬ Kapsamlı şablon galerisi (eğitim, iş, yaratıcı sunumlar).\n ¬ PowerPoint ve Google Slides ile entegrasyon.\n ¬ Özelleştirilebilir grafikler, simgeler ve infografikler.\nEğitimde Kullanımı: \nEğitimde Slidesgo, öğretmenler ve öğrenciler için geniş bir \nşablon yelpazesi sunarak ders materyalleri, projeler ve sunumlar \n243\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 244, "text": "»Not: Eğer Google Slides seçeneğini kullanacaksanız, \nşablon otomatik olarak Google Drive hesabınıza ekle -\nnir ve çevrim içi düzenleme yapabilirsiniz. PowerPoint \nseçeneğinde ise şablon bilgisayarınıza indirilecektir.\n5. Şablonu Düzenleme\n »Adım: Şablonu Google Slides veya PowerPoint'te açın.\n »Adım: Şablonun metinlerini, görsellerini, grafiklerini ve \nsimgelerini ihtiyaçlarınıza göre özelleştirin.\n »Not: Slidesgo şablonları tamamen özelleştirilebilir; yazı \ntipleri, renkler ve şekiller kolayca düzenlenebilir.\n6. Sunumu Hazırlama\n »Adım: Sunumunuzu hazırlarken, şablondaki mevcut dü -\nzenlemeleri kullanarak içeriğinizi yerleştirin. Grafikleri ve \ntabloları da sunumun konusuna göre ayarlayabilirsiniz.\n »Not: Şablonun tüm slaytları, projeler veya ders anla -\ntımları için profesyonel bir görünüm sağlar.\n7. Sunumunuzu Paylaşma veya Sunma\n »Adım: Google Slides'ta sunumunuzu çevrim içi olarak \npaylaşabilir veya PowerPoint'te indirilen sunumu sınıfta \nya da çevrim içi platformlarda sunabilirsiniz.\n »Not: Slidesgo şablonları her iki platformla da sorunsuz \nentegre olduğundan sunum sırasında herhangi bir teknik \nsorun yaşamazsınız.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Ders planları, konu anlatımları, sınıf aktivite -\nleri için özelleştirilmiş şablonlar kullanabilir. Görsel açıdan \nzengin materyaller hazırlayarak öğrencilerin ilgisini çekebilir.\n ¬ Öğrenciler: Proje sunumları, grup çalışmaları veya bireysel \naraştırmalar için profesyonel görünümlü sunumlar hazır -\nlayabilir. Hazır şablonlar sayesinde zaman kazanıp, içerik \nve araştırmaya daha fazla odaklanabilirler.\nSlidesgo, eğitim sürecini daha etkileyici ve düzenli hâle getirir -\nken, yaratıcı ve profesyonel sunumlar hazırlamayı kolaylaştırır. Slidesgo ile Bilgilendirici Sunum Tasarımı\nSınıf Düzeyi: 4. Sınıf\nDers: Fen Bilimleri / Hayat Bilgisi / Türkçe\nSüre: 1 ders saati (40–45 dk)\nAraç: www.slidesgo.com\nGerekli Ek Araç: Google Slides veya PowerPoint\nAmaç:\nÖğrencilerin hazır şablonları kullanarak bilgi düzenleme, görsel \nanlatım ve dijital sunum becerisi kazanmaları.\nEtkinlik Adımları:\n1. Konu Seçimi (5 dk):\n »Öğrencilere 3 başlık arasından seçim yaptırılır:\n »“Geri Dönüşüm Nedir?”\n »“Hayvanlar ve Yaşam Alanları”\n »“Doğru Beslenme Kuralları”\n2. Slidesgo’ya Giriş (5 dk):\n »Öğretmen, slidesgo.com sitesinden “Education” ka -\ntegorisini açar ve çocuklara uygun şablonları tanıtır.\n »Öğrenciler uygun şablonu seçer ve Google Slides üze -\nrinden açar.\n3. İçerik Ekleme (20 dk):\n »Öğrenciler sunumdaki başlıklara metin, resim ve ikonlar \nekler:\n1. slayt: Başlık ve ad\n2. slayt: Konu tanımı\n3. slayt: 2–3 örnek görsel veya madde\n4. slayt: Kapanış (Bir soru ya da slogan)\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n244"}, {"page": 245, "text": "4. Sunum ve Paylaşım (10–15 dk):\n »Öğrenciler sunumlarını sınıfa kısaca tanıtır.\n »Öğretmen ve arkadaşları olumlu geri bildirim verir.\nKazanımlar:\n ¬ Temel dijital araç kullanımı\n ¬ Bilgi seçme ve düzenleme becerisi\n ¬ Görsel okuryazarlık\n ¬ Sunum yapma cesareti ve iletişim becerisirenciler için daha anlaşılır sunumlar oluşturabilirler. Öğren -\nciler ise, projeleri ve araştırmaları için profesyonel sunumlar \nhazırlayabilir. Decktopus, eğitimde zaman tasarrufu sağlar \nve kullanıcıların içeriklerini hızlı bir şekilde sunuma dönüş -\ntürmesine yardımcı olur.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Decktopus'un web sitesine gidin: \nDecktopus\n ¬ Şablon Seçimi: Farklı şablonlardan birini seçin veya sıfırdan \nbir sunum oluşturmaya başlayın. Eğitim, iş, pazarlama \ngibi çeşitli kategoriler mevcuttur.\n ¬ İçeriği Ekleme: Metinlerinizi ve görsellerinizi ekleyin. Deck -\ntopus, yapay zekâ kullanarak bu içerikleri otomatik olarak \nsunum slaytlarına dönüştürür ve düzenler.\n ¬ Düzenleme ve Özelleştirme: Şablonu, renkleri, fontları ve \ndiğer görselleri isteğinize göre düzenleyin. Yapay zekâ \nönerileri doğrultusunda sunumunuzu geliştirebilirsiniz.\n ¬ Sunumu Paylaşma veya İndirme: Sunumunuzu tamamla -\ndıktan sonra, PDF veya PowerPoint formatında indirebilir \nya da çevrim içi olarak paylaşabilirsiniz.\n ¬ Web Sayfası: https://www.decktopus.com/ \nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Hızlı ders materyali hazırlamak için Deck -\ntopus’u kullanabilir. Yapay zekâ destekli içerik önerileri \nsayesinde zaman kazanırken görsel olarak güçlü sunum -\nlar oluşturabilirler. Ayrıca, sunumlara etkileşimli formlar \nveya anketler ekleyerek öğrencilerle daha interaktif dersler \nyapabilirler.\n ¬ Öğrenciler: Proje ve araştırma sunumlarını daha etkili ve \ndüzenli hâle getirebilirler. Decktopus, öğrencilerin gör -\nsel açıdan zengin, profesyonel sunumlar hazırlamasını \nkolaylaştırır ve sunum sırasında dikkat çekici içerik sun -\nmalarını sağlar.\nDecktopus, eğitimde sunum oluşturma sürecini basit ve hızlı \nhâle getirerek, etkili ve profesyonel sonuçlar elde edilmesine \nyardımcı olur.Decktopus: \nTanım: Decktopus, yapay zekâ destekli sunum oluşturma plat -\nformudur. Platform, kullanıcıların metinlerini otomatik olarak \nsunum slaytlarına dönüştürür ve estetik olarak düzenler. Sunum \niçeriklerine odaklanan Decktopus, hızlı ve etkili bir şekilde pro -\nfesyonel sunumlar hazırlamanıza olanak tanır. İçerik oluşturma \nsürecini basitleştirir ve kullanıcıların metinlerini görsel açıdan \nçekici bir sunuma dönüştürür.\nTemel Özellikler:\n ¬ Yapay zekâ destekli içerik düzenleme ve otomatik slayt \noluşturma.\n ¬ Farklı tema ve şablon seçenekleri.\n ¬ İçerik önerileri, ikonlar, resimler ve görsel düzenleme \naraçları.\n ¬ Etkileşimli ve özelleştirilebilir formlar ve anketler ekleme \nimkanı.\nEğitimde Kullanımı: \nDecktopus, öğretmenler ve öğrenciler için ideal bir araçtır. \nÖğretmenler, ders materyallerini hızlıca düzenleyebilir ve öğ -\n245\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 246, "text": "Prezo.ai\nTanım: Prezo.ai, kullanıcıların yapay zekâ desteğiyle hızlı ve \netkili sunumlar oluşturmasını sağlayan bir platformdur. Prezo.\nai, kullanıcıların girdiği bilgileri analiz ederek, otomatik olarak \nsunum tasarımı ve içerik önerileri sunar. Böylece, minimum \nçabayla profesyonel sunumlar hazırlamak mümkün hâle gelir.\nTemel Özellikler:\n ¬ Yapay zekâ destekli otomatik içerik oluşturma ve düzen -\nleme.\n ¬ Akıllı şablon önerileri ve otomatik slayt tasarımı.\n ¬ Kapsamlı grafik ve görsel seçenekleri.\n ¬ Kullanıcı dostu, sezgisel arayüz.\nEğitimde Kullanımı: \nPrezo.ai, öğretmenlerin ders materyallerini ve öğrencilerin \nprojelerini hızlı ve etkili bir şekilde sunum hâline getirmelerine \nyardımcı olur. Yapay zekâ desteğiyle, öğretmenler ve öğrenciler \nzaman kazanarak içeriklerine odaklanabilirler. Prezo.ai, eğitimi \ndaha interaktif ve görsel hâle getirmek için ideal bir araçtır.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Prezo.ai'nin web sitesine gidin: Pre -\nzo.ai\n ¬ İçerik Ekleme: Metinlerinizi ve görsellerinizi girin. Pre -\nzo.ai, bu içerikleri analiz ederek otomatik olarak sunum \nslaytlarına dönüştürür.\n ¬ Düzenleme ve Özelleştirme: Yapay zekâ tarafından önerilen \nşablonları ve tasarımları isteğinize göre düzenleyin. Renkler, \nfontlar ve görseller üzerinde kişiselleştirme yapabilirsiniz.\n ¬ Sunumu Paylaşma veya İndirme: Tamamladığınız sunumu \nPDF, PowerPoint veya çevrim içi formatta paylaşabilirsiniz.\n ¬ Web Sayfası: https://prezo.ai/ Eğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Prezo.ai, öğretmenlerin hızlı bir şekilde ders \nmateryali hazırlamasına olanak tanır. Yapay zekâ desteği \nsayesinde içeriklerini profesyonel görünümlü sunumlara \ndönüştürebilirler. Ayrıca, öğretmenler eğitim içeriklerini \ndaha görsel ve anlaşılır hâle getirebilirler.\n ¬ Öğrenciler: Öğrenciler, proje ve araştırmalarını etkili su -\nnumlara dönüştürebilir. Prezo.ai, öğrencilerin hazırladığı \niçeriklere dayalı olarak akıllı sunumlar oluşturur ve onların \nprofesyonel sunumlar yapmalarına yardımcı olur.\nPrezo.ai, eğitimde zaman tasarrufu sağlayarak sunum hazır -\nlama sürecini basit ve etkili hâle getirir. Hem öğretmenler hem \nde öğrenciler için hızlı, yaratıcı ve profesyonel çözümler sunar.\nGamma\nTanım: Gamma, kullanıcıların yapay zekâ destekli, hızlı ve etki -\nleyici sunumlar oluşturmasına yardımcı olan bir platformdur. \nPlatform, içeriklerinizi analiz ederek en uygun sunum düzenini \nönerir ve otomatik olarak slaytlar oluşturur. Sunumunuzu daha \netkili hâle getirmek için modern ve minimal tasarımlar sağlar.\nTemel Özellikler:\n ¬ Yapay zekâ destekli içerik analizi ve otomatik slayt oluş -\nturma.\n ¬ Şık ve modern sunum şablonları.\n ¬ Kullanıcı dostu arayüz ve kolay düzenleme araçları.\n ¬ Dinamik içerik önerileri ve düzenleme seçenekleri.\nEğitimde Kullanımı: \nGamma, öğretmenler ve öğrenciler için etkili bir sunum oluş -\nturma aracıdır. Eğitim materyallerinin sunum hâline getirilmesi \nsürecini hızlandırır ve daha görsel bir anlatım sağlar. Özellikle \nöğretmenler, ders içeriklerini kolayca organize edebilir ve öğ -\nrenciler de projelerini şık sunumlar hâline getirebilirler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n246"}, {"page": 247, "text": "Nasıl Kullanılır?\n ¬ Web Sitesine Erişim: Gamma'nın web sitesine gidin: Gamma\n ¬ İçerik Ekleme: Sunumunuzu oluşturmak için metinleri ve \ngörselleri ekleyin. Gamma, bu içerikleri analiz ederek en \nuygun slayt düzenini önerir.\n ¬ Düzenleme ve Özelleştirme: Sunumunuzu yapay zekâ \nönerileriyle özelleştirin. Renk, font ve düzeni isteğinize \ngöre ayarlayın.\n ¬ Sunumu Paylaşma veya İndirme: Tamamlanan sunumu \nPDF, PowerPoint formatında indirin veya çevrim içi olarak \npaylaşın.\n ¬ Web Sayfası: https://gamma.app/tr \nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler:  Gamma, öğretmenlerin derslerini daha etki -\nleyici hâle getirmelerine yardımcı olur. Yapay zekâ desteği \nile ders içeriklerini hızlıca organize edebilir, ders anlatım -\nlarını daha görsel ve anlaşılır hâle getirebilirler. Özellikle \nzaman kısıtlaması olan durumlarda etkili bir çözüm sunar.\n ¬ Öğrenciler: Öğrenciler, projeleri veya ödevleri için profes -\nyonel sunumlar hazırlayabilirler. Gamma, metinleri analiz \nederek en uygun düzeni önerir ve görsel açıdan güçlü \nsunumlar ortaya çıkmasını sağlar.\nGamma, eğitimde içeriklerin görsel ve etkili bir şekilde sunul -\nmasını sağlar. Öğretmenler ve öğrenciler için zaman kazandıran \nve içerik oluşturma sürecini basitleştiren güçlü bir araçtır.\nGamma ile Sunum Oluşturuyorum\nSınıf Düzeyi: 5. Sınıf\nDers: Bilişim Teknolojileri ve Yazılım\nKonu: Dijital Güvenlik / Teknolojinin Günlük Yaşamdaki Yeri\nSüre: 1 ders saati (40–45 dk)\nAraç: www.gamma.appAmaç:\nÖğrencilerin yapay zekâ destekli sunum hazırlama deneyimi \nyaşaması, bilgi seçme, sade sunum yapma ve dijital araç kul -\nlanım becerisi geliştirmesi.\nEtkinlik Adımları:\n1. Konu Tanıtımı (5 dk):\n »Öğretmen, 2 başlık önerir:\n »“Güçlü Şifre Oluşturmanın Önemi”\n »“Bilgisayarı Kullanırken Nelere Dikkat Etmeliyiz?”\n2. Gamma’ya Giriş (5 dk):\n »Öğrenciler gamma.app adresine girer.\n »Gmail ile giriş yaparak ücretsiz hesap oluştururlar.\n3. Yapay Zekâyla Sunum Oluşturma (15 dk):\n »Öğrenciler bir cümlelik prompt yazar:\n“5. sınıf öğrencileri için güçlü şifre oluşturma hakkında \neğlenceli bir sunum hazırla.”\n »Gamma sunumu otomatik olarak hazırlar.\n4. Düzenleme (10 dk):\n »Öğrenciler içerikleri kontrol eder, slayt başlıklarını sa -\ndeleştirir.\n »Gerekirse Türkçeye çevirir ve metinleri basitleştirir.\n5. Sunum ve Paylaşım (10 dk):\n »2-3 öğrenci kısa sunum yapar.\n »Sınıf arkadaşları “beğendiğim yönler” kartlarıyla geri \nbildirim verir.\n247\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 248, "text": "Kazanımlar:\n ¬ Yapay zekâ temelli araçları tanıma\n ¬ Dijital güvenlik farkındalığı\n ¬ Sunum oluşturma ve düzenleme becerisi\n ¬ Teknolojiyle üretken olma deneyimiNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Canva'nın web sitesine gidin: Canva\n ¬ Şablon Seçimi: İhtiyacınıza uygun bir şablon seçin (su -\nnumlar, infografikler, posterler vb.).\n ¬ İçeriği Ekleme: Kendi metinlerinizi, resimlerinizi ve gra -\nfiklerinizi ekleyin veya Canva’nın sunduğu içeriklerden \nyararlanın.\n ¬ Düzenleme ve Özelleştirme: Şablonu isteğinize göre \nözelleştirin. Renkler, fontlar, grafikler ve videolar üzerin -\nde kişiselleştirmeler yapabilirsiniz.\n ¬ Sunumu Paylaşma veya İndirme: Hazırladığınız içeriği \nPDF, JPG veya PowerPoint formatında indirebilir ya da \nçevrim içi paylaşabilirsiniz.\n ¬ Web Sayfası: https://www.canva.com/\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Canva, öğretmenlerin sınıf içi materyallerini \n(sunumlar, ders planları, ödev kılavuzları) profesyonel ve \nilgi çekici bir şekilde hazırlamasını sağlar. Canva'nın ge -\nniş şablon seçenekleri ve grafik araçları, öğretmenlerin \nkarmaşık bilgileri daha kolay anlaşılır hâle getirmelerine \nyardımcı olur.\n ¬ Öğrenciler: Canva, öğrencilerin projelerini daha görsel ve \nyaratıcı hâle getirmelerine olanak tanır. Öğrenciler, pro -\njelerini, sunumlarını ve raporlarını görsel açıdan zengin \nve etkileyici bir şekilde sunabilirler.\nCanva, eğitimde yaratıcı ve profesyonel tasarımlar oluşturmak \niçin kullanımı kolay bir araçtır. Hem öğretmenler hem de öğ -\nrenciler için içerik oluşturma süreçlerini hızlandırır ve tasarım \nbecerisi gerektirmeden etkileyici sonuçlar elde etmelerini sağlar.\nCanva\nTanım: Canva, kullanıcıların sunumlar, grafikler, posterler, sos -\nyal medya içerikleri ve daha fazlasını oluşturmasına yardımcı \nolan popüler bir çevrim içi tasarım platformudur. Canva, geniş \nşablon koleksiyonu ve sürükle-bırak düzenleme arayüzü ile \nkullanıcıların kolayca profesyonel görünümlü içerikler oluş -\nturmasını sağlar. Yapay zekâ destekli araçlar sayesinde hızlı \ndüzenleme ve tasarım önerileri sunar.\nTemel Özellikler:\n ¬ Binlerce özelleştirilebilir şablon (sunumlar, posterler, sosyal \nmedya içerikleri, infografikler vb.).\n ¬ Sürükle-bırak arayüz ile kolay düzenleme.\n ¬ Geniş bir yelpazede grafik, ikon, resim ve video seçenekleri.\n ¬ Yapay zekâ destekli tasarım önerileri ve otomatik düzen -\nleme seçenekleri.\nEğitimde Kullanımı: \nCanva, öğretmenler ve öğrenciler için eğitim materyallerini \nve projeleri daha çekici hâle getiren bir araçtır. Canva ile öğ -\nretmenler ders sunumlarını, ödev kılavuzlarını, infografikleri \nve dijital ders materyallerini kolayca tasarlayabilir. Öğrenciler \nise, projelerini ve sunumlarını daha görsel ve profesyonel bir \nşekilde hazırlayabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n248"}, {"page": 249, "text": "Plus AI\nTanım: Plus AI, Google Slides ve PowerPoint ile entegre olan \nyapay zekâ destekli bir sunum oluşturma aracıdır. Plus AI, \nkullanıcıların sunumlarını hızlı bir şekilde planlamalarına, \noluşturmasına ve düzenlemesine yardımcı olur. Yapay zekâ, \nkullanıcının girdilerine göre öneriler sunarak içeriklerin daha \nhızlı bir şekilde oluşturulmasını sağlar ve profesyonel sunumlar \nüretir. Ayrıca, slayt yerleşimi, düzen önerileri ve içerik optimi -\nzasyonu gibi özellikler sunar. \nTemel Özellikler:\n ¬ Yapay zekâ ile otomatik sunum oluşturma ve düzenleme.\n ¬ Google Slides ve PowerPoint ile entegrasyon.\n ¬ İçerik ve slayt yerleşimi için akıllı öneriler.\n ¬ Şablonlar ve tasarım düzenlemeleri ile profesyonel su -\nnumlar üretme.\nEğitimde Kullanımı: \nPlus AI, eğitimde hem öğretmenler hem de öğrenciler için \nprofesyonel sunumların hızlı bir şekilde oluşturulmasını sağlar. \nÖğretmenler, ders sunumlarını ve eğitim materyallerini yapay \nzekâ yardımıyla kolayca organize edebilir ve zaman kazana -\nbilirler. Öğrenciler ise projelerini ve ödevlerini hızlıca sunuma \ndönüştürerek içeriklerine odaklanabilirler.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Plus AI'nin web sitesine gidin: Plus AI\n ¬ Google Slides veya PowerPoint ile Entegre Etme: Plus AI’yi \nGoogle Slides veya PowerPoint ile entegre edin.\n ¬ Sunum İçeriği Ekleme: Plus AI’ye sunumunuzun başlıklarını \nve temel bilgileri ekleyin. Yapay zekâ, slaytlarınızı otomatik \nolarak düzenler ve öneriler sunar. ¬ Düzenleme ve Özelleştirme: Yapay zekâ önerilerine göre \nslaytlarınızı düzenleyin ve isteğinize göre özelleştirin.\n ¬ Sunumu Paylaşma veya İndirme: Sunumunuzu Goog -\nle Slides veya PowerPoint formatında paylaşabilir veya \nindirebilirsiniz.\n ¬ Web Sayfası: https://plusai.com/ \nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Plus AI, öğretmenlerin ders sunumlarını \nhızlıca hazırlamalarına yardımcı olur. Yapay zekâ destekli \nöneriler sayesinde, öğretmenler slayt yerleşimlerini ve \niçeriği optimize edebilir ve ders anlatımlarını daha etkili \nhâle getirebilirler.\n ¬ Öğrenciler: Öğrenciler, projeleri ve sunumları için Plus AI’yi \nkullanarak profesyonel sunumlar oluşturabilirler. Yapay \nzekâ, öğrencilere sunumların yapısını önerir ve düzenler, \nböylece içeriklerini daha etkili bir şekilde sunabilirler.\nSlidebean:\nTanım: Slidebean, kullanıcıların hızlı ve profesyonel sunumlar \noluşturmasına yardımcı olan bir yapay zekâ destekli platformdur. \nPlatform, kullanıcıların içeriğini analiz eder ve otomatik olarak \nen uygun slayt düzenini oluşturur. Slidebean, tasarımı tamamen \nyapay zekâya bırakarak, kullanıcıların sadece içerik girmesiyle \netkileyici sunumlar yapmalarını sağlar. Bu sayede, profesyonel \ntasarım bilgisi gerektirmeden hızlıca sunum oluşturulabilir. \nTemel Özellikler:\n ¬ Yapay zekâ destekli otomatik tasarım ve düzenleme.\n ¬ Hazır şablonlar ve özelleştirilebilir düzenler.\n ¬ İçerik analizi ve yerleşim önerileri.\n ¬ Profesyonel görseller, grafikler ve infografik desteği.\n249\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 250, "text": "Eğitimde Kullanımı: \nSlidebean, öğretmenler ve öğrenciler için hızlıca sunum ha -\nzırlamayı kolaylaştırır. Öğretmenler ders anlatımları için etkili \nve görsel açıdan güçlü sunumlar hazırlayabilirler. Öğrenciler \nise projelerini profesyonel bir şekilde sunabilir ve hızlı içerik \noluşturma süreci ile zaman kazanabilirler. Yapay zekâ, içeri -\nği düzenleyip görsel olarak optimize ettiğinden, kullanıcılara \nsadece metin eklemek kalır.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Slidebean'in web sitesine gidin: \nSlidebean\n ¬ Şablon Seçimi: Farklı kategorilerde sunulan şablonlardan \nbirini seçin (eğitim, iş, yaratıcı projeler vb.).\n ¬ İçerik Ekleme: Metinlerinizi ve temel bilgilerinizi girin. \nSlidebean, bu içerikleri analiz ederek en uygun yerleşimi \nyapay zekâ ile oluşturur.\n ¬ Düzenleme ve Özelleştirme: Slaytları kişisel ihtiyaçlarınıza \ngöre düzenleyin. Renkler, grafikler ve görseller üzerinde \ndeğişiklik yapabilirsiniz.\n ¬ Sunumu Paylaşma veya İndirme: Sunumunuzu tamam -\nladıktan sonra PDF, PowerPoint veya çevrim içi formatta \nindirebilir ve paylaşabilirsiniz.\n ¬ Web Sayfası: https://slidebean.com/\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Slidebean, öğretmenlerin ders içeriklerini \nkolayca görsel hâle getirmesine yardımcı olur. Özellikle \nhızlı ve profesyonel sunumlar hazırlamak için zaman kısıtı \nolan öğretmenler için idealdir. Öğretmenler, içeriklerini \nsadece ekleyerek, Slidebean’in yapay zekâ destekli öne -\nrileri sayesinde hızlıca etkileyici sunumlar oluşturabilirler.\n ¬ Öğrenciler: Öğrenciler, projeleri ve sunumları için Slide -\nbean’i kullanarak profesyonel görünümlü ve ilgi çekici \nsunumlar hazırlayabilirler. Yapay zekâ sayesinde öğren -\nciler, tasarım endişesi olmadan içeriklerine odaklanabilir \nve sunumlarını hızla tamamlayabilirler. Raptivity :\nTanım: Raptivity, kullanıcıların etkileşimli öğrenme içerikleri \noluşturmasına olanak tanıyan yapay zekâ destekli bir e-öğren -\nme aracı ve platformudur. Öğretmenler, eğitmenler ve eğitim \nuzmanları, Raptivity kullanarak öğrencilere yönelik etkileşim -\nli ders materyalleri, quizler, oyunlar, simülasyonlar ve görsel \niçerikler hazırlayabilirler. Raptivity, sürükle-bırak özellikli bir \narayüz sunarak, teknik bilgi gerektirmeden eğitim içerikleri \noluşturmayı basitleştirir. \nTemel Özellikler:\n ¬ Geniş etkileşimli şablon koleksiyonu (quizler, oyunlar, si -\nmülasyonlar vb.).\n ¬ Sürükle-bırak arayüz ile kolay içerik oluşturma.\n ¬ E-öğrenme içeriklerinin SCORM ve xAPI uyumlu olarak \ndışa aktarılması.\n ¬ Hızlı içerik üretimi için önceden hazırlanmış şablonlar.\n ¬ Mobil uyumlu etkileşimli öğrenme materyalleri oluşturma.\nEğitimde Raptivity'nin Kullanımı\nRaptivity, öğretmenlerin ve eğitim profesyonellerinin sınıf içi ve \nuzaktan eğitimde etkileşimli öğrenme materyalleri hazırlama -\nlarına olanak tanır. Öğrencilerin daha aktif bir şekilde derslere \nkatılmasını sağlamak amacıyla oyun tabanlı öğrenme, quizler \nve simülasyonlar gibi içerikler kullanılabilir. Bu araç, öğrenci -\nlere öğrenmeyi eğlenceli hale getirirken, öğretmenlere ders \nmateryallerini daha dinamik bir hale getirme imkânı sunar.\nNasıl Kullanılır?\n1. Web Sitesine Erişim: Raptivity'nin web sitesine gidin: \nRaptivity\n2. Şablon Seçimi: Farklı kategorilerde etkileşimli öğrenme \nşablonlarından birini seçin (quizler, oyunlar, simülasyonlar, \nsunumlar vb.).\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n250"}, {"page": 251, "text": "3. İçerik Ekleme ve Düzenleme: Seçtiğiniz şablona metin, \ngörseller ve diğer eğitim materyallerini ekleyin. Sürük -\nle-bırak arayüzü ile içerikleri özelleştirin.\n4. Özelleştirme: Animasyonlar, geçişler ve etkileşimler ek -\nleyerek içerikleri kişiselleştirin.\n5. İçeriği Paylaşma: SCORM veya xAPI uyumlu olarak içe -\nriklerinizi dışa aktarın ve öğrenme yönetim sisteminizde \n(LMS) kullanın.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Raptivity, öğretmenlerin ders içeriklerini \netkileşimli hâle getirmelerine yardımcı olur. Öğrencile -\nrin daha aktif katılım sağlamasını teşvik eden oyunlar, \nquizler ve simülasyonlar hazırlayarak öğrenme sürecini \neğlenceli hâle getirebilirler. Aynı zamanda Raptivity'nin \niçerikleri mobil uyumlu olduğundan, uzaktan eğitimde \nde kullanılabilir.\n ¬ Öğrenciler: Öğrenciler, etkileşimli materyallerle öğrenir -\nken bilgilerini daha hızlı ve etkin bir şekilde kavrayabilirler. \nRaptivity'nin sunduğu oyun tabanlı öğrenme ve simülas -\nyonlar, öğrencilerin problem çözme becerilerini geliştirir \nve öğrenmeyi daha motive edici hâle getirir.\nAvantajlar:\n ¬ Kolay Kullanım: Raptivity, teknik bilgiye ihtiyaç duymadan \netkileşimli içerikler oluşturmayı sağlar.\n ¬ Geniş Şablon Seçenekleri: Çeşitli etkileşimli şablonlar \nsayesinde öğretmenler ve eğitimciler, öğrencileri eğitici \noyunlarla ve quizlerle meşgul edebilir.\n ¬ Mobil Uyumlu: Hazırlanan içerikler mobil cihazlarla uyumlu \nolarak çalışır, bu da öğrencilere her yerden erişim imkânı \nsunar.\n ¬ SCORM/xAPI Uyumluluğu: Hazırlanan içerikler e-öğrenme \nplatformlarına kolayca entegre edilebilir.\n ¬ Web Sayfası: https://www.raptivity.com/ \nRaptivity, eğitimde etkileşimli öğrenme deneyimleri oluşturmayı \nkolaylaştıran bir araçtır. Hem öğretmenler hem de öğrenciler için ders materyallerini daha ilgi çekici ve etkili hâle getirir, bu da \nöğrenme süreçlerini hızlandırır ve öğrencilerin katılımını artırır.\niSpring:\nTanım: iSpring, eğitim profesyonellerinin e-öğrenme içerikleri, \ndersler, quizler, simülasyonlar ve video tabanlı eğitim ma -\nteryalleri oluşturmasına olanak tanıyan güçlü bir yapak zekâ \ndestekli e-öğrenme geliştirme aracıdır. iSpring, PowerPoint \nsunumlarını e-öğrenme içeriklerine dönüştürmeyi kolaylaş -\ntırmasıyla bilinir ve SCORM, xAPI gibi öğrenme yönetim sis -\ntemleriyle (LMS) uyumlu içerikler oluşturur. iSpring, interaktif \niçeriklerin yanı sıra, video dersler ve quizler oluşturmak için \nkullanışlı bir platform sunar. \nTemel Özellikler:\n ¬ PowerPoint sunumlarını e-öğrenme içeriklerine dönüş -\ntürme.\n ¬ Quiz, simülasyon, video ve etkileşimli içerikler oluşturma.\n ¬ SCORM, xAPI ve AICC uyumlu içerikler oluşturma ve LMS'ler -\nle entegre edilebilme.\n ¬ Mobil uyumlu içerik üretimi.\n ¬ Öğrenci ilerlemesini ve performansını izlemeye olanak \ntanıyan gelişmiş analiz araçları.\nEğitimde iSpring'in Kullanımı\niSpring, öğretmenler ve eğitim profesyonelleri için ders içe -\nriklerini e-öğrenme formatına dönüştürmek için ideal bir \nplatformdur. Öğretmenler, PowerPoint sunumlarını interaktif \nders materyallerine dönüştürebilir, quizler ekleyebilir ve öğ -\nrenci ilerlemesini izleyebilirler. Ayrıca, video dersler, etkileşimli \nöğrenme modülleri ve simülasyonlar oluşturmak için güçlü \naraçlar sunar.\nNasıl Kullanılır?\n1. iSpring Yazılımını İndirme: iSpring Suite’i indirin ve \nPowerPoint'inize eklenti olarak kurun: iSpring Web Sitesi\n251\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 252, "text": "2. PowerPoint Sunumunu Dönüştürme: PowerPoint sunu -\nmunuzu açın ve iSpring araçlarıyla dersinizi etkileşimli hâle \ngetirin. Quizler, simülasyonlar ve videolar ekleyebilirsiniz.\n3. Quiz ve Simülasyon Oluşturma: iSpring, quiz ve sınav oluş -\nturmayı kolaylaştıran bir araç sunar. Çeşitli soru türleriyle \nquizler oluşturabilir ve simülasyonlar hazırlayabilirsiniz.\n4. Videolu Eğitim İçerikleri Üretme: Video dersler oluşturun \nve bunları interaktif öğelerle destekleyin.\n5. Dersleri Dışa Aktarma ve Paylaşma: İçeriklerinizi SCORM, \nxAPI veya AICC formatında dışa aktarın ve LMS sistemi -\nnizde paylaşın.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: iSpring, öğretmenlerin ders sunumlarını \ndaha etkili hâle getirmelerini sağlar. PowerPoint sunum -\nları etkileşimli derslere dönüştürülür ve quizler eklenerek \nöğrencilerin bilgi seviyesini ölçmek için kullanılabilir. Video \ntabanlı eğitim içerikleri de üretilebilir.\n ¬ Eğitim Kurumları: iSpring, eğitim kurumlarının uzaktan \neğitim programlarını geliştirmesine olanak tanır. Kurum -\nlar, öğrenciler için e-öğrenme modülleri hazırlayabilir ve \nöğrenci performansını izleyebilirler.\nAvantajlar:\n1. Kolay Entegrasyon: PowerPoint sunumlarını hızla e-öğ -\nrenme içeriklerine dönüştürebilirsiniz.\n2. Geniş Özellik Yelpazesi: Quizler, simülasyonlar, videolar ve \netkileşimli modüller oluşturmak için çeşitli araçlar sunar.\n3. SCORM ve xAPI Uyumluluğu: İçerikler öğrenme yönetim \nsistemleriyle kolayca entegre edilebilir.\n4. Mobil Uyumlu: Üretilen içerikler mobil cihazlarda sorun -\nsuz çalışır.6.8. Kodlama\nOtomatik kod üretimi ve kod düzenleme araçları, yazılım geliş -\ntirme sürecini hızlandıran, kod kalitesini artıran ve hata oran -\nlarını minimize eden yapay zekâ destekli çözümler sunar. Bu \naraçlar, özellikle programcılar, yazılım geliştiricileri, öğrenciler \nve öğretmenler için büyük kolaylık sağlar.\nYapay zekâ destekli kod üretme araçları, otomatik tamamlama, \nhata ayıklama, kod optimizasyonu ve doğal dil girdilerini koda \nçevirme gibi özelliklerle geliştiricilere zaman kazandırır. Bu \nsayede daha hızlı, verimli ve hatasız yazılım geliştirme sü -\nreçleri oluşturulabilir.\nEğitimde, kod yazmayı öğrenen öğrenciler için rehberlik sunarak \nalgoritmik düşünme becerilerini geliştirmeye yardımcı olur. \nAyrıca, öğretmenler için kod örnekleri oluşturma, öğrenci kod -\nlarını analiz etme ve geri bildirim verme süreçlerini kolaylaştırır.\nBu araçlar sayesinde geliştiriciler, farklı programlama dille -\nrinde yazılım yazabilir, kodlarını daha verimli hâle getirebilir \nve otomatik hata tespiti ile sorunları hızla çözebilir. Özellikle \nyeni başlayanlar için öğretici, deneyimli yazılımcılar içinse \nhızlandırıcı bir etkiye sahiptir.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla deği -\nşebilir. Güncellenen ve yeni eklenen araçlar için üretici web \nsitelerinden bilgi alabilirsiniz.\n6.8.1. Otomatik Kod Üretimi ve Kod Düzenleme \nAraçları\nGitHub Copilot: Yapay Zekâ Destekli Kodlama Asistanı\nTanım: GitHub Copilot, yapay zekâ destekli bir kodlama asis -\ntanıdır ve OpenAI’nin Codex modeline dayanır. Bu araç, geliş -\ntiricilerin kod yazma süreçlerini hızlandırmak ve üretkenliği \nartırmak için öneriler sunar. Visual Studio Code gibi yaygın kod \neditörlerine entegre edilebilen Copilot, geliştiricilerin yazdığı \nkodu analiz eder ve otomatik tamamlama önerilerinde bulunur. \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n252"}, {"page": 253, "text": "Fonksiyonlar, sınıflar, döngüler veya küçük kod blokları gibi \ndaha karmaşık yapıların da tamamlanmasına yardımcı olur. \nGitHub Copilot, özellikle tekrarlayan veya zaman alan görevleri \nkolaylaştırarak geliştiricilerin iş yükünü azaltır. \nTemel Özellikler:\n ¬ Otomatik Kod Tamamlama: GitHub Copilot, geliştiricinin \nyazmaya başladığı kodu analiz eder ve devamını önerir. \nKodun nasıl yazılacağını tahmin ederek daha hızlı kod üretir.\n ¬ Çeşitli Programlama Dillerini Destekler: Python, JavaScript, \nTypeScript, Ruby, Go, Java, ve daha birçok programlama \ndili için öneriler sunar.\n ¬ Fonksiyon ve Kod Parçası Önerileri: Geliştiriciler, sadece \nküçük kod tamamlama önerileri değil, tüm fonksiyonlar \nveya kod blokları için de öneriler alabilirler.\n ¬ Dilin Semantiğine ve Bağlama Uygun Kod Önerileri: Copilot, \nmevcut kodun anlamını ve bağlamını analiz ederek daha \nisabetli önerilerde bulunur. Bu, geliştiricinin kod yazarken \ntutarlılığını artırır.\nGitHub Copilot’ın Eğitim ve Profesyonel Kullanımı\n1. Otomatik Kod Tamamlama ve Hızlı Kod Üretimi\nGitHub Copilot, yapay zekâ destekli kod tamamlama özelliği \nsayesinde kodlama sürecini hızlandırır. Örneğin, geliştirici bir \nfonksiyon başlattığında, Copilot fonksiyonun nasıl devam edebi -\nleceğini tahmin eder ve kodu tamamlar. Bu, özellikle boilerplate \nkodu yazarken veya tekrarlayan kod bloklarını oluştururken \nzaman kazandırır. Aynı zamanda geliştiricilerin karmaşık al -\ngoritmalar yazarken de öneriler sunar ve bu algoritmaların \nhızla oluşturulmasını sağlar.\nÖrnek Kullanım: Bir Python projesinde, bir for döngüsü başlat -\ntığınızda, Copilot döngünün mantığını tahmin ederek otomatik \nolarak döngünün içinde yapılacak işlemleri önerir.\npython\nKodu kopyala\nfor i in range(10):\n    print(i)Copilot, bu basit döngüyü analiz ederek ilgili işlemleri otomatik \ntamamlama ile önerir. Daha karmaşık işlemler için de Copilot, \nfonksiyonlar ve koşullu ifadeler gibi yapıların tamamlanmasını \nsağlayarak zamandan tasarruf sağlar.\n2. Karmaşık Yapılar ve Fonksiyonlar İçin Destek\nCopilot, yalnızca basit kod tamamlaması yapmakla kalmaz, \naynı zamanda karmaşık yapılar ve fonksiyonlar için de öne -\nrilerde bulunur. Geliştiriciler fonksiyon tanımlarken Copilot, o \nfonksiyonun tamamlanmasına yardımcı olacak öneriler sunar. \nKodun bağlamını analiz ederek fonksiyonun mantığını ve bek -\nlenen çıktıları tahmin eder.\nÖrnek: Bir JavaScript projesinde, bir API çağrısı oluşturmak \nistediğinizde Copilot, bu çağrıyı nasıl yapılandırabileceğinizi \nve nasıl veri işleyebileceğinizi önerir.\njavascript\nKodu kopyala\nasync function fetchData() {\n    const response = await fetch('https://api.example.com/\ndata');\n    const data = await response.json();\n    console.log(data);\n}\nCopilot, bu örnekte olduğu gibi API işlemlerinin nasıl yapılandı -\nrılabileceğini tahmin eder ve öneriler sunar. Bu, kod yazarken \ngeliştiricilerin daha az hata yapmasına ve verimli çalışmasına \nyardımcı olur.\n3. Kodun Anlamını ve Bağlamını Anlayarak Öneriler Sunma\nCopilot, kodun bağlamını ve amacını analiz ederek, semantik \nolarak uygun öneriler sunar. Bu özellik, özellikle büyük projelerde \nveya karmaşık sistemlerde çalışırken yararlıdır. Yapay zekâ, \nyazılan kodun ne anlama geldiğini ve geliştiricinin hangi yapıyı \nkullanmak istediğini anlayarak doğru öneriler sunmaya çalışır.\n253\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 254, "text": "Örneğin, bir web geliştirme projesinde, Copilot sizin bir form \ndoğrulama işlemi yapmaya çalıştığınızı fark edebilir ve bu doğ -\nrulama işlemi için en uygun yöntemleri ve kod yapılarını önerir.\njavascript\nKodu kopyala\nfunction validateForm(form) {\n    if (!form.name || form.name.length < 3) {\n        return 'Name is too short';\n    }\n    if (!form.email || !validateEmail(form.email)) {\n        return 'Invalid email address';\n    }\n    return 'Form is valid';\n}\nBu kod parçasında olduğu gibi, Copilot form doğrulaması yap -\nmaya çalıştığınızı anlar ve eksik olan bölümler için önerilerde \nbulunabilir.\n4. Kod Eğitimi ve Yeni Başlayanlar İçin Yardımcı Olma\nGitHub Copilot, kodlama öğrenenler veya yeni başlayanlar için \ngüçlü bir araçtır. Özellikle kod yazmaya yeni başlayanlar için \nCopilot, öğrenme sürecinde bir mentor gibi davranır. Hangi \nyapıları ve fonksiyonları kullanmaları gerektiğini önerir ve kodun \nnasıl yazılacağı konusunda rehberlik eder. Bu, öğrencilerin \nkendi başlarına daha iyi kod yazmalarını sağlar ve öğrenme \nsürecini hızlandırır.\nÖrneğin, bir öğrenci Python'da bir liste işlemi yapmaya çalışır -\nken, Copilot uygun fonksiyonları ve yapılandırmaları önererek \nöğrencinin doğru adımları takip etmesine yardımcı olur.python\nKodu kopyala\nmy_list = [1, 2, 3, 4, 5]\nsquared_list = [x**2 for x in my_list]\nprint(squared_list)\nBu kod parçasında Copilot, liste içindeki öğelerin karesini alarak \nyeni bir liste oluşturmayı önerir. Bu sayede, öğrenci Python’un \nliste işlemleriyle ilgili daha fazla bilgi edinebilir.\nSonuç ve Kullanım Alanları\nGitHub Copilot, kod yazmayı hızlandıran ve geliştiricilerin \nüretkenliğini artıran güçlü bir yapay zekâ aracıdır. Profesyonel \nyazılım geliştiricileri, öğrenciler ve kodlama öğrenenler için \nyararlıdır. Kod önerileri, tamamlama özellikleri ve bağlam analizi \nsayesinde, Copilot hem kodlama süreçlerini kolaylaştırır hem \nde yeni başlayanlara rehberlik eder. Büyük projelerde, tekrar \neden görevlerde veya karmaşık algoritmalar geliştirirken Co -\npilot, kullanıcılarına önemli bir destek sunar.\nTabnine:\nTanım: Tabnine, yapay zekâ destekli bir kod tamamlama ara -\ncıdır. Makine öğrenimi kullanarak geliştiricilerin yazdığı kodu \nanaliz eder ve hızlı, akıllı öneriler sunar. Tabnine, geliştiricinin \nkod yazma alışkanlıklarını öğrenir ve buna uygun önerilerde \nbulunur. İDE’lere (Integrated Development Environments) ko -\nlayca entegre edilebilir ve birçok programlama dilini destekler. \nKod yazma sürecini hızlandıran ve hata yapma riskini azaltan \nTabnine, hem profesyoneller hem de kodlama öğrenenler için \nverimli bir yardımcıdır. \nTemel Özellikler:\n ¬ Yapay Zekâ Destekli Kod Tamamlama: Tabnine, gelişti -\nricilerin kod yazarken kullanabileceği kod önerileri sunar \nve kodun devamını tahmin eder.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n254"}, {"page": 255, "text": "¬ Makine Öğrenimi: Tabnine, geliştiricilerin kodlama alış -\nkanlıklarını öğrenerek, her kullanıcının çalışma tarzına \ngöre özelleşmiş önerilerde bulunur.\n ¬ Çeşitli Programlama Dillerini Destekler: Python, Java, \nJavaScript, TypeScript, Ruby, C++, Go, ve daha birçok \ndili destekler.\n ¬ İDE Entegrasyonu: Visual Studio Code, IntelliJ IDEA, PyC -\nharm, Sublime Text gibi popüler kod editörleriyle entegre \nçalışır.\n ¬ Yerel ve Bulut Modları: Hem yerel olarak bilgisayarınıza \nkurulabilir hem de bulut üzerinden çalışabilir. Böylece veri \ngüvenliği ve performans ihtiyaçlarınıza göre ayar yapa -\nbilirsiniz.\nTabnine'ın Kodlama Sürecinde Kullanımı\n1. Otomatik Kod Tamamlama ve Hızlı Kod Üretimi\nTabnine, kodunuzu yazarken size otomatik olarak öneriler sunar. \nFonksiyon isimleri, parametreler, döngüler ve koşullu ifadeler \ngibi kod parçalarını tahmin ederek hızlıca tamamlar. Öneriler, \nkodun bağlamına ve daha önce yazılmış koda göre şekillenir, \nbu da daha tutarlı ve işlevsel kod yazılmasına olanak tanır.\nÖrnek Kullanım: Bir Python projesinde, bir liste işlemi yapıyor -\nsanız, Tabnine bu işlemi hızlıca tamamlamanızı sağlar. Örneğin, \nbir döngü başlattığınızda, Tabnine döngü yapısına uygun kodu \notomatik olarak tamamlayabilir:\npython\nKodu kopyala\nmy_list = [1, 2, 3, 4, 5]\nsquared_list = [x**2 for x in my_list]\nTabnine, bu tür yapılar için önerilerde bulunarak döngü ve liste \nişlemlerini hızlıca oluşturmanıza yardımcı olur.\n2. Karmaşık Yapılar İçin Destek\nTabnine, sadece basit kod tamamlama önerileri sunmakla kal -\nmaz, aynı zamanda karmaşık yapılar ve algoritmalar için de kod önerileri yapar. Bir fonksiyonun başında ya da ortasında \nTabnine’ı kullanarak, fonksiyonun tamamlanması için öneriler \nalabilirsiniz. Bu, özellikle büyük projelerde veya yeniden kul -\nlanılabilir kod blokları oluştururken yararlı olur.\nÖrnek: JavaScript dilinde bir API çağrısı yapıyorsanız, Tab -\nnine, bu çağrıyı nasıl yapılandırabileceğinizi ve verileri nasıl \nişleyebileceğinizi önerir.\njavascript\nKodu kopyala\nasync function fetchData(url) {\n    const response = await fetch(url);\n    const data = await response.json();\n    return data;\n}\nTabnine, bu gibi karmaşık kod yapıları için kodun nasıl devam \nettirileceğini tahmin eder ve geliştiricilere önerilerde bulunur.\n3. Öğrenme ve Uyarlanma Yeteneği\nTabnine, makine öğrenimi ile geliştiricilerin kodlama tarzını \nöğrenir ve önerilerini bu doğrultuda iyileştirir. Zamanla, kul -\nlandığınız değişken isimleri, fonksiyon yapıları, kodlama tarzı \ngibi unsurları öğrenir ve buna göre daha isabetli öneriler sunar. \nBöylece, her kullanıcının kodlama tarzına özgü bir kişiselleş -\ntirme yapmış olur.\nÖrnek: Daha önce sıkça kullandığınız bir fonksiyonu tekrar \nyazarken Tabnine, o fonksiyonun nasıl çalıştığını hatırlar ve \nbenzer öneriler sunar. Bu da tekrar eden işlemlerde hız ka -\nzandırır ve hata riskini azaltır.\n4. Veri Güvenliği ve Yerel Çalışma\nTabnine, bulut üzerinden çalışabileceği gibi, yerel modda da \nçalışabilir. Yerel mod, tüm kodunuzu bilgisayarınızda tutar ve \nbu sayede verilerin bulut üzerinden işlenmesi gerekmez. Bu \nözellik, özellikle güvenlik hassasiyeti olan projeler için önemlidir.\n255\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 256, "text": "Sonuç ve Kullanım Alanları\nTabnine, kod yazma sürecinde yapay zekâ destekli öneriler \nsunarak geliştiricilerin işini kolaylaştırır ve daha hızlı kod üret -\nmelerini sağlar. Aynı zamanda hata yapma riskini azaltarak, \nözellikle büyük projelerde önemli bir yardımcı hâline gelir. Ma -\nkine öğrenimi sayesinde kullanıcıların kodlama alışkanlıklarını \nöğrenir ve kişiye özgü önerilerde bulunur. Tabnine, hem yeni \nbaşlayan kodlama öğrencileri hem de deneyimli yazılım ge -\nliştiricileri için üretkenliği artıran güçlü bir araçtır.Eğitimde Kullanımı Önerileri\n ¬ Kod yazma pratiğine destek: Öğrenciler tamamlayıcı \nönerilerle kodlama hızlarını geliştirebilir.\n ¬ Kod analizi & refaktör: Chat özelliğiyle refaktör önerileri \nve test yazımı öğrenilebilir.\n ¬ Çok dil pratiği: 70+ programlama dilinde otomatik ta -\nmamlamayla dil bilgisi pekiştirilir.\n ¬ Hata ayıklama öğrenimi: İstenmeyen sonuçlar üzerinden \nhata bulma ve geri düzeltme adımları yapılabilir.\n ¬ Araç tanıma: Öğrenciler modern IDE entegrasyonlarını \ndeneyimleyerek profesyonel araç kullanımı öğrenir.\n Formerly Codeium: \nTanım: Windsurf, önceki adıyla Codeium, geliştiriciler için tasar -\nlanmış bir AI kod asistanı ve özel IDE’dir. Otomatik tamamlama, \nsohbet tabanlı kod üretme, hataları önceden algılama gibi \nözelliklerle kod yazmayı hızlandırır.\nTemel Özellikler\n ¬ Autocomplete & Super complete: Kod sırasında bir veya \nbirden fazla satırı otomatik tamamlar.\n ¬ IDE entegrasyonu: VS Code, JetBrains, Web dahil 40+ IDE \nuzantısı ile çalışır \n ¬ AI Chat asistanı: Kod düzeltme, açıklama, refaktör, test \noluşturma gibi görevler için doğal dil kullanımı.\n ¬ Cascade akıllı ajan: Bağlamı anlayıp hataları takip eden, \nproje akışına uyumlu bir yapı.\n ¬ Memory ve geçici geçmiş: Kod geçmişini hatırlayarak \nalakalı öneriler sunar.\n ¬ Tab uzantısı: Tek tuşla geçmiş komutlar, panoya erişim \ngibi hızlı çalışma imkânı \n ¬ Güvenlik & gizlilik: Kullanıcı verisi üzerinde eğitim yapılmaz, \niletişim şifreli gerçekleşir.\n ¬ Hem bireysel hem kurumsal: Bireyseller için ücretsiz, \nekipler için gelişmiş API/GPT 4 destekli planlar bulunur. Replit: \nTanım: Replit, tarayıcı tabanlı, bulut ortamlı bir online IDE ve \nyapay zekâ destekli kodlama platformudur. Replit Agent adı \nverilen AI asistanı sayesinde, doğal dil kullanarak uygulama \ngeliştirilebilir, kod yazılır ve hata ayıklanabilir \nTemel Özellikler\n ¬ Replit Agent (AI Kod Asistanı):\n »“Create app that tracks tasks” gibi komutla tam bir \nuygulama prototipi oluşturabilir, hataları tespit edip \ndüzeltir .\n ¬ Gerçek Zamanlı Kod Tamamlama & Debug:\n »Autocomplete önerileri, kod açıklamaları, otomatik hata \ndüzeltme AI yardımıyla sunulur \n ¬ Geniş Dil, Şablon ve Entegrasyon:\n »50+ programlama dili; hazır uygulama şablonları, GitHub \nve Figma entegrasyonu vardır \n ¬ İşbirliği & Yayınlama:\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n256"}, {"page": 257, "text": "»Öğrenciler birlikte gerçek zamanlı çalışabilir; proje \nanında buluta deploy edilebilir .\n ¬ Versiyon Kontrol & Secrets:\n »Git desteğiyle sürümler takip edilir; API anahtarları \ngüvenli şekilde saklanır \nEğitimde Kullanımı\n ¬ Kodlama öğretimi:\nReplit Agent, öğrencilerin fikirlerini kod ile dönüştür -\nmesini sağlayarak öğrenmeyi hızlandırır.\n ¬ Hata ayıklama eğitimi:\nAI destekli debug ile kullanıcılar hataların nedenlerini \nöğrenir.\n ¬ Proje tabanlı öğrenme:\nÖğrenciler gerçek araçlarla uygulama geliştirip sunum \nve deploy yapabilir.\n ¬ İşbirliğine açık dersler:\nGrup projelerinde kod paylaşımı ve versiyon kontrolü \nile takım becerileri gelişir. ¬ Birimi test yazma: Kodunuzu test etmek için birim testi \noluşturabilir.\n ¬ Refaktör, belgeleme, normalleştirme: Karmaşık kodları \nsadeleştirir, yorum ekler, yeniden düzenler.\n ¬ Regex, sorgu ve renk paleti oluşturma: Geniş bir kullanım \nalanı sunar; sadece kod değil, yardımcı araçlar da üretir.\n ¬ Freemium kullanım: Ücretsiz plan mevcuttur; Pro plan \nek özelliklerle destek sağlar \nEğitimde Kullanımı\n ¬ Kod oluşturma pratiği: Öğrenciler prompt yazarak basit \nfonksiyonları anında kodlayabilir.\n ¬ Öğrenme/yeniden düzenleme: Karmaşık kodların ne yap -\ntığını açıklatarak analiz edebilir.\n ¬ Hataları anlama: KodPal'ın hata tespit araçları sayesinde \nkodlama hatalarını öğrenebilirler.\n ¬ Birim testi oluşturma: Yazdıkları kodlar için testler oluş -\nturarak yazılım kalitesi bilinci gelişir.\n ¬ Multi-dil öğrenme: Bir kodu farklı programlama dillerine \nçeviri ile analiz edebilirler.\nCodePal: \nTanım: CodePal, geliştiriciler ve öğrenciler için web taban -\nlı bir AI kod asistanıdır. Doğal dil girerek kod üretir, hataları \nbulur, kod özetler, birimleri test eder, açıklama ekler ve daha \nfazlasını sağlar \nTemel Özellikler\n ¬ Metin ∂ Kod: İstediğiniz fonksiyonu doğal dilde yazın, AI \nkod üretir (30+ dil) .\n ¬ Kod inceleme & hata tespiti: Mevcut kodu okuyup, açık -\nlamalar ve hata çözüm önerileri sunar .Cody by Sourcegraph:\nTanım: Cody, Sourcegraph tarafından geliştirilen bir AI kod \nasistanıdır. Geniş kod tabanlarında arama, analiz ve kod üret -\nme işlemlerini yapay zekâ ile hızlandırır. Geliştiricilerin büyük \nprojelerde daha verimli çalışmasına yardımcı olur.\nTemel Özellikler\n ¬ Kod tabanı arama: Büyük projelerde fonksiyon, değişken \nya da sınıfları hızlıca bulur.\n ¬ Doğal dille kod üretimi: Komut yazarak yeni fonksiyonlar \noluşturabilir.\n257\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 258, "text": "¬ Kod açıklama ve özetleme: Karmaşık kodları kısa açık -\nlamalara dönüştürür.\n ¬ Refaktör & düzeltme: Kod düzenlemesi ve iyileştirmesi \niçin önerilerde bulunur.\n ¬ Çoklu IDE desteği: VS Code, JetBrains gibi editörlerde çalışır.\n ¬ Context-aware AI: Tüm kod tabanını anlayarak yerel bağ -\nlama uygun öneriler verir.\nEğitimde Kullanımı\n ¬ Proje analizi: Öğrenciler büyük projeleri anlamak ve par -\nçalarına ayırmak için Cody kullanabilir.\n ¬ Kod açıklama pratiği: Kod bloklarını açıklayarak algoritma \nmantığını çözme becerisi kazandırır.\n ¬ Kod yazma desteği: Öğrenciler projelerinde takıldıkları \nnoktalarda yapay zekâdan yardım alabilir.\n ¬ Takım çalışması: Açık kaynak projelerde ekipçe çalışmayı \nve yapay zekâ ile iş birliğini destekler. ¬ Çeşitli Veritabanı Desteği: AI2sql, MySQL, PostgreSQL, \nSQLite gibi yaygın kullanılan veritabanı yönetim sistem -\nlerini destekler.\n ¬ Hızlı ve Optimize Edilmiş Sorgular: Yapay zekâ, en iyi SQL \nsorgularını optimize ederek veritabanı performansını artırır.\n ¬ Karmaşık Veri İşleme: Gruplama, sıralama, filtreleme gibi \nveri manipülasyonlarını kolaylaştıran yapay zekâ destekli \nöneriler.\n ¬ SQL Öğrenme Yardımı: Yeni başlayanlar için SQL dilini \nöğrenme sürecini hızlandıran ve daha kolay anlaşılır hâle \ngetiren yardımcı bir araçtır.\nAI2sql: \nTanım: AI2sql, doğal dil komutlarını kullanarak SQL sorguları \noluşturan bir yapay zekâ destekli araçtır. Kullanıcılar, SQL ko -\nnusunda detaylı bilgi sahibi olmadan, basit doğal dil girdileri ile \nkarmaşık SQL sorguları oluşturabilirler. AI2sql, yazılım gelişti -\nricilere, veri analistlerine ve SQL öğrenmeye yeni başlayanlara \nyardımcı olarak, veritabanlarından veri çekme, güncelleme ve \nmanipülasyon süreçlerini kolaylaştırır. Kullanıcılar, doğal dildeki \nsorularını yapay zekâya vererek, bu soruların karşılığında op -\ntimize edilmiş SQL sorguları elde edebilirler. https://ai2sql.io/ \nTemel Özellikler:\n ¬ Doğal Dil İle SQL Sorgusu Oluşturma: Karmaşık SQL sor -\nguları yazmadan, doğal dildeki soruları SQL sorgularına \ndönüştürür.Cursor AI: \nTanım: Cursor AI, yapay zekâ destekli bir kodlama asistanıdır. \nYazılım geliştirme süreçlerini hızlandırmak ve kodlama hatalarını \nazaltmak için tasarlanmıştır. Kod önerileri, hata ayıklama ve \notomatik tamamlama gibi özellikleriyle hem yeni başlayanlar \nhem de profesyonel yazılımcılar için faydalıdır. \nTemel Özellikler:\n ¬ Kod Önerileri: Yazdığınız kodu analiz ederek bağlamla \nuyumlu önerilerde bulunur.\n ¬ Hata Ayıklama: Kod hatalarını tespit eder ve çözüm öne -\nrileri sunar.\n ¬ Otomatik Tamamlama: Kodlama hızını artıran akıllı ta -\nmamlamalar sağlar.\n ¬ Çoklu Dil Desteği: Python, JavaScript, Java, C++ gibi po -\npüler dilleri destekler.\n ¬ Gerçek Zamanlı Yardım: Kodlama sırasında öneriler ve \nrehberlik sunar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n258"}, {"page": 259, "text": "Eğitimde Kullanımı:\n ¬ Kodlama Eğitiminde Yardımcı: Öğrencilere kodlama te -\nmellerini öğretirken rehberlik eder.\n ¬ Hızlı Geri Bildirim: Öğrencilerin kodlarını anında analiz \nederek hatalarını düzeltmelerine yardımcı olur.\n ¬ Proje Geliştirme: Grup projelerinde yazılım geliştirme \nsüreçlerini hızlandırır.\n ¬ Öğretmenler İçin Destek: Ders hazırlıklarında öğretmenlere \nörnek kodlar ve çözümler sunar.\n ¬ Uygulamalı Öğrenim: Öğrencilerin gerçek zamanlı kodlama \ndeneyimi yaşamasını sağlar.\nEğitimde Örnek Uygulama (Lise / Üniversite Seviyesi)\nUygulama Adı: \"Kodumu AI ile Geliştiriyorum\"\nDers: Yazılım Geliştirme / Python Programlama\nSüre: 1 ders saati (45 dk)\nAraç: https://www.cursor.com/ \nEtkinlik Adımları\n1. Kod Yazımı (15 dk):\nÖğrencilere şu görev verilir:\n“Kullanıcının girdiği cümledeki kelime sayısını bulan bir \nPython fonksiyonu yazın.”\n2. Cursor ile Kod Açıklama (10 dk):\nÖğrenciler yazdıkları kodu seçip // explain komutuyla \naçıklama ister.\n3. Refaktör ve Test Üretimi (10 dk):\nAI’dan kodu daha sade hale getirmesini veya birim test \n(unit test) yazmasını isterler.4. Değerlendirme (10 dk):\nÖğrenciler Cursor’un verdiği çıktılarla kendi yazdıkları kodu \nkarşılaştırır ve geliştirir.\nKazanımlar\n ¬ AI ile kodlama destekli öğrenme\n ¬ Hatalardan öğrenme & kod kalitesi farkındalığı\n ¬ Modern yazılım geliştirme araçlarını tanıma\nCURSOR’un Profesyonel Kullanım Alanları\nYazılım Geliştiriciler için:\n ¬ Satır içi kod önerileri: GPT-4 ile hassas, görev odaklı ta -\nmamlama\n ¬ Hataları açıklama ve düzeltme: Hangi satırda ne hata var, \nneden oluştu, nasıl düzeltilir\n ¬ Kod refaktörü: Daha verimli, okunabilir hale getirme\n ¬ Kod tabanı sorgulama: “Bu fonksiyon nerede kullanılıyor?” \ngibi doğal dille arama\n ¬ Takım içinde not bırakma (AI Commenting)\nTakım / Kurumsal Kullanımda:\n ¬ Büyük projelerde bağlamlı AI desteği\n ¬ Versiyon kontrolü uyumlu (GitHub/GitLab)\n ¬ Kurumsal veri güvenliği (kod içeriği dışarı çıkmadan yerel \nişlem seçeneği)\n ¬ Hızlı onboarding: Yeni geliştiricilerin proje kodlarını an -\nlamasını kolaylaştırır\n259\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 260, "text": "LeetCode:\nTanım: LeetCode, yazılım geliştiricilerinin problem çözme ve \nalgoritma geliştirme becerilerini geliştirmeleri için tasarlan -\nmış popüler bir platformdur. Platform, kodlama mülakatla -\nrına hazırlananlar için özel olarak yapılandırılmıştır ve dünya \nçapındaki büyük teknoloji şirketlerinin yazılım mühendisliği \nmülakatlarına hazırlık yapma fırsatı sunar. LeetCode, geniş \nbir problem yelpazesi, kodlama zorlukları ve mülakat soruları \nsunarak yazılım mühendislerinin becerilerini test etmelerini \nve geliştirmelerini sağlar. \nTemel Özellikler:\n ¬ Geniş Problem Yelpazesi: LeetCode, veri yapıları, algorit -\nmalar, dinamik programlama, graf teorisi, diziler, diziler \nve daha birçok konu üzerine yüzlerce problem sunar.\n ¬ Mülakat Hazırlığı: Teknoloji devleri (Google, Facebook, \nAmazon, Microsoft gibi) için mülakat tarzı sorular su -\nnar, böylece kullanıcılar gerçek mülakat senaryolarına \nhazırlanabilirler.\n ¬ Kodlama Dili Desteği: Python, Java, JavaScript, C++, C#, \nGo, Ruby gibi popüler programlama dilleri desteklenir.\n ¬ Kodlama Yarışmaları ve Zorluklar: LeetCode, kodlama \nbecerilerini test etmek isteyen kullanıcılar için düzenli \nyarışmalar ve zorluklar sunar.\n ¬ Tartışma Forumları: Kullanıcılar, kodlama problemleri \nhakkında tartışmalara katılabilir, çözüm önerileri alabilir \nve toplulukla iş birliği yapabilir.\n ¬ Premium İçerik: Premium üyelik ile daha gelişmiş prob -\nlemler, şirket odaklı mülakat soruları ve özel analizler sunar.Temel Özellikler:\n ¬ Web Sitesi Oluşturma: Birkaç dakika içinde işletmeler veya \nprojeler için web siteleri tasarlar.\n ¬ Otomatik Özelleştirme: Kullanıcı girdilerine göre düzen -\nlenmiş içerik ve tasarım.\n ¬ Kullanıcı Dostu: Teknik bilgi gerektirmeden web siteleri \noluşturma imkânı.\nEğitimde Kullanımı:\n ¬ Eğitim projeleri için hızlı web sitesi hazırlama.\n ¬ Öğrencilerin teknoloji ve dijital becerilerini geliştirmek \niçin kullanma.\nDeepCode:\nTanım: DeepCode, yazılım kodlarının analizini yaparak hataları \ntespit eden ve optimize eden bir yapay zekâ aracıdır.\nTemel Özellikler:\n ¬ Kod Analizi: Yazılım hatalarını ve güvenlik açıklarını tespit \neder.\n ¬ Öneriler: Daha verimli kodlama için öneriler sunar.\n ¬ Çoklu Dil Desteği: Farklı programlama dillerini destekler.\nEğitimde Kullanımı:\n ¬ Kodlama derslerinde öğrenci çalışmalarını analiz etme.\n ¬ Yazılım projelerinin optimizasyonu için destek sağlama.Durable AI:\nTanım: web siteleri oluşturmak ve işletmelerin hızlı dijital çö -\nzümler geliştirmesi için yapay zekâ destekli bir platformdur.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n260"}, {"page": 261, "text": "Web10\nWeb10, web geliştirme süreçlerini kolaylaştırmak için hızlı \nve etkileşimli çözümler sunan bir araçtır. https://10web.io/\nai-website-builder/ \nTemel Özellikler:\n ¬ Web Geliştirme: Kullanıcı dostu araçlarla web siteleri \noluşturma.\n ¬ API Entegrasyonu: Gelişmiş entegrasyon desteği.\n ¬ Kullanıcı Odaklı Tasarım: Kolay özelleştirilebilir şablonlar.\nEğitimde Kullanımı:\n ¬ Teknoloji derslerinde web geliştirme projeleri için bir araç \nolarak kullanma.\n ¬ Öğrencilere dijital içerik oluşturma becerileri kazandırma.6.9. Yapay Zekâ Destekli Chatbotlar\n6.9.1. Chatbot Nedir?\nChatbot, metin veya sesli komutlarla insanlarla etkileşim kuran, \nyapay zekâ (AI) ve doğal dil işleme (NLP) teknolojilerini kullanan \nbir yazılım uygulamasıdır. Chatbotlar, kullanıcıların sorularını \nyanıtlayabilir, bilgi sağlayabilir, görevleri otomatikleştirebilir ve \nçeşitli süreçlerde rehberlik edebilir. Kullanıcılarla gerçek zamanlı \niletişim kurmak için genellikle mesajlaşma uygulamaları, web \nsiteleri veya mobil uygulamalar üzerinden entegre edilirler.\n6.9.2. Chatbotların Eğitimde Kullanımı\nEğitim alanında chatbotlar, öğrencilere, öğretmenlere ve eğitim \nyöneticilerine çeşitli şekillerde yardımcı olabilir. Yapay zekâ \ndestekli chatbotlar, bilgi sağlama, öğrenci rehberliği, ödev ha -\ntırlatmaları, sınav hazırlığı ve genel olarak öğrenme sürecini \niyileştirme amacıyla kullanılabilir.\n1. Öğrenci Rehberliği ve Destek\nChatbotlar, öğrencilere ders programları, sınav tarihleri, ödev \nhatırlatmaları ve çeşitli eğitim bilgileri hakkında anında bilgi \nsunabilir. Öğrenciler, chatbotlara belirli sorular sorarak ders \niçeriği hakkında bilgi alabilir, öğrenme kaynaklarına yönlendi -\nrilebilir ve bireysel öğrenme süreçlerinde rehberlik alabilirler. \nBu tür chatbotlar, öğrencilere 7/24 erişilebilir bir rehberlik \nkaynağı sağlar.\nÖrnek Kullanım:\n ¬ Öğrenciler, chatbotlardan ders programları ve sınav ta -\nrihleri hakkında bilgi alabilirler.\n ¬ Sınıf dışındaki ders materyalleri hakkında hızlı rehberlik \nsağlanabilir.\n2. Kişiselleştirilmiş Öğrenme\nChatbotlar, öğrencilerin bireysel öğrenme hızına ve ihtiyaçlarına \ngöre uyarlanmış içerik sağlayabilir. Öğrencilerin performan -\nsına göre kişiselleştirilmiş sınav soruları, ders materyalleri ve \ngeri bildirim sunulabilir. Bu sayede öğrenciler, kendi öğrenme \nsüreçlerini daha verimli yönetebilirler.\nAkkio:\nTanım: Akkio, makine öğrenimi ve yapay zekâ modellerini ko -\nlayca kullanıma sunan bir platformdur. \nTemel Özellikler:\n ¬ Veri Analizi: Veri setlerinden anlamlı içgörüler çıkarır.\n ¬ Makine Öğrenimi: Teknik bilgi olmadan AI modelleri oluş -\nturma.\n ¬ Otomasyon: İş süreçlerini optimize eder.\nEğitimde Kullanımı:\n ¬ Veri bilimi projelerinde öğrenciler için kolay kullanılabilir \nbir platform sunma.\n ¬ Makine öğrenimi modellerini uygulamalı olarak öğretme.\n261\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 262, "text": "Örnek Kullanım:\n ¬ Öğrencilerin geçmiş performanslarına dayalı olarak \nchatbotlar kişiselleştirilmiş sınav soruları veya öğrenme \nmateryalleri sunabilir.\n ¬ Öğrenme sürecinde eksik olan konulara odaklanarak daha \nverimli bir çalışma düzeni oluşturulabilir.\n3. Sınav Hazırlığı\nYapay zekâ destekli chatbotlar, öğrencilere sınavlara hazırlık \naşamasında yardımcı olabilir. Chatbotlar, öğrencilere quizler \nveya kısa testler sunabilir, yanıtlarını değerlendirebilir ve eksik \noldukları konulara yönelik geri bildirim sağlayabilir. Öğrenciler, \nsınavlara düzenli olarak chatbotlar aracılığıyla hazırlanabilir \nve performanslarını iyileştirebilir.\nÖrnek Kullanım:\n ¬ Öğrenciler sınavdan önce chatbotlardan quizler veya pratik \nsorular talep edebilir ve anında geri bildirim alabilir.\n ¬ Chatbotlar, öğrencilere sınav tarihlerini hatırlatarak sınav \nhazırlıklarını daha etkili hâle getirebilir.\n4. Ödev Hatırlatıcıları\nChatbotlar, öğrencilerin ödev teslim tarihlerini ve diğer görev -\nleri zamanında tamamlamalarına yardımcı olabilir. Chatbotlar, \notomatik hatırlatıcılar göndererek öğrencilere yaklaşan teslim \ntarihlerini bildirebilir. Bu özellik, öğrencilerin düzenli çalışmasına \nve sorumluluklarını yerine getirmesine yardımcı olur.\nÖrnek Kullanım:\n ¬ Öğrenciler chatbotlardan ödev teslim tarihlerini öğrenebilir \nve yaklaşan görevler için hatırlatıcı alabilirler.\n ¬ Chatbotlar, öğretmenler tarafından belirlenen önemli \netkinlikleri öğrencilere anımsatabilir.5. Öğretmen Desteği\nChatbotlar, öğretmenlerin idari iş yükünü hafifletebilir. Öğ -\nretmenler, chatbotlar aracılığıyla öğrencilerin sorularını oto -\nmatik olarak yanıtlayabilir, katılım takibi yapabilir ve belirli \nders içeriklerini dağıtabilir. Ayrıca, öğretmenler, öğrencilerin \nilerlemesini ve sınav sonuçlarını otomatik olarak chatbotlar \naracılığıyla izleyebilirler.\nÖrnek Kullanım:\n ¬ Chatbotlar, öğrencilerin sıkça sorduğu soruları öğretmen \nyerine yanıtlayarak öğretmenlerin iş yükünü hafifletebilir.\n ¬ Öğretmenler, ders materyallerini öğrencilere chatbotlar \naracılığıyla otomatik olarak dağıtabilir.\n6. Okul Yönetimi ve Bilgi Sağlama\nChatbotlar, eğitim kurumlarının web siteleri veya mobil uygu -\nlamaları aracılığıyla öğrencilere, velilere ve okul personeline \nbilgi sağlayabilir. Okul kuralları, etkinlik takvimi, kayıt işlemleri \nve akademik başarılar hakkında soruları yanıtlayabilir ve yön -\nlendirmeler yapabilir.\nÖrnek Kullanım:\n ¬ Chatbotlar, öğrencilere ve velilere okul kayıt işlemleri \nhakkında bilgi verebilir.\n ¬ Okul etkinlikleri, tatil tarihleri gibi bilgilere anında erişim \nsağlayabilir.\nChatbotlar, eğitimde öğrenci ve öğretmenlere birçok fayda \nsağlayarak öğrenme süreçlerini destekleyebilir, idari görevleri \notomatikleştirebilir ve öğrenme deneyimini kişiselleştirebilir. \nÖzellikle yapay zekâ destekli chatbotlar, öğrencilere daha in -\nteraktif, hızlı ve etkili bir rehberlik ve öğrenme deneyimi su -\nnarken, öğretmenlerin iş yükünü azaltarak daha verimli bir \neğitim ortamı oluşturabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n262"}, {"page": 263, "text": "6.9.3. Yapay Zekâ Destekli Chatbot Araçları\nYapay zekâ destekli chatbot araçları, kullanıcılarla doğal dilde \netkileşim kurabilen sohbet botları geliştirmeyi kolaylaştırır. Bu \naraçlar, eğitim sektöründe öğrencilere rehberlik etmek, sınav \nhazırlıklarına yardımcı olmak, ödev hatırlatmaları sunmak ve \nöğrenme süreçlerini kişiselleştirmek amacıyla yaygın olarak \nkullanılır. Aşağıda en popüler yapay zekâ destekli chatbot araç -\nları tanıtılmakta ve bu araçların eğitimde nasıl kullanılabileceği \naçıklanmaktadır.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla deği -\nşebilir. Güncellenen ve yeni eklenen araçlar için üretici web \nsitelerinden bilgi alabilirsiniz.Chatbase:\nTanım: Chatbase, yapay zekâ destekli sohbet botlarının tasar -\nlanması ve yönetilmesi için bir araçtır. Chatbot performansını \nanaliz etmeye de olanak tanır. \nTemel Özellikler:\n ¬ Chatbot Yönetimi: Botları kolayca oluşturma ve özelleş -\ntirme.\n ¬ Analitik Araçlar: Sohbet botlarının kullanımını analiz eder \nve iyileştirme önerir.\n ¬ Kapsamlı Eğitim Desteği: Botları belirli konular hakkında \neğitme.\nEğitimde Kullanımı:\n ¬ Online öğrenci destek sistemleri kurma.\n ¬ Ders içeriği veya ödevlerle ilgili soruları yanıtlayan chat -\nbotlar oluşturma.\nDroxy:\nTanım: Droxy, yapay zekâ destekli sohbet botu ve otomasyon \nplatformudur. Şirketler ve bireyler için etkileşimli sohbet de -\nneyimleri oluşturmayı kolaylaştırır. \nTemel Özellikler:\n ¬ Kapsamlı Entegrasyon: CRM ve diğer platformlarla en -\ntegre çalışır.\n ¬ Etkileşimli Sohbet: Kişiselleştirilmiş ve doğal diyaloglar \noluşturur.\n ¬ Analitik Raporlama: Sohbetlerin performansını ölçer ve \nanaliz eder.\nEğitimde Kullanımı:\n ¬ Öğrencilerin sorularını otomatik olarak yanıtlamak için \nsohbet botları tasarlama.\n ¬ Eğitim kurumlarının web sitelerinde hızlı destek sağlama.Ivy\nTanım: Ivy, öğrenciler ve öğretmenler için etkili öğrenme ma -\nteryalleri oluşturan bir yapay zekâ platformudur. \nTemel Özellikler:\n ¬ Flashcard Oluşturma: Öğrencilerin hafızalarını geliştirmek \niçin kartlar oluşturur.\n ¬ Kapsamlı Analiz: Konuların temel noktalarını öne çıkarır.\nEğitimde Kullanımı:\n ¬ Hafıza tekniklerini desteklemek için flashcard kullanımı.\n ¬ Sınav hazırlığı için kişiselleştirilmiş materyaller oluşturma.\n263\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 264, "text": "Chatbot\nTanım: Genel amaçlı yapay zekâ destekli bir sohbet botu \nplatformudur. Eğitimden müşteri hizmetlerine kadar geniş \nbir kullanım alanına sahiptir. \nTemel Özellikler:\n ¬ Otomatik Yanıtlar: Sık sorulan soruları hızlı ve doğru bir \nşekilde yanıtlar.\n ¬ Kişiselleştirilmiş Deneyim: Kullanıcılar için özelleştirilmiş \nsohbet deneyimi.\n ¬ Çoklu Platform Desteği: Web, mobil ve sosyal medya \nentegrasyonları.\nEğitimde Kullanımı:\n ¬ Öğrenci geri bildirimlerini toplama.\n ¬ Eğitici içerikler hakkında bilgi sunma.Dialogflow\nDialogflow, Google tarafından geliştirilmiş, doğal dil işleme \ntabanlı bir sohbet botu oluşturma platformudur. \nTemel Özellikler:\n ¬ Doğal Dil İşleme: Kullanıcıların mesajlarını anlama ve \ndoğru yanıtlar üretme.\n ¬ Çoklu Dil Desteği: Farklı dillerde sohbet botları oluşturma.\n ¬ Çapraz Platform Entegrasyonu: Web siteleri, mobil uy -\ngulamalar ve sosyal medya entegrasyonları.\nEğitimde Kullanımı:\n ¬ Sınıf içi etkileşimli araçlar geliştirme.\n ¬ Eğitim içeriklerine erişimi kolaylaştırma.\nSocrat\nTanım: Socrat, öğrencilerin öğrenme süreçlerini optimize eden \nbir yapay zekâ destekli öğrenme asistanıdır. \nTemel Özellikler:\n ¬ Kişiselleştirilmiş Öğrenme: Öğrencilerin öğrenme stillerine \ngöre öneriler sunar.\n ¬ Soru Cevaplama: Belirli konular hakkında öğrenci soru -\nlarını yanıtlar.\nEğitimde Kullanımı:\n ¬ Öğrencilerin derslerdeki eksikliklerini belirleme ve kapatma.\n ¬ Kendi kendine öğrenme süreçlerini teşvik etme.\nChatfuel:\nChatfuel, özellikle Facebook Messenger için tasarlanmış bir \nchatbot oluşturma platformudur. \nTemel Özellikler:\n ¬ Kolay Kullanım: Teknik bilgi gerektirmeyen arayüz.\n ¬ Mesaj Otomasyonu: Hızlı ve kişiselleştirilmiş mesaj yanıtları.\n ¬ Hedefleme Özellikleri: Kullanıcı davranışlarına göre oto -\nmatik yanıtlar.\nEğitimde Kullanımı:\n ¬ Eğitim kurumları için Facebook üzerinden öğrenci ileti -\nşimi sağlama.\n ¬ Eğitim içeriklerini tanıtma ve duyuru gönderme.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n264"}, {"page": 265, "text": "Quickchat:\nQuickchat, konuşma tabanlı yapay zekâ chatbotları geliştirmek \niçin kullanılan bir araçtır. \nTemel Özellikler:\n ¬ Konuşmaya Dayalı Sohbet: Kullanıcılarla daha doğal et -\nkileşim sağlar.\n ¬ Özelleştirilebilir Botlar: Farklı ihtiyaçlara uygun botlar \noluşturur.\n ¬ Dil Desteği: Birden fazla dilde sohbet imkânı sunar.\nEğitimde Kullanımı:\n ¬ Öğrenci rehberlik hizmetleri için otomatik destek.\n ¬ Ders içeriklerini sesli olarak öğrencilere sunma.Kaizan:\nKaizan, müşteri hizmetleri ve iş süreçlerini optimize etmek \niçin kullanılan bir yapay zekâ asistanıdır. https://kaizan.ai/ \nTemel Özellikler:\n ¬ İş Süreci Analizi: Performansı artırmak için öneriler sunar.\n ¬ Raporlama ve Geri Bildirim: Kullanıcı etkileşimlerini analiz \neder.\n ¬ Etkileşim Optimizasyonu: Daha iyi bir kullanıcı deneyimi \nsağlar.\nEğitimde Kullanımı:\n ¬ Eğitim yönetim süreçlerini optimize etme.\n ¬ Öğrenci geri bildirimlerini toplama ve analiz etme.\nCohere:\nCohere, doğal dil işleme modelleriyle metin tabanlı işlemler \nyapmayı kolaylaştıran bir yapay zekâ platformudur. https://\ncohere.com/ \nTemel Özellikler:\n ¬ Dil Modelleri: Karmaşık metinleri anlamak ve özetlemek \niçin güçlü NLP modelleri sunar.\n ¬ Kolay Entegrasyon: Eğitim uygulamalarına kolayca en -\ntegre edilebilir.\n ¬ Veri Analizi: Metinlerden anlamlı bilgiler çıkarır.\nEğitimde Kullanımı:\n ¬ Ders materyallerini analiz etme ve özetleme.\n ¬ Öğrenci projelerinde metin analizi yapma.\nClaude:\nClaude, Anthropic tarafından geliştirilen yapay zekâ destekli \nbir sohbet botudur. Claude, kullanıcılarla etkileşim kurabilen, \ndoğal dil işleme yeteneklerine sahip bir modeldir. Kullanıcı \ntaleplerini anlayabilir, anlamlı yanıtlar üretebilir ve çeşitli gö -\nrevleri yerine getirebilir. \nEğitimde Kullanımı:\nClaude, öğrencilere ders notları sağlama, sınav soruları hazır -\nlama ve ödevlerinde yardımcı olma gibi işlevlerde kullanılabilir. \nAyrıca, karmaşık konuları basitleştirerek öğrencilere öğretici \nbir rehberlik sunabilir. Öğrenciler, Claude'dan belirli bir konu \nhakkında bilgi alabilir veya sınav hazırlığı için rehberlik talep \nedebilirler.\n265\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 266, "text": "Gemini: \nGemini, Google’ın yapay zekâ destekli dil modeli sistemidir. İkizler \n(Gemini) chatbotları, kullanıcıların metin taleplerine yanıt ve -\nrirken bağlamsal olarak anlamlı cevaplar üretebilir. Google’ın \ngüçlü yapay zekâ altyapısı sayesinde, hem sohbet tabanlı etki -\nleşimlerde hem de karmaşık bilgi taleplerinde etkili bir modeldir. \nEğitimde Kullanımı: \nGemini, öğrencilere soruları yanıtlama, proje desteği sağlama \nve ödev rehberliği yapma gibi işlevlerde kullanılabilir. Özellik -\nle, ders materyalleri hakkında bilgi alma ve kişiselleştirilmiş \nöğrenme deneyimi sunma açısından eğitimde büyük katkılar \nsağlar. Öğrenciler, Gemini'den öğrenme materyalleri hakkında \ntavsiyeler alabilir ve sınav hazırlığı yapabilirler.\nEğitimde Gemini ile Sohbet Botu Uygulaması\nUygulama Adı: “Ders Asistanım Gemini”\nSınıf Düzeyi: 5. sınıf ve üzeri\nDers Alanı: Fen Bilimleri, Türkçe, Sosyal Bilgiler, İngilizce\nSüre: 1 ders saati (40-45 dk)\nAraç: Gemini (bard.google.com veya gemini.google.com)\nAmaç:\nÖğrencilerin yapay zekâyı bir öğrenme destekçisi olarak ta -\nnımaları, bilgiye ulaşma yollarını keşfetmeleri ve soru-cevap \nüzerinden yaratıcı düşünmeleri.\nUygulama Adımları:\n1. Tanıtım ve Hazırlık (10 dk):\nÖğretmen, öğrencilere Gemini’nin bir yapay zekâ sohbet aracı \nolduğunu açıklar.\nBasit örnek sorularla gösterim yapılır:\n“Gezegenlerin Güneş'e uzaklık sırası nedir?”“Bir masal kahramanı uydurabilir misin?”\n2. Soru-Cevap Görevi (15 dk):\nHer öğrenci veya grup, derse uygun olarak Gemini’ye 3 bilgi \nsorusu sorar ve aldığı yanıtları defterine not eder.\nÖrneğin:\n ¬ “Suyun üç hâli nedir?”\n ¬ “Türkiye’de en kalabalık şehir hangisidir?”\n ¬ “Doğru cümle örneği ver.”\n3. Yaratıcı Görev (10 dk):\nÖğrencilere şu tür görevler verilir:\n“Gemini’den kısa bir hikâye iste. Başını sen yaz, ortasını Gemini \ntamamlasın.”\n“Fen dersinden öğrendiğin bir konuyu Gemini’ye anlat ve özet -\nlemesini iste.”\n4. Sunum ve Değerlendirme (10 dk):\nÖğrenciler Gemini ile yaptıkları kısa konuşmalardan bir örneği \nsınıfa sunar.\nÖğretmen geri bildirim verir:\n ¬ Sorular açık mıydı?\n ¬ Yanıt doğru muydu?\n ¬ Gemini'yi etkili kullandın mı?\nKazanımlar\n ¬ Yapay zekâ araçlarını sorumlu ve etkili kullanmayı öğrenme\n ¬ Eleştirel düşünme: AI yanıtlarının doğruluğunu sorgulama\n ¬ Bilgiye ulaşma ve özetleme becerisi\n ¬ Yaratıcılık ve dijital okuryazarlık gelişimi\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n266"}, {"page": 267, "text": "Grok: \nTanım: Grok, Elon Musk’ın sahibi olduğu xAI şirketi tarafından \ngeliştirilen, X (eski adıyla Twitter) platformuna entegre edilen \nbir yapay zekâ sohbet botudur. ChatGPT benzeri şekilde çalışır, \nancak doğrudan X verilerine erişebildiği için güncel gelişmeleri \nyorumlayabilir ve gündemle entegre çalışır.\nTemel Özellikleri\n ¬ Doğrudan X verisiyle bağlantılıdır: Gündemdeki tweet’ler, \nhaberler, trend konular hakkında bilgi verir.\n ¬ Doğal dil ile sohbet edilebilir: Soru-cevap, özetleme, \naçıklama, analiz gibi görevleri yerine getirir.\n ¬ Gelişmiş mizah anlayışı içerir: Diğer sohbet botlarına göre \ndaha esprili, yer yer alaycı bir tarzda yanıt verir.\n ¬ Chatbot API olarak kullanılamaz (şu an): X Premium+ \nabonelerine özel sunulmaktadır.\n ¬ GPT-4 benzeri modellerle rekabet eder, ancak kendi özel \nveri kümesine dayalıdır.\nEğitimde Kullanımı (Sınırlı)\nGrok şu anda doğrudan eğitim amaçlı veya sınıf içi araç olarak \nkullanılmaz çünkü:\n ¬ Yalnızca X Premium+ kullanıcılarına açıktır.\n ¬ Eğitim ortamları için API desteği yoktur.\n ¬ Mizahi ve alaycı dil tonu her yaş grubu için uygun olmayabilir.Perplexity: \nPerplexity, yapay zekâ destekli bir bilgi keşfi ve soru-cevap \nplatformudur. Kullanıcılara, sorularına doğrudan yanıtlar ve -\nrirken aynı zamanda kaynak önerileri ve detaylı açıklamalar \nsunar. Doğru, hızlı ve güvenilir bilgiye erişmek için geliştirilmiştir.\nTemel Özellikler:\n ¬ Doğrudan Soru-Cevap: Kullanıcının sorduğu sorulara hızlı \nve doğru yanıtlar verir.\n ¬ Kaynak Gösterimi: Verilen cevapların dayandığı kaynakları \naçıkça gösterir.\n ¬ Etkileşimli Arama: Kullanıcıların daha derinlemesine \naraştırma yapmasına olanak tanır.\n ¬ Çoklu Konu Desteği: Farklı alanlardaki konular için kap -\nsamlı bilgi sunar.\n ¬ Kullanıcı Dostu Arayüz: Basit ve anlaşılır bir arayüz ile \nkolay kullanım sağlar.\nEğitimde Kullanımı:\n ¬ Araştırma ve Literatür Tarama: Öğrenciler ve öğretmenler, \nakademik projeler için güvenilir kaynaklar bulabilir.\n ¬ Soru-Cevap Temelli Öğrenim: Karmaşık kavramları hızlı \nve sade bir şekilde açıklamak için kullanılır.\n ¬ Ders Hazırlığı: Öğretmenler, ders materyalleri oluşturmak \niçin konu hakkında özet bilgiler edinebilir.\n ¬ Proje ve Ödev Destek: Öğrenciler, ödev ve projelerinde \ngerekli bilgilere hızlı erişim sağlayabilir.\nPerplexity, özellikle araştırma ve hızlı bilgiye ihtiyaç duyan \nöğrenciler ve öğretmenler için güçlü bir araçtır. Bilginin doğ -\nruluğunu kontrol etmek ve kaynaklara hızlı erişim sağlamak \nisteyenler için etkili bir çözüm sunar. \n267\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 268, "text": "Eğitimde Perplexity AI Uygulaması – “Akıllı Araştırmacı”\nSınıf Düzeyi: 8. Sınıf\nDers: Türkçe, Fen Bilimleri veya Sosyal Bilgiler\nSüre: 1 ders saati (40–45 dk)\nAraç: https://www.perplexity.ai\nAmaç:\nÖğrencilerin yapay zekâ destekli araştırma araçlarını tanı -\nması, bilgiyi değerlendirmesi ve kaynaklarla birlikte öğrenme \nbecerisi geliştirmesi.\nEtkinlik Adımları:\n1. Konu Seçimi (5 dk):\nHer öğrenci/grup bir araştırma konusu seçer:\n ¬ “DNA nedir?”\n ¬ “Küresel ısınmanın nedenleri”\n ¬ “Divan edebiyatı ile halk edebiyatının farkı”\n ¬ “Lozan Antlaşması’nın önemi”\n2. Perplexity ile Araştırma (15 dk):\nÖğrenciler Perplexity.ai sitesine giderek konularını yazar ve \nverilen cevabı okur.\nCevapla birlikte gelen kaynaklara da bakmaları istenir.\n“Küresel ısınmanın en önemli nedeni nedir?”\n“Bana madde madde yaz.”\n“Bu bilgileri 8. sınıf seviyesine göre sadeleştir.”\n3. Bilgi Doğrulama & Özet (10 dk):\nÖğrenciler cevaptaki bilgileri ders kitabı ya da öğretmen reh -\nberliğinde doğrular ve kısa bir özet çıkarır.3 maddelik kısa bilgi kartı hazırlanır.\n4. Sunum ve Tartışma (10 dk):\nGruplar bilgilerini sınıfa sunar:\n ¬ Ne öğrendin?\n ¬ Perplexity sana nasıl yardım etti?\n ¬ Verilen kaynak güvenilir miydi?\nKazanımlar:\n ¬ Yapay zekâ destekli araştırma yapabilme\n ¬ Kaynak kontrolü ve eleştirel okuma becerisi\n ¬ Sadeleştirme ve bilgiyi aktarma becerisi\n ¬ Dijital araçlarla sorumlu öğrenme alışkanlığı geliştirme\nEkstra İpucu:\nÖğretmen, öğrencilere şu tür sorularla AI okuryazarlığı bilinci \nkazandırabilir:\n ¬ “Bu bilgiyi başka bir kaynakta da gördün mü?”\n ¬ “Kaynağın adı var mıydı?”\n ¬ “Cevap çok genel mi yoksa detaylı mıydı?”\nTextCortex:\nTanım: Yapay zekâ destekli yazım ve içerik üretim platformu -\ndur. Kullanıcıların blog yazıları, akademik metinler, pazarlama \niçerikleri, e-posta taslakları ve sosyal medya gönderileri gibi \nbirçok farklı alanda metin üretmesine yardımcı olur. Ayrıca \nmetin düzenleme, özetleme ve çeviri gibi özellikleriyle yazım \nsüreçlerini hızlandırır.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n268"}, {"page": 269, "text": "Temel Özellikler:\n ¬ Yapay Zekâ ile İçerik Üretme: Blog yazıları, akademik ma -\nkaleler, sosyal medya metinleri ve pazarlama içerikleri \noluşturur.\n ¬ Parafraz ve Yeniden Yazım: Cümleleri daha akıcı ve etkili \nhâle getirmek için metinleri yeniden yazar.\n ¬ Özetleme ve Uzun Metinleri Kısaltma: Akademik makaleler, \nraporlar veya uzun metinleri özetleyerek temel bilgileri \nsunar.\n ¬ Çoklu Dil Desteği: Birden fazla dilde metin üretme ve çeviri \nyapma özelliği sunar.\n ¬ Akıllı Yazım ve Dil bilgisi Düzeltme: Hata tespiti yaparak \ndaha akıcı ve profesyonel metinler oluşturur.\nEğitimde Kullanımı:\n ¬ Öğrenciler İçin Akademik Yazım Desteği: Öğrenciler, ma -\nkale yazımı, araştırma raporları ve ödevlerinde yapay zekâ \ndestekli içerik üretiminden faydalanabilir.\n ¬ Öğretmenler İçin Ders Materyalleri Hazırlama: Öğret -\nmenler, ders notları, sınav soruları ve eğitim materyalleri \noluşturabilir.\n ¬ Parafraz ve Özetleme Aracı Olarak Kullanım: Öğrenciler, \nakademik kaynakları özetleyerek bilgileri daha hızlı an -\nlayabilir ve kendi cümleleriyle ifade edebilir.\n ¬ Araştırma Raporları ve Literatür Taraması İçin Kullanım: \nUzun makaleleri analiz ederek temel noktaları özetleyebilir.\n ¬ Eğitimle İlgili E-Posta ve Duyuru Yazımı: Okul yönetimi \nve öğretmenler için profesyonel e-posta ve bilgilendirme \nmetinleri hazırlayabilir.YouChat\nYouChat, yapay zekâ destekli bir sohbet ve bilgi arama
