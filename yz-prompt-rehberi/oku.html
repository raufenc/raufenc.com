TMALAR\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n8"}, {"page": 9, "text": "SUNUŞ\nEğitimde dijital dönüşümün hızlandığı günümüzde, yapay zekâ teknolojilerinin öğretmenlerimizin mesleki yeter -\nlilikleri ile buluşması büyük önem taşımaktadır.\nÖğretmenlerimizin bu teknolojiyi yalnızca tüketen değil, aynı zamanda yönlendiren bireyler olarak kullanabilmeleri \namacıyla hazırlanan bu kitap; yapay zekâ okuryazarlığı, etik farkındalık, araç kullanımı ve özellikle prompt yazma \nbecerilerinin eğitim ortamlarında nasıl geliştirilebileceğine yönelik kapsamlı bir rehber sunmaktadır.\nKitapta yer alan örnek senaryolar, uygulama adımları ve araç tanıtımları, öğretmenlerimizin sınıf içi uygulama -\nlarda yapay zekâ tabanlı çözümleri pedagojik temelli ve güvenli biçimde kullanabilmelerine olanak sağlayacaktır.\nMustafa CANLI  \nYenilik ve Eğitim Teknolojileri  \nGenel Müdürü\n9\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 10, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ10"}, {"page": 11, "text": "Bu eser, öğretmenlerin yapay zekâ tabanlı dijital araçları sınıf içi öğretim süreçlerinde bilinçli, etkili ve pedagojik \ntemelli bir yaklaşımla kullanmalarını desteklemek amacıyla hazırlanmıştır.\nKitap; yapay zekâ okuryazarlığı, veri güvenliği, etik ilkelere uyum, araç incelemeleri, prompt mühendisliği, ders \nplanlama ve örnek uygulamalar olmak üzere çok katmanlı bir içerik yapısına sahiptir.\nÖzellikle prompt yazma konusuna geniş yer verilmiş; öğretmenlerin açık uçlu, yaratıcı ve etkili istemler oluştu -\nrabilmeleri için örnek formatlar, araçlara göre öneriler ve rehberlik edici açıklamalar sunulmuştur.\nStratejik olarak bu yayın, Millî Eğitim Bakanlığı’nın dijital yetkinlik temelli dönüşüm hedefleri doğrultusunda öğ -\nretmenlerin mesleki gelişimine hizmet eden bütüncül bir kaynak niteliğindedir.\nSümeyye Hatice ERAL  \nYenilik ve Eğitim Teknolojileri  \nDijital Beceriler Daire BaşkanıYÖNETİCİ ÖZETİ\n11\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 12, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ12"}, {"page": 13, "text": "“Yapay Zekâ ve Eğitim: Öğretmenler İçin Uygulamalı Prompt Mühendisliği ve Üretken Araçlarla Yenilikçi Öğrenme \nStratejileri” isimli bu kitap; öğretmenlerin yapay zekâ teknolojilerini sınıf içi uygulamalara entegre edebilmelerini \ndesteklemek amacıyla hazırlanmış kapsamlı ve uygulamalı bir kaynaktır.\nKitapta; yapay zekâ temelleri, araç tanıtımları, güvenlik ve etik ilkeler, prompt mühendisliği ile etkili istem oluş -\nturma teknikleri, örnek ders senaryoları, ölçme-değerlendirme uygulamaları ve öğretmenler için özel olarak \ngeliştirilmiş kullanım rehberleri yer almaktadır.\nHem yeni başlayan öğretmenler hem de ileri düzey kullanıcılar için anlaşılır bir dille kaleme alınmış bu eser, yapay \nzekânın eğitimde etkili ve güvenli kullanımına yönelik kapsamlı bir başvuru kaynağıdır.KİTAP ÖZETİ\n13\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 14, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ14"}, {"page": 15, "text": "1.1. Yapay Zekâ ve Eğitim\nYapay zekâ (YZ) teknolojilerinin eğitimdeki kullanımı, son \nyıllarda önemli bir ilgi odağı hâline gelmiştir. YZ, öğrenme \nsüreçlerini kişiselleştirme, öğretmenlerin iş yükünü azaltma \nve öğrencilere gerçek zamanlı geri bildirim sağlama potansi -\nyeline sahiptir. YZ, eğitimde farklı şekillerde kullanılmaktadır. \nBunlar arasında otomatik notlama sistemleri, uyarlanabilir \nöğrenme platformları ve sanal öğretmenler bulunmaktadır \n(Arslan, 2020). YZ tabanlı otomatik notlama sistemleri, öğ -\nrencilerin yazılı çalışmalarını değerlendirirken öğretmenlerin \nzamanını önemli ölçüde tasarruf etmektedir. Bu sistemler, dil \nbilgisi ve yapı açısından yazıları analiz edebilir ve öğretmen -\nlere detaylı raporlar sunabilir (Jones & Brown, 2019). Uyarla -\nnabilir öğrenme platformları, öğrenci verilerini analiz ederek \nher öğrenciye özel öğrenme yolları sunar. Bu platformlar, öğ -\nrencilerin güçlü ve zayıf yönlerini belirleyerek, onlara uygun \nmateryaller ve egzersizler sunar (Miller, 2021).\nYZ'nin eğitimdeki etkileri geniş çaplıdır ve öğrenci başarısından \nöğretim süreçlerine kadar birçok alanda değişim yaratmakta -\ndır (Temur, 2024). Araştırmalar, YZ'nin kişiselleştirilmiş öğrenme \nyaklaşımları sayesinde öğrenci başarısını artırdığını göstermekte -\ndir göstermektedir (Kenan,2025). Özellikle, bireyselleştirilmiş geri \nbildirim ve rehberlik, öğrencilerin konuları daha iyi anlamalarına \nyardımcı olmaktadır (Doe, 2018). YZ, öğretmenlerin rutin işleri -\nni otomatikleştirerek onların daha fazla yaratıcı ve stratejik işler \nüzerinde yoğunlaşmalarını sağlar. Bu, öğretim kalitesini artırırken \nöğretmenlerin iş yükünü azaltır (Williams, 2022).\nYZ'nin eğitimdeki kullanımı ile birlikte etik ve gizlilik konuları da \ngündeme gelmektedir. Öğrenci verilerinin gizliliği, bu teknolo -\njilerin yaygınlaşmasıyla birlikte kritik bir konu hâline gelmiştir \n(Davis, 2020). YZ, eğitimde büyük bir potansiyele sahiptir. Kişi -\nselleştirilmiş öğrenme, öğretmenlerin iş yükünü hafifletme ve \nöğrencilere gerçek zamanlı geri bildirim sağlama gibi alanlar -\nda YZ'nin faydaları göz ardı edilemez (Gökoğlu, 2024). Ancak, \netik ve gizlilik konularının da dikkate alınması gerekmektedir.1.GİRİŞ\n1.2. Kitabın Amacı ve Kapsamı\nBu kitabın amacı, yapay zekâ (YZ) teknolojilerinin eğitim ala -\nnındaki rolünü ve etkilerini detaylı bir şekilde incelemektir. \nEğitimde YZ'nin kullanımı, öğrenme süreçlerini kişiselleştir -\nme, öğretmenlerin iş yükünü azaltma ve öğrencilere gerçek \nzamanlı geri bildirim sağlama gibi pek çok alanda büyük \npotansiyele sahiptir. Kitap, YZ'nin eğitimde nasıl kullanıldı -\nğını, bu teknolojilerin öğrenci başarısı üzerindeki etkilerini, \nöğretim süreçlerine katkılarını ve etik ile gizlilik konularını \nele almayı hedeflemektedir.\nKitap, öncelikle YZ'nin eğitimdeki farklı uygulama alanlarını \ntanıtmakla başlamaktadır. Bu kapsamda, otomatik notlama \nsistemleri, uyarlanabilir öğrenme platformları ve sanal öğ -\nretmenler gibi konular ayrıntılı bir şekilde ele alınmaktadır. \nÖrneğin, YZ tabanlı otomatik notlama sistemlerinin, öğrenci -\nlerin yazılı çalışmalarını değerlendirirken öğretmenlerin za -\nmanını nasıl tasarruf ettiğini ve dil bilgisi ile yapı açısından \nyazıları analiz ederek öğretmenlere detaylı raporlar sundu -\nğunu tartışılmaktadır (Jones & Brown, 2019).\nKitap ayrıca, uyarlanabilir öğrenme platformlarının öğrenci \nverilerini analiz ederek her öğrenciye özel öğrenme yolları \nsunma yeteneklerini de incelemektedir. Bu platformlar, öğ -\nrencilerin güçlü ve zayıf yönlerini belirleyerek, onlara uygun \nmateryaller ve egzersizler sunmaktadır (Miller, 2021). Bu \nteknolojilerin, kişiselleştirilmiş öğrenme yaklaşımları saye -\nsinde öğrenci başarısını nasıl artırdığını gösteren araştırma -\nlar da sunulmaktadır (Doe, 2018).\nYZ'nin eğitimdeki etkileri geniş bir yelpazede değerlendi -\nrilmektedir. Öğretmenlerin rutin işlerini otomatikleştirerek \nonların daha fazla yaratıcı ve stratejik işler üzerinde yoğun -\nlaşmalarını sağlama potansiyeli tartışılmaktadır (Williams, \n2022). Bu durum, öğretim kalitesini artırırken öğretmenlerin \niş yükünü azaltmaktadır.\n15\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 16, "text": "Kitap, YZ'nin eğitimdeki kullanımı ile birlikte gündeme gelen \netik ve gizlilik konularına da dikkat çekmektedir. Öğrenci \nverilerinin gizliliği, bu teknolojilerin yaygınlaşmasıyla birlikte \nkritik bir konu hâline gelmiştir (Davis, 2020). YZ'nin sağladığı \nfaydalar kadar, bu faydaların sorumlu bir şekilde yönetilmesi \ngerektiği de vurgulanmaktadır.\nBu kitabın bir diğer önemli amacı, YZ'nin eğitimde nasıl \netkili bir şekilde kullanılabileceğini öğretmek ve bunun için \ngerekli olan prompt mühendisliğini açıklamaktır. Prompt \nmühendisliği, YZ araçlarının etkili kullanımını sağlamak \niçin büyük önem taşımaktadır. Bu nedenle, kitapta yer alan \npromptlar, okuyucuların bu araçları nasıl kullanabileceklerini \nve kendi eğitim materyallerini nasıl oluşturabileceklerini \nanlamalarına yardımcı olacaktır.\nÖrnek olarak, aşağıdaki gibi promptlar sunulacaktır:\n ¬ Öğrenci Başarısını Artırma: \"Bir öğrencinin zayıf olduğu \nkonuları tespit ederek ona uygun öğrenme materyalleri \nöneren bir YZ aracı oluşturmak için hangi adımlar izlen -\nmelidir?\"\n ¬ Otomatik Notlama: \"YZ tabanlı bir sistemin öğrencilerin \nyazılı ödevlerini değerlendirirken dikkat etmesi gereken \ndil bilgisi ve kompozisyon kuralları nelerdir?\"\n ¬ Kişiselleştirilmiş Öğrenme: \"Öğrenci verilerini analiz ederek \nher öğrenciye özel öğrenme yolları sunan bir uyarlanabilir \nöğrenme platformu nasıl tasarlanır?\"\nSonuç olarak, bu kitap, YZ'nin eğitimdeki büyük potansiyelini \nortaya koymakta ve bu teknolojilerin faydalarını maksimize \nederken karşılaşılan zorlukları en aza indirmek için öneriler \nsunmaktadır. Ayrıca, YZ araçlarını etkili bir şekilde kullanabilmek \niçin gerekli olan prompt mühendisliği konusunda da okuyuculara \nrehberlik etmektedir.\n1.3. Önemli Not: Yapay Zekâ Araçlarının  \nSürekli Değişen Dinamikleri Üzerine\nBu kitapta yer alan yapay zekâ araçları, günümüzün en güncel \nve yaygın kullanılan teknolojileri baz alınarak hazırlanmıştır. \nAncak, yapay zekâ alanı hızla gelişen ve sürekli değişen bir \nyapıya sahiptir. Geliştiriciler, yapay zekâ tabanlı araçları düzenli \nolarak güncelleyebilir, erişim politikalarını değiştirebilir veya \nbazı araçları tamamen kaldırabilir. Bu nedenle, kitapta yer alan \nbazı yapay zekâ araçları zaman içinde aşağıdaki değişimlere \nuğrayabilir: ¬ İsim veya Marka Değişiklikleri\n »Bazı yapay zekâ araçları, sahip oldukları şirketler veya \ngeliştirici ekipler tarafından yeniden markalanabilir. \nÖrneğin, bir aracın adı değiştirilebilir ya da başka bir \nplatformla birleşerek farklı bir kimlik kazanabilir.\n ¬ Ücretlendirme ve Lisans Politikalarının Değişmesi\n »Kitapta yer verilen bazı araçlar, yazım sırasında ücretsiz \nveya sınırlı ücretsiz sürümlerle kullanıcılara sunulmak -\ntadır. Ancak, geliştiriciler bu araçları ilerleyen süreçte \ntamamen ücretli hâle getirebilir veya mevcut ücretsiz \nkullanım haklarını sınırlandırabilir.\n ¬ Bazı Araçların Kullanımdan Kaldırılması\n »Yapay zekâ sektöründeki rekabet ve teknolojik ilerlemeler \nnedeniyle bazı araçlar piyasadan tamamen kaldırılabilir veya \ngeliştirilmeye son verilebilir. Bu durum, özellikle start-up \nşirketleri tarafından geliştirilen ve yeterli kullanıcıya ulaşa -\nmayan yapay zekâ platformlarında daha sık görülmektedir.\n ¬ Alternatif veya Daha Gelişmiş Araçların Ortaya Çıkması\n »Yapay zekâ teknolojileri hızla ilerlediğinden, kitapta yer \nalan bazı araçların yerini daha gelişmiş, daha verimli veya \ndaha erişilebilir yeni araçlar alabilir. Kullanıcılar, mevcut \naraçları güncel alternatiflerle karşılaştırarak en uygun \nolanı seçmelidir.\n ¬ Bölgesel Erişim Kısıtlamaları ve Yasal Düzenlemeler\n »Bazı yapay zekâ araçları, belirli ülkelerdeki yasal düzenle -\nmelere veya veri güvenliği politikalarına bağlı olarak erişime \nkapatılabilir veya sınırlandırılabilir. Örneğin, veri gizliliği yasa -\nları nedeniyle bazı ülkelerde belirli YZ araçlarının kullanımı \nmümkün olmayabilir.\nKullanıcılara Öneriler\nBu değişkenliği göz önünde bulundurarak, kitapta adı geçen \nyapay zekâ araçlarını kullanmadan önce:\n ¬ Güncellenmiş erişim ve kullanım politikalarını kontrol \netmenizi,\n ¬ Resmî web sitelerinden en son sürüm bilgilerine ulaşmanızı,\n ¬ Benzer işlevlere sahip alternatif araçları araştırmanızı \nöneririz.\nEğitimde ve profesyonel çalışmalarda yapay zekâ kullanımını \nen verimli hâle getirmek için teknolojik gelişmeleri yakından \ntakip etmek önemlidir. Bu kitap, günümüz yapay zekâ araç -\nlarını temel alarak hazırlanmış olup, ilerleyen yıllarda ortaya \nçıkabilecek yeni araçlar ve gelişmeler doğrultusunda güncel -\nlenmesi gerekebilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n16"}, {"page": 17, "text": "2.1. Tanım \nYapay zekâ (YZ) sistemlerinin etkin ve verimli bir şekilde kul -\nlanılabilmesi için doğru komutların (prompt'ların) tasarlan -\nması büyük bir önem taşır. Prompt mühendisliği, YZ model -\nlerine istenilen çıktıyı elde etmek için gerekli olan komutları \ntasarlama ve optimize etme sürecidir (Yoşumaz, 2024). Bu \nsüreç, kullanıcıların YZ sistemlerinden en iyi sonuçları alma -\nsını sağlar ve bu teknolojilerin eğitim, sağlık, iş dünyası gibi \nfarklı alanlarda daha etkili bir şekilde kullanılmasına olanak \ntanır (Karabıyık vd., 2024).\nPrompt mühendisliği, YZ sistemlerinin doğru ve amaca \nuygun yanıtlar verebilmesi için kritik bir rol oynar (Şengel, \n2024). Özellikle doğal dil işleme (NLP) modellerinde, girilen \nkomutun yapısı, kelime seçimi ve dil bilgisi, elde edilen so -\nnucun kalitesini doğrudan etkiler (Amazon, 2025). Örneğin, \neğitimde bir konu hakkında bilgi vermek veya öğrencinin \nyazdığı bir metni değerlendirmek için YZ sistemlerinden ya -\nrarlanıldığında, doğru ve anlaşılır prompt'lar kullanmak, bu \nsüreçlerin verimliliğini artırır (Şengel, 2024).\nPrompt mühendisliği, yapay zekâ manzarasındaki yeni bir \nalan olup, makinelerin insanları daha iyi anlamasını ve nere -\ndeyse insan gibi yanıtlarla etkileşim kurmasını sağlar (Aktaş, \n2025).. Peki, promptlar nasıl bu kadar yenilikçi bir işlevsel -\nlik sağlayabilir? Promptlar, makinelerde doğal dil işlemeye \nodaklanarak, önceden tanımlanmış rutinlere veya komutla -\nra ihtiyaç duymadan yapay zekânın sezgiselliğini artırmayı \nhedefler. Prompting'in temel amacı, yapay zekânın belirli \nkomutların ardındaki bağlamı anlamasına yardımcı olarak \nmakinelerin insan taleplerini doğru bir şekilde yorumlama -\nsını sağlamaktır (Aktaş, 2025).\nPrompt mühendisliği, insanlar ve makineler arasındaki iletişimde en \niyi uygulamaları dikkate alar ak, makinelerin doğru yanıtlar sunarken \ninsan isteklerini doğru bir şekilde yorumlamasına yardımcı olan bir \nalandır. Bu, yapay zekâ ile etkili ve verimli bir iletişim kurmanın anah -\ntarıdır (Şengel, 2025).Örneğin, bir okul yeni bir yapay zekâ destekli eğitim proje -\nsi başlatıyor. Bu projede en verimli sonuçları alabilmek için \ndoğru 'prompt'ları belirlemesi gerekiyor (Bansal, 2024). İşte \nbu noktada, prompt mühendisleri devreye giriyor. Ancak, bir -\nçok eğitim kurumu bu tür bir uzmanlığa ihtiyacı olduğunun \nya da olacağının farkında bile değil. \nPrompt mühendisliğinin önemi, şu başlıklar altında özet -\nlenebilir:\n1. Kullanıcı Dostu Deneyim: Doğru tasarlanmış prompt'lar, \nkullanıcıların YZ sistemlerini daha rahat ve etkili bir şekilde \nkullanmasını sağlar. Karmaşık komutların yerine, basit \nve anlaşılır prompt'lar kullanmak, kullanıcı deneyimini \niyileştirir ve bu teknolojilere olan güveni artırır.\n2. Verimlilik ve Doğruluk: İyi tasarlanmış prompt'lar, YZ mo -\ndellerinin daha doğru ve amaca uygun yanıtlar üretmesini \nsağlar. Bu, özellikle eğitimde öğrencilerin performansını \ndeğerlendirme, kişiselleştirilmiş öğrenme materyalleri \nsunma ve otomatik notlama gibi uygulamalarda büyük \nbir avantaj sağlar (Miller, 2021).\n3. Zaman ve Kaynak Tasarrufu: Öğretmenler ve eğitim yöne -\nticileri, doğru prompt'lar sayesinde YZ sistemlerini daha \netkin kullanarak zaman ve kaynak tasarrufu sağlayabilir. \nÖrneğin, otomatik notlama sistemleri, öğretmenlerin \ndeğerlendirme sürecini hızlandırırken, öğrencilerin per -\nformansı hakkında detaylı geri bildirimler sunar (Jones \n& Brown, 2019).\n4. Geliştirilmiş Öğrenme Deneyimi: Öğrenciler, kişiselleştiril -\nmiş öğrenme materyalleri ve adaptif öğrenme platformları \nsayesinde kendi hızlarında ve ihtiyaçlarına göre öğrenme \nfırsatı bulur. Bu da öğrenci başarısını artırır ve öğrenme \nsürecini daha etkili hâle getirir (Doe, 2018).2.PROMPT MÜHENDİSLİĞİNE GENEL BAKIŞ\n17\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 18, "text": "2.2. Prompt Mühendisliği Neden Bu Kadar Önemli?\n ¬ Yapay Zekâ Performansını Artırır\nPrompt mühendisliği, yapay zekâ modellerinin en iyi şe -\nkilde performans göstermesini sağlar. Doğru tasarlanmış \npromptlar, yapay zekâdan daha doğru ve anlamlı yanıtlar \nalmayı mümkün kılar.\n ¬ İnsan-Makine İletişimini Geliştirir\nMakinelerin insan taleplerini daha iyi anlaması ve doğru \nyanıtlar vermesi, insanlar ve makineler arasındaki iletişimi \niyileştirir. Bu, yapay zekâ uygulamalarının daha kullanıcı \ndostu olmasını sağlar.\n ¬ Geniş Uygulama Alanlarına Sahiptir\nEğitimden sağlığa, iş dünyasından müşteri hizmetlerine ka -\ndar birçok alanda kullanılabilir. Bu geniş uygulama alanları, \nprompt mühendisliğinin önemini ve popülaritesini artırır.\n ¬ İnovasyonu ve Yaratıcılığı Teşvik Eder\nYapay zekâ projelerinde inovatif çözümler ve yeni uygu -\nlamalar geliştirmek için prompt mühendisliği kritik bir rol \noynar. Bu, sürekli olarak yenilikçi fikirler ve uygulamalar \nüretilmesini teşvik eder.\n ¬ Zaman ve Kaynak Tasarrufu Sağlar\nDoğru promptlar, yapay zekâ modellerinin daha verimli \nçalışmasını sağlar, böylece projelerin daha hızlı ve maliyet \netkin bir şekilde tamamlanmasına yardımcı olur. ¬ Eğitimde ve Öğrenmede Devrim Yaratır\nEğitimde, doğru promptlar kullanılarak öğrencilerin ihti -\nyaçlarına uygun, kişiselleştirilmiş öğrenme deneyimleri \noluşturulabilir. Bu, öğrencilerin öğrenme sürecini daha \netkili hâle getirir.\n ¬ Geleceğin Mesleği\nBirçok şirket ve kurum, yapay zekâ projelerinde en iyi so -\nnuçları elde etmek için prompt mühendislerine ihtiyaç \nduyar. Bu da prompt mühendisliğini geleceğin en gözde \nmesleklerinden biri hâline getirir.\n ¬ Doğru ve Etik Yapay Zekâ Kullanımı Sağlar\nPrompt mühendisliği, yapay zekâ uygulamalarının etik \nve doğru bir şekilde kullanılmasını sağlar. Bu, güvenilir ve \nsorumlu yapay zekâ çözümleri geliştirmeye katkıda bulunur.\n ¬ Veri Analizi ve Karar Verme Süreçlerini İyileştirir\nYapay zekâ modelleri, doğru promptlarla daha iyi veri analizi \nyapabilir ve bu da karar verme süreçlerini iyileştirir. Bu, \nişletmelerin ve kurumların daha bilinçli ve etkili kararlar \nalmasını sağlar.\nPrompt mühendisliği, yapay zekâ sistemlerinin potansiyelini \nmaksimize etmek ve çeşitli alanlarda en iyi sonuçları elde \netmek için kritik bir rol oynar. Yapay zekâ tabanlı uygulama -\nlar geliştiren ve kullanan profesyonellerin, doğru prompt'ları \ntasarlama ve optimize etme becerilerine sahip olması büyük \nbir önem taşır. Bu yetenek, yapay zekânın etkin kullanımını \nsağlar ve uygulamaların verimliliğini artırır. Özellikle eğitimde, \nyapay zekânın doğru kullanımı, öğrencilerin öğrenme dene -\nyimlerini zenginleştirirken öğretmenlerin iş yükünü azaltır ve \neğitim süreçlerini daha verimli hâle getirir. Bu nedenle, prompt \nmühendisliği hem mevcut hem de gelecekteki yapay zekâ \nuygulamaları için önemli ve gözde bir alandır.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n18"}, {"page": 19, "text": "2.3. Neden Öğretmenler İçin Prompt Mühendisliği?\nPrompt mühendisliği, yapay zekâ (YZ) teknolojilerinin eğitimde \netkili bir şekilde kullanılabilmesi için öğretmenler için büyük \nbir önem taşır. YZ sistemleri, doğru ve amaca uygun komutlar \nverildiğinde en iyi sonuçları verir. Öğretmenlerin bu teknolo -\njileri nasıl kullanacaklarını ve optimize edeceklerini bilmeleri, \neğitim süreçlerinde devrim yaratabilir. İşte öğretmenler için \nprompt mühendisliğinin neden bu kadar önemli olduğuna dair \nbazı nedenler:\nKişiselleştirilmiş Öğrenme Deneyimleri\nÖğrenciler, bireysel öğrenme ihtiyaçlarına göre uyarlanmış \niçerik ve destek aldıklarında daha etkili öğrenirler. Öğretmenler, \nYZ sistemlerine doğru prompt'lar vererek her öğrenci için kişi -\nselleştirilmiş öğrenme yolları oluşturabilirler. Bu, öğrencilerin \ngüçlü ve zayıf yönlerini belirlemeyi ve onlara uygun materyaller \nsunmayı içerir (Doe, 2018).\nVerimlilik ve Zaman Yönetimi\nÖğretmenler, sınıf içi ve dışındaki çeşitli görevler arasında denge \nkurmak zorundadır. YZ tabanlı otomatik notlama ve değer -\nlendirme sistemleri, öğretmenlerin değerlendirme süreçlerini \nhızlandırır ve zaman kazandırır. Doğru prompt'lar kullanılarak \nbu sistemlerin verimliliği artırılabilir, böylece öğretmenler daha \nfazla öğrenciyle bire bir ilgilenebilir (Jones & Brown, 2019).\nGeri Bildirim ve Destek\nÖğrencilerin öğrenme süreçlerinde etkili geri bildirim almak \nbüyük önem taşır. YZ sistemleri, anında ve detaylı geri bildirim \nsağlayarak öğrencilerin eksiklerini ve güçlü yönlerini anlama -\nlarına yardımcı olur. Öğretmenler, doğru prompt'ları kullanarak \nbu geri bildirimleri optimize edebilir ve öğrencilerin öğrenme \ndeneyimlerini iyileştirebilir (Miller, 2021).Öğretim Materyallerinin Geliştirilmesi\nYZ araçları, öğretmenlerin ders materyallerini ve içeriklerini hızlı \nve etkili bir şekilde geliştirmelerine yardımcı olabilir. Örneğin, \nYZ destekli araçlar kullanarak interaktif ve uyarlanabilir ders \nplanları oluşturmak mümkündür. Öğretmenler, bu süreçte \ndoğru prompt'lar kullanarak içeriklerin kalitesini ve etkinliğini \nartırabilirler (Eriçok vd., 2024).\nEtik ve Gizlilik Konuları\nYZ'nin eğitimdeki kullanımı ile birlikte gelen etik ve gizlilik \nkonuları, öğretmenler için önemli bir endişe kaynağıdır. Öğ -\nretmenler, öğrenci verilerini güvenli bir şekilde kullanmak ve \ngizlilik standartlarına uygun hareket etmek zorundadır. Doğru \nprompt'lar kullanarak, YZ sistemlerinin etik ve gizlilik açısın -\ndan uygun çalışmasını sağlamak mümkündür (Davis, 2020).\nProfesyonel Gelişim\nPrompt mühendisliği, öğretmenlerin profesyonel gelişimlerini \ndestekler. YZ araçlarını ve teknolojilerini etkin bir şekilde kul -\nlanabilme becerisi, öğretmenlerin mesleki yetkinliklerini artırır \nve onların eğitimdeki yeniliklere ayak uydurmasını sağlar. Bu \nda öğretmenlerin kendilerini sürekli geliştirmelerine ve en son \nteknolojik gelişmeleri sınıflarına entegre etmelerine olanak \ntanır (Williams, 2022).\nSonuç olarak, prompt mühendisliği, öğretmenlerin YZ tek -\nnolojilerini en etkili şekilde kullanmalarını sağlar. Bu da öğ -\nrencilerin öğrenme deneyimlerini iyileştirir, öğretmenlerin iş \nyükünü azaltır ve eğitim süreçlerini daha verimli hâle getirir. \nÖğretmenlerin, prompt mühendisliğini öğrenmeleri ve uygula -\nmaları, YZ'nin eğitimdeki potansiyelini maksimize etmelerine \nyardımcı olacaktır.\n19\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 20, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ20"}, {"page": 21, "text": "3.1. Prompt Nedir?\nPrompt, yapay zekâ (YZ) modellerine belirli bir yanıt veya çık -\ntı üretmek amacıyla verilen komut veya yönergedir. Yapay \nzekâ sistemleri, özellikle Doğal Dil İşleme (Natural Language \nProcessing – NLP) teknikleriyle geliştirilmiş olup, girdilere \ndayalı olarak anlamlı ve tutarlı yanıtlar üretmek için eğitil -\nmiştir (Brown et al., 2020). Prompt’lar, bu sistemlere belirli \nbir görevi yerine getirme, belirli bir konu hakkında bilgi sağ -\nlama, yaratıcı içerik üretme veya bir metni tamamlama gibi \nçeşitli amaçlarla verilen yönlendirmelerdir.\nPrompt'ların doğru ve etkili kullanımı, yapay zekâ sistem -\nlerinden istenilen çıktıları almak ve modellerin performan -\nsını maksimize etmek açısından kritik bir rol oynamaktadır \n(Liu et al., 2021). Yapay zekâya verilen yönlendirmenin açık, \ntutarlı ve amaca uygun olması, modelin daha doğru, tutarlı \nve bağlama uygun sonuçlar üretmesini sağlar (Reynolds & \nMcDonell, 2021). Öte yandan, yanlış veya eksik formüle edil -\nmiş bir prompt, belirsiz, yetersiz veya yanlış yanıtların ortaya \nçıkmasına neden olabilir.\nYapay zekâyı etkili bir şekilde kullanabilmek için, ona ne \nsormamız gerektiğini ve nasıl bir çerçevede yönlendirme \nyapacağımızı bilmek gerekmektedir. Prompt mühendis -\nliği (prompt engineering), yapay zekâ modellerinin en iyi \nperformansı göstermesi için verilen talimatları tasarlama, \noptimize etme ve ince ayar yapma sürecidir (White et al., \n2023). Bu disiplin, özellikle eğitim, sağlık, iş dünyası, bilimsel \naraştırmalar ve sanat gibi çeşitli alanlarda YZ'nin etkinliğini \nartırma açısından büyük önem taşımaktadır.\nEtkili bir prompt, modelin yanıt üretme sürecini optimize \nederek doğru, bağlamsal ve yaratıcı içerik oluşturmasına \nkatkı sağlar. Örneğin:\nEğitim alanında, öğretmenler yapay zekâyı ders içerikleri \noluşturmak, öğrencilere bireysel geri bildirim vermek veya \nöğrenme materyallerini kişiselleştirmek için kullanabilirler \n(Mollick & Mollick, 2023). İş dünyasında, şirketler müşte -\nri hizmetlerini iyileştirmek, metin analizleri yapmak ve veri \nodaklı karar alma süreçlerini desteklemek için yapay zekâ \nmodellerine başvurmaktadır (Brynjolfsson & McAfee, 2017). \nSağlık sektöründe, tıbbi teşhis ve danışmanlık hizmetle -\nri, büyük veri analizi ve hasta destek sistemleri için yapay \nzekâdan faydalanılmaktadır (Topol, 2019).\n3.2. Yapay Zekâ ve Dil Modelleri\nYapay Zekâ (YZ) dil modelleri, doğal dil işleme (Natural Lan -\nguage Processing -NLP) tekniklerini kullanarak insan dilini \nanlamak, işlemek ve üretmek amacıyla geliştirilen derin öğ -\nrenme tabanlı algoritmalardır. Bu modeller, geniş ölçekli veri \nkümeleri üzerinde eğitilerek dilin gramer yapısını, anlamsal \nilişkilerini ve kelimeler arasındaki bağıntıları öğrenirler (Ju -\nrafsky & Martin, 2021). Son yıllarda, dil modellerinin gelişimi \nözellikle derin öğrenme (deep learning) teknikleri sayesinde \nbüyük bir ivme kazanmıştır (Goodfellow et al., 2016).\nYZ dil modelleri arasında en yaygın kullanılanlardan biri, Ge -\nnerative Pre-trained Transformer (GPT) modelidir. Bu mo -\ndel, transformer mimarisini temel alarak büyük metin veri \nkümeleri üzerinde önceden eğitilir ve belirli görevler için \nözelleştirilebilir (Radford et al., 2019). GPT-4 gibi ileri dü -\nzey dil modelleri, dil tahmini, yaratıcı metin üretimi, diyalog \noluşturma ve dil anlama konularında oldukça başarılıdır. Bu \nmodeller, yalnızca dil üretmekle kalmaz, aynı zamanda dilin \nbağlamsal yapısını kavrayarak kullanıcı girdilerine uygun ya -\nnıtlar üretebilir (OpenAI, 2023).3. TEMEL KAVRAMLAR\n21\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 22, "text": "3.2.1. YZ Dil Modellerinin Uygulama Alanları\nYZ dil modelleri, birçok sektörde otomasyon, içerik üretimi ve \nveri analizi gibi süreçleri iyileştirmek için kullanılmaktadır. En \nyaygın uygulama alanları şunlardır:\nEğitim ve Dil Öğrenimi: Yapay zekâ destekli dil modelleri, kişi -\nselleştirilmiş öğrenme deneyimleri, metin tabanlı geri bildirim \nsistemleri ve çeviri uygulamaları gibi alanlarda kullanılarak dil \neğitimi süreçlerini destekler (Mollick & Mollick, 2023).\nMüşteri Hizmetleri: Chatbotlar ve sanal asistanlar, müşteri \ntaleplerine hızlı ve etkili yanıtlar vermek için NLP tabanlı mo -\ndelleri kullanmaktadır (Shum et al., 2018).\nİçerik Üretimi: Gazetecilikten pazarlamaya kadar birçok alanda, \ndil modelleri blog yazıları, reklam metinleri ve otomatik raporlar \noluşturmak için kullanılmaktadır (Zhang et al., 2022).\nMetin Analizi ve Otomatik Özetleme: Büyük hacimli metinler -\nden anlamlı bilgileri çıkarmak ve özetlemek için dil modelleri \nönemli bir araçtır (See et al., 2017).\nDil Çevirisi: Yapay zekâ tabanlı çeviri sistemleri, diller arası \nmetin dönüşümlerinde büyük bir doğruluk oranına ulaşmıştır \n(Johnson et al., 2017).\n3.2.2. YZ Dil Modellerinin Sınırlılıkları ve  \nEtik Sorunlar\nYZ dil modelleri, insan dilini anlama ve üretme konusunda \nönemli ilerlemeler kaydetmiş olsa da bazı etik ve teknik sı -\nnırlılıklar barındırmaktadır:\nÖnyargı (Bias) Sorunu: Modeller, eğitim verilerindeki önyar -\ngıları öğrenebilir ve bunları ürettiği metinlere yansıtabilir. Bu \ndurum, toplumsal cinsiyet, ırk ve kültürel önyargıların yapay \nzekâ sistemlerinde yeniden üretilmesine neden olabilir (Bender \net al., 2021).Yanlış Bilgi Üretimi: Dil modelleri, gerçeğe dayanmayan veya \ndoğrulanmamış bilgiler üretebilir. Bu durum, özellikle haber \nüretimi ve akademik alanlarda ciddi sorunlara yol açabilir \n(McGuffie & Newhouse, 2020).\nGüvenlik ve Mahremiyet Endişeleri: Yapay zekâ tabanlı dil \nmodelleri, kullanıcıların kişisel verilerini işleyebilir ve mahre -\nmiyetle ilgili riskler oluşturabilir. Bu nedenle, etik ve güvenlik \nilkeleri dikkate alınarak kullanılması gerekmektedir (Brundage \net al., 2022).\n3.2.3. YZ Dil Modellerinin Geleceği\nDil modellerinin geleceği, daha güvenilir, etik ve özelleştiri -\nlebilir sistemlerin geliştirilmesine odaklanmaktadır. Özellikle \naçıklanabilir yapay zekâ (Explainable AI - XAI) yaklaşımları, \nmodellerin karar alma süreçlerini daha şeffaf hâle getirmeyi \namaçlamaktadır (Doshi-Velez & Kim, 2017). Ayrıca, çok dilli \nmodellerin geliştirilmesi, yapay zekâ tabanlı çeviri ve dil anla -\nyışını daha kapsayıcı hâle getirecektir (Conneau et al., 2020).\nYZ dil modellerinin hızla gelişen doğası, eğitimden iş dünyasına, \nsağlıktan medya sektörüne kadar birçok alanı dönüştürme \npotansiyeline sahiptir. Ancak, bu modellerin etik, güvenilir ve \ninsan merkezli şekilde geliştirilmesi, yapay zekâdan en verimli \nşekilde yararlanabilmek için kritik bir gerekliliktir.\n3.2.4. Dil Modellerinin Eğitimde Kullanımı\nGünümüz eğitim sisteminde yapay zekâ tabanlı dil modelleri, \nöğrenme süreçlerini destekleyerek öğrencilere ve öğretmenlere \nyeni fırsatlar sunmaktadır. Bu modeller, metin analizi, yazılı \ngeri bildirim sağlama, dil öğrenme süreçlerini kişiselleştirme \nve öğretim materyallerinin adaptasyonu gibi birçok alanda \nkullanılmaktadır (Luckin et al., 2018). Öğrenci merkezli öğren -\nme yaklaşımlarının yaygınlaşmasıyla, yapay zekâ destekli dil \nmodellerinin sunduğu kişiselleştirilmiş eğitim içerikleri, bireysel \nöğrenme hızlarına ve ihtiyaçlarına göre özelleştirilebilmektedir \n(Holmes et al., 2021).\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n22"}, {"page": 23, "text": "a. Dil modellerinin eğitimdeki kullanımları aşağıdaki temel alanlarda yoğunlaşmaktadır\n ¬ Metin Analizi ve Yazılı Çalışmaların Değerlendirilmesi: Öğrencilerin yazılı içeriklerini analiz ederek dil bilgisi, sözdizimi ve \niçerik açısından otomatik geri bildirim sağlayan sistemler, yazma becerilerini geliştirmede etkili rol oynamaktadır (Zhao \n& Chen, 2021).\n ¬ Kişiselleştirilmiş Öğrenme: Öğrencilerin bireysel öğrenme süreçlerine uygun materyallerin üretilmesi, özelleştirilmiş eğitim \nprogramları oluşturulmasına katkı sağlamaktadır (Chien et al., 2022).\n ¬ Yabancı Dil Eğitimi: Yapay zekâ tabanlı dil modelleri, otomatik dil bilgisi düzeltme, anlam analizi ve metin çevirisi gibi uy -\ngulamalarla yabancı dil öğrenme süreçlerini desteklemektedir (Heil et al., 2020).\n ¬ Öğretmenlerin İş Yükünün Azaltılması: Rutin akademik değerlendirmeleri üstlenen dil modelleri, öğretmenlerin daha yaratıcı \nve pedagojik odaklı etkinliklere zaman ayırmalarına olanak tanımaktadır (Mollick & Mollick, 2023).\nb. Dil Öğrenimi ve Yapay Zekâ Destekli Geri Bildirim Mekanizmaları\n ¬ Araştırmalar, dil modellerinin dil öğrenimi üzerindeki etkisini giderek daha fazla ortaya koymaktadır. Chien ve diğerleri \n(2022), yapay zekâ destekli dil modellerinin, öğrencilerin yabancı dilde yazma becerilerini geliştirmelerine yardımcı ol -\nduğunu belirtmektedir. Zhao ve Chen (2021) ise bu modellerin, dil öğrenicilerinin dilbilgisel hatalarını fark etmelerini ve \ndüzeltmelerini sağladığını, böylece daha derin bir dil bilinci geliştirdiklerini vurgulamaktadır. Wang ve diğerleri (2020), dil \nmodellerinin adaptif öğrenme sistemlerinde kullanılarak öğrencilere anlık ve kişiselleştirilmiş geri bildirim sunabileceğini \ngöstermektedir.\nc. Etik, Güvenlik ve Sürdürülebilir Kullanım\n ¬ Dil modellerinin eğitimde geniş çaplı kullanımı, önemli fırsatlar sunduğu kadar bazı etik ve güvenlik sorunlarını da berabe -\nrinde getirmektedir. Öğrenci verilerinin gizliliği, yapay zekâ sistemlerinin tarafsızlığı ve olası önyargılar, dikkatle ele alınması \ngereken temel konular arasındadır (Bender et al., 2021). Eğitim sistemlerinde adil, şeffaf ve güvenilir yapay zekâ araçlarının \nkullanımı, dijitalleşen öğrenme ortamlarında sürdürülebilir bir yapının oluşturulmasını sağlayacaktır.\n23\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 24, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ24"}, {"page": 25, "text": "Yapay zekâ araçlarından etkili biçimde yararlanabilmenin temel koşullarından biri, doğru ve amaca uygun “prompt”lar yani \nistemler yazabilmektir. Bu bölümde, öğretmenlerin, öğrencilerin ve eğitim alanındaki diğer paydaşların yapay zekâ destekli \nsistemleri daha verimli kullanabilmeleri için temel prompt yazma teknikleri ele alınacaktır. Ayrıca, eğitim bağlamında farklı \nbranşlar ve düzeylerde örnek uygulamalara da yer verilerek bu tekniklerin pratikte nasıl kullanılabileceği gösterilecektir.\nBölüm boyunca sade, anlaşılır ve uygulanabilir formüllerle yapılandırılmış istem örnekleri paylaşılacak; hem teorik bir çerçe -\nve hem de doğrudan sınıf içinde kullanılabilecek gerçekçi örnekler sunulacaktır. Böylece öğretmenler sadece hazır içerikler \nüretmekle kalmayacak, aynı zamanda kendi öğretim süreçlerine entegre edebilecekleri yaratıcı ve etkili istemler geliştirme \nbecerisi de kazanacaklardır.\n4.1. Prompt Yazma Teknikleri\n4.1.1. İyi Bir Promptun Özellikleri\nİyi bir prompt, yapay zekâ sistemlerinin istenilen sonuçları \netkili bir şekilde üretmesini sağlayan kritik bir unsurdur. İşte \niyi bir promptun temel özellikleri ve her bir özellik için örnek \nprompt'lar:\nAçıklık ve Netlik\n ¬ Özellik: İyi bir prompt, açık ve net olmalıdır. Belirsiz veya \nkarmaşık ifadeler, yapay zekânın doğru yanıtlar üretmesini \nzorlaştırabilir. Belirsiz veya çok genel ifadeler kullanmaktan \nkaçının. Örneğin, Bir fen dersi planı hazırla.\" yerine, \"7. \nsınıf öğrencileri için ısı transferi konusunda, 40 dakikalık \nbir fen dersi planı hazırla. Plan deney ve görsel materyal \niçermeli.\" gibi ayrıntılı bir ifade kullanın.\n ¬ Örnek Prompt: \"Elmanın sağlığa faydalarını 5 madde ile \naçıkla.\"\nAmaca Yöneliklik\n ¬ Özellik: Prompt'lar, belirli bir amaca yönelik olmalıdır. Yapay \nzekâdan ne istenildiği açıkça belirtilmelidir. Promptun hangi \nsorunu çözmesi veya hangi bilgiyi üretmesi gerektiğini açıkça \nbelirtin. Örnek: \"Yapay zekâ araçlarının eğitimde kullanımına \ndair bir rapor oluştur.\" ¬ Örnek Prompt: \"Ortaokul matematik dersinde kullanılacak \nbir problem yaz ve çöz.\"\nKapsam ve Bağlam\n ¬ Özellik: Prompt'lar, yapay zekânın doğru ve bağlamsal \nolarak uygun yanıtlar verebilmesi için yeterli bilgi içermelidir. \nAçık, net ve detaylı prompt'lar daha isabetli sonuçlar üretir.\n ¬ Örnek Prompt: \"Bir çiftçinin 20 tavuk ve 15 koyunu var. \nToplamda kaç hayvanı var?\"\nYinelenebilirlik\n ¬ Özellik: İyi tasarlanmış prompt'lar, farklı durumlarda ve \nkullanıcılar tarafından kullanıldığında benzer sonuçlar üretir. \nİlk denemede mükemmel bir sonuç almanız gerekmez. \nPromptunuzu değiştirerek ve iyileştirerek istediğiniz sonucu \nelde etmek için deneme yanılma yöntemini kullanabilirsiniz.\n ¬ Örnek Prompt: \"Güneş sistemindeki gezegenlerin adlarını \nve her birinin bir özelliğini listele.\"4.PROMPT YAZMA TEKNİKLERİ VE ÖRNEK UYGULAMALAR\n25\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 26, "text": "Doğru ve Amaca Uygun Anahtar Kelimeler\n ¬ Özellik: Prompt'lar, yapay zekânın anlamasını kolaylaştıra -\ncak doğru ve amaca uygun anahtar kelimeler içermelidir.\n ¬ Örnek Prompt: \"Yapay zekâ ile doğal dil işleme arasındaki \nfarkı açıkla.\"\nUyarlanabilirlik\n ¬ Özellik: İyi bir prompt, değişen gereksinimlere ve farklı \nsenaryolara uyarlanabilir olmalıdır.\n ¬ Örnek Prompt: \"Bir şirketin pazarlama stratejisini oluştu -\nrurken dikkat edilmesi gereken üç ana faktörü açıklayın.\"Kullanıcı Dostu Dil\n ¬ Özellik: Prompt'lar, karmaşık teknik terimler yerine kul -\nlanıcı dostu bir dil kullanmalıdır. Bu, kullanıcıların yapay \nzekâ sistemleriyle daha rahat etkileşim kurmasını sağlar.\n ¬ Örnek Prompt: \"Bir öğrenciye basitçe nasıl kesirlerle top -\nlama işlemi yapılacağını açıkla.\"\nEsneklik\n ¬ Özellik: Prompt'lar, belirli yanıtlar yerine esnek yanıtlar \nüretebilecek şekilde tasarlanmalıdır. Bu, yapay zekânın \nyaratıcılığını ve problem çözme yeteneğini artırır.\n ¬ Örnek Prompt: \"Bir uzay macerası hikâyesi başlat ve kah -\nramanın Mars'a nasıl ulaştığını anlat.\"\nBu özellikler ve örnek prompt'lar, yapay zekâ sistemlerinden \nen iyi şekilde yararlanmayı sağlar. Doğru ve etkili prompt'lar, \nyapay zekâ uygulamalarının doğruluğunu, verimliliğini ve kul -\nlanıcı memnuniyetini artırır.\nAçık ve Net Olun\nNe istediğinizi mümkün olduğunca \naçık ve net bir şekilde ifade edin. \nBelirsiz veya çok genel ifadeler \nkullanmaktan kaçınının. Örneğin,\nDetaylı Olun\nPromptunuzda ne tür bir çıktı \nbeklediğinizi belirtin. Örneğin, “Bir \nşiir yaz” yerine “Üzüntü temalı bir \nhaiku yaz” demek daha detaylı bir \npromp olacaktır.\nÖrnekler Verin\nYapay zekâya ne tür bir çıktı \nisdiğinizi göstermek için örnekler \nverebilirsiniz. Örneğin, “Shakespeare \ntarzında bir sone yaz” diyerek yapay \nzekâya ne tür bir dil ve yapı \nbeklediğiniz belirtebilirsiniz. \nSınırlamalar Koyun\nYapay Zekânın üreteceği içeriği \nsınırlamak için bazı kısıtlamalar \nkoyabilirsiniz. Örneğin, “100 kelimeyi \ngeçmeyecek bir makale yaz”Hedef Kitleyi Belirtin\nÇıktının kimler için oluşturulacağını \ntanımlayın. Bu dil tonunun ve \niçeriğin hedef kitlenize uygun \nolmasını sağlar.Yinelemeli Bir Süreç Olarak Düşünün / \nFarklı Açılar Deneyin\nAynı şeyi ifade etmek için farklı kelimeler veya cümle \nyapılarını deneyerek daha iyi sonuçlar elde edebilirsiniz. \nİlk denemede mükemmel bir sonuç almanız gerekmez. \nPromptunuzu değiştirerek ve iyileştirerek istediğiniz \nsonucu elde etmek için deneme yanılma yöntemini \nkullanabilirsiniz.\nDetaylı Sorular Sorun\nYapay zekânın daha spesiﬁk yanıtlar verebilmesi için detaylı \nve ilgili sorular ekleyin. Örnek: “ Yapay zekânın sağlık \nsktöründeki etik sorlukları nelerdir? Bu konuda nasıl \nçözümler sunulabilir?”Yapı ve Format Talep Edin\nÇıktının hangi yapıda olacağını \nbelirtmek sonuçları daha kullanışlı \nhale getirir. Örnek: “Bir giriş, 3 ana \nbaşlık ve bir sonuç bölümü içeren \nbir blog yazısı oluştur.”\nÖrnek veya Model Sunum\nBeklentilerinizi açıklamak için \nörnekler eklemek yapay zekânın \ndoğru yönde yanıt vermesini sağlar. \nÖrnek: “Bu makale, [bilimsel bir \nmakale] formatında yazılsın.”\nTest ve İyileştirme\nElde edilen yanıtı değerlendirip \ngerekirse prompt’u revize ederek \ndaha iyi sonuçlar alın.Etkili Prompt\nYazmanın\nPüf Noktaları\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n26"}, {"page": 27, "text": "SSahneyi Kur\nChatbot’a hangi rolü \nüstlenmesini istediğini \nsöyle, böylece sana daha \niyi ve odaklı bir cevap \nverebilir. Örnek: “Sen bir \nShakespeare uzmanısın ve \nlise öğrencilerinin ders \nçalışmalarına çok iyi \nyardımcı oluyorsun...”\nSDili Basitleştir \nChatbotlar en iyi basit bir \ndille çalışır, bu yüzden \nkarmaşık cümleler \nkurmamaya dikkat et.\nÖrnek: “Pisagor Teoremini \n5. sınıf öğrencisiyim gibi \naçıkla...”SYapıyı Belirt\nChatbot’a cevabı nasıl \nyapılandırmasını istediğini \nsöyle. Madde işaretleri, \ntablo biçimi ya da emoji \ngibi ögeleri kullanmasını \nisteyebilirsin. Örnek: \n“Benim için çoktan seçmeli \nve açık uçlu sorulardan \noluşan bir quiz oluştur...”\nSSpesiﬁk Ol\nTalimatlarında net ol. \nChatbot’tan ne istediğini \naçıkça tanımla ve önemli \nayrıntılar ver.\nÖrnek: “9. sınıf öğrencisi \niçin geri dönüşümle ilgili \nbeş tartışma konusu \noluştur...”PROMPT\nÇERÇEVESİ:\nBEŞ “S” MODELİ\nGeri Bildirim Ver \nChatbot ilk seferde doğru \nyapamayabilir, bu yüzden \nsohbet süresince geri \nbildirim ver.\nÖrnek: “Quiz’in formatını \nçalışma kılavuzu ve ﬂash \nkartlara çevir...”S\nPROMPT ÇERÇEVESİ: BEŞ \"S\" MODELİ\nS — Sahneyi Kur (Set the Scene)\nChatbot’a hangi rolü üstlenmesini istediğini söyle, böylece \nsana daha iyi ve odaklı bir cevap verebilir.\nÖrnek: “Sen bir Shakespeare uzmanısın ve lise öğrencilerinin \nders çalışmalarına çok iyi yardımcı oluyorsun...”\nS — Spesifik Ol (Be Specific)\nTalimatlarında net ol. Chatbot’tan ne istediğini açıkça tanımla \nve önemli ayrıntılar ver.\nÖrnek:  “9. sınıf öğrencisi için geri dönüşümle ilgili beş tartışma \nkonusu oluştur...”\nS — Dili Basitleştir (Simplify Your Language)\nChatbotlar en iyi basit bir dille çalışır, bu yüzden karmaşık \ncümleler kurmamaya dikkat et.Örnek: “Pisagor Teoremini 5. sınıf öğrencisiyim gibi açıkla...”\nS — Yapıyı Belirt (Structure the Output)\nChatbot’a cevabı nasıl yapılandırmasını istediğini söyle. Madde \nişaretleri, tablo biçimi ya da emoji gibi ögeleri kullanmasını \nisteyebilirsin.\nÖrnek: “Benim için çoktan seçmeli ve açık uçlu sorulardan \noluşan bir quiz oluştur...”\nS — Geri Bildirim Ver (Share Feedback)\nChatbot ilk seferde doğru yapamayabilir, bu yüzden sohbet \nsüresince geri bildirim ver.\nÖrnek: “Quiz’in formatını çalışma kılavuzu ve flash kartlara \nçevir...”Kaynak: https://meb.ai/dH6hLm\n27\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 28, "text": "4.1.2. Prompt Mühendisliği İçin Temel Formüller \nYapay zekâ tabanlı dil modellerinden daha doğru, tutarlı ve bağlamsal olarak uygun yanıtlar alabilmek için prompt mühendisliği \n(prompt engineering) büyük önem taşımaktadır. Prompt mühendisliği, dil modellerine verilen komutların daha spesifik, açık \nve amaca uygun şekilde yapılandırılmasını sağlayan bir tekniktir (Reynolds & McDonell, 2021). Belirsiz ve genel ifadeler içeren \nprompt’lar, modelin çıktısını da genel ve bağlamdan uzak hâle getirebilir. Bunun aksine, iyi tasarlanmış bir prompt, modelin \nistenilen bilgiyi daha kesin ve güvenilir bir şekilde sunmasını sağlar (Liu et al., 2021).\nBu bölümde, yapay zekâ ile etkileşimi optimize etmek ve etkili prompt’lar oluşturmak için kullanılan bazı temel formüller pay -\nlaşılacaktır. Bu formülasyonlara uygun şekilde hazırlanan prompt’lar, modelden daha yüksek doğrulukta ve bağlama uygun \nyanıtlar alınmasını sağlar.\nAşağıda, farklı bağlamlarda etkili prompt’lar oluşturmak için temel formülasyonlar paylaşılmıştır. Bu formüllerde bazı adımlar \nzorunlu, bazıları ise opsiyonel olup, kullanım bağlamına göre esneklik sağlanabilir.\nDoğru Prompt Yazımı için 5S Modeli:\n ¬ Sahneyi hazırla (Bağlam).\n ¬ Spesifik ol (Detay).\n ¬ Basit dil kullan (Netlik).\n ¬ Çıktıyı yapılandır (Format).\n ¬ Geri bildirim ver (Revizyon).\n4.1.2.1. Temel Prompting Adımları\nPrompting, yapay zekâ modellerinin etkili ve doğru yanıtlar \nvermesini sağlamak için belirli adımlarla yapılandırılır. İşte \ntemel prompting adımları:\n ¬ Bağlam (Context) Belirleme:\nPromptun genel arka planını, kullanıcının ihtiyaçlarını ve ama -\ncını tanımlamak doğru ve bağlamsal yanıtlar almak için kritik \nbir adımdır. Gerekli bilgiyi sağlamak, modelin soruyu daha iyi \nanlamasına ve uygun yanıtlar üretmesine yardımcı olur. Bağlam,  \nkonunun kapsamını belirler ve modelin hangi bilgileri dikkate \nalması gerektiğini açıkça ifade eder.\nÖrnek\nPrompt: \"Bir 7. sınıf öğrencisine matematik öğretmek için \nbilgi ver.\"Bağlam: 8. sınıf öğrencileri enerji kaynakları konusunu öğren -\nmektedir. Dersin temel amacı, yenilenebilir enerji kaynakları \nile fosil yakıtlar arasındaki farkları kavratmak ve bu iki enerji \ntürünün avantajlarını ve dezavantajlarını açıklamaktır. Öğrenciler \ntemel bilgilere sahip olmakla birlikte, detaylara hâkim değillerdir. \nBu nedenle, yenilenebilir ve fosil yakıtları karşılaştıran, anlaşılır \nve eğitici bir açıklamaya ihtiyaç duyulmaktadır.\n ¬ Görev (Task) Tanımlama:\nGörev tanımlama, yapay zekâya belirli bir amacı gerçekleştir -\nmesi için verilen talimatların net, anlaşılır ve hedef odaklı bir \nşekilde belirlenmesini sağlar. Modelin ne yapması gerektiği \naçıkça ifade edilmeli ve görev, belirsizlikten uzak, ölçülebilir ve \nuygulanabilir olmalıdır. Doğru tanımlanmış bir görev, modelin \nistenilen amaca ulaşmasını ve doğru sonuçlar üretmesini sağlar.\nÖrnekler\nPrompt: \"Kesirlerle toplama işlemini adım adım açıkla.\"\nGörev Tanımı:  7. sınıf öğrencileri için su döngüsünü basit ve anlaşılır \nbir dille açıklayan bir ders metni yazılması gerekmektedir. Metin, \nsu döngüsünün aşamalarını kısa, net ve öğrenci seviyesine uygun \ncümlelerle anlatmalıdır. Ayrıca, görselle desteklenebilir olması için \naşamaların sırasına dikkat edilmeli ve kavramlar açık bir şekilde \ntanımlanmalıdır.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n28"}, {"page": 29, "text": "Çıktılar:\n ¬ Kısıtlamaları (Constraints) Belirleme:\nKısıtlamalar, istenilen sonuçları elde etmek için modelin çalışma \nalanını sınırlandıran kurallardır. Görevin kapsamını belirlemek, \nmodelin hangi bilgilere dayanarak yanıt vermesi gerektiğini, \nhangi konuları ele alıp hangilerinden kaçınması gerektiğini ve \nyanıtın hangi formatta olması gerektiğini netleştirir. Bu, modelin \ndaha kontrollü ve hedefe yönelik çıktılar üretmesini sağlar.\nÖrnekler\nPrompt: \"Her adımı iki cümleyle açıklayın ve basit, anlaşılır \nbir dil kullanın.\"\nKısıtlama: Yanıt ortaokul seviyesinde olmalı, karmaşık terim -\nlerden kaçınılmalı ve bilgiler öğrenci seviyesine uygun olacak \nşekilde sadeleştirilmelidir.\nPrompt: \"İlkokul 4. sınıf öğrencilerine güneş sistemi hakkında \nkısa bir açıklama yap.\"\nKısıtlama: Sadece Güneş ve dört iç gezegen (Merkür, Venüs, \nDünya, Mars) hakkında bilgi verilmeli, diğer gezegenler hakkında \ndetaylara girilmemelidir. Açıklamalar kısa ve anlaşılır olmalıdır.\nBu şekilde kısıtlamalar belirlenerek yanıtların daha net, odak -\nlanmış ve amaca uygun olması sağlanır. ¬ Örnek (Examplar) Sağlama:\nÖrnek sağlama, modelin nasıl bir yanıt vermesi gerektiğini \nnetleştirmek için kullanılan bir yönlendirme tekniğidir. İyi ya -\npılandırılmış bir örnek, modelin istenilen format, içerik ve stil \ndoğrultusunda yanıt üretmesini sağlar. Örnekler, yanıtın dil \nseviyesi, uzunluğu, konu kapsamı ve formatı gibi unsurları \nnetleştirerek daha tutarlı ve hedef odaklı sonuçlar alınmasına \nyardımcı olur.\nÖrnekler\nPrompt: \"Marmara Bölgesi, iklimi çeşitlilik gösteren bir bölgedir \nve İstanbul gibi önemli şehirlere ev sahipliği yapar.\"\nÖrnek Sağlama: Modelin Marmara Bölgesi’ni tanıtırken böl -\ngenin iklim çeşitliliğini vurgulaması ve önemli şehirlerinden \nbahsetmesi gerektiği belirtilmiştir. Bu sayede, modelin doğ -\nrudan istenen şekilde bir açıklama sunması sağlanır.\nPrompt: \"Lise düzeyindeki öğrenciler için bir biyoloji testi ha -\nzırlamak istiyorum. 5 adet çoktan seçmeli soru olmalı ve her \nsoru hücre bölünmesi ile ilgili olmalıdır.\"\nÖrnek Sağlama:\n »Soru Formatı: Çoktan seçmeli, dört şıklı.\n »Konu Kapsamı: Hücre bölünmesi ile ilgili olmalı.\n »Dil Seviyesi: Lise öğrencilerine uygun olmalı.Gemini\n ChatGPT\n Perplexity AI\n29\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 30, "text": "Örnek Soru: Hücre bölünmesinin mitoz evresinde hangi olay \ngerçekleşir?\na) Kromozom sayısı yarıya iner\nb) Hücre ikiye bölünür\nc) DNA iki katına çıkar\nd) Hücre zarı çözülür\nFaydası: Bu örnek sayesinde model, soruların formatı, konu \nkapsamı ve dil seviyesi hakkında daha iyi yönlendirilmiş olur \nve çıktının istenilen yapıda olmasını sağlar.\nÖzetle, örnek sağlama, modelin istenen bağlamda, doğru for -\nmatta ve belirlenen kriterlere uygun şekilde yanıt vermesini \nsağlamak için kritik bir adımdır.\n ¬ Kişilik (Persona) Tanımlama:\nModelin hangi rol veya karakterde davranması gerektiğini be -\nlirtir. Kişilik tanımlama, yapay zekânın vereceği yanıtın tonunu, \nyaklaşımını veya perspektifini belirler. Kişilik tanımlama, yapay \nzekânın belirli bir rol veya karaktere bürünmesini sağlayarak \nyanıtın tonunu, yaklaşımını ve perspektifini belirler. Bu teknik, \nmodelin hitap ettiği kitleye uygun bir üslup kullanmasını ve \niçeriğin bağlama daha iyi oturmasını sağlar. Öğretmen, aka -\ndemisyen, gazeteci, pazarlamacı veya bir danışman gibi farklı \nrollere bürünen model, belirlenen persona doğrultusunda yanıt \nverir. \"Yapay zekâyı öğretmen/uzman rolüne sokmak, daha \nanlaşılır yanıtlar almanızı sağlar.\"\nÖrnekler\nPrompt: \"Bir coğrafya öğretmeni olarak davran.\"\nBağlam: 6. sınıf öğrencileri için bir yazılı sınav hazırlanıyor.\nGörev: Sorular hem öğretici hem de eğlenceli olmalı.\nKısıtlama: Sorular çok zor olmamalı, öğrencileri motive edici \nbir dille yazılmalıdır.\nPersona: Soruları hazırlarken, motive edici ve arkadaşça bir \nüslup kullan.Örnek Uygulama:\nSoru 1: Dünya’nın katmanları nelerdir? Her bir katmanın \nözelliklerinden birini açıklayarak yazınız. (Öğrencinin dü -\nşünmesini teşvik eden açık uçlu bir soru)\nSoru 2: Dağlar nasıl oluşur? Bir örnek vererek açıklayın. \n(Gerçek hayattan bağlantı kurarak öğrenmeyi destek -\nleyen soru)\nSoru 3: İklim ve hava durumu arasındaki farkı basit bir \nşekilde açıklayın. (Öğrencinin günlük yaşamla ilişkilen -\ndirmesini sağlayan soru)\nFaydası:\n ¬ Modelin üslubu ve yaklaşımı netleşir (Resmî, akademik, \nmotive edici vb.).\n ¬ Hedef kitleye uygun içerik üretilir (Öğrenciler, akademis -\nyenler, iş dünyası vb.).\n ¬ Yanıtların daha etkili ve bağlamla uyumlu olması sağlanır.\nSonuç olarak, kişilik tanımlama, modelin belirli bir perspektifle \nyanıt vermesini sağladığı için içerik üretiminde önemli bir rol \noynar. Bu teknik, öğretim materyallerinden müşteri hizmet -\nlerine, yaratıcı yazarlık projelerinden profesyonel danışman -\nlıklara kadar birçok alanda daha tutarlı ve hedef odaklı çıktılar \nüretmeye yardımcı olur.\n ¬ Format (Format) Belirleme:\nYanıtın nasıl bir yapıda olması gerektiğini açıklar. Format belir -\nleme, modelin yanıtı nasıl yapılandıracağını açıkça tanımlayan \nbir tekniktir. Bu, modelin paragraf, madde listesi, tablo veya \nbelirli bir metin formatında yanıt üretmesini sağlar. Belirsiz \nbir format talebi modelin rastgele bir yapı kullanmasına yol \naçabilirken, açıkça belirtilmiş bir format talebi daha düzenli, \nokunaklı ve amaç odaklı bir yanıt sağlar.\nÖrnekler\nPrompt: \"Cevabı madde işaretli liste halinde ver.\"\nGörev: 8. sınıf öğrencileri için hazırlanan bir ders notunda, enerji \ntürleri maddeler halinde sıralanmalı ve her maddenin altında \nkısa bir açıklama verilmelidir.\nFormat: Madde listesi şeklinde olmalı.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n30"}, {"page": 31, "text": "Örnek Sağlama:\nYanıt – Madde Listesi Formatında\n ¬ Güneş Enerjisi: Güneş ışığından elde edilen yenilenebilir \nbir enerji türüdür. Özellikle güneş panelleri kullanılarak \nelektrik üretiminde kullanılır.\n ¬ Rüzgâr Enerjisi: Rüzgâr türbinleri aracılığıyla rüzgârın ki -\nnetik enerjisinden elektrik üretilir. Yenilenebilir ve çevre \ndostu bir enerji kaynağıdır.\n ¬ Hidroelektrik Enerji: Akarsu ve nehirlerin gücü kullanılarak \nelektrik üretimi gerçekleştirilir. Barajlar aracılığıyla suyun \npotansiyel enerjisi elektriğe dönüştürülür.\nAlternatif Format Örnekleri\nTablo Formatı:\nFormat: Yanıt bir tablo halinde verilmelidir.\nÖrnek:\nEnerji Türü Açıklama\nGüneş EnerjisiGüneş ışığını kullanarak elektrik \nüreten yenilenebilir bir enerji türüdür.\nRüzgâr EnerjisiRüzgâr türbinleri aracılığıyla kinetik \nenerjiyi elektriğe çevirir.\nHidroelektrik \nEnerjiSu gücünden elde edilen enerji \ntürüdür, genellikle barajlarda üretilir.\n \nParagraf Formatı:\nFormat: Yanıt uzun bir açıklama içeren bir paragraf şeklinde \nverilmelidir.\nÖrnek:\n\"Güneş enerjisi, güneş ışığını kullanarak elektrik üreten ye -\nnilenebilir bir enerji kaynağıdır. Rüzgâr enerjisi ise, rüzgârın \nkinetik enerjisinden elektrik üretmek için rüzgâr türbinlerini \nkullanır. Bir diğer yenilenebilir enerji türü olan hidroelektrik \nenerji, akarsuların gücünden faydalanarak elektrik üretir ve \ngenellikle baraj sistemleri ile gerçekleştirilir.\"Faydası:\n »Yanıtın daha yapılandırılmış olmasını sağlar.\n »İçeriğin okunabilirliğini artırır.\n »Amaca uygun bir çıktı formatı elde edilir.\nSonuç olarak, format belirleme, modelin istenilen çıktı yapısı -\nna göre yanıt vermesini sağlayan kritik bir adımdır. Bu teknik, \neğitim içeriklerinden akademik raporlara, iş dünyasındaki \ndokümanlardan yaratıcı içeriklere kadar geniş bir kullanım \nalanına sahiptir.\n ¬ Ton (Tone) Belirleme:\nTon belirleme, yapay zekânın yanıt verirken kullanacağı üs -\nlubu ve ses tonunu tanımlayan bir tekniktir. Yanıtın ciddiyeti, \nresmiyeti veya samimiyeti, hitap edilen kitlenin yaşına, eğitim \nseviyesine ve bağlamına uygun olmalıdır. Örneğin, bir akademik \nmakale için resmi bir ton kullanılırken, bir çocuk kitabı için \ndaha eğlenceli ve sıcak bir üslup tercih edilir.\nÖrnekler\nPrompt: \"Dostane ve öğretici bir tonda yaz.\"\nBağlam: 9. sınıf öğrencilerine yönelik bir fizik ders notu ha -\nzırlanıyor.\nGörev: Öğrencilerin ilgisini çekecek şekilde, samimi bir dille \nNewton'un 1. yasasını açıklayan bir paragraf yaz.\nTon: Resmi olmayan, arkadaşça bir ton kullan.\nÖrnek Uygulama:\n\"Newton’un 1. hareket yasasını anlamak için bir düşünelim! \nDiyelim ki bir kaykayın üzerindesin ve seni kimse itip çekmi -\nyor—kaykay aynı hızda ve aynı yönde gitmeye devam eder, değil \nmi? İşte bu, Newton’un “Eylemsizlik Yasası” olarak adlandırdığı \nkuraldır: Bir cisim, dışarıdan bir kuvvet uygulanmadıkça, aynı \nhareketine devam eder. Kısacası, itilen gider, durdurulan durur!\"\n31\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 32, "text": "Alternatif Ton Örnekleri:\nResmî ve Akademik Ton: \"Newton’un 1. hareket yasası, bir \ncismin dışarıdan bir kuvvet uygulanmadığı sürece mevcut \nhareket durumunu koruyacağını belirtir. Bu ilke, eylemsizlik \nolarak adlandırılır ve mekanik sistemlerde temel bir kavramdır.\"\nBasit ve Eğlenceli Ton: \"Bir basketbol topunu düşün! Eğer yu -\nvarlarsan, yere sürtünme olmazsa sonsuza kadar yuvarlanırdı. \nİşte bu, Newton’un 'Eylemsizlik Yasası'! Yani, hareket eden \nbir şey, bir kuvvet uygulanmadıkça hareketine devam eder!\"\nÖrnek Prompt Uygulaması\nBileşen Açıklama\nContext\n(Bağlam)\"Bir 7. sınıf öğrencisine matematik \nöğretmek için bilgi ver.\"\nTask (Görev)\"Kesirlerle toplama işlemini adım \nadım açıkla.\"\nConstraints \n(Kısıtlamalar)\"Her adımı iki cümleyle açıklayın ve \nbasit, anlaşılır bir dil kullanın.\"\nExemplar\n(Örnek Sağlama)\"Marmara Bölgesi, iklimi çeşitlilik \ngösteren bir bölgedir ve İstanbul gibi \nönemli şehirlere ev sahipliği yapar.\"\nPersona\n(Kişilik)\"Bir matematik öğretmeni olarak \ndavran.\"\nFormat (Yanıt \nFormatı)“Cevabı madde işaretli liste halinde \nver.\"\nTone (Ton)\"Kesirlerle toplama işlemini adım \nadım açıkla.\"\nÖrnek Yanıt:\n ¬ Adım 1: Kesirleri toplamak için ilk olarak paydaları eşit -\nlemelisin. Eğer paydalar zaten eşitse, doğrudan payları \ntoplayabilirsin.\n ¬ Adım 2: Eğer paydalar farklıysa, her iki kesri ortak bir \npaydada buluşturmalısın. Örneğin, 1/4 + 1/6 işlemini \nyaparken, paydaları 12’de eşitleyip 3/12 + 2/12 = 5/12 \nsonucunu bulabilirsin. ¬ Adım 3: Paydalar eşitlendiğinde, payları topla ve sonucu \nsadeleştir. Mesela, 6/12 yerine 1/2 yazabilirsin çünkü 6 \nve 12, 6’ya bölünebilir.\n ¬ Adım 4: İşte bu kadar! Eğer pratik yapmak istersen, 1/3 \n+ 1/5 işlemini yapmayı dene!\nFaydası:\n »Hedef kitleye uygun bir üslup belirlenmiş olur (Örne -\nğin, öğrenciler için eğlenceli, akademik çalışmalar için \nresmi).\n »İçeriğin samimiyeti veya ciddiyeti kontrol edilir.\n »Öğrenme sürecini daha etkili ve akıcı hâle getirir.\nSonuç olarak, ton belirleme, yapay zekâdan alınan yanıtların \nbağlamla uyumlu olmasını sağlayan kritik bir adımdır. Doğru \nton kullanımı, hedef kitleyle etkili iletişim kurulmasını sağlar \nve içeriğin amacına uygun hâle gelmesine yardımcı olur.\n4.1.2.2. Prompt Formülleri\nÜretken yapay zekâ araçlarından etkili, doğru ve pedagojik \naçıdan işlevsel çıktılar elde edebilmenin en önemli yollarından \nbiri, sistemli bir istem (prompt) oluşturma becerisidir. Özel -\nlikle eğitimde kullanılan yapay zekâ destekli uygulamalarda, \nöğretmenlerin ve öğrencilerin beklentilerine uygun içerik üre -\ntimi için belirli yapısal formüller çerçevesinde istem yazmak \nbüyük önem taşır.\nDr. Fatih Hattatoğlu (2023), prompt mühendisliği (prompt \nengineering) sürecini kolaylaştırmak amacıyla birden fazla \nformül modeli geliştirmiştir. Bu modeller, kullanıcıların yapay \nzekâya ne istediklerini açık, anlaşılır ve sistematik bir biçimde \niletmelerine yardımcı olur. İstem formülleri; görev tanımlama, \nrol atama, yapılandırma ve çıktı iyileştirme gibi çeşitli bileşenleri \niçerecek şekilde kurgulanmıştır. \nBu tür yapılandırmalar, öğretmenlerin ders materyalleri üret -\nmesini, öğrencilerin etkili öğrenme içerikleri oluşturmasını \nve genel olarak yapay zekâdan alınan çıktıların daha nitelikli \nolmasını sağlar. Yine de her formül, bir başlangıç noktası -\ndır; kullanıcılar kendi deneyimlerine, dijital yeterliliklerine ve \nhedeflerine göre bu yapıları dönüştürerek yaratıcı ve özgün \nistemler oluşturabilirler. \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n32"}, {"page": 33, "text": "Formül 1Bu formüller, hem öğretmenlerin ders içerikleri tasarlarken hem de öğrencilerin etkili öğrenme deneyimleri geliştirirken yapay \nzekâdan daha nitelikli fayda sağlamalarını mümkün kılar. Ayrıca, bu yapılar kullanıcıya üretim sürecinde yön verir, belirsizlikleri \nazaltır ve dil modeli ile kurulan etkileşimi optimize eder. Ancak bu yapılar katı kurallar değil, aksine yönlendirici ve esnek şab -\nlonlardır. Her kullanıcı, ihtiyacına, bağlama ve beklentisine göre bu formülleri kişiselleştirebilir, yeni bileşenler ekleyebilir veya \nsadeleştirme yapabilir.\nFormülün Bileşenleri ve Tanımları:\nBağlam (Context): Yanıtın üzerinde çalışacağı genel çerçeveyi \nveya arka planı tanımlar.\nGörev (Task): Modelin yerine getirmesi gereken spesifik amacı \naçıklar.\nTalimat (Instruction): Yanıtın hangi formatta ve yapıda olması \ngerektiğini belirtir.\nAçıklama (Clarify): Modelin daha iyi anlaması için ek bilgiler \nveya detaylar sağlar.\nİyileştirme (Refine): Daha doğru ve spesifik bir yanıt almak \niçin ek kısıtlamalar veya yönlendirmeler ekler.\nFormül:\n∆ Bağlam ∂ Görev ∂ Talimat ∂ Açıklama ∂ İyileştirme\nBağlam (Context): Bir 7. sınıf öğrencisinin Türkiye’nin coğrafi \nbölgeleri hakkında bilgi edinmesi hedefleniyor.\nGörev (Task): Türkiye’nin yedi coğrafi bölgesini açıklayın. Her \nbölgenin iklim özelliklerini ve önemli şehirlerini belirtin.Talimat (Instruction):\n ¬ Her bölge için en fazla iki paragraf kullanın.\n ¬ Paragraflarda iklim özelliklerine ve önemli şehirlere odak -\nlanın.\nAçıklama (Clarify): Her bölgenin iklim özelliklerini kısa ve net \nbir şekilde açıklayın. Ayrıca, her bölgeden en az iki önemli şehri \ntanıtın.\nİyileştirme (Refine): Öğrencinin daha iyi anlaması için her böl -\ngeye örnek olarak bir doğal güzellik veya turistik yer ekleyin.\nÖrnek Prompt:\n\"Türkiye'nin yedi coğrafi bölgesini açıkla. Her bölge için iklim \nözelliklerini ve önemli şehirlerini belirt. Her bölge için en fazla \niki paragraf kullan ve doğal güzellikler veya turistik yerlerden \nbahset.\"\nBu formül, modelin daha spesifik, anlaşılır ve hedef odaklı \nyanıtlar vermesini sağlamak için net bir çerçeve sunar.\nBağlam\n(Context)Görev\n(Task)Talimat\n(Instruction)Açıklama\n(Clarify)İyileştirme\n(Reﬁne)\n33\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 34, "text": "Formül 2\nFormülün Bileşenleri ve Tanımları:\nAmaç (Purpose): Promptun genel amacını tanımlar. Neden \nbu prompt’u oluşturuyoruz?\nÖrnek: \"Genç yetişkinler için uygun bilim kurgu kitapları hak -\nkında önerilerde bulunmak.\"\nRol (Role): Modelin bu prompt içerisindeki rolünü tanımlar. \nModel hangi kimlikte yanıt verecek?\nÖrnek: \"Bir kitap danışmanı olarak cevap ver.\"\nParametreler (Parameters): Promptun sınırlamalarını veya \nözel koşullarını belirtir. Hangi kısıtlamalara uyulmalı?\nÖrnek: \"Kitaplar son 20 yıl içinde yayımlanmış olsun.\"\nKonu (Topic): Promptun hangi konu veya konularla ilgili oldu -\nğunu tanımlar. Hangi alan veya içerik üzerinde odaklanılacak?\nÖrnek: \"Bilim kurgu kitapları.\"\nKanal (Channel): İletişimin hangi kanal üzerinden gerçekle -\nşeceğini belirtir. Yanıtın formatı nasıl sunulacak?\nÖrnek: \"Yazılı metinlerden seçim yap.\"\nKitle (Audience): Kimin için bu promptun oluşturulduğunu \nbelirtir. Hedef kitle kimdir?\nÖrnek: \"Genç yetişkinlere uygun.\"\nFormat (Format): Yanıtın hangi formatta olması gerektiğini \ntanımlar. Liste, tablo, paragraf vb.?\nÖrnek: \"Tablo şeklinde göster.\"Hedefler (Goals): Promptun sonunda ne başarmayı umdu -\nğumuzu tanımlar. Amacımız neyi elde etmek?\nÖrnek: \"Yeni ve ilginç bilim kurgu kitapları keşfetmeyi sağla.\"\nFormül:\n∆ Amaç ∂ Rol ∂ Parametreler ∂ Konu ∂ Konu ∂ Kanal ∂ Kitle ∂ \nFormat ∂ Hedefler\nÖrnek Prompt\n ¬ Amaç (Purpose): Genç yetişkinler için uygun bilim kurgu \nkitapları hakkında önerilerde bulunmak.\n ¬ Rol (Role): Bir kitap danışmanı olarak cevap ver.\n ¬ Parametreler (Parameters): Kitaplar son 20 yıl içinde \nyayımlanmış olsun.\n ¬ Konu (Topic): Bilim kurgu kitapları.\n ¬ Kanal (Channel): Yazılı metinlerden seçim yap.\n ¬ Kitle (Audience): Genç yetişkinlere uygun.\n ¬ Format (Format): Tablo şeklinde göster.\n ¬ Hedefler (Goals): Yeni ve ilginç bilim kurgu kitapları keş -\nfetmeyi sağla.\n ¬ Örnek Prompt:\n\"Genç yetişkinler için uygun bilim kurgu kitapları hakkında öne -\nrilerde bulun. Bir kitap danışmanı olarak cevap ver. Kitaplar son \n20 yıl içinde yayımlanmış olsun. Yazılı metinlerden seçim yap. \nÖnerilerini tablo şeklinde göster ve yeni ve ilginç bilim kurgu \nkitapları keşfetmeyi sağla.\"\nBu yapı, modelin daha hedef odaklı, anlaşılır ve kullanıcıya \nuygun bir yanıt vermesini sağlayacak şekilde optimize edilmiştir.\nAmaç\n(Purpose)Rol\n(Role)Parametreler\n(Parameters)Konu\n(Topic)Kanal\n(Channel)Kitle\n(Audience)Format\n(Format)Hedeﬂer\n(Goals)\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n34"}, {"page": 35, "text": "Formül 3\nFormülün Bileşenleri ve Tanımları:\nRol (Role): Promptun hangi rolü üstleneceğini tanımlar. Mo -\ndelin belirli bir kişilikte veya kimlikte yanıt vermesini sağlar.\nÖrnek: \"Bir tarih öğretmeni olarak davran ve öğrencilere \nKurtuluş Savaşı'nın nedenlerini açıkla.\"\nHedefler (Goals): Promptun sonunda neyi başarmayı \nhedeflediğini tanımlar. Modelin nihai amacı açıklanır.\nÖrnek: \"Öğrencilere Kurtuluş Savaşı'nın nedenlerini ve \nönemini öğretmek.\"\nKısıtlar Belirleme (Set Constraints): Promptun yanıt \nverirken hangi kısıtlamalara uyması gerektiğini belirtir. \nDil seviyesi, uzunluk veya bağlama özel koşullar belirlenir.\nÖrnek: \"Açıklamalar, 7. sınıf öğrencilerinin anlayabileceği \ndilde ve en fazla iki paragraf olmalıdır.\"\nSonuçları Biçimlendir (Format Results): Yanıtın nasıl \nbir formatta olması gerektiğini belirtir. Liste, paragraf, \ntablo vb. formatlar seçilir.\nÖrnek: \"Cevabı madde işaretli liste şeklinde biçimlendir.\"Formül:\n∆ Rol ∂ Hedefler ∂ Kısıtlar Belirleme ∂ Sonuçları Biçimlendir\nÖrnek Prompt\nRol (Role): \"Bir tarih öğretmeni olarak davran ve öğrencilere \nKurtuluş Savaşı'nın nedenlerini açıkla.\"\nHedefler (Goals): \"Öğrencilere Kurtuluş Savaşı'nın nedenlerini \nve önemini öğretmek.\"\nKısıtlar Belirleme (Set Constraints): \"Açıklamalar, 7. sınıf öğren -\ncilerinin anlayabileceği dilde ve en fazla iki paragraf olmalıdır.\"\nSonuçları Biçimlendir (Format Results): \"Cevabı madde işaretli \nliste şeklinde biçimlendir.\"\nTam Prompt:\n\"Bir tarih öğretmeni olarak davran ve öğrencilere Kurtuluş \nSavaşı'nın nedenlerini açıkla. Öğrencilere Kurtuluş Savaşı'nın \nnedenlerini ve önemini öğretmek. Açıklamalar, 7. sınıf öğren -\ncilerinin anlayabileceği dilde ve en fazla iki paragraf olmalıdır. \nCevabı madde işaretli liste şeklinde biçimlendir.\"\nBu formül, modelin spesifik, anlaşılır ve kullanıcı ihtiyaçlarına \nuygun yanıtlar üretmesini sağlamak için etkili bir yapı sunar.\nFormül 4\nRol\n(Role)Hedeﬂer\n(Goals)Kısıtlar Belirleme\n(Set Constraints)Sonuçları \nBiçimlendir\n(Format Results)\nBağlam\n(Context)Detaylı Bilgi\n(Detailed Info)Spesiﬁk Hedef\n(Speciﬁc Goal)Ek Hedef Bilgisi\n(Additional\nGoal Info)Ton, Ses veya Yapı\n(Tone Voice or \nStructure)\n35\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 36, "text": "Formülün Adımları ve Tanımları:\nBağlam (Context): Promptun genel çerçevesini ve amacını \naçıklar. Modelin hangi konu üzerinde odaklanması gerektiğini \nbelirtir.\nÖrnek: \"Bir 8. sınıf sosyal bilgiler dersinde öğrencilerin Tür -\nkiye'nin coğrafi bölgelerini öğrenmelerine yardımcı olmak.\"\nDetaylı Bilgi (Detailed Info): Modelin yanıt vermesi için gerekli \nolan spesifik bilgileri tanımlar.\nÖrnek: \"Türkiye'nin yedi coğrafi bölgesinin her birinin iklim \nözelliklerini ve bu bölgelerde bulunan önemli şehirleri açıklayın.\"\nSpesifik Hedef (Specific Goal): Modelin bu prompt ile neyi \nbaşarmasını istediğinizi belirtir.\nÖrnek: \"Öğrencilere her coğrafi bölgenin temel özelliklerini \nöğretmek.\"\nEk Hedef Bilgisi (Additional Goal Info): Modelin amaca ulaş -\nması için ek bilgiler veya sınırlamalar sağlar.\nÖrnek: \"Açıklamalar, her bölge için iki paragrafı geçmemeli ve \nbasit, anlaşılır bir dilde olmalıdır.\"\nTon, Ses veya Yapı (Tone Voice or Structure): Modelin yanıtının \nnasıl bir ton veya yapıda olması gerektiğini belirtir.\nÖrnek: \"Cevaplar dostane ve öğretici bir tonda olmalı, madde \nişaretleri ile belirtilmelidir.\"Formül:\n∆ Bağlam ∂ Detaylı Bilgi ∂ Spesifik Hedefler ∂ Ek Hedef Bilgisi \n∂ Ton, Ses veya Yapı\nÖrnek Prompt\nContext (Bağlam): \"Bir 8. sınıf sosyal bilgiler dersinde öğren -\ncilerin Türkiye'nin coğrafi bölgelerini öğrenmelerine yardımcı \nolmak için bilgi ver.\"\nDetailed Info (Detaylı Bilgi):  \"Türkiye'nin yedi coğrafi bölgesinin \nher birinin iklim özelliklerini ve bu bölgelerde bulunan önemli \nşehirleri açıklayın.\"\nSpecific Goal (Spesifik Hedef): \"Öğrencilere her coğrafi böl -\ngenin temel özelliklerini öğretmek.\"\nAdditional Goal Info (Ek Hedef Bilgisi): \"Açıklamalar, her bölge \niçin iki paragrafı geçmemeli ve basit, anlaşılır bir dilde olmalıdır.\"\nTone Voice or Structure (Ton, Ses veya Yapı): \"Cevaplar dostane \nve öğretici bir tonda olmalı, madde işaretleri ile belirtilmelidir.\"\nTam Prompt:\n\"Bir 8. sınıf sosyal bilgiler dersinde öğrencilerin Türkiye'nin \ncoğrafi bölgelerini öğrenmelerine yardımcı olmak için bilgi ver. \nTürkiye'nin yedi coğrafi bölgesinin her birinin iklim özelliklerini \nve bu bölgelerde bulunan önemli şehirleri açıkla. Açıklamalar, \nher bölge için iki paragrafı geçmemeli ve basit, anlaşılır bir \ndilde olmalıdır. Cevaplar dostane ve öğretici bir tonda olmalı, \nmadde işaretleri ile belirtilmelidir.\"\nBu yapı, modelin daha hedef odaklı, anlaşılır ve kullanıcı ih -\ntiyaçlarına uygun bir şekilde yanıt üretmesine yardımcı olur.\nFormül 5\nGörev\n(Task)Bağlam\n(Context)Örnek\n(Exemplar)Kişilik \n(Persona)Format\n(Format)Ton \n(Tone)\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n36"}, {"page": 37, "text": "Formülün Adımları ve Tanımları:\nGörev (Task): Modelin ne yapması gerektiğini açıklar. Bu, \npromptun ana eylemidir.\nÖrnek: \"Bir 7. sınıf öğrencisine Türkiye'nin coğrafi bölgelerini \nöğretmek.\"\nBağlam (Context): Promptun genel arka planını ve amacını \ntanımlar. Modelin hangi konu üzerinde odaklanması gerek -\ntiğini belirtir.\nÖrnek: \"Türkiye'nin yedi coğrafi bölgesinin özellikleri hakkında \nbilgi vermek.\"\nÖrnek (Exemplar): Modelin nasıl bir yanıt vermesi gerektiği \nkonusunda örnek veya referans sağlar. Bu, yanıt formatını ve \niçeriğini model için netleştirir.\nÖrnek: \"Marmara Bölgesi, iklimi çeşitlilik gösteren bir bölgedir \nve İstanbul gibi önemli şehirlere ev sahipliği yapar.\"\nKişilik (Persona): Modelin hangi “rol” veya “karakter” olarak \nhareket etmesi gerektiğini tanımlar.\nÖrnek: \"Bir coğrafya öğretmeni olarak davran.\"\nFormat (Format): Yanıtın nasıl bir yapıda olması gerektiğini \naçıklar.\nÖrnek: \"Cevabı madde işaretli liste halinde ver.\"\nTon (Tone): Modelin yanıtının hangi ses tonunda olması ge -\nrektiğini belirtir.Örnek: \"Dostane ve öğretici bir tonda yaz.\"\nFormül:\n∆ Görev ∂ Bağlam ∂ Örnek ∂ Kişilik ∂ Format ∂ Ton\nÖrnek Prompt\nGörev (Task): \"Bir 7. sınıf öğrencisine Türkiye'nin coğrafi böl -\ngelerini öğretmek.\"\nBağlam (Context): \"Türkiye'nin yedi coğrafi bölgesinin özellikleri \nhakkında bilgi vermek.\"\nÖrnek (Exemplar): \"Marmara Bölgesi, iklimi çeşitlilik gösteren \nbir bölgedir ve İstanbul gibi önemli şehirlere ev sahipliği yapar.\"\nKişilik (Persona): \"Bir coğrafya öğretmeni olarak davran.\"\nFormat (Format): \"Cevabı madde işaretli liste halinde ver.\"\nTon (Tone): \"Dostane ve öğretici bir tonda yaz.\"\nTam Prompt:\n\"Bir coğrafya öğretmeni olarak davran ve bir 7. sınıf öğren -\ncisine Türkiye'nin coğrafi bölgelerini öğret. Türkiye'nin yedi \ncoğrafi bölgesinin özellikleri hakkında bilgi ver. Açıklamalar her \nbölge için iki paragrafı geçmemeli ve basit, anlaşılır bir dilde \nolmalıdır. Cevabı madde işaretli liste halinde ver ve dostane, \nöğretici bir tonda yaz.\"\nBu yapı, modelin daha spesifik, düzenli ve kullanıcı ihtiyaçlarına \nuygun yanıtlar üretmesini sağlamak için etkili bir formül sunar.\nFormül 6\nUzunluk\n(Length)Konu\n(Topic)Yapı\n(Structure)Stil\n(Style)\n37\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 38, "text": "Formülün Adımları ve Tanımları:\nUzunluk (Length): Yanıtın uzunluğunu belirler. Her bölümde \nkullanılacak cümle veya kelime sayısını tanımlar.\nÖrnek: \"Her adım için en fazla iki cümle.\"\nKonu (Topic): Yanıtın odaklanacağı konuyu açıklar. Hangi içerik \nveya konunun ele alınacağını belirtir.\nÖrnek: \"Kesirlerle toplama ve çıkarma işlemleri.\"\nYapı (Structure): Yanıtın nasıl bir yapıya sahip olması gerektiğini \ntanımlar. Adım adım çözüm, tablo veya liste gibi formatı belirtir.\nÖrnek: \"Adım adım çözüm açıklaması ve örnek problemler.\"\nStil (Style): Yanıtın yazım biçimini tanımlar. Dil, ton ve açık -\nlama tarzını belirtir.\nÖrnek: \"Basit ve anlaşılır bir dil kullan.\"\nFormül:\n∆ Uzunluk ∂ Konu ∂ Yapı ∂ Stil\nÖrnek Prompt\nUzunluk (Length): \"Her adım için en fazla iki cümle.\"\nKonu (Topic): \"Kesirlerle toplama ve çıkarma işlemleri.\"Yapı (Structure): \"Adım adım çözüm açıklaması ve örnek \nproblemler.\"\nStil (Style): \"Basit ve anlaşılır bir dil kullan.\"\nTam Prompt:\n\"Bir matematik öğretmeni olarak davran ve bir 6. sınıf öğren -\ncisine kesirlerle toplama ve çıkarma işlemlerini öğret. Kesir -\nlerle toplama ve çıkarma işlemlerinin adım adım çözümünü \nve örnek problemlerini açıkla. Her adım için en fazla iki cümle \nkullan ve basit, anlaşılır bir dilde yaz. Cevabı madde işaretli \nliste halinde ver.\"\nYanıt Yapısı\nAdım 1: Kesirlerle toplama işlemi yapmak için ilk olarak pay -\ndaları eşitleyin. Eğer paydalar aynıysa, doğrudan payları top -\nlayabilirsiniz.\nAdım 2: Paydalar eşit değilse, her iki kesri ortak bir paydada \nbuluşturun. Örneğin, 1/4 ve 1/6 işlemi için paydaları 12'de \neşitleyip toplayabilirsiniz: 3/12 + 2/12 = 5/12.\nAdım 3: Kesirlerle çıkarma işlemi için aynı yöntemi kullanın: \npaydaları eşitleyin ve payları birbirinden çıkarın. Örneğin, 2/3 - \n1/4 işlemini yaparken, ortak payda 12'dir: 8/12 - 3/12 = 5/12.\nAdım 4: Sonuçları sadeleştirin. Örneğin, 6/12 yerine 1/2 ya -\nzabilirsiniz çünkü 6 ve 12, 6’ya bölünebilir.\nBu yapı, hedef odaklı, anlaşılır ve kullanıcı ihtiyaçlarına uygun \nyanıtlar sunar.\nFormül 7\nİstem (Prompt) Görev (Task) Kısıtlamalar (Constraint)\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n38"}, {"page": 39, "text": "Formülün Adımları ve Tanımları:\nPrompt (İstem): Kullanıcıdan belirli bir bilgi veya eylem talep \neden kısa ifade.\nÖrnek: \"Bir matematik öğretmeni olarak, öğrencilere kesirlerle \ntoplama ve çıkarma işlemlerini öğret.\"\nGörev (Task): Modelin ne yapması gerektiğini açıklar. Ana odak \nnoktası ve eylem detaylarını tanımlar.\nÖrnek: \"Kesirlerle toplama ve çıkarma işlemlerini adım adım \naçıkla.\"\nKısıtlamalar (Constraint): İstenen sonuçları elde etmek için \nuygulanan sınırlamalar veya koşullar. Dil, uzunluk, format gibi \nfaktörleri içerir.\nÖrnek: \"Her adımı iki cümleyle açıklayın ve basit, anlaşılır bir \ndil kullanın.\"\nFormül:\n∆ Prompt ∂ Görev ∂ Kısıtlamalar\nÖrnek Prompt\nPrompt (İstem): \"Bir matematik öğretmeni olarak, öğrencilere \nkesirlerle toplama ve çıkarma işlemlerini öğret.\"Görev (Task): \"Kesirlerle toplama ve çıkarma işlemlerini adım \nadım açıkla.\"\nKısıtlamalar (Constraint): \"Her adımı iki cümleyle açıklayın \nve basit, anlaşılır bir dil kullanın.\"\nTam Prompt:\n\"Bir matematik öğretmeni olarak, öğrencilere kesirlerle toplama \nve çıkarma işlemlerini öğret. Kesirlerle toplama ve çıkarma \nişlemlerini adım adım açıkla. Her adımı iki cümleyle açıklayın \nve basit, anlaşılır bir dil kullanın.\"\nÖrnek Yanıt\nAdım 1: Kesirleri toplamak için ilk olarak paydaları eşitlemeniz \ngerekir. Eğer paydalar aynıysa, doğrudan payları toplayabilirsiniz.\nAdım 2: Eğer paydalar farklıysa, ortak bir payda bulun. Örneğin, \n1/3 ve 1/6 için ortak payda 6’dır: 2/6 + 1/6 = 3/6.\nAdım 3: Kesirleri çıkarırken de aynı yöntemi kullanarak pay -\ndaları eşitleyin. Ardından payları çıkarın, örneğin 5/6 - 1/3 \niçin: 5/6 - 2/6 = 3/6.\nAdım 4: Sonuçları sadeleştirerek nihai cevabı bulun. Örneğin, \n3/6 yerine 1/2 yazabilirsiniz.\nBu yapı, hedef odaklı, kolay anlaşılır ve kullanıcı ihtiyaçlarına \nuygun bir yanıt sağlar. \nFormül 8\nİstem (Prompt) Tamamlama (Completio)\n39\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 40, "text": "Formül Açıklaması:\nBu formül, basit ve etkili bir yapıya sahiptir. Kullanıcı bir prompt \n(istem) sağlar ve model, verilen isteme uygun bir yanıt (comp -\nletion) üretir. Bu, öğretici içerikler oluşturmak için etkili bir \nyöntemdir.\nÖrnekler\nMatematik Dersi İçin\nPrompt: \"Bir matematik öğretmeni olarak 6. sınıf öğrencilerine \nkesirlerle toplama işlemini eğlenceli ve anlaşılır bir şekilde \nöğret. Adım adım açıklama yap, basit örnekler ver, ardından \nbir uygulama etkinliği öner.\"\nCompletion: Model Yanıtı- Örnek\n1. Giriş: “Bugün kesirlerle toplama öğreneceğiz! Kesirler, bü -\ntünün bir parçasını temsil eder. Mesela bir pizzayı 4 kişiye \nbölerseniz her kişi 1/4 pizza alır.”\n2. Temel Kavram: Kesirleri toplarken paydaları aynıysa direkt \npayları toplarız.\nÖrnek: 1/5 + 2/5 = (1 + 2)/5 = 3/5\n3. Farklı Paydalar: Eğer paydalar farklıysa, paydaları eşitle -\nmeliyiz.\nÖrnek: 1/3 + 1/4 ∂ Ortak payda: 12\n1/3 = 4/12, 1/4 = 3/12\n4/12 + 3/12 = 7/12\n4. Etkinlik:\nÖğrencilere şu problemi verin: \"Ali, 2/6 elmayı sabah, 1/3’ünü \nise öğlen yedi. Toplam kaç elma yedi?\"5. Sonuç:\nPaydaları eşitle: 2/6 = 1/3 ∂ 1/3 + 1/3 = 2/3 elma\nFen Bilimleri Dersi İçin\nPrompt: \"Bir fen bilgisi öğretmeni olarak öğrencilere foto -\nsentezi öğret.\"\nCompletion: \"Fotosentez, bitkilerin güneş ışığını, suyu ve kar -\nbondioksiti kullanarak kendi besinlerini ürettikleri süreçtir. Bu \nişlem kloroplastlarda gerçekleşir ve oksijenin atmosfere sa -\nlınmasını sağlar. Örneğin, 6CO 2 + 6H 2O + ışık enerjisi ∂ C 6H12O6 \n+ 6O 2 tepkimesi ile gösterilir.\"\nSosyal Bilgiler Dersi İçin\nPrompt: \"Bir sosyal bilgiler öğretmeni olarak öğrencilere Türkiye \nCumhuriyeti'nin kuruluş sürecini öğret.\"\nCompletion: \"Türkiye Cumhuriyeti, 29 Ekim 1923'te Mustafa \nKemal Atatürk önderliğinde kuruldu. Kurtuluş Savaşı'nın za -\nferle sonuçlanmasının ardından, saltanat kaldırılarak yerine \ncumhuriyet ilan edildi. Bu süreçte yapılan inkılaplarla modern \nve laik bir devlet yapısı oluşturuldu.\"\nAvantajları:\n »Basitlik: Kullanıcı yalnızca bir istem oluşturur ve ta -\nmamlanmış bir yanıt alır.\n »Çok Yönlülük: Eğitim, öğretim ve bilgilendirme gibi farklı \nalanlarda kolayca kullanılabilir.\n »Hedef Odaklılık: Tamamlamalar, spesifik ve ihtiyaçlara \nuygun bilgiler sunar.\nBu formül, öğretici içeriklerin hızlı ve etkili bir şekilde üretilmesi  \niçin harika bir yaklaşımdır.\n4.1.3. Basit Promptlar\n4.1.3.1. 30 Özgün ve Etkili Fikirle Yaratıcılığı Harekete Geçirin\nHayal gücünüzü ve üretkenliğinizi artıracak, yeni bir rutin oluşturmanıza, iş projelerinizi güçlendirmenize veya yaratıcı bir yol \nharitası çizmenize yardımcı olacak 30 nitelikli öneriyi sizlerle paylaşıyoruz. Bu öneriler, yazı yazarken yaşadığınız tıkanıklıkları \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n40"}, {"page": 41, "text": "aşmanıza, günlük hayatınızı daha verimli hâle getirmenize ve profesyonel yaşamınızda fark yaratmanıza destek olacaktır. Her \nbir öneri, daha etkili sonuçlar almanızı sağlayacak şekilde yeniden düzenlenmiş ve güçlendirilmiştir.\n1. Yazılarınızı Dönüştürün: “Okuyucuyu içine çeken ve kalıcı bir \netki bırakan bir giriş paragrafı nasıl yazarım? Bir örnekle \naçıklayabilir misin?”\n2. Günlük Rutini Güçlendirin:  “Günlük rutinimi daha verimli ve \ntatmin edici hâle getirmek için hangi alışkanlıkları ekleme -\nliyim? Sabah ve akşam rutinleri için öneriler sunar mısın?”\n3. Motivasyonu Artırın: “Ekip motivasyonunu artırmak için \netkili, yaratıcı ve uygulanabilir 5 strateji önerebilir misiniz?”\n4. Yaratıcı İş Fikirleri: “Kendi işimi kurmak için yenilikçi ve \nsürdürülebilir iş fikirleri üretmek adına hangi yöntemleri \ndeneyebilirim? Önerileriniz nelerdir?”\n5. Araştırma Başlangıcı: “Bir araştırma projesine başlamadan \nönce dikkat edilmesi gereken temel adımları ve etkili bir \nplanlama stratejisini paylaşabilir misiniz?”\n6. Kişisel Gelişim Kitapları: “Farkındalık, liderlik ve üretkenlik \nalanlarında kendimi geliştirmek için mutlaka okumam \ngereken kitaplar hangileridir?”\n7. Toplantılarınızı İyileştirin: “Hedef odaklı ve ilham verici bir \ntoplantı planı hazırlamak için izlemem gereken adımları \npaylaşır mısınız?”\n8. Yenilikçi Ürün Fikirleri: “Bir ürünü sıfırdan geliştirmek için \nyaratıcı düşünce yöntemleri ve uygulanabilir adımlarla \ndolu bir rehber önerir misiniz?”\n9. İş Planı Rehberi: “Başarılı bir iş planı hazırlamak için nelere \ndikkat e
