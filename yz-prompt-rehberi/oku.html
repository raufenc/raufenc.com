 yaratılabilir.\n ¬ Sunum, tanıtım ve eğitim içeriklerini video formatında \nhızlıca hazırlamayı mümkün kılar.\n ¬ Tarayıcı tabanlı çalıştığı için herhangi bir kurulum gerek -\ntirmez.\nEğitimde Kullanımı:\n ¬ Öğretmenler, ders anlatım videoları oluşturarak konuları \ngörsel ve işitsel olarak öğrencilere aktarabilir.\n ¬ Farklı dillerde içerik üretimiyle dil öğrenimini destekleyen \nmateryaller hazırlanabilir.\n ¬ Görsel öğrenmeyi destekleyen senaryolarla öğrencilerin \ndikkatini çeken ders videoları sunulabilir.\n ¬ Zor kavramlar avatar destekli anlatımlarla sadeleştirilerek \ndaha anlaşılır hale getirilebilir.\n ¬ Öğrenciler, proje sunumlarını yapay zekâ destekli videolara \ndönüştürerek sunum becerilerini geliştirebilir.\n ¬ Erişilebilirlik açısından sesli ve altyazılı içeriklerle özel \ngereksinimli öğrencilere destek sağlanabilir.\n ¬ Uzaktan eğitimde öğretmen yüzü gerektirmeden anlatımlı \nvideo dersler hazırlanabilir.\nHeyGen:\nTanım: Metinden videoya dönüştürme teknolojisi kullanan bir \nyapay zekâ video oluşturma platformudur. Kullanıcılara gerçekçi \navatarlar ile konuşma içeren videolar oluşturma imkânı sağlar. \nÖzellikle metni otomatik olarak sese ve görüntüye çevirerek \ninsan sunuculara ihtiyaç duymadan video içerikler üretir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n98"}, {"page": 99, "text": "Colossyan:\nTanım: Yapay zekâ destekli sanal aktörlerle profesyonel vi -\ndeolar oluşturma platformudur. Colossyan, metni otomatik \nolarak konuşmalı videolara dönüştüren yapay zekâ destekli \nbir video oluşturma platformudur. Kullanıcı dostu arayüzüyle \nprofesyonel seviyede videoları hızlı ve kolay şekilde üretmeyi \nsağlar. Gerçek insan sunuculara ihtiyaç duymadan avatarlar \nüzerinden metin anlatımı yapar.\nTemel Özellikler:\n ¬ Hazır avatarlar ve karakterlerle farklı dillerde konuşan \nvideolar oluşturur.\n ¬ Gelişmiş dudak senkronizasyonu ile metni gerçekçi bir \nşekilde seslendirir.\n ¬ Kullanıcıya özel avatar oluşturma imkânı sunar (Pro sü -\nrümde).\n ¬ Çok dilli destek sayesinde global kitlelere hitap eden içe -\nrikler hazırlanabilir.\n ¬ PowerPoint, PDF gibi materyaller içe aktarılabilir ve videoya \ndönüştürülebilir.\n ¬ Tarayıcı tabanlıdır; ek yazılım kurmadan çevrimiçi çalışır.\n ¬ Video çıktıları kolayca indirilebilir veya platformda pay -\nlaşılabilir.\nEğitimde Kullanımı:\n ¬ Öğretmenler metinleri kısa anlatım videolarına çevirerek \netkili dijital içerikler oluşturabilir.\n ¬ E-öğrenme modüllerinde kullanılmak üzere rehber vide -\nolar üretilebilir.\n ¬ Dil eğitimi için farklı aksan ve dillerde konuşan karakterlerle \ndestek materyalleri hazırlanabilir.\n ¬ Öğrencilerin projeleri için video sunum hazırlamalarına \nolanak sağlar. ¬ Karmaşık kavramlar sadeleştirilerek avatar anlatımıyla \nöğrencilerin ilgisini çekecek şekilde sunulabilir.\n ¬ Uzaktan ve hibrit eğitim süreçlerinde zamandan tasarruf \nsağlayan anlatımlı video ders içerikleri hazırlanabilir.\n ¬ Erişilebilirlik ihtiyacı olan öğrenciler için çok dilli ve altyazılı \niçerikler geliştirilebilir.\nVidnoz AI:\nTanım: Yapay zekâ destekli konuşmacılar ve video üretim araç -\nlarıyla içerik oluşturmayı kolaylaştıran bir platformdur. Vidnoz \nAI, yapay zekâ destekli avatarlar kullanarak metni otomatik \nolarak konuşmalı videolara dönüştüren bir video oluşturma \nplatformudur. Kullanıcıların teknik bilgiye ihtiyaç duymadan \netkileyici ve profesyonel videolar üretmelerini sağlar. Eğitici, \ntanıtıcı ve sunum amaçlı videolar oluşturmak için hızlı ve pratik \nbir çözümdür.\nTemel Özellikler:\n ¬ Metni gerçekçi seslendirmelerle video formatına çeviren \navatar desteği sunar.\n ¬ 80’den fazla yapay zeka avatarı ve 100+ dilde seslendirme \nimkânı sağlar.\n ¬ Kendi yüzünüzü ya da karakterinizi yükleyerek kişisel avatar \noluşturma özelliği vardır.\n ¬ Ücretsiz planla sınırlı sayıda video üretimi mümkündür, \nücretli planlarda özellikler artar.\n ¬ Arka plan, müzik, yazı tipi ve görsel efekt düzenleme se -\nçenekleriyle özelleştirilebilir videolar oluşturulabilir.\n ¬ Çevrimiçi ve kullanıcı dostu bir arayüze sahiptir, kurulum \ngerekmez.\n99\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 100, "text": "Eğitimde Kullanımı:\n ¬ Öğretmenler, ders içeriklerini kısa ve etkili anlatım videoları \nhâline getirerek sunabilir.\n ¬ Öğrenciler, projelerini ya da araştırmalarını sunmak için \nyaratıcı video anlatımları hazırlayabilir.\n ¬ Çok dilli destek sayesinde dil eğitimi ve çok kültürlü öğ -\nrenme ortamları için uygun içerikler üretilebilir.\n ¬ Görsel ve işitsel anlatımlarla öğrenme süreçleri zengin -\nleştirilerek öğrenci motivasyonu artırılabilir.\n ¬ Zor konular, sadeleştirilmiş videolarla daha anlaşılır hâle \ngetirilebilir.\n ¬ Erişilebilirlik ihtiyacı olan öğrenciler için altyazılı ve sesli \nanlatım destekli içerikler hazırlanabilir.\n ¬ Uzaktan eğitimde kişisel öğretmen sunumları yerine hızlı \nve kaliteli videolar kullanılabilir. ¬ İş Birliği ve Ekip Çalışması: Öğrenciler, öğretmenler veya \nekip üyeleri ortak projeler üzerinde çalışabilir.\n ¬ Çoklu Platform Desteği: Masaüstü, mobil ve web uygu -\nlamaları üzerinden erişilebilir.\nEğitimde Kullanımı:\n ¬ Öğrenciler İçin Ödev ve Proje Takibi: Öğrenciler, teslim \ntarihlerini planlamak ve görevlerini organize etmek için \nClickUp kullanabilir.\n ¬ Öğretmenler İçin Ders Planlama: Ders programlarını, sınav \ntarihlerini ve öğrencilerle paylaşılacak kaynakları ClickUp \nile yönetebilirler.\n ¬ Akademik Çalışmalar ve Araştırma Yönetimi: Araştırma -\ncılar, notlarını düzenleyebilir, proje yönetimi yapabilir ve \nmakale yazım süreçlerini takip edebilir.\n ¬ Ekip Çalışması ve İş Birliği: Öğrenciler grup projelerinde \niş bölümü yapabilir ve ilerlemelerini takip edebilirler.\n ¬ Eğitim Etkinlikleri ve Organizasyonlar: Okul etkinlikleri, \nkulüp çalışmaları ve konferanslar için etkinlik yönetimi \nyapılabilir.\nClickUp: \nTanım: Görev yönetimi, proje planlama ve iş birliği için kullanılan \nyapay zekâ destekli bir üretkenlik ve organizasyon platformudur. \nBireysel kullanıcılar, öğretmenler, öğrenciler ve ekipler, proje \ntakibi, görev yönetimi, belge paylaşımı ve zaman planlaması \ngibi süreçleri ClickUp ile kolaylaştırabilir.\nTemel Özellikler:\n ¬ Görev ve Proje Yönetimi: Projeleri, ödevleri ve ders plan -\nlarını organize etmek için kullanılabilir.\n ¬ AI Destekli Not Alma ve İçerik Üretimi:  Akıllı notlar, toplantı \nözetleri ve içerik üretimi için yapay zekâ desteği sunar.\n ¬ Takvim ve Zaman Yönetimi: Ödev teslim tarihleri, ders \nplanları ve toplantılar için hatırlatıcılar ve takvim enteg -\nrasyonu sağlar.Airtable:\nTanım: Veri tabanı ve elektronik tablo (spreadsheet) özellik -\nlerini birleştiren, yapay zekâ destekli esnek bir veri yönetim \nplatformudur. Kullanıcılar, öğrenci bilgilerini takip etmek, ders \nprogramlarını yönetmek, araştırma verilerini organize etmek \nve eğitim süreçlerini planlamak için Airtable'ı kullanabilir.\nTemel Özellikler:\n ¬ Esnek Veri Tabanı Yönetimi: Tablolar, formlar ve ilişkisel \nveri tabanları ile eğitim süreçlerini düzenleme imkânı sunar.\n ¬ Otomasyon ve Entegrasyon: Google Drive, Slack, Notion \ngibi birçok popüler araçla entegre çalışabilir ve otomasyon \nsüreçlerini destekler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n100"}, {"page": 101, "text": "¬ Proje ve Görev Yönetimi: Öğrenciler ve öğretmenler için \nproje bazlı çalışma sistemlerini kolaylaştırır.\n ¬ AI Destekli Veri Analizi: Verileri kategorize etme, filtreleme \nve analiz etme süreçlerini hızlandırır.\n ¬ Ekip Çalışması ve Paylaşım: Öğretmenler ve öğrenciler, \nortak projelerde iş birliği yapabilir ve belgeleri paylaşabilir.\nEğitimde Kullanımı:\n ¬ Öğrenciler İçin Ödev ve Proje Takibi: Öğrenciler, proje tes -\nlim tarihlerini planlamak ve kaynaklarını organize etmek \niçin kullanabilir.\n ¬ Öğretmenmonday comler İçin Ders ve Katılım Yönetimi: \nÖğrencilerin ders katılımını takip etmek, ders planlarını \ndüzenlemek ve not verme süreçlerini organize etmek için \nuygundur.\n ¬ Akademik Araştırmalar ve Veri Toplama: Öğretim üyeleri ve \nöğrenciler, araştırma verilerini yönetebilir ve analiz edebilir.\n ¬ Eğitimde İş Birliği ve Etkinlik Yönetimi: Öğrenciler ve \nöğretmenler, grup projeleri, etkinlikler ve konferansları \nplanlamak için Airtable’ı kullanabilir.\n ¬ Öğrenci Verilerini Saklama ve Analiz Etme: Öğrencilerin \nilerleme raporlarını ve performans verilerini düzenleyerek \nanaliz etmeye olanak tanır.Temel Özellikler:\n ¬ Görev ve Proje Yönetimi:  Ders planları, ödev teslim tarihleri \nve eğitim projelerini düzenleyerek takip etme imkânı sunar.\n ¬ Otomasyon ve Entegrasyon: Google Drive, Slack, Zoom \ngibi birçok araç ile entegre çalışarak eğitim süreçlerini \nkolaylaştırır.\n ¬ Zaman Yönetimi ve Takvim Entegrasyonu: Öğrenciler ve \nöğretmenler için teslim tarihlerini, toplantıları ve etkin -\nlikleri düzenler.\n ¬ Ekip Çalışması ve İş Birliği: Öğrenciler ve öğretmenler, \ngrup projelerinde görev dağılımı yapabilir ve ilerlemeyi \ntakip edebilir.\n ¬ Raporlama ve Veri Analizi: Öğrenci performans takibi, \nders ilerleme raporları ve veriye dayalı analizler yapabilir.\nEğitimde Kullanımı:\n ¬ Öğrenciler İçin Ödev ve Proje Takibi: Öğrenciler, grup pro -\njelerini ve bireysel çalışmalarını organize edebilir.\n ¬ Öğretmenler İçin Ders Planlama: Ders içeriklerini oluş -\nturmak, değerlendirme süreçlerini yönetmek ve öğrenci \ngelişimini takip etmek için uygundur.\n ¬ Akademik Çalışmalar ve Araştırma Yönetimi: Akade -\nmisyenler ve araştırmacılar, projelerini planlayarak ekip \nçalışmalarını koordine edebilir.\n ¬ Eğitimde İş Birliği ve Etkinlik Yönetimi: Eğitimciler, öğ -\nrenciler ve idari personel, konferanslar, seminerler ve okul \netkinliklerini planlayabilir.\n ¬ Öğretmenler İçin İletişim ve Geri Bildirim: Öğretmenler, \nöğrencilerle bireysel veya toplu olarak iletişim kurabilir \nve anlık geri bildirim verebilir.\nMonday.com:\nTanım: Proje yönetimi, iş akışı takibi ve iş birliği süreçlerini or -\nganize etmek için kullanılan yapay zekâ destekli bir üretkenlik \nplatformudur. Öğretmenler, öğrenciler ve akademisyenler, ders \nplanlarını hazırlamak, ödevleri takip etmek, eğitim projeleri -\nni yönetmek ve takım çalışmalarını düzenlemek için Monday.\ncom'u kullanabilir.\n101\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 102, "text": "Öğretme ve Öğrenme \nEtkinlikleri Tasarımı\nPrompt Şablonu\nÖğretme ve öğrenme etkinlikleri \ntasarımı, öğrencilerin aktif \nkatılımını sağlamak, kazanımlara \nuygun yaratıcı ve etkileşimli \nyöntemler geliştirmek için yapay \nzekâ destekli araçları kullanarak \netkili öğrenme deneyimleri \noluşturmayı hedeﬂer.Planlama ve \nEtkili İçerik Üretimi\nPrompt Şablonu\nUygulama örneği\nBen bir [Rolünüzü girin.]. \nAşağıdaki bilgilere dayanarak öğretme ve \nöğrenme etkinlikleri tasarımı yapmanı \nistiyorum.\n \nTasarım:\nBelirtilen kazanımlara uygun etkinlikler \niçermelidir.\nEtkileşimli ve yaratıcı öğrenme yöntemleri \niçermelidir.\nSınıf düzeyi ve hedef kitleye uygun olmalıdır.\nGrup çalışmaları, bireysel etkinlikler veya dijital \naraçlar kullanılabilir.\nDeğerlendirme ve geri bildirim süreçlerini \ndestekleyecek unsurlar içermelidir.\nKonu: [Konu başlığını girin.]\nHedef Kitle: [Öğrenciler, öğretmenler vb. \nbelirtin.]\nKazanımlar:\n[Kazanım 1’i yazın.]\n[Kazanım 2’yi yazın.]\n[Kazanım 3’ü yazın.]\nEtkinlik Türleri: [Grup çalışması, bireysel \netkinlik, deney, simülasyon vb.]\nAraç ve Materyaller: [Dijital araçlar, ﬁziksel \nmateryaller, dokümanlar vb.]\nSüre: [Etkinlik için önerilen süreyi girin.]\nDeğerlendirme Yöntemi: [Değerlendirme \nölçütlerini veya yöntemlerini belirtin.]\nDiğer Detaylar: Öğrencilerin aktif katılımını \nsağlayacak bir yöntem öner.\nGünlük yaşamla bağlantı kurmalarına yardımcı \nolacak örnekler sun.\nSürecin sonunda geri bildirim verilmesine \nyönelik bir plan oluştur.Ben bir üniversitede doçent doktorum. \nAşağıdaki bilgilere dayanarak öğretme ve \nöğrenme etkinlikleri tasarımı yapmanı \nistiyorum.\n \nTasarım:\nBelirtilen kazanımlara uygun etkinlikler \niçermelidir.\nEtkileşimli ve yaratıcı öğrenme yöntemleri \niçermelidir.\nYüksek lisans seviyesindeki öğrenciler için \nuygun olmalıdır.\nGrup çalışmaları, bireysel etkinlikler veya dijital \naraçlar kullanılabilir.\nDeğerlendirme ve geri bildirim süreçlerini \ndestekleyecek unsurlar içermelidir.\nKonu: Etkileşimli Materyal Hazırlama\nHedef Kitle: Yüksek lisans dersi alan öğrenciler\nKazanımlar:\nEtkileşimli materyallerin temel özelliklerini ve \nkullanım alanlarını açıklayabilmek.\nEtkileşimli materyal hazırlama sürecini \nplanlayabilmek ve uygulayabilmek.\nFarklı araçlar kullanarak etkili ve özgün \nmateryaller geliştirebilmek.\nEtkinlik Türleri: Grup çalışması, bireysel \nuygulama, dijital araç kullanımı\nAraç ve Materyaller: Canva, Genially, Google \nSlides, H5P\nSüre: 90 dakika\nDeğerlendirme Yöntemi: Hazırlanan materyalin \netkileşim düzeyi, hedefe uygunluğu ve \nyaratıcılığı üzerinden rubrik değerlendirmesi.\nDiğer Detaylar: Öğrencilerin grup halinde \nçalışarak analiz ve tasarım yapmasını sağla.\nEtkileşimli dijital araçların kullanımını teşvik et.\nGünlük yaşamla bağlantılı örnekler sun ve süreç \nsonunda geri bildirim ver.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n102"}, {"page": 103, "text": "5.3. Araştırma ve Veri Analizi\nAraştırma ve veri analizi süreçleri, bilimsel çalışmalardan akademik projelere, pazar araştırmalarından eğitim içeriklerine kadar \ngeniş bir yelpazede kritik bir rol oynar. Yapay zekâ destekli araçlar, bu süreçleri hızlandırarak veri toplama, analiz etme, yorum -\nlama ve görselleştirme aşamalarında kullanıcılarına güçlü çözümler sunar.\nÖğrenciler ve akademisyenler için literatür tarama ve özetleme, araştırma soruları geliştirme ve akademik kaynak önerileri \nsunma gibi işlevler, yapay zekâ sayesinde daha verimli hâle gelmektedir. Aynı zamanda anket ve araştırma tasarımı, veri analizi \nve yorumlama gibi süreçler, yapay zekâ ile kolaylaştırılarak daha doğru ve detaylı sonuçlar elde edilmesini sağlar.\nBu bölümde, yapay zekânın araştırma süreçlerindeki kullanım alanlarını, veri analizi yöntemlerini ve bilimsel araştırmalarda \nnasıl daha etkili kullanılabileceğini inceleyeceğiz. \nNot: Bu kitapta yer alan yapay zekâ araçları zamanla değişebilir. Güncellenen ve yeni eklenen araçlar için üretici web sitele -\nrinden bilgi alabilirsiniz.\nAnket ve Araştırma Tasarımı\nYapay zekâ, araştırma amacı için uygun \nanket soruları ve yöntemler önerir.Literatür Tarama ve Özetleme\nYapay zekâ, önemli çalışmaları \nözetleyerek konuya genel bir bakış sunar.Veri Görselleştirme\nYapay zekâ, analiz sonuçlarını graﬁk ve \ntablolarla kolay anlaşılır şekilde sunar.\nAkademik Araştırma İçin \nKaynak Önerileri\nYapay zekâ, ilgili akademik makale ve \nkaynak önerileri sunar.Araştırma Soruları Geliştirme\nYapay zekâ, belirli bir konu için anlamlı \naraştırma soruları oluşturur.Veri Analizi ve Yorumlama\nYapay zekâ, verileri analiz ederek detaylı \nraporlar oluşturur.\nKaynakların Güvenilirliğini Değerlendirme\nYapay zekâ, akademik veya bilimsel kaynakların güvenilirliğini analiz \nederek araştırmacılara rehberlik edebilir.Otomatik Alıntı ve Kaynakça Oluşturma\nYapay zekâ, araştırma makaleleri ve tezler için otomatik kaynakça \noluşturabilir ve alıntı formatlarını belirleyebilir.\nVeri Seti Oluşturma ve Temizleme\nYapay zekâ, araştırmalar için yeni veri setleri oluşturabilir ve hatalı \nverileri düzelterek analiz süreçlerini daha sağlıklı hale getirebilir.Çoklu Kaynaktan Bilgi Harmanlama\nYapay zekâ, farklı akademik çalışmalardan ve veri kaynaklarından elde \nedilen bilgileri anlamlı bir şekilde birleştirerek kullanıcıya sunabilir.\n103\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 104, "text": "¬ Akademik Mentorluk: Öğretmenler, öğrencilerin literatür \ninceleme becerilerini geliştirmek için Research Rabbit’i \nbir rehber olarak kullanabilir.\n ¬ Kaynakların Görselleştirilmesi: Konular arasındaki bağ -\nlantıları haritalandırarak, öğrencilerin karmaşık bilgileri \ndaha iyi anlamalarını sağlar.\nResearch Rabbit, akademik araştırma ve literatür incelemesi \niçin vazgeçilmez bir araçtır. Öğrencilerin ve öğretmenlerin ça -\nlışmalarını organize etmelerine, bilgiye daha hızlı ulaşmalarına \nve daha etkili bir şekilde öğrenmelerine yardımcı olur. 5.3.1. Araştırma ve Veri Analizinde Kullanılacak YZ \nAraçları\nResearch Rabbit:\nTanım: akademik araştırma ve literatür inceleme süreçlerini \nkolaylaştıran yapay zekâ destekli bir araştırma platformudur. \nAraştırmacılara, akademisyenlere ve öğrencilere kapsamlı \nkaynaklara erişim, görsel bağlantılar kurma ve literatür takibi \nyapma konusunda yardımcı olur. \nTemel Özellikler:\n ¬ Görsel Literatür Haritaları: Araştırma konularıyla ilgili ma -\nkaleler ve kaynaklar arasında görsel bağlantılar oluşturur.\n ¬ Kapsamlı Veri Tabanı: Akademik dergiler, makaleler ve \nkaynakları tarayarak kullanıcıya özel öneriler sunar.\n ¬ Kişiselleştirilmiş Tavsiyeler: Araştırma geçmişine ve ilgilere \nbağlı olarak yeni kaynaklar önerir.\n ¬ İş Birliği Araçları: Araştırma ekiplerinin ortak çalışma \nyapmasını kolaylaştırır.\n ¬ Sürekli Güncellemeler: İlgili alanlardaki en son yayınlanan \nçalışmalar hakkında düzenli bildirimler sağlar.\nEğitimde Kullanımı:\n ¬ Literatür İncelemesi: Öğrenciler ve öğretmenler, proje -\nlerinde veya araştırmalarında gerekli kaynakları hızlıca \nbulabilir ve analiz edebilir.\n ¬ Araştırma Yönetimi: Araştırma süreçlerini düzenlemek, \nkaynakları saklamak ve bağlantıları görselleştirmek için \nkullanılabilir.\n ¬ Proje Geliştirme: İlgili konuların derinlemesine analizini \nyaparak, öğrencilerin projelerini daha iyi yapılandırmasına \nyardımcı olur.\nConnected Papers:\nTanım: Araştırmacılar, akademisyenler ve öğrenciler için literatür \ntarama sürecini kolaylaştıran bir araçtır. Bu platform, seçilen \nbir akademik makale etrafında bağlantılı makaleleri görselleş -\ntirerek, kullanıcıların ilgili kaynakları kolayca bulmalarını sağlar. \nAraştırma konularını derinlemesine anlamak ve kapsamlı bir \nliteratür incelemesi yapmak için kullanılır. \nTemel Özellikler:\n ¬ Görsel Literatür Haritası: Belirli bir makale etrafında bağ -\nlantılı çalışmaların görsel bir haritasını oluşturur.\n ¬ Bağlantı Keşfi: Seçilen makalenin öncesinde ve sonrasında \nyayınlanan, bağlantılı diğer çalışmaların keşfedilmesini \nsağlar.\n ¬ Etkileşimli Harita: Kullanıcılar, makaleler arasındaki ilişkileri \netkileşimli bir harita üzerinden görebilir.\n ¬ Kapsamlı Veri Tabanı: Akademik makalelerden geniş bir \nkaynak yelpazesine erişim sunar.\n ¬ Kolay Erişim: Bağlantılı makalelere kolayca erişim sağlar \nve tam metin bağlantıları sunar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n104"}, {"page": 105, "text": "Eğitimde Kullanımı:\n ¬ Literatür Tarama: Öğrenciler ve akademisyenler, araştırma \nkonularında kapsamlı ve hızlı literatür incelemesi yapabilir.\n ¬ Bağlantılı Kaynak Bulma: Öğrenciler, bir makalenin dayan -\ndığı çalışmalar ve onu takip eden kaynakları keşfederek \nkonuyu daha geniş bir perspektifle inceleyebilir.\n ¬ Araştırma Projeleri: Araştırma projelerinde, bağlantılı ma -\nkaleleri keşfederek kapsamlı bir teorik çerçeve oluşturabilir.\n ¬ Öğretim Materyalleri Hazırlama: Öğretmenler, belirli bir \nkonuda bağlantılı kaynaklardan faydalanarak ders ma -\nteryalleri hazırlayabilir.\n ¬ Kaynakların Görselleştirilmesi: Öğrenciler, görsel literatür \nharitalarını kullanarak, konular arasındaki ilişkileri daha \niyi kavrayabilir.\nConnected Papers, akademik çalışmalar için etkili bir araç olup, \naraştırma süreçlerini görsel ve anlaşılır bir şekilde organize \netmeye yardımcı olur.  ¬ Anket Sorusu Çeşitleri: Çoktan seçmeli, derecelendirme \nölçekleri, açık uçlu sorular gibi farklı soru türlerini destekler.\n ¬ Gerçek Zamanlı Geri Bildirim: Anket sonuçları anlık olarak \ngörüntülenebilir ve analiz edilebilir.\nEğitimde Kullanımı:\n ¬ Öğrenci Geri Bildirimi: Öğrencilerin ders, öğretim yönte -\nmi veya materyaller hakkında geri bildirim sağlamasını \nkolaylaştırır.\n ¬ Öğretim Etkinlikleri: Eğitimde kullanılan yöntemlerin et -\nkinliğini değerlendirmek için kullanılabilir.\n ¬ Velilerden Geri Bildirim: Velilerden eğitim süreçleriyle ilgili \ngörüş ve öneriler toplamak için anketler oluşturulabilir.\n ¬ Araştırma Projeleri: Öğrenciler ve öğretmenler, araştırma \nprojeleri için veri toplama amacıyla anketler düzenleyebilir.\n ¬ Kapsayıcı Katılım: Okul topluluğunun genel memnuni -\nyetini ölçmek ve katılımcıların görüşlerini toplamak için \nkullanılabilir.\nSurveyMonkey, kullanıcı dostu arayüzü ve geniş özellik yel -\npazesiyle eğitim ortamlarında anket oluşturma ve sonuçları \ndeğerlendirme süreçlerini kolaylaştırır.\nSurveyMonkey: \nTanım: Kullanıcıların hızlı ve kolay bir şekilde anket oluştur -\nmasını, dağıtmasını ve sonuçları analiz etmesini sağlayan bir \nçevrim içi anket platformudur. Eğitimden iş dünyasına kadar \ngeniş bir kullanım alanı sunar. \nTemel Özellikler:\n ¬ Özelleştirilebilir Anket Şablonları: Kullanıcılar için hazır \nşablonlar ve özelleştirme seçenekleri sunar.\n ¬ Gelişmiş Analitik: Anket sonuçlarını analiz etmek için \nkapsamlı raporlama araçları sağlar.\n ¬ Çoklu Dağıtım Kanalları: Anketlerin e-posta, sosyal medya \nveya doğrudan bağlantı ile paylaşılmasına olanak tanır.Zotero: \nTanım: Araştırmacılar, öğrenciler ve akademisyenler için \ntasarlanmış bir referans yönetim aracıdır. Kaynak toplama, \ndüzenleme ve bibliyografi oluşturma süreçlerini kolaylaştırır. \nAraştırma sürecinde zaman kazandıran ve verimliliği artıran \nbir platformdur. \nTemel Özellikler:\n ¬ Kaynak Yönetimi: Farklı formatlardaki (kitap, makale, web \nsitesi vb.) kaynakları toplar ve organize eder.\n105\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 106, "text": "¬ Tarayıcı Entegrasyonu: Tek bir tıklamayla çevrim içi kay -\nnakları kütüphaneye ekleyebilir.\n ¬ Bibliyografi ve Atıf Oluşturma: Farklı atıf stillerinde (APA, \nMLA, Chicago vb.) otomatik olarak bibliyografi ve atıflar \noluşturur.\n ¬ Bulut Depolama: Kaynakları çevrim içi depolayarak farklı \ncihazlardan erişim sağlar.\n ¬ Ekip Çalışması: Araştırma ekipleriyle kaynakları paylaşma \nve ortak çalışma yapma imkânı sunar.\nEğitimde Kullanımı:\n ¬ Araştırma ve Proje Hazırlığı: Öğrenciler ve öğretmenler, \naraştırma projelerinde kaynakları toplamak ve organize \netmek için kullanabilir.\n ¬ Akademik Yazım: Tez, makale ve araştırma raporlarında \nhızlı ve doğru bibliyografi oluşturmayı sağlar.\n ¬ Kaynak Takibi: Ders materyalleri ve referansları düzenli \nbir şekilde saklayarak kolay erişim sunar.\n ¬ Eğitim Materyali Hazırlama: Öğretmenler, ders içeriklerini \nhazırlarken kullandıkları kaynakları yönetmek için Zote -\nro’yu kullanabilir.\n ¬ Literatür İncelemesi: Araştırmalarda kullanılan kaynakların \nbağlantılı ve düzenli bir şekilde incelenmesine olanak tanır.\nZotero, araştırma ve yazım süreçlerini kolaylaştırarak akademik \nçalışmaları daha düzenli ve etkili bir hâle getirir.Temel Özellikler:\n ¬ Etkileşimli Arayüz: Kullanıcı deneyimini artıran dinamik \nve sezgisel bir form yapısı sunar.\n ¬ Farklı Soru Türleri: Açık uçlu sorular, çoktan seçmeli, sı -\nralama ve derecelendirme gibi birçok farklı soru formatını \ndestekler.\n ¬ Kişiselleştirme: Formlar, renk, tema ve yazı tipleriyle \nözelleştirilebilir.\n ¬ Entegre Analitik: Toplanan yanıtları analiz etmek ve ra -\nporlamak için güçlü araçlar sağlar.\n ¬ Çoklu Platform Desteği: Anketler, e-posta, sosyal medya \nveya web siteleri üzerinden kolayca paylaşılabilir.\nEğitimde Kullanımı:\n ¬ Sınav ve Test Hazırlığı: Öğrenciler için eğlenceli ve interaktif \nsınavlar veya değerlendirmeler oluşturulabilir.\n ¬ Öğrenci Geri Bildirimi: Öğrencilerin dersler, öğretim yön -\ntemleri veya materyaller hakkındaki görüşlerini toplamak \niçin kullanılabilir.\n ¬ Anketler: Öğrencilerin, velilerin veya öğretmenlerin belirli \nkonulardaki düşüncelerini öğrenmek için etkili bir araçtır.\n ¬ Eğitim Etkinlikleri: Sınıf içi veya dışı etkinlikler için bilgi \ntoplamak veya planlama yapmak amacıyla kullanılabilir.\n ¬ Öğrenme Oyunları: Oyunlaştırılmış formatlar oluşturularak, \nöğrencilerin daha fazla katılım göstermesi sağlanabilir.\nTypeform, hem öğretmenlerin hem de öğrencilerin ihtiyaçlarına \nuygun formlar ve değerlendirmeler oluşturmayı kolaylaştıran \ngüçlü bir platformdur.\nTypeform: \nTanım: Kullanıcıların interaktif, görsel açıdan zengin ve kullanıcı \ndostu formlar, anketler ve testler oluşturmasını sağlayan bir \nplatformdur. Typeform, öğrenmeyi eğlenceli hâle getirmek ve \nkatılımı artırmak için eğitim alanında yaygın olarak kullanıl -\nmaktadır. \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n106"}, {"page": 107, "text": "Samwell:\nTanım: Samwell.ai, ileri düzey yapay zekâ algoritmalarıyla \nakademik ve uzun yazıları otomatik olarak oluşturabilen bir \nyazma platformudur. Özellikle öğrenciler ve akademisyenler \niçin ödev, makale veya araştırma yazılarını hızla yazma imkânı \nsunar. Yazılı içeriğe akademik alıntılar ekleyerek kaynakları \notomatik biçimde organizeler.\nTemel Özellikler:\n ¬ MLA, APA, Harvard, Chicago gibi birden çok kaynak biçimini \ndestekler ve metin içinde otomatik atıf yapar.\n ¬ Semihuman.ai teknolojisiyle entegre edilerek özgün içerik \nüretip hem intihal hem de AI algılamasına karşı kontroller \nsunar.\n ¬ Power Editor aracıyla paragraf genişletme, eleştirel dü -\nşünce uygulama ve ilave alıntı ekleme gibi gelişmiş dü -\nzenleme imkânları sağlar.\n ¬ 1000 kelimeye kadar ücretsiz kullanım sunar; premium \nplanlarda daha uzun metin desteği (15.000–200.000 \nkelime) yer alır.\n ¬ Akademik literatür, ödev, tez, araştırma özeti gibi içerik \noluşturmayı destekler.\n ¬ \"Guided papers\" özelliği ile içerik yapısı ve kaynak önerileri \nsunarak yönlendirme sağlar \nEğitimde Kullanımı:\n ¬ Öğrenciler; ödev ve makale taslaklarını hızlıca oluşturmak \niçin Samwell.ai’yi başlangıç noktası olarak kullanabilir.\n ¬ Öğretmenler, örnek akademik yazılar ya da rehber metinler \nhazırlayarak öğrencilere şablon olarak sunabilir.\n ¬ Alıntı formatlarını otomatik halledebilmesi nedeniyle \nakademik dürüstlüğü (plagiarism) destekleyici bir araç \ngörevi görebilir. ¬ Power Editor ile öğrenciler metinlerini birebir geliştirip \nanaliz ederek yazma becerilerini artırabilir.\n ¬ Guided papers sayesinde öğrenciler, araştırma sürecini \nadım adım izleyerek yapılandırılmış içerik oluşturmayı \nöğrenebilir.\n ¬ Çeşitli akademik stillerde yazım deneyimi kazanmak is -\nteyen öğrencilere pratik sağlar.\n ¬ Uzaktan eğitimde akıcı ve yapılandırılmış akademik örnekler \nile içerik zenginliği sunar.\nSamwell, eğitim süreçlerini daha etkili ve kişiselleştirilmiş bir \nşekilde yönetmek isteyen öğretmenler ve öğrenciler için güçlü \nbir araçtır. \nJotForm: \nTanım: Çevrim içi formlar ve anketler oluşturmayı kolaylaştı -\nran bir platformdur. Eğitimden iş dünyasına kadar geniş bir \nkullanım alanı sunan JotForm, öğretmenlerin ve öğrencilerin \nihtiyaçlarına yönelik esnek çözümler sağlar. \nTemel Özellikler:\n ¬ Hazır Şablonlar: Eğitim, geri bildirim, sınav ve kayıt formları \niçin kullanıma hazır şablonlar sunar.\n ¬ Sürükle ve Bırak Arayüz: Kullanıcıların kolayca form oluş -\nturmasını sağlar.\n ¬ Çoklu Soru Türleri: Açık uçlu, çoktan seçmeli, sıralama \ngibi farklı soru formatlarını destekler.\n ¬ Entegrasyonlar:  Google Sheets, Slack gibi birçok platformla \nentegre çalışabilir.\n ¬ Analiz ve Raporlama: Formlardan toplanan verileri detaylı \nbir şekilde analiz eder ve raporlar oluşturur.\nEğitimde Kullanımı:\n ¬ Kayıt ve Katılım: Öğrenci ve veli kayıtlarını almak için \nformlar hazırlanabilir.\n107\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 108, "text": "¬ Sınav ve Değerlendirme: Öğrenciler için sınavlar ve de -\nğerlendirme formları oluşturulabilir.\n ¬ Öğrenci Geri Bildirimi: Dersler veya etkinliklerle ilgili geri \nbildirim toplamak için kullanılabilir.\n ¬ Öğretmen Değerlendirmesi: Öğrencilerden öğretim yön -\ntemleri hakkında görüş toplamak için kullanılabilir.\n ¬ Etkinlik Planlama: Okul etkinlikleri veya projeler için bilgi \ntoplama ve planlama yapılabilir. ¬ Kaynakların Organize Edilmesi: Eğitim materyalleri ve \nliteratür taraması için kaynakları bir araya getirmek ve \ndüzenlemek için kullanılabilir.\n ¬ Öğrenci Projeleri: Öğrenciler, grup projeleri sırasında kaynak \npaylaşımı ve iş birliği yapabilir.\n ¬ Akademik İş Birliği: Akademik ağ aracılığıyla ilgili kaynaklar \nkeşfedilebilir ve araştırma gruplarıyla iletişim kurulabilir.\nJotForm ve Mendeley, eğitimde hem operasyonel hem de \nakademik süreçleri kolaylaştıran etkili araçlardır. \nMendeley:\nTanım: Araştırmacılar ve öğrenciler için tasarlanmış bir referans \nyönetim ve akademik sosyal ağ platformudur. Kaynakları dü -\nzenleme, atıf yapma ve akademik iş birliği gibi özellikler sunar. \nTemel Özellikler:\n ¬ Referans Yönetimi:  Makale, kitap ve diğer kaynakları toplar, \ndüzenler ve organize eder.\n ¬ Atıf ve Bibliyografi Oluşturma: Farklı atıf stillerinde (APA, \nMLA, Chicago vb.) otomatik atıf yapma ve bibliyografi  \noluşturma.\n ¬ PDF Okuyucu ve Not Alma: PDF belgelerine notlar ekleme \nve vurgulama yapma imkânı sunar.\n ¬ Ekip Çalışması: Araştırma grupları için kaynak paylaşımı \nve ortak çalışma özellikleri sağlar.\n ¬ Akademik Sosyal Ağ: Araştırmacılar ve akademisyenlerle \nbağlantı kurmayı ve yeni kaynaklar keşfetmeyi sağlar.\nEğitimde Kullanımı:\n ¬ Araştırma ve Literatür Tarama: Öğrenciler ve akademis -\nyenler, araştırma projeleri için kaynakları yönetebilir.\n ¬ Tez ve Makale Yazımı: Referansları düzenleyerek hızlı ve \ndoğru bibliyografya oluşturulabilir.Tableau:\nTanım:  Görselleştirme odaklı bir veri analizi ve iş zekâsı aracıdır. \nBüyük veri setlerini görselleştirerek anlaşılabilir grafikler ve \nraporlar oluşturmayı sağlar. Eğitimde, öğretmenlerin ve öğ -\nrencilerin veri analizi ve görselleştirme süreçlerini kolaylaştırır. \nTemel Özellikler:\n ¬ Dinamik Veri Görselleştirme: Karmaşık veri setlerini et -\nkileşimli grafiklere, haritalara ve panolara dönüştürür.\n ¬ Veri Kaynağı Entegrasyonu: Çeşitli veri kaynaklarından \n(Excel, SQL, Google Sheets vb.) kolayca veri çekebilir.\n ¬ Gerçek Zamanlı Veri Analizi: Veriler üzerinde anlık analiz \nve raporlama yapılabilir.\n ¬ Paylaşım ve İş Birliği: Görselleştirmeler kolayca paylaşı -\nlabilir ve ekiplerle birlikte çalışılabilir.\nEğitimde Kullanımı:\n ¬ Öğrenci Performans Analizi: Öğretmenler, öğrencilerin \nbaşarı ve katılım verilerini görselleştirerek değerlendirme \nyapabilir.\n ¬ Veri Temelli Projeler: Öğrenciler, veri analizi projeleri için \nTableau’yu kullanabilir.\n ¬ Araştırma Görselleştirmesi: Akademik araştırma sonuç -\nlarını görselleştirmek için kullanılabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n108"}, {"page": 109, "text": "Power BI:\nTanım: Microsoft tarafından geliştirilmiş, görselleştirme ve iş \nzekâsı özellikleri sunan bir veri analizi platformudur. Eğitimde \nverilerin analiz edilmesi ve sunulması süreçlerini hızlandırır \nve etkili hâle getirir. \nTemel Özellikler:\n ¬ Veri Modelleme: Çeşitli veri kaynaklarından toplanan ve -\nrilerle karmaşık analizler yapılabilir.\n ¬ Etkileşimli Panolar: Kullanıcı dostu arayüzüyle veriler in -\nteraktif raporlar ve panolarla sunulabilir.\n ¬ Otomatik Güncellemeler: Bağlantılı veri kaynaklarından \ngelen veriler otomatik olarak güncellenir.\n ¬ Paylaşım Özellikleri: Raporlar ve görselleştirmeler kolayca \npaylaşılabilir ve erişilebilir.\nEğitimde Kullanımı:\n ¬ Sınıf Verileri Analizi: Öğretmenler, öğrenci verilerini analiz \nederek güçlü ve zayıf yönleri belirleyebilir.\n ¬ Okul Performansı Takibi: Yönetim, okul genelindeki başarı \noranlarını ve gelişim alanlarını görselleştirebilir.\n ¬ Araştırma ve Sunumlar: Akademik araştırma sonuçlarını \ngörselleştirip sunumlar için kullanabilir.Datawrapper:\nTanım: Hızlı ve etkili veri görselleştirme için tasarlanmış bir \naraçtır. Kullanıcılar, verileri interaktif grafikler, haritalar ve \ntablolar olarak sunabilir. Eğitimde, öğretmenler ve öğrenciler \niçin kullanıcı dostu bir veri görselleştirme platformudur. \nTemel Özellikler:\n ¬ Basit Kullanım: Teknik bilgiye ihtiyaç duymadan veri gör -\nselleştirme yapılabilir.\n ¬ Çeşitli Grafik Türleri: Çubuk grafikler, çizgi grafikler, ha -\nritalar ve daha fazlasını destekler.\n ¬ Etkileşimli Haritalar: Coğrafi verileri görselleştirmek için \nharitalar oluşturulabilir.\n ¬ Kolay Entegrasyon: Veriler kolayca yüklenebilir ve gör -\nselleştirmeler kolayca paylaşılabilir.\nEğitimde Kullanımı:\n ¬ Veri Analizi Projeleri: Öğrenciler, araştırma projelerinde \nDatawrapper kullanarak verileri görselleştirebilir.\n ¬ Coğrafya ve Sosyal Bilimler: Haritalar oluşturarak coğrafi \nveya tarihsel verileri etkili bir şekilde sunabilir.\n ¬ Etkileşimli Ders İçerikleri: Öğretmenler, veri temelli ders \nmateryalleri oluşturabilir.\n109\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 110, "text": "Gemini:\nTanım: Google tarafından geliştirilen, metin, görsel, ses ve \nkod girdilerini anlayabilen çok modlu yapay zekâ asistanıdır. \nÖzellikle bilgiye dayalı sorgular, yazı üretimi, analiz, özetleme, \nkodlama ve içerik üretimi gibi görevlerde kullanılmak üzere \ntasarlanmıştır. Google Workspace (Docs, Sheets, Slides) ile \nentegre çalışabilir ve doğrudan belge oluşturabilir veya içerik \ndüzenleyebilir.\nTemel Özellikler:\n ¬ Metin üretimi, analiz, özetleme, yeniden yazma, çeviri gibi \ndoğal dil işleme görevlerinde yüksek doğrulukla çalışır.\n ¬ Görselleri tanıma, açıklama ve görselden metne çıkarım \nyapma becerisine sahiptir (çok modlu yapay zekâ).\n ¬ Kod üretimi ve hata ayıklama desteği sağlar (Python, Ja -\nvaScript, HTML/CSS vb.).\n ¬ Google Workspace ile entegre şekilde belge oluşturabilir, \notomatik olarak sunum slaytı hazırlayabilir.\n ¬ Güncel internet bilgilerine erişim sağlayarak gerçek za -\nmanlı verilerle çalışma yeteneğine sahiptir.\n ¬ Kendi içinde kaynakça gösterme ve açıklamalı içerik üret -\nme özelliği sunar (özellikle araştırma amaçlı kullanımlar \niçin faydalıdır)..\nEğitimde Kullanımı:\n ¬ Öğrenciler, araştırma ödevleri için taslak, içerik ve kay -\nnakça oluşturabilirler.\n ¬ Öğretmenler, ders planları, açıklayıcı metinler, quiz’ler ve \nöğretim materyalleri hazırlayabilir.\n ¬ Görsel içerikleri yorumlayarak derslerde analitik düşünmeyi \ngeliştiren aktiviteler oluşturulabilir.\n ¬ Kodlama eğitimlerinde örnek kod üretimi ve hata çözüm -\nleme desteği sağlanabilir. ¬ Anlık bilgiye erişim sayesinde güncel konular üzerine ders \niçerikleri hazırlanabilir.\n ¬ Sunum, afiş, broşür gibi yaratıcı ürünlerin içerikleri hızlı \nşekilde üretilebilir.\n ¬ Dil eğitimi, yazı düzeltme ve farklı tarzlarda metin yazma \nbecerilerinin gelişimini destekler.\n ¬ Öğrenciler için yazılı sınavlara hazırlıkta soru çözümü, \naçıklamalı yanıt üretimi sağlar.\nScispace : \nTanım: SciSpace (eski adıyla Typeset), akademik makaleleri \nanlamayı, analiz etmeyi ve düzenlemeyi kolaylaştıran yapay \nzekâ destekli bir platformdur. Bilimsel metinleri açıklayan, \nreferansları yöneten ve kullanıcıya özgün içerik üretiminde \ndestek olan bir araçtır. Özellikle akademisyenler, öğrenciler ve \naraştırmacılar için bilgiye hızlı erişim ve içerik üretimi sağlar.\nTemel Özellikler:\n ¬ PDF dosyalarına yüklenen akademik makaleleri satır satır \nanaliz eder ve anlamlarını sade bir dille açıklar.\n ¬ Bilinmeyen teknik terim, formül ya da istatistiksel ifade -\nlerin yanına açıklamalar ekleyerek anlamayı kolaylaştırır.\n ¬ Otomatik alıntı üretme (APA, MLA, Chicago, vb.) ve referans \nyönetimi araçları sunar.\n ¬ Kaynakça oluşturma ve biçimlendirme için gelişmiş bir \nreferans yöneticisi içerir.\n ¬ ChatPDF benzeri yapısıyla, makalelerle konuşma (so -\nru-cevap) modunda çalışabilir.\n ¬ Web tabanlıdır, yükleme veya kurulum gerektirmez; kul -\nlanıcı dostu bir arayüze sahiptir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n110"}, {"page": 111, "text": "Eğitimde Kullanımı:\n ¬ Öğrenciler, bilimsel makaleleri daha kolay anlayabilir, \nkavramları sade açıklamalarla öğrenebilir.\n ¬ Öğretmenler ve akademisyenler, karmaşık metinleri sa -\ndeleştirerek öğrenciler için erişilebilir içerikler hazırlayabilir.\n ¬ Literatür taraması sırasında önemli makaleleri analiz \netmek ve karşılaştırmak için zaman kazandırır.\n ¬ Akademik yazım sürecinde doğru alıntı ve referans bi -\nçimlerini hızlıca oluşturur.\n ¬ Öğrencilere “bilimsel düşünceyi” öğrenme ve kavramsal \nanlama becerilerini geliştirme fırsatı sunar.\n ¬ Eleştirel okuma becerilerini geliştirmek amacıyla interaktif \nPDF okuma modunda sorular üretilebilir.\n ¬ Tez yazımı veya ödev hazırlığında destekleyici bir araç \nolarak kullanılabilir. ¬ Anlamlı bir özet sunmakla kalmaz, araştırmaların yönünü \n(pozitif, negatif, kararsız) istatistiksel olarak da belirtir.\n ¬ Sade arayüzü ile herkesin erişebileceği kullanıcı dostu bir \nakademik bilgi motorudur.\nEğitimde Kullanımı:\n ¬ Öğrenciler, araştırma ödevleri için kanıta dayalı yanıtlar \nalarak daha güvenilir içerikler oluşturabilir.\n ¬ Akademik yazı yazanlar, literatürdeki güncel eğilimleri \nanlamak ve doğru referanslara ulaşmak için kullanabilir.\n ¬ Öğretmenler, ders anlatımlarında bilimsel bilgiye dayalı \naçıklamalar sunabilir.\n ¬ Eleştirel düşünme ve bilimsel okuryazarlık gelişimi için \nöğrencilere “farklı sonuçları karşılaştırma” imkânı sunar.\n ¬ Zaman tasarrufu sağlar; yüzlerce makale okumadan önce \nözet bulgulara erişim imkânı verir.\n ¬ Bilimsel iddiaların doğruluğunu kontrol etmek isteyen \neğitimciler ve araştırmacılar için etkili bir araçtır.\nConsensus: \nTanım: bilimsel makaleleri yapay zekâ ile tarayarak kullanı -\ncıların sorduğu sorulara doğrudan araştırma temelli yanıtlar \nsunan bir arama motorudur. “Araştırmalar ne diyor?” sorusuna \nodaklanan bu araç, kullanıcıya kısa özetler, ana bulgular ve \nkaynaklı cevaplar sunar. Özellikle akademik kararlar, bilim -\nsel araştırmalar ve kanıta dayalı bilgiye ihtiyaç duyanlar için \ngeliştirilmiştir.\nTemel Özellikler:\n ¬ Kullanıcıların doğal dilde yazdığı soruları alır ve binlerce \nbilimsel makaleyi analiz ederek yanıtlar üretir.\n ¬ Her cevabın altında hangi makaleden alındığı, sonuçların \nortaklaştığı veya çeliştiği gösterilir.\n ¬ Sadece güvenilir ve hakemli bilimsel yayınları temel alır (Pu -\nbMed, Semantic Scholar gibi veri tabanlarıyla entegredir).Scite:\nTanım: Scite, bilimsel makalelerde geçen atıfları bağlamsal \nolarak analiz eden bir yapay zekâ destekli araştırma aracıdır. \nSadece bir makalenin kaç kez atıf aldığını değil, bu atıfların \ndestekleyici, çelişkili veya nötr olup olmadığını gösterir. Böylece \nsadece sayısal atıf değil, atıf kalitesi hakkında da bilgi sunar.\nTemel Özellikler:\n ¬ Makaleye yapılan her atıfın bağlamını gösterir ve ilgili \ncümleyi alıntılar.\n ¬ Atıfları “destekliyor”, “çelişiyor” veya “nötr” olarak etiketler.\n ¬ Bilimsel iddiaların güvenilirliğini hızlıca değerlendirme \nimkânı sağlar.\n111\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 112, "text": "¬ Literatür haritalama, trend analizi ve alana özgü tartış -\nmaları görselleştirir.\n ¬ Chrome uzantısıyla Google Scholar, PubMed gibi sitelerde \nentegrasyon sunar.\nEğitimde Kullanımı:\n ¬ Öğrenciler ve araştırmacılar bir makalenin bilim dünya -\nsında nasıl karşılandığını anlayabilir.\n ¬ Öğretmenler kaynak güvenilirliğini analiz etmek ve öğ -\nrencilere eleştirel kaynak değerlendirme öğretmek için \nkullanabilir.\n ¬ Tez yazımında, kaynak seçiminde sadece atıf sayısı değil, \nnitel atıf bilgisiyle daha bilinçli tercihler yapılabilir.\n ¬ Bilimsel tartışmaların yönünü (destek/karşıt) anlamaya \nyarayan etkili bir araçtır. Research Kick:\nTanım: Araştırma ve literatür tarama süreçlerini organize etmek \niçin tasarlanmış bir platformdur.\nTemel Özellikler:\n ¬ Organize Araştırma Süreci: Kaynakları düzenli bir şekilde \norganize etme.\n ¬ Kapsamlı Veri Tabanı: İlgili akademik makalelere erişim \nsağlar.\nEğitimde Kullanımı:\n ¬ Araştırma Yönetimi: Öğrenciler ve öğretmenler için kay -\nnakları düzenleme ve takip etme aracı.\nCrossref: \nTanım: Akademik içeriklerin kolayca bulunmasını ve atıf ya -\npılmasını sağlayan bir sistemdir.\nTemel Özellikler:\n ¬ DOI Atama: Dijital nesne tanımlayıcıları (DOI) aracılığıyla \nkaynaklara kolay erişim sağlar.\n ¬ Meta Veri Yönetimi: Yayınların meta verilerini organize eder.\nEğitimde Kullanımı:\n ¬ Kaynak Takibi: Akademik çalışmaların doğruluğunu ve \nizlenebilirliğini artırır.\n ¬ Atıf Yönetimi: Kaynaklara hızlıca erişim sağlar.Scinapse:\nTanım: Akademik makaleleri keşfetmek ve takip etmek için \nkullanılan bir araştırma platformudur.\nTemel Özellikler:\n ¬ Hızlı Makale Erişimi: Araştırma konularıyla ilgili makaleleri \nönerir.\n ¬ Atıf Takibi: Kaynakların akademik etkisini izler.\nEğitimde Kullanımı:\n ¬ Literatür Tarama: Hızlı ve etkili literatür tarama süreçleri \niçin kullanılabilir.\n ¬ Kaynak Analizi: Kaynakların alıntı performansını analiz eder.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n112"}, {"page": 113, "text": "Elicit:\nTanım: Yapay zekâ destekli bir literatür tarama ve araştırma \nplatformudur.\nTemel Özellikler:\n ¬ Araştırma Soru Yanıtı: Belirli araştırma sorularına uygun \nkaynakları önerir.\n ¬ Veri Analizi: Araştırma bulgularını analiz eder.\nEğitimde Kullanımı:\n ¬ Soru Tabanlı Araştırma: Öğrenciler için spesifik araştırma \nsoruları üzerinden kaynak önerisi sunar.\n ¬ Hızlı Bilgi Edinimi: Araştırma projelerinde zaman kazandırır.Litmaps:\nTanım: Akademik literatür taraması ve bağlantılı araştırma \nalanlarını görselleştirme için kullanılan bir platformdur. Araştır -\nmacıların ilgilendikleri konularda yayımlanan makaleleri takip \netmelerine ve bu makaleler arasındaki bağlantıları keşfetme -\nlerine olanak tanır. \nTemel Özellikler:\n ¬ Dinamik Literatür Haritaları: Seçilen bir araştırma alanıyla \nilgili makaleleri ve bu makalelerin birbirleriyle bağlantılarını \ngörsel olarak haritalandırır.\n ¬ Özelleştirilmiş Bildirimler: Yeni yayınlanan makaleler ve \ngüncellemeler hakkında kullanıcıları bilgilendirir.\n ¬ Bağlantı Analizi: Makalelerin atıflarını analiz ederek ilişkileri \nve gelişim yollarını ortaya koyar.\n ¬ Kapsamlı Veri Tabanı: Akademik makalelerden oluşan \ngeniş bir koleksiyona erişim sunar.\n ¬ Kolay Paylaşım: Araştırma haritaları ekiplerle paylaşılabilir \nve ortak projeler için kullanılabilir.\nEğitimde Kullanımı:\n ¬ Araştırma ve Literatür Tarama:  Öğrenciler ve akademisyen -\nler, araştırma projeleri için ilgili kaynakları kolayca bulabilir \nve bağlantılı alanları keşfedebilir.\n ¬ Görselleştirilmiş Literatür İncelemesi: Araştırma konu -\nlarının geçmişini ve gelişim yollarını görsel bir şekilde \nincelemek için idealdir.\n ¬ Kaynakların Takibi: İlgili konulardaki yeni yayınları düzenli \nolarak takip etmek için kullanılabilir.\n ¬ Proje Yönetimi: Araştırma ekipleri için, projelerde kullanılan \nkaynakların organize edilmesine ve görselleştirilmesine \nyardımcı olur.\nIris AI:\nTanım: Akademik literatür tarama ve analiz süreçlerini kolay -\nlaştıran bir platformdur.\nTemel Özellikler:\n ¬ Konsept Tabanlı Tarama: Araştırma sorularına göre kay -\nnakları kavramsal olarak tarar.\n ¬ Makale Analizi: Bilimsel makaleleri analiz eder ve özetler.\nEğitimde Kullanımı:\n ¬ Araştırma Projeleri: Öğrencilerin proje konularıyla ilgili \nliteratürü taramasını sağlar.\n ¬ Literatür Özetleme: Akademik kaynakları özetleyerek \nzaman kazandırır.\nBu araçlar, akademik araştırma ve eğitim süreçlerini daha \netkili ve verimli bir şekilde yönetmek için idealdir. \n113\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 114, "text": "¬ Eğitim Materyalleri: Öğretmenler, öğrencilerin daha iyi \nanlaması için konular arası bağlantıları haritalandırarak \nders materyalleri hazırlayabilir.\nLitmaps, akademik araştırmaların görselleştirilmesi ve or -\nganize edilmesi için güçlü bir araçtır. Araştırma süreçlerini \nhızlandırmak ve daha kapsamlı bir literatür taraması yapmak \nisteyenler için etkili bir çözümdür.  ¬ Akademik okuryazarlık becerilerini geliştirmek isteyen \nöğrenciler için mükemmel bir “okuma destek aracı”dır.\n ¬ Flashcard tarzı sunumlarıyla sınav öncesi tekrarlar ve \nönemli bilgiler için etkili öğrenme sağlar.\nScholarcy:\nTanım: Scholarcy, uzun akademik makaleleri, raporları veya \nkitap bölümlerini otomatik olarak özetleyen bir yapay zekâ \ntabanlı okuma-asistanıdır. Kullanıcının yüklediği PDF ya da \nURL üzerinden içerikleri analiz ederek özet, önemli noktalar, \nreferanslar ve sorular üretir.\nTemel Özellikler:\n ¬ Akademik makaleleri birkaç saniye içinde kısa özetler \nhâline getirir.\n ¬ Anahtar kavramlar, tablolar, grafikler ve referansları ayıklar.\n ¬ “Flashcard” formatında içerik sunarak hızlı tekrar ve öğ -\nrenme kolaylığı sağlar.\n ¬ Alıntı yapılan çalışmaları otomatik listeler ve dışa akta -\nrılabilir kaynakça sunar.\n ¬ API ve Chrome eklentisi ile doğrudan web'deki akademik \nmetinleri özetleyebilir.\nEğitimde Kullanımı:\n ¬ Öğrenciler zaman kaybetmeden akademik metinlerin \nözünü anlayabilir.\n ¬ Öğretmenler ders hazırlığında kullanabilecekleri literatürün \nana hatlarını hızla çıkarabilir.\n ¬ Tez yazımında çok sayıda kaynak tarayan araştırmacılar \niçin ciddi zaman kazandırır.ReadCube: \nReadCube, akademik makalelere erişim, organizasyon ve analiz \nsunan bir referans yönetim platformudur. Özellikle akademik \nkütüphanelerle entegre çalışır. \nTemel Özellikler:\n ¬ PDF Yönetimi: Makaleler üzerinde not alma ve vurgulama \nimkânı.\n ¬ Akademik Kütüphane Entegrasyonu: Birçok akademik \nveri tabanına erişim sağlar.\n ¬ Akıllı Arama: İlgili makaleleri önerir ve düzenler.\nEğitimde Kullanımı:\n ¬ Referans yönetimi ve literatür taraması.\n ¬ Akademik projeler için kaynak organizasyonu.\nRecite: \nTanım: Akademik çalışmalarda kullanılan referansların doğ -\nruluğunu kontrol eden bir araçtır. \nTemel Özellikler:\n ¬ Atıf Doğrulama: Makalelerde kullanılan referansların doğ -\nruluğunu kontrol eder.\n ¬ Farklı Atıf Stilleri: APA, MLA, Chicago gibi birçok atıf stilini \ndestekler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n114"}, {"page": 115, "text": "Eğitimde Kullanımı:\n ¬ Tez ve makalelerde referans doğruluğunu kontrol etmek.\n ¬ Akademik yazım standartlarını sağlamak.Öğretmenler için:\n ¬ Eğitim materyallerini özetleyerek öğrencilere daha anlaşılır \niçerikler sunabilir.\n ¬ Ders içeriklerini analiz ederek kritik noktaları belirleyebilir.\nAraştırmacılar için:\n ¬ Akademik makaleler ve raporlar üzerinde detaylı analiz \nyaparak araştırma sürecini hızlandırabilir.\n ¬ Büyük dokümanlar içindeki önemli bilgileri hızlıca çıkarabilir.\nChatPDF, PDF belgeleriyle verimli çalışmayı sağlayarak, kul -\nlanıcıların zamandan tasarruf etmesine ve bilgiyi daha iyi \nanlamasına yardımcı olur.\nChatPDF: \nTanım: PDF belgeleriyle etkileşim kurmayı sağlayan yapay zekâ \ndestekli bir araçtır. Kullanıcılar, PDF dosyalarını yükleyerek içe -\nrik hakkında sorular sorabilir, özetler alabilir ve ana noktaları \nhızlıca öğrenebilir.\nTemel Özellikler:\n ¬ PDF İçeriğini Anlama: Belgelerdeki metinleri analiz ederek \nkullanıcının sorularına yanıt verir.\n ¬ Özetleme ve Ana Fikir Çıkarma: Uzun PDF dokümanlarını \nkısaca özetleyerek önemli bilgileri öne çıkarır.\n ¬ Metin Üzerinde Sorgulama: Kullanıcılar, belirli bir konu \nveya kelime hakkında sorular sorarak PDF içerisindeki \nilgili bölümleri hızlıca bulabilir.\n ¬ Çoklu Dil Desteği: Farklı dillerdeki PDF belgelerini analiz \nedebilir.\nEğitimde Kullanımı:\nÖğrenciler için:\n ¬ Ders notları, makaleler ve akademik kaynakları hızlıca \nanaliz edebilir.\n ¬ Ödev ve tez çalışmalarında önemli bilgileri daha hızlı \nözetleyebilir.Jenni: \nTanım: Akademik yazım sürecini destekleyen bir yapay zekâ \naracıdır. Yazma önerileri ve içerik oluşturma hizmeti sunar. \nhttps://jenni.ai/\nTemel Özellikler:\n ¬ Yazı Önerileri: Makale ve tez yazımında içerik önerir.\n ¬ AI Destekli Yazım: Yaratıcı ve profesyonel metinler oluşturur.\nEğitimde Kullanımı:\n ¬ Akademik makaleler ve ödevler için içerik yazma desteği.\n ¬ Öğrenciler için yaratıcı yazım süreçlerini hızlandırma.\n115\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 116, "text": "Nanonets: \nTanım: Yapay zekâ destekli otomasyon platformudur ve belgeleri, \ngörselleri ve verileri otomatik olarak işlemek için geliştirilmiştir. \nEğitim, iş dünyası ve veri analitiği gibi pek çok alanda kullanılır.\nTemel Özellikler:\n ¬ Belge İşleme: Faturalar, kimlikler, başvuru formları gibi \nbelgeleri otomatik olarak tarar ve metinlerini çıkarır.\n ¬ OCR (Optical Character Recognition): Görsellerdeki me -\ntinleri tanır ve dijital veriye dönüştürür.\n ¬ API Desteği: Mevcut sistemlere kolay entegrasyon sağlar.\n ¬ Makine Öğrenimi: Belge türlerini öğrenerek zaman içinde \ndaha doğru sonuçlar sunar.\nEğitimde Kullanımı:\n ¬ Otomatik Test Değerlendirme: Kâğıt tabanlı testleri ta -\nrayarak hızlıca dijital sonuçlara dönüştürür.\n ¬ Öğrenci Belgeleri Yönetimi: Öğrenci kayıt formlarını ve \nbaşvuru belgelerini otomatik olarak dijitalleştirir.\n ¬ Araştırma ve Veri Analizi: Görsellerden veya PDF'lerden \nveri çıkararak araştırma projelerinde kullanılabilir.\n ¬ Katılım Takibi: Etkinlikler veya derslerde imzalı katılım \nformlarını tarar ve düzenler.Temel Özellikler:\n ¬ Hızlı Özetleme: Makaleleri ve uzun metinleri hızlıca özetler.\n ¬ Not Alma: Önemli bilgileri düzenleyerek kaydetme imkânı \nsunar.\nEğitimde Kullanımı:\n ¬ Hızlı literatür tarama ve not alma.\n ¬ Öğrenciler için karmaşık metinleri sadeleştirme.\nBearly: \nTanım: Akademik kaynakları hızlı bir şekilde analiz etmek ve \nanlamak için tasarlanmış bir araçtır. Paperpal:\nTanım: Paperpal, akademik yazım sürecini geliştirmek amacıyla \ngeliştirilen bir yapay zekâ destekli yazım ve dil düzenleme \naracıdır. Özellikle araştırma makaleleri, tezler ve akademik \nmetinlerin dilsel doğruluğunu, tutarlılığını ve yayın standar -\ndına uygunluğunu sağlamak için kullanılır. Grammarly benzeri \ndüzeltme işlevlerinin ötesine geçerek akademik bağlama özel \nönerilerde bulunur.\nTemel Özellikler:\n ¬ Dilbilgisi, yazım, noktalama, biçem ve cümle yapısı açı -\nsından metni düzeltir.\n ¬ Akademik ifade gücünü artırmak için alternatif önerilerde \nbulunur (daha uygun akademik terim, cümle yapısı vb.).\n ¬ Belirli bir dergiye uygun hale getirmek için hedef dergiye \ngöre optimizasyon yapabilir (örn. Elsevier, Springer, Wiley).\n ¬ Gerçek zamanlı yazım ve düzenleme imkânı sunar; doğ -\nrudan metin üzerine entegre olur.\n ¬ Teknik makalelerde kullanılan karmaşık ifadeleri sadeleş -\ntirme ve netleştirme desteği sağlar.\n ¬ Turnitin veya benzeri sistemlere uyumlu, özgünlük koruma \nodaklı önerilerde bulunur.\n ¬ Microsoft Word ve çevrimiçi editörlerde kullanılabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n116"}, {"page": 117, "text": "Eğitimde Kullanımı:\n ¬ Öğrenciler tez, proje ve araştırma ödevlerini daha akademik \nve yayınlanabilir düzeye getirebilir.\n ¬ Akademik yazım kurallarını yeni öğrenen öğrenciler için \nyazım süreçlerini öğretici biçimde destekler.\n ¬ Öğretmenler ve danışmanlar, öğrencilerin yazdığı metinleri \nhızlıca değerlendirip geri bildirim sunabilir.\n ¬ Yayın hazırlığındaki araştırmacılar için dergiye özgü yazım \nve biçimlendirme kontrolü sağlar.\n ¬ Yabancı dilde yazan öğrenciler için akademik İngilizce \ngelişimini destekleyen etkili bir araçtır.\n ¬ Revizyon aşamasındaki akademik metinlerde hata tespiti \nve yeniden yapılandırma açısından ciddi zaman kazandırır.\n ¬ Yazıdaki anlatım bozukluklarını, tutarsız cümleleri ve zayıf \nakademik dili güçlendirerek yazının kalitesini artırır.\nBu araçlar, akademik yazım ve araştırma süreçlerinde hem \nöğretmenler hem de öğrenciler için güçlü destek sunar.  ¬ Bağlantı Kurma: İlgili notlar ve dokümanlar arasında ilişkiler \nkurarak öğrenmeyi kolaylaştırır.\n ¬ Entegre Arama: Belgelerdeki önemli terimleri ve konseptleri \nhızlıca bulmanızı sağlar.\nEğitimde Kullanımı:\n ¬ Araştırma Projeleri: Öğrenciler, araştırma notlarını dü -\nzenlemek ve analiz etmek için kullanabilir.\n ¬ Ders Hazırlığı: Öğretmenler, ders materyallerini daha etkili \nbir şekilde organize edebilir ve özetleyebilir.\n ¬ Sorulara Dayalı Öğrenme: Öğrenciler, yükledikleri dokü -\nmanlar üzerinden sorular sorarak hızlıca bilgi edinebilir.\n ¬ Bağlantılı Öğrenme: Notlar arasında bağlantılar kurarak \nkonuları daha iyi anlamak için kullanılabilir.\n ¬ Zaman Yönetimi: Dokümanları analiz ederek önemli bilgilere \nhızlı erişim sağlar, öğrenme sürecini hızlandırır.\nNotebookLM, öğrenciler ve öğretmenler için bilgi yönetimini \nve öğrenme süreçlerini güçlendiren yenilikçi bir araçtır. \nNotebookLM:\nTanım: Google tarafından geliştirilen, yapay zekâ destekli bir \nnot alma ve bilgi yönetim platformudur. Bu araç, notlarınızı ve \ndokümanlarınızı analiz ederek bağlantılar kurar, özetler oluş -\nturur ve sorularınıza doğrudan yanıt verir. Özellikle araştırma \nve öğrenme süreçlerini optimize etmek için kullanılır. \nTemel Özellikler:\n ¬ Dinamik Bilgi Analizi: Yüklenen notlar veya belgelerdeki \nbilgileri analiz eder ve bağlantılar önerir.\n ¬ Sorulara Yanıt Verme: Notlarınıza dayanarak, sorularınızı \nyanıtlar ve önemli noktaları öne çıkarır.\n ¬ Özetleme: Uzun dokümanlardan özetler çıkararak önemli \nbilgileri vurgular.Overleaf:\nTanım: Özellikle akademik yazım için kullanılan, LaTeX tabanlı \nbir çevrim içi yazım ve iş birliği platformudur. Matematiksel \nformüller, bilimsel makaleler, tezler ve teknik raporlar yazmak \niçin idealdir. Araştırmacılar, öğrenciler ve akademisyenler ara -\nsında oldukça popülerdir.\nTemel Özellikler:\n ¬ LaTeX Desteği: Profesyonel ve teknik dokümanların ya -\nzılması için LaTeX altyapısını kullanır.\n ¬ Çevrim İçi İş Birliği: Kullanıcılar birden fazla kişiyle gerçek \nzamanlı olarak aynı doküman üzerinde çalışabilir.\n ¬ Hazır Şablonlar: Tez, makale, proje raporu gibi akademik \niçerikler için binlerce şablon sunar.\n117\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 118, "text": "¬ Otomatik Derleme:  Yazdığınız LaTeX kodlarını anlık olarak \nPDF formatında görüntüleyebilirsiniz.\n ¬ Versiyon Kontrolü: Dokümanların eski sürümlerine geri \ndönme ve değişiklikleri izleme imkânı sunar.\n ¬ Entegrasyonlar: Zotero, Mendeley gibi referans yönetim \naraçlarıyla entegre çalışır.\nEğitimde Kullanımı:\n ¬ Tez ve Proje Yazımı: Öğrenciler, tezlerini veya projelerini \nprofesyonel bir şekilde hazırlamak için Overleaf’i kullanabilir.\n ¬ Akademik Makaleler: Araştırmacılar, bilimsel dergilere \nuygun formatta makaleler yazabilir.\n ¬ Matematik ve Bilimsel İçerikler: Matematiksel formüller \nve teknik açıklamalar için ideal bir platformdur.\n ¬ İş Birliği ve Grup Çalışması: Öğrenciler ve öğretmenler, \ngrup projelerinde eş zamanlı olarak çalışabilir.\n ¬ Eğitim Materyali Hazırlama: Öğretmenler, ders notları ve \nörnek çözümler oluşturabilir.\nÖzellikle Kimler İçin Uygun?\n ¬ Matematik, fizik, bilgisayar mühendisliği gibi teknik ve \nakademik alanlarda çalışan öğrenciler ve akademisyenler.\n ¬ Bilimsel içeriklerin profesyonel bir formatta hazırlanması \ngereken durumlarda.\nOverleaf, akademik yazım ve teknik doküman hazırlamada \ngüçlü bir araçtır. Özellikle LaTeX kullanmayı tercih edenler için \nvazgeçilmez bir platformdur. LaTeX Nedir?\nLaTeX, profesyonel ve teknik dokümanlar hazırlamak için kul -\nlanılan, yüksek kaliteli metin düzenleme sistemi sağlayan bir \nişaretleme dilidir. Özellikle matematiksel formüller, bilimsel \nmakaleler, tezler ve teknik raporlar yazmak için tercih edilir. \nLaTeX, metni biçimlendirme işini kullanıcıdan alarak, yazılan \ndokümanların düzenli ve estetik görünmesini sağlar.\nTemel Özellikleri:\n ¬ Matematiksel Formüller: Karmaşık matematiksel ifadelerin \nyazımını kolaylaştırır.\n ¬ Profesyonel Biçimlendirme: Sayfa düzeni, dipnotlar, atıf -\nlar ve bibliyografi gibi detayları otomatik olarak düzenler.\n ¬ Şablon Kullanımı: Akademik dergilere ve üniversitelere \nuygun hazır şablonlarla çalışmayı kolaylaştırır.\n ¬ Çapraz Platform Desteği: LaTeX dosyaları her ortamda \naynı şekilde çalışır ve çıktı alınabilir.\n ¬ Uzun Doküman Yönetimi: Tez, kitap veya rapor gibi uzun \nbelgeler için güçlü bir yapı sunar.\nLaTeX Nerelerde Kullanılır?\n ¬ Akademik Yazım: Makale, tez, bilimsel raporlar.\n ¬ Matematik ve Fizik: Formüller ve denklem yoğun içerikler.\n ¬ Bilgisayar Bilimi: Kodların doküman içinde biçimlendi -\nrilmesi.\n ¬ Kitap ve Yayınlar: Profesyonel kitaplar ve teknik belgeler.\nAvantajları:\n ¬ Görsel düzenlemelerle uğraşmadan, içeriğe odaklanma.\n ¬ Kompleks içeriklerin düzgün bir şekilde yazılmasını sağlama.\n ¬ Her platformda tutarlı ve yüksek kaliteli çıktı alma.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n118"}, {"page": 119, "text": "Araştırma ve \nVeri Analizi\nPrompt Şablonu\nAraştırma ve veri analizi, literatür \ntaraması, anlamlı araştırma \nsoruları geliştirme, veri toplama ve \nanaliz etme süreçlerini içerir. Yapay \nzekâ destekli araçlar, bu süreçleri \nhızlandırarak akademik çalışmaları \ndaha verimli ve etkili hale getirir.Araştırma ve \nVeri Analizi\nPrompt Şablonu\nUygulama örneği\nBen bir [Rolünüzü girin.]. \nAşağıdaki bilgilere dayanarak araştırma ve veri \nanalizi için etkili bir plan oluşturmanı istiyorum.\n \nPlan:\nBelirtilen hedeﬂere uygun bir literatür taraması \niçermelidir.\nAraştırma sorularını belirlemeye yardımcı \nolmalıdır.\nVeri toplama ve analiz yöntemleri için öneriler \nsunmalıdır.\nAnaliz sonuçlarını görselleştirmek için araçlar \nönermelidir.\nAkademik kaynak ve makale önerileri \nsağlamalıdır.\nAraştırma Konusu: [Araştırma konusunu girin.]\nHedef Kitle: [Öğrenciler, araştırmacılar vb. \nbelirtin.]\nAraştırma Soruları:\n[Araştırma sorusu 1’i yazın.]\n[Araştırma sorusu 2’yi yazın.]\n[Araştırma sorusu 3’ü yazın.]\nVeri Toplama Yöntemi: [Anket, görüşme, deney \nvb. belirtin.]\nVeri Analiz Türü: [İstatistiksel analiz, metin \nanalizi vb.]\nGörselleştirme Araçları: [Tableau, Power BI, \nGoogle Sheets vb.]\nAkademik Kaynak Önerisi İhtiyacı: [Evet/Hayır \nbelirtin.]\nSüre: [Araştırma ve analizin tamamlanması için \nönerilen süreyi girin.]\nDiğer Detaylar:\nVerilerin doğruluğunu artırmak için öneriler \nsun.\nAraştırmanın teorik ve pratik bağlamını vurgula.\nİlgili yapay zekâ araçlarıyla destek sağla.Ben bir yüksek lisans öğrencisiyim. \nAşağıdaki bilgilere dayanarak araştırma ve veri \nanalizi için bir anket hazırlama sürecini \ndesteklemeni istiyorum.\n \nPlan:\nBelirtilen araştırma konusuna uygun ve odaklı \nsorular içermelidir.\nAçık uçlu ve kapalı uçlu sorular dengeli bir \nşekilde kullanılmalıdır.\nEtik konuları hassasiyetle ele alan sorular \niçermelidir.\nKatılımcıların kolayca anlayabileceği ve \nyanıtlayabileceği şekilde tasarlanmalıdır.\nVerilerin analizi için uygun kategoriler \noluşturmalıdır.\nAraştırma Konusu: Yapay Zekânın Etik Kullanımı\nHedef Kitle: Üniversite öğrencileri ve \nakademisyenler\nAraştırma Soruları:\nYapay zekânın etik kullanımına ilişkin görüşler \nnelerdir?\nYapay zekânın etik ihlalleri hakkındaki \nfarkındalık düzeyi nedir?\nEtik ilkelere uygun yapay zekâ kullanımını teşvik \neden faktörler nelerdir?\nVeri Toplama Yöntemi: Anket\nVeri Analiz Türü: Betimsel analiz, istatistiksel \ndeğerlendirme\nGörselleştirme Araçları: Tableau, Google Sheets\nAkademik Kaynak Önerisi İhtiyacı: Evet\nSüre: 2 hafta içinde veri toplanması \nhedeﬂenmektedir.\nDiğer Detaylar:\nAnket soruları kolayca çevrimiçi paylaşılabilir \nformatta olsun.\nKatılımcılara etik onam formu sunulsun.\nYapay zekâ destekli araçlar (ör. Typeform) \nkullanarak anketi hızlıca oluştur.\n119\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 120, "text": "5.3.2. Yapay Zekâ Destekli Tarayıcı Eklentileri\nMerlin\nTanım: Yapay zekâ destekli bir tarayıcı eklentisi (Chrome Exten -\nsion) olarak ChatGPT teknolojisini internette gezinme deneyi -\nmine entegre eder. Kullanıcıların web sayfalarındaki içerikleri \nözetleme, yeniden yazma, e-posta ve metin oluşturma gibi \nişlemleri hızlıca yapmasını sağlar.\nTemel Özellikler:\n ¬ Web İçeriği Özeti: Web sayfalarının, haberlerin ve maka -\nlelerin hızlı özeti.\n ¬ Yapay Zekâ Destekli Yazma: E-posta, sosyal medya gön -\nderisi ve profesyonel içerik oluşturma.\n ¬ Anlık Çeviri ve Yeniden Yazma: Metinleri farklı dillere çe -\nvirme ve farklı tonlarda yeniden yazma.\n ¬ Kullanımı Kolay Eklenti: Chrome ve Edge tarayıcılarına \nentegre çalışır.\nEğitimde Kullanımı:\n ¬ Akademik makalelerin ve uzun metinlerin hızlı özetini \nçıkarmak.\n ¬ Öğrenciler için karmaşık metinleri sadeleştirerek anlama \nkolaylığı sağlamak.\n ¬ Yabancı dil derslerinde anlık çeviri ve dil yapılarını incelemek.\n ¬ Öğretmenlerin e-posta, duyuru ve eğitim materyali ha -\nzırlama süreçlerini hızlandırmak.Text Blaze\nTanım: Metin kalıpları oluşturup otomatik tamamlama özel -\nlikleriyle zaman kazandırır.\nTemel Özellikler:\n ¬ Tek Tıklama ile Metin Ekleme: Otomatik metin kalıpları.\n ¬ Form ve Şablon Desteği: Sık kullanılan yazıları hızlı ekleme.\n ¬ Kısayol Tanımlama: Hızlı erişim için kısayollar oluşturma.\n ¬ Verimlilik Takibi: Yazım hızını artırma.\nEğitimde Kullanımı:\n ¬ Öğretmenlerin sık kullandığı geri bildirim şablonları oluş -\nturması.\n ¬ Ödev yönergelerinin hızlı bir şekilde eklenmesi.\n ¬ Sınav açıklamaları ve standart duyuruların hızla hazır -\nlanması.\nMonica:\nTanım: Monica, DeepSeek R1, GPT -4o, Gemini 2.0, Claude 3.7 \nve daha fazla güçlü yapay zekâ modeline erişim sağlayan çok \namaçlı bir yapay zekâ asistanıdır. Hem tarayıcı eklentisi (Ch -\nrome/Edge) hem de masaüstü ve mobil uygulama (Windows, \nmacOS, Android, iOS) olarak çalışır. Web sayfalarını, PDF’leri, \nYouTube videolarını ve belgeleri özetleme, analiz etme, çevir -\nme ve üzerinde sohbet etme gibi çok yönlü yetenekler sunar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n120"}, {"page": 121, "text": "Temel Özellikler\n ¬ Web sayfalarındaki metni seçerek anında açıklama, çeviri \nveya özet alma imkânı sağlar.\n ¬ YouTube videoları için zaman damgalı özetler üretebilir \nve videodaki anahtar noktaları çıkarabilir.\n ¬ PDF, resim ve ekran görüntülerine yüklenip bu içerikler \nüzerinden sorulara cevap verebilir, çözümler sunabilir.\n ¬ Yazı yazma şablonları, insanlaştırma (humanizer) ve AI \ntespitini atlatma araçlarıyla içerik üretimine destek verir.\n ¬ Metin çevirisi, yan yana karşılaştırmalı çeviri ve sesli çeviri \ndesteğiyle çok dilli içerik üretimini kolaylaştırır.\n ¬ “Memo” isimli bilgi deposu özelliğiyle web sayfaları, soh -\nbetler ve belgeler kişisel bilgi kasasında saklanabilir.\n ¬ Resim oluşturma, düzenleme, logo tasarımı, karikatür, \nvideo üretimi gibi görsel sanat araçları içerir.\nEğitimde Kullanımı:\n ¬ Öğrenciler, araştırma için web sayfalarını veya PDF’leri \nyükleyip otomatik özet alarak hızlıca temel bilgiyi öğrenebilir.\n ¬ Akademik yazı, sunum veya e-posta yazarken şablonlar \nve düzenleme önerileri ile yazım kalitesini artırabilir.\n ¬ Öğretmenler, YouTube videolarını zaman damgalı özetlerle \nanaliz ederek ders içerikleri oluşturabilir.\n ¬ Çok dilli öğretim için metinleri çevirip karşılaştırmalı in -\ncelemesine imkân tanır.\n ¬ Dil öğreniminde, metinleri insanlaştırarak tercüme eden \naraçlar yardımıyla doğal dil pratiği sağlar.\n ¬ Proje ve kodlama derslerinde dosya yüklenip soru-cevap \nözelliğiyle bilgiye kesintisiz erişim sunar.\n ¬ Resim/video araçlarıyla eğitim materyallerine görsel içerik \neklemeyi kolaylaştırır.\n ¬ “Memo” özelliği sayesinde ders notları ve kaynakları bir \nhavuzda toplayarak kişisel öğrenme yol haritası yaratır.Eightify: \nTanım: Eightify, YouTube videolarını otomatik olarak özetle -\nyen bir yapay zekâ aracıdır. Kullanıcılara videonun tamamını \nizlemeden temel bilgileri hızlıca alma imkânı tanır. Özellikle \nuzun videolar, podcast’ler veya eğitim içerikleri için pratik bir \nzaman tasarrufu sağlar.\nTemel Özellikler:\n ¬ YouTube içinde “Özetle” butonuyla tek tıkta TL; DR özetler \nsunar ve saniyeler içinde yanıt üretir.\n ¬ Zaman damgalı (timestamp'li) anahtar noktalar ve önemli \ncümleler çıkarır.\n ¬ 40’tan fazla dilde özet ve çeviri yapma özelliğine sahiptir.\n ¬ YouTube altyazılarından daha zengin ve düzenli trans -\nkriptler üretir.\n ¬ En popüler yorumları da göstererek topluluk görüşünü \nhızlıca aktarır.\n ¬ Chrome, Safari eklentisi ile masaüstü kullanımın yanında; \niOS ve Android uygulamaları da mevcuttur.\nEğitimde Kullanımı:\n ¬ Öğrenciler uzun eğitim videolarını hızlıca özetler üzerinden \nöğrenerek zaman tasarrufu yapabilirler.\n ¬ Öğretmenler ders planlamasında videolardaki kritik nok -\ntaları seçerek sunumlarında kullanabilirler.\n ¬ Dil öğrenimi için hem orijinal altyazıyı hem de çeviriyi \nkarşılaştırarak pratik yapılabilir.\n ¬ Araştırmacılar, videolardan alınan verileri özetleyip analiz \nsüreçlerinde hız kazanabilirler.\n ¬ Sınav ve sunum hazırlığında, gerekli bilgileri özet halinde \nnot almak kolaylaşır.\n ¬ Topluluk yorumları üzerinden öğrenci geri bildirimleri an -\nlaşılabilir, sosyal yönüyle desteklenebilir.\n121\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 122, "text": "Grammarly:\nTanım: Grammarly, yapay zekâ destekli bir yazım asistanıdır \nve hem dilbilgisi, stil, ton gibi yazım hatalarını düzeltir hem de \niçerik üretiminde kullanıcıya yardımcı olur. E-posta, döküman, \nsosyal medya, akademik yazı gibi pek çok platformda gerçek \nzamanlı olarak çalışır.\nTemel Özellikler:\n ¬ Bağlam temelli dilbilgisi, yazım ve noktalama hatalarını \ntespit edip düzeltir.\n ¬ Açıklık, akıcılık, kelime tercihi ve ton gibi unsurlarda öneriler \nsunar; birkaç tıkla tüm paragrafı yeniden yazabilir.\n ¬ Generative AI ile fikir geliştirme, taslak oluşturma, özetleme, \nyeniden yazma ve e-posta yanıtlama işlemlerini yapabilir.\n ¬ Ton algılama özelliği ile metnin okuyucuda nasıl bir izlenim \nbırakacağını gösterir.\n ¬ Dolandırıcılık tespiti ve özgünlük denetimi için intihal \nkontrolü ve AI-detektör özelliği sunar; atıf oluşturmak \niçin alıntı desteği de sağlar.\n ¬ Tüm cihazlarda —web, tarayıcı eklentisi, masaüstü ve \nmobil uygulamalarda— entegre şekilde çalışır.\nEğitimde Kullanımı:\n ¬ Öğrenciler, yazılarını gerçek zamanlı olarak düzelterek hem \ndilbilgisini hem yazım becerilerini geliştirebilir.\n ¬ Generative AI özellikleri sayesinde tez, ödev ve sunum \ntaslaklarını hızla hazırlayabilir ve zihin boşluğunu aşabilir \n ¬ İntihal ve AI-tespiti sayesinde özgünlük korunabilir ve \nakademik dürüstlük temin edilebilir.\n ¬ Ton ve akıcılık analizleri, yazının hedef kitleye uygun şekilde \niletilmesini sağlar. ¬ Kurum içi uygulamalarla (Grammarly for Education), \nöğrenci-yazı süreçlerine öğretmen gözetiminin entegre \nedilmesine olanak verir \n ¬ İntihal kontrolü ve alıntı üretimi, öğrencilerin akademik \nyazım becerilerini güçlendirirken Turnitin gibi sistemlere \nuygunluk sağlar.\n ¬ Öğretmenler, öğrenci metinlerini izleyip geribildirim sağla -\nyarak yazım süreçlerini yorumlayabilir ve bireysel gelişime \nkatkıda bulunabilir.\n ¬ Zaman tasarrufu sağlayarak yazılı sunum hazırlığı ve \nakademik iletişimde verimlilik sağlar.\nGrammarly ile Yazım ve Dilbilgisi Düzeltme Uygulaması\nDers: Türkçe / Yabancı Dil (İngilizce) / Bilişim\nSüre: 1 ders saati (40–45 dk)\nAraç: www.grammarly.com\nAmaç:\nÖğrencilerin yazılı ifadelerini dilbilgisi, noktalama ve anlatım \naçısından kontrol etmelerini sağlamak. Teknolojiyi kullanarak \nyazılı anlatım becerilerini geliştirmek.\nEtkinlik Adımları:\n1. Metin Yazımı (10–15 dk):\n »Öğrencilerden kısa bir kompozisyon ya da paragraflık bir \nhikâye yazmaları istenir (örnek: “Hayalimdeki meslek”).\n2. Grammarly’ye Giriş (5 dk):\n »Öğretmen, grammarly.com adresinden nasıl giriş ya -\npılacağını ve metin düzeltme alanını tanıtır.\n3. Metin Yapıştırma ve Kontrol (10 dk):\n »Öğrenciler yazılarını yapıştırır ve hatalarını inceler.\n »Grammarly'nin sunduğu açıklamaları okuyarak neden/\nnerede hata yaptıklarını öğrenirler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n122"}, {"page": 123, "text": "4. Düzenleme ve Son Hali (10 dk):\n »Öğrenciler, öneriler doğrultusunda yazılarını revize eder.\n »İsterlerse düzeltme öncesi/sonrası karşılaştırma ya -\npabilirler.\nKazanımlar:\n ¬ Dilbilgisi ve yazım farkındalığı gelişir\n ¬ Yazılı anlatım becerisi artar\n ¬ Teknoloji destekli öz değerlendirme yapılır\n ¬ Hatalardan öğrenme becerisi desteklenirEğitimde Kullanımı:\n ¬ Gece geç saatlerde sınava çalışırken veya ödev yaparken \nadım adım çözüm almak mümkündür.\n ¬ Karmaşık konular için ekran görseli yükleyerek doğrudan \naçıklama ve çözüm alınabilir.\n ¬ AP sınavları gibi spesifik akademik hedeflere yönelik planlı \nöğrenme rehberliği elde edilebilir \n ¬ Grup çalışmaları, flashcard ve quiz özellikleri ile daha \nverimli hale getirilebilir.\n ¬ Üniversite öğrencileri için başvuru mektupları, makale \ntaslakları ve düşünce akışı geliştirici metin üretme des -\nteği sağlar.\n ¬ Sosyal kaygı yönetimi, sınav stresine yönelik öneriler ve \nakademik hayatın diğer zorlukları için rehberlik sağlar.\nAnswer AI:\nTanım: nswer AI, öğrencilere ve akademik kullanıcılara yönelik \n7/24 çalışan bir yapay zekâ destekli akıllı yardımcıdır. Ödev \nyardımı, sınav hazırlığı, makale taslağı oluşturma, sosyal kaygı \nyönetimi ve grup çalışması rehberliğine kadar geniş bir alanda \ndestek sunar .\nTemel Özellikler:\n ¬ 24/7 kişisel öğretmen ve rehber tavsiyesi ile stresli dö -\nnemlerde bile anında destek sağlar.\n ¬ Ekran görüntüsü tanıma özelliğiyle karmaşık matematik \nve diğer soruları kolayca çözebilir.\n ¬ Görsel olarak tanıma, adım adım çözümler, yazı üretme \nve sohbet modları gibi çok yönlü öğrenme araçları sunar.\n ¬ Flashcard, özelleştirilebilir quiz, ortak çalışma alanları gibi \nöğrenme destekleri içerir \n ¬ 6 milyondan fazla kullanıcıya ulaşmış hem ücretsiz hem \npremium sürüme sahip bir platformdur.Brisk Teaching:\nTanım: Brisk Teaching, öğretmenler ve eğitimciler için gelişti -\nrilen, tarayıcı eklentisi şeklinde çalışan bir yapay zekâ destekli \nöğretim asistanıdır. Google Docs, Slides, Forms, YouTube, PDF \nve online ders materyalleriyle entegre çalışarak öğretmenlerin \ngünlük işlerini kolaylaştırır. Ücretsiz olarak sunulur ve COPPA, \nFERPA, GDPR gibi veri gizliliği standartlarına uyumlu, öğrenci \nverisini koruyan bir platformdur\nTemel Özellikler:\n ¬ Ders Planı Oluşturucu: Belirli konu ve sınıf düzeyine uygun \nders planları hızla üretir .\n ¬ Quiz ve Test Oluşturma: Google Forms/Docs ile entegre \nquizler, ACT veya SAT tarzı testler hazırlayabilir.\n ¬ Sunum Üreticisi: Metin, makale, video vb. kaynaklardan \notomatik slaytlar oluşturur ve Google Slides içinde dü -\nzenlemeye hazır hale getirir.\n123\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 124, "text": "¬ Öğrenci Yazısı Analizi: Google Docs’ta yazma sürecini adım \nadım izleyerek yapay zekâ kullanımını, yazım aşamalarını \nve ilerlemeyi analiz eder.\n ¬ Geri Bildirim ve Rubric Oluşturma: Öğrenci çalışmaları -\nna anında geri bildirim, kriter temelli rubric ve çoklu geri \nbildirim önerileri yapar.\n ¬ Okuma Düzeyi Ayarlama: Metinleri farklı sınıf düzeylerine \ngöre yeniden yazarak erişilebilirliği artırır.\n ¬ İdari Destek Araçları: Mektup, e-posta, öğrenci ilerleme \nraporları gibi idari belgelere şablon önerileri sunar.\nEğitimde Kullanımı:\n ¬ Öğretmenler, ders hazırlık sürecini hızlandırarak haftalık \nplanları ve içerikleri dakikalar içinde oluşturabilir.\n ¬ Sınav veya değerlendirme dönemlerinde quiz, test ve \nrubric sistemleri hızlıca hazırlanarak iş yükü azaltılabilir. ¬ Farklı düzeydeki öğrenciler için metinleri kolay -\nlıkla yeniden yazarak okuma yazma öğretiminde \neşitliği sağlar.\n ¬ Akademik yazım süreci izlenerek yapay zekâ kulla -\nnımının kontrolü ve akademik dürüstlük desteklenir.\n ¬ Zaman damgalı yazı analizi, öğrencinin yazma \nsürecindeki düşünce gelişimini öğretmene sunar.\n ¬ İdari belgelerini oluşturmak zorunda kalan öğret -\nmenler, mektup, geri bildirim, ilerleme raporu gibi \nmetinleri hızlıca düzenleyebilir.\n ¬ Bilimsel okuryazarlık ve AI okuryazarlığı derslerinde \nkullanılabilecek materyaller ve seviyelendirmeler \nkolaylıkla hazırlanabilir.\n ¬ İletişim ve geri bildirim süreçleri, newsletter, e-posta \nveya veli raporları gibi içeriğin bireysel versiyonları \nhızlıca hazırlanabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n124"}, {"page": 125, "text": "5.4. Ölçme, Değerlendirme ve Geri Bildirim Süreçlerini Güçlendirme\nEğitimde ölçme ve değerlendirme, öğrencilerin akademik gelişimini takip etmek, öğrenme süreçlerini iyileştirmek ve öğretim \nyöntemlerini optimize etmek için kritik bir rol oynar. Yapay zekâ destekli araçlar, öğretmenlerin sınav hazırlama, rubrik oluş -\nturma, ödev ve proje değerlendirme, geri bildirim sağlama gibi süreçlerini hızlandırarak daha objektif ve veri odaklı kararlar \nalmalarına yardımcı olur.\nBu bölümde, yapay zekânın değerlendirme süreçlerinde nasıl kullanılabileceği, öğrenci performansına dair veri odaklı içgörüler \nsunma yeteneği ve öğretmenlerin geri bildirim süreçlerini nasıl daha verimli hâle getirebileceği ele alınmaktadır.\nYapay zekâ tabanlı ölçme ve değerlendirme ile öğrencilerin öğrenme süreçlerini desteklemek ve geliştirmek için aşağıdaki \nbaşlıklara göz atabilirsiniz.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla değişebilir. Güncellenen ve yeni eklenen araçlar için üretici web sitele -\nrinden bilgi alabilirsiniz.\nProje Değerlendirmesi\nYapay zekâ, öğrencilerin proje tabanlı \nçalışmalarını belirlenen kriterlere göre \npuanlandırır ve gelişim önerileri sunar..\nYazılı Ödevlere Yapısal Geri Bildirim\nYapay zekâ, ödevlere dil ve içerik \naçısından geri bildirim verir. Yapay zekâ, \nöğrencilerin yazılı çalışmalarını gramer, \ndilbilgisi, içerik ve yapı açısından analiz \nederek iyileştirme önerileri sunar.\nİlerleme Raporları Oluşturma\nYapay zekâ, sınav ve ödev sonuçlarından ilerleme raporları çıkarır. Yapay zekâ, öğrencilerin sınav, ödev ve proje performanslarını analiz ederek kişiye özel \nilerleme raporları oluşturur.Rubrik Tasarlama\nYapay zekâ, ödev veya projeler için \ndeğerlendirme kriterleri sunar.Kısa Açıklamalı Geri Bildirim \nSağlama\nYapay zekâ, doğru cevapların nedenlerini \nkısa ve net şekilde açıklar.Proje Değerlendirmesi\nYapay zekâ, projeleri belirli kriterlere göre \npuanlar.\nDeğerlendirme Soruları Hazırlama\nYapay zekâ, sınavlar için kısa ve çoktan \nseçmeli sorular oluşturur. Yapay zekâ, \nders içeriğine uygun öğrenci seviyesine \ngöre özelleştirilmiş sınav soruları \noluşturur.\n125\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 126, "text": "Temel Özellikler:\n ¬ Öğretmenler metinleri 2. sınıftan 11+. sınıfa kadar farklı \nseviyelere otomatik olarak uyarlayabilir.\n ¬ YouTube video bağlantılarından transkript çekerek bu \nmetinleri de farklı okuma seviyelerine getirebilir.\n ¬ “Literally Anything” özelliğiyle öğretmenler istedikleri konu -\nda az çok akademik içerik oluşturabilir; Diffit bu metinleri \nkaynaklarla destekler.\n ¬ Otomatik olarak önemli kelimeleri seçip, çoktan seçme -\nli, kısa cevaplı ve açık uçlu sorular üretir; hazır çalışma \nsayfaları ve grafik düzenleyiciler de sağlar.\n ¬ Google Forms, PDF, interaktif slaytlar ve çalışma kitapları \ngibi materyalleri dışa aktarabilir.\n ¬ Hem ücretsiz hem ücretli sürümleri vardır; kullanım ko -\nlaylığı ve çok sayıda kaynak sunar.\nEğitimde Kullanımı:\n ¬ Farklı seviyedeki öğrenciler için aynı metin farklı zorluk \ndüzeylerinde hazırlanarak ders esnasında eşit erişim \nsağlanabilir.\n ¬ Dil öğrenen öğrenciler için içeriği daha anlaşılır hale ge -\ntirebilir, anadil gelişimini destekleyebilir.\n ¬ Zaman tasarrufu sağlayarak, öğretmenler tek tuşla sevi -\nyelendirilmiş materyallere birkaç dakika içinde ulaşabilir.\n ¬ Okuma anlamayı destekleyen materyaller (kelime listeleri, \nsorular, grafik düzenleme) otomatik üretilerek öğretimin \ninteraktif hâle gelmesi sağlanır.\n ¬ Uzaktan eğitimde öğrencinin kendi seviyesinde çalışma -\nsını mümkün kılar; öğretmenler materyalleri paylaşabilir.\n ¬ Farklı dillerde içerik desteği ile çok dilli sınıflarda erişile -\nbilirlik artırılabilir.\n ¬ Öğretmen uzmanlığı artırılır: hazır cevaplı çalışma sayfaları \nve grafik düzenleyiciler, öğretmen rehberliğini güçlendirir.5.4.1. Ölçme, Değerlendirme ve Geri Bildirim \nSüreçlerini Güçlendirmede kullanılabilecek YZ \nAraçları\nClass Companion: \nTanım: Öğretmenlerin ders planlarını hazırlamasını, öğrencilerin \nilerlemesini takip etmesini ve sınıf yönetimini kolaylaştıran bir \naraçtır. Eğitim süreçlerini daha verimli hâle getirir.\nTemel Özellikler:\n ¬ Ders Planlama: Müfredata uygun ders planları oluşturur.\n ¬ İlerleme Takibi: Öğrencilerin akademik gelişimini takip \neder ve raporlar sunar.\n ¬ Öğretmen Araçları: Ödev yönetimi, sınav planlama ve sınıf \niçi organizasyon sağlar.\nEğitimde Kullanımı:\n ¬ Öğretmenlerin sınıf içi etkinlikleri kolayca planlamasını \nsağlar.\n ¬ Öğrencilerin başarılarını raporlar ve eksiklikleri belirler.\nDiffit: \nTanım: Diffit, öğretmenlerin içerikleri farklı okuma seviyele -\nrine göre yeniden düzenlemesine ve özelleştirmesine olanak \ntanıyan yapay zekâ destekli bir tarayıcı tabanlı platformdur. \nMevcut müfredatı ya da çevrimiçi metinleri (PDF, makale, hatta \nYouTube transkriptleri) alıp, bu içerikleri seçilen sınıf düzeyine \ngöre “tam ideal” hale getirerek öğretmenlerin işini kolaylaştırır.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n126"}, {"page": 127, "text": "Essay Grader AI:\nTanım: Öğrenci kompozisyonlarını otomatik olarak değerlen -\ndiren bir yapay zekâ aracıdır.\nTemel Özellikler:\n ¬ Otomatik Değerlendirme: Öğrenci yazılarını hızlı bir şekilde \nanaliz eder ve puanlar.\n ¬ Geri Bildirim Sağlama: Dil bilgisi, içerik, yapı ve tutarlılık \nhakkında detaylı geri bildirim verir.\nEğitimde Kullanımı:\n ¬ Öğretmenlerin değerlendirme sürecini hızlandırır.\n ¬ Öğrencilere yazma becerilerini geliştirmek için geri bil -\ndirim sağlar.Quizgecko:\nTanım: Öğretmenlerin hızlı bir şekilde sınav ve test soruları \noluşturmasını sağlayan bir platformdur. \nTemel Özellikler:
