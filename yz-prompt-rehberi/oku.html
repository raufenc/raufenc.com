aracıdır. \nKullanıcıların sorularına yanıt vermek ve çeşitli konular hakkında \nbilgi sağlamak için doğal dil işleme teknolojisini kullanır. Hem \nhızlı bilgi erişimi hem de sohbet tabanlı öğrenme deneyimi sunar. \nEğitimde Kullanımı:\nYouChat, öğrencilere anında bilgi sunabilir, konu açıklamaları \nyapabilir ve ödevlerde rehberlik edebilir. Öğrenciler, araştırma \nyaparken sorularını YouChat'e yönelterek hızlı cevaplar alabilir \nve öğrenme süreçlerini destekleyebilirler.\nPoe\nTanım: Çeşitli yapay zekâ modellerine tek bir platform üzerinden \nerişim sağlayan bir yapay zekâ sohbet asistanıdır. OpenAI'nin \nChatGPT, Claude, Google Gemini ve Stable Diffusion gibi farklı \nyapay zekâ modellerini destekler. Kullanıcılar, farklı AI modelleri \nile sohbet ederek çeşitli görevler için en uygun olanı seçebilir.\nTemel Özellikler:\n ¬ Farklı Yapay Zekâ Modellerini Destekler: ChatGPT, Claude, \nGoogle Gemini ve daha fazlasını tek bir platformda sunar.\n ¬ Hızlı ve Kolay Erişim: Tarayıcı veya mobil uygulama üze -\nrinden hızlı kullanım imkânı sunar.\n ¬ Metin, Görsel ve Kod Üretimi: Farklı AI modelleri ile yazılı \niçerik, görsel ve kod üretimi yapılabilir.\n ¬ Özelleştirilmiş Botlar Oluşturma: Kullanıcılar, kendi özel \nAI sohbet botlarını oluşturabilir.\n ¬ Eğitim, Kodlama, Yaratıcı Yazım ve Daha Fazlası: Akademik \naraştırmalar, yazı yazma, problem çözme, dil öğrenme \nve daha birçok alanda destek sunar.\n269\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 270, "text": "Eğitimde Kullanımı:\n ¬ Öğrenciler İçin Akademik Destek: Öğrenciler, farklı yapay \nzekâ modellerinden destek alarak ödev, makale yazımı \nve araştırma süreçlerinde yardımcı araçlar kullanabilir.\n ¬ Öğretmenler İçin Ders Materyali Üretimi: Öğretmenler, \nders planları, özetler, soru-cevap etkinlikleri ve eğitim \niçerikleri hazırlamak için AI desteğinden yararlanabilir.\n ¬ Dil Öğrenimi ve Çeviri: Farklı dillerde yazım pratiği yapmak, \ndil bilgisi kurallarını öğrenmek ve anlık çeviri hizmeti almak \niçin kullanılabilir.\n ¬ Kodlama ve Teknik Destek: Bilgisayar bilimleri derslerinde \nprogramlama hatalarını gidermek, algoritmalar oluştur -\nmak ve kodlama pratikleri yapmak için yardımcı olabilir.\n ¬ Eğitim İçerikleri İçin Görsel ve Metin Üretimi: Farklı AI \nmodellerini kullanarak öğretim materyalleri, grafikler ve \ninfografikler oluşturulabilir.DeepSeek\nTanım: Çin merkezli DeepSeek AI tarafından geliştirilen açık \nkaynaklı bir gelişmiş dil modeli ve chatbot platformudur. Hem \nsohbet (V3/R1 modelleri) hem de kodlama konusunda (De -\nepSeek Coder) güçlü yetenekler sunar.\nTemel Özellikler\n ¬ Open source LLM: MoE mimarili V3 modeli, 37 milyar para -\nmetreyi etkin kullanarak GPT 4 düzeyinde performans sunar \n ¬ R1 modeli: Akıl yürütme, mantık ve matematikte GPT 4’ü \nzorlar seviyede verim sağlar; Apple App Store’da Chat -\nGPT’yi geçmiştir.\n ¬ DeepSeek Coder: 338 programlama dilinde kod üretimi \nyapan özel bir modele sahiptir.\n ¬ Hesaplı eğitim maliyeti: V3 modelinin eğitimi yalnızca \n~6 milyon USD’ye tamamlanmıştır; GPT 4’ün maliyetinin \nonda biri.\n ¬ Yerli ve offline kullanım: Model sessiz bir şekilde indirilebilir \nve yerelde çalıştırılabilir.\n ¬ API ve Web/Mobil erişim: Tarayıcı, mobil uygulama ve API \nseçenekleri bulunur. Bedava kullanım sınırsızdır (giriş ge -\nrekmez).\nEğitimde Örnek Uygulama – \"AI Araştırmacım\"\nSınıf: 8. – 12. sınıflar\nDers: Türkçe / Sosyal Bilgiler / Fen Bilimleri\nAraç: https://www.deepseek.com/en veya tarayıcı uygulaması\nHuggingChat:\nTanım: Hugging Face tarafından geliştirilen yapay zekâ des -\ntekli bir sohbet botudur. HuggingChat, kullanıcıların doğal \ndilde etkileşimde bulunmasına ve çeşitli sorularına yanıtlar \nalmasına olanak tanır. Hugging Face’in açık kaynaklı yapay \nzekâ modellerine dayanan bu platform, kullanıcıların bilgiye \nhızlıca erişmesini sağlar. \nEğitimde Kullanımı:\nHuggingChat, öğrencilere konu anlatımı, ödev yardımı ve \naraştırma desteği sağlamak amacıyla kullanılabilir. Öğren -\nciler, sorularını HuggingChat'e yönelterek anında bilgi alabilir \nve öğrenme süreçlerini destekleyebilirler. Ayrıca, öğretmenler \nders içerikleri oluşturma ve araştırmalarda faydalanabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n270"}, {"page": 271, "text": "Uygulama Adımları\n1. Hedef sezon (5 dk):\n »Öğrenciler \"Endüstri Devrimi\", \"Su Döngüsü\", \"Cum -\nhuriyet’ın kazançları\" gibi bir konu seçer.\n2. DeepSeek ile araştırma (15 dk):\n »Öğrenciler seçtikleri konuyu DeepSeek'e sorar:\n“Endüstri Devrimi’nin sonuçlarını 8. sınıf seviyesine \nuygun maddeledir.”\n »Gelen yanıtları not alırlar ve modelin kaynaklarına (link, \naçıklama) dikkat ederler.\n3. Kaynak kontrolü (10 dk):\n »Öğrenciler okul kitapları ve internette önerilen bilgileri \nkarşılaştırır. AI’nin güçlü/zayıf yönleri tartışılır.\n4. Sunum hazırlığı (10 dk):\n »Kısa bir slayt hazırlayıp \"AI’dan ne öğrendim?\" sorusuna \ncevap verirler.\nKazanımlar\n ¬ Yapay zekâ destekli araştırma\n ¬ Kaynak eleştirisi ve doğrulama\n ¬ Bilgiyi derleme ve sunma\n ¬ Dijital okuryazarlık\n271\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 272, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ272"}, {"page": 273, "text": "7. EĞİTİMDE YAPAY ZEKÂ VE ETİK:\n     SORUMLU KULLANIM İLKELERİ VE UYGULAMALARI\nYapay zekâ (YZ) teknolojileri eğitimde kişiselleştirilmiş öğrenme, otomatik değerlendirme ve öğretmenlere destek sağlayan \nakıllı sistemler sunarak büyük fırsatlar yaratmaktadır. Ancak bu teknolojilerin etik ve sorumlu bir şekilde kullanılması, eğitimde \nadalet, veri mahremiyeti ve güvenlik gibi konular açısından kritik önem taşımaktadır (Floridi, 2019).\nBu bölümde, yapay zekâ ve etik ilişkisini ele alarak, eğitimde sorumlu yapay zekâ kullanımına yönelik temel ilkeleri, öğretmen -\nlerin sorumluluklarını, etik kuralları ve yapay zekâ okuryazarlığını artırmaya yönelik önerileri ele alacağız.\n7.1. Eğitimde Yapay Zekâ Kullanımında Etik İlkeler\nEğitimde yapay zekânın etik kullanımı, adalet, şeffaflık, veri \ngüvenliği, hesap verebilirlik ve sosyal sorumluluk gibi temel \netik prensiplere dayanmalıdır (Bostrom, 2014).\nAdalet ve Eşitlik\nYapay zekâ sistemleri, tüm öğrencilere eşit fırsatlar sunma -\nlı ve ayrımcı önyargılardan arındırılmış olmalıdır (Seldon & \nAbidoye, 2018).\nÖrnek: Yapay zekâ tabanlı sınav değerlendirme sistemlerinin, \nöğrencilerin sosyoekonomik durumuna, dil becerisine veya \ncinsiyetine göre ayrım yapmadan adil bir şekilde değerlen -\ndirme yapması gereklidir.\nMahremiyet ve Veri Güvenliği\nÖğrencilerin kişisel verileri güvenli bir şekilde saklanmalı, \nizinsiz paylaşılmamalı ve sadece eğitim amaçlarıyla kulla -\nnılmalıdır (Zuboff, 2019).\nÖrnek: Bir okulun, öğrencilerin akademik verilerini saklarken \nGDPR (Genel Veri Koruma Yönetmeliği) veya KVKK (Kişisel \nVerileri Koruma Kanunu) gibi yasal düzenlemelere uygun \nhareket etmesi gerekmektedir.Şeffaflık\nÖğretmenler ve öğrenciler, yapay zekâ sistemlerinin nasıl \nçalıştığını ve hangi kriterlere göre karar verdiğini açıkça an -\nlamalıdır (Coeckelbergh, 2020).\nÖrnek:  Bir yapay zekâ destekli değerlendirme aracının, hangi \nalgoritmaları kullandığı ve kararlarını hangi verilere dayan -\ndırdığı açıklanmalıdır.\nHesap Verebilirlik ve Sorumluluk\nYapay zekâ sistemlerinin yanlış kararları veya hataları olması \ndurumunda, bu hataları düzeltebilecek mekanizmalar oluş -\nturulmalıdır (Floridi, 2019).\nÖrnek: Eğer bir yapay zekâ destekli sistem, yanlış öğrenci \ndeğerlendirmesi yaparsa, öğretmenlerin bu hataları düzel -\ntebilmesi için müdahale hakkı olmalıdır.\nOtonomiye Saygı\nÖğrencilerin öğrenme süreçlerinde bağımsız kararlar ala -\nbilmeleri teşvik edilmelidir. Yapay zekâ, öğrencinin seçim \nyapmasına engel olmadan, rehberlik edici bir şekilde tasar -\nlanmalıdır.\nÖrnek: Bir yapay zekâ destekli öğrenme platformunun, öğ -\nrenciye tek bir öğrenme yolu sunmak yerine, farklı öğrenme \nstratejileri önererek seçim yapmasını sağlaması gerekmek -\ntedir.\n273\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 274, "text": "Sosyal Sorumluluk ve Toplumsal Etki\nYapay zekâ uygulamalarının eğitimde bireysel başarıyı des -\nteklemenin ötesinde, toplumsal fayda sağlaması gereklidir.\nÖrnek: Eğitimde yapay zekâ teknolojileri, yalnızca akademik \nbaşarıyı değil, öğrencilerin etik karar verme becerilerini ve \ndijital vatandaşlık anlayışını geliştirmeye de odaklanmalıdır.\nZarar Vermeme (Non-Maleficence)\nYapay zekâ uygulamaları, öğrencilerin gelişimine zarar ver -\nmemelidir. Bu, hem fiziksel hem de psikolojik açıdan geçerlidir \nve sistemlerin etik ilkeler çerçevesinde geliştirildiğinden emin \nolunması gerektiğini vurgular (Bostrom, 2014).\nÖrnek: Bir yapay zekâ sistemi, öğrenciyi olumsuz yönde etki -\nleyebilecek önyargılı ya da hatalı tavsiyelerde bulunmamalıdır.\n7.2. Öğretmenlerin Yapay Zekâ Kullanımındaki Rolü \nve Sorumlulukları\nÖğretmenler, yapay zekâ destekli araçların eğitimde etik kul -\nlanımını sağlamak için önemli bir rol oynar.\nÖğrencilere Etik Kullanımı Öğretmek\nÖğrenciler, yapay zekâ sistemlerinin nasıl çalıştığını, karar alma \nsüreçlerinde nasıl hata yapabileceğini ve etik sorunlara nasıl \nyol açabileceğini öğrenmelidir (Coeckelbergh, 2020).\nYapay Zekâ Destekli Eğitim İçin Öğretmen Rehberliği\nÖğretmenler, öğrencilerin eleştirel düşünme ve etik farkındalık \ngeliştirmelerini sağlamak için yapay zekâ ile ilgili yönlendir -\nmeler yapmalıdır.\nÖrnek: Bir öğretmen, öğrencilere yapay zekâ destekli bir çeviri \naracını kullanırken, çevirinin doğruluğunu nasıl kontrol ede -\nceklerini öğretmelidir.7.3. Öğrencilere Yapay Zekâ Kullanımını Öğretmek\nYapay zekâ eğitimi yalnızca teknik bilgi kazandırmakla sınırlı \nolmamalı, aynı zamanda etik farkındalık, eleştirel düşünme ve \nbilinçli teknoloji kullanımı becerilerini de geliştirmelidir (Luckin, \n2018). Yapay zekâ teknolojilerinin eğitimde etkin bir şekilde \nkullanılması, yalnızca teknik becerilerin kazandırılmasını değil, \naynı zamanda öğrencilerin etik farkındalık, eleştirel düşünme \nve bilinçli teknoloji kullanımı konularında eğitilmesini gerektirir. \nYapay zekâ ile ilgili eğitim verirken, öğrencilerin etik değerler \ndoğrultusunda hareket etmelerini sağlamak, teknolojiyi so -\nrumlu bir şekilde kullanmalarını teşvik etmek ve toplumsal \netkilerini anlamalarını desteklemek önemlidir (Coeckelbergh, \n2020; Floridi, 2019).\nGiderek yaygınlaşan yapay zekâ uygulamaları, eleştirel düşünme, \nproblem çözme ve dijital okuryazarlık becerilerini geliştirme -\nde önemli bir araç hâline gelmiştir (Luckin, 2018). Ancak bu \nteknolojilerin öğrenme süreçlerinde bilinçli ve etkili bir şekilde \nkullanılması için net amaç ve hedefler belirlenmelidir.\n7.4. Yapay Zekâyı Kullanma Amaçları ve Hedefleri\nYapay zekâ eğitiminin etkili olabilmesi için bilişsel gelişim, tek -\nnik yeterlilik, etik bilinç ve yaratıcı problem çözme gibi temel \nunsurlara odaklanılmalıdır.\n7.4.1. Yapay Zekâyı Kullanma Amaçları\nDijital Okuryazarlığı ve Teknolojik Yetkinliği Artırmak\n ¬ Öğrencilerin yapay zekâ destekli araçları etkili bir şekilde \nkullanmalarını sağlamak.\nProblem Çözme ve Eleştirel Düşünme Yetilerini Geliştirmek\n ¬ Yapay zekânın sunduğu veri analiz yeteneklerinden fay -\ndalanarak mantıksal çıkarımlar oluşturmak.\nYaratıcılığı ve İnovasyonu Teşvik Etmek\n ¬ Yapay zekâ destekli uygulamalar ile sanatsal ve yaratıcı \nprojeler geliştirmek.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n274"}, {"page": 275, "text": "Etik Kullanım ve Veri Gizliliğini Öğretmek\n ¬ Yapay zekâ sistemlerinin önyargılarını, karar mekaniz -\nmalarını ve veri gizliliği ilkelerini anlamak.\nGelecekteki Kariyer Becerilerini Desteklemek\n ¬ Yapay zekâ ile ilgili meslekler konusunda bilinçlenmeyi \nsağlamak ve öğrencileri geleceğe hazırlamak.\n7.5. Yapay Zekâ Eğitiminin Hedefleri\n ¬ Yapay zekânın temel kavramlarını anlamak.\n ¬ Yapay zekâ tabanlı uygulamaları bilinçli ve etkili kulla -\nnabilmek.\n ¬ Veri analizini yorumlayarak yapay zekâ destekli sistemleri \ndeğerlendirebilmek.\n ¬ Yapay zekânın etik boyutları ve güvenlik riskleri konusunda \nfarkındalık kazanmak.\n ¬ Problem çözme ve proje geliştirme yetkinliklerini artırmak.\n7.5.1. Yapay Zekâ Okuryazarlığı\nÖğrencilerin, hangi yapay zekâ araçlarını nasıl ve ne amaçla \nkullanabileceklerini bilmeleri gereklidir.\nÖrnek: ChatGPT, Google Bard, MidJourney gibi araçların hangi \nalanlarda daha etkili olduğu öğretilebilir.\n7.5.2. Yapay Zekâ Kullanımını Öğretme Yöntemleri\nTeorik Eğitim: Yapay zekâ teknolojilerinin nasıl çalıştığı, algo -\nritmaların karar mekanizmaları ve etik ilkeler anlatılmalıdır.\nUygulamalı Eğitim: Öğrenciler, yapay zekâ araçlarını dene -\nyimleyerek, nasıl çalıştığını ve hangi senaryolarda kullanabi -\nleceklerini öğrenmelidir.7.5.3. Problem Çözme ve Proje Tabanlı Öğrenme: \nÖğrenciler, yapay zekâ kullanarak eğitimde yenilikçi projeler \ngeliştirmeye teşvik edilmelidir.\n7.6. Yapay Zekâ Kullanımını Öğretme Yöntemleri\n7.6.1. Teorik ve Uygulamalı Eğitimler\n ¬ Yapay zekânın tarihçesi, çalışma mantığı ve temel kav -\nramları anlatılmalıdır.\n ¬ ChatGPT, Google Bard, DALL·E gibi yapay zekâ araçlarının \nnasıl çalıştığı öğretilmelidir.\n ¬ Python ve TensorFlow ile basit yapay zekâ kodlama ör -\nnekleri sunulmalıdır.\n7.6.2. Etik ve Veri Güvenliği Eğitimi\n ¬ Yapay zekâ algoritmalarının olası önyargıları ve etik so -\nrunları ele alınmalıdır (Binns, 2018).\n ¬ Veri gizliliği ve siber güvenlik konuları öğretmenler tara -\nfından vurgulanmalıdır.\n7.6.3. Problem Çözme ve Proje Tabanlı Öğrenme\n ¬ Chatbot geliştirme, duygu analizi projeleri gibi uygulamalar \nteşvik edilmelidir.\n ¬ Öğrenciler, gerçek hayattan senaryolar ile yapay zekâyı \nkullanarak projeler geliştirmelidir.\n7.7. Yapay Zekâ Eğitiminde Etkili Stratejiler\n ¬ Yapay zekâ eğitimi erken yaşta başlamalıdır.\n ¬ Uygulamalı çalışmalar ile öğrencilerin deneyim kazanması \nsağlanmalıdır.\n ¬ Etik ve güvenlik konularına özel bir vurgu yapılmalıdır.\n ¬ Öğrenciler, yapay zekâ destekli projeler geliştirmeye teşvik \nedilmelidir.\n275\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 276, "text": "¬ Öğretmenler için yapay zekâ eğitimi programları oluş -\nturulmalıdır.\n7.8. Geleceğin Eğitiminde Yapay Zekâ ve Etik \nDönüşüm\nYapay zekâ teknolojileri hızla gelişirken, gelecekte öğretmen -\nlerin rolleri ve eğitim modelleri de değişecektir.\n7.8.1. Prompt Mühendisliği ve Yapay Zekâ Kullanım \nStratejileri\nGelecekte öğretmenler, prompt mühendisliği teknikleriyle yapay \nzekâ sistemlerini daha verimli ve etik şekilde yönlendirebilecektir.\n7.8.2. Uyarlanabilir ve Kişiselleştirilmiş Öğrenme\nYapay zekâ, her öğrencinin bireysel öğrenme hızına ve ihti -\nyaçlarına uygun olarak eğitimi kişiselleştirebilir.\n7.8.3. Öğretmenlerin Yeni Rolleri ve Mesleki Gelişim\nÖğretmenler, yapay zekâ destekli eğitim modellerine uyum \nsağlamak için yeni beceriler geliştirmelidir:\nYapay zekâ okuryazarlığı ve etik farkındalık eğitimleri almalıdır.\nDijital pedagojik yaklaşımları öğrenerek, yapay zekâ araçlarını \nderslerine entegre edebilmelidir.\n7.9. Sonuç ve Öneriler: Etkili Yapay Zekâ Eğitimi İçin \nTemel Yaklaşımlar\n7.9.1. Etik Farkındalık ve Eleştirel Düşünme Eğitimine \nOdaklanın\n ¬ Öğrencilere, yapay zekâ teknolojilerinin önyargıları ve \nadalet sorunlarını eleştirel bir yaklaşımla incelemeleri \nöğretilmelidir.\nÖrnek: Yapay zekâ sistemlerinin önyargıları üzerine örneklerle \ntartışma oturumları düzenlenebilir.7.9.2. Gerçek Hayattan Uygulamalar ile Destekleyin\n ¬ Öğrenciler, yapay zekâ tabanlı uygulamaları geliştirerek \ngerçek dünyada nasıl kullanıldığını deneyimlemelidir.\nÖrnek: Öğrenciler, chatbot veya öneri sistemleri gibi yapay \nzekâ ile çalışan basit uygulamalar geliştirebilirler.\n7.9.3. Veri Mahremiyeti Eğitimi Verin\n ¬ Öğrenciler, yapay zekâ teknolojilerinin veri güvenliği ve \nmahremiyet riskleri hakkında bilinçlendirilmelidir.\nÖrnek: Sosyal medya platformlarında veri toplama süreçleri ve \nbu süreçlerde yaşanabilecek etik sorunlar üzerine tartışmalar \ndüzenlenebilir.\n7.9.4. Yapay Zekânın Toplumsal ve Ekonomik Etkilerini \nAnlatın\n ¬ Öğrencilere, yapay zekâ ve otomasyonun iş dünyasındaki \netkileri hakkında bilgi verilmelidir.\nÖrnek: Yapay zekâ ile iş gücü değişimi üzerine proje çalış -\nmaları yapılabilir.\n7.9.5. Sorumlu ve Bilinçli Kullanım Konusunda \nRehberlik Edin\n ¬ Yapay zekâ araçlarının etik kullanımını ve olası risklerini \nanlamaları için öğrencilere rehberlik edilmelidir.\nÖrnek: Veri ihlalleri veya önyargılı algoritmaların etkileri tar -\ntışılmalıdır.\n7.9.6. Proje Tabanlı Öğrenme Yöntemini Kullanın\n ¬ Öğrenciler, yapay zekâ kullanarak eğitimde yenilikçi çö -\nzümler üretmelidir.\nÖrnek: Kişiselleştirilmiş öğrenme deneyimleri sunan yapay \nzekâ projeleri geliştirilebilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n276"}, {"page": 277, "text": "7.9.7. Yapay Zekânın Sınırlarını Anlatın\n ¬ Yapay zekânın hata yapabileceği ve mükemmel olmadığı \nöğrencilere açıklanmalıdır.\nÖrnek: Yapay zekâ sistemlerinde görülen yanlış tahminler ve \nhatalar üzerine çalışmalar yapılabilir.\n7.9.8. Yapay Zekâ Araçlarını Seçme ve Değerlendirme \nBecerisi Kazandırın\n ¬ Öğrencilere, yapay zekâ araçlarını nasıl değerlendirecekleri \nöğretilmelidir.\nÖrnek: ChatGPT, Google Bard, MidJourney gibi araçların hangi \nalanlarda daha etkili olduğu kıyaslanabilir.\nYapay zekâ araçlarının her biri farklı kullanım senaryolarına \nve teknik özelliklere sahiptir. Öğrencilerin ve öğretmenlerin \nhangi yapay zekâ aracını hangi durumda kullanacaklarını analiz \nedebilmeleri için değerlendirme kriterlerini öğrenmeleri ge -\nrekmektedir. Doğru yapay zekâ aracını seçmek, ihtiyaca en \nuygun çözüme ulaşmayı kolaylaştırır.\n7.10. Yapay Zekâ Aracı Seçerken Dikkat Edilmesi \nGerekenler\n7.10.1. Kullanım Amacı ve İhtiyaç Analizi\nAracın hangi eğitim ihtiyacını karşıladığı belirlenmelidir.\nÖğrenciler ve öğretmenler için öğrenmeyi destekleyici mi, içerik \nüretimi için mi, veri analizi için mi kullanılacağı netleştirilmelidir.\n7.10.2. Veri Türü ve İşleme Kapasitesi\nAracın metin, ses, görsel veya veri analizi gibi hangi tür verileri \nişleyebildiği belirlenmelidir.\nÖrneğin, Metin tabanlı yapay zekâ araçları ile metin analizleri \nve içerik üretimi yapılabilirken, görsel tabanlı araçlar genellikle \nsanat ve tasarım çalışmalarında kullanılır.7.10.3. Kullanım Kolaylığı ve Erişilebilirlik\nKullanıcı dostu bir arayüze sahip olup olmadığı değerlendirilmeli.\nTeknik bilgi gerektirip gerektirmediği analiz edilmeli.\nÜcretsiz veya ücretli olup olmadığı dikkate alınmalı.\n7.10.4. Etik ve Güvenlik İlkeleri\nVeri gizliliği ve güvenlik politikaları incelenmeli.\nEğitimde etik kullanımı destekleyip desteklemediği kontrol \nedilmeli.\nÖrneğin, öğrenci verilerinin nasıl saklandığı ve işlenildiği araş -\ntırılmalıdır.\n7.10.5. Yapay Zekâ Algoritmalarındaki Önyargılar\n7.10.5.1. Eğitimde Ayrımcı Etkiler ve Çözüm Yolları\nYapay zekâ (YZ) teknolojileri, eğitimde kişiselleştirilmiş öğrenme \ndeneyimleri sunarak öğrencilerin bireysel ihtiyaçlarına göre \nuyarlanmış içerikler sağlayabilir. Ancak, bu sistemlerin karar \nalma süreçlerinde yer alan algoritmik önyargılar (bias), eğitim -\nde eşitlik ve adalet açısından önemli riskler barındırmaktadır \n(Binns, 2018). Bu önyargılar, yanlış veri setleri, eksik modelle -\nme veya insan kaynaklı ön yargıların yapay zekâ sistemlerine \nyansımasıyla ortaya çıkabilir (Floridi, 2019).\n7.10.5.2. Yapay Zekâda Algoritmik Önyargılar Nasıl \nOluşur?\nYapay zekâ algoritmaları, büyük veri setlerini kullanarak kararlar \nalır ve tahminlerde bulunur. Ancak, bu veriler çoğu zaman top -\nlumda var olan eşitsizlikleri ve önyargıları yansıtır. Önyargılar \ngenellikle şu faktörlerden kaynaklanır:\nVeri Setlerindeki Dengesizlik:  Eğer bir yapay zekâ modeli, belirli \nbir öğrenci grubu hakkında yeterli veriye sahip değilse, bu \ngruptaki öğrencileri yanlış sınıflandırabilir veya onların öğrenme \nihtiyaçlarını göz ardı edebilir (Mehrabi et al., 2021).\n277\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 278, "text": "Algoritmik Modelleme Hataları: Önyargılar, belirli grupları \navantajlı veya dezavantajlı hâle getiren yanlış matematiksel \nmodeller nedeniyle oluşabilir (Bostrom, 2014).\nİnsan Kaynaklı Önyargılar: Yapay zekâ sistemleri, onları eğiten \nkişilerin bilinçli veya bilinçsiz önyargılarını öğrenebilir ve bun -\nları karar alma süreçlerine yansıtabilir (Coeckelbergh, 2020).\nÖrneğin,  ABD’de yapılan bir araştırma, öğrenci değerlendirme \nsüreçlerinde kullanılan yapay zekâ tabanlı sistemlerin, siya -\nhi ve Latin kökenli öğrencileri sistematik olarak daha düşük \npuanlarla değerlendirdiğini ortaya koymuştur (Buolamwini \n& Gebru, 2018). Bu durum, algoritmik önyargıların eğitimde \neşitsizliğe neden olabileceğini göstermektedir.\n7.10.5.3. Eğitimde Algoritmik Önyargıların Sonuçları\nÖğrenci Değerlendirme Sistemlerinde Önyargılar\nYZ tabanlı sınav değerlendirme sistemleri, öğrencilerin perfor -\nmanslarını yanlış değerlendirebilir. Örneğin, bir dil modeli ağır -\nlıklı olarak Batı Avrupa dillerinde eğitildiyse, İngilizce dışındaki \ndillerde yazan öğrencilerin makalelerini düşük puanlayabilir \n(Floridi, 2019).\nÖğrenci Tavsiye Sistemlerindeki Önyargılar\nKariyer ve ders öneri sistemleri, belirli öğrenci gruplarını belirli \nalanlara yönlendirebilir. Örneğin, bir yapay zekâ sistemi, STEM \n(Fen, Teknoloji, Mühendislik, Matematik) alanlarında kadın öğ -\nrencilere daha az fırsat tanıyabilir ve onları daha çok sosyal \nbilimlere yönlendirebilir (Zuboff, 2019).\nKişiselleştirilmiş Öğrenmede Adaletsizlikler\nYZ tabanlı kişiselleştirilmiş öğrenme platformları, farklı öğrenci \ngruplarının öğrenme süreçlerini farklı şekilde yönlendirebilir. \nEğer sistemler belirli bir sosyoekonomik gruba daha fazla kay -\nnak sağlıyorsa, bu durum eğitimdeki fırsat eşitliğini bozabilir \n(Luckin et al., 2016).\n7.10.5.4. Yapay Zekâ Önyargılarını Azaltmak İçin \nÇözüm Önerileri\nVeri Çeşitliliği ve Temizleme Süreçlerinin İyileştirilmesi\nKullanılan veri setleri, tüm öğrenci gruplarını kapsayacak şekilde genişletilmeli ve önyargılar içermediğinden emin olunmalıdır \n(Binns, 2018).\nVeri temizleme süreçleri, eğitimde dezavantajlı grupları dışla -\nmadığından emin olmak için uzmanlar tarafından incelenmelidir.\nŞeffaf ve Açıklanabilir Yapay Zekâ Modelleri\nYapay zekâ sistemlerinin nasıl karar verdiği şeffaf olmalı ve \nkullanıcılar tarafından anlaşılabilir hâle getirilmelidir (Floridi, \n2019).\nEğitim kurumları, öğrencilere ve öğretmenlere yapay zekânın \nnasıl çalıştığını anlamalarını sağlayacak rehberler sunmalıdır.\nÖğretmen ve Eğitimcilerin Yapay Zekâ Okuryazarlığını Artırmak\nÖğretmenler, yapay zekânın karar mekanizmalarını anlayarak \nöğrencilerin algoritmik önyargılarla karşılaşmalarını önlemeye \nyardımcı olabilir (Luckin, 2018).\nYZ tabanlı araçları kullanmadan önce öğretmenlerin eğitim \nalması sağlanmalıdır.\nEtik Standartların ve Düzenlemelerin Güçlendirilmesi\nYapay zekâ uygulamalarının etik kullanımını teşvik eden kurallar \ngeliştirilmelidir (Coeckelbergh, 2020).\nEğitim sistemleri, öğrencilerin mahremiyetini ve verilerini \nkoruyacak şekilde düzenlenmelidir.\nYapay zekâ teknolojileri eğitimde büyük fırsatlar sunarken, \nalgoritmik önyargılar öğrenciler için ciddi adaletsizliklere yol \naçabilir. Bu önyargıların kaynağını anlamak, çözüm üretmek \nve yapay zekâyı daha adil hâle getirmek için eğitimcilerin ve \npolitika yapıcıların bilinçli hareket etmesi gerekmektedir. Şef -\nfaf ve etik yapay zekâ uygulamaları, öğrencilere eşit fırsatlar \nsunarak eğitimdeki adaletsizlikleri azaltabilir.\n7.10.6. Entegrasyon ve Uyumluluk\nEğitimde kullanılan öğrenme yönetim sistemleri (LMS) veya \ndiğer dijital araçlarla uyumlu olup olmadığı kontrol edilmelidir.\nÖrneğin,  bazı yapay zekâ araçları Google Classroom, Microsoft \nTeams gibi platformlarla doğrudan entegre çalışabilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n278"}, {"page": 279, "text": "7.10.7. Metin, Ses ve Görsel Tabanlı Yapay Zekâ \nAraçlarını Seçerken Nelere Dikkat Edilmeli?\n∂ Metin Tabanlı Yapay Zekâ Araçları\nKullanım Alanları:\nAkademik yazım, özetleme, içerik üretimi, dil çeviri, metin analizi\nSeçim Kriterleri:\nDoğru ve tutarlı yanıtlar üretme yeteneği\nGeniş dil modeli desteği (örn. ChatGPT, Google Bard, Notion \nAI, Jasper AI)\nBilgi güncelliği ve kaynak kullanımı\n∂ Ses Tabanlı Yapay Zekâ Araçları\nKullanım Alanları:\nSesli içerik oluşturma, metinden sese çeviri, dil eğitimi, po -\ndcast üretimi\nSeçim Kriterleri:\nDoğal ses sentezi ve farklı dillerde destek (örn. Eleven Labs, \nMurf AI, Speechify)\nSes kalitesi ve kişiselleştirme seçenekleri\nÖğrenciler için erişilebilirlik (örneğin, disleksi gibi özel öğrenme \nihtiyaçları için destek sağlama)\n∂ Görsel ve Video Tabanlı Yapay Zekâ Araçları\nKullanım Alanları:\nGrafik tasarım, video içerik üretimi, görsel sentezleme, eğitim \nmateryali oluşturma\nSeçim Kriterleri:\nYapay zekâ ile üretilen görsellerin telif hakkı durumu\nKullanım kolaylığı ve eğitim içeriklerine uygunluk**Öğrencilerin etkileşimli öğrenme süreçlerine katkı sağlama \n(örn. Midjourney, DALL·E, Canva AI, Runway AI, Synthesia AI)\nÖrnek: Doğru Yapay Zekâ Aracını Seçme Senaryoları\nSenaryo 1: Bir öğrenci akademik makalesini yazarken yazım \nhatalarını düzeltmek ve akademik dili geliştirmek istiyor.\nÖnerilen araçlar: Grammarly, QuillBot, ChatGPT (metin tabanlı \nyapay zekâ)\nSenaryo 2: Bir öğretmen, öğrencilere ders anlatımı için oto -\nmatik seslendirme kullanmak istiyor.\nÖnerilen araçlar: Murf AI, Eleven Labs, Speechify (ses tabanlı \nyapay zekâ)\nSenaryo 3: Bir öğrenci, görsel destekli bir tarih projesi için \nyapay zekâ kullanarak resimler oluşturmak istiyor.\nÖnerilen araçlar: Midjourney, DALL·E, Dream AI (görsel tabanlı \nyapay zekâ)\nSenaryo 4: Bir öğretmen, ders materyallerini video forma -\ntında sunmak istiyor ve bunu yapay zekâ ile otomatik olarak \noluşturmak istiyor.\nÖnerilen araçlar: Synthesia, Pictory AI, Runway AI (video ta -\nbanlı yapay zekâ)\n279\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 280, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ280"}, {"page": 281, "text": "Yapay zekâ araçlarını doğru bir şekilde seçmek ve değerlendirmek, öğrencilerin ve öğretmenlerin teknoloji okuryazarlığını \nartırmalarına, zaman tasarrufu sağlamalarına ve daha etkili öğrenme süreçleri oluşturmalarına yardımcı olur. Hangi aracın \nhangi kullanım alanına en uygun olduğunu analiz etmek ve ihtiyaca göre seçim yapmak, eğitimde yapay zekâ kullanımını \ndaha bilinçli hâle getirecektir. \nEğitimde yapay zekâ kullanımı, öğrencilerin dijital okuryazarlık, eleştirel düşünme, problem çözme ve etik farkındalık kazan -\nmasını sağlayan güçlü bir araçtır. Etik ve güvenli kullanım odaklı eğitim programları ile öğrencilere yapay zekâ destekli bir \ngeleceğe hazırlanma fırsatı sunulmalıdır. \n8.1. Gelecekte Prompt Mühendisliği ve Eğitimde Dönüşüm\nYapay zekâ teknolojileri hızla ilerlerken, eğitimde de yeni yaklaşımlar ve stratejiler geliştirilmesi kaçınılmaz hâle gelmektedir. \nPrompt mühendisliği, yapay zekâ destekli araçların etkin kullanımını sağlamak için doğru ve etkili talimatların oluşturulmasına \nodaklanır. Gelecekte, bu mühendislik alanı yalnızca yapay zekâyı yönlendirmek için değil, aynı zamanda eleştirel düşünme, \nproblem çözme ve öğretme stratejilerinin geliştirilmesi açısından da önemli bir rol oynayacaktır (Seldon & Abidoye, 2018; \nLuckin et al., 2016). Bu bağlamda, öğretmenlerin rollerinde ve öğretim süreçlerinde köklü bir dönüşüm beklenmektedir.8.SONUÇ\n8.2. Yapay Zekâ ile Kişiselleştirilmiş ve Uyarlanabilir \nÖğrenme\nYapay zekâ destekli eğitim modelleri, öğrenci merkezli öğretim \nstratejilerini daha etkin hâle getirerek bireysel öğrenme ihti -\nyaçlarını karşılayacak şekilde uyarlanabilir. Uyarlanabilir eği -\ntim platformları, öğrencilerin öğrenme hızına ve tarzına göre \nşekillenerek kişiselleştirilmiş öğrenme deneyimleri sunacaktır \n(Luckin et al., 2016).\nÖğrenci başarılarını daha yakından takip eden sistemler, \nveriye dayalı eğitim anlayışını güçlendirerek öğretmenlere \ndetaylı geri bildirim sağlayacaktır. Prompt mühendisliği, bu \nsistemlerin geliştirilmesinde ve doğru bir şekilde yönlendi -\nrilmesinde kritik bir rol oynayacaktır.\n8.3. Yenilikçi Eğitim Modelleri ve Öğrenme \nDeneyimleriGelecekte, prompt mühendisliği destekli yapay zekâ araçları, \ngeleneksel öğretim yöntemlerinden farklı olarak daha etki -\nleşimli, oyunlaştırılmış ve problem çözme odaklı öğrenme \ndeneyimleri sunacaktır (Seldon & Abidoye, 2018). Bu mo -\ndeller arasında:\n ¬ İşbirlikçi öğrenme ortamları,\n ¬ Oyun tabanlı öğrenme uygulamaları,\n ¬ Yapay zekâ destekli akıllı öğrenme asistanları,\n ¬ Sanal ve artırılmış gerçeklik temelli eğitim içerikleri,\n ¬ Yapay zekâ ile desteklenen akıllı sınav ve değerlendirme \nsistemleri gibi yenilikçi yaklaşımlar yer alacaktır.\nBu dönüşüm, hem öğretmenlerin hem de öğrencilerin daha \naktif ve üretken öğrenme deneyimleri yaşamasını sağlaya -\ncaktır.\n281\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 282, "text": "8.4. Öğretmenlerin Rolü ve Sürekli Mesleki Gelişim\nYapay zekânın eğitime entegrasyonu, öğretmenlerin geleneksel \nrollerini değiştirecek ve onlara öğrenme tasarımcısı, rehber ve \nveri analisti gibi yeni kimlikler kazandıracaktır. Öğretmenlerin \nyapay zekâ destekli araçları etkin bir şekilde kullanabilmesi için:\n ¬ Prompt mühendisliği eğitimi alması,\n ¬ Veri analizi ve yapay zekâ ile öğrenme tasarımı süreçlerini \nanlaması,\n ¬ Yapay zekâ destekli ders materyalleri geliştirebilmesi \ngerekecektir (Veletsianos, 2020).\nAyrıca, öğretmenlerin sürekli eğitim yoluyla kendilerini geliş -\ntirmesi, öğrencilere daha esnek, veri odaklı ve kişiselleştirilmiş \nöğrenme deneyimleri sunmalarını sağlayacaktır.\n8.5. Geleceğin Eğitiminde Prompt Mühendisliğinin \nYeri\nGelecekte, prompt mühendisliği, öğretmenlerin eğitim tekno -\nlojilerini daha bilinçli ve stratejik kullanmasına olanak tanırken, \nöğrencilerin de yapay zekâ destekli araçlarla daha etkin bir \nşekilde öğrenmesini sağlayacaktır. Bu süreç, eğitimi daha \nkişiselleştirilmiş, erişilebilir ve veri odaklı hâle getirecek, aynı \nzamanda öğretmenlerin rolünü daha güçlü ve yenilikçi bir \nnoktaya taşıyacaktır.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n282"}, {"page": 283, "text": "¬ Aktaş, S. G. (2025). Yapay zekâ ve gazetecilik etkileşiminde prompt mühendisliği: ChatGPT ile keşifsel bir çalışma. Gü -\nmüşhane Üniversitesi İletişim Fakültesi Elektronik Dergisi, 13(1), 611–644. https://doi.org/10.19145/e-gifder.1591890\n ¬ Arslan, K. (2020). Eğitimde yapay zekâ ve uygulamaları. Batı Anadolu Eğitim Bilimleri Dergisi, 11(1), 71–88.\n ¬ Bansal, P. (2024). Üretken yapay zekâ ile hızlı mühendislik: Önemi ve uygulanabilirliği. Bilgisayar ve İletişim Dergisi, 12(10), \n[sayfa numarası eksik]. https://doi.org/10.4236/jcc.2024.1210002\n ¬ Bender, E. M., Gebru, T., McMillan-Major, A., & Shmitchell, S. (2021). On the dangers of st   <script>
  let currentPage = 1;
  const TOTAL = 292;

  // ── Build sidebar ──
  function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    CHAPTERS.forEach(ch => {
      const secs = SECTIONS.filter(s => {
        const num = parseInt(s.code.split('.')[0]);
        return s.code.startsWith(ch.code + '.') || (ch.code === '0' && s.code.startsWith('0.'));
      });

      const div = document.createElement('div');
      div.className = 'ch-group';

      const btn = document.createElement('button');
      btn.className = 'ch-btn';
      btn.dataset.page = ch.p1;
      btn.innerHTML = `<span>Böl. ${ch.code === '0' ? 'Ön' : ch.code} — ${ch.title}</span><span class="pg">s.${ch.p1}</span>`;
      btn.onclick = () => { goPage(ch.p1); closeSidebar(); };
      div.appendChild(btn);

      if (secs.length) {
        const secList = document.createElement('div');
        secList.className = 'sec-list';
        secs.forEach(s => {
          const sb = document.createElement('button');
          sb.className = 'sec-btn';
          sb.dataset.page = s.page;
          sb.innerHTML = `<span class="code">${s.code}</span><span>${s.title} <span class="pg" style="font-size:0.68rem;opacity:0.5">s.${s.page}</span></span>`;
          sb.onclick = () => { goPage(s.page); closeSidebar(); };
          secList.appendChild(sb);
        });
        div.appendChild(secList);
      }

      nav.appendChild(div);
    });
  }

  // ── Render page ──
  function goPage(n) {
    n = Math.max(1, Math.min(TOTAL, n));
    currentPage = n;

    // Update input + progress
    document.getElementById('pageInput').value = n;
    document.getElementById('progressFill').style.width = ((n-1)/(TOTAL-1)*100).toFixed(1) + '%';
    document.getElementById('prevBtn').disabled = n <= 1;
    document.getElementById('nextBtn').disabled = n >= TOTAL;

    // Find chapter label
    const ch = [...CHAPTERS].reverse().find(c => n >= c.p1) || CHAPTERS[0];
    document.getElementById('currentChapterLabel').textContent = `${ch.code === '0' ? 'Ön Bölüm' : 'Bölüm ' + ch.code} — ${ch.title}`;
    document.getElementById('currentChapterLabel').title = ch.title;

    // Highlight active chapter in sidebar
    document.querySelectorAll('.ch-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.page) === ch.p1);
    });
    document.querySelectorAll('.sec-btn').forEach(b => {
      const bp = parseInt(b.dataset.page);
      const nextSec = [...document.querySelectorAll('.sec-btn')]
        .map(x => parseInt(x.dataset.page))
        .filter(p => p <= n)
        .pop();
      b.classList.toggle('active', bp === nextSec);
    });

    // Get page data
    const pageData = YZ_PAGES[n - 1];
    const content = document.getElementById('pageContent');

    if (!pageData || !pageData.text || pageData.text.length < 5) {
      content.innerHTML = `<div class="empty-page">
        <div style="font-size:2rem;margin-bottom:12px">📄</div>
        <div>Bu sayfa görsel içerik içeriyor.</div>
        <div style="margin-top:8px;font-size:0.82rem"><a href="/yz-prompt-rehberi/kitap.pdf" target="_blank" style="color:#60a5fa">PDF'den görüntülemek için tıklayın</a></div>
      </div>`;
      return;
    }

    content.innerHTML = `
      <div class="page-number-badge">📄 Sayfa ${n}</div>
      <div class="page-chapter-label">${ch.code === '0' ? 'Ön Bölüm' : 'Bölüm ' + ch.code} — ${ch.title}</div>
      <div class="page-text" id="pageText">${escapeHTML(pageData.text)}</div>`;

    // Scroll to top of content
    content.scrollIntoView({behavior:'smooth', block:'start'});

    // Update URL hash
    history.replaceState(null, '', '#s' + n);
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Search ──
  let searchTimeout = null;
  function searchBook(q) {
    clearTimeout(searchTimeout);
    const panel = document.getElementById('searchResults');
    if (!q || q.length < 3) { panel.classList.remove('show'); return; }
    searchTimeout = setTimeout(() => {
      const q_low = q.toLowerCase();
      const results = [];
      for (let i = 0; i < YZ_PAGES.length && results.length < 20; i++) {
        const p = YZ_PAGES[i];
        const idx = p.text.toLowerCase().indexOf(q_low);
        if (idx !== -1) {
          const start = Math.max(0, idx - 60);
          const end = Math.min(p.text.length, idx + 100);
          results.push({
            page: p.page,
            excerpt: (start > 0 ? '…' : '') + p.text.slice(start, end) + (end < p.text.length ? '…' : '')
          });
        }
      }

      document.getElementById('searchResultsTitle').textContent =
        results.length ? `"${q}" için ${results.length} sonuç (${results.length === 20 ? 'ilk 20' : results.length})` : `"${q}" bulunamadı`;

      document.getElementById('searchResultsList').innerHTML = results.map(r => `
        <div class="search-result-item" onclick="goPage(${r.page}); document.getElementById('sidebarSearch').value=''; document.getElementById('searchResults').classList.remove('show');">
          <div class="search-result-page">Sayfa ${r.page}</div>
          <div class="search-result-excerpt">${escapeHTML(r.excerpt).replace(new RegExp(escapeHTML(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`)}</div>
        </div>`).join('');

      panel.classList.toggle('show', results.length > 0 || q.length >= 3);
    }, 300);
  }

  // ── Sidebar toggle (mobile) ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }

  // ── Keyboard nav ──
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(currentPage + 1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPage(currentPage - 1);
  });

  // ── Init ──
  buildSidebar();
  const hash = location.hash.replace('#s','');
  const startPage = parseInt(hash) || 1;
  goPage(startPage);
  </script>
