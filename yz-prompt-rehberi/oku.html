aşarak ders çalışırken zaman kazanabilir.\n ¬ Öğretmenler, kaynak metinleri sadeleştirerek okuma \nmateryallerini daha erişilebilir hale getirebilir.Scholarcy:\nTanım: bir akademik içerik özetleme ve okuma aracı olarak ta -\nsarlanmış bir yapay zekâ platformudur. Özellikle araştırmacılar, \nöğrenciler ve akademisyenler için uzun akademik makaleleri, \nraporları ve belgeleri hızlıca özetleyip önemli bilgileri ön plana \nçıkararak zaman kazandırır. Scholarcy, karmaşık akademik \nmetinlerin hızlı bir şekilde anlaşılmasını sağlar ve literatür \ntaramalarını kolaylaştırır. \nTemel Özellikler:\n ¬ Otomatik Özetleme: Scholarcy, akademik makaleleri analiz \neder ve her bölümün kısa bir özetini çıkarır. Bu özetler, \nokuyucunun makalenin ana fikirlerini ve bulgularını hızlıca \nanlamasına yardımcı olur.\n ¬ Önemli Noktaların Belirtilmesi: Makalelerdeki anahtar kav -\nramları, sonuçları ve önemli verileri vurgular. Bu, araştır -\nmacıların ihtiyaç duydukları bilgiyi hızla bulmalarını sağlar.\n ¬ Referans Yönetimi: Scholarcy, makalelerdeki referansları \ntanımlar ve bunları kolayca erişilebilir hâle getirir. Bu özellik, \nkullanıcıların ilgili literatüre hızlıca ulaşmalarını sağlar.\n ¬ İçerik Dışa Aktarma: Kullanıcılar, Scholarcy tarafından \noluşturulan özetleri ve bilgileri PDF veya Word belgeleri \nolarak dışa aktarabilirler, bu da belgelerin daha sonra \nincelenmesini kolaylaştırır.\nEğitimde Kullanımı:\n ¬ Hızlı Literatür Taraması: Öğrenciler ve araştırmacılar, \nScholarcy ile geniş bir akademik makale koleksiyonunu \nhızlıca tarayabilir ve önemli noktaları özetleyebilirler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n164"}, {"page": 165, "text": "¬ Ödev ve Tez Hazırlığı: Scholarcy, uzun metinleri özetleyerek \nödev ve tez hazırlığında önemli bir yardımcı olabilir. Bu \naraç, öğrencilerin temel bilgileri daha hızlı anlamalarına ve \nmetinler üzerinde daha verimli çalışmalarına olanak tanır.\n ¬ Akademik Okuma Kolaylığı: Karmaşık ve uzun akademik \nmakalelerle çalışırken Scholarcy, okuyucuların makaleleri \ndaha rahat ve hızlı bir şekilde anlamalarına yardımcı olur.\nScholarcy kullanımı oldukça kolaydır. İşte adımlar:\n1. Metin Yükleyin: Scholarcy'nin web sitesine gidin ve özetlen -\nmesini istediğiniz makale veya akademik belgeyi yükleyin \n(PDF, Word veya URL).\n2. Otomatik Özetleme: Scholarcy, belgeyi analiz eder ve \nanahtar noktaları, önemli bölümleri ve atıfları otomatik \nolarak özetler.\n3. Özeti Gözden Geçirin: Oluşturulan özetleri ve temel nok -\ntaları inceleyin.\n4. İndirin veya Paylaşın: Özeti indirebilir veya paylaşabilirsiniz.Eğitimde Kullanımı\n ¬ Öğrenciler, ödev veya araştırmalarda uzun kaynakları \nhızlıca anlayabilir.\n ¬ Okuma-anlama etkinlikleri için sadeleştirilmiş içerikler \nüretilebilir.\n ¬ İngilizce metin çözümleme derslerinde, metnin önce tam \nhâli sonra özeti karşılaştırılarak analiz yapılabilir.\n ¬ Zaman yönetimi açısından, çok kaynaklı araştırmalarda \nön değerlendirme için kullanışlıdır.\nSMMRY: \nTanım: SMMRY, uzun metinleri veya web içeriklerini analiz ede -\nrek özetleyen, hızlı ve sade arayüzlü bir çevrim içi özetleme \naracıdır. Kullanıcıdan sadece Temel Özellikler\n ¬ Otomatik metin özetleme (özellikle İngilizce içeriklerde \netkilidir).\n ¬ Gereksiz tekrarları, örnekleri ve yan bilgileri kaldırarak yalın \nve bilgi odaklı özet sunar.\n ¬ Metin ya da URL girişiyle çalışır.\n ¬ Ücretsiz, hesap açmadan kullanılabilir.\n ¬ Gelişmiş ayarlarla özet uzunluğu belirlenebilir.Summary Box: \nTanım: Summary Box, web sayfalarındaki, PDF’lerdeki ve diğer \ndokümanlardaki metinleri tek tıkla özetleyen tarayıcı uzantısı \nve çevrimiçi AI aracıdır.\nTemel Özellikler\n ¬ Abstraktif özetleme ile AI, metni kendi kelimeleriyle yeniden \nyazarak anlam bütünlüğünü korur.\n ¬ Aktif bir makaleyi otomatik algılar ve özetleme butonu sunar.\n ¬ Kullanıcıya özet uzunluğu ayarı, PDF/YouTube/Google \nDocs özetleme gibi çeşitli modlar sunar.\n ¬ Premium sürümde zaman tasarrufu takibi, teste yönelik \nsorular üretme ve sesli özetler gibi ileri düzey özellikler \nvardır.\nEğitimde Kullanımı\n ¬ Öğrenciler, uzun makale veya tez bölümlerini hızlı özetlerle \nanlayarak çalışmayı hızlandırabilir.\n ¬ Öğretmenler, web ve PDF kaynaklarını özetleyip sadeleş -\ntirerek ders materyallerine dönüştürebilir.\n165\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 166, "text": "Grammarly:\nTanım: Kullanıcıların yazılı metinlerini dil bilgisi, yazım, nokta -\nlama ve stil açısından kontrol eden ve iyileştiren bir yapay zekâ \ndestekli yazım asistanıdır. Hem akademik hem de profesyonel \nyazımda yaygın olarak kullanılan Grammarly, metinlerin daha \nakıcı, tutarlı ve doğru olmasını sağlar. \nTemel Özellikler:\n ¬ Dil bilgisi ve Yazım Düzeltme: Grammarly, yazım hatalarını, \ndil bilgisi yanlışlarını ve noktalama yanlışlarını otomatik \nolarak tespit eder ve düzeltir. Bu özellik, kullanıcıların yazım \nhatalarını en aza indirerek metinlerini daha profesyonel \nhâle getirmelerine yardımcı olur.\n ¬ Stil Önerileri: Grammarly, yazı stilini geliştirmek için öne -\nriler sunar. Resmi, samimi, eğlenceli ya da akademik bir \nton tercih edildiğinde, yazının bu tarzda olmasını sağlar.\n ¬ Kapsamlı Sözlük ve Kelime Seçimi: Grammarly, kulla -\nnıcıların kelime dağarcığını genişletmelerine yardımcı \nolmak için alternatif kelime önerileri sunar. Bu, yazının \ndaha zengin ve etkileyici hâle gelmesini sağlar.\n ¬ Plagiarism Checker (İntihal Denetleyici): Özellikle aka -\ndemik yazılar için önemli olan bu özellik, metni internet  ¬ Sınıf içi aktivitelerde, ödev kaynakları veya makaleler üze -\nrinden test soruları otomatik üretilerek etkileşim artırılabilir.\n ¬ Zaman yönetimi gerektiren sınav dönemleri ve araştır -\nmalarda, özet çıkarmada büyük zaman tasarrufu sağlar.\n6.1.5. Akademik Yazma\nAkademik yazma sürecini desteklemek için çeşitli yapay zekâ \naraçları mevcuttur. Bu araçlar, yazma sürecini hızlandırmak, \ndil ve stil açısından iyileştirmeler yapmak ve akademik içerik \nüretiminde kullanıcıya yardımcı olmak amacıyla geliştirilmiştir. \nİşte akademik yazma için sıkça kullanılan bazı yapay zekâ \naraçları:üzerindeki milyarlarca web sayfası ile karşılaştırarak intihal \nolup olmadığını kontrol eder.\n ¬ Farklı Platformlarda Entegrasyon: Grammarly, tarayıcı \neklentileri, Microsoft Word, Google Docs ve mobil cihazlar \niçin uygulamalar aracılığıyla kullanılabilir. Bu, kullanıcıların \nfarklı platformlarda yazılarını kontrol etmelerini kolaylaştırır.\nEğitimde Kullanımı:\n ¬ Öğrenci Yazma Desteği: Öğrenciler, Grammarly kullanarak \nödevlerini, makalelerini ve tezlerini yazarken dil bilgisi ve \nstil hatalarını düzeltir. Bu, yazma becerilerini geliştirme -\nlerine yardımcı olur.\n ¬ Akademik Yazım: Grammarly, öğrencilerin akademik \nyazılarını daha profesyonel ve doğru hâle getirmelerine \nyardımcı olur. Ayrıca, intihal denetleyici özelliği sayesinde \nözgünlüğü korumalarını sağlar.\n ¬ Dil Öğrenimi: Grammarly, dil öğrenen öğrenciler için mü -\nkemmel bir destek aracıdır. Dilbilgisi hatalarını anında \ndüzelterek öğrencilerin dil becerilerini geliştirmelerine \nyardımcı olur.\n ¬ Eğitimciler İçin Araç: Öğretmenler, Grammarly kullanarak \nöğrenci yazılarını değerlendirebilir ve geri bildirimde bu -\nlunabilirler. Ayrıca, kendi ders materyallerini hazırlarken \nde bu aracı kullanabilirler.\nGrammarly kullanımı oldukça basittir ve şu adımlarla işleyiş \nsağlar:\n ¬ Kayıt Olun ve Giriş Yapın: Grammarly web sitesine gidip \nbir hesap oluşturun veya giriş yapın.\n ¬ Metin Yükleyin veya Yazın: Metninizi yazın ya da düzen -\nlemek istediğiniz metni kutuya yapıştırın.\n ¬ Düzenlemeler: Grammarly, yazım, dil bilgisi, stil ve ton \nhatalarını tespit eder ve düzeltilmesini önerir.\n ¬ Sonucu İndirin veya Kopyalayın: Düzeltilmiş metni gözden \ngeçirip kopyalayın veya indirin.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n166"}, {"page": 167, "text": "Zotero:\nTanım: Araştırma ve referans yönetimi için kullanılan açık \nkaynaklı bir yazılım aracıdır. Özellikle akademik çalışmalarda, \nmakale yazımlarında ve tez hazırlıklarında araştırmacıların \nkaynaklarını organize etmelerine ve bu kaynaklardan alıntı \nyapmalarına yardımcı olur. \nTemel Özellikler:\n ¬ Referans Yönetimi:  Zotero, araştırma sürecinde kullanılan \ntüm kaynakları toplar ve organize eder. Kitaplar, makaleler, \nweb sayfaları gibi farklı kaynakları kolayca kaydedebilir ve \nbu kaynakları düzenleyebilirsiniz.\n ¬ Otomatik Alıntı Yapma: Zotero, araştırma belgelerine \notomatik olarak alıntı ve kaynakça eklemenize olanak \ntanır. Farklı atıf stilleri (APA, MLA, Chicago vb.) arasında \nseçim yapabilirsiniz.\n ¬ Tarayıcı Entegrasyonu: Zotero, tarayıcı eklentileri sa -\nyesinde internette gezinirken kaynakları tek tıklamayla \nkaydetmenizi sağlar. Bu özellik, özellikle akademik veri \ntabanlarından makale toplarken çok kullanışlıdır.\n ¬ Gruplar ve Paylaşım: Zotero, kullanıcıların işbirliği yapma -\nsına olanak tanır. Gruplar oluşturarak araştırma projelerini \npaylaşabilir ve birlikte çalışabilirsiniz.\nEğitimde Kullanımı:\n ¬ Araştırma ve Proje Hazırlığı: Öğrenciler, tez veya makale \nhazırlarken Zotero'yu kullanarak kaynaklarını kolayca yöne -\ntebilirler. Zotero, kaynakları düzenlemeyi, notlar eklemeyi \nve literatür taramasını verimli hâle getirir.\n ¬ Alıntı ve Kaynakça Yönetimi: Akademik yazım sürecinde \nalıntı yapma ve kaynakça oluşturma gibi görevleri otoma -\ntikleştirir. Bu sayede, öğrenciler zaman kazanır ve alıntı \nhatalarını en aza indirir.\n ¬ Ders Notları ve Okuma Listeleri: Öğretmenler, ders mater -\nyallerini hazırlarken Zotero'yu kullanarak okuma listeleri \noluşturabilir ve bu listeleri öğrencilerle paylaşabilirler.Paperpal:\nTanımı:  Akademik yazım sürecini destekleyen ve araştırmacılara \nyazılarında daha iyi sonuçlar elde etmeleri için yardımcı olan \nyapay zekâ tabanlı bir yazım asistanıdır. Özellikle araştırma \nmakaleleri, tezler ve akademik yazılar üzerinde çalışanlar için \ntasarlanmıştır. \nTemel Özellikler:\n ¬ Gerçek Zamanlı Dil Önerileri: Paperpal, akademik me -\ntinlerin dilini düzeltmek ve daha akıcı hâle getirmek için \nanında geri bildirim sağlar. Bu özellik, cümle yapılarını \niyileştirmek, dil hatalarını düzeltmek ve akademik tonu \ntutturmak için kullanılır.\n ¬ Plagiarism Checker: Kapsamlı bir intihal kontrolü sunar ve \nkullanıcıların çalışmalarındaki benzerlikleri tespit ederek \nözgünlük sağlamalarına yardımcı olur.\n ¬ Akademik Çeviri ve Parafraz: Metinleri farklı dillere çe -\nvirmek ve mevcut metinleri yeniden yapılandırmak için \ngelişmiş araçlar sunar, bu da uluslararası yayınlar için \noldukça faydalıdır.\n ¬ Araştırma Özelliği: Paperpal, 250 milyonun üzerinde \naraştırma makalesine erişim sağlayarak, kullanıcıların \nyazılarında bilimsel olarak desteklenmiş bilgiler kullan -\nmalarına olanak tanır.\n ¬ Pre-submission Checks: Makale gönderiminden önce dil \nve teknik hataları en aza indirgemek için kapsamlı kontrol \nsağlar.\nEğitimde Kullanımı:\n ¬ Öğrenciler: Makaleler, ödevler ve tezler gibi akademik \nçalışmalarını geliştirmek için kullanabilirler.\n ¬ Akademisyenler ve Araştırmacılar: Araştırma makaleleri, \nproje raporları ve akademik yayınlar için yazım desteği \nalabilirler.\n167\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 168, "text": "¬ Eğitim Kurumları: Öğrencilerin yazma becerilerini geliş -\ntirmek için bir eğitim aracı olarak kullanılabilir.\nPaperpal akademik yazılar için kullanılan bir yapay zekâ des -\ntekli yazım ve dil düzenleme aracıdır. Kullanımı şu şekildedir:\n1. Web Sitesine Giriş Yapın: Paperpal'in web sitesine gidip \nbir hesap oluşturun.\n2. Belgenizi Yükleyin: Makalenizi veya akademik çalışmanızı \nyükleyin (PDF veya Word formatında).\n3. Düzenlemeyi Başlatın: Yapay zekâ, metni analiz eder ve \nyazım, dil bilgisi, tutarlılık ve akademik dil ile ilgili öneriler \nsunar.\n4. Önerileri Gözden Geçirin:  Önerileri inceleyip düzenlemeler \nyapın.\n5. İndirin: Düzeltilmiş belgeyi indirerek kullanın.\nConsensus AI:\nTanımı: Bilimsel araştırmalara hızlı ve kolay erişim sağlayan \nyapay zekâ destekli bir arama motorudur. Bu araç, kullanıcıların \naraştırma sorularını sormasına ve anında bilimsel makaleler -\nden özetlenmiş cevaplar almasına olanak tanır. Consensus \nAI, doğal dil işleme ve makine öğrenimi tekniklerini kullanarak, \nkullanıcıların belirli bir konuda var olan bilimsel konsensüsü \ngörmelerini sağlar. \nTemel Özellikler:\n ¬ Bilimsel Arama Motoru: Consensus, 200 milyondan fazla \nhakemli bilimsel makaleye erişim sunar. Kullanıcılar, so -\nrularını yazarak ilgili makalelerden özetlenmiş cevaplar \nalabilirler.\n ¬ Consensus Meter: Kullanıcılar, belirli bir soruya verilen \ncevapların yüzdelik dağılımını görebilirler. Bu özellik, bi -\nlimsel topluluk içindeki genel görüşü anlamayı kolaylaştırır.\n ¬ Copilot ve Synthesize Özellikleri: Copilot özelliği, kullanı -\ncıların sorularına yönelik içerik oluştururken, Synthesize \nözelliği ise birden fazla makaleyi analiz ederek tek bir özet \nçıkarır.\nEğitimde Kullanımı:\n ¬ Hızlı Literatür Taraması: Öğrenciler ve araştırmacılar, \nbilimsel literatür taramalarını hızlıca yapabilir, böylece \naraştırmalarını daha verimli hâle getirebilirler.\n ¬ Gerçek Zamanlı Öğrenme: Öğretmenler, ders sırasında \nyeni araştırmalar hakkında öğrencilerini bilgilendirmek \niçin bu aracı kullanabilirler. Ayrıca, sınıf içi tartışmalarda \nConsensus AI ile hızlıca bilimsel kanıtlara ulaşabilirler.\n ¬ Ödev ve Proje Yardımı: Öğrenciler, Consensus AI'yi kul -\nlanarak bilimsel makaleleri araştırabilir ve ödevlerinde \ndoğru ve güncel bilgileri kullanabilirler.\nWritesonic: \nTanım: Yapay zekâ destekli bir yazı asistanıdır ve kullanıcıların \nçeşitli yazılı içerikler oluşturmasına yardımcı olur. Bu araç, blog \nyazılarından sosyal medya gönderilerine, reklam metinlerinden \nürün açıklamalarına kadar geniş bir yelpazede içerik üretme \nkabiliyetine sahiptir. Writesonic, kullanıcıların kısa açıklamalar \nveya anahtar kelimeler girerek, bu girdilere dayalı insan benzeri \nmetinler oluşturmasını sağlar.\nTemel Özellikler:\n ¬ İçerik Üretimi: Writesonic, kısa süre içinde blog yazıları, \nmakaleler, sosyal medya içerikleri, reklam metinleri ve \ndaha fazlasını oluşturabilir. Kullanıcılar, istedikleri konuya \nuygun içerikleri kolayca üretebilirler.\n ¬ SEO Uyumlu İçerik: Arama motoru optimizasyonu (SEO) \nkurallarına uygun içerikler oluşturarak, içeriklerin arama \nmotorlarında daha üst sıralarda yer almasına yardımcı olur.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n168"}, {"page": 169, "text": "¬ Farklı Yazım Stilleri: Kullanıcılar, içeriklerinin tonunu ve \nstilini belirleyebilirler; resmi, samimi, eğlenceli veya pro -\nfesyonel tonlarda içerikler üretilebilir.\n ¬ Diller Arası Çeviri: Writesonic, çok dilli içerik üretimi ya -\npabilir. Bu sayede, farklı dillerde içerik üretilerek küresel \nkitlelere hitap edilebilir.\nEğitimde Kullanımı:\n ¬ Öğrenciler İçin Yazı Desteği: Öğrenciler, ödevler, projeler \nve makaleler için içerik oluştururken Writesonic’i kullana -\nbilirler. Bu araç, içerik üretme sürecini hızlandırır ve daha \nkaliteli metinler oluşturulmasına yardımcı olur.\n ¬ Pazarlama Dersleri: Pazarlama ve reklamcılık derslerinde, \ngerçek kampanyalar için içerik oluşturma pratikleri yapı -\nlabilir. Öğrenciler, farklı pazarlama stratejileri için metinler \nüretebilirler.\n ¬ Dil Öğrenimi: Dil öğrenen öğrenciler, farklı dillerde metin \nüretme ve bu metinlerin dil bilgisi açısından doğruluğunu \nkontrol etme konusunda Writesonic’i kullanabilirler.\n ¬ Yaratıcı Yazma: Öğrenciler, yaratıcı yazma projelerinde \nbu aracı kullanarak hikâye, şiir veya diğer yaratıcı içerikler \noluşturabilirler.okuyucunun makalenin ana fikirlerini ve bulgularını hızlıca \nanlamasına yardımcı olur.\n ¬ Önemli Noktaların Belirtilmesi: Makalelerdeki anahtar kav -\nramları, sonuçları ve önemli verileri vurgular. Bu, araştır -\nmacıların ihtiyaç duydukları bilgiyi hızla bulmalarını sağlar.\n ¬ Referans Yönetimi: Scholarcy, makalelerdeki referansları \ntanımlar ve bunları kolayca erişilebilir hâle getirir. Bu özellik, \nkullanıcıların ilgili literatüre hızlıca ulaşmalarını sağlar.\n ¬ İçerik Dışa Aktarma: Kullanıcılar, Scholarcy tarafından \noluşturulan özetleri ve bilgileri PDF veya Word belgeleri \nolarak dışa aktarabilirler, bu da belgelerin daha sonra \nincelenmesini kolaylaştırır.\nEğitimde Kullanımı:\n ¬ Hızlı Literatür Taraması: Öğrenciler ve araştırmacılar, \nScholarcy ile geniş bir akademik makale koleksiyonunu \nhızlıca tarayabilir ve önemli noktaları özetleyebilirler.\n ¬ Ödev ve Tez Hazırlığı: Scholarcy, uzun metinleri özetleyerek \nödev ve tez hazırlığında önemli bir yardımcı olabilir. Bu \naraç, öğrencilerin temel bilgileri daha hızlı anlamalarına ve \nmetinler üzerinde daha verimli çalışmalarına olanak tanır.\n ¬ Akademik Okuma Kolaylığı: Karmaşık ve uzun akademik \nmakalelerle çalışırken Scholarcy, okuyucuların makaleleri \ndaha rahat ve hızlı bir şekilde anlamalarına yardımcı olur.\nScholarcy akademik makaleleri özetleyen bir yapay zekâ \naracıdır. Kullanımı şu adımlardan oluşur:\n1. Belgenizi Yükleyin: Scholarcy’nin web sitesine gidin ve \nözetlenmesini istediğiniz PDF, Word veya URL şeklinde \nbelgenizi yükleyin.\n2. Otomatik Özetleme: Yapay zekâ, makaleyi analiz ederek \nanahtar noktaları, bulguları ve önemli bilgileri özetler.\n3. Özeti Gözden Geçirin: Özetlenen bilgileri ve kritik noktaları \ninceleyin.\n4. İndirin veya Paylaşın: Hazırlanan özeti indirebilir veya \npaylaşabilirsiniz.\nScholarcy:\nTanım: Bir akademik içerik özetleme ve okuma aracı olarak \ntasarlanmış bir yapay zekâ platformudur. Özellikle araştırmacılar, \nöğrenciler ve akademisyenler için uzun akademik makaleleri, \nraporları ve belgeleri hızlıca özetleyip önemli bilgileri ön plana \nçıkararak zaman kazandırır. Scholarcy, karmaşık akademik \nmetinlerin hızlı bir şekilde anlaşılmasını sağlar ve literatür \ntaramalarını kolaylaştırır. \nTemel Özellikler:\n ¬ Otomatik Özetleme: Scholarcy, akademik makaleleri analiz \neder ve her bölümün kısa bir özetini çıkarır. Bu özetler, \n169\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 170, "text": "Trinka AI:\nTanım: Akademik yazım ve dil bilgisi düzenleme için geliştirilmiş \nbir yapay zekâ aracıdır. Özellikle akademik makaleler, tezler ve \ndiğer profesyonel yazılar üzerinde çalışanlar için tasarlanmış -\ntır. Trinka, dil bilgisi hatalarını düzeltir, yazım stilini geliştirir \nve metinlerin akademik standartlara uygun olmasını sağlar. \nTemel Özellikler:\n ¬ Dil bilgisi ve Yazım Düzeltme: Trinka, metinlerdeki dil \nbilgisi ve yazım hatalarını otomatik olarak tespit eder ve \ndüzeltir. Ayrıca, noktalama işaretleri, cümle yapıları ve \nkelime seçimleri konusunda da öneriler sunar.\n ¬ Akademik Yazım Kontrolü: Trinka, metinlerin akademik \nstandartlara uygun olmasını sağlar. Bu, terminoloji kulla -\nnımı, uygun dil ve akademik yazım kurallarının izlenmesi \ngibi konularda kullanıcıya rehberlik eder.\n ¬ Stil Geliştirme: Trinka, metinlerdeki anlatımın daha akıcı \nve etkili olmasını sağlamak için stil iyileştirmeleri önerir. \nBu, özellikle karmaşık konuların daha anlaşılır hâle geti -\nrilmesine yardımcı olur.\n ¬ Kapsamlı Raporlama:  Kullanıcılar, düzeltilmiş metinlerin \nyanı sıra metinlerinde yapılan değişikliklerin ayrıntılı bir \nraporunu da alabilirler. Bu raporlar, kullanıcıların yazım \nbecerilerini geliştirmelerine yardımcı olur.\nEğitimde Kullanımı\n ¬ Öğrenciler, tez, makale ve proje metinlerinin akademik \nyazım standardına uygun hale gelmesine yardımcı olabilir.\n ¬ Öğretmenler, yazım hatalarını otomatik tespit ederek \nzaman kazanabilir ve geribildirim sürecini hızlandırabilir.\n ¬ Akademik kurumlar, DocuMark entegrasyonu ile öğrenci \nyapay zekâ kullanımını izleyerek sorumluluk ve dürüstlük \nkültürünü destekleyebilir \n ¬ LaTeX kullanıcıları, teknik belgelerde format bozulmadan \ndüzenleme yapabilir.Bearly AI:\nTanım: Kullanıcıların okuma, yazma ve içerik oluşturma süreç -\nlerini hızlandıran bir yapay zekâ destekli araçtır. Bu platform, \nözellikle eğitimciler ve profesyoneller için tasarlanmış olup, \ngünlük iş akışlarını daha verimli hâle getirmeye yardımcı olur. \nTemel Özellikler:\n ¬ HyperChat: Belgelerle etkileşimde bulunabilir, sorular \nsorabilir ve analizler yapabilirsiniz. Bu özellik, kullanıcı -\nların dosyalara eklenen içerikle aktif olarak çalışmasına \nolanak tanır.\n ¬ Transkripsiyon: Podcast'ler, YouTube videoları veya toplantı \nkayıtları gibi ses ve video dosyalarını metne dönüştürme \nözelliği sunar.\n ¬ Gerçek Zamanlı Web Erişimi: Google Arama motorunu \nkullanarak anında web erişimi sağlar, bu da kullanıcıların \nen güncel bilgilere ulaşmasını kolaylaştırır.\n ¬ Özetleme: Web sayfalarındaki içerikleri özetleme ve bu \nözetlerle etkileşimde bulunma imkânı verir.\nEğitimde Kullanımı:\n ¬ Ders Planlama: Bearly AI, öğretmenlerin ders planlama \nsüreçlerini optimize etmelerine yardımcı olabilir. Araç, öğ -\nrencilerin ihtiyaçlarına göre kişiselleştirilmiş ders planları \noluşturabilir.\n ¬ Anında Geri Bildirim: Öğretmenler, Bearly AI kullanarak \nöğrencilere anında geri bildirim sağlayabilirler. Bu, öğ -\nrencilerin öğrenme süreçlerini hızlandırır ve akademik \nbaşarılarını artırır.\n ¬ İşbirlikçi Öğrenme Alanları: Öğrenciler için grup çalışmaları \nve işbirlikçi projeler oluşturmak için kullanılabilir. Öğret -\nmenler, öğrencilerin katılımını izleyebilir ve geri bildirimde \nbulunabilir.\n ¬ Veri Odaklı Analizler: Bearly AI, öğrenci performansına ilişkin \nveri analizleri sunar, bu da öğretmenlerin eğitim strateji -\nlerini daha etkili bir şekilde belirlemelerine yardımcı olur.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n170"}, {"page": 171, "text": "Bearly AI, eğitimciler için derslerin planlanması, değerlendiril -\nmesi ve kişiselleştirilmesi süreçlerinde güçlü bir yardımcıdır. \nÖzellikle, öğretmenlerin verimliliklerini artırarak daha etkili bir \neğitim sunmalarını sağlar (Helper AI Tools) (Bearly).\n6.1.6. Kavram Haritaları: ¬ Adımlar:\n1. Öğrencilerden PDF veya YouTube linki yoluyla bir ders \niçeriği seçmeleri istenir.\n2. İçerik Mapify’e yüklenir ve AI otomatik zihin haritası \noluşturulur.\n3. Harita üzerine tıklanarak alt konular genişletilir, renkler \nve başlıklar düzenlenir.\n4. Harita üzerinden AI ile sohbet edilerek anlamadıkları \nnoktalar açıklanır.\n5. Ortaya çıkan harita, sınıfa sunum slaytı olarak gösterilir \nve ajandaya eklenir.\nKazanımlar:\n ¬ Konu çalışmayı görsel olarak yapılandırma.\n ¬ Akılda kalıcılığı artıran düzenleme yeteneği.\n ¬ Özellikle karmaşık dersler için özetleme ve düzenleme \nbecerisi.\n ¬ Dijital araçlarla etkileşim, öz disiplin.\nMapify:\nTanım: Mapify, kullanıcıların PDF, Word, PowerPoint, YouTube, \nses ve web sayfaları gibi çeşitli içerikleri alıp bunları yapısal, \ninteraktif zihin haritalarına dönüştüren bir yapay zekâ aracıdır.\nTemel Özellikler\n ¬ AI destekli zihin haritalama: Metin veya içerik yükleyerek \nhiyerarşik görseller oluşturur.\n ¬ Çoklu içerik türü desteği: PDF, YouTube, ses ve web say -\nfasından otomatik dönüşüm \n ¬ Etkileşimli düzenleme: Düğümlere tıklayarak genişletme, \nrenklendirme ve düzenleme imkânı.\n ¬ Gerçek zamanlı sohbet: Harita içerikleriyle AI sohbet edi -\nlebilir, açıklama istenebilir.\n ¬ Paylaşılabilir sunum modu: Haritayı slayta dönüştürme, \nPDF/JPG/SVG çıktıları alma.\n ¬ Platform bağımsız: Web, mobil ve tarayıcı uzantısı ile \ngeniş erişim.\nEğitimde Örnek Uygulama (8. – 12. Sınıf)\nUygulama Adı: \"Zihin Haritalarıyla Ders Tekrarı\"\n ¬ Araç: Mapify\n ¬ Süre: 40–45 dkVisme\nTanım: Visme, görsel içerik üretimi ve sunumlar için kapsamlı \nbir bulut platformudur. AI destekli tasarım araçları, şablonlar, \netkileşimli infografikler ve işbirliği özellikleri ile bireylerin ve \nekiplerin profesyonel görseller hazırlamasına olanak tanır.\nTemel Özellikleri\n ¬ Binlerce şablon: Sunum, infografik, rapor, e-kitap, etki -\nleşimli içerikler için 15.000+ hazır tasarım.\n ¬ AI Designer: Metin promptu ile otomatik tasarım üretir, \nardından detaylı özelleştirme imkânı tanır.\n171\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 172, "text": "¬ Animasyon & etkileşim: Hover efektleri, fotoğraflar, ses \nve video ekleme; formlar ve sınıf içi anketler yer alır.\n ¬ İş birliği araçları: Yorum sistemi, grup çalışmaları, marka \nyönetimi ve zamana duyarlı paylaşım seçenekleri.\n ¬ Eğitim odaklı fonksiyonlar: Eğitim şablonları, öğretmen \nve öğrenci kullanımı için rapor ve zihin harita araçları.\n ¬ LMS entegrasyonu: İçeriği doğrudan öğrenme platform -\nlarına aktarabilir, gömülebilir.\nEğitimde Kullanım – Örnek Uygulama\nDers Sunumu ve Etkileşim Aracı\nSınıf Düzeyi: 7–12\nSüre: 1 ders saati (40 dk)\nAdımlar:\n1. Öğrenciler ders içeriğini (ör. su döngüsü) Visme’ye aktarır \nve AI ile bir etkileşimli infografik oluşturur.\n2. Animasyonlu görsel ve icon’lar ekleyerek bilgilerin vur -\ngulanması sağlanır.\n3. Öğretmen, haritaya quiz, anket ya da ses ekleyerek et -\nkileşimi artırır.\n4. Harita gömülü veya PDF olarak sınıf portalında paylaşılır.\n5. Öğrenciler kendi aldıkları çıktı üzerinden eleştirel geri \nbildirim verir.\nKazanımlar:\n ¬ Bilgi görselleştirme ve yapılandırma\n ¬ Dijital içerik üretimi\n ¬ Etkileşim ve geri bildirimle aktif öğrenme\n ¬ Görsel-işitsel iletişim becerilerinin gelişimiNeden Visme?\n ¬ Her düzeyde kolay kullanım sağlar (görsel deneyim ge -\nrektirmez) \n ¬ Zengin içerik ve şablon kütüphanesi, ders planlamasını \nhızlandırır.\n ¬ Eğitim ortamlarına özel iyileştirmeler mevcuttur: LMS \nentegrasyonu, öğrenci-öğretmen etkileşimi.\nGitMind\nTanım: GitMind, web tabanlı ve bulut destekli bir zihin haritası \nve diyagram aracıdır. Yapay zekâ özellikleri (metin, video, PDF \ndönüşümü) sayesinde bilgiyi otomatik olarak yapılandırır ve \ndijital zihin haritaları oluşturmayı kolaylaştırır.\nTemel Özellikler\n ¬ AI Destekli Harita Üretimi: Metin, video, makale, ses ya \nda PDF yükleyerek otomatik harita oluşturabilir.\n ¬ Gerçek Zamanlı İş birliği: Bağlantı ile ekip üyelerini karşılıklı \ndüzenlemeler yapmaya dahil etme imkânı tanır.\n ¬ Template Galerisi: Eğitim, proje planı, beyin fırtınası gibi \nkategoriler için hazır şablonlar mevcut.\n ¬ Çoklu Platform Desteği ve İleri Dışa Aktarım: Web, iOS, \nAndroid üzerinden kullanılabilir; PNG, JPG, PDF, Word \nolarak dışa aktarılabilir.\n ¬ Outline Görünümü ve Versiyon Geçmişi: Haritayı metin \nformatına çevirebilir; değişiklik geçmişine erişim sağlar.\nEğitimde Uygulama Örneği (8–12. sınıf)\nUygulama Adı: “Konuyu Zihin Haritasıyla Özetle”\nAdımlar:\n1. Öğrenciler konu seçer: örneğin “Endüstri Devrimi”.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n172"}, {"page": 173, "text": "2. PDF, makale ya da YouTube linki yüklenir.\n3. GitMind otomatik harita üretir; ardından öğrenciler alt \nbaşlık, renk ve notlarla özelleştirir.\n4. “Outline” görünüm ile metin özeti oluşturulur.\n5. Sınıf önünde paylaşılır; öğretmen geri bildirim verir.\nKazanımlar:\n ¬ Bilginin görsel harita üzerinden organize edilmesi\n ¬ Bilgi yapılandırma becerisi\n ¬ Ekip çalışması ve dijital araç kullanımı\n ¬ Karmaşık konuları özetleme yeteneği\nNeden GitMind?\n ¬ Yapay zekâ destekli zihin haritaları ile öğrenmeyi hızlandırır \n ¬ İş birliği özellikleriyle grup çalışmasını güçlendirir.\n ¬ Eğitim içeriğine uygun şablonlarla kolay adapte edilir. ¬ Harita tabanlı GPT prompt: Haritadaki tüm içerik otomatik \nprompt olarak kullanılabilir; bu sayede hızlı özet, taslak \nya da açıklama oluşturulur.\n ¬ AI güçlü içerik üretimi: Tek tıkla taslak ve metin üretimi; \nayrıca tamamen yeni harita taslakları otomatik oluşturabilir.\n ¬ SEO & araştırma desteği: Anahtar kelime hacmi, arama \ntrendleri ve önde gelen makale başlıklarını sunarak içerik \nplanlamaya katkı sağlar.\n ¬ Whiteboard işlevi: Arama sonuçlarını sürükleyerek, not \nekleyerek ve harita üzerinde organize ederek tek bir ça -\nlışma alanı oluşturma \nEğitimde Uygulama Önerisi\nUygulama Adı: “Konu Haritası ve Soru Cevap”\n ¬ Sınıf Düzeyi: 9–12.sınıf\n ¬ Süre: 1 ders saati (40–45 dk)\n ¬ Araç: ContextMinds\nAdımlar:\n1. Öğrenciler bir konu belirler (örneğin: \"İklim değişikliği\").\n2. Web, makale veya PDF kaynağı ContextMinds’e eklenir.\n3. AI önerilen kavramları analiz ederek harita oluşturulur.\n4. Harita üzerinden GPT'ye özet veya açıklama ürettirilir.\n5. Oluşan metin, öğrenciler tarafından değerlendirilip tartışılır.\nKazanımlar:\n ¬ Kavramlar arası ilişkileri görsel olarak algılama\n ¬ Bilgi sentezi ve örgütleme\n ¬ Dijital iş birliği ve kaynak kullanımı\n ¬ Derinlemesine öğrenme destekli anlamlı öğrenme \nContextMinds:\nTanım: ContextMinds, çevrimiçi çalışan, AI destekli kavram \nharitalama ve \"context charting\" aracıdır. Zihin haritalarına \nbenzer görsel düzenlerle büyük bilgi kümeleri üzerinde dü -\nşünmeyi kolaylaştırır. Aynı zamanda metin, video, PDF ve web \niçeriğini \"bağlam haritaları\"na dönüştürerek zengin görsel \nsunumlar oluşturur. \nTemel Özellikler\n ¬ Otomatik öneri paneli: Harita oluştururken, AI Wikipedia, \nönceki haritalar ve diğer kullanıcı haritalarından alakalı \nkavramları önerir.\n173\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 174, "text": "6.2. Görüntü Oluşturma\nGörselleştirme teknolojilerinin hızla gelişmesiyle birlikte, ya -\npay zekâ destekli görüntü oluşturma araçları yaratıcı süreçleri \ndönüştürmeye başladı. Bu araçlar, metinden görsele dönü -\nşüm sağlayarak sanatçılar, tasarımcılar, içerik üreticileri ve \neğitimciler için güçlü bir destek sunuyor. Kullanıcılar, basit \nmetin komutlarıyla dijital sanat eserleri, illüstrasyonlar, reklam \nmateryalleri ve eğitim içerikleri oluşturabiliyor.\nYapay zekâ tabanlı görüntü oluşturma araçları, stil transferi, \nyüksek çözünürlüklü görseller üretme, animasyonlar oluşturma \nve sahne tasarımı gibi geniş bir yelpazede kullanılabilir. Eğitimde, \nders materyalleri görselleştirme, tarihi olayları canlandırma, \nfen ve mühendislik derslerinde 3D modelleme desteği gibi farklı \nalanlarda öğrencilere daha etkili bir öğrenme deneyimi sunar.\nGelişmiş algoritmalar ve derin öğrenme modelleri sayesinde, \nbu sistemler her geçen gün daha gerçekçi ve detaylı görüntüler \nüretebiliyor. Ancak, etik kullanımı, telif hakları ve yapay zekâ \nönyargıları gibi konular da dikkate alınarak bilinçli bir şekilde \nkullanılması önemlidir.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla deği -\nşebilir. Güncellenen ve yeni eklenen araçlar için üretici web \nsitelerinden bilgi alabilirsiniz.\n6.2.1. Görsel İçerik Üretim Araçlarımedya projeleri için görsel içerik oluşturmasına olanak \ntanır. Kullanıcılar, basit girişlerle profesyonel görünümlü \nstok görseller üretebilirler.\n ¬ Tasarım Şablonları: Platform, kullanıcıların projelerini hız -\nla başlatmalarına yardımcı olacak çeşitli hazır tasarım \nşablonları sunar. Bu şablonlar, kişiselleştirilebilir ve farklı \nprojeler için kullanılabilir.\n ¬ Yapay Zekâ Destekli Düzenleme: Stockimg.ai, oluşturulan \ngörsellerin düzenlenmesi ve optimize edilmesi için yapay \nzekâ desteği sunar. Bu özellik, görsellerin hedef kitleye \ndaha uygun ve etkili olmasını sağlar.\n ¬ Çoklu Platform Desteği: Stockimg.ai, oluşturulan görselle -\nrin çeşitli dijital platformlar için optimize edilmesini sağlar. \nBu, içeriklerin farklı sosyal medya ve web platformlarında \nsorunsuz bir şekilde paylaşılmasına olanak tanır.\nEğitimde Kullanımı:\n ¬ Dijital Pazarlama Eğitimi: Stockimg.ai, pazarlama ve rek -\nlamcılık derslerinde öğrencilerin dijital kampanyalar için \nhızlı ve etkili görsel içerikler üretmelerine yardımcı olabilir. \nÖğrenciler, bu araçla sosyal medya stratejileri geliştirebilir \nve uygulayabilirler.\n ¬ Grafik Tasarım Dersleri: Grafik tasarım öğrencileri, Sto -\nckimg.ai kullanarak projeleri için çeşitli görsel içerikler \noluşturabilirler. Bu, tasarım sürecini hızlandırır ve öğren -\ncilerin yaratıcılıklarını geliştirmelerine olanak tanır.\n ¬ İçerik Üretimi: İçerik üretimi derslerinde, öğrenciler Stoc -\nkimg.ai ile blog yazıları, video senaryoları veya diğer medya \niçerikleri için görseller oluşturabilirler. Bu, öğrencilerin \niçerik oluşturma becerilerini geliştirir.\nStockimg.ai kullanımı oldukça basittir:\n1. Web Sitesine Gidin: Stockimg.ai sitesine girin.\n2. Metin Girişi: Aramak istediğiniz görsel türünü tanımlayan \nbir metin girin.\n3. Örnek prompt: \"Açık gökyüzü altında uçan beyaz bir kuş, \narka planda dağlar ve gün batımı.\"\nStockimg.ai: \nTanımı: Kullanıcıların girdilerine dayalı olarak yüksek kaliteli \nstok görseller, grafikler ve illüstrasyonlar oluşturan yapay zekâ \ndestekli bir platformdur. Bu platform, kullanıcıların pazarlama \nmateryalleri, sunumlar veya web sitesi içeriği gibi belirli ihtiyaç -\nlarına göre görselleri özelleştirmesine olanak tanır. Genellikle \nçeşitli şablonlar ve özelleştirme seçenekleri sunarak, oluştu -\nrulan görsellerin kullanıcının marka veya yaratıcı vizyonuyla \nuyumlu olmasını sağlar. \nTemel Özellikler:\n ¬ İçerik Oluşturma: Stockimg.ai, kullanıcıların sosyal medya \ngönderileri, blog yazıları, video içerikleri ve diğer dijital \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n174"}, {"page": 175, "text": "4. Görsel Üretimi: Yapay zekâ, girdiğiniz metne dayalı olarak \nprofesyonel görseller üretir.\n5. Görseli İndirin: Sonuçları inceleyin ve istediğiniz görselleri \nindirin. ¬ Yaratıcı Yazarlık: Yaratıcı yazarlık derslerinde, öğrenciler \nmetinlerinden görsel temsiller oluşturmak için Midjourney'i \nkullanabilirler. Bu, yazılı içeriklerinin görselleştirilmesini \nsağlayarak daha derin bir anlatım biçimi sunar.\n ¬ Proje Sunumları: Midjourney, öğrencilerin projelerini gör -\nsel olarak desteklemeleri için kullanılabilir. Özellikle sanat, \ntarih veya medya çalışmaları gibi alanlarda, öğrenciler \nmetin girdileriyle oluşturdukları görselleri sunumlarında \nkullanabilirler.\nMidjourney kullanmak için şu adımları izleyebilirsiniz:\n1. Discord'a Katılın: Midjourney, Discord üzerinden çalışan \nbir platformdur. Midjourney Discord sunucusuna katıl -\nmanız gerekiyor.\n2. Botla Etkileşime Geçin: Sunucuda komut vererek yapay \nzekâ ile etkileşime geçebilirsiniz. Örneğin, \"/imagine\" ko -\nmutunu kullanarak bir metin girin.\n3. Görselleri Oluşturun: Girilen metin üzerinden yapay zekâ, \nsize sanatsal bir görsel oluşturur.\n4. İndirin veya Paylaşın: Sonuçlarınızı indirip kullanabilirsiniz.\nMidjourney Nasıl Kullanılır?\n1. Discord Hesabı Açın\n »Zorunlu çünkü Midjourney yalnızca Discord üzerinden \nçalışır.\n »https://discord.com adresinden ücretsiz hesap oluş -\nturabilirsiniz.\n2. Midjourney Discord Sunucusuna Katılın\n »https://discord.gg/midjourney bağlantısından sunu -\ncuya giriş yapın.\n3. Ücretsiz Deneme (varsa)\n »Yeni hesaplara bazen ücretsiz deneme hakkı verilir. \n“newbies” kanallarında komut yazarak deneme yapılabilir.\nMidjourney:\nTanımı: Bir yapay zekâ destekli görüntü oluşturma platfor -\nmudur. Kullanıcıların metin girdileri aracılığıyla sanatsal ve \nyüksek kaliteli görseller üretmelerine olanak tanır. Midjourney, \nözellikle yaratıcı projeler, tasarım çalışmaları ve sanatsal ifa -\ndeler için kullanılır. \nTemel Özellikler:\n ¬ Görsel Üretim: Midjourney, kullanıcıların metin girdileri ara -\ncılığıyla benzersiz ve sanatsal görseller üretmesini sağlar. \nKullanıcılar, belirli bir sahne, nesne veya tarzı tanımlayan \nbasit cümlelerle yüksek kaliteli görseller oluşturabilirler.\n ¬ Sanatsal Stil: Platform, sanatsal ve yaratıcı projeler için \nideal olan çeşitli stil seçenekleri sunar. Kullanıcılar, is -\ntedikleri estetik görünümü elde etmek için farklı sanat \nakımlarını veya görsel stilleri seçebilirler.\n ¬ Yapay Zekâ Destekli Düzenleme: Midjourney, kullanıcıların \noluşturdukları görseller üzerinde düzenlemeler yapmasına \nve optimize etmesine olanak tanır. Bu, görsellerin kulla -\nnıcıların tam olarak istediği gibi olmasını sağlar.\n ¬ Yaratıcı Özgürlük: Platform, kullanıcıların hayal güçlerini \nserbest bırakmalarını teşvik eder. Midjourney, metin gir -\ndilerinden çok çeşitli ve yenilikçi görseller oluşturabilen \ngüçlü bir yapay zekâ motoruna sahiptir.\nEğitimde Kullanımı:\n ¬ Sanat ve Tasarım Eğitimi: Midjourney, sanat ve tasarım \nderslerinde öğrencilerin yaratıcı projeler için hızlı ve etki -\nleyici görseller üretmelerine yardımcı olabilir. Öğrenciler, \nfarklı sanat stillerini deneyebilir ve kendi sanatsal vizyon -\nlarını geliştirebilirler.\n175\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 176, "text": "4. Bir Kanal Seçin\n »Genellikle #newbies-xx gibi isimlendirilmiş kanallardan \nbirine girin.\n5. Prompt Yazın\n »Yazım biçimi:\nbash\nKopyalaDüzenle\n/imagine prompt: [ne çizmek istiyorsan onu yaz]\n »Örnek:\nbash\nKopyalaDüzenle\n/imagine prompt: futuristic city skyline at sunset, ultra \nrealistic, 4k\n6. Görseller Oluşsun\n »Midjourney 4 adet görsel üretir. Yaklaşık 1 dakika sürer.\n7. İşlemler:\n »U1, U2, U3, U4: İlgili görseli büyütmek (U = Upscale)\n »V1, V2, V3, V4: İlgili görselin benzerlerini yeniden üret -\nmek (V = Variation)\n »: Yeni versiyon oluşturur (same prompt).\n8. İndir\n »Beğendiğiniz görseli açıp sağ tıklayarak kaydedebilirsiniz.Freepik:\nTanımı: Freepik, grafik tasarımcılar, eğitimciler ve içerik üreticiler \niçin geniş kapsamlı görsel kaynaklar sunan bir platformdur. \nVektör, fotoğraf, PSD ve simge gibi yüksek kaliteli tasarım \nmateryallerine erişim sağlar.\nTemel Özellikler:\n ¬ Geniş Görsel Kütüphane: Milyonlarca vektör, stok fotoğraf, \nPSD dosyası ve ikon barındırır.\n ¬ Kategorize Edilmiş İçerikler: Eğitim, iş dünyası, sağlık, \nteknoloji vb. temalarda hazır materyaller sunar.\n ¬ Editlenebilir Dosyalar: Tasarımları indirip Photoshop, Il -\nlustrator gibi programlarla düzenleme imkânı sağlar.\n ¬ Ücretsiz ve Premium Seçenekler: Ücretsiz içeriklere eri -\nşimin yanında daha fazla seçenek için premium üyelik \nolanağı sunar.\nEğitimde Kullanımı:\n ¬ Ders sunumları ve eğitim materyalleri için görsel destek \nhazırlamak.\n ¬ Öğrenci projeleri ve okul etkinlikleri için afiş, broşür ve el \nilanı tasarlamak.\n ¬ Etkinlik, yarışma ve okul içi duyurular için dikkat çekici \ngörsel içerikler üretmek.\n ¬ Eğitsel e-kitap, infografik ve sosyal medya paylaşımları \niçin görsel öğeler sağlamak.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n176"}, {"page": 177, "text": "PhotoRoom AI: \nTanımı: PhotoRoom AI bir yapay zekâ tabanlı platform olup, \nkullanıcıların fotoğraflarındaki arka planları hızla kaldırma -\nlarını, düzenlemelerini ve profesyonel görünümlü görseller \noluşturmalarını sağlar. Bu araç, özellikle e-ticaret, sosyal \nmedya, reklamcılık ve içerik üretiminde yaygın olarak kullanılır. \nFotoğrafları optimize etmek, ürün fotoğrafları oluşturmak, arka \nplanları değiştirmek ve tasarım süreçlerini hızlandırmak için \nkullanıcılara etkili bir çözüm sunar. PhotoRoom AI, özellikle \nhızlı ve kolay düzenlemeler için tercih edilen bir araçtır.\nTemel Özellikler\n ¬ AI temelli arka plan kaldırma: Görselleri birkaç saniyede \nstüdyo kalitesine getirir.\n ¬ AI arka plan üretimi ve düzenleme:  Farklı sahnelerde ürün \nveya portre yerleştirmeyi sağlar.\n ¬ Toplu düzenleme (batch mode): Aynı anda yüzlerce gör -\nselde işlem yapabilir \n ¬ Şablon ve yeniden boyutlandırma araçları: Instagram, \nShopify gibi platformlara uygun görseller oluşturur.\n ¬ Logo, sticker, metin ekleme: Marka kimliğine uygun ta -\nsarımlar yapar.\n ¬ Platformlar arası kullanım: Web, iOS, Android ve API üze -\nrinden entegrasyon sunar.\nEğitimde Kullanımı:\n ¬ Tasarım ve pazarlama derslerinde: Öğrenciler gerçekçi \nürün görselleri hazırlayarak e-ticaret görselini öğrenebilir.\n ¬ Kodlama ve API eğitimi: PhotoRoom API’sı ile basit kod \nçalışmaları yapılabilir (örn. batch düzenleme).\n ¬ İçerik üretimi projelerinde: Sosyal medya kampanyaları \niçin hızlı şablon üretimi desteklenir.\n ¬ Girişimcilik atölyelerinde: Kendi ürünlerini tanıtan görseller \nhazırlayarak sunumlarını güçlendirebilirler.Starry AI: \nTanımı: Starry AI bir yapay zekâ destekli görüntü oluşturma \nplatformudur. Kullanıcıların metin girdileri aracılığıyla sa -\nnatsal ve yüksek kaliteli dijital sanat eserleri üretmelerine \nolanak tanır. Bu araç, yapay zekâ algoritmalarını kullanarak \nsoyut, fütüristik, gerçekçi ve çeşitli sanat tarzlarında görseller \noluşturur. Starry AI, özellikle sanatçılar, tasarımcılar, içerik \nüreticileri ve oyun geliştiricileri için faydalı olabilir. \nTemel Özellikler\n ¬ Text-to-image özelliğiyle, doğal dilde verilen prompt'lar \nkullanılarak benzersiz sanat eserleri üretir.\n ¬ Çeşitli stil seçenekleri (ör. anime, portre, manzara) ve \nmodel ayarları sunar; prompt özelleştirme mümkündür.\n ¬ Kullanıcılar günde ücretsiz 5 adet görsel üretebilir, daha \nfazlası için Pro abonelik gerektirir.\n ¬ Ürettikleri görsellerin tam sahipliğini kullanıcılara verir; \nticari kullanım dahil serbest paylaşım sunar.\n ¬ Mobil uygulamalar (iOS ve Android) üzerinden erişim \nsağlanır; retouch (dokunuş) özelliği ile ince ayar yapılabilir.\n ¬ Gizlilik politikalarına göre kullanıcı verileri veya oluştu -\nrulan görseller üçüncü taraflarla paylaşılmamaktadır.\nEğitimde Kullanımı:\n ¬ Sanat ve tasarım eğitimlerinde stil, renk, kompozisyon \ngibi konuları somut örneklerle öğretmek için kullanılabilir.\n ¬ Yaratıcı yazma ve hikâye anlatım derslerinde, metinden \ngörsele dönüşüm ile öğrencilerin hayal gücünü keşfet -\nmeleri sağlanabilir.\n ¬ Projelerde görsel sunum hazırlığı yapan öğrenciler hızlı \nve etkili tasarımlar üretebilir.\n ¬ BT uygulamalı dersler için API veya retouch özellikleriyle \nkodlama ve görsel düzenleme deneyimleri eklenebilir.\n177\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 178, "text": "Dreamer: \nTanımı: Dreamer, yapay zekâ destekli bir platform olup kulla -\nnıcıların hayal güçlerini kullanarak metin girdileri aracılığıyla \nsanatsal ve yaratıcı görseller üretmelerine olanak tanır. Dre -\namer, özellikle yaratıcı projeler, hikâye anlatımı ve sanatsal \nkeşifler için kullanılır. \nTemel Özellikler:\n ¬ Görsel Üretim: Dreamer, kullanıcıların hayal gücüne da -\nyalı olarak metin girdileri aracılığıyla sanatsal ve sürreal \ngörseller üretmesini sağlar. Kullanıcılar, belirli bir konsept, \nsahne veya duyguyu tanımlayan cümlelerle benzersiz gör -\nseller oluşturabilirler.\n ¬ Sanatsal Stil ve Temalar: Platform, geniş bir yelpazede \nsanatsal stil ve tema seçenekleri sunar. Kullanıcılar, farklı \nestetik görünümler ve temalar arasında seçim yaparak \ngörsellerini kişiselleştirebilirler.\n ¬ Yapay Zekâ Destekli Düzenleme: Dreamer, kullanıcıların \noluşturdukları görseller üzerinde yapay zekâ destekli dü -\nzenlemeler yapmalarına olanak tanır. Bu, görsellerin tam \nolarak istenilen şekle getirilmesini ve daha etkili olmasını \nsağlar.\n ¬ Yaratıcı Keşif: Dreamer, kullanıcıların hayal güçlerini serbest \nbırakmalarını ve yeni sanatsal ifadeler keşfetmelerini teşvik \neder. Platform, kullanıcıların yaratıcı düşünme süreçlerini \ndestekleyerek ilham verici görseller oluşturur.\nEğitimde Kullanımı:\n ¬ Yaratıcı Yazarlık ve Hikâye Anlatımı: Dreamer, yaratıcı ya -\nzarlık derslerinde öğrencilerin hikâyelerini görselleştirme -\nlerine yardımcı olabilir. Öğrenciler, metinlerden görseller \noluşturabilir ve bu görselleri hikâyelerini desteklemek için \nkullanabilirler.\n ¬ Sanat ve Tasarım Eğitimi: Sanat ve tasarım derslerinde, \nDreamer öğrencilerin hayal güçlerini keşfetmelerine ve \nsanatsal projeler için benzersiz görseller oluşturmalarına \nolanak tanır. Öğrenciler, farklı sanatsal tarzları deneyim -\nleyebilir ve yaratıcı süreçlerini geliştirebilirler. ¬ Proje Sunumları: Dreamer, öğrencilerin projelerini görsel \nolarak desteklemek için kullanılabilir. Özellikle yaratıcı ve \nsanatsal projelerde, öğrenciler hayal güçlerini kullanarak \nözgün görseller oluşturabilir ve bu görselleri sunumlarında \netkili bir şekilde kullanabilirler.\nDreamer (AI tabanlı bir yaratıcı araç) kullanarak yaratıcı görsel \niçerikler, illüstrasyonlar veya grafikler oluşturabilirsiniz. İşte \nnasıl kullanıldığı:\n1. Web sitesine veya uygulamaya gidin.\n2. Fikirlerinizi girin: Oluşturmak istediğiniz görselin tasviri \niçin metin bazlı açıklamalar veya komutlar verin.\n3. Stil veya özelleştirme seçeneklerini seçin ve sanatı şe -\nkillendirin.\n4. Görselinizi oluşturun: Dreamer, yapay zekâ kullanarak \nverdiğiniz girdilere göre görseli oluşturacaktır.\n5. Sonuçları indirin veya paylaşın.\nNightCafe AI:\nTanım: Bir yapay zekâ destekli sanat oluşturma platformudur. \nKullanıcıların metin girdilerini kullanarak sanatsal ve benzersiz \ndijital eserler üretmelerini sağlar. NightCafe, birçok farklı yapay \nzekâ algoritması sunar ve kullanıcıların soyut sanattan fotoğraf \ngerçekçiliğine kadar geniş bir yelpazede görseller oluşturma -\nsına olanak tanır. Platform, sanatçılar, tasarımcılar ve içerik \nyaratıcıları için yaratıcı süreçlerini geliştirmek adına güçlü bir \naraçtır. Kullanıcılar, basit girdilerle karmaşık ve estetik açıdan \nzengin görseller elde edebilirler. Platform, hem text-to-image \nhem de style transfer yöntemlerini destekler\nTemel Özellikler\n ¬ Prompt ile görsel üretim: Doğal dilde verilen komutlarla \nbenzersiz bir sanat eseri yaratır, kullanıcılar stil, tema ve \ndetaylara göre özelleştirme yapabilir.\n ¬ Style transfer: Kullanıcının yüklediği görseli, Vincent van \nGogh gibi sanatçı stiline dönüştürür.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n178"}, {"page": 179, "text": "¬ Çoklu model desteği: VQGAN+CLIP ve Stable Diffusion \ngibi popüler modellerle çalışır.\n ¬ Küresel ve kullanıcı dostu: Şu ana kadar 35 milyondan \nfazla eser üretilmiş, web ve mobil uygulamalarla birlikte \nücretsiz ve ücretli kullanım seçenekleri sunar.\nEğitimde Kullanımı\n ¬ Sanat ve Görsel Tasarım Dersleri: Öğrenciler stil, kompo -\nzisyon ve renk teorisini kendi komutlarıyla keşfedebilirler.\n ¬ Yaratıcı Yazma Etkinlikleri: Metne dayalı görselleştirme \nile metin ve görsel arasındaki bağı pekiştirir, hikâye an -\nlatımını destekler.\n ¬ Proje Bazlı İşler: Girişimcilik, pazarlama gibi alanlarda ürün \nfikri için konsept art çalışmaları yapılabilir.\n ¬ Kodlama ve API Eğitimleri:  NightCafe API’si sayesinde görsel \nüretim süreçlerine pratik kodlama örnekleri eklenebilir. ¬ Video/Müzik oluşturma: Metne dayalı kısa video ve müzik \nüretimi; eğlenceli içerik hazırlığı sağlar.\n ¬ Kolay erişim: Hızlı kullanım için ücretsiz katman; Pro kul -\nlanıcılar için yüksek hacimli kullanım ve reklamdan muaf \nortam sunulur.\nEğitimde Kullanımı:\n ¬ Görsel içerik üretimi: Sanat, tasarım veya reklam derslerin -\nde öğrenci projelerinde hızlı stilize görseller oluşturulabilir.\n ¬ Dil ve yazı uygulamaları: AI chat özelliğiyle diyalog ya -\nzımı, metin tamamlama ve yaratıcı hikâye çalışmaları \ndesteklenebilir.\n ¬ Multimedya içerik oluşturma: Video veya müzik üretimiyle \nkodlama, medya projeleri birbirine entegre edilebilir.\n ¬ API pratikleri: Kodlama derslerinde DeepAI API entegras -\nyonlarıyla programlı görsel ve metin içerikleri oluşturularak \ngerçek-eğitim sağlanabilir.\n ¬ Verimlilik + araştırma: Öğrenciler tezler ve makaleler için \nresim, metin, özet, vlog gibi multimedya içeriklerini tek \nbir platformda hazırlayabilir. \nDeepAI kullanımı oldukça basittir ve çeşitli yapay zekâ araç -\nlarına erişim sağlar:\n1. Web Sitesine Giriş Yapın: DeepAI sitesine gidin.\n2. Araç Seçimi: İhtiyacınıza göre bir araç seçin (metin üretimi, \ngörüntü oluşturma, stil transferi, vb.).\n3. Girdiyi Girin: Metin veya görsel verilerinizi uygun giriş \nalanına ekleyin.\n4. İşleme Başlayın: Yapay zekâ motoru, girdinizi analiz eder \nve sonucu oluşturur.\n5. Sonucu İndirin veya Paylaşın: Oluşturulan sonucu inceleyin, \nkaydedin veya paylaşın.\nDeepAI:\nTanım: Bir yapay zekâ platformudur ve kullanıcıların metin, \ngörüntü ve veri işleme ile ilgili çeşitli görevleri otomatikleştir -\nmelerine olanak tanır. Görüntü oluşturma, resim stilizasyonu, \nmetin üretimi, dil modeli ve diğer yapay zekâ tabanlı hizmetler \nsunar. DeepAI, kullanıcıların gelişmiş AI modellerine erişmesine \nve bu modelleri projelerinde kullanmasına olanak tanır. Özel -\nlikle AI tabanlı sanat yaratma, metin yazma ve veri analizinde \nyaygın olarak kullanılmaktadır. \nTemel Özellikler\n ¬ Text-to-Image: Prompt'a dayalı resim üretimi; çok sayıda \nstil seçeneği, yüksek çözünürlük ve API desteği.\n ¬ Görsel düzenleme: Yüklediğiniz görselleri AI ile iyileştirme, \nrenk ekleme veya süper çözünürlükle yükseltme.\n ¬ AI Chat ve Ses Sohbeti: Sohbet ve sesli etkileşim sağla -\nyarak kullanıcıyla doğal diyalog sunar.\n179\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 180, "text": "Ideogram:\nTanım:  Bir yapay zekâ destekli platform olup, özellikle yaratıcı \nve sanatsal görseller oluşturmak için kullanılır. Bu platform, \nkullanıcıların metin girdilerini kullanarak grafik, tipografi ve \nillüstrasyonlar gibi sanatsal ifadeler oluşturmasına olanak \ntanır. Ideogram, grafik tasarım, reklamcılık, sanat ve eğitim \nalanlarında geniş bir kullanım alanına sahiptir. \nTemel Özellikler\n ¬ Metin destekli imaj üretimi: Poster, logo, sosyal medya \ngörselleri gibi metin ve yazı içeren görseller yaratır.\n ¬ Çeşitli stiller: Realistic, Design, 3D, Anime, Typography, \nPoster gibi ön ayarlar bulunur \n ¬ “Prompt Magic” teknolojisi ile girileni daha net ve etkili \nhale getirerek görsel kalitesini artırır.\n ¬ Remix özelliği ile önceden oluşturulmuş görseller üze -\nrinden revizyon yapılabilir \n ¬ Freemium sistem: Ücretsiz günde 10 görsel sınırı, API ve \nmobil/web kullanımı desteklenir.\nEğitimde Kullanımı\n ¬ Grafik tasarım ve iletişim derslerinde, öğrenciler kendi \nslogan, logo veya afiş konseptlerini prompt ile üretip \ngörselleri inceleyebilir.\n ¬ Yaratıcı yazarlık atölyelerinde, hikâyeye uygun konsept \nafişler üretilerek görsel ve metin ilişkisi deneyimlenebilir.\n ¬ Pazarlama ve sosyal medya eğitimlerinde, tasarım süreci \nboyunca “metin + görsel” denge analizi yapılabilir.\n ¬ Teknik ve kodlama derslerinde, Ideogram API entegrasyonu \nile otomatik afiş üretimi veya batch işleme senaryoları \nçalıştırılabilir.Dream by Wombo (genellikle \"Dream AI\" olarak bilinir)\nTanım: Bir yapay zekâ sanat oluşturma platformudur. Kulla -\nnıcılar, kısa metin açıklamaları girerek bu platform üzerinden \nyüksek kaliteli dijital sanat eserleri oluşturabilirler. Dream AI, \nfarklı sanatsal tarzlar ve estetik seçenekler sunarak kullanı -\ncıların yaratıcı vizyonlarını hayata geçirmelerine olanak tanır. \nUygulama, özellikle sanatçılar, tasarımcılar ve içerik yaratıcıları \ntarafından tercih edilir ve geniş bir yelpazede görsel sanat \ntarzlarına sahiptir. \nTemel Özellikler\n ¬ Text-to-image üretim: “Alien Space Station”, “Rainbow \nForest” gibi girdilerle stilize resimler oluşturur; farklı görsel \nstiller sunar (Realistic, VFX, Anime, Avatar vb.) \n ¬ Stil ve detay ayarı: Kullanıcılar oluşturulan görselde ışık, \nayrıntı veya kompozisyon değişiklikleri için tekrar prompt \nverebilir.\n ¬ Görsel başlangıç (seed + remix): Kendi fotoğrafını yükleyip \ntemel oluşturarak veya galeriye göz atıp remix yaparak \nyeni içerikler elde edebilirsin.\n ¬ Ücretsiz + premium planlar: Günlük ücretsiz kullanım; \npremium kullanıcılar öncelikli işleme, reklamsız deneyim \nve ekstra stil seçenekleri kazanır.\n ¬ Veri güvenliği: Cloud üzerinden işlenen içerikler 24 saat \niçinde silinir; uygulama kişisel veri paylaşmaz.\nEğitimde Kullanımı:\n ¬ Sanat ve tasarım atölyeleri: Öğrenciler metinleri görsele \nçevirip stil, renk uyumu, kompozisyon konularını pratik \nolarak öğrenebilir.\n ¬ Yazma-desen entegrasyonu: Edebiyat derslerinde metin -\nlerden hikâye sahneleri oluşturmak, yazı-görsel ilişkisinin \nanlaşılmasını sağlar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n180"}, {"page": 181, "text": "¬ Girişimcilik / tanıtım çalışmaları: Ürün ya da proje fikri \niçin hızlı konsept görseller tasarlanabilir.\n ¬ Kodlama eğitimlerinde: Stil remix veya API entegrasyon -\nlarıyla programlı görsel üretim süreçleri yapılabilir. ¬ AI araçlar: Arka plan kaldırma, nesne silme, görüntü ge -\nnişletme, netleştirme ve yükseltme (Super Scale / Super \nSharp) gibi özellikleri destekler.\n ¬ Metin ve tipografi desteği: Yazı ekleme, eğik/halkalı metin, \ngölge ve arka plan gibi düzenleme seçenekleri bulunur.\n ¬ Batch edit & collage maker: Aynı anda çoklu görsellerle \ntoplu düzenleme ve kolaj oluşturma imkânı sağlar.\n ¬ Katmanlar, fırçalar, filtreler: Katman desteği, rötuş araçları, \nfiltreler, çerçeveler ve maskeler gibi Photoshop benzeri \naraçlar sunar. \n ¬ Dosya formatları: JPEG, PNG, PSD ve Pixlr’ın .PXZ for -\nmatını destekler. \nEğitimde Kullanım\n ¬ Sanat/grafik tasarım dersleri: Öğrenciler katmanlar, fırçalar \nve filtrelerle yaratıcı görseller oluşturabilir ve tipografi/\nkompozisyon becerilerini geliştirebilir.\n ¬ Medya ve sosyal içerik projeleri: Sosyal medya gönderileri, \nsunum görselleri, proje afişleri kolajlarla hızlıca hazırla -\nnabilir. AI destekli araçlarla zaman kazanılır.\n ¬ Kodlama ve API entegrasyonu: Basit otomasyon senaryo -\nları için Pixlr API kullanılabilir; toplu düzenleme pratikleri \nöğretilebilir.\n ¬ Foto restorasyonu: Eski veya düşük kaliteli görseller AI ile \nnetleştirilerek ders materyali olarak kullanılabilir.\n ¬ Ekip çalışması: Ücretsiz Edu sürümüyle sınıf içi iş birlikleri, \nkaydetme ve paylaşım imkânları artırılır.\nPixlr kullanmak için aşağıdaki adımları izleyebilirsiniz:\n1. Web sitesine gidin: Pixlr Editor veya Pixlr X (hızlı düzen -\nleme) seçeneklerinden birini seçin.\n2. Fotoğraf yükleyin: Düzenlemek istediğiniz fotoğrafı bil -\ngisayarınızdan yükleyin.\n3. Araçları kullanın: Pixlr, kırpma, döndürme, renk düzenle -\nme, filtreler ve efektler gibi birçok düzenleme aracı sunar. \nİstediğiniz değişiklikleri yapabilirsiniz.\nAutoenhance:\nTanım: Bir yapay zekâ destekli görüntü iyileştirme platformudur. \nKullanıcıların fotoğraflarını profesyonel kalitede iyileştirme -\nlerine ve otomatik düzenlemeler yapmalarına olanak tanır. \nÖzellikle ışıklandırma, kontrast ve netlik gibi görsel özellikleri \noptimize ederek fotoğrafların kalitesini artırır. Bu araç, özellikle \nfotoğrafçılar, grafik tasarımcılar ve e-ticaret profesyonelleri \ntarafından tercih edilir. \nEğitimde Kullanımı:\n ¬ Dijital Fotoğrafçılık Dersleri: Öğrenciler fotoğraflarını \nhızlıca iyileştirebilir ve düzenleyebilir.\n ¬ Sanat ve Tasarım Eğitimi: Görsel projelerde daha profes -\nyonel sonuçlar elde edebilirler.\nPixlr:\nTanım: Bir yapay zekâ destekli çevrim içi fotoğraf düzenleme \nplatformudur. Kullanıcıların fotoğraflarını hızlı bir şekilde düzen -\nlemesine, iyileştirmesine ve profesyonel görseller oluşturmasına \nolanak tanır. Pixlr, katmanlarla çalışmayı, efekt eklemeyi, filtreler \nuygulamayı ve daha birçok gelişmiş fotoğraf düzenleme aracını \ndestekler. Mobil ve masaüstü tarayıcılar üzerinden erişilebilir \nve hem acemi hem de profesyonel kullanıcılar için uygundur. \nTemel Özellikler\n ¬ Pixlr X & Pixlr E: Basit (X) ve gelişmiş (E) düzenleme \nmodları sunar \n181\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 182, "text": "4. Kaydet: Düzenlemenizi bitirdikten sonra fotoğrafınızı \nkaydedin ve bilgisayarınıza indirin. ¬ Dijital hikâye anlatımı: Yazılan metinlerden sahne görselleri \nüretip bütünsel anlatı çalışmaları yapılabilir. \nNasıl kullanılır?\nAI Picasso platformunu kullanmak için şu adımları takip ede -\nbilirsiniz:\n1. Giriş Yapın: AI Picasso'nun web sitesine girin ve platforma \ngiriş yapın.\n2. Metin Girişi: Görselinize rehberlik edecek kısa bir metin girin. \nBu metin, sanatın stilini, temasını veya detaylarını belirler.\n3. Sanat Stilini Seçin: Sunulan çeşitli sanatsal stiller ara -\nsından bir seçim yapın.\n4. Görsel Oluşturma: Yapay zekâ, girdiğiniz metne ve seç -\ntiğiniz stile göre dijital sanat eseri üretir.\n5. Sonucu İndirin: Oluşturulan görseli inceleyip, istediğiniz \nzaman indirebilirsiniz.\nAI Picasso:\nTanım: Bir yapay zekâ destekli sanat oluşturma platformudur \nve genellikle kullanıcıların metin girdileriyle dijital sanat eser -\nleri üretmesine olanak tanır. Bu platform, özellikle soyut ve \nsanatsal görseller oluşturma üzerine odaklanır ve kullanıcıların \nsanat projelerinde yaratıcı deneyimler yaşamalarını sağlar. AI \nPicasso hem sanatçılar hem de meraklılar için sanatsal keşifler \nyapmak üzere güçlü bir araçtır. \nTemel Özellikler\n ¬ Text-to-image: Kullanıcının tanımladığı sahnelerle, sayısız \nmodel ve stil seçeneği sunarak sanat eserleri üretir.\n ¬ AI Avatar & Video: Fotoğraflardan avatar oluşturur; 1 re -\nsimle animasyonlu video üretebilir.\n ¬ Görsel iyileştirme araçları: Background removal, super \nresolution, inpainting ve daha fazlası API üzerinden des -\nteklenir.\n ¬ 100+ model ve stil seçeneği: Realistic, cyberpunk, cartoon, \nkültürel sanat stilleri gibi çok sayıda seçenek sunar.\n ¬ Platformlar arası kullanım: Web, iOS, Android ile erişile -\nbilir; ücretsiz planla sınırsız deneme, premium ile ekstra \nözellikler sunulur.\nEğitimde Kullanımı:\n ¬ Sanat/görsel tasarım dersleri: Öğrenciler metin promptla -\nrına dayanarak kendi stil ve konseptlerini görselleştirebilir.\n ¬ Girişimcilik ve sunum çalışmaları: Ürün fikirlerine ait avatar, \nlogo, demo görselleri hızlıca üretilebilir.\n ¬ Multimedya ve kodlama uygulamaları: API entegrasyo -\nnuyla, otomatik görsel, avatar, video hattı oluşturulabilir.RestorePhotos.io:\nTanım: Yapay zekâ tabanlı bir platformdur ve eski, hasarlı veya \ndüşük kaliteli fotoğrafları restore etmek için geliştirilmiştir. \nKullanıcılar, platforma yükledikleri fotoğrafları yapay zekâ yar -\ndımıyla netleştirip yeniden canlandırabilirler. Özellikle eski aile \nfotoğraflarını, arşiv görsellerini veya hasarlı fotoğrafları onarmak \niçin idealdir. RestorePhotos.io, fotoğrafçılar ve tarih meraklıları \niçin güçlü bir araç olarak kullanılabilir ve hızlı sonuçlar sağlar. \nRestorePhotos.io kullanımı oldukça basittir. İşte adımlar:\n1. Fotoğraf Yükleme: RestorePhotos.io sitesine girip, eski \nveya hasarlı fotoğrafınızı yükleyin.\n2. Yapay Zekâ İyileştirme: Platform, fotoğrafınızı otomatik \nolarak analiz eder ve yapay zekâ yardımıyla iyileştirir. Netlik \nartırılır, hasarlar düzeltilir ve eski fotoğraflar canlandırılır.\n3. Sonucu İndirme: Fotoğrafınız onarıldıktan sonra, yeni -\nlenmiş versiyonu indirip kullanabilirsiniz.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n182"}, {"page": 183, "text": "PaintsChainer:\nTanım: PaintsChainer, bir yapay zekâ destekli dijital boyama \nplatformudur. Kullanıcıların siyah-beyaz çizimlerini veya es -\nkizlerini otomatik olarak renklendirmelerine olanak tanır. Bu \nplatform, özellikle dijital sanatçılar, tasarımcılar ve hobi ola -\nrak çizim yapanlar için renklendirme sürecini hızlandırmak ve \nkolaylaştırmak amacıyla geliştirilmiştir. İşte PaintsChainer'ın \ntemel özellikleri: \nTemel Özellikler:\n ¬ Otomatik Renklendirme: PaintsChainer, kullanıcıların \nyükledikleri siyah-beyaz çizimleri veya eskizleri otomatik \nolarak renklendirir. Yapay zekâ, belirli renk paletlerini veya \nkullanıcı tercihlerine göre renklendirme yaparak çizimlere \nhayat verir.\n ¬ Manuel Düzenleme Seçenekleri: Platform, kullanıcıların \nrenklendirme üzerinde daha fazla kontrol sahibi olmaları \niçin manuel düzenleme seçenekleri de sunar. Kullanıcılar, \nbelirli bölgelerdeki renkleri değiştirebilir veya ince ayarlar \nyapabilirler.\n ¬ Farklı Stil ve Modlar: PaintsChainer, farklı renklendir -\nme stilleri ve modları sunar. Kullanıcılar, tercih ettikleri \nrenklendirme tarzını seçebilir ve çizimlerine uygun en iyi \ngörünümü elde edebilirler.\n ¬ Kullanım Kolaylığı: Platform, kullanıcı dostu bir arayüze \nsahiptir ve herhangi bir teknik bilgi gerektirmeden kul -\nlanılabilir. Kullanıcılar, sadece çizimlerini yükleyerek hızlı \nbir şekilde renklendirilmiş sonuçlar alabilirler.\nEğitimde Kullanımı:\n ¬ Dijital Sanat Eğitimi: PaintsChainer, dijital sanat dersle -\nrinde öğrencilerin eskizlerini veya siyah-beyaz çizimlerini \nhızla renklendirmelerine yardımcı olabilir. Bu, öğrencilerin \nyaratıcı süreçlerini hızlandırır ve renk teorisi uygulamalarını \nkeşfetmelerine olanak tanır.\n ¬ Grafik Tasarım Dersleri: Grafik tasarım öğrencileri, Pa -\nintsChainer kullanarak projeleri için çeşitli renklendirme \nstillerini deneyebilirler. Bu, tasarım süreçlerinde farklı renk kombinasyonlarını ve estetik tercihleri keşfetmelerini sağlar.\n ¬ İçerik Üretimi: İçerik üretimi derslerinde, öğrenciler Pa -\nintsChainer ile görsel içeriklerini renklendirebilirler. Bu, \nözellikle çizgi roman, illüstrasyon veya görsel hikâye an -\nlatımı projelerinde faydalı olabilir.\nArtbreeder: \nTanım: Artbreeder, kullanıcıların yapay zekâ destekli araçlar \nkullanarak benzersiz ve yaratıcı görseller oluşturmasına olanak \ntanıyan bir platformdur. Bu platform, genellikle görsel sanatlar, \nkarakter tasarımı, manzara yaratımı ve hatta soyut sanatsal \nifadeler için kullanılır. Artbreeder, kullanıcıların görseller üze -\nrinde iş birliği yapmasına ve farklı görsel stilleri birleştirerek \nyeni ve ilginç sonuçlar elde etmesine olanak tanır. \nTemel Özellikler:\n ¬ Görsel Kombinasyonu: Artbreeder, kullanıcıların farklı \ngörselleri bir araya getirerek benzersiz kompozisyonlar \noluşturmasına olanak tanır. Kullanıcılar, çeşitli özellikleri \nbirleştirerek yeni görsel stiller yaratabilirler.\n ¬ Yüz ve Karakter Tasarımı: Platform, özellikle yüz ve ka -\nrakter tasarımı için popülerdir. Kullanıcılar, karakterlerin \ngörünümünü ince ayarlarla özelleştirebilir ve tamamen \norijinal yüzler veya figürler oluşturabilirler.\n ¬ Manzara ve Sanat Tasarımı: Artbreeder, manzara, sanat \neseri ve soyut tasarımlar oluşturmak için de kullanılabilir. \nKullanıcılar, çeşitli manzara özelliklerini birleştirerek hayal \ngücüne dayalı ortamlar ve sahneler oluşturabilirler.\n ¬ İş Birliği ve Paylaşım: Artbreeder, kullanıcıların birbirle -\nrinin çalışmalarını keşfetmesine ve bu çalışmaları temel \nalarak yeni görseller yaratmasına olanak tanır. Kullanıcılar, \nprojelerini platform üzerinden paylaşabilir ve başkalarının \nkatkıda bulunmasını sağlayabilir.\n183\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 184, "text": "¬ Yapay Zekâ Destekli Düzenleme: Artbreeder, görseller üze -\nrinde yapılan değişikliklerin anında görülmesini sağlayan \nyapay zekâ destekli düzenleme araçları sunar. Bu sayede \nkullanıcılar, görsellerin son halini oluştururken tam kontrol \nsahibi olabilirler.\nEğitimde Kullanımı:\n ¬ Karakter Tasarımı Dersleri: Artbreeder, karakter tasarımı \nve yaratıcı yazarlık derslerinde kullanılabilir. Öğrenciler, \nkendi karakterlerini oluşturabilir ve hikâyeleri için görsel \ntemsiller yaratabilirler.\n ¬ Sanat ve Tasarım Eğitimi: Sanat ve tasarım derslerinde, \nArtbreeder öğrencilerin farklı sanatsal tarzları keşfetme -\nlerine ve soyut veya gerçekçi görseller oluşturmalarına \nyardımcı olabilir. Bu, özellikle dijital sanat ve tasarım ça -\nlışmalarında faydalıdır.\n ¬ İçerik Üretimi ve Proje Sunumları: Öğrenciler, projelerini \ngörsel olarak desteklemek için Artbreeder'ı kullanabilir -\nler. Özellikle hikâye anlatımı, oyun tasarımı veya görsel \nsunumlar gibi alanlarda, Artbreeder ile üretilen görseller \nprojelerin estetik değerini artırabilir.\n ¬ Yaratıcı İş Birliği: Artbreeder, iş birliği projeleri için de \nkullanılabilir. Öğrenciler, birbirlerinin çalışmalarını temel \nalarak ortak projeler geliştirebilir ve sanatsal keşiflerini \npaylaşabilirler.Temel Özellikler:\n ¬ Otomatik Görsel Oluşturma: Flair AI, kullanıcıların girdi -\nlerine dayalı olarak otomatik olarak profesyonel görseller \noluşturur. Bu özellik, özellikle sosyal medya gönderileri, \nreklamlar, blog içerikleri ve diğer dijital medya projeleri \niçin idealdir.\n ¬ Marka Uygunluğu: Platform, kullanıcıların markalarına \nuygun görseller oluşturmasına yardımcı olacak araçlar \nsunar. Kullanıcılar, marka renkleri, logolar ve stil reh -\nberlerini tanımlayarak, tutarlı ve marka uyumlu içerikler \noluşturabilirler.\n ¬ Yapay Zekâ Destekli Tasarım: Flair AI, kullanıcıların ihti -\nyaçlarına göre en uygun tasarımları öneren yapay zekâ \nalgoritmaları ile çalışır. Bu sayede kullanıcılar, hızlı ve et -\nkili bir şekilde hedef kitlelerine hitap eden görseller elde \nedebilirler.\n ¬ Kolay Kullanım:  Platform, kullanıcı dostu bir arayüze sahip -\ntir ve teknik bilgi gerektirmeden kullanılabilir. Kullanıcılar, \nsadece birkaç tıklama ile kaliteli ve profesyonel görseller \noluşturabilirler.\n ¬ Çoklu Platform Desteği: Flair AI, oluşturulan görsellerin \nfarklı dijital platformlar için optimize edilmesine olanak \ntanır. Bu, kullanıcıların içeriklerini çeşitli sosyal medya \nplatformlarında veya web sitelerinde sorunsuz bir şekilde \npaylaşmalarını sağlar.\nEğitimde Kullanımı:\n ¬ Dijital Pazarlama ve Reklamcılık Eğitimi: Flair AI, pazarlama \nve reklamcılık derslerinde öğrencilerin dijital kampanyalar \niçin hızlı ve etkili görsel içerikler üretmelerine yardımcı \nolabilir. Öğrenciler, bu araçla sosyal medya stratejileri \ngeliştirebilir ve uygulayabilirler.\n ¬ Grafik Tasarım Dersleri: Grafik tasarım öğrencileri, Flair \nAI kullanarak projeleri için çeşitli görsel içerikler oluştura -\nbilirler. Bu, tasarım süreçlerini hızlandırır ve öğrencilerin \nyaratıcı becerilerini geliştirmelerine olanak tanır.\n ¬ İçerik Üretimi: İçerik üretimi derslerinde, öğrenciler Flair \nAI ile görsel içerik oluşturabilirler. Bu, blog yazıları, video \nsenaryoları veya diğer medya içerikleri için etkileyici ve \nprofesyonel görseller üretmelerini sağlar.\nFlair AI:\nTanım: Özellikle pazarlama, reklamcılık ve içerik üretimi alan -\nlarında görsel tasarım sürecini hızlandırmak ve kolaylaştırmak \niçin yapay zekâ destekli araçlar sunan bir platformdur. Kul -\nlanıcıların markalarına veya projelerine uygun yüksek kaliteli \ngörseller oluşturmasına olanak tanır. Flair AI, kreatif süreçleri \noptimize etmek ve kullanıcıların görsel içeriklerini daha etkili \nhâle getirmek için çeşitli özellikler sunar. \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n184"}, {"page": 185, "text": "¬ Proje Sunumları: Flair AI, öğrencilerin projelerini görsel \nolarak desteklemeleri için kullanılabilir. Özellikle pazarlama, \nmedya çalışmaları veya iletişim projelerinde, öğrenciler \nprofesyonel görseller oluşturarak projelerinin sunumlarını \ngüçlendirebilirler.Eğitimde Kullanımı:\n ¬ Görsel Anlatım ve İletişim Dersleri: AutoDraw, öğrencile -\nrin görsel anlatım ve iletişim becerilerini geliştirmelerine \nyardımcı olabilir. Öğrenciler, basit çizimlerle fikirlerini ifade \nedebilir ve AutoDraw'un otomatik tanıma özelliği sayesinde \ndaha profesyonel sonuçlar elde edebilirler.\n ¬ Sanat ve Tasarım Eğitimi: Sanat ve tasarım derslerinde, \nAutoDraw basit çizimlerle başlayan öğrencilerin daha kar -\nmaşık ve profesyonel görseller oluşturmasına yardımcı \nolabilir. Bu, özellikle başlangıç seviyesindeki öğrenciler \niçin faydalıdır.\n ¬ Proje Sunumları: Öğrenciler, projelerini görsel olarak \ndesteklemek için AutoDraw'u kullanabilirler. Basit ve \netkili görseller oluşturarak, projelerinin anlatım gücünü \nartırabilirler.\n ¬ Yaratıcı Yazarlık ve Hikâye Anlatımı: AutoDraw, yaratıcı ya -\nzarlık ve hikâye anlatımı derslerinde kullanılabilir. Öğrenciler, \nhikâyelerini destekleyen basit illüstrasyonlar oluşturabilir \nve bu illüstrasyonları hikâyelerinin görsel temsilleri olarak \nkullanabilirler.\n ¬ Öğrenme ve Öğretme Araçları: Öğretmenler, ders ma -\nteryallerini zenginleştirmek için AutoDraw'u kullanabilir -\nler. Ders anlatımlarını desteklemek için basit ve anlaşılır \ngörseller oluşturarak, öğrencilere konuları daha etkili bir \nşekilde sunabilirler.\nAutoDraw kullanımı şu adımlardan oluşur:\n1. Web Sitesine Girin: AutoDraw'un web sitesine gidin.\n2. Çizim Yapın: Farenizle kaba çizimler yapın. AutoDraw yapay \nzekâ ile bu çizimleri tanır ve daha profesyonel öneriler sunar.\n3. Seçim Yapın: AutoDraw'un sunduğu önerilen çizimlerden \nbirini seçerek tasarımınızı profesyonelleştirin.\n4. Düzenleyin ve İndirin: Çiziminizi tamamladıktan sonra renk \nekleyebilir, şekiller düzenleyebilir ve ardından çalışmanızı \nindirebilirsiniz.\nAutoDraw:\nTanım: Google Creative Lab tarafından geliştirilen bir yapay \nzekâ destekli çizim aracıdır. Bu platform, kullanıcıların basit \nçizimleri hızlı bir şekilde profesyonelce görünüşlü illüstras -\nyonlara dönüştürmelerine yardımcı olur. AutoDraw, özellikle \nçizim yeteneklerine güvenmeyen kullanıcılar için kullanışlıdır \nve basit dokunuşlarla etkileyici görseller oluşturmayı sağlar. \nTemel Özellikler:\n ¬ Otomatik Çizim Tanıma: AutoDraw, kullanıcıların yaptıkları \nkaba eskizleri tanıyarak, bu çizimleri önerilen profesyonel \nillüstrasyonlarla eşleştirir. Kullanıcılar, önerilen seçenekler \narasından seçim yaparak çizimlerini kolayca geliştirebilirler.\n ¬ Kullanıcı Dostu Arayüz: Platform, son derece basit ve \nkullanıcı dostu bir arayüze sahiptir. Çizim yapmak, şe -\nkilleri taşımak ve renkleri seçmek gibi işlemler kolaylıkla \ngerçekleştirilebilir.\n ¬ Geniş İllüstrasyon Kütüphanesi: AutoDraw, çeşitli nes -\nneler, semboller ve şekiller içeren geniş bir illüstrasyon \nkütüphanesi sunar. Kullanıcılar, bu kütüphaneyi kullanarak \nçizimlerini zenginleştirebilirler.\n ¬ Hızlı ve Etkili: AutoDraw, zaman kısıtlaması olan kulla -\nnıcılar için ideal bir araçtır. Birkaç basit dokunuşla hızlı \nve etkileyici görseller oluşturulabilir, bu da özellikle basit \ntasarımlar için zaman kazandırır.\n ¬ Çoklu Platform Desteği: Platform, herhangi bir cihazda \n(masaüstü, tablet, mobil) ve tarayıcıda çalışabilir, bu da \nkullanıcıların her yerde ve her zaman çizim yapmalarını \nsağlar.\n185\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 186, "text": "ClipDrop:\nTanım: Kullanıcıların fotoğrafları, ekran görüntülerini ve diğer \ndijital içerikleri hızlı ve kolay bir şekilde düzenlemelerine, arka \nplanlarını kaldırmalarına ve farklı projelerde kullanmalarına \nolanak tanıyan bir yapay zekâ destekli araçtır. Özellikle tasa -\nrımcılar, pazarlamacılar, içerik üreticileri ve e-ticaret kullanıcı -\nları için oldukça faydalıdır. ClipDrop, mobil cihazlar, masaüstü \nbilgisayarlar ve tarayıcılar üzerinden erişilebilen çok yönlü bir \nplatformdur.\nTemel Özellikler:\n ¬ Arka Plan Kaldırma: ClipDrop’un en popüler özelliklerinden \nbiri, fotoğraflardaki arka planları otomatik olarak kaldırma \nyeteneğidir. Kullanıcılar, sadece birkaç tıklamayla nesneleri \nveya kişileri arka plandan ayırarak temiz, kullanıma hazır \ngörseller elde edebilirler.\n ¬ Çoklu Platform Desteği: ClipDrop, hem mobil cihazlarda \nhem de masaüstü bilgisayarlarda çalışabilir. Kullanıcılar, \ntelefonlarıyla çektikleri fotoğrafları doğrudan bilgisayar -\nlarına aktarabilir ve düzenleyebilirler.\n ¬ 3D Nesne Tarama: ClipDrop, kullanıcıların gerçek dünya -\ndaki nesneleri 3D olarak taramalarına ve dijital ortamda \nkullanmalarına olanak tanır. Bu, özellikle dijital tasarım \nve modelleme projelerinde faydalıdır.\n ¬ Işık ve Renk Düzenleme: Platform, kullanıcıların görseller -\ndeki ışık ve renk ayarlarını optimize etmelerine yardımcı \nolur. Bu özellik, görsellerin profesyonel bir görünüm ka -\nzanmasını sağlar.\n ¬ Ekran Görüntüsü Alma: ClipDrop, ekran görüntülerini hızlı \nbir şekilde yakalamak ve düzenlemek için bir araç sunar. \nBu özellik, özellikle içerik üretimi ve sunum hazırlama \nsüreçlerinde kullanışlıdır.\n ¬ Entegrasyonlar: ClipDrop, çeşitli tasarım araçları ve yazı -\nlımları ile entegre çalışabilir. Adobe Photoshop ve Figma \ngibi popüler tasarım yazılımları ile uyumludur, bu da kul -\nlanıcıların iş akışlarını optimize etmelerine yardımcı olur.Eğitimde Kullanımı:\n ¬ Grafik Tasarım ve Dijital Sanat Eğitimi: ClipDrop, grafik \ntasarım ve dijital sanat derslerinde öğrencilerin görsel \niçeriklerini hızlı bir şekilde düzenlemelerine olanak ta -\nnır. Öğrenciler, fotoğraflarını ve çizimlerini arka plandan \nayırabilir, ışık ve renk ayarlarını yapabilir ve projelerinde \nkullanabilirler.\n ¬ Proje Sunumları: Öğrenciler, ClipDrop'u kullanarak pro -\njeleri için temiz ve profesyonel görseller oluşturabilirler. \nÖzellikle arka plan kaldırma özelliği, sunumlarda kullanılan \ngörsellerin daha net ve odaklı olmasını sağlar.\n ¬ İçerik Üretimi:  ClipDrop, içerik üretimi derslerinde de kulla -\nnılabilir. Öğrenciler, sosyal medya gönderileri, blog yazıları \nveya video içerikleri için görselleri hızlıca düzenleyebilir \nve optimize edebilirler.\n ¬ E-ticaret Eğitimi: ClipDrop, e-ticaret derslerinde de kul -\nlanılabilir. Öğrenciler, ürün fotoğraflarını arka plandan \nayırabilir, temiz ve profesyonel görseller oluşturabilir, ve \nbunları sanal mağazalarında veya dijital pazarlama kam -\npanyalarında kullanabilirler.\n ¬ Görsel İletişim ve Reklamcılık: Reklamcılık ve pazarlama \neğitimlerinde, ClipDrop’un çeşitli düzenleme ve entegras -\nyon özellikleri, öğrencilere profesyonel reklam materyalleri \nve görsel içerikler oluşturma konusunda pratik bir araç \nsunar.\nLeap AI: \nTanım: Leap AI, kodlama gerektirmeden sürükle-bırak no-co -\nde arayüzüyle AI tabanlı iş akışları oluşturmayı sağlayan bir \notomasyon platformudur. Pazarlama, satış ve operasyon sü -\nreçlerinde verimliliği artırmayı hedefler.\nTemel Özellikler\n ¬ No-code workflow tasarımı: Önceden hazırlanmış blok -\nlarla içerik oluşturma, araştırma, e-posta gönderimi gibi \nsüreçler otomatikleştirilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n186"}, {"page": 187, "text": "¬ Modül destekli entegrasyonlar: Google, LinkedIn, CRM, \nSEO araçları gibi dış sistemlerle kolayca bağlanır.\n ¬ Multimedya işleme: Metin, ses, video, ve görsel içerik \noluşturma desteğiyle tüm dijital varlık üretimi tek plat -\nformda yapılabilir.\n ¬ Kurumsal güvenlik: Ekip çalışma ortamı, erişim kontrol -\nleri ve üst düzey sözleşme gereksinimleriyle ölçeklenebilir \nyapı sunar.\n ¬ Freemium model: Ücretsiz temel plan, düşük hacimli iş -\nler için uygunken daha büyük hacimler premium planla \ndesteklenir.\nEğitimde Kullanımı\n ¬ Dijital beceri eğitimlerinde, öğrenciler gerçek dünya iş \nakışlarını (ör. e -posta kampanyası, içerik planlama) kodsuz \nolarak modelleyebilir.\n ¬ Multidisipliner projelerde, ses ve video gibi içerik bileşenleri \notomatikleştirilen AI süreçlerle entegre edilebilir.\n ¬ İş dünyası ve girişimcilik derslerinde, öğrencilerle AI destekli \nstartup iş senaryoları geliştirilebilir ve prototipler oluş -\nturulabilir.\n ¬ Kodlama-dışı entegrasyon deneyimi, API bağlanması veya \nno-code araç kullanımıyla teknoloji okur-yazarlığını artırır. ¬ Prompt geliştirici “enhance prompt” özelliğiyle daha net \nçıktılar sağlar.\n ¬ Stil seçimi: farklı sanat, fotoğraf ve animasyon stilleri \narasından seçim yapılabilir.\n ¬ Ücretsiz sürüm: kayıt olan her kullanıcıya günde 10 üc -\nretsiz prompt; daha fazlası için Starter (25/gün) veya \nPro planlar mevcut \n ¬ Pro kullanıcılar için: kendi modellerini fine-tune etme, \nyüksek çözünürlük (4K), video üretimi, referans görsel \nkullanımı ve “Magic Edit” gibi gelişmiş düzenleme araçları .\n ¬ Topluluk paylaşımları:  keşif sayfasında paylaşılan çalışmalar \nincelenebilir, remix yapılabilir ve etkileşimde bulunulabilir.\nEğitimde Kullanımı:\n ¬ Sanat ve tasarım derslerinde: öğrenciler metinle yaratıcı \nafişler, karakter betimleri ve konsept sanatlar oluşturabilir.\n ¬ Yazı-görsel atölyelerinde, metin girdilerinden kısa ani -\nmasyonlar üretip analiz edebilirler.\n ¬ Dijital medya projelerinde, öğrenciler proje sunumları için \nkendi oluşturdukları görsel ve videoları entegre edebilir.\n ¬ Kodlama/eğitim uygulamalarında, API veya planlanan \nPro planıyla öğrencilere Fine-tune ve editing süreçleri \ngösterilebilir.\n ¬ Görsel düşünme becerisi gelişimi için metinden img2img \nsüreçlerine dayalı yaratıcı fikir üretimi desteklenebilir.\nGencraft:\nTanım: Gencraft, kullanıcı dostu bir metin -görsel AI sanat plat -\nformudur. Doğal dil promptları ya da yüklenen görsellerle hem \nstatik sanat eserleri hem de kısa videolar üretebili.\nTemel Özellikler:\n ¬ Metin-görsel (text-to-image) ve görsel-görsele (ima -\nge-to-image) üretim imkânı.Segmind:\nTanım: Segmind, yapay zekâ destekli görüntü işleme ve model \noluşturma platformudur.\n187\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 188, "text": "Temel Özellikler:\n ¬ Görüntü Segmentasyonu: Görsellerin farklı bölümlerini \nanaliz eder ve işler.\n ¬ Makine Öğrenimi Modelleri: Görüntü analizi için özel mo -\ndeller oluşturur.\nEğitimde Kullanımı:\n ¬ Bilim derslerinde deneysel verileri görselleştirme.\n ¬ Görsel analiz ve veri işleme becerilerini öğretme. ¬ Veri bilimi/makine öğrenimi projelerinde, Scribe Label ara -\ncıyla görüntü/video veri seti etiketleyip, model oluşturup \ndağıtım pratiği yapılabilir.\n ¬ MLOps & altyapı eğitimlerinde, Compute Orchestration ile \nfarklı donanım platformlarında ölçeklendirme ve model \ndevreye alma işlemleri modeli algılamasını sağlar.\n ¬ Multimodal AI derslerinde, Spacetime Search ile metin, \nses, görüntü iç ve ilişkisel arama örnekleriyle çalışılabilir.\nClarifAI: \nTanım: Clarifai, görsel, video, metin ve ses verilerini işleyen uçtan \nuca AI platformudur. Görüntü sınıflandırma, nesne algılama, \nOCR, içerik moderasyonu, metin ve ses analizi gibi çok çeşitli \nyapay zekâ yeteneklerine sahiptir .\nTemel Özellikler:\n ¬ Yüz tanıma, obje algılama, içerik moderasyonu gibi ön \neğitimli güçlü modeller sunar.\n ¬ Scribe Label ile otomatik veri etiketleme; manuel etiket -\nleme arayüzü sağlar.\n ¬ Spacetime Search: Görsel, video, ses ve metni hatırlayarak \nzengin arama işlevselliği sunar.\n ¬ Enlight, Armada, Mesh, Flare gibi modüllerle model eğitimi, \ndevreye alma, MLOps iş akışları & kenar cihaz desteği sağlar.\n ¬ Compute Orchestration özelliği sayesinde farklı bulut/\nyerel/edge altyapılarda tutarlı ve ölçeklenebilir model \nçalıştırma sunar.\nEğitimde Kullanımı:\n ¬ Bilgisayarla Görme derslerinde, öğrenciler Clarifai arayü -\nzünde nesne tespiti, segmentasyon ve OCR uygulayarak \ngerçek dünya verileriyle çalışabilir.Zapier:\nZapier, uygulamalar ve hizmetler arasında otomasyon sağlayan \nbir platformdur.\nTemel Özellikler:\n ¬ Otomasyon: Tekrarlayan görevleri otomatikleştirir.\n ¬ Çoklu Entegrasyon: 5.000’den fazla uygulamayla entegre \nçalışır.\nEğitimde Kullanımı:\n ¬ Ödev teslim ve bildirim süreçlerini otomatikleştirme.\n ¬ Eğitim yönetim sistemleriyle entegrasyon sağlam
