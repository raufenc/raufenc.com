\n ¬ Otomatik Soru Oluşturma: Metinlerden, dokümanlardan \nveya içeriklerden otomatik olarak soru oluşturur.\n ¬ Çoklu Soru Türleri: Çoktan seçmeli, açık uçlu, doğru-yanlış \ngibi farklı soru türlerini destekler.\nEğitimde Kullanımı:\n ¬ Sınav ve değerlendirme soruları hazırlama sürecini hız -\nlandırır.\n ¬ Ders materyallerinden otomatik olarak test soruları oluş -\nturur.\nQuizizz:\nTanım: Öğretmenlerin interaktif ve oyunlaştırılmış sınavlar \noluşturmasını sağlayan bir platformdur.\nTemel Özellikler:\n ¬ Oyunlaştırılmış Sınavlar: Öğrenciler için eğlenceli ve in -\nteraktif sınavlar oluşturur.\n ¬ Gerçek Zamanlı Geri Bildirim: Soru bazında öğrenci per -\nformansı hakkında anlık veri sağlar.\n ¬ Paylaşılabilir Sınavlar: Hazır sınavlar ve içerikler toplulukla \npaylaşılabilir.\nEğitimde Kullanımı:\n ¬ Sınıf içi ve dışı değerlendirmeler için kullanılır.\n ¬ Oyunlaştırma ile öğrencilerin motivasyonunu artırır.\nEdcafe:\nTanım:  Öğretmenler için sosyal öğrenme ve etkileşimli eğitim \nmateryalleri hazırlamayı kolaylaştıran bir platformdur. \nTemel Özellikler:\n ¬ Etkileşimli Materyaller:  Öğrencilerin ilgisini çeken içerikler \noluşturur.\n ¬ Sosyal Öğrenme: Öğrencilerin birlikte öğrenmesini teşvik \neder.\n ¬ Kapsamlı Ders İçerikleri: Zenginleştirilmiş ders mater -\nyalleri sağlar.\nEğitimde Kullanımı:\n ¬ Grup çalışmaları ve sınıf içi etkinlikler için materyal ha -\nzırlamada kullanılır.\n ¬ Öğrenciler arasındaki iş birliğini artırır.\n127\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 128, "text": "Kahoot!\nTanım: Kahoot! oyunlaştırılmış sınavlar ve öğrenme aktiviteleri \noluşturmak için kullanılan popüler bir platformdur.\nTemel Özellikler:\n ¬ Eğlenceli Sınavlar: Oyun tabanlı testler ve aktiviteler \noluşturur.\n ¬ Canlı veya Uzaktan Kullanım: Hem sınıf içinde hem de \nçevrim içi derslerde kullanılabilir.\n ¬ Gerçek Zamanlı Katılım: Öğrenciler anlık olarak sınavlara \nkatılabilir ve sonuçları görebilir.\nEğitimde Kullanımı:\n ¬ Sınıf içi eğlence ve öğrenmeyi birleştirir.\n ¬ Ders tekrarları ve değerlendirme için kullanılır.Gradescope AI\nTanım: Yapay zekâ destekli otomatik değerlendirme ve geri \nbildirim sağlama platformudur. Öğretmenlerin sınavları, ödevleri \nve projeleri daha hızlı ve adil bir şekilde değerlendirmesine \nyardımcı olur.\nTemel Özellikler:\n ¬ Otomatik Puanlama: Yapay zekâ, el yazısı ve dijital me -\ntinleri tanıyarak sınav ve ödevleri otomatik olarak puanlar.\n ¬ Dinamik Geri Bildirim: Öğrenci hatalarını analiz ederek \nözelleştirilmiş geri bildirim sağlar.\n ¬ Rubrik Tabanlı Değerlendirme: Öğretmenler, rubrikler \noluşturarak tüm öğrencilere standartlaştırılmış değer -\nlendirme sunabilir.\n ¬ Çoklu Format Desteği: Kağıt tabanlı sınavları, dijital ödevleri \nve kodlama projelerini destekler.\nEğitimde Kullanımı:\n ¬ Kâğıt ve Dijital Sınavları Hızlı Değerlendirme: El yazısı \nsınavlar ve dijital ödevler için hızlı ve doğru değerlen -\ndirme yapar.\n ¬ Öğrenci Performans Analizi: Sınıf genelinde başarı trend -\nlerini analiz ederek öğretmenlere rehberlik eder.\n ¬ Hızlı ve Kapsamlı Geri Bildirim Sağlama: Öğrencilere bi -\nreysel geri bildirim vererek öğrenme süreçlerini iyileştirir.\n ¬ Kodlama Ödevlerini Değerlendirme: Programlama ödevle -\nrini analiz ederek kod doğruluğu ve verimliliği konusunda \ngeri bildirim sunar.\nReclaim AI:\nTanım: Zaman yönetimini ve planlamayı optimize eden bir yapay \nzekâ destekli araçtır.\nTemel Özellikler:\n ¬ Otomatik Zamanlama: Görevlerinizi ve etkinliklerinizi \nönceliklere göre otomatik olarak düzenler.\n ¬ Takvim Entegrasyonu: Google Calendar ve benzeri plat -\nformlarla entegrasyon.\nEğitimde Kullanımı:\n ¬ Öğretmenlerin ders programlarını planlamasına yardımcı \nolma.\n ¬ Öğrencilerin ödev, sınav ve ders çalışma sürelerini dü -\nzenleme.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n128"}, {"page": 129, "text": "Fetchy:\nTanım: Eğitimciler ve içerik üreticileri için yapay zekâ destekli \notomasyon ve içerik oluşturma platformudur. Öğretmenlerin \nders materyalleri hazırlama, geri bildirim sağlama ve değer -\nlendirme süreçlerini hızlandırmasına yardımcı olur.\nTemel Özellikler:\n ¬ Otomatik Ders Materyali Üretme: Yapay zekâ, ders planları, \nsınav soruları ve çalışma materyalleri oluşturur.\n ¬ İçerik Kişiselleştirme: Öğrencilerin seviyelerine uygun \nkişiselleştirilmiş öğrenme içerikleri sunar.\n ¬ Otomatik Geri Bildirim ve Değerlendirme: Ödevler ve testler \niçin otomatik geri bildirim sağlar.\n ¬ Sınıf Yönetimi Entegrasyonu: Eğitim platformlarıyla en -\ntegre çalışarak öğretmenlerin sınıf yönetimini kolaylaştırır.\nEğitimde Kullanımı:\n ¬ Ders Materyalleri ve Testler Hazırlama: Öğretmenler için \nözelleştirilmiş ders içerikleri, sınav soruları ve çalışma \nkağıtları üretir.\n ¬ Öğrenci Gelişimini Takip Etme: Öğrencilerin öğrenme \nsüreçlerini analiz ederek öğretmenlere veriye dayalı iç -\ngörüler sunar.\n ¬ Öğrenmeyi Kişiselleştirme: Her öğrenci için farklı sevi -\nyelere uygun materyaller oluşturarak bireyselleştirilmiş \nöğrenme deneyimi sağlar.\n ¬ Zamandan Tasarruf Sağlama: Otomatik içerik üretimi ve \ndeğerlendirme desteği ile öğretmenlerin iş yükünü azaltır.Socrat: \nTanım: Yapay zekâ destekli eğitim asistanı olarak öğrencile -\nre ve öğretmenlere etkileşimli öğrenme deneyimi sunan bir \nplatformdur. Yapay zekâ ile soruları çözme, detaylı açıklamalar \nsağlama ve bireyselleştirilmiş öğrenme yolları oluşturma gibi \nişlevler sunar.\nTemel Özellikler:\n ¬ Otomatik Çözümler ve Açıklamalar: Öğrencilerin sorduğu \nmatematik, fen, tarih ve diğer derslerle ilgili soruları detaylı \nbir şekilde açıklar.\n ¬ Adım Adım Çözüm Sunma: Karmaşık problemlerin her \naşamasını göstererek öğrencilerin anlamasını kolaylaştırır.\n ¬ Kapsamlı Konu Anlatımları: Ders içeriklerini detaylandırarak, \nöğrencilerin konuları daha iyi kavramalarına yardımcı olur.\n ¬ Etkileşimli Öğrenme Desteği: Öğrenciler anlamadıkları \nyerlerde ek açıklamalar talep edebilir ve farklı çözümleri \nkeşfedebilir.\nEğitimde Kullanımı:\n ¬ Öğrenciler İçin Kapsamlı Rehberlik: Matematik prob -\nlemlerini adım adım çözerek öğrencilere derinlemesine \nanlayış kazandırır.\n ¬ Öğretmenler İçin Ödev ve Test Hazırlama: Sınavlar, çalışma \nkağıtları ve quizler için yapay zekâ destekli sorular üretebilir.\n ¬ Bireyselleştirilmiş Öğrenme Yolları: Öğrencilerin eksik \noldukları konuları belirleyerek onlara uygun öğrenme \nyolları sunar.\n ¬ Anlık Geri Bildirim ve Performans Takibi: Öğrencilerin çöz -\ndüğü sorular üzerinden gelişimlerini takip etmelerini sağlar.\n129\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 130, "text": "Socrat, öğrenme süreçlerini interaktif hâle getirerek öğrencilere \nve öğretmenlere güçlü bir eğitim asistanı sunar. Yapay zekâ \ndestekli soru çözümleri, konu anlatımları ve özelleştirilmiş \nöğrenme yolları ile öğrencilerin başarılarını artırmayı hedefler. ¬ Dil ve Konu Bağımsız Adaptasyon: Fen bilimleri, sosyal \nbilimler, dil eğitimi gibi birçok alanda kullanılabilir.\n ¬ Öğretmenler İçin Değerlendirme ve Analiz Araçları: Öğ -\nrenci ilerlemesini izleyerek kişiye özel öğretim stratejileri \ngeliştirmeye yardımcı olur.\nEğitimde Kullanımı:\n ¬ Öğrencilerin Eleştirel Düşünme Becerilerini Geliştirme:  \nAçık uçlu sorulara verilen cevapları değerlendirerek yapıcı \ngeri bildirim sağlar.\n ¬ Otomatik ve Detaylı Geri Bildirim Sağlama: Öğrencilerin \nyanıtlarını analiz ederek hatalarını gösterir ve düzeltici \naçıklamalar sunar.\n ¬ Uyarlanabilir ve Kişiselleştirilmiş Öğrenme: Öğrencilerin \nbireysel öğrenme hızına göre içerik önerir.\n ¬ Öğretmenlere Veriye Dayalı İçgörüler Sunma: Öğrenci \nperformanslarını analiz ederek öğretim süreçlerini op -\ntimize etmeye yardımcı olur.\nCognii: \nTanım: Yapay zekâ tabanlı bir dijital eğitim asistanı olup, açık \nuçlu sorulara akıllı geri bildirim sağlayarak öğrencilerin eleştirel \ndüşünme becerilerini geliştirmelerine yardımcı olur. Kişisel -\nleştirilmiş öğrenme deneyimi sunan bu araç, özellikle eğitim \nkurumları ve online öğrenme platformları için tasarlanmıştır.\nTemel Özellikler:\n ¬ Açık Uçlu Sorulara Yapay Zekâ Destekli Geri Bildirim: Öğ -\nrencilerin verdiği yanıtları anlamlandırarak bireysel geri \nbildirim sunar.\n ¬ Kişiselleştirilmiş Öğrenme Yol Haritası: Öğrencilerin güçlü \nve zayıf yönlerine göre özel içerikler önerir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n130"}, {"page": 131, "text": "Öçlme, Değerlendirme \nSoruları Hazırlama\nPrompt Şablonu\nÖğretmen, yapay zekâya belirlediği \nkonuyu girerek sınav veya \ndeğerlendirme için çoktan seçmeli \nya da kısa cevaplı sorular hazırlar.Rubrik Tasarlama\nPrompt Şablonu\nÖğretmen, yapay zekâya ödev veya \nproje türüyle ilgili bilgileri girerek \ndeğerlendirme kriterleri \noluşturabilir. Yapay zekâ, her bir \nkriteri açık ve anlaşılır şekilde \ntanımlar ve puanlama ölçütlerini \nönerir. Bu sayede, öğretmen \ndeğerlendirme sürecini \nstandartlaştırarak daha adil bir \nsonuç elde edebilir.\nBen bir [Rolünüzü girin.]. \nAşağıdaki bilgilere dayanarak öğrencilerim için \nkapsamlı ve ilgi çekici bir değerlendirme \noluşturmanı istiyorum. \nDeğerlendirme:\nBelirtilen tüm öğrenme hedeﬂerini \nkapsamalıdır.\nSeçilen değerlendirme türü ve formatıyla \nuyumlu olmalıdır.\nİstenen becerileri ve bilgiyi açıkça \ndeğerlendirmelidir.\nÖğrenciler için net talimatlar ve beklentiler \nsağlamalıdır.\nYanıt anahtarları veya derecelendirme için bir \nrubrik içermelidir.\nKonu: [Konu girin.]\nSınıf seviyesi: [Sınıf seviyesini girin.]\nÖğrenme hedeﬂeri:\n[Öğrenme hedeﬁni girin.]\n[Öğrenme hedeﬁni girin.]\n[Öğrenme hedeﬁni girin.]\nDeğerlendirme türü: [Değerlendirmenin çoktan \nseçmeli, çok yanıtlı matris, açık uçlu, \neşleştirme vb. türünü belirtin.]\nDeğerlendirilmek istenen beceriler: \n[Değerlendirilecek spesiﬁk bilgi ve becerileri, \nayrıca eleştirel düşünme veya üst düzey \nbecerileri listeleyin.]\nSüre: [Değerlendirme için tahmini süreyi girin; \nvarsa istenen soru sayısını dâhil edin.]\nDiğer kriterler: [Yapay zekâ aracının referans \nalması gereken mevcut rubrikleri veya \ndeğerlendirme kriterlerini ekleyin.]Ben bir [Rolünüzü girin]. \nAşağıdaki bilgilere dayanarak öğrencilerim için \nkapsamlı ve ilgi çekici bir değerlendirme \noluşturmanı istiyorum. \n \nDeğerlendirme:\nSeçilen rubrik türü ve formatıyla uyumlu \nolmalıdır.\nİstenen becerileri ve bilgiyi açıkça \ndeğerlendirmelidir.\nÖğrenciler için net talimatlar ve beklentiler \nsağlamalıdır.\nYanıt anahtarları veya derecelendirme için bir \nrubrik içermelidir.\nDeğerlendirilmek istenen beceriler: \n[Değerlendirilecek spesiﬁk bilgi ve becerileri, \nayrıca eleştirel düşünme veya üst düzey \nbecerileri listeleyin.]\nSınıf seviyesi: [Sınıf seviyesini girin.]\nRubrik türü: [Rubrik türünü belirtin.]\nDiğer kriterler: [Yapay zekâ aracının referans \nalması gereken mevcut rubrikleri veya \ndeğerlendirme kriterlerini ekleyin.]\n131\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 132, "text": "5.5. Öğrenci Motivasyonu için Prompt’lar\nÖğrencilerin motivasyonlarını artırmak, öğrenme sürecine aktif \nkatılımlarını teşvik etmek ve ilham verici içerikler sunmak için \nüretken yapay zekâ araçlarıyla etkili prompt’lar oluşturulabilir. \nEtkili bir prompt şu temel bileşenleri içermelidir:\n ¬ Açıklayıcı: Promptun neyi amaçladığı net olmalıdır.\n ¬ Açık ve Net: Karmaşıklıktan uzak, sade ve anlaşılır bir dil \nkullanılmalıdır.\n ¬ Bağlama Uygun: İlgili konu ve hedef kitleye göre şekil -\nlendirilmelidir.\n ¬ Kontekst ve Rol Tanımı: AI’nin nasıl davranacağı ve hangi \nperspektiften yanıt vereceği belirtilmelidir.\n ¬ Hedef Odaklı: Öğrenci motivasyonunu doğrudan destek -\nleyen bir sonuç üretmelidir.\nİşte farklı üretken yapay zekâ araçlarına göre örnek öğrenci \nmotivasyon promptları:\nChatGPT / Google Bard / Claude için Motivasyonel Metin \nPrompt’ları\nKullanım Alanı: Öğrencilere motive edici ve cesaret verici me -\nsajlar oluşturmak.\nPrompt Örneği:\n\"Sen deneyimli bir eğitimcisin. 10. sınıf öğrencisini derslerinde \nmotive etmek için kişisel bir mesaj yaz. Mesajda öğrencinin \nçabasını öv, küçük hataların öğrenme sürecinin bir parçası \nolduğunu vurgula ve ona başarıya ulaşması için pratik yap -\nmanın önemini anlat. Mesajın içten, destekleyici ve motive \nedici bir dille yazılmasına dikkat et.\"\nGrammarly / Wordtune için Yazma Motivasyonu Prompt’ları\nKullanım Alanı: Öğrencilere yaratıcı yazma sürecinde rehberlik \netmek.\nPrompt Örneği:\n\"Sen yaratıcı yazım eğitimi veren bir mentorsun. 8. sınıf öğ -\nrencisine ilham verici bir hikâye yazması için bir giriş paragrafı oluştur. Hikâyenin kahramanı cesur bir bilim insanı olsun ve \nbüyük bir keşif yapmak üzere olsun. Paragraf, öğrencinin hayal \ngücünü harekete geçirecek sürükleyici ve heyecan verici bir \nton içermeli.\"\nMidJourney / Leonardo AI / DALL·E için Görsel Motivasyon \nPrompt’ları\nKullanım Alanı: Öğrencileri motive edecek ilham verici görseller \noluşturmak.\nPrompt Örneği:\n\"Sen bir eğitimci ve sanat mentorusun. Öğrencileri motive \nedecek bir görsel oluştur. Görselde, bir öğrenci büyük bir dağa \ntırmanırken elinde ‘Başarıya Giden Yol’ yazılı bir bayrak taşıyor \nolsun. Atmosfer umut verici, renkler sıcak tonlarda, ışık ise \nilham verici bir şekilde öğrencinin yolunu aydınlatıyor olmalı.\"\nChatPDF / NotebookLM için Okuma Motivasyonu Prompt’ları\nKullanım Alanı: Öğrencilerin kitap okumaya teşvik edilmesi ve \nilgisini çekecek özetlerin oluşturulması.\nPrompt Örneği:\n\"Sen bir edebiyat öğretmenisin. 9. sınıf öğrencileri için ‘Küçük \nPrens’ kitabının ana mesajlarını içeren, onların ilgisini çekecek \nve okumaya teşvik edecek kısa bir özet oluştur. Özet, merak \nuyandırıcı bir başlangıç yapmalı ve kitabın felsefi yönlerini \nvurgulamalı.\"\nPower BI / Tableau için Veriyle Motive Etme Prompt’ları\nKullanım Alanı: Öğrencilere başarılarını analiz etmeleri ve \nmotive olmaları için veri görselleştirmesi sunmak.\nPrompt Örneği:\n\"Sen bir veri analisti ve eğitim danışmanısın. 12. sınıf öğrenci -\nlerinin yıl boyunca aldığı sınav sonuçlarını analiz ederek başarı \neğilimlerini gösteren bir grafik hazırla. Öğrencinin en güçlü ve \ngelişmesi gereken alanlarını belirle ve bunu grafiksel olarak \nanlaşılır bir şekilde sun. Grafik, öğrencilere motivasyon sağ -\nlayacak şekilde tasarlanmalı.\"\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n132"}, {"page": 133, "text": "Tavus AI / HeyGen / Synthesia için Motivasyon Videosu \nPrompt’ları\nKullanım Alanı: Öğrencilere özel, kişisel motivasyon mesajları \niçeren videolar oluşturmak.\nPrompt Örneği:\n\"Sen bir sınıf öğretmenisin. Öğrencilerin her biri için özel ve \nkişiselleştirilmiş motivasyon videoları oluşturmak istiyorsun. \nHer videoda, öğrencinin adıyla hitap et, o haftaki başarıla -\nrından bahset ve geliştirmesi gereken yönleri teşvik edici bir \ndille vurgula. Ses tonu sıcak, motive edici ve samimi olmalı. \nVideonun süresi 30 saniyeyi geçmemeli.\"\nBu prompt örnekleri, farklı yapay zekâ araçlarıyla öğrenci \nmotivasyonunu artırmak için kullanılabilir. Etkili promptlar \noluştururken:\n ¬ Açıklayıcı ve açık bir dil kullanın.\n ¬ Bağlam ve rol tanımlaması yaparak AI’nin hangi perspek -\ntiften cevap vermesini sağlayın.\n ¬ Motivasyonu artırmaya yönelik ilham verici, destekleyici \nve öğrencinin seviyesine uygun içerikler üretin.\nYapay zekâyı eğitimde doğru promptlarla kullanarak, öğrenci -\nlere daha anlamlı, kişiselleştirilmiş ve motive edici deneyimler \nsunabilirsiniz! \nPromptist (Hugging Face) için Motivasyonel Prompt Örneği\nKullanım Alanı: Öğrencilere özel kişiselleştirilmiş mesajlar ve \nilham verici metinler oluşturmak.\nPrompt Örneği:\n\"Sen deneyimli bir eğitim danışmanısın. Bir lise öğrencisini \nmotive etmek için 150 kelimelik bir ilham verici metin yaz. \nMetinde, öğrencinin karşılaştığı zorlukları aşabileceğine vurgu \nyap, başarının sabır ve azim gerektirdiğini anlat ve ona kişi -\nsel gelişimi için birkaç öneri ver. Dil samimi, ilham verici ve \ndestekleyici olmalı.\"Copy.ai için Yaratıcı Motivasyon Prompt’u\nKullanım Alanı: Öğrencilerin dikkatini çeken, kısa ve etkileyici \nmotivasyon mesajları oluşturmak.\nPrompt Örneği:\n\"Sen bir eğitim içerik üreticisisin. Genç öğrenciler için kısa, \neğlenceli ve motive edici 3 farklı slogan oluştur. Bu sloganlar, \nöğrencilerin hedeflerine odaklanmasını ve daha çok çalışma -\nsını teşvik etmeli. Mesajlar ilham verici, enerjik ve kolay akılda \nkalır olmalı.\"\nWritesonic için İlham Verici Hikâye Prompt’u\nKullanım Alanı: Öğrencileri motive edecek kısa hikâyeler üret -\nmek.\nPrompt Örneği:\n\"Sen bir hikâye anlatıcısısın. 10-12 yaş aralığındaki öğrenciler \niçin 200 kelimelik kısa bir motivasyon hikâyesi yaz. Hikâyenin ana \nkarakteri, karşısına çıkan engellere rağmen yılmadan çalışan \nbir öğrenci olsun. Hikâye, öğrencilerin kendilerine güvenmesini \nve asla pes etmemesini teşvik edecek şekilde yazılmalı.\"\n5.6. ChatGPT'nin Eğitimde Kullanımı \n5.6.1. Kullanım Alanları:\n1. Ders Materyali Geliştirme:\n ¬ Öğretmenlere ders planları, sınav soruları ve çalışma ma -\nteryalleri oluşturma konusunda yardımcı olabilir.\n2. Öğrenci Destek ve Rehberlik:\n ¬ Öğrencilere ödevlerinde, projelerinde ve sınav hazırlıkla -\nrında birebir destek sağlayabilir.\n3. Dil Eğitimi:\n ¬ Dil öğrenimi için konuşma pratiği, yazma alıştırmaları ve \ndil bilgisi açıklamaları sunabilir.\n133\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 134, "text": "4. Araştırma ve Bilgi Erişimi:\n ¬ Öğrencilerin ve öğretmenlerin araştırma yapmalarına, \nbilgiye hızlı bir şekilde ulaşmalarına yardımcı olabilir.\n5. Etkileşimli Öğrenme:\n ¬ Öğrencilerle etkileşimli konuşmalar yaparak onların eleş -\ntirel düşünme ve problem çözme becerilerini geliştirebilir.\n6. Kişiselleştirilmiş Öğrenme:\n ¬ Öğrencilerin ihtiyaçlarına göre uyarlanmış öğrenme de -\nneyimleri sunabilir, her öğrenciye bireysel geri bildirim \nverebilir.\nÖrnek Kullanımlar:\nDers Planı Örneği:\n ¬ Prompt: \"5. sınıf matematik dersi için kesirler konusunda \n40 dakikalık bir ders planı oluştur.\"\n ¬ Sonuç:\n1. Giriş (5 dakika):\n »Kesirlerin ne olduğunu ve günlük hayatta nerelerde \nkullanıldığını kısaca anlatın.\n2. Ders Anlatımı (15 dakika):\n »Kesirlerin tanımı, pay ve payda kavramları.\n »Basit kesirler, bileşik kesirler ve tam sayılı kesirler.\n3. Etkinlik (15 dakika):\n »Öğrencilerle kesir çemberleri ve kesir problemleri çözme.\n4. Özet ve Ödev (5 dakika):\n »Dersin özetini yapın ve öğrencilere kesirlerle ilgili kısa \nbir ödev verin.Dil Eğitimi Örneği:\n ¬ Prompt: \"İngilizce öğrenen öğrenciler için günlük konuşma \npratiği yapabilecekleri örnek diyaloglar oluştur.\"\n ¬ Sonuç:\n1. Diyalog 1:\n »Student: \"Hi, how are you today?\"\n »ChatGPT: \"I'm good, thank you! How about you?\"\n »Student: \"I'm fine, thanks. What did you do over the \nweekend?\"\n »ChatGPT: \"I went hiking with some friends. It was fun! \nWhat about you?\"\nAraştırma ve Bilgi Erişimi:\n ¬ Prompt: \"Rönesans dönemi sanatının önemli özelliklerini \nve sanatçılarını açıkla.\"\n ¬ Sonuç:\n1. Rönesans dönemi sanatı, 14. yüzyıldan 17. yüzyıla \nkadar süren ve Avrupa'da büyük bir kültürel değişim \ndönemi olan Rönesans ile bağlantılıdır. Bu dönemde \nsanatçılar, doğayı ve insan figürünü gerçekçi bir şekil -\nde tasvir etmeye odaklanmışlardır. Önemli sanatçılar \narasında Leonardo da Vinci, Michelangelo ve Raphael \nbulunmaktadır.\nAvantajları:\n1. Zaman Kazandırma: Öğretmenlerin ders hazırlığı ve ma -\nteryal oluşturma süreçlerinde zaman kazanmalarını sağlar.\n2. Erişilebilirlik: Öğrenciler, ihtiyaç duyduklarında anında \nyardım alabilirler.\n3. Kişiselleştirme: Öğrencilerin bireysel ihtiyaçlarına ve öğ -\nrenme hızlarına göre uyarlanmış geri bildirimler sunar.\n4. Etkileşim: Öğrencilerin aktif katılımını teşvik eder ve öğ -\nrenme süreçlerini daha ilgi çekici hâle getirir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n134"}, {"page": 135, "text": "Dezavantajları:\n1. Doğruluk: ChatGPT'nin verdiği bilgilerin doğruluğunu \nkontrol etmek önemlidir.\n2. Bağımlılık: Öğrencilerin her konuda ChatGPT'ye bağımlı \nhâle gelmemesi için denge sağlanmalıdır.\n3. Gizlilik: Kullanıcı verilerinin gizliliği ve güvenliği konularında \ndikkatli olunmalıdır.\n5.6.2. ChatGPT'yi Verimli Kullanma Rehberi\nAmaç Belirleme\n ¬ Belirli Sorular: Belirli ve net sorular sormak, daha doğru \nve yararlı yanıtlar almanıza yardımcı olur.\n ¬ Kapsam Tanımlama: Hangi konu veya alan hakkında bilgi \nistediğinizi belirleyin (örneğin, tarih, matematik, dil öğ -\nrenimi).\nBilgiye Hızlı Erişim\n ¬ Özet Bilgiler: Kısa ve öz bilgi almak için, “X konusunun \nkısa bir özetini ver” gibi promptlar kullanın.\n ¬ Derinlemesine Analiz: Daha detaylı bilgi için, “X konusunu \nayrıntılı olarak açıkla” şeklinde sorular sorun.\nEğitim Materyali Geliştirme\n ¬ Ders Planları: “X dersi için bir ders planı oluştur” gibi ta -\nleplerle ders materyali hazırlayabilirsiniz.\n ¬ Ödev ve Test Soruları: “5. sınıf matematik için ödev soruları \nhazırla” gibi promptlar kullanarak test ve ödev soruları \noluşturun.\nKişiselleştirilmiş Öğrenme Desteği\n ¬ Birebir Yardım: Öğrencilerin belirli konularda yardım al -\nması için, “X konusunu anlamıyorum, açıklar mısın?” gibi \npromptlar kullanın.\n ¬ Dil Pratiği: Dil öğrenenler için, “Günlük konuşma pratiği \niçin diyalog oluştur” gibi taleplerle pratik yapın.Yaratıcı Yazma ve İçerik Üretimi\n ¬ Hikâye Yazma: “Bana bir bilim kurgu hikâyesi yaz” gibi \nyaratıcı içerik taleplerinde bulunun.\n ¬ Makaleler ve Denemeler: “X konusunda bir makale yaz” \ndiyerek akademik veya kişisel yazılar oluşturabilirsiniz.\nAraştırma ve Bilgi Doğrulama\n ¬ Kaynak Bulma: “X hakkında bilgi edinmek için hangi kay -\nnaklara bakmalıyım?” şeklinde sorular sorarak kaynak \nönerileri alın.\n ¬ Bilgi Kontrolü: Elde ettiğiniz bilgilerin doğruluğunu ChatGPT \nile doğrulayabilirsiniz.\nZaman Yönetimi ve Planlama\n ¬ Günlük Planlar: “Günlük çalışma planı nasıl olmalı?” gibi \nsorularla verimli çalışma planları oluşturun.\n ¬ Proje Yönetimi: “Bir proje nasıl yönetilir?” diyerek adım \nadım proje yönetim rehberleri alın.\nEtkileşimli ve Eğlenceli Öğrenme\n ¬ Oyun ve Aktiviteler: “Matematik öğrenimi için eğlenceli \naktiviteler öner” gibi taleplerle dersleri daha eğlenceli \nhâle getirin.\n ¬ Quiz ve Sınav Hazırlığı: “X konusuyla ilgili bir quiz oluştur” \ndiyerek öğrenciler için quizler hazırlayın.\nGeri Bildirim ve Gelişim\n ¬ Ödev Kontrolü: Öğrencilerin yazdığı metinler hakkında \ngeri bildirim alarak gelişimlerini destekleyin.\n ¬ Kendi Yazılarınızı Geliştirin: Yazdığınız metinleri kontrol \nettirip, “Bu yazıyı nasıl daha iyi hâle getirebilirim?” şek -\nlinde sorular sorun.\n135\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 136, "text": "Etik ve Güvenlik\n ¬ Veri Gizliliği: Kişisel bilgi ve verilerinizi paylaşmaktan kaçının.\n ¬ Eleştirel Düşünce: Alınan bilgileri eleştirel bir gözle değer -\nlendirin ve doğruluğunu başka kaynaklardan da kontrol edin.\nGeleneksel arama motorlarından farklı olarak, ChatGPT, önceki \nkonuşmalarda iletilen bilgileri saklama kapasitesine sahiptir. \nBu özellik, konuşma geçmişini anlamasına ve bağlamı koru -\nmasına olanak tanır. Eğitimde, bu kapasite çeşitli şekillerde \nfaydalı olabilir:\nRevizyon Süreci:\n ¬ Geliştirme ve Eklemeler: Çıktılara eklemeler yapabilir ve \ngeliştirebilirsiniz.\n ¬ Önemli Kelimeleri Vurgulama: Önemli kelimeleri kalın \nformatlamaya alarak vurgulayabilirsiniz.\n ¬ Kategorilere Göre Organize Etme: Çıktıları tarih, konum, \nfiyat gibi kategorilere göre düzenleyebilirsiniz.\n ¬ Emojiler Kullanma: Anahtar kelimelerle ilgili uygun emo -\njiler ekleyerek çıktıları daha ilgi çekici hâle getirebilirsiniz.\nBasitleştirme:\n ¬ 5 Yaşındaki Bir Çocuğun Anlayabileceği Seviyeye İndirme:  \nÇıktıları basit bir dille açıklayabilirsiniz.\nDüzenleme:\n ¬ Tablo Formatı Kullanma: Çıktıları tablo formatında dü -\nzenleyerek daha anlaşılır hâle getirebilirsiniz.\nProfesyonel ve Sade Yazım:\n ¬ Endüstri Uzmanı Gibi Yazma: Yazıları daha profesyonel \nhâle getirebilirsiniz.\n ¬ Sade Dil Kullanma: Daha sade bir dille yazabilirsiniz.\nChatGPT'nin eğitimde etkili ve verimli bir şekilde kullanılması \nhem öğretmenlerin hem de öğrencilerin deneyimlerini zengin -\nleştirebilir ve öğrenme süreçlerini daha dinamik hâle getirebilir.5.7. Eğitimde Kullanılabilecek Promptlar\nÖrnek 1. Hedef Kazanım: Öğrencilerin bir hikâyeyi görsel -\nleştirme yeteneklerini geliştirmek (DALL -E).\nPrompt: \"Bir peri masalı için bir görsel oluşturun. Masalda \ncesur prenses Lira ve sadık ejderha arkadaşı Drako yer alıyor. \nMasal, parlayan ağaçlar ve büyülü çiçeklerle dolu bir ormanda \ngeçiyor. Lira, uzun dalgalı saçları, yapraklardan oluşan bir taç \nve yıldız tozuyla parlayan bir elbiseyle tasvir edilsin. Drako, \nnazik bakışlı, renkli ve ışıltılı pullarla kaplı bir ejderha olarak \nresmedilsin. Görselde, Lira ve Drako'nun gökkuşağı renkle -\nrinde parlayan gizli bir şelaleyi keşfettiği bir sahne yer alsın. \nÇevrede, periler ve parlayan kelebekler gibi mistik yaratıklar \nbulunsun. Ortam, fantastik bir maceranın özünü yansıtacak \nşekilde büyülü ve masalsı olsun.\"\nTeknik Detaylar:\nGörsel Boyutu: 1024x1024 piksel\nTarz: Fantastik, masalsı, canlı renklerle\nAydınlatma: Yumuşak ve eterik, parlayan unsurlarla (örneğin \nparlayan ağaçlar, peri ışıkları)\nTeknik: Dijital illüstrasyon, parlak ve canlı renk paleti, detaylı \narka plan ve karakter tasarımı\nÖrnek 2. Hedef Kazanım: Öğrencilerin farklı sanat stillerini \ntanıma ve uygulama becerilerini geliştirmek. (MidJourney)\nPrompt: 'Orta Çağ Tarihi' konulu bir ders içeriği için bir görsel \noluşturun. Görselde, Orta Çağ'da tipik bir Avrupa şehri be -\ntimlensin. Şehirde, taş surlar, kale, kilise ve dar sokaklar gibi \ndöneme özgü yapılar yer alsın. Şehrin ortasında, pazar yeri \nsahnesi oluşturun; insanlar çeşitli ürünler satarken, zırhlı şö -\nvalyeler devriye geziyor olsun.\nKarakterler arasında farklı sosyal sınıflardan insanlar, tüccarlar, \nköylüler ve soylular bulunmalı. Kostümler ve mimari detaylar, \nOrta Çağ'ın estetiğini yansıtmalı. Atmosfer, güneşli bir günde, \nyoğun bir ticaret hayatının olduğu enerjik bir ortamı resmetsin.\nGörselde, tarihî detaylar ve dönemin kültürel unsurlarına vurgu \nyaparak, öğrencilerin Orta Çağ Avrupa'sının sosyal ve ekonomik \nyapısını daha iyi anlamalarını sağlayın.\"\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n136"}, {"page": 137, "text": "Teknik Detaylar:\nGörsel Boyutu: 1024x1024 piksel\nTarz: Tarihi ve gerçekçi, döneme uygun renk paleti\nAydınlatma: Doğal ve parlak, açık hava pazar yerinin canlılığını \nyansıtacak şekilde\nTeknik: Dijital illüstrasyon, detaylı ve tarihsel doğruluğa odak -\nlanan tasarım\nBu görsel, Orta Çağ Avrupa'sının günlük yaşamını ve toplumsal \nyapısını öğrencilere tanıtmak amacıyla kullanılacaktır.\nÖrnek 3. Hedef Kazanım: Öğrencilerin sanatsal ifade ve ya -\nratıcılık becerilerini geliştirmek.\nKullanım 1- Prompt: \" \"Kendi çektiğiniz bir fotoğrafı seçin ve \nDeepArt kullanarak bu fotoğrafı Vincent van Gogh'un tarzın -\nda dijital bir sanat eserine dönüştürün. Fotoğrafınızı yükleyin \nve Van Gogh'un karakteristik kalın fırça darbeleri, parlak ve \nkontrastlı renk paleti, ve dinamik kompozisyon unsurlarını uy -\ngulamak için DeepArt'ı kullanın. Özellikle Van Gogh'un 'Yıldızlı \nGece' veya 'Ayçiçekleri' eserlerinden ilham alarak, renklerin ve \ndokuların fotoğrafınızda nasıl kullanılacağını belirleyin. Mavi, \nsarı ve yeşil tonlarını ön plana çıkararak, Van Gogh'un tipik \npost-empresyonist stilini yansıtan kalın ve belirgin fırça dar -\nbeleri ile dokusal bir etki yaratın. Sonuç olarak, fotoğrafınızın \nVan Gogh'un tarzında yeniden yaratılmış bir versiyonunu elde \nedeceksiniz. Stilizasyon derecesini ve renk yoğunluğunu ayar -\nlayarak, istediğiniz sanatsal ifadeyi oluşturun.\"\nTeknik Detaylar:\nGörsel Boyutu: 1920x1080 piksel veya daha yüksek çözü -\nnürlükte\nStil: Vincent van Gogh'un post-empresyonist tarzı\nRenk Paleti: Parlak ve kontrastlı mavi, sarı ve yeşil tonlar\nFırça Darbeleri: Kalın ve dokusal, belirgin vuruşlar\nDönüşüm Ayarları: Filtre yoğunluğu ve stilizasyon derecesi \nkullanıcı tarafından ayarlanabilir. Kendi çektiğiniz bir fotoğrafı \nseçin ve DeepArt kullanarak bu fotoğrafı Vincent van Gogh'un \ntarzında yeniden yaratın.\"Örnek-4. Hedef Kazanım: Öğrencilerin yaratıcı düşünme ve \ndijital sanat becerilerini geliştirmek.\nÖrnek 1-Prompt: \" Prompt: \"Artbreeder kullanarak, farklı hay -\nvanların özelliklerini birleştirerek yeni ve özgün bir hayvan türü \ntasarlayın. Ortaokul öğrencileri için tasarlanmış bu projede, \nseçtiğiniz hayvanların belirgin özelliklerini bir araya getirerek, \nyaratıcı ve ilgi çekici bir hayvan karakteri oluşturun. Örneğin bir \nkartalın keskin gözleri ve kanatları ile bir aslanın yelesi ve güçlü \npençelerini birleştirin. Tasarladığınız hayvanın vücut yapısını, \nrenklerini ve benzersiz özelliklerini belirleyin. Oluşturduğunuz bu \nyeni tür, doğada var olmayan ancak farklı hayvanların özellikle -\nrini yansıtan yaratıcı bir kompozisyon olmalıdır. Artbreeder'da \nhayvanın görselini oluştururken, her detayın açık ve belirgin \nolmasına özen gösterin. Bu proje, öğrencilere biyolojik çeşitliliği \nve hayvanların özelliklerini daha iyi anlamaları için eğlenceli \nbir yol sunacaktır. Tasarımı tamamladıktan sonra, hayvanın \nhangi hayvanlardan ilham alındığını ve bu özelliklerin neden \nseçildiğini açıklayın.\"Farklı hayvanların özelliklerini birleştirerek \nyeni bir hayvan türü tasarlayın ve Artbreeder kullanarak bu \nhayvanın görselini oluşturun.\"\nÖrnek 2-Prompt: \"Artbreeder kullanarak, özel eğitim öğren -\ncileri için eğitici ve sevimli hayvan karakterleri oluşturun. Her \nkarakter, belirli bir hayvan türünü temsil etsin (örneğin aslan, \nfil, kuş, balık) ve sevimli, dost canlısı bir görünümde olsun. Her \nhayvan karakterinin yüz ifadeleri ve vücut dili, öğrencilere bu \nhayvanların özelliklerini öğretmeye yardımcı olacak şekilde \ntasarlanmalıdır. Örneğin bir aslan karakteri cesur ve koruyucu \nbir ifade taşırken, bir fil karakteri bilge ve sakin bir duruşa sahip \nolabilir. Karakterleri oluştururken, renkleri canlı ve dikkat çekici, \nçizim tarzını ise basit ve anlaşılır tutun. Öğrencilerin dikkatini \nçekmek ve öğrenmelerini kolaylaştırmak için hayvanların be -\nlirgin özelliklerini ve davranışlarını vurgulayan detaylar ekleyin. \nBu karakterler, özel eğitim öğrencilerinin hayvanlar hakkında \nbilgi edinmelerine, hayvanlarla ilgili hikâyeler ve dersleri anla -\nmalarına yardımcı olacak şekilde kullanılacaktır.\"\nÖrnek 5. Hedef Kazanım: Öğrencilerin dinleme becerilerini \ngeliştirmek.\nÖrnek Prompt:\nDers Notları:\n\"8. sınıf fen bilimleri dersi kapsamında, 'Güneş Sistemi' ünite -\nsinde, Güneş, gezegenler, Ay ve diğer gök cisimlerinin yapısı -\nnı ve hareketlerini incelemekteyiz. Güneş, Güneş Sistemi'nin \n137\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 138, "text": "merkezinde yer alır ve gezegenler, eliptik yörüngelerde bu \nyıldız etrafında döner. Gezegenler, büyüklüklerine ve yüzey \nözelliklerine göre iç ve dış gezegenler olarak sınıflandırılır. İç \ngezegenler, Merkür, Venüs, Dünya ve Mars; dış gezegenler ise \nJüpiter, Satürn, Uranüs ve Neptün'den oluşur. Ayrıca, asteroit \nkuşağı, Güneş Sistemi'ndeki gezegenleri iki gruba ayıran bir \nbölgedir.\"\nPrompt:\n\"Ders notlarınızı Google Text-to-Speech (TTS) kullanarak sesli \nders materyaline dönüştürün ve öğrencilerin bu materyali din -\nlemelerini sağlayın. 'Güneş Sistemi' ünitesine ait ders notlarınızı \nGoogle TTS aracılığıyla seslendirerek öğrencilere sunun. Bu sesli \nmateryal, öğrencilerin Güneş, gezegenler ve diğer gök cisimleri \nhakkında bilgi edinmelerine yardımcı olacak. Öğrenciler, sesli \nmateryali dinleyerek Güneş Sistemi'nin yapısını ve işleyişini \nöğrenebilir ve gezegenler arasındaki farkları anlayabilir.\"\nAdımlar:\n1. Ders notlarınızı metin dosyası olarak hazırlayın.\n2. Google Text-to-Speech hizmetini kullanarak metni yükleyin \nve uygun bir ses seçin.\n3. Metni sesli içeriğe dönüştürün ve ses dosyasını kaydedin.\n4. Öğrencilere bu sesli dersi dinleme ödevi olarak verin ve din -\nleme sürecinden sonra öğrendikleri bilgileri değerlendirin.\nÖrnek 6. Hedef Kazanım: Öğrencilerin mobil cihazları kulla -\nnarak dinleme yoluyla öğrenmelerini sağlamak.\nGörme Engelli Öğrenciler için Erişilebilir Eğitim Materyalleri \nHazırlama\n ¬ Hedef Kazanım: Görme engelli öğrencilerin eğitim ma -\nteryallerine erişimini sağlamak.\n ¬ Prompt: \"Ders kitabındaki bir bölümü Lovo.ai kullanarak \nsesli ders materyaline dönüştürün. Görme engelli öğren -\ncilerin bu materyali dinleyerek derslere katılımını artırın.\"Örnek 7: Hedef Kazanım: Öğrencilerin dinleme yoluyla öğ -\nrenmelerini sağlamak.\nPrompt: \"Ders metinlerinizi Eleven Labs kullanarak sesli içerik \nhâline getirin ve öğrencilerin bu materyali dinlemelerini sağlayın.\nMetin: Cumhuriyetin İlanı\nTürkiye Cumhuriyeti'nin ilanı, modern Türkiye tarihinin en \nönemli dönüm noktalarından biridir. 29 Ekim 1923'te Mustafa \nKemal Atatürk önderliğinde ilan edilen Cumhuriyet, Osmanlı \nİmparatorluğu'nun sona erdiğini ve modern, laik bir devletin \nkurulduğunu simgeler. Cumhuriyetin ilanı ile birlikte saltanat \nkaldırılmış, egemenlik kayıtsız şartsız millete verilmiştir.\nCumhuriyetin ilanı, Türkiye'de pek çok sosyal, ekonomik ve \nkültürel değişikliği de beraberinde getirmiştir. Eğitimde, hu -\nkuk sisteminde, kadın haklarında ve ekonomik alanda büyük \nreformlar yapılmış, Türkiye hızla modernleşme yolunda önemli \nadımlar atmıştır. Bu süreçte, Latin alfabesine geçilmiş, kılık \nkıyafet devrimi yapılmış ve kadınlara seçme ve seçilme hakkı \ntanınmıştır. Cumhuriyetin ilanı, Türk halkı için özgürlük, eşit -\nlik ve demokrasi anlamına gelir. Her yıl 29 Ekim, Cumhuriyet \nBayramı olarak kutlanmakta ve bu önemli günün anlamı tüm \nyurtta coşkuyla anılmaktadır.\nPrompt:\nHedef Kazanım: Öğrencilerin dinleme becerilerini geliştirmek \nve Türkiye Cumhuriyeti'nin kuruluş süreci hakkında bilgi sahibi \nolmalarını sağlamak.\n ¬ Prompt: \"Ders metinlerinizi Eleven Labs kullanarak sesli \niçerik hâline getirin ve öğrencilerin bu materyali dinle -\nmelerini sağlayın. Ardından, Cumhuriyetin ilanının Türkiye \niçin önemini tartışın ve metinde geçen önemli olayları ve \nkavramları açıklayın.\"\nAdımlar:\n1. Eleven Labs uygulamasını açın.\n2. Yukarıdaki Türkçe ders metnini uygulamaya yapıştırın.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n138"}, {"page": 139, "text": "3. Metni sesli ders materyaline dönüştürmek için Eleven \nLabs'i kullanın.\n4. Öğrencilerden sesli materyali dinlemelerini isteyin.\n5. Dinledikten sonra öğrencilerle Cumhuriyetin ilanının Türkiye \niçin önemini tartışın.\n6. Öğrencilerden metinde geçen önemli olayları ve kavramları \nbelirleyip açıklamalarını isteyin.\nBu şekilde, Eleven Labs kullanarak ders metinlerinizi sesli ders \nmateryaline dönüştürerek öğrencilerin dinleme ve anlama be -\ncerilerini geliştirebilirsiniz.\nÖrnek 8. Hedef Kazanım: Öğrencilerin iklim değişikliği hak -\nkında bilgi sahibi olmalarını sağlamak ve etkili sunum yapma \nbecerilerini geliştirmek.\n\"Ders metinlerinizi Gamma kullanarak dinamik bir sunum hâline \ngetirin ve bu sunumu sınıfta yapın.\"\nİklim Değişikliği ve Etkileri\nİklim değişikliği, atmosferdeki sera gazlarının artması nedeniyle \ndünya ikliminin uzun vadeli değişimlerini ifade eder. Bu durum, \nküresel sıcaklıkların artmasına, deniz seviyelerinin yükselmesine \nve hava olaylarının daha aşırı hâle gelmesine neden olur. İklim \ndeğişikliği, sadece çevresel değil, aynı zamanda ekonomik ve \nsosyal sorunlara da yol açar.\nİklim değişikliğinin başlıca nedenleri arasında fosil yakıtların \nkullanımı, ormansızlaşma ve endüstriyel faaliyetler yer alır. Bu \nfaktörler, atmosferdeki karbondioksit ve diğer sera gazlarının \nbirikmesine yol açar.\nİklim değişikliğinin etkilerini azaltmak için çeşitli önlemler \nalınabilir. Bunlar arasında yenilenebilir enerji kaynaklarının \nkullanımı, enerji verimliliğinin artırılması, ormanların korun -\nması ve sürdürülebilir tarım uygulamaları bulunmaktadır. Ay -\nrıca, bireysel düzeyde de enerji tasarrufu yapmak ve karbon \nayak izini azaltmak gibi adımlar atılabilir. İklim değişikliği, tüm \ndünya için acil bir sorun olarak ele alınmalıdır ve bu konuda \nfarkındalık yaratmak büyük önem taşır.Adımlar:\n1. Gamma uygulamasını açın.\n2. Metni Kullan: Yukarıdaki Türkçe ders metnini Gamma'ya \nyapıştırın.\n3. Sunum Oluştur: Gamma'da uygun bir sunum şablonu \nseçin ve metindeki bilgileri kullanarak sunum oluşturun. \nHer bir bölüm için açıklayıcı slaytlar ekleyin.\n4. Düzenle ve Özelleştir: Metni ve görselleri düzenleyin, dikkat \nçekici başlıklar ve açıklamalar ekleyin. Animasyonlar ve \ngrafikler ekleyerek sunumu dinamik hâle getirin.\n5. Sunum Yap: Sunumu tamamladıktan sonra, sınıfta yaparak \niklim değişikliği hakkında bilgi verin.\nÖrnek Sunum İçeriği:\n ¬ Başlık: İklim Değişikliği ve Etkileri\n ¬ Alt Başlık: Atmosferdeki Değişimler ve Sonuçları\n ¬ Bölümler:\n »İklim Değişikliğinin Tanımı: Atmosferdeki sera gazlarının \nartışı ve etkileri.\n »Nedenler: Fosil yakıt kullanımı, ormansızlaşma, en -\ndüstriyel faaliyetler.\n »Etkiler: Küresel sıcaklık artışı, deniz seviyelerinin yük -\nselmesi, aşırı hava olayları.\n »Önlemler: Yenilenebilir enerji kullanımı, enerji verimliliği, \normanların korunması, bireysel adımlar.\nBu adımlar sayesinde, öğrenciler Gamma kullanarak görsel \nolarak zengin ve dinamik sunumlar hazırlayabilir ve öğren -\ndiklerini etkili bir şekilde sunabilirler.\n139\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 140, "text": "YAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ140"}, {"page": 141, "text": "Üretken yapay zekâ (Generative AI), belirli bir veri kümesine dayanarak yeni ve orijinal içerikler oluşturabilen bir yapay zekâ \ntürüdür. Bu teknoloji, büyük veri setlerinden öğrenerek, metin, görüntü, ses ve hatta video gibi çeşitli formatlarda içerik \nüretebilir. Örneğin GPT-3 gibi modeller, belirli bir konu hakkında metin girdisi verildiğinde, bu girdi doğrultusunda anlamlı ve \nbağlama uygun içerikler oluşturabilir. Goodfellow, Bengio ve Courville'in Deep Learning adlı eserinde, üretken yapay zekâların \nderin öğrenme teknikleri kullanarak nasıl içerik üretebildiği ayrıntılı olarak açıklanmıştır.\nEğitimde Üretken Yapay Zekâ Kullanımı\nÜretken yapay zekâ, eğitim alanında büyük bir potansiyele sahiptir ve öğretmenler ile öğrenciler için çeşitli avantajlar sunar. \nBu teknoloji, ders materyallerinin kişiselleştirilmesinden, yaratıcı projeler geliştirmeye kadar birçok farklı alanda kullanılabilir.\n1. Ders Materyali Oluşturma: Üretken yapay zekâ araçları, öğretmenlerin ders planlarını, sınav sorularını ve ödevleri hızlı \nbir şekilde hazırlamalarına yardımcı olabilir. Örneğin, GPT-3 gibi yapay zekâ modelleri, verilen bir konu hakkında uygun \nseviyede sorular ve açıklamalar oluşturarak öğretmenlerin iş yükünü hafifletebilir. Bu tür bir uygulama, eğitimde zaman \nve kaynak yönetimi açısından büyük avantaj sağlar. Floridi'nin The Logic of Information adlı çalışmasında, yapay zekânın \nbilgi yönetiminde nasıl etkili bir araç olduğu üzerinde durulmuştur.\n2. Kişiselleştirilmiş Öğrenme: Öğrencilerin bireysel öğrenme ihtiyaçlarına göre şekillenen eğitim içerikleri, üretken yapay zekâ \ntarafından sağlanabilir. Bu teknoloji, öğrencilerin zorlandıkları konularda ek materyaller sunarak veya ilgi alanlarına göre \nderinlemesine bilgi sağlayarak kişiselleştirilmiş bir öğrenme deneyimi sunar. Bu tür uygulamalar, öğrencilerin motivasyo -\nnunu artırır ve öğrenme sürecini daha etkili hâle getirir.\n3. Yaratıcı Projeler: Üretken yapay zekâ, öğrencilerin yaratıcı projeler geliştirmesine de yardımcı olabilir. Öğrenciler, yapay \nzekâ destekli araçlar kullanarak hikâyeler yazabilir, müzik besteleri oluşturabilir veya sanatsal çalışmalar yapabilirler. Bu \ntür projeler, öğrencilerin yaratıcılıklarını geliştirmelerine ve yeni fikirler üretmelerine olanak tanır.\n6.1. Metin Oluşturma/Yazma Asistanları\nMetin oluşturma/yazma asistanları, yapay zekâ teknolojisiyle çalışan araçlardır ve kullanıcıların metin üretme süreçlerini \nhızlandırmak ve kolaylaştırmak için tasarlanmıştır. Bu araçlar, büyük dil modelleri kullanarak kullanıcıların girdilerine dayalı \nolarak içerik üretir, düzenler ve optimize eder. GPT-3 gibi modeller, metin yazma asistanlarının arkasındaki temel teknolojiyi \noluşturan yapay zekâ sistemlerinden biridir. \nNot: Bu kitapta yer alan yapay zekâ araçları zamanla değişebilir. Güncellenen ve yeni eklenen araçlar için üretici web sitele -\nrinden bilgi alabilirsiniz.6.ÜRETKEN YAPAY ZEKÂ ARAÇLARI\n141\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 142, "text": "6.1.1. İçerik Üretimi\nMetin oluşturma asistanları, blog yazıları, makaleler, sosyal \nmedya içerikleri, ürün açıklamaları gibi çeşitli yazılı içerikler \nüretmek için kullanılır. Kullanıcılar, belirli bir konu veya başlık \nvererek bu araçların içerik oluşturmasını sağlayabilir. ¬ Kavram Haritaları: Karmaşık konuları basitleştirerek öğ -\nrenciler için kavram haritaları oluşturma.\n ¬ Proje Yönetimi: Eğitim projelerinin aşamalarını görsel -\nleştirerek etkili bir planlama yapma.\nNapkin:\nTanım: Fikirlerinizi ve notlarınızı dijital olarak düzenlemenizi, \ngörselleştirmenizi ve bunlar arasında bağlantılar kurmanızı \nsağlayan bir beyin haritalama platformudur. Düşünceleri or -\nganize etmek ve karmaşık konuları sadeleştirmek için güçlü \nbir araçtır.\nTemel Özellikler:\n ¬ Fikir Yönetimi: Düşünceleri ve fikirleri not alarak görsel -\nleştirir.\n ¬ Bağlantı Kurma:  Fikirler ve notlar arasında ilişkiler oluşturur.\n ¬ Arama ve Keşif: Kaydedilen bilgileri hızlıca bulma ve iliş -\nkilendirme.\n ¬ Etkileşimli Görseller: Notları dinamik ve kolay okunabilir \nhâle getirir.\n ¬ Bulut Tabanlı: Tüm notlarınızı çevrim içi olarak saklar ve \nfarklı cihazlarda erişim sağlar.\nEğitimde Kullanımı:\n ¬ Ders Planlama: Öğretmenlerin, ders içeriklerini organize \netmesi ve fikirleri görselleştirmesi.\n ¬ Beyin Fırtınası: Öğrencilerin grup projelerinde fikirlerini \nbir araya getirmesi.\n ¬ Araştırma Notları: Araştırma süreçlerinde konular ara -\nsındaki bağlantıları hızlıca kurma.Jasper AI: \nTanım: Kullanıcıların hızlı ve etkili bir şekilde çeşitli metin ta -\nbanlı içerikler oluşturmasına yardımcı olan gelişmiş bir yapay \nzekâ yazım aracıdır. Bu araç, pazarlama metinlerinden blog \nyazılarına, e-posta kampanyalarından sosyal medya içerikle -\nrine kadar geniş bir yelpazede içerik üretme kabiliyetine sa -\nhiptir. Jasper AI, kullanıcıların verdiği anahtar kelimeler, kısa \naçıklamalar veya belirli yönergeler doğrultusunda insan gibi \nyazılmış metinler üretir. \nTemel Özellikler:\n ¬ İçerik Üretimi: Jasper AI, kullanıcıların ihtiyaç duyduğu \nher türlü metni hızlıca oluşturabilir. Örneğin, bir blog ya -\nzısı, pazarlama metni veya e-posta taslağı oluşturmak \nisteyen kullanıcılar, Jasper AI'yi kullanarak kısa sürede \nkaliteli içerikler elde edebilirler.\n ¬ Ton ve Stil Özelleştirme: Kullanıcılar, Jasper AI'yi belirli \nbir ton ve stil ile yazması için yönlendirebilirler. Bu saye -\nde, içeriklerin hedef kitlenin beklentilerine uygun şekilde \noluşturulması sağlanır.\n ¬ Yaratıcı Yazma: Jasper AI, yaratıcı yazım projelerinde de \nkullanıcılara destek olur. Hikâyeler, senaryolar, şiirler gibi \nyaratıcı içerikler oluşturulabilir.\n ¬ SEO Uyumlu İçerik: Jasper AI, içeriklerin SEO (Arama Motoru \nOptimizasyonu) uyumlu olmasını sağlar. Bu özellik, dijital \npazarlama ve içerik stratejileri için önemlidir.\n ¬ Çok Dilli Destek: Jasper AI, birçok farklı dilde içerik oluş -\nturma yeteneğine sahiptir, bu da uluslararası projeler için \nbüyük bir avantaj sunar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n142"}, {"page": 143, "text": "Eğitimde Kullanımı:\n ¬ Ders Materyali Hazırlama: Öğretmenler, ders notları, eğitim \nmateryalleri veya sınav soruları hazırlarken Jasper AI'den \nfaydalanabilirler. Araç, öğretmenlerin daha hızlı ve etkili \nbir şekilde içerik oluşturmasına yardımcı olur.\n ¬ Öğrenciler İçin Yazım Yardımı: Öğrenciler, ödevler, raporlar \nveya makaleler yazarken Jasper AI'yi kullanabilirler. Araç, \nfikir geliştirme ve içerik oluşturma süreçlerini hızlandırır \nve öğrencilerin daha iyi organize edilmiş metinler yaz -\nmalarını sağlar.\n ¬ Yaratıcı Projeler: Jasper AI, yaratıcı yazma projelerinde \nöğrencilerin yaratıcılıklarını artırmalarına yardımcı olabilir. \nÖğrenciler, hikâye yazma, şiir oluşturma veya diğer yaratıcı \nyazı projeleri için Jasper AI'yi kullanabilirler.\n ¬ Dijital Pazarlama Eğitimi: Dijital pazarlama alanında eğitim \nveren kurumlar veya eğitmenler, Jasper AI'yi kullanarak SEO \nuyumlu içerik üretme, pazarlama kampanyaları oluştur -\nma ve sosyal medya stratejileri geliştirme gibi konularda \npratik yapabilirler.\nJasper AI bir yapay zekâ destekli içerik oluşturma aracıdır. \nİşte nasıl kullanabilec  bir tarihî dönemi veya \nolayı canlandıran bir senaryo oluşturabilir ve o dönemdeki \nkarakterlerin neler yaşayabileceğini keşfedebilirler.\n ¬ Dil Öğrenimi: AI Dungeon, dil öğrenen öğrenciler için de \nyararlı olabilir. Öğrenciler, belirli bir dilde metin oluşturma ve \niletişim kurma becerilerini geliştirebilir, kelime dağarcıklarını \ngenişletebilir ve dil bilgisi kurallarını pekiştirebilirler.\n145\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 146, "text": "Storybird:\nTanım: Öğretmenler, öğrenciler ve yazarlar için tasarlanmış \nbir dijital hikâye anlatma platformudur. Bu araç, kullanıcıların \ngörsellerden ilham alarak hikâyeler yaratmalarını teşvik eder. \nKullanıcılar, profesyonel sanatçılar tarafından hazırlanmış geniş \nbir görsel kütüphaneden resimler seçerek, bu resimler etra -\nfında kısa hikâyeler, şiirler ve uzun hikâyeler oluşturabilirler. \nNasıl Çalışır?\n ¬ Görsel Tabanlı Hikâye Yazımı: Storybird, yazarlara veya \nöğrencilere ilham vermek için görselleri öne çıkarır. Kulla -\nnıcılar, mevcut resimleri seçer ve bu resimlerin etrafında \nbir hikâye oluştururlar. Görseller, hikâyeye yön verir ve \nkullanıcıların yaratıcı yazma süreçlerini destekler.\n ¬ Hikâye Türleri: Storybird, kısa hikâyeler, şiirler ve uzun \nformatta hikâyeler yazma seçenekleri sunar. Bu da kul -\nlanıcıların farklı yazım stillerini ve türlerini keşfetmelerine \nolanak tanır.\n ¬ Sınıf Yönetimi: Öğretmenler, Storybird'ü sınıf içinde kulla -\nnarak öğrencilerin yaratıcı yazma becerilerini geliştirebilir. \nÖğrenciler, öğretmenlerinin belirlediği ödevler doğrultu -\nsunda kendi hikâyelerini oluşturabilir ve bu hikâyeleri sınıf \narkadaşlarıyla paylaşabilir.\nEğitimde Kullanımı:\n ¬ Yaratıcı Yazma Geliştirme: Storybird, öğrencilerin hayal \ngüçlerini kullanarak yaratıcı yazma becerilerini geliştir -\nmelerine yardımcı olur. Öğrenciler, seçtikleri görsellerden \nilham alarak hikâyeler oluşturur ve yazılı ifade yeteneklerini \ngeliştirirler.\n ¬ Etkileşimli Öğrenme: Öğretmenler, Storybird'ü kullanarak \nöğrencilere görsel destekli ödevler verebilir. Bu, öğren -\ncilerin hem görsel hem de yazılı ifade yeteneklerini aynı \nanda kullanmalarını sağlar.\n ¬ Okuma ve Yazma Becerilerini Destekleme: Storybird, öğ -\nrencilere okumayı teşvik eden bir platform sunar. Öğren -ciler, arkadaşlarının veya diğer kullanıcıların oluşturduğu \nhikâyeleri okuyarak yeni yazım stilleri ve hikâye yapılarını \nöğrenirler.\nWrite the World:\nTanım: Genç yazarlar için tasarlanmış çevrim içi bir yazı plat -\nformudur. Bu platform, gençlerin yazma becerilerini geliştir -\nmelerine, eserlerini paylaşmalarına ve küresel bir topluluktan \ngeri bildirim almalarına olanak tanır. Write the World, özellikle \ngenç yazarların çeşitli yazı türlerinde (kurgu, şiir, kişisel de -\nnemeler vb.) kendilerini ifade etmelerini teşvik eder. \nTemel Özellikler:\n ¬ Yazı Yarışmaları: Write the World, belirli temalar veya türler \nüzerinde düzenli yazı yarışmaları düzenler. Bu yarışmalarda \ngenç yazarlar eserlerini sunar ve jüri ile topluluktan yapıcı \ngeri bildirimler alır. Bu süreç, katılımcıların becerilerini \ndaha da geliştirmelerine yardımcı olur.\n ¬ Atölye Çalışmaları: Platform, öğrencilerin belirli teknikleri \nve stilleri öğrenebileceği yazı atölyeleri sunar. Bu atölyeler, \ndeneyimli yazarlar ve eğitimciler tarafından yönetilir ve \ngenç yazarlar için değerli öğrenme deneyimleri sunar.\n ¬ Akran ve Uzman Geri Bildirimi: Yazarlar, eserlerini inceleme \niçin sunabilir ve hem akranlarından hem de deneyimli \nyazarlardan geri bildirim alabilirler. Bu geri bildirimler, ya -\nzarların güçlü yönlerini ve gelişim alanlarını belirlemelerine \nyardımcı olacak şekilde tasarlanmıştır.\n ¬ Küresel Topluluk: Write the World, genç yazarları dünyanın \ndört bir yanından gelen bir toplulukla buluşturur, böy -\nlece yazarlar farklı perspektifler ve kültürlerle etkileşim \nkurabilirler.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n146"}, {"page": 147, "text": "Eğitimde Kullanımı:\n ¬ Yaratıcı Yazma Ödevleri: Öğretmenler, yaratıcı yazma ödev -\nleri için Write the World'ü kullanabilir. Öğrenciler eserlerini \nsunabilir, geri bildirim alabilir ve yazı yarışmalarına katılarak \nyazma sürecini daha ilgi çekici hâle getirebilirler.\n ¬ Akademik İnceleme Süreci: Platformun akran geri bildirim \nsistemi sınıf içi aktivitelerde entegre edilebilir. Öğrenciler \nbirbirlerinin çalışmalarını eleştirerek ve önerilerde bulu -\nnarak yapıcı eleştiri yapmayı öğrenebilirler.\n ¬ Yazı Portföyü Oluşturma: Öğrenciler, Write the World üze -\nrinde kendi yazı portföylerini oluşturabilirler. Bu portföy, \nüniversite başvuruları için veya yazı süreçlerindeki iler -\nlemelerini göstermek için faydalı olabilir. ¬ Topluluk Desteği: Reedsy Prompts, yazarların birbirlerinin \nçalışmalarını okuyup değerlendirebilecekleri bir topluluk \nsunar. Bu topluluk, yazarların yazı becerilerini geliştirme -\nlerine yardımcı olur.\nEğitimde Kullanımı:\n ¬ Yaratıcı Yazma: Öğrenciler, Reedsy Prompts'ü kullanarak \nyaratıcı yazma becerilerini geliştirebilirler. Öğretmenler, \nöğrencilerin belirli bir tema üzerine yazı yazmaları için \nReedsy Prompts'ten ödevler verebilirler.\n ¬ Yazılı İfade Gelişimi: Bu platform, öğrencilerin yazılı ifade \nyeteneklerini geliştirmelerine yardımcı olabilir. Öğrenci -\nler, yarışmalara katılarak geri bildirim alabilir ve yazma \nyeteneklerini ilerletebilirler.\n ¬ Okuma ve Değerlendirme: Reedsy Prompts, öğrencilerin \nakranlarının çalışmalarını okuması ve değerlendirmesi için \nde kullanılabilir. Bu süreç, öğrencilerin eleştirel düşünme \nbecerilerini geliştirmelerine yardımcı olur.\n6.1.2. Dil ve Yazım Düzeltmeleri\nBu asistanlar, yazım hatalarını düzeltir, cümle yapılarını opti -\nmize eder ve metni daha akıcı hâle getirir. Bu özellik, özellikle \ndil öğrenenler veya yazım konusunda daha az deneyimli olan \nkişiler için faydalıdır.\nReedsy Prompts:\nTanım: Yaratıcı yazarlar için bir yazma platformudur ve kulla -\nnıcıların yazılarını geliştirmeleri için haftalık yazı yarışmaları \ndüzenler. Bu platform, yazarların belirli bir tema veya başlık \nüzerine yazmalarını teşvik eden \"prompts\" (yazı ödevleri) sunar. \nYazarlar bu ödevleri kullanarak kısa hikâyeler, denemeler veya \nşiirler yazabilirler. Her hafta farklı bir tema veya başlık belirle -\nnir ve katılımcılar bu başlık doğrultusunda yazılarını sunarak \nyarışmalara katılabilir. https://blog.reedsy.com/creative-w -\nriting-prompts/ \nTemel Özellikler:\n ¬ Yazı Ödevleri (Prompts): Reedsy Prompts, her hafta yeni \nyazı ödevleri sunar. Bu ödevler, belirli bir tema veya konu \netrafında şekillenir ve yazarları yaratıcı olmaya teşvik \neder. Yazarlar, bu ödevler doğrultusunda hikâyeler veya \ndenemeler yazar.\n ¬ Yarışmalar: Yazarlar, yazılarını yarışmalara sunarak diğer \nyazarlarla rekabet edebilir ve çeşitli ödüller kazanabilirler. \nYarışmalar, yazarların çalışmalarını sergilemeleri ve geri \nbildirim almaları için harika bir fırsat sunar.Grammarly:\nTanım: Yapay zekâ destekli bir dil ve yazım denetleme aracıdır. \nKullanıcıların yazım, dil bilgisi ve üslup hatalarını düzeltmelerine \nyardımcı olurken, akademik ve profesyonel yazım süreçlerini \ngeliştirir. \nTemel Özellikler:\n ¬ Yazım ve Dil Bilgisi Düzeltme: Otomatik hata tespiti ya -\nparak öneriler sunar.\n ¬ Ton ve Üslup Analizi: Yazının amacına uygun ton ve üslup \nönerileri sunar.\n147\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 148, "text": "¬ Plagiarizm (İntihal) Kontrolü: Akademik yazılar için ori -\njinallik denetimi yapar.\n ¬ Kelime Önerileri: Daha akıcı ve profesyonel metinler için \nalternatif kelimeler önerir.\n ¬ Farklı Yazım Modları: Akademik, resmî veya gündelik yazılar \niçin özel modlar sunar.\nEğitimde Kullanımı:\n ¬ Akademik Yazım ve Ödevler: Öğrenciler, ödev ve maka -\nlelerini Grammarly ile dil bilgisi hatalarından arındırabilir.\n ¬ Öğretmen Geri Bildirimi: Öğretmenler, öğrencilerin yazılı \nödevlerini değerlendirirken yapay zekâ destekli öneriler \nsunabilir.\n ¬ Dil Eğitimi ve Yabancı Dil Öğrenimi: İngilizce yazım bece -\nrilerini geliştirmek isteyen öğrenciler için etkili bir araçtır.\n ¬ Profesyonel ve Akademik İçerik Üretimi: Öğretmenler, ders \nmateryalleri ve akademik makaleleri hatasız ve etkili bir \nşekilde hazırlayabilir.\nGrammarly, akademik ve profesyonel yazım süreçlerini iyi -\nleştiren, öğrenciler ve öğretmenler için vazgeçilmez bir yapay \nzekâ aracıdır. ¬ Kelime Tekrarı ve Cümle Yapısı İncelemesi: Fazla tekrar \neden kelimeleri ve zayıf cümle yapılarını belirler.\n ¬ Plagiarizm (İntihal) Kontrolü: Akademik ve profesyonel \nmetinler için orijinallik analizi yapar.\n ¬ İstatistiksel Yazım Analizi: Yazının okunabilirlik seviyesini \nve cümle yapısını detaylı raporlarla analiz eder.\n ¬ MS Word, Google Docs ve Tarayıcı Eklenti Desteği: Çeşitli \nyazım platformlarıyla entegre çalışarak anlık öneriler sunar.\nEğitimde Kullanımı:\n ¬ Akademik Yazım Desteği: Öğrenciler, araştırma makale -\nleri, tezler ve ödevlerini daha profesyonel ve hatasız hâle \ngetirebilir.\n ¬ Öğretmen Geri Bildirimi: Öğretmenler, öğrencilerin yazılı \nçalışmalarını değerlendirirken detaylı dil ve üslup analizi \nsunabilir.\n ¬ Dil Öğrenimi ve Gelişimi: İngilizce yazım becerilerini geliş -\ntirmek isteyen öğrenciler için etkili bir öğrenme aracıdır.\n ¬ İçerik Geliştirme:  Öğretmenler, ders notları, akademik içe -\nrikler ve öğrenci raporları için profesyonel bir dil kullanabilir.\nProWritingAid, akademik ve profesyonel yazım süreçlerini iyi -\nleştirerek yazı kalitesini artırmak isteyen herkes için kapsamlı \nbir çözümdür.\nProWritingAid:\nTanım: Yazım kalitesini artırmaya yönelik gelişmiş bir yapay \nzekâ destekli yazım ve stil analizi aracıdır. Yazılarını geliştirmek \nisteyen yazarlar, akademisyenler ve öğrenciler için kapsamlı \ndil bilgisi denetimi, stil önerileri ve analizler sunar. \nTemel Özellikler:\n ¬ Gelişmiş Yazım ve Dil Bilgisi Kontrolü: Hataları tespit ede -\nrek doğru ve profesyonel yazılar oluşturulmasını sağlar.\n ¬ Üslup ve Netlik Analizi: Yazının akıcılığını ve niteliğini ar -\ntırmaya yönelik öneriler sunar.Creative.ai:\nTanım: İşletmelerin ve pazarlamacıların yüksek performanslı \nreklam kreatifleri oluşturmasına yardımcı olan yapay zekâ \ndestekli bir platformdur. Bu araç, farklı online platformlar için \noptimize edilmiş görseller, başlıklar ve reklam metinleri oluş -\nturarak, reklamların hedef kitleye daha iyi ulaşmasını ve daha \nyüksek etkileşim elde etmesini sağlar. \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n148"}, {"page": 149, "text": "Temel Özellikler\n ¬ Yapay Zekâ Destekli Kreatif Üretimi: AdCreative.ai, büyük \nmiktarda veriyi analiz ederek, iyi performans gösterebilecek \nreklam kreatifleri üretir. Bu sayede, farklı reklam kanal -\nlarına (Facebook, Google, Instagram vb.) uygun çeşitli \ntasarımlar ve metinler oluşturur.\n ¬ Performans Analizi: Araç, üretilen kreatiflerin potansiyel \nperformansını değerlendirir ve kullanıcıya en iyi sonuçları \nelde edecek seçenekler sunar. Bu, reklam kampanyalarının \ndaha etkili olmasına katkıda bulunur.\n ¬ Çoklu Platform Desteği: AdCreative.ai, birçok farklı reklam \nplatformu için kreatifler üretebilir, böylece işletmeler çe -\nşitli kanallarda tutarlı ve etkili kampanyalar yürütebilirler.\n ¬ Kullanıcı Dostu Arayüz: Aracın arayüzü, kullanıcıların hızlı \nve kolay bir şekilde reklam kreatifleri oluşturmasına olanak \ntanır. Teknik bilgi gerektirmeden, yüksek kaliteli reklam \nmateryalleri hazırlanabilir.\nEğitimde Kullanımı:\n ¬ Dijital Pazarlama Eğitimi: AdCreative.ai, dijital pazarlama \nderslerinde öğrencilerin gerçek dünyadaki reklam kam -\npanyaları için etkili kreatifler oluşturmalarına yardımcı \nolabilir. Öğrenciler, reklam stratejilerini geliştirirken bu \naracı kullanarak pratik yapabilirler.\n ¬ Proje ve Ödevlerde Kullanım: Öğrenciler, pazarlama veya \nişletme derslerinde verilen projelerde AdCreative.ai'yi kul -\nlanarak kendi reklam kampanyalarını tasarlayabilirler. Bu \nhem yaratıcı düşünme becerilerini hem de dijital pazarlama \nstratejilerini geliştirmelerine yardımcı olur.\n ¬ Reklam ve İletişim Dersleri: Reklamcılık ve iletişim alanında \neğitim gören öğrenciler, AdCreative.ai'yi kullanarak reklam \nkreatifleri hazırlayabilir, farklı stratejileri deneyebilir ve bu \nstratejilerin etkisini ölçebilirler.AdCreative.ai:\nTanım: Yapay zekâ destekli bir reklam yaratma platformudur. \nNasıl kullanılır:\n1. Hesap Oluşturun ve Giriş Yapın: AdCreative.ai web sitesinde \nbir hesap oluşturun.\n2. Proje Başlatın: Yeni bir reklam kampanyası için bir proje \noluşturun.\n3. Bilgileri Girin: Reklamın hedef kitlesi, ürün veya hizmet \nbilgileri, mesajlar gibi gerekli bilgileri sağlayın.\n4. Yapay Zekâ ile Tasarım Oluşturun:  Yapay zekâ, sağladığınız \nverilere göre size uygun reklam görselleri ve metinler sunar.\n5. Reklamları Düzenleyin ve İndirin: Oluşturulan reklamları \ngözden geçirin, gerektiğinde düzenleyin ve indirin.\nBertha AI, \nTanım: Yapay zekâ destekli bir içerik oluşturma ve yazı asis -\ntanıdır. Özellikle pazarlama profesyonelleri, blog yazarları ve \neğitimciler için metin üretimini hızlandırarak yaratıcı ve etkili \niçerikler oluşturmayı kolaylaştırır. \nTemel Özellikler:\n ¬ Hızlı ve SEO Uyumlu İçerik Üretimi: Blog yazıları, pazarla -\nma metinleri ve akademik içerikler için optimize edilmiş \nmetinler oluşturur.\n ¬ Öneri ve Cümle Tamamlama: Kullanıcının yazdığı içeriğe \nuygun devam metinleri ve alternatif öneriler sunar.\n149\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 150, "text": "¬ Reklam ve Sosyal Medya İçeriği Üretimi: Etkili reklam \nbaşlıkları ve sosyal medya gönderileri oluşturur.\n ¬ Özelleştirilmiş Yazım Desteği: Kullanıcının belirlediği yazım \ntarzına ve amacına uygun metinler üretir.\n ¬ Görsel İçerik Entegrasyonu: AI destekli metin yazma \nsürecinde görsellerle entegrasyon sağlayarak tasarımla \nuyumlu içerikler oluşturur.\nEğitimde Kullanımı:\n ¬ Öğretmenler İçin Ders Materyali Hazırlama: Ders içerik -\nleri, konu özetleri ve akademik metinler hazırlamak için \nkullanılabilir.\n ¬ Öğrenciler İçin Yazı Desteği: Ödev, makale ve araştırma \nyazılarında dil bilgisi ve akıcılığı artıran öneriler sunar.\n ¬ İçerik Pazarlaması ve Eğitim Blogları: Eğitim sektöründe \nçalışanlar için blog yazıları ve web sitesi içerikleri üretmeyi \nkolaylaştırır.\n ¬ Sosyal Medya İçeriği: Eğitim projeleri ve okullar için sosyal \nmedya içerikleri oluşturarak öğrenci ve veli etkileşimini \nartırır.\nBertha AI, eğitimciler ve içerik üreticileri için yaratıcı ve etkili \nmetinler oluşturmayı kolaylaştıran güçlü bir yapay zekâ aracıdır.  ¬ Video Düzenleme: Yapay zekâ ile hızlı video montajı ve \naltyazı ekleme özellikleri sunar. Sosyal Medya Yönetimi: \nGönderileri planlama, analiz etme ve otomatik paylaşım \nseçenekleri sunar.\n ¬ Çoklu Kullanıcı Desteği: Takımlar için iş birliği yapmayı \nkolaylaştıran bir platform sağlar.\nEğitimde Kullanımı:\n ¬ Ders İçeriği Üretimi: Öğretmenler; ders notları, sunumlar \nve ödev yönergeleri hazırlamak için metin üretme özel -\nliğini kullanabilir.\n ¬ Görsel ve Video İçerik Üretimi: Eğitim materyalleri için \ninfografikler ve kısa ders videoları oluşturulabilir.\n ¬ Sosyal Medya Yönetimi: Okullar ve eğitimciler, eğitimle \nilgili içeriklerin düzenli olarak paylaşılmasını sağlayabilir.\n ¬ Öğrenci Projeleri: Öğrenciler, sınıf sunumları ve projeleri \niçin yaratıcı görseller ve videolar hazırlayabilir.\nSimplified AI, öğretmenler ve öğrenciler için zaman kazandıran, \niçerik üretimini hızlandıran ve görsel materyalleri profesyonel \nhâle getiren etkili bir platformdur.\nSimplified AI kullanımı oldukça basit e yeniden ifade eder.\n ¬ Ton Ayarı: Resmi, yarı resmi veya samimi tonlarda metin \noluşturmanıza yardımcı olur.\n ¬ Özelleştirilmiş Öneriler: Cümlelerinizi daha iyi ifade etmek \niçin alternatif öneriler sunar.\n ¬ Çoklu Dil Desteği: Birden fazla dilde metin düzenlemesi \nyapabilir.\n ¬ Kısaltma ve Uzatma: Metinlerinizi ihtiyaçlarınıza göre \nkısaltabilir veya genişletebilir.\n ¬ Hızlı Entegrasyon: Google Docs, Word ve Chrome eklentisi \ngibi platformlarla entegre çalışır.\n ¬ Gerçek Zamanlı Düzenleme: Yazım sırasında anında öne -\nriler sağlar.\nEğitimde Kullanımı:\n ¬ Akademik Yazılar: Öğrenciler, makale, tez veya ödevlerini \ndaha profesyonel bir dilde düzenleyebilir.\n ¬ Dil Geliştirme: İngilizce yazı yazmayı öğrenen öğrenciler \niçin doğru ve etkili cümle yapıları önerir.\n ¬ Ders Notları Düzenleme: Öğretmenler, ders materyalle -\nrini sadeleştirerek veya genişleterek daha anlaşılır hâle \ngetirebilir.\n ¬ Sunum ve Rapor Hazırlama: Hem öğrenciler hem de öğret -\nmenler için etkili sunum içerikleri oluşturmayı kolaylaştırır. ¬ Geri Bildirim Yazımı: Öğretmenlerin öğrencilere daha net \nve motive edici geri bildirimler yazmasına yardımcı olur.\nWordtune, yazılı iletişim becerilerini geliştirmek ve metinleri \ndaha etkili hâle getirmek isteyen herkes için ideal bir araçtır. \nRytr: \nTanım: Yapay zekâ destekli çok yönlü bir yazım asistanıdır ve \nkullanıcıların hızlı ve etkili bir şekilde içerik oluşturmasına \nyardımcı olur. Blog yazıları, e-postalar, sosyal medya içerik -\nleri, ürün açıklamaları gibi çeşitli metin türlerini oluşturabilen \nRytr, gelişmiş dil modelleri kullanarak kullanıcının ihtiyaçlarına \nuygun, insan gibi yazılmış metinler üretir. \nTemel Özellikler:\n ¬ İçerik Üretimi: Rytr, kullanıcının sağladığı kısa bir açıklama \nveya başlığa dayalı olarak içerik oluşturabilir. Farklı yazım \nstilleri ve tonlarını destekler, bu da aracı çeşitli içerik türleri \niçin uygun hâle getirir.\n ¬ Yapay Zekâ Destekli Öneriler: Araç, metni geliştirmek için \ndil bilgisi düzeltmeleri, stil iyileştirmeleri ve içerik geniş -\nletme gibi öneriler sunar.\n ¬ Çok Dilli Destek: Rytr, birçok dili destekleyerek kullanıcılara \ntercih ettikleri dilde içerik oluşturma olanağı sunar.\n ¬ Ton Ayarlamaları: Kullanıcılar, oluşturulan içeriğin tonunu \nseçebilirler; örneğin, resmi, samimi, heyecanlı veya esprili \ngibi. Bu, hedef kitle ve amaca uygun içerik oluşturmayı \nkolaylaştırır.\n ¬ Özel Şablonlar: Rytr, kullanıcıların sık kullandıkları içerik \ntürleri için özel şablonlar oluşturmasına ve kaydetmesine \nolanak tanır, bu da yazma sürecini daha verimli hâle getirir.\n159\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 160, "text": "Eğitimde Kullanımı:\n ¬ Deneme ve Rapor Yazımı: Öğrenciler, Rytr'ı kullanarak fikir \ngeliştirme, deneme yazma veya rapor hazırlama süreç -\nlerinde destek alabilirler. Araç, öğrencilerin düşüncelerini \nyapılandırmalarına ve içeriklerinin mantıksal bir akış içinde \nolmasını sağlamalarına yardımcı olabilir.\n ¬ Sunum İçin İçerik Oluşturma: Rytr, öğrencilerin sunumlar \niçin içerik oluşturmasına yardımcı olabilir. Giriş yazıları, \nönemli noktaların özetleri ve etkileyici sonuç cümleleri \noluşturmak için kullanılabilir.\n ¬ Dil Öğrenimi: Dil öğrenen öğrenciler için Rytr, yeni bir dilde \nyazma pratiği yapmak için faydalı bir araç olabilir. Araç, çok \ndilli destek sayesinde öğrencilerin öğrendikleri dilde metin \noluşturmasına ve bu metinleri geliştirmesine olanak tanır.\n ¬ Yaratıcı Yazma: Rytr, öğrencilerin yaratıcı yazma projele -\nrinde hikâye fikirleri, karakter betimlemeleri ve diyaloglar \noluşturmasına yardımcı olabilir. Bu, edebiyat veya yaratıcı \nyazma derslerinde özellikle faydalıdır.\nRytr bir yapay zekâ destekli yazım platformudur ve içerik \noluşturmayı hızlandırmak için kullanılır. Nasıl kullanılır:\n1. Hesap Oluşturun ve Giriş Yapın: Rytr'a gidip bir hesap \noluşturun veya mevcut hesabınıza giriş yapın.\n2. Yazma Amacınızı Seçin: Blog yazısı, e-posta, sosyal medya \ngönderisi gibi içerik türünü seçin.\n3. Dil ve Ton Seçimi: İçeriğin yazılacağı dili ve tonlamayı \nbelirleyin (örneğin profesyonel veya samimi).\n4. Talimatlar Verin: Konu başlığı veya birkaç anahtar kelime \ngirin.\n5. Örnek prompt: \"Yeni bir dijital pazarlama stratejisi oluştur -\nmak için bir blog yazısı yaz. Hedef kitlemiz küçük işletme \nsahipleri. Anahtar noktalar: sosyal medya pazarlaması, \nSEO, e-posta pazarlaması ve içerik stratejisi. Tonlama: \nBilgilendirici ve dostane.\"\n6. Örnek prompt: \"Uzaktan eğitimde etkili öğretim yöntemleri \nhakkında 1000 kelimelik bir makale yaz. Ana başlıklar: Etki -\nleşimli ders materyalleri, öğrenci katılımı artırma stratejileri ve değerlendirme yöntemleri. Hedef kitle: öğretmenler ve \neğitimciler. Tonlama: bilgilendirici ve profesyonel.\"\n7. Yapay Zekâ İçeriği Üretsin: Rytr, talimatlarınıza göre içeriği \noluşturur.\n8. Düzenleyin ve İndirin: İçeriği gözden geçirip, gerekli dü -\nzenlemeleri yapın ve indirin.\nAISEO AI:\nTanım:  SEO (Arama Motoru Optimizasyonu) odaklı içerik oluş -\nturma konusunda uzmanlaşmış bir yapay zekâ destekli araçtır. \nBu araç, içerik üreticileri, pazarlamacılar ve işletmelerin çevrim \niçi varlıklarını güçlendirmek amacıyla hızlı ve etkili bir şekilde \nSEO uyumlu içerikler oluşturmasına yardımcı olur.\nTemel Özellikler:\n ¬ Makale Yazma:  AISEO, çeşitli konular üzerine hızlı bir şekilde \nkapsamlı ve SEO uyumlu makaleler oluşturur. Bu sayede \nkullanıcılar, arama motorlarında daha yüksek sıralamalar \nelde edebilecek kaliteli içerikler üretebilir.\n ¬ Parafraz Aracı: Mevcut içeriği yeniden yazarak benzersiz \nhâle getiren bir araçtır. Bu özellik, içeriklerin kopya olmadan, \nözgün bir şekilde sunulmasını sağlar.\n ¬ Okunabilirlik Geliştirici: Metinlerin okunabilirliğini artır -\nmak için kullanılan bu araç, içeriklerin daha anlaşılır ve \nilgi çekici hâle gelmesine yardımcı olur.\n ¬ Blog Görseli Oluşturucu: Blog yazıları için, içerikle uyumlu \nve dikkat çekici görseller oluşturur.\n ¬ AI Tespit Önleme: AISEO, yapay zekâ tarafından oluşturulan \niçeriğin AI tespit sistemlerinden kaçınmasını sağlar, bu \nsayede içerik daha insan tarafından yazılmış gibi görünür.\n ¬ İçerik Yeniden Kullanımı: Var olan içerikleri yenileyerek \ndaha taze ve çekici içerikler hâline getirir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n160"}, {"page": 161, "text": "¬ Çok Dilli Destek: 26 farklı dilde içerik oluşturma desteği \nsunar, böylece küresel bir kitleye hitap edilebilir.\nEğitimde Kullanımı:\n ¬ Eğitim Blogları için İçerik Oluşturma: Eğitimciler ve öğ -\nrenciler, AISEO'yu kullanarak SEO uyumlu ve iyi araştırıl -\nmış makaleler üretebilir, bu da eğitim blogları veya web \nsitelerinde bilgi yaymak için etkili olabilir.\n ¬ Deneme ve Rapor Yazma: Öğrenciler, AISEO'nun özel -\nliklerini kullanarak daha kaliteli, yapılandırılmış ve SEO \nuyumlu denemeler veya raporlar yazabilir.\n ¬ Akademik Bütünlüğü Sağlama: Parafraz aracı, öğrencilerin \niçerikleri kendi kelimeleriyle yeniden yazmalarına yardımcı \nolarak akademik dürüstlüğü korumalarına destek olabilir.Örnek Kullanım:\nMetin:\nBilinmeyen Bir Gezegene Yolculuk\nBir gün, genç bir bilim insanı olan Ayşe, yeni keşfedilmiş bir \ngezegene gitmek üzere bir uzay yolculuğuna çıkar. Bu gezegen, \nDünya'dan tamamen farklı bitki ve hayvan türleri ile doludur. \nAyşe, burada hem bilimsel keşifler yapacak hem de gezegenin \ngizemlerini çözecektir.\n ¬ Ana Karakter: Ayşe\n ¬ Ayar: Bilinmeyen bir gezegen\n ¬ Ana Olay: Yeni keşfedilmiş bir gezegene yolculuk\n ¬ Hedef: Bilimsel keşifler yapmak ve gezegenin gizemlerini \nçözmek\nPrompt:\nHedef Kazanım: Öğrencilerin yaratıcı yazma becerilerini geliş -\ntirmek ve bilim kurgu türünde hikâyeler yazmalarını sağlamak.\n ¬ Prompt: \"HIX.AI kullanarak bir bilim kurgu hikâyesi başlatın \nve bu hikâyeyi kendi yaratıcılığınızı kullanarak tamamlayın. \nHikâyenizi sınıfta paylaşın.\"\nAdımlar:\n1. HIX.AI web sitesine gidin ve hikâye başlatıcı oluşturun.\n2. Metni Kullan: Yukarıdaki örnek hikâye başlangıcını HIX.\nAI'ye girin ve hikâyenizi başlatın.\n3. Hikâye Fikirleri: HIX.AI'den gelen fikirleri kullanarak hikâ -\nyenizin giriş, gelişme ve sonuç bölümlerini oluşturun.\n4. Karakter ve Olay Gelişimi: Ayşe'nin karakter gelişimini ve \ngezegende karşılaştığı olayları tanımlayın.\n5. Anlatım Teknikleri: Hikâyede geriye dönüşler, iç monologlar \nve diyaloglar kullanarak anlatımı zenginleştirin.\n6. Diyalog ve İç Monologlar: Karakterler arasında etkili diya -\nloglar yazın ve Ayşe'nin iç düşüncelerini ekleyin.\nHIX.AI\nEğitimde Kullanımı:\nTanım: Yaratıcı yazma ve hikâye anlatımında öğrencilere yar -\ndımcı olan bir yapay zekâ aracıdır. Öğrencilerin hikâye yazma \nsürecini destekler, fikirler üretir ve yazma becerilerini geliştirir. \nBu araç, özellikle etkileşimli ve yaratıcı hikâyeler oluşturmak \niçin kullanılabilir. \nÖzellikler ve Kullanım Alanları:\n1. Hikâye Fikirleri: Öğrencilere çeşitli hikâye fikirleri sunarak \nyazma sürecine başlamalarına yardımcı olur.\n2. Karakter ve Olay Gelişimi: Farklı karakterler ve olaylar \noluşturmak için seçenekler sunar.\n3. Anlatım Teknikleri: Farklı anlatım teknikleri kullanarak \nhikâyeyi zenginleştirir.\n4. Diyalog ve İç Monologlar: Etkili diyaloglar ve iç monologlar \nyazmada yardımcı olur.\n5. Geri Bildirim ve Düzenleme: Yazma sürecinde geri bildirim \nsunar ve hikâyeyi geliştirmeye yardımcı olur.\n161\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 162, "text": "7. Geri Bildirim ve Düzenleme: HIX.AI'nin sağladığı geri bil -\ndirimleri kullanarak hikâyenizi geliştirin ve düzenleyin.\n8. Sunum Yap: Tamamladığınız hikâyeyi sınıfta okuyarak \npaylaşın ve sınıf arkadaşlarınızdan geri bildirim alın.\nÖrnek Hikâye İçeriği:\n ¬ Başlık: Bilinmeyen Gezegenin Gizemleri\n ¬ Giriş: Ayşe, yeni keşfedilmiş bir gezegene gitmek üzere \nuzay yolculuğuna çıkar.\n ¬ Gelişme: Ayşe, gezegende farklı bitki ve hayvan türleri \nkeşfeder. Bilimsel araştırmalar yaparken gezegenin sır -\nlarını çözmeye çalışır.\n ¬ Sonuç: Ayşe, gezegenin geçmişine dair önemli keşifler \nyapar ve Dünya'ya geri dönerek bulgularını paylaşır.Eğitimde Kullanımı:\n ¬ Yaratıcı yazma derslerinde hikâye taslağı, sahne ve diyalog \nüretimi için kullanılabilir.\n ¬ Öğrenciler, verilen bir tema üzerinden kısa hikâye yazdı -\nrarak yapının nasıl kurulduğunu öğrenebilir.\n ¬ Yabancı dil eğitimi için öğrenciler kendi yazılarını Writec -\nream ile karşılaştırarak dil becerilerini geliştirebilir.\n ¬ Ödev ve blog yazımı gibi görevlerde taslak oluşturarak \nyazım sürecini kolaylaştırır.\n6.1.4. Özetleme ve Analiz\nMetin yazma asistanları, uzun metinleri özetleyebilir, anahtar \nnoktaları vurgulayabilir ve metin analizi yapabilir. Bu, akademik \naraştırmalar veya karmaşık belgeleri anlamak için faydalıdır.\n6.1.4.1. Özetleme ve Analiz Araçları\nWritecream:\nTanım: Writecream, yapay zekâ destekli içerik üretim aracıdır; \nmetin yazarlığı, blog yazımı, reklam metni, diyalog, e-posta ve \nhikâye yazımı gibi birçok içerik türünü otomatik olarak oluşturur. \nYaratıcı yazarlık, pazarlama ve eğitim alanlarında kullanılır.\nTemel Özellikler:\n ¬ Blog, sosyal medya, e-posta ve ürün açıklamaları için \niçerik üretimi.\n ¬ AI Story Generator özelliği ile hikâye, diyalog ve karakter \nodaklı yazılar oluşturur.\n ¬ 75’ten fazla şablon ve 30+ dil desteği.\n ¬ Sesli içerik oluşturma (text-to-speech).\n ¬ Kişiye özel tanıtım e-postaları ve LinkedIn mesajları üretimi.QuillBot:\nTanım: Bir metni yeniden yazma, özetleme, dil bilgisi düzeltme \nve metni iyileştirme gibi görevler için kullanılan güçlü bir yapay \nzekâ destekli yazım asistanıdır. Bu araç, kullanıcıların yazılı \niçeriklerini hızlı ve etkili bir şekilde geliştirmelerine yardımcı \nolur. QuillBot, özellikle akademik yazım, profesyonel metinler \nve yaratıcı içeriklerde yaygın olarak kullanılır. \nTemel Özellikler:\n ¬ Paraphrasing (Yeniden Yazma): QuillBot'un en temel özelli -\nği, metinleri yeniden yazma yeteneğidir. Kullanıcılar, orijinal \nanlamı koruyarak metinlerini yeniden yapılandırabilir ve \nbenzersiz hâle getirebilirler.\n ¬ Dil bilgisi ve Stil Düzenleme: QuillBot, dil bilgisi hatalarını \ndüzeltir ve metnin stilini iyileştirir. Bu özellik, yazılı içe -\nriklerin daha profesyonel ve okunabilir olmasını sağlar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n162"}, {"page": 163, "text": "¬ Özetleme: QuillBot, uzun metinleri kısa ve özlü hâle ge -\ntirebilir. Bu özellik, özellikle akademik çalışmaların veya \nmakalelerin hızlı bir şekilde özetlenmesi için kullanışlıdır.\n ¬ Çoklu Yazım Modları: QuillBot, kullanıcıların ihtiyaçları -\nna göre çeşitli yazım modları sunar. Örneğin, kullanıcılar \nmetni daha resmi, yaratıcı, basit veya genişletilmiş hâle \ngetirebilirler.\n ¬ Kelime Duyarlılığı: Araç, belirli kelimelerin değiştirilme -\nden kalmasını sağlayarak, kullanıcıların istediği kelimeleri \nkoruyabilmesine olanak tanır.\nEğitimde Kullanımı:\n ¬ Akademik Yazım: Öğrenciler, akademik makaleler, tezler \nveya raporlar yazarken QuillBot'u kullanarak metinleri -\nni yeniden yazabilir, özetleyebilir ve dil bilgisi hatalarını \ndüzeltebilirler. Bu, akademik dürüstlüğü koruyarak yazılı \niçeriklerin özgün olmasını sağlar.\n ¬ Yaratıcı Yazım: QuillBot, yaratıcı yazma projelerinde de \nkullanılabilir. Öğrenciler, hikâyeler, şiirler veya diğer yaratıcı \nmetinler üzerinde çalışırken bu aracı kullanarak içeriklerini \ndaha ilgi çekici hâle getirebilirler.\n ¬ Dil Öğrenimi: Dil öğrenen öğrenciler, QuillBot'u kullanarak \nmetinlerini yeniden yazabilir, kelime dağarcıklarını geniş -\nletebilir ve dil bilgisi becerilerini geliştirebilirler.\n ¬ Geri Bildirim ve Düzenleme: Öğretmenler, öğrencilerin \nyazılı ödevlerini değerlendirmek için QuillBot'u kullana -\nrak geri bildirim sağlayabilir ve metinlerin dil bilgisi ve stil \naçısından iyileştirilmesine yardımcı olabilir.\nQuillBot kullanımı oldukça basittir ve şu adımları izleyerek \nyazılarınızı düzenleyebilirsiniz:\n1. Web Sitesine Gidin: QuillBot sitesine gidip bir hesap oluş -\nturun veya giriş yapın.\n2. Metni Yapıştırın: Paraphrase, özetleme, dil bilgisi kont -\nrolü gibi işlemler için düzenlemek istediğiniz metni ilgili \nkutuya yapıştırın.\n3. Mod Seçimi: İstediğiniz modları (standart, akıcı, yaratıcı \nvb.) seçin.4. Düzenle: QuillBot, yapay zekâ kullanarak metni yeniden \nyazar, özetler veya düzeltir.\n5. Sonucu Kullanın: Düzenlenmiş metni kopyalayın veya \nindirin.\nTLDR This (Too Long Didn't Read This): \nTanım: uzun metinleri kısa ve öz bir şekilde özetlemek için \nkullanılan bir yapay zekâ aracıdır. Araç, kullanıcıların karmaşık \nve uzun içeriklerden hızla önemli bilgileri çıkarmalarını sağlar. \nÖzellikle akademik makaleler, haber makaleleri, blog yazıları \ngibi içeriklerin özetlenmesinde kullanılır. \nTemel Özellikler:\n ¬ Otomatik Özetleme: TLDR This, uzun metinleri hızlıca analiz \neder ve en önemli bilgileri içeren kısa özetler oluşturur. \nBu özellik, kullanıcıların uzun metinlerdeki ana noktaları \nhızlıca anlamalarına yardımcı olur.\n ¬ Çoklu Platform Desteği: Bu araç, web sitelerindeki içerik -\nleri, PDF dosyalarını ve diğer dijital metinleri özetleyebilir. \nKullanıcılar, farklı kaynaklardan bilgi toplayabilir ve bunları \nkısa özetler halinde inceleyebilir.\n ¬ Kullanıcı Dostu Arayüz: TLDR This, sade ve kullanıcı dostu \nbir arayüze sahiptir, bu sayede metinleri özetlemek için \nkolayca kullanılabilir.\nEğitimde Kullanımı:\n ¬ Akademik Çalışmaların Özetlenmesi: Öğrenciler, akade -\nmik makaleler ve araştırma çalışmalarını TLDR This ile \nözetleyebilirler. Bu, uzun ve karmaşık metinlerdeki ana \nfikirleri hızlıca kavramalarına yardımcı olur.\n ¬ Hızlı Bilgi Edinme: Öğrenciler, ders kitapları, makaleler veya \ndiğer eğitim materyallerinden hızlı bir şekilde bilgi edinmek \nistediklerinde bu aracı kullanabilirler. Bu sayede, sınav \nhazırlığı veya araştırma projelerinde zaman kazanabilirler.\n163\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 164, "text": "¬ Günlük Okumalar: Güncel olaylar, haberler veya blog ya -\nzıları gibi günlük okumaları hızlandırmak için TLDR This \nkullanılabilir. Öğrenciler, güncel konular hakkında hızlı ve \netkili bilgi edinebilirler.\n ¬ Öğretmenler için Ders Hazırlığı: Öğretmenler, ders ma -\nteryallerini hazırlarken veya öğrencilere sunmadan önce \nuzun metinleri özetlemek için bu aracı kullanabilirler. ¬ Araştırma projelerinde, literatür taraması için çok sayıda \nmetni kısa sürede değerlendirmeye yardımcı olur.\n ¬ Özetleme becerisi geliştirme amacıyla, öğrenciler kendi \nözetleriyle Resoomer çıktısını karşılaştırarak yazılı anlatım \nyetilerini ölçebilir.\nResoomer:\nTanım: Uzun metinleri hızlı bir şekilde özetlemek için kullanılan \nbir yapay zekâ destekli araçtır. Özellikle akademik makaleler, \nhaber makaleleri, raporlar ve diğer uzun metinler üzerinde \nçalışanlar için tasarlanmıştır. Resoomer, kullanıcıların metin -\nlerdeki ana fikirleri ve önemli noktaları hızlıca anlamalarına \nyardımcı olur. \nTemel Özellikler:\n ¬ Otomatik Özetleme: Resoomer, uzun metinleri analiz eder \nve bunları kısa ve özlü bir özet hâline getirir. Bu özetleme, \nmetnin ana noktalarını ve önemli bilgileri içerir.\n ¬ Kullanıcı Dostu Arayüz: Basit ve sezgisel bir arayüz sunar, \nbu sayede kullanıcılar metinlerini kolayca özetleyebilirler.\n ¬ Çok Dilli Destek: Resoomer, farklı dillerde metinleri \nözetleyebilir, bu da uluslararası kullanıcılar için büyük bir \navantajdır.\n ¬ Eklenti Desteği: Tarayıcı eklentileri sayesinde kullanıcılar, \ninternet üzerinde gezinirken karşılaştıkları metinleri hızlıca \nözetleyebilirler.\nEğitimde Kullanımı\n ¬ Öğrenciler, uzun akademik metinlerin hızlı özetlerine \nul
