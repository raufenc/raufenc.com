ları için Video Özetleri: Öğrenciler, projelerini \nsunarken videolarını daha kısa ve etkili hâle getirebilir.\n ¬ Etkileşimli Öğrenme İçeriği Üretme: Ders içerikleri sosyal \nmedya uyumlu hâle getirilerek geniş bir kitleye ulaştırılabilir.\n ¬ Bilgilendirici Kısa Videolar: Eğitimciler, konuları daha \nanlaşılır ve ilgi çekici şekilde aktarmak için Opus Clip’i \nkullanabilir.\nOpus Clip, eğitim içeriklerini daha etkili, hızlı ve erişilebilir hâle \ngetirmek isteyen öğretmenler ve öğrenciler için güçlü bir yapay \nzekâ aracıdır.\nOpus Clip: \nTanım: Uzun video içeriklerini yapay zekâ kullanarak kısa, etki -\nleyici ve sosyal medya uyumlu kliplere dönüştüren bir araçtır. \nİçerik üreticileri, eğitimciler ve pazarlamacılar için tasarlan -\nmış bu araç, videoların etkisini artırarak daha geniş kitlelere \nulaşmayı sağlar.\nTemel Özellikler:\n ¬ Otomatik Video Kısaltma: Uzun ders anlatımları, webinarlar \nveya eğitim içeriklerini özetleyerek kısa klipler oluşturur.\n ¬ Yapay Zekâ Destekli Öne Çıkan Bölümleri Belirleme: Vi -\ndeoların en etkileyici ve bilgilendirici bölümlerini analiz \nederek seçer.\n ¬ Altyazı ve Başlık Ekleme: Kısa videolara otomatik altyazılar \nve dikkat çekici başlıklar ekleyerek izleyici etkileşimini artırır.\n ¬ Sosyal Medya Optimizasyonu: Üretilen klipler, YouTube \nShorts, Instagram Reels ve TikTok gibi platformlar için \noptimize edilir.\nKlap:\nTanım: Videoları hızlıca analiz eden, düzenleyen ve özetleyen \nyapay zekâ destekli bir platformdur. Özellikle içerik üreticileri \niçin ideal bir araçtır.\nTemel Özellikler:\n ¬ Otomatik Video Düzenleme: Video kesme, altyazı ekleme \nve kısa klipler oluşturma.\n ¬ Otomatik Özetleme: Uzun videolardan önemli kısımları \nçıkarır ve özetler.\n ¬ Sosyal Medya Uyumlu: Farklı platformlar için optimize \nedilmiş video formatları.\nEğitimde Kullanımı:\n ¬ Ders kayıtlarını kısa ve özet videolara dönüştürme.\n ¬ Öğrenciler için hızlı öğrenme materyalleri oluşturma.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n216"}, {"page": 217, "text": "Eightify:\nTanım: Videoları analiz ederek en önemli 8 noktasını özetleyen \nbir yapay zekâ aracıdır.\nTemel Özellikler:\n ¬ Hızlı Özetleme: Uzun videolardan önemli bilgileri çıkarır \nve listeler.\n ¬ Etkili Sunum: Özet bilgileri anlaşılır bir formatta sunar.\n ¬ Çoklu Platform Desteği: YouTube ve diğer video platform -\nlarıyla uyumludur.\nEğitimde Kullanımı:\n ¬ Uzun ders videolarını özetleyerek öğrencilere sunma.\n ¬ Eğitim içeriklerini hızlıca gözden geçirmek için kullanma. ¬ Otomatik Altyazı ve Ses Düzenleme: Videolara otomatik \naltyazı ekler ve sesleri düzenleyerek profesyonel içerikler \noluşturur.\nEğitimde Kullanımı:\n ¬ Eğitim Videoları Üretme: Öğretmenler, ders içeriklerini \ndaha etkileyici hâle getirmek için profesyonel videolar \noluşturabilir.\n ¬ Öğrenci Projelerini Görsel Olarak Destekleme: Öğrenciler, \nbilimsel ve sanatsal projeleri için video içerikleri oluşturabilir.\n ¬ Animasyon ve Hikâye Anlatımı İçin Kullanım: Öğrenciler, \nyapay zekâ destekli animasyonlar oluşturarak ders ko -\nnularını daha iyi anlayabilir.\n ¬ Sunumları ve Dersleri Daha Etkileyici Hâle Getirme:  \nÖğretmenler ve öğrenciler, sunumlarını video içeriklerle \ndestekleyerek daha ilgi çekici hâle getirebilir.\nRunway Nasıl Kullanılır?\n1. Web sitesine gir:\n »∂ https://runwayml.com\n2. Hesap oluştur veya giriş yap.\n3. Yeni bir proje başlat (örneğin: Video, Metinden Görsel, \nArka Plan Silme vb.)\n4. Araç seç:\n »Gen-2 (video üretimi)\n »Text to Image\n »Green Screen\n »Inpainting (görüntü düzeltme)\n5. İçerik ekle veya prompt yaz:\n »Görsel/video yükleyebilir ya da metinle üretim başla -\ntabilirsin.\nRunway\nTanım: Yapay zekâ destekli video düzenleme, animasyon ve \niçerik üretme platformudur. Görsel ve video içeriklerini hızlı ve \nyaratıcı bir şekilde oluşturmak ve düzenlemek için güçlü yapay \nzekâ araçları sunar. Eğitim, medya ve tasarım alanlarında içerik \nüreticileri ve öğretmenler tarafından kullanılabilir.\nTemel Özellikler:\n ¬ Yapay Zekâ Destekli Video Düzenleme: Sahne değiştir -\nme, nesne kaldırma, arka plan değiştirme gibi işlemleri \notomatik olarak yapar.\n ¬ Metinden Videoya Dönüştürme: Basit metin komutlarıyla \nyapay zekâ destekli videolar oluşturur.\n ¬ Yeşil Ekran (Green Screen) Kaldırma: Arka planı otomatik \nolarak kaldırarak farklı temalar ve ortamlar oluşturur.\n217\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 218, "text": "6. Düzenle ve dışa aktar:\n »Yapay zekâ ile düzenlemeyi tamamla.\n »MP4, PNG, vb. formatlarda indir.\nRunway ile Video Düzenleme ve Yapay Zekâ Uygulaması\nDers: Görsel Sanatlar / Medya Okuryazarlığı / Bilişim Teknolojileri\nSüre: 1 ders saati (40–45 dk)\nAraç: www.runwayml.com\nAmaç:\nÖğrencilerin bir videonun içeriğini yapay zekâ araçlarıyla dü -\nzenleyerek temel medya üretimi ve AI teknolojilerine yönelik \nfarkındalık kazanmaları.\nEtkinlik Adımları:\n1. Kısa Video Hazırlığı (5 dk):\n »Öğrencilerden kendi çektikleri veya hazır bir 10–20 \nsaniyelik video klip seçmeleri istenir (örneğin: okul \nbahçesi, doğa, sınıf içi).\n2. Runway’e Giriş (5 dk):\n »Öğretmen runwayml.com adresini tanıtır. Öğrenciler \nücretsiz hesap açar.\n3. \"Remove Background\" Aracının Kullanımı (10 dk):\n »Videolar Runway’e yüklenir.\n »“Green Screen” veya “Remove Background” seçeneğiyle \narka plan AI ile kaldırılır.\n4. Yaratıcı Düzenleme (15 dk):\n »Öğrenciler videolarına yeni arka planlar ekler, efekt \nuygular, yazı ve ses ekler.\n »İsteyen öğrenciler “Text to Video” özelliğini de deneyebilir.5. Sunum ve Değerlendirme (10 dk):\n »Her öğrenci videosunu sınıfa gösterir.\n »Yapay zekâ destekli düzenlemenin katkıları üzerine sınıf \niçi kısa bir değerlendirme yapılır.\nKazanımlar:\n ¬ Temel video düzenleme becerisi\n ¬ Yapay zekâ ile medya üretimi farkındalığı\n ¬ Görsel anlatım ve yaratıcılığın desteklenmesi\n ¬ Dijital medya okuryazarlığı gelişimi\nMagic Studio\nTanım: Magic Studio, yapay zekâ destekli görsel düzenleme \nve içerik oluşturma platformudur. Kullanıcıların fotoğraf dü -\nzenleme, arka plan kaldırma, nesne ekleme veya silme gibi \nişlemleri hızlı ve profesyonel bir şekilde yapmalarını sağlar.\nTemel Özellikler:\n ¬ Arka Plan Kaldırma ve Değiştirme: Görsellerin arka plan -\nlarını tek tıklamayla kaldırarak farklı temalar oluşturmayı \nsağlar.\n ¬ Yapay Zekâ ile Görsel Yeniden Düzenleme: Kırpma, bo -\nyutlandırma, parlaklık ayarlama ve renk düzenlemeleri \ngibi işlemleri otomatik yapar.\n ¬ Nesne Kaldırma ve Ekleyerek Manipülasyon: Fotoğraflar -\ndaki istenmeyen objeleri kaldırır veya yeni öğeler ekleyerek \nprofesyonel görseller oluşturur.\n ¬ Yapay Zekâ ile Görsel Üretme: Kullanıcıların tarifine göre \nsıfırdan görseller oluşturur veya var olan görselleri iyileştirir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n218"}, {"page": 219, "text": "Eğitimde Kullanımı:\n ¬ Eğitim Materyali Hazırlama: Öğretmenler, derslerde kul -\nlanmak üzere özel görseller oluşturabilir.\n ¬ Öğrenci Projelerini Geliştirme: Öğrenciler, sunumlar ve \nprojeleri için görsel tasarımlar yaparak içeriklerini daha \netkileyici hâle getirebilir.\n ¬ Sunum ve Poster Tasarımı: Eğitim etkinlikleri, ders ma -\nteryalleri veya bilim projeleri için profesyonel görseller \noluşturulabilir.\n ¬ Yaratıcı Çalışmalar İçin Görsel Manipülasyon: Öğrenciler \nve öğretmenler, sanatsal projelerde yaratıcı düzenlemeler \nyaparak benzersiz içerikler oluşturabilir.Tavus: \nTavus, videolara kişisel dokunuşlar eklemek için kullanılan yapay \nzekâ tabanlı bir video platformudur.\nTemel Özellikler:\n ¬ Kişiselleştirilmiş Videolar: İsim ve özel mesajlar ekleyerek \nkişisel video içerikleri oluşturma.\n ¬ Otomasyon: Çoklu kişiye özel videoları hızlıca üretme.\n ¬ Kolay Entegrasyon: CRM ve diğer araçlarla uyumlu.\nEğitimde Kullanımı:\n ¬ Öğrencilere kişisel geri bildirim videoları oluşturma.\n ¬ Kişiselleştirilmiş öğrenci motivasyon içerikleri hazırlama.\nÖrnek Prompt:\n\"Bir sınıf öğretmeni olarak, öğrencilerime bireysel geri bildirim \nvideoları oluşturmak istiyorum. Her videoda öğrencinin adıyla \nhitap ederek başla ve o haftaki kişisel başarılarından bahset. \nArdından, öğrenciyi motive etmek için güçlü yönlerini öne çıkar \nve gelişim alanları hakkında yapıcı bir öneride bulun. Video -\nlar sıcak ve samimi bir üslupla yapılmalı, sanki sınıfta birebir \nkonuşuyormuşum gibi doğal olmalı. Örneğin:\n'Merhaba [öğrenci adı], bu hafta [başarı konusu] konusunda \ngerçekten harika bir performans gösterdin. Özellikle [öğrenci -\nnin güçlü yönü] ile dikkat çektin. Gelecek hafta [gelişim alanı] \nüzerine biraz daha yoğunlaşmanı öneriyorum. Seni daha da \nbaşarılı görmek için sabırsızlanıyorum!'\nVideoların süresi 30 saniyeyi geçmesin ve her öğrencinin \nbireysel özelliklerine özel detaylar ekleyerek motive edici bir \nmesaj oluştur.\"Supercreator.ai:\nTanım: kısa sürede içerik oluşturmak ve düzenlemek için ta -\nsarlanmış bir yapay zekâ aracıdır.\nTemel Özellikler:\n ¬ Otomatik İçerik Üretimi: Fikirden videoya hızlı dönüşüm.\n ¬ Kullanıcı Dostu Arayüz:  Basit ve sezgisel içerik oluşturma.\n ¬ Farklı Formatlar: Sosyal medya ve eğitim platformlarına \nuygun içerikler.\nEğitimde Kullanımı:\n ¬ Kısa ve etkili ders içerikleri oluşturma.\n ¬ Sosyal medya aracılığıyla eğitici materyaller paylaşma.\n219\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 220, "text": "Hedra AI:\nTanım: Hedra AI, yapay zekâ destekli bir platform olup, metin \ntabanlı içerikleri, etkileşimli ve akıllı ders materyalleri hâline \ngetirir. Bu platform, eğitimde öğretmenlerin ve öğrencilerin daha \nkişiselleştirilmiş ve etkili öğrenme deneyimleri oluşturmasına \nyardımcı olur. Hedra AI, eğitim materyallerini analiz ederek, \ndersleri interaktif hâle getirir, öğrenci performansını izler ve \ngeri bildirim sağlar. Özellikle uzaktan eğitimde, öğretmenlerin \nders materyallerini zenginleştirmelerine yardımcı olur.\nTemel Özellikler:\n ¬ Yapay zekâ destekli ders materyali analizi ve oluşturma.\n ¬ Kişiselleştirilmiş öğrenme yolları sunma.\n ¬ Öğrenci performansını izleme ve anında geri bildirim verme.\n ¬ Etkileşimli ders materyalleri ile öğrenme deneyimini zen -\nginleştirme.\nEğitimde Kullanımı: \nHedra AI, öğretmenlerin eğitim materyallerini daha etkileşimli \nhâle getirmesine yardımcı olur. Öğretmenler ders notlarını ve \nmetin tabanlı içerikleri analiz ederek, öğrenci seviyelerine göre \nkişiselleştirilmiş öğrenme materyalleri sunabilirler. Öğrenciler \nise bu materyaller üzerinden aktif bir öğrenme deneyimi yaşarlar \nve performansları düzenli olarak değerlendirilir. Bu sayede, \neksiklikleri belirleyip anında geri bildirim alma imkânı doğar.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Hedra AI’nin web sitesine gidin: \nHedra AI\n ¬ Eğitim İçeriği Yükleme: Metin tabanlı içeriklerinizi (ders \nnotları, makaleler vb.) platforma yükleyin. Hedra AI, bu \niçerikleri analiz eder. ¬ İnteraktif Ders Materyali Oluşturma: Yapay zekâ, metin -\nleri interaktif ders materyallerine dönüştürür. Etkileşimli \nsorular, bilgi kartları veya quizler oluşturulabilir.\n ¬ Öğrenci Performansını İzleme: Öğrenciler materyalleri \nçalışırken, performansları izlenir ve eksiklikler belirlenir. \nÖğrencilere anında geri bildirim verilir.\n ¬ Kişiselleştirilmiş Öğrenme Yolları: Platform, her öğrencinin \nihtiyacına göre kişiselleştirilmiş öğrenme yolları sunar.\n ¬ Web Sayfası: Hedra AI\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Hedra AI, öğretmenlerin metin tabanlı ders \niçeriklerini analiz ederek, öğrencilere daha etkili bir şekilde \nsunmalarına yardımcı olur. Ders materyallerini etkileşimli \nhâle getirerek, öğrencilerin aktif katılımını sağlar. Ayrıca, \nöğrenci performansını izleyip geri bildirim vermek için \ngüçlü bir araçtır.\n ¬ Öğrenciler: Öğrenciler, Hedra AI'nin sunduğu kişiselleş -\ntirilmiş öğrenme yollarıyla daha verimli bir öğrenme de -\nneyimi yaşarlar. Etkileşimli ders materyalleri sayesinde, \nöğrendiklerini pekiştirme fırsatı bulurlar ve düzenli olarak \ngeri bildirim alarak eksikliklerini giderebilirler.\nVizard:\nTanım: Kullanıcıların hızlıca veri odaklı videolar oluşturmasına \nolanak tanıyan bir yapay zekâ platformudur. Pazarlama, sosyal \nmedya ve içerik üretimi için idealdir. \nTemel Özellikleri\n ¬ Veri tabanlı video üretimi.\n ¬ Özelleştirilebilir şablonlar.\n ¬ Kolay kullanım ve hızlı üretim.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n220"}, {"page": 221, "text": "Eğitimde Kullanımı\nÖğrenciler veri analizi ve sunum derslerinde videolar oluştu -\nrabilir ve analizlerini görselleştirebilirler.\n Nasıl Kullanılır?\n1. Web sitesine gidin: https://vizard.ai/ \n2. Verileri yükleyin: Veri kaynaklarınızı ekleyin.\n3. Şablon seçin: Videonun formatını belirleyin.\n4. İndirin veya paylaşın: Videoyu tamamlayıp kullanın.Eğitimde Kullanımı\nEğitim içeriklerini videoya dönüştürmek, ders anlatımlarını daha \netkili hâle getirmek ve video tabanlı e-öğrenme materyalleri \noluşturmak için kullanılabilir.\nNasıl Kullanılır?\n1. Web sitesine gidin: Pictory adresine giriş yapın.\n2. Metin veya senaryo yükleyin: Oluşturmak istediğiniz vi -\ndeoya temel olacak metni girin.\n3. Görseller ve ses ekleyin: Metni görseller ve seslendirmeyle \nzenginleştirin.\n4. Videoyu oluşturun ve indirin: Oluşturulan videoyu indirip \nprojelerinizde kullanın.\nPictory: \nTanım: bir yapay zekâ destekli video oluşturma platformudur. \nMetinlerden ve görsellerden videolar oluşturmanızı sağlar. Blog \nyazıları, makaleler veya senaryolar gibi metin tabanlı içerikleri \nkolayca videolara dönüştürme imkânı sunar. Özellikle içerik \nüreticileri, pazarlamacılar ve eğitimciler için etkili bir araçtır. \nTemel Özellikleri\n ¬ Otomatik metin tabanlı video oluşturma.\n ¬ Görseller ve seslerle videoyu zenginleştirme.\n ¬ Kullanıcı dostu arayüz.\n ¬ Özelleştirilebilir şablonlar. \n ¬ Makalelere veya komut dosyalarına dayalı video\n ¬ Metin kullanarak videoları düzenleyin\n ¬ Paylaşılabilir video vurgulama makaraları oluşturun\n ¬ Videolara otomatik olarak altyazı ekleyin ve özetleyin\nSynthesys: \nSynthesys, yapay zekâ destekli bir ses ve video oluşturma \nplatformudur. Kullanıcılar, profesyonel seslendirme ve video \nprodüksiyonunu hızlıca yapabilmektedir. Platform, metinler -\nden doğal sesli seslendirmeler oluşturur ve video projelerin -\nde kullanılabilecek insan benzeri konuşmalar sağlar. Reklam, \ne-öğrenme ve sosyal medya projeleri için uygundur. \nTemel Özellikleri\n ¬ Doğal insan sesi üretimi.\n ¬ Yapay zekâ tabanlı video ve seslendirme oluşturma.\n ¬ Çeşitli ses tonları ve dillerde seçenekler. 69 gerçek Hu -\nmatar, 140+ dil ve 254 benzersiz stil\n ¬ Açıklayıcı videolar, e-Öğrenim, sosyal medya ve ürün açık -\nlamaları için mükemmel bir araç\n ¬ Kullanıcı dostu arayüz.\n221\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 222, "text": "Eğitimde Kullanımı\nEğitim videoları, e-öğrenme modülleri ve ders materyalleri için \nprofesyonel seslendirme ve video prodüksiyonu sağlayarak \nöğretmenlerin ve öğrencilerin daha kaliteli içerikler oluştur -\nmasına yardımcı olur.\nSynthesys Nasıl Kullanılır?\n1. Web Sitesine Girin\n »∂ synthesys.io üzerinden “Try for Free” ile başlayın.\n2. Hesap Oluşturun / Giriş Yapın\n »∂ E posta ile kayıt olun veya mevcut hesabınıza giriş yapın \n3. Video Projesi Oluşturun\n »∂ Dashboard’dan “AI Humans” ya da “Text to Video” se -\nçeneğini seçin.\n4. Metni Yazın veya Yapıştırın\n »∂ Video için kullanılacak senaryoyu metin kutusuna \nekleyin. \n5. Avatar (Humatars) Seçin\n »∂ 80–140+ sunulan avatarlarımızdan birini seçin .\n6. Ses ve Dil Ayarları\n »∂ 300+ ses ve 140+ dil arasından uygun olanı seçin; hız, \nton ve duraklama ayarları yapın .\n7. Video Ayarlarını Özelleştirin\n »∂ Arka plan, geçiş, altyazı ve müzik seçeneklerini belirleyin. \n8. Videonuzu Oluşturun (Render)\n »∂ “Create Video” tuşuna basın; genellikle 1–5 dakika \niçinde video hazırlanır 9. İndirin veya Paylaşın\n »∂ Oluşan videoyu MP4 formatında indirin ya da doğru -\ndan paylaşın.\nHızlı Tek Satırlık Özet:\nKayıt ∂ Text-to- Video seç ∂ Metin + Avatar + Ses + Özelleştirme \n∂ “Create Video” ∂ İndir & Paylaş.\nDeepBrain:\nTanım: Yapay zekâ tabanlı bir platformdur ve video oluşturma, \nsanal karakterler ve metin seslendirme gibi uygulamalara odak -\nlanır. Kullanıcılar, yazılı içerikleri insan benzeri konuşmalarla \nseslendirebilir, dijital avatarlar ve yapay zekâ destekli içerikler \noluşturabilirler. Platform, özellikle eğitim, müşteri hizmetleri \nve medya üretiminde kullanılır. Kullanıcılar sıfırdan bir video \noluşturarak veya PPT şablonları, metin, makaleler veya URL'ler \ngibi içerikleri videolara dönüştürmek için AI araçlarını kullana -\nrak hızlı bir şekilde yeni bir projeye başlayabilirler. Yapay zekâ \navatarlarını seçme, şablon uygulama ve videoları çeşitli yaratıcı \nöğelerle kişiselleştirme seçenekleriyle özelleştirme oldukça \nbasittir. Platform 80'den fazla dili ve 100'den fazla gerçeğe \nyakın yapay zekâ sesini destekliyor ve bu da onu küresel içerik \noluşturmak için ideal kılıyor. \nÖzellikleri\n ¬ Sanal karakter oluşturma ve animasyon.\n ¬ Kullanıcı dostu arayüz ve çoklu dil desteği.\n ¬ Özel Avatarlar: Kullanıcılar bir akıllı telefon veya web ka -\nmerası kullanarak kişiselleştirilmiş avatarlar oluşturarak \nüretim süresini ve maliyetini azaltabilirler.\n ¬ Yapay Zekâ Destekli Video Oluşturma: DeepBrain AI, \nkullanıcıların gerçekçi AI avatarları ve doğal metinden \nkonuşmaya sahip metinlerden hızlı bir şekilde videolar \noluşturmasına olanak tanır.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n222"}, {"page": 223, "text": "Eğitimde Kullanımı\nEğitim videoları, interaktif öğrenme materyalleri ve sanal öğ -\nretmen avatarları oluşturmak için kullanılabilir. Öğrenciler için \ndinamik ve etkileşimli öğrenme ortamları sağlar.\nNasıl Kullanılır?\n1. Web sitesine gidin: DeepBrain AI’ye kaydolun.\n2. Metin veya senaryo yükleyin: Seslendirme veya avatar \niçin içerik girin.\n3. Karakter ve ses seçin: Yapay zekâ karakterlerini ve ses \ntonunu belirleyin.\n4. Sonucu indirin: Videoyu veya ses dosyasını projenizde \nkullanın.Eğitimde Kullanımı: \nHeyGen, öğretmenlerin ders anlatımlarını, rehber videoları \nveya eğitim materyallerini video formatında oluşturmalarını \nsağlar. Metin tabanlı ders içeriklerini avatarların konuşmasıyla \nvideo hâline getirerek, öğrencilerin dikkatini çekebilir ve dersleri \ndaha etkileyici hâle getirebilir. Öğrenciler de projelerini video \nsunumlarına dönüştürebilir, böylece metin tabanlı bilgileri daha \ngörsel bir şekilde sunabilirler.\nHeyGen Nasıl Kullanılır?\n1. Web sitesine gir:\n »∂ heygen.com adresine gidin \n2. Hesap oluştur veya giriş yap (“Sign up for free” ile baş -\nlayın).\n3. Video türünü seçin:\n »\"How-To\", \"Explainer\", \"Marketing\" gibi hazır şablonlardan \nbirini seçebilir veya sıfırdan başlayabilirsiniz \n4. Metninizi girin:\n »Videoda anlatılacak script’i yazın veya yapıştırın.\n5. Avatar & ses seçin:\n »250+ AI avatar arasından birini seçin.\n »Uygun ses, dil ve ton ayarlarını yapın \n6. Görsel ve medya ekleyin:\n »Slayt görüntüleri, ekran görüntüleri, ikonlar ve animas -\nyonlar ekleyerek videoyu zenginleştirin \n7. Düzenle ve önizle:\n »Metin, renk, font, geçişler ve altyazıyı kontrol edip dü -\nzenleyin .HeyGen:\nTanım: HeyGen, yapay zekâ destekli bir video oluşturma platfor -\nmudur. Kullanıcılar, metin tabanlı içerikleri, gerçekçi avatarlar \nve seslendirmeler kullanarak video formatına dönüştürebilirler. \nHeyGen, kullanıcıların sadece metin girmesiyle, avatarların bu \nmetni konuşarak sunmasına olanak tanır. Bu araç, profesyonel \neğitim videoları, tanıtımlar ve sunumlar hazırlamak için idealdir. \nÖzellikle hızlı video prodüksiyonuna ihtiyaç duyan kullanıcılar \niçin zaman kazandıran bir platformdur.\nTemel Özellikler:\n ¬ Yapay zekâ destekli avatarlar ile video oluşturma.\n ¬ Metin tabanlı içerikleri video formatına dönüştürme.\n ¬ Farklı dillerde seslendirme ve konuşma animasyonu.\n ¬ Kişiselleştirilebilir avatarlar, arka planlar ve grafikler.\n223\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 224, "text": "8. Videoyu oluştur (Render):\n »\"Create Video\" ya da benzeri düğmeye tıklayın.\n »Kullanıma bağlı olarak dakika içinde video hazır olur \n9. İndir ve paylaş:\n »Videoyu MP4 formatında indirin ya da doğrudan sosyal \nmedya, e-posta veya web için paylaşın.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: HeyGen, öğretmenlerin ders anlatımlarını vi -\ndeo formatında sunmalarını sağlar. Ders içerikleri avatarlar \naracılığıyla sunulduğunda, öğrencilerin dikkatini çekmek \nve bilgiyi daha etkili bir şekilde iletmek mümkündür. Ay -\nrıca, rehber videolar ve eğitim materyalleri hazırlanırken \nöğretmenler için zaman kazandırıcıdır.\n ¬ Öğrenciler: Öğrenciler, projeleri ve sunumları için Hey -\nGen’i kullanarak metin tabanlı bilgilerini video sunumlarına \ndönüştürebilirler. Görsel ve işitsel unsurların eklenmesi, \nbilgilerin daha kolay anlaşılmasını sağlar. Avatarların kulla -\nnımı, sunumları daha ilgi çekici ve profesyonel hâle getirir.Temel Özellikleri\n ¬ Dijital içerik yönetimi. BasedLabs, görüntüleri AI tekno -\nlojisiyle videolara dönüştürür.\n ¬ Yapay zekâ destekli platformlar. Özellikler arasında AI Video, \nFaceswap ve Image Upscaler araçları bulunur.\n ¬ Veri analizi ve yazılım geliştirme araçları.\nEğitimde Kullanımı\nTeknoloji ve yazılım geliştirme derslerinde öğrenciler, Based -\nLabs’in yapay zekâ araçlarını kullanarak pratik projeler ge -\nliştirebilir.\nNasıl Kullanılır?\n1. Web Sitesine Gidin: BasedLabs platformuna kaydolun.\n2. Projeyi Seçin: İlgili yazılım veya yapay zekâ aracını seçin.\n3. Kullanın: Araçları projelerde kullanarak analiz edin veya \niçerik oluşturun.\nBasedLabs:\nTanım: genellikle yazılım, teknoloji ve yapay zekâ alanlarında \nprojeler geliştiren bir teknoloji şirketidir. Ürün ve hizmetleri, \ngenellikle kullanıcıların dijital içerik üretme ve yönetme sü -\nreçlerini kolaylaştırmak amacıyla tasarlanmıştır. BasedLabs, \nyapay zekâ araçları, veri analizi platformları ve gelişmiş teknoloji \nçözümleri sunarak farklı sektörlerde inovatif çözümler üretir. \nStatik görüntüleri kolaylıkla canlı videolara dönüştürerek video \noluşturmada devrim yaratıyor. İçerik oluşturmayı zahmetsiz \nve eğlenceli hâle getiren yapay zekâ araçlarıyla doludur; ben -\nzersiz videolar veya memlerle iz bırakmak isteyen herkes için \nmükemmeldir.\nPipio: \nTanım: Yapay zekâ destekli video oluşturma platformudur. \nKullanıcılar, metin tabanlı girdilerden profesyonel videolar \nüretebilir. Pipio, özellikle eğitim videoları, sunumlar ve içerik \npazarlama projelerinde tercih edilir. Avatarlar ve yapay zekâ \nile insan benzeri videolar oluşturulmasına imkân tanır. \nTemel Özellikleri\n ¬ Yapay zekâ destekli avatarlar. 140+ Yapay Zekâ Sesi ve \n60'tan fazla Yapay Zekâ Oluşturulmuş Avatar sunmaktadır. \n ¬ Metin tabanlı video üretimi.\n ¬ Farklı dillerde ve aksanlarda video oluşturma.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n224"}, {"page": 225, "text": "Eğitimde Kullanımı\nEğitim videoları ve e-öğrenme içerikleri için kullanılarak öğ -\nretmenlerin ve öğrencilerin etkili video projeleri oluşturmasına \nolanak tanır.\nNasıl Kullanılır?\n1. Web sitesine gidin: Pipio’ya kaydolun.\n2. Metni girin: Video oluşturmak için senaryoyu yazın.\n3. Avatar ve dil seçin: Metni okuyacak avatar ve dili seçin.\n4. Videoyu oluşturun ve indirin: Tamamlanan videoyu indirip \nkullanın.Eğitimde Kullanımı\nEğitim videoları ve sanal sunumlar için etkili bir araçtır. Öğren -\nciler ve öğretmenler, hızlıca eğitim materyalleri oluşturabilirler.\nNasıl Kullanılır?\n1. Kayıt Olun: Colossyan platformuna giriş yapın.\n2. Metni Girin: Videoda kullanılacak senaryoyu yazın.\n3. Avatar ve Dil Seçin: Videoda konuşacak avatarı ve dili \nbelirleyin.\n4. Videoyu Oluşturun ve İndirin: Videonuzu oluşturun ve indirin.\nColossyan: \nTanım: Yapay zekâ destekli bir video oluşturma platformudur. \nKullanıcıların metinlerden insan benzeri avatarlar ve profesyonel \nvideolar oluşturmasını sağlar. Bu video oluşturucu, çeşitli ava -\ntarlar arasından seçim yapmanızı ve avatara bir komut dosyası \nsağlamanızı sağlar. İlk videonuz oluşturulduktan sonra, bir \ndüğmeye dokunarak videonuzun tamamını otomatik çevirerek \nfarklı bölgeleri hedefleyebilirsiniz. Aksanları ve kıyafetleri kolayca \ndeğiştirebilirsiniz. 120'den fazla dil arasından seçim yapın. \nEğitim, pazarlama, sunumlar ve içerik üretimi için kullanılan \nbu platform, avatarların gerçekçi konuşmalar yapmasına \nolanak tanır.\nTemel Özellikleri\n ¬ Yapay zekâ destekli avatarlar.\n ¬ Çoklu dil ve aksan seçenekleri ve AI videolarınıza Altyazı \nekleme kolaylığı\n ¬ Hızlı video prodüksiyonu Videoları farklı vurgularla kişi -\nselleştirin.\n ¬ Profesyonel video şablonları.Fliki:\nTanım: Fliki, yapay zekâ destekli bir video ve ses oluşturma \nplatformudur. Kullanıcıların metinlerini yapay zekâ destekli \nseslendirmeler ve görsel içeriklerle videoya dönüştürmelerine \nolanak tanır. Fliki, çeşitli dillerde doğal seslendirmeler ve sesli \nanlatımlar sunarak, profesyonel kalitede videolar oluşturmayı \nkolaylaştırır. Platform, eğitim, tanıtım ve pazarlama videoları için \nidealdir ve zaman alan prodüksiyon süreçlerini otomatikleştirir.\nTemel Özellikler:\n ¬ Yapay zekâ destekli seslendirme ve video oluşturma.\n ¬ Metinleri sesli anlatıma ve videolara dönüştürme.\n ¬ Farklı dillerde ve aksanlarda doğal seslendirme seçenekleri.\n ¬ Geniş medya kütüphanesi: görseller, videolar ve müzik \nseçenekleri.\nEğitimde Kullanımı: \nFliki, eğitimde öğretmenlerin ders materyallerini ve eğitim \niçeriklerini video formatında sunmalarına olanak tanır. Öğret -\nmenler, metin tabanlı içerikleri sesli anlatıma dönüştürerek \n225\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 226, "text": "öğrencilerin daha etkileşimli öğrenmesini sağlayabilir. Aynı \nzamanda öğrenciler, projelerini ve ödevlerini sesli ve görsel \niçeriklerle zenginleştirilmiş videolar halinde sunabilirler.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Fliki’nin web sitesine gidin: Fliki\n ¬ Metin Girişi Yapma: Videonuzda veya sesli anlatımda \nkullanmak istediğiniz metni yazın.\n ¬ Ses ve Görselleri Seçme: Farklı seslendirme seçenek -\nlerinden birini seçin. Ayrıca videonuza uygun görselleri, \nvideoları ve müzikleri ekleyin.\n ¬ Videoyu Düzenleme: Metinleri seslendirmeye ekleyin ve \nvideonuzu düzenleyin. Fliki, metni sesli anlatım ve gör -\nsellerle birleştirir.\n ¬ Videoyu Oluşturma ve İndirme: Videonuzu tamamladıktan \nsonra indirin veya çevrim içi olarak paylaşın.\n ¬ Web Sayfası: Fliki\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Fliki, öğretmenlerin ders materyallerini \ndaha ilgi çekici ve dinamik hâle getirmelerine yardımcı \nolur. Metin tabanlı içerikleri sesli anlatıma dönüştürerek \nöğrencilerin işitsel öğrenme stillerine hitap eder. Uzaktan \neğitimde, video dersler ve rehber videolar oluşturmak için \netkili bir araçtır.\n ¬ Öğrenciler: Fliki, öğrencilerin projelerini ve ödevlerini \ndaha yaratıcı bir şekilde sunmalarına olanak tanır. Sesli \nanlatımlar ve görsel içeriklerle zenginleştirilmiş videolar \noluşturabilirler, bu da projelerinin etkisini artırır. Ayrıca, \ndil öğrenimi gibi işitsel beceriler gerektiren dersler için \nde kullanılabilir.Lumen5: \nTanım: Lumen5, yapay zekâ destekli bir video oluşturma plat -\nformudur. Kullanıcıların metin tabanlı içeriklerini hızlıca video -\nlara dönüştürmelerini sağlar. Lumen5, makaleler, blog yazıları, \nsosyal medya gönderileri veya diğer metinleri analiz ederek \nbunlardan otomatik olarak profesyonel videolar oluşturur. Kul -\nlanıcı dostu arayüzü sayesinde videoları kolayca düzenleyebilir \nve yüksek kaliteli içerikler üretebilirsiniz. Özellikle pazarlama, \neğitim, içerik yaratımı ve sosyal medya için ideal bir araçtır.\nTemel Özellikler:\n ¬ Yapay zekâ ile metinlerden video oluşturma.\n ¬ Geniş şablon ve medya kütüphanesi.\n ¬ Sürükle-bırak arayüz ile kolay video düzenleme.\n ¬ Sosyal medya platformlarına uyumlu video formatları.\n ¬ Metni otomatik olarak özetleyen ve videoya çeviren yapay \nzekâ.\nEğitimde Lumen5'in Kullanımı\nLumen5, eğitimde öğretmenlerin ve öğrencilerin ders mater -\nyallerini, sunumlarını ve projelerini video formatına dönüştür -\nmelerini sağlar. Öğretmenler, makaleleri, ders notlarını veya \nrehber içeriklerini videoya dönüştürerek daha etkili bir eğitim \nmateryali oluşturabilirler. Öğrenciler ise projeleri ve ödevleri \niçin videolar hazırlayabilirler.\nNasıl Kullanılır?\n1. Web Sitesine Erişim: Lumen5'in web sitesine gidin: Lumen5\n2. Metin Ekleme: Makale, blog yazısı, ders notu gibi metin \ntabanlı içeriklerinizi ekleyin. Lumen5, bu içerikleri analiz \nederek otomatik bir video oluşturur.\n3. Şablon ve Görselleri Seçme: Lumen5'in geniş medya \nkütüphanesinden görseller, videolar ve müzikler seçerek \nvideonuzu zenginleştirin.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n226"}, {"page": 227, "text": "4. Videoyu Düzenleme: Sürükle-bırak arayüzü ile slaytları \ndüzenleyin, metinleri ve görselleri yerleştirin.\n5. Videoyu Paylaşma veya İndirme: Videonuzu tamamla -\ndıktan sonra sosyal medya platformlarında paylaşın veya \nbilgisayarınıza indirin.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Öğretmenler, Lumen5 ile ders notlarını, blog \nyazılarını veya makaleleri videoya dönüştürebilirler. Bu \nvideoları uzaktan eğitimde veya sınıf içi derslerde kullana -\nrak öğrencilerin daha etkili bir şekilde bilgiye ulaşmalarını \nsağlayabilirler.\n ¬ Öğrenciler: Öğrenciler, projelerini ve araştırmalarını vi -\ndeo formatında sunarak yaratıcı içerikler oluşturabilirler. \nLumen5, öğrencilere metin tabanlı bilgileri videolara dö -\nnüştürme ve daha ilgi çekici, görsel olarak zengin projeler \nhazırlama fırsatı sunar. Özellikle grup projelerinde veya \nbireysel araştırma sunumlarında Lumen5, öğrencilerin \nbilgilerini daha etkili ve anlaşılır bir şekilde sunmalarına \nyardımcı olur.\nEğitimde Lumen5'in Avantajları\n1. Zaman Tasarrufu: Öğretmenler ve öğrenciler, metinleri \notomatik olarak videoya dönüştürebildikleri için içerik \noluşturma sürecinde büyük zaman tasarrufu sağlarlar.\n2. Daha Etkileşimli Ders Materyalleri: Metinleri videoya çevir -\nme yeteneği sayesinde ders materyalleri daha dinamik ve \netkileşimli hâle gelir, bu da öğrencilerin dikkatini çekmeye \nyardımcı olur.\n3. Yaratıcı Sunumlar: Öğrenciler, projelerini ve araştırmalarını \nvideolar aracılığıyla sunarak, bilgilerini daha yaratıcı bir \nşekilde ifade edebilirler.\n4. Kolay Kullanım: Sürükle-bırak arayüzü ve hazır şablonları \nsayesinde, teknik bilgiye sahip olmayan kullanıcılar bile \nprofesyonel videolar oluşturabilir.\n5. Geniş Medya Kütüphanesi: Lumen5, kullanıcılarına geniş bir \nmedya kütüphanesi sunar; görseller, videolar ve müzikler \niçerikleri zenginleştirir.Animoto:\nTanım: Animoto, kullanıcıların hızlı ve kolay bir şekilde profes -\nyonel videolar oluşturmasına olanak tanıyan bir video prodük -\nsiyon platformudur. Animoto, önceden hazırlanmış şablonlar, \nsürükle-bırak düzenleme araçları ve geniş bir medya kütüpha -\nnesi sunarak, kullanıcıların sosyal medya, eğitim, pazarlama \nve diğer alanlarda videolar hazırlamalarını kolaylaştırır. Video \noluşturma sürecini basitleştirir ve teknik bilgiye ihtiyaç duy -\nmadan etkileyici içerikler yaratmayı sağlar.\nTemel Özellikler:\n ¬ Sürükle-bırak arayüz ile kolay video düzenleme.\n ¬ Geniş şablon ve medya kütüphanesi (görseller, müzikler, \nvideolar).\n ¬ Video içerikleri sosyal medya platformları için optimize \nedilmiş formatlarda sunma.\n ¬ Kısa sürede profesyonel kalitede videolar üretme imkanı.\n ¬ Eğitim, pazarlama, tanıtım ve sosyal medya için hazır \nşablonlar.\nEğitimde Animoto'nun Kullanımı\nAnimoto, eğitimde öğretmenler ve öğrenciler için etkili bir \nvideo oluşturma aracı olarak kullanılabilir. Öğretmenler, ders \nanlatımları, eğitim videoları veya sınıf içi projeler için görsel \niçerikler hazırlayabilirler. Öğrenciler ise projelerini ve ödevlerini \nvideo formatında sunarak bilgilerini daha yaratıcı bir şekilde \nifade edebilirler. Animoto, sınıf içi veya uzaktan eğitimde video \ntabanlı içeriklerin hazırlanmasını kolaylaştırır.\nNasıl Kullanılır?\n1. Web Sitesine Erişim: Animoto'nun web sitesine gidin: \nAnimoto\n2. Şablon Seçimi: Farklı video formatları ve kategorileri için \nhazır şablonlardan birini seçin (eğitim, iş, sosyal medya vb.).\n227\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 228, "text": "3. İçerik Yükleme: Videonuzda kullanmak istediğiniz görsel -\nleri, videoları ve metinleri ekleyin. Animoto, bunları video \nhâline getirir.\n4. Özelleştirme: Sürükle-bırak düzenleme araçları ile slaytları \nve içerikleri düzenleyin. Müzik, metin ve grafik ekleyerek \nvideonuzu zenginleştirin.\n5. Videoyu Paylaşma veya İndirme: Videonuzu tamamla -\ndıktan sonra sosyal medya platformlarında paylaşabilir \nveya indirme seçeneklerini kullanabilirsiniz.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Animoto, öğretmenlerin ders anlatımlarını \nveya eğitim içeriklerini video formatında hazırlamalarına \nyardımcı olur. Videolu dersler, rehber videolar veya proje \ntanıtımları gibi içerikler üretmek için ideal bir platformdur.\n ¬ Öğrenciler: Öğrenciler, projeleri ve araştırmalarını Animoto \nyardımıyla videoya dönüştürebilirler. Görsel açıdan zengin \niçerikler oluşturabilir ve bilgilerini daha etkili bir şekilde \nsunabilirler.\nAvantajlar:\n1. Kolay Kullanım: Teknik bilgiye ihtiyaç duymadan hızlı ve \nkolay video oluşturma imkânı.\n2. Geniş Şablon Seçenekleri: Profesyonel görünümlü videolar \noluşturmak için hazır şablonlar sunar.\n3. Çok Yönlülük: Eğitim, sosyal medya, pazarlama ve diğer \nalanlar için çeşitli şablon ve formatlarda içerik oluşturma \nimkânı.\n4. Yaratıcılığı Destekleme: Öğrencilerin ve öğretmenlerin \nyaratıcılıklarını sergileyebileceği dinamik video içerikleri \noluşturmasına olanak tanır.Elai.io\nTanım: Yapay zekâ destekli bir video oluşturma platformudur. \nKullanıcıların metinlerden otomatik olarak videolar oluşturma -\nsına olanak tanır. İçerik üreticileri, eğitimciler ve pazarlamacılar \niçin tasarlanmış olup, profesyonel görünümlü videolar üretmeyi \nhızlandırır ve kolaylaştırır. Platformu, yalnızca üç tıklamayla \nbir makaleye veya bir blog gönderisine bağlantıdan profes -\nyonel bir video oluşturmak için kullanabilirsiniz. Kitaplıktan \nşablonlardan birini seçmeden önce bir blog gönderisi URL'sini \nveya HTML metnini kopyalayıp yapıştırırsınız. Geriye sadece \nvideoyu incelemek, gerekli değişiklikleri yapmak ve render edip \nindirmek kalıyor. \nTemel Özellikleri\n ¬ Yapay zekâ ile insan benzeri konuşmalar.\n ¬ Farklı diller ve aksan seçenekleri. 60'tan fazla dil ve 25'ten \nfazla avatar\n ¬ Metin tabanlı video üretimi.\n ¬ Kullanıcı dostu şablonlar.\nEğitimde Kullanımı\nEğitim materyalleri, e-öğrenme içerikleri ve sanal sunumlar \noluşturmak için kullanılır. Öğretmenler ve öğrenciler ders an -\nlatımlarını videolarla destekleyebilirler.\nNasıl Kullanılır?\n1. Kayıt olun: Elai.io platformuna kaydolun.\n2. Metni girin: Videoda kullanılacak metni ekleyin.\n3. Avatar ve ses seçin: Metni okuyacak avatarı ve ses tonunu \nbelirleyin.\n4. Videoyu oluşturun ve indirin: Videonuzu oluşturun ve \nprojelerinizde kullanın.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n228"}, {"page": 229, "text": "6.6. Oyunlaştırma Araçları\nOyunlaştırma araçları, öğrenme süreçlerini daha ilgi çekici, \neğlenceli ve motive edici hâle getirmek için kullanılan dijital \nplatformlardır. Bu araçlar, oyun mekaniklerini kullanarak ödül -\nlendirme sistemleri, görevler, puanlama, rozetler ve liderlik \ntabloları gibi unsurlarla öğrenmeyi destekler.\nEğitimde oyunlaştırma, öğrencilerin derse aktif katılımını artırır, \nmotivasyonlarını yükseltir ve bilgiyi kalıcı hâle getirir. Özel -\nlikle çevrim içi öğrenme ortamlarında, öğrencilerin öğrenme \nsürecinde daha fazla etkileşim kurmasını sağlayarak başarı \noranlarını yükseltir.\nBu tür yapay zekâ destekli araçlar, öğretmenlerin kişiselleş -\ntirilmiş öğrenme yolları oluşturmasına, öğrenci ilerlemesini \ntakip etmesine ve dinamik geri bildirim sunmasına yardımcı \nolur. Aynı zamanda, öğrencilerin problem çözme, takım ça -\nlışması ve eleştirel düşünme gibi becerilerini geliştirmelerine \nolanak tanır.\nOyunlaştırma araçları, dijital sınavlar, interaktif ders materyal -\nleri, hikâye tabanlı öğrenme ve sanal simülasyonlar gibi çeşitli \nalanlarda uygulanarak eğitimde daha katılımcı ve verimli bir \nortam oluşturulmasını sağlar.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla deği -\nşebilir. Güncellenen ve yeni eklenen araçlar için üretici web \nsitelerinden bilgi alabilirsiniz. ¬ Özelleştirilebilir Çıktılar: Kullanıcılar, oluşturmak istedik -\nleri ortam türleri hakkında geri bildirim sağlayabilir ve \nPromethean AI, tasarım sürecini buna göre ayarlar. Bu, \nsanatçıların AI'nın verimliliğinden yararlanırken yaratıcı \nkontrolü elinde tutmasına olanak tanır.\n ¬ İşbirliği: Araç, tasarımcılar ve yapay zekâ arasında işbir -\nliğini destekler ve oluşturulan ortamların aşamalı olarak \niyileştirilmesine ve rafine edilmesine olanak tanır. Bu, \nbüyük ölçekli projeler üzerinde çalışan ekipler için güçlü \nbir araç hâline getirir.\n ¬ Mevcut Araçlarla Entegrasyon: Promethean AI, popüler \noyun geliştirme motorları ve tasarım yazılımları ile en -\ntegre olabilir, bu da onu oyun tasarımcılarının mevcut iş \nakışlarına eklenebilecek çok yönlü bir araç hâline getirir.\nEğitimde Kullanımı:\n ¬ Oyun Tasarımı Eğitimi: Promethean AI, eğitim ortamlarında \nöğrencilere video oyunlarında ortam tasarımını öğretmek \niçin kullanılabilir. Sürecin bir kısmını otomatikleştiren bir \naraç sağlayarak, öğrenciler oyun tasarımının daha geniş \nyönlerini öğrenmeye odaklanabilirler.\n ¬ Yaratıcı Sanatlar Programları: Yaratıcı sanat programların -\ndaki öğrenciler, Promethean AI'yi kullanarak sanal dünya \nyaratma deneyleri yapabilir ve yapay zekânın sanatsal \nprojelerdeki potansiyelini keşfedebilirler.\n ¬ Etkileşimli Öğrenme Ortamları: Eğitimciler, Promethean \nAI'yi kullanarak farklı ders konularını destekleyen etkileşimli \nsanal ortamlar oluşturabilirler.\nNasıl Kullanılır:\n1. Tanımlamalar Yapın: Yapay zekâya yaratmak istediğiniz \nortamı tarif edin.\n2. İçeriği Düzenleyin: Yapay zekâ tarafından oluşturulan \nortamı düzenleyin ve özelleştirin.\n3. Sahneyi İnceleyin ve Geliştirin: Yapay zekâ tarafından \noluşturulan sahneyi inceleyip geliştirmeye devam edin.\nPromethean AI:\nTanım: Özellikle video oyunu geliştirme bağlamında sanal or -\ntamların oluşturulmasına yardımcı olan gelişmiş bir s zekâ \naracıdır. Sanatçılar ve tasarımcılar için ayrıntılı 3D dünyaların \ndaha verimli bir şekilde oluşturulmasını sağlar, çünkü ortam \ntasarım sürecinin bir kısmını otomatikleştirir. \nTemel Özellikler:\n ¬ Ortam Oluşturma: Promethean AI, kullanıcı tarafından \nsağlanan basit metin açıklamalarına dayanarak karmaşık \n3D ortamlar oluşturabilir. Bu, elle tasarlamak için önemli \nölçüde zaman alacak ayrıntılı sahnelerin hızla oluşturul -\nmasına olanak tanır.\n229\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 230, "text": "Scenario: \nTanım: Üretken yapay zekâ aracıdır ve özellikle oyun geliştir -\nme, simülasyonlar ve etkileşimli hikâye anlatımı alanlarında \nkullanılır. Bu araç, kullanıcıların belirli senaryoları ve ortamları \ntanımlamalarına, karakterlerin ve olayların nasıl etkileşime \ngirdiğini belirlemelerine yardımcı olur. Senaryo tasarımı ve \ngeliştirmede kullanılan bu araç, hikâye akışını ve olay örgüsünü \noluşturmayı kolaylaştırır. \nTemel Özellikler:\n ¬ Senaryo Geliştirme:  Scenario, kullanıcıların belirli temalar, \nolaylar ve karakterlerle etkileşimli hikâyeler veya simü -\nlasyonlar geliştirmelerine olanak tanır.\n ¬ Karakter Etkileşimi: Karakterlerin birbirleriyle ve ortamla \nnasıl etkileşimde bulunacağını belirlemek için senaryolar \noluşturur. Bu, oyunlarda ve simülasyonlarda gerçekçi ve \ndinamik hikâye akışlarını destekler.\n ¬ Otomatik Senaryo Üretimi: Belirli bir giriş bilgisine daya -\nnarak, yapay zekâ çeşitli senaryo seçenekleri oluşturabilir, \nbu da kullanıcılara daha geniş bir yaratıcı özgürlük sağlar.\nEğitimde Kullanımı:\n ¬ Oyun Tasarımı ve Geliştirme Eğitimi: Scenario, oyun ta -\nsarımı eğitiminde kullanılarak öğrencilere oyun içi se -\nnaryolar ve hikâye akışları oluşturma konusunda pratik \nyapma imkanı sunar.\n ¬ Etkileşimli Hikâye Anlatımı: Eğitimciler, öğrencilerin ya -\nratıcılıklarını geliştirmek ve hikâye anlatımı becerilerini \nartırmak için bu aracı kullanabilirler. Öğrenciler, kendi \nsenaryolarını oluşturabilir ve karakterlerin hikâye içinde \nnasıl geliştiğini gözlemleyebilirler.\n ¬ Simülasyonlar ve Eğitim Oyunları: Senaryolar, eğitim amaçlı \nsimülasyonlar ve oyunlar oluşturmak için kullanılabilir, bu \nda karmaşık konuları öğretmek için etkili bir yöntem sağlar.Nasıl Kullanılır:\n1. Kayıt olun: Scenario platformuna giriş yapın.\n2. Yaratıcı brief girin: İstediğiniz dünya veya karakterle ilgili \nbilgileri paylaşın.\n3. Yapay zekâ sonuçlarını düzenleyin:  Yaratılan içeriği gözden \ngeçirin ve özelleştirin.\n4. İndirin ve kullanın: Sonuçları projelerinizde kullanın.\nLudo.ai: \nTanım: oyun geliştirme sürecinde geliştiricilere yardımcı olmak \niçin tasarlanmış yapay zekâ destekli bir platformdur. Bu araç, \noyun fikirleri oluşturma, karakter tasarımı, hikâye yaratma \nve oyun mekanikleri geliştirme gibi görevlerde kullanılır. Hem \nbağımsız geliştiriciler hem de büyük oyun stüdyoları için fay -\ndalıdır, çünkü beyin fırtınası ve prototip oluşturma aşamalarını \nhızlandırır. \nTemel Özellikler:\n ¬ Oyun Konsepti Oluşturma: Ludo.ai, geliştiricilerin anahtar \nkelimeler veya temalar girmesine olanak tanır ve bu girdi -\nlere dayalı olarak yeni oyun fikirleri üretir. Bu özellik, oyun \ntasarımının erken aşamalarında beyin fırtınası yaparken \noldukça faydalıdır.\n ¬ Karakter ve Hikâye Yaratma: Platform, detaylı karakter \nprofilleri, arka plan hikâyeleri ve oyun içi hikâyeler oluş -\nturma konusunda yardımcı olur. Bu, oyunlara güçlü bir \nanlatı temeli kazandırır.\n ¬ Oyun Mekanikleri Tasarımı: Ludo.ai, oyunun genel kon -\nseptiyle uyumlu oyun mekanikleri tasarlama konusunda \nda öneriler sunar, bu da geliştiricilerin benzersiz ve ilgi \nçekici oyun deneyimleri tasarlamalarına yardımcı olur.\n ¬ Fikir Geliştirme: Araç, sadece fikirler oluşturmakla kal -\nmaz, aynı zamanda bu fikirlerin iterasyonlarını yaparak, \ngeliştiricilerin son ürünü daha iyi bir şekilde şekillendir -\nmesini sağlar.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n230"}, {"page": 231, "text": "Eğitimde Kullanımı:\n ¬ Oyun Tasarımı Eğitimi: Ludo.ai, oyun tasarımı kurslarında \nöğrencilerin oyun fikirleri üretmelerine ve projelerini geliş -\ntirmelerine yardımcı olabilir. Bu, öğrencilerin ilk aşamalarda \nkonsept geliştirmeye odaklanmalarını sağlar.\n ¬ İşbirlikçi Projeler: Platform, grup projelerinde öğrencilerin \nortak çalışarak oyun fikirlerini geliştirmeleri için bir alan \nsunar, bu da işbirliğini ve yaratıcı süreci kolaylaştırır.Eğitimde Kullanımı:\n ¬ Dijital Sanat Eğitimi: Rosebud AI, dijital sanat derslerinde \nöğrencilerin sanatsal projeler üretmelerine yardımcı ola -\nbilir. Öğrenciler, bu araç sayesinde farklı sanat tarzlarını \ndeneyebilir ve dijital içerikler oluşturabilirler.\n ¬ Oyun Tasarımı: Oyun tasarımı derslerinde, öğrenciler \nkarakterler ve oyun içi grafikler yaratmak için Rosebud \nAI'yi kullanabilirler. Bu, oyun projelerinin görsel yönünü \ngeliştirmede büyük bir katkı sağlar.\n ¬ Pazarlama ve Reklamcılık Dersleri: Pazarlama ve reklamcı -\nlık alanında eğitim alan öğrenciler, Rosebud AI'yi kullanarak \nhızlı ve etkili bir şekilde reklam görselleri oluşturabilirler. \nBu, öğrencilerin yaratıcı kampanyalar geliştirmelerine yar -\ndımcı olur ve profesyonel dünyaya hazırlanmalarını sağlar.\n ¬ Sanat ve Tasarım Projeleri: Öğrenciler, sanat ve tasarım \nprojelerinde Rosebud AI'yi kullanarak yaratıcı içerikler \noluşturabilirler. Araç, özellikle dijital illüstrasyon ve grafik \ntasarım derslerinde kullanılabilir.\nNasıl Kullanılır?\n1. Kayıt olun: https://rosebud.ai/ platformuna girin ve kayıt \noluşturun.\n2. Oyun fikri girin: Üretmek istediğiniz oyun türünü tanımlayın.\n3. İçeriği geliştirin: Yapay zekâ ile karakterler, senaryolar ve \noyun dünyaları oluşturun.\n4. Sonuçları indirin: Oyun projenizde kullanmak üzere ta -\nsarımları ve fikirleri alın.\nRosebud AI:\nTanım: Yapay zekâ destekli bir platform olup, özellikle dijital \nsanat ve grafik tasarım alanlarında kullanıcılara yaratıcı içerikler \noluşturma konusunda yardımcı olur. Bu araç, kullanıcıların \nsanatsal projeler, reklam materyalleri ve dijital içerikler için \nhızlı ve etkili bir şekilde görsel üretmelerine olanak tanır.\nTemel Özellikler:\n ¬ Görsel Üretimi: Rosebud AI, kullanıcılara fotoğraf, illüst -\nrasyon, ve grafik gibi çeşitli görsel içerikler üretme imkanı \nsunar. Kullanıcılar, belirli parametreler ve istekler doğrul -\ntusunda özelleştirilmiş görseller oluşturabilirler.\n ¬ Stil Transferi: Bu özellik, kullanıcıların mevcut bir görün -\ntüyü başka bir sanat tarzında yeniden yaratmasına olanak \ntanır. Örneğin, bir fotoğrafı ünlü bir ressamın tarzında \nyeniden işleyebilirsiniz.\n ¬ Karakter ve Avatar Yaratma: Rosebud AI, oyun tasarımı, \nsosyal medya içerikleri veya sanal gerçeklik projeleri için \nkarakterler ve avatarlar oluşturma konusunda yardımcı \nolabilir.\n ¬ Reklam ve Pazarlama İçerikleri: Pazarlama profesyonel -\nleri, reklam kampanyaları için hızlı ve etkili görsel içerikler \nüretebilirler. Araç, yaratıcı süreçleri hızlandırır ve kaliteli \nsonuçlar sunar.Layer AI:\nTanım: Yapay zekâ destekli bir grafik ve tasarım platformudur. \nBu araç, kullanıcıların dijital tasarım süreçlerini hızlandırma -\nlarına ve daha verimli hâle getirmelerine yardımcı olur. Layer \nAI, özellikle grafik tasarımcılar, içerik üreticileri ve pazarlama \nprofesyonelleri için idealdir. \n231\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 232, "text": "Temel Özellikler:\n ¬ Otomatik Tasarım Önerileri: Layer AI, kullanıcıların be -\nlirlediği kriterlere göre otomatik olarak tasarım önerileri \nsunar. Bu sayede, yaratıcı süreçler hızlanır ve daha fazla \nfikir elde edilir.\n ¬ Stil Uygulama: Kullanıcılar, belirli bir stil veya tema için \ngörseller oluşturabilir ve Layer AI, bu stili otomatik olarak \ndiğer projelere de uygulayabilir.\n ¬ Görsel Düzenleme: Layer AI, kullanıcıların görseller üze -\nrinde hızlı ve etkili düzenlemeler yapmalarını sağlar. Renk \ndüzenleme, katman ekleme veya kaldırma gibi işlemler \nkolayca yapılabilir.\n ¬ Entegrasyon: Layer AI, diğer popüler tasarım yazılımları ve \naraçları ile entegre çalışabilir, bu da kullanıcıların mevcut \niş akışlarına sorunsuz bir şekilde eklenmesini sağlar.\nEğitimde Kullanımı:\n ¬ Grafik Tasarım Eğitimi: Layer AI, grafik tasarım öğrencileri \niçin güçlü bir araçtır. Öğrenciler, projelerinde hızlı ve etkili \ngörseller oluşturabilir, tasarım süreçlerini hızlandırabilirler.\n ¬ Dijital Pazarlama Dersleri: Pazarlama ve reklamcılık alanın -\nda eğitim gören öğrenciler, Layer AI'yi kullanarak yaratıcı \nkampanyalar ve görseller geliştirebilirler. Bu, öğrencilerin \nprofesyonel becerilerini geliştirmelerine yardımcı olur.\n ¬ Sanat ve Yaratıcı Projeler: Layer AI, sanat ve tasarım \nderslerinde öğrencilerin projelerini geliştirmelerine yar -\ndımcı olabilir. Öğrenciler, farklı stil ve temalarla denemeler \nyaparak yaratıcı becerilerini geliştirebilirler.tır. InWorld, kullanıcıların karakterlere belirli kişilik özellikleri, \nmotivasyonlar ve davranışlar ekleyerek, onlarla etkileşime gir -\nmelerini sağlar. Bu platform, oyun geliştirme, eğitim, hikâye \nanlatımı ve simülasyonlar gibi çeşitli alanlarda kullanılabilir. \nTemel Özellikler:\n ¬ Karakter Yaratma: InWorld, kullanıcıların metin tabanlı \ngirdilerle sanal karakterler oluşturmasına olanak tanır. \nBu karakterler, belirli bir hikâye veya oyun içinde kulla -\nnılabilecek kişilik özelliklerine ve davranışlara sahip olur.\n ¬ Etkileşimli Hikâye Anlatımı: Platform, karakterlerin et -\nkileşimli hikâyeler içinde doğal ve dinamik bir şekilde yer \nalmasını sağlar. Kullanıcılar, karakterlerin birbirleriyle ve \nortamla nasıl etkileşime girdiğini belirleyebilirler.\n ¬ Simülasyonlar: Eğitim ve öğretim amaçlı simülasyonlarda \nkullanılabilecek karakterler oluşturmak mümkündür. Bu \nsimülasyonlar, öğrencilerin belirli senaryoları deneyim -\nleyerek öğrenmelerine olanak tanır.\n ¬ Oyun Geliştirme: Oyun tasarımcıları, InWorld kullanarak \noyunları için zengin ve derin karakterler yaratabilirler. Bu \nkarakterler, oyunun hikâyesini daha çekici hâle getirir.\nEğitimde Kullanımı:\n ¬ Eğitim Simülasyonları: InWorld, eğitimde kullanılarak öğ -\nrencilerin belirli durumları deneyimlemeleri sağlanabilir. \nÖrneğin, tarih derslerinde tarihi figürlerle etkileşime giren \nsimülasyonlar oluşturulabilir.\n ¬ Yaratıcı Yazım ve Hikâye Anlatımı: Yaratıcı yazım derslerinde \nöğrenciler, InWorld kullanarak hikâyeleri için karakterler \noluşturabilir ve bu karakterlerle dinamik etkileşimler ge -\nliştirebilirler.\n ¬ Dijital Oyun Tasarımı: Oyun tasarımı ve geliştirme ders -\nlerinde, öğrenciler InWorld kullanarak oyunları için ka -\nrakterler tasarlayabilir ve bu karakterlerin oyun içindeki \nrollerini belirleyebilirler.\nInWorld:\nTanım: Yapay zekâ destekli bir platformdur ve özellikle sanal \nkarakterler oluşturma ve bu karakterlerin etkileşimli hikâyelerde \nveya oyunlarda kullanılmasını sağlama amacıyla tasarlanmış -\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n232"}, {"page": 233, "text": "Charisma:\nTanım: Yapay zekâ platformudur ve özellikle etkileşimli hikâye \nanlatımı, oyun geliştirme ve dijital eğlence projeleri için ta -\nsarlanmış bir araçtır. Charisma, kullanıcıların derin karakterler \noluşturmasına ve bu karakterlerin dinamik bir şekilde etkileşim -\nde bulunmasını sağlamasına olanak tanır. Bu platform, hikâye \nanlatıcılarına ve oyun geliştiricilere zengin ve kişiselleştirilmiş \ndeneyimler yaratma imkânı sunar.\nTemel Özellikler:\n ¬ Etkileşimli Karakterler: Charisma, kullanıcıların karmaşık \nve çok yönlü karakterler yaratmalarına olanak tanır. Bu \nkarakterler, belirli kişilik özelliklerine, motivasyonlara ve \nduygusal tepkilere sahip olabilir.\n ¬ Doğal Dil İşleme: Platform, doğal dil işleme (NLP) tekno -\nlojisi kullanarak, karakterlerin oyuncularla veya izleyicilerle \ngerçek zamanlı olarak etkileşimde bulunmasını sağlar. Bu, \ndaha doğal ve inandırıcı bir hikâye anlatımı deneyimi sunar.\n ¬ Hikâye Akışı Yönetimi: Charisma, kullanıcıların hikâye akı -\nşını kontrol etmelerini sağlar. Farklı karakterler arasındaki \netkileşimleri belirleyebilir ve hikâyenin gidişatını dinamik \nolarak yönetebilirsiniz.\n ¬ Çoklu Platform Desteği: Platform, farklı dijital platformlarla \nentegre çalışabilir, bu da Charisma'nın çeşitli projelerde \nkullanılabilmesini sağlar.\nEğitimde Kullanımı:\n ¬ Yaratıcı Yazım ve Hikâye Anlatımı: Charisma, yaratıcı yazım \nderslerinde öğrencilerin etkileşimli hikâyeler geliştirmesi -\nne yardımcı olabilir. Öğrenciler, hikâyeleri için karakterler \noluşturabilir ve bu karakterlerin nasıl etkileşimde bulu -\nnacağını belirleyebilirler.\n ¬ Oyun Tasarımı: Oyun geliştirme derslerinde, öğrenciler \nCharisma'yı kullanarak oyunları için karakterler yaratabilir \nve bu karakterlerin oyunun hikâyesini nasıl etkileyeceğini \ntasarlayabilirler. ¬ Eğitim Simülasyonları: Charisma, eğitimde simülasyonlar \noluşturmak için kullanılabilir. Öğrenciler, gerçek dünya \ndurumlarını simüle eden karakterlerle etkileşime girerek \nbelirli senaryoları öğrenebilirler.\nMesh:\nTanım: Yapay zekâ destekli içerik oluşturma ve tasarım plat -\nformudur. Bu platform, kullanıcıların çeşitli dijital projeler için \niçerik üretmelerine ve bu içerikleri hızlı ve etkili bir şekilde dü -\nzenlemelerine yardımcı olur. Meshy, özellikle pazarlama, grafik \ntasarım, içerik üretimi ve dijital medya alanlarında çalışan \nprofesyoneller için kullanışlıdır. \nTemel Özellikler:\n ¬ İçerik Oluşturma: Meshy, kullanıcıların sosyal medya gön -\nderileri, blog yazıları, video içerikleri ve diğer dijital medya \nprojeleri için içerik oluşturmasına olanak tanır. Kullanıcılar, \nbasit girişlerle profesyonel görünümlü içerikler üretebilirler.\n ¬ Tasarım Şablonları: Platform, kullanıcıların projelerini hız -\nla başlatmalarına yardımcı olacak çeşitli hazır tasarım \nşablonları sunar. Bu şablonlar, kişiselleştirilebilir ve farklı \nprojeler için kullanılabilir.\n ¬ Yapay Zekâ Destekli Düzenleme: Meshy, içeriklerin dü -\nzenlenmesi ve optimize edilmesi için yapay zekâ desteği \nsunar. Bu, içeriklerin hedef kitleye daha uygun ve etkili \nolmasını sağlar.\n ¬ Çoklu Platform Desteği: Meshy, oluşturulan içeriklerin \nçeşitli dijital platformlar için optimize edilmesini sağlar. \nBu, içeriklerin farklı sosyal medya ve web platformlarında \nsorunsuz bir şekilde paylaşılmasına olanak tanır.\nEğitimde Kullanımı:\n ¬ Dijital Pazarlama Eğitimi: Meshy, pazarlama ve reklamcılık \nderslerinde öğrencilerin dijital kampanyalar için hızlı ve \netkili içerikler üretmelerine yardımcı olabilir. Öğrenciler, \nbu araçla sosyal medya stratejileri geliştirebilir ve uy -\ngulayabilirler.\n233\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 234, "text": "¬ Grafik Tasarım Dersleri: Grafik tasarım öğrencileri, Meshy \nkullanarak projeleri için çeşitli görsel içerikler oluştura -\nbilirler. Bu, tasarım sürecini hızlandırır ve öğrencilerin \nyaratıcılıklarını geliştirmelerine olanak tanır.\n ¬ İçerik Üretimi: İçerik üretimi derslerinde, öğrenciler Meshy \nile blog yazıları, video senaryoları veya diğer medya içe -\nrikleri oluşturabilirler. Bu, öğrencilerin içerik oluşturma \nbecerilerini geliştirir.Nasıl Kullanılır?\n ¬ Web Sitesine Erişim: Hotpot.ai'nin web sitesine gidin: \nHotpot.ai\n ¬ Araç Seçimi: İhtiyacınıza göre sunulan araçlardan birini \nseçin (grafik tasarımı, görsel düzenleme, yazı yazma vb.).\n ¬ İçerik Üretme:  Yüklediğiniz resimleri düzenleyin veya şab -\nlonlardan yararlanarak hızlıca içerikler oluşturun. Yapay \nzekâ önerileriyle tasarım sürecini optimize edin.\n ¬ Düzenleme ve Özelleştirme: Görselleri ve metinleri iste -\nğinize göre düzenleyin ve özelleştirin. Renkler, boyutlar, \narka planlar gibi seçeneklerle kişiselleştirme yapabilirsiniz.\n ¬ İndir ve Paylaş: Hazırladığınız içerikleri indirin veya pay -\nlaşın. Sunumlar, projeler veya sosyal medya gönderileri \niçin anında kullanabilirsiniz.\n ¬ Web Sayfası: https://hotpot.ai/ \nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler:  Hotpot.ai, öğretmenlerin ders materyallerini \ngörsel olarak geliştirmesine yardımcı olur. Grafik düzenleme \nve içerik üretme araçları sayesinde, öğretmenler karma -\nşık konuları daha basit ve anlaşılır hâle getiren grafikler, \ninfografikler ve sunumlar oluşturabilirler.\n ¬ Öğrenciler: Öğrenciler, projeleri ve sunumları için yüksek \nkaliteli grafikler, afişler ve infografikler tasarlayabilirler. \nHotpot.ai, yapay zekâ desteğiyle görselleri hızlıca iyileştirir \nve projelerini daha etkileyici hâle getirir.\nHotpot.ai, eğitimde hem öğretmenler hem de öğrenciler için \niçerik oluşturma süreçlerini hızlandıran ve görsel olarak güçlü \nsonuçlar elde etmeyi sağlayan bir araçtır. Yapay zekâ desteği, \ngörsel içeriklerin kalitesini artırarak zaman kazandırır ve etkili \neğitim materyalleri oluşturmayı kolaylaştırır.\nHotpot.ai:\nTanım: Hotpot.ai, yapay zekâ destekli bir platform olup, gra -\nfik tasarım, resim iyileştirme, yazı yazma ve daha pek çok \niçerik oluşturma sürecini hızlandıran araçlar sunar. Hotpot, \nkullanıcıların çeşitli projeler için hızlıca profesyonel görseller, \nsosyal medya gönderileri, sunum tasarımları ve yazı içerikle -\nri oluşturmasını sağlar. Yapay zekâ tabanlı araçları, özellikle \ngörseller üzerinde iyileştirme ve otomatik düzenlemeler yapar. \nTemel Özellikler:\n ¬ Yapay zekâ ile desteklenen görsel düzenleme ve tasarım \naraçları.\n ¬ Resim iyileştirme, renklendirme ve arka plan silme gibi \ngelişmiş grafik araçları.\n ¬ Kolay kullanım sağlayan şablonlar ve sürükle-bırak dü -\nzenleme.\n ¬ Yapay zekâ destekli yazı yazma ve içerik üretme özellikleri.\nEğitimde Kullanımı: \nHotpot.ai, öğretmenlerin ve öğrencilerin eğitim materyalleri \niçin grafik ve içerik oluşturma süreçlerini hızlandırmalarına \nyardımcı olur. Öğretmenler ders sunumlarını daha görsel hâle \ngetirebilirken, öğrenciler projeleri için etkileyici grafikler ve \niçerikler oluşturabilir. Ayrıca, yapay zekâ ile içerik üretme özelliği \nsayesinde hızlıca başlıklar, metinler ve açıklamalar eklenebilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n234"}, {"page": 235, "text": "Leonardo AI:\nTanım: Leonardo AI, yapay zekâ destekli bir yaratıcı içerik oluş -\nturma platformudur. Sanat ve tasarım projeleri için kullanıcılara \nilham veren görsel içerikler üretir. Leonardo AI, özellikle dijital \nsanat, grafik tasarım ve sunumlarda kullanılabilecek yüksek \nkaliteli görseller ve grafikler oluşturma üzerine odaklanmıştır. \nKullanıcıların yapay zekâ destekli araçlarla kişiselleştirilmiş ve \nyaratıcı projeler üretmesini sağlar. \nTemel Özellikler:\n ¬ Yapay zekâ ile desteklenen dijital sanat ve grafik oluşturma.\n ¬ Sanat eserleri, posterler, sunumlar ve sosyal medya içe -\nrikleri için yüksek kaliteli grafik tasarımı.\n ¬ Kullanıcı dostu arayüz ve özelleştirme seçenekleri.\n ¬ Yaratıcı içerikler için gelişmiş yapay zekâ algoritmaları \nve öneriler.\nEğitimde Kullanımı:\nLeonardo AI, eğitimde sanat projeleri, sunumlar, ve grafiksel \niçerikler için etkili bir araçtır. Öğretmenler ve öğrenciler, Leo -\nnardo AI ile görsel açıdan güçlü materyaller oluşturabilir, yara -\ntıcı projeler geliştirebilir ve eğitim içeriklerini görselleştirebilir. \nYapay zekâ desteği sayesinde, eğitimde dijital sanatı teşvik \nederken öğrencilerin yaratıcılıklarını da geliştirme fırsatı sunar.\nLeonardo AI Nasıl Kullanılır?\n1. Web sitesine gir\n »∂ https://app.leonardo.ai (e posta ile kayıt/giriş) \n2. Model seç veya yeni proje başlat\n »“AI Art Generator”, “PNG Generator”, “AI Video” gibi \naraçlardan birini seçin \n3. Prompt/metin girin\n »Ne istediğinizi açıklayan kısa bir tarif yazın. »Negative prompt ekleyerek istemediğiniz öğeleri çı -\nkarabilirsiniz \n4. Parametreleri ayarla\n »Model tipi (Phoenix, Anime XL), görüntü boyutu, “Flow \nState” veya “Elements” gibi stil seçeneklerini seçin \n5. \"Generate\" tuşuna basın\n »AI birkaç saniye içinde alternatif görseller oluşturur.\n6. Sonuçları kontrol et\n »Beğendiğinizi upscale (detay yükseltme) veya varyation \n(benzer varyasyon) seçenekleriyle iyileştirin.\n7. Kaydet veya dışa aktar\n »Görseli PNG/JPG olarak indirin.\nHızlı Tek Satır Özeti\nKayıt ∂ Model seç ∂ Prompt yaz ∂ Stil/parametre ayarla ∂ Ge -\nnerate ∂ Geliştir ∂ İndir.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Leonardo AI, öğretmenlerin dijital sanatı \nsınıf ortamına entegre etmelerine olanak tanır. Derslerde \nkullanılacak yaratıcı görseller, posterler veya sunumlar \nhazırlanabilir. Ayrıca, sanat dersleri için dijital projeler ge -\nliştirmek isteyen öğretmenler, bu platformu öğrencilere \nöğretici materyaller hazırlamak için kullanabilir.\n ¬ Öğrenciler: Öğrenciler, sanat projelerinde veya görsel içerik \ngerektiren sunum ve ödevlerde Leonardo AI ile yaratıcı \nve etkileyici çalışmalar ortaya koyabilirler. Dijital sanat \nbecerilerini geliştirmek isteyen öğrenciler, platformun \nsunduğu araçlar ile kendi projelerini kişiselleştirebilir ve \nyaratıcılıklarını ön plana çıkarabilirler.\nLeonardo AI, eğitimde sanat ve tasarım odaklı projeler için \nideal bir yapay zekâ destekli araçtır. Öğretmenler ve öğrenciler \niçin dijital sanatı geliştirme ve eğitimde görsel içerikleri daha \netkileyici hâle getirme olanağı sunar.\n235\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 236, "text": "Fotor:\nTanım: Kullanıcı dostu arayüzüyle online ve masaüstü tabanlı \ngüçlü bir görsel düzenleme ve tasarım platformudur. Fotoğ -\nraf düzenleme, kolaj yapma ve AI destekli görsel oluşturma \nözellikleriyle öne çıkar.\nTemel Özellikler:\n ¬ AI Destekli Görsel Oluşturma: Metinden görsel üretme \n(Text-to-Image) özelliği ile özgün görseller tasarlama.\n ¬ Gelişmiş Fotoğraf Düzenleme: Renk ayarı, keskinleştirme, \narka plan kaldırma ve rötuş araçları.\n ¬ Taslak ve Şablonlar: Eğitim, sosyal medya ve pazarlama \niçin hazır şablonlar sunar.\n ¬ Online ve Mobil Uyumlu: Web tabanlı ve mobil uygulama \nolarak kullanılabilir.\nEğitimde Kullanımı:\n ¬ Ders sunumları için özgün ve etkileyici görseller oluşturmak.\n ¬ Eğitim materyalleri (poster, broşür, el ilanı) hazırlamak.\n ¬ Öğrenci projelerinde görsel içerik üretimini teşvik etmek.\n ¬ Dijital hikâye anlatımı (digital storytelling) etkinliklerinde \nkullanılabilecek görseller üretmek.\nFotor Nasıl Kullanılır?\n1. Web sitesine girin\n »∂ https://www.fotor.com/ ∂ “Edit a Photo” seçeneğine \ntıklayın \n2. Fotoğraf yükleyin\n »Bilgisayarınızdan sürükleyip bırakın ya da \"Open\" ile seçin.3. Araç menüsünü kullanın (sol panelden erişilir):\n »AI Tools (etki artırma, bulanık düzeltme)\n »Adjust (parlaklık, kontrast, doygunluk)\n »Effects (200+ filtre)\n »Beauty (portre düzeltmeleri)\n »Text, Elements, Batch (birden fazla fotoğraf)\n4. Düzenlemeleri yapın\n »Filtre ekleyin, kırpın, metin veya çerçeve ekleyin.\n »AI efektler için “Enhancer”, “Background Remover” gibi \naraçları kullanın.\n5. Geri alın / orijinali kurtarın\n »“Undo”, “Original” veya “Reset All” ile değişiklikleri geri \nalabilirsiniz.\n6. İndir ve paylaşın\n »İşiniz bittiğinde “Download” seçeneği ile JPG/PNG/TIFF \nformatlarında indirin.\nFotor ile Örnek Etkinlik: \nEtkinlik Adımları:\n1. Konu Belirleme (5 dk):\n »Her öğrenci bir sosyal mesaj (örneğin: “Doğayı Koru”, \n“Dijital Zorbalığa Hayır”, “Sağlıklı Yaşam”) seçer.\n2. Fotor’a Giriş (5 dk):\n »Öğrencilere fotor.com adresinden siteye nasıl girileceği \nve “Design” ∂ “Poster” sekmesinden nasıl başlatılacağı \ngösterilir.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n236"}, {"page": 237, "text": "3. Tasarım Süreci (25 dk):\n »Öğrenciler:\n∂ Arka plan seçer\n∂ Metin kutuları ekler\n∂ AI araçlarıyla görsel kalitesini artırır\n∂ Simgeler, filtreler, çerçeve vb. detaylar ekler\n4. Sunum ve Yorum (10 dk):\n »Öğrenciler çalışmalarını sınıfta paylaşır ve birbirlerine \nkısa geri bildirim verir.\nKazanımlar:\n ¬ Dijital tasarım becerisi\n ¬ Görsel okuryazarlık\n ¬ Yaratıcılık ve ifade özgürlüğü\n ¬ Dijital araç kullanma farkındalığı\n \n6.7. Sunum/İçerik Düzenleme\nSunum ve içerik düzenleme araçları, eğitimciler ve öğrenciler \niçin görsel ve metinsel içeriklerin etkili bir şekilde hazırlanmasını \nve sunulmasını sağlayan dijital çözümler sunar. Bu araçlar, \nbilgi paylaşımını daha anlaşılır, etkileyici ve profesyonel hâle \ngetirmek için tasarlanmıştır.\nGeleneksel slayt tabanlı sunumlar yerine, yapay zekâ destekli \naraçlar dinamik, etkileşimli ve görsel açıdan zengin içerikler \noluşturmayı mümkün kılar. Otomatik tasarım önerileri, içerik \ndüzenleme asistanları ve yapay zekâ destekli metin optimi -\nzasyonu gibi özellikler, öğretmenlerin ve öğrencilerin daha \nverimli çalışmasını sağlar.\nBu tür araçlar, ders materyalleri oluşturma, araştırma raporları \nhazırlama, akademik projeleri sunma ve iş birliğine dayalı öğ -\nrenme süreçlerini destekleme gibi alanlarda kullanılır. Kullanıcı \ndostu arayüzleri ve geniş şablon desteği sayesinde zamandan \ntasarruf etmeyi ve profesyonel görünümlü içerikler üretmeyi \nkolaylaştırır.Eğitimde sunum ve içerik düzenleme araçlarının kullanımı, \nbilginin görsel olarak desteklenmesini sağlayarak öğrenme -\nyi daha etkili hâle getirir ve öğrencilerin dikkatini çekmeye \nyardımcı olur.\nNot: Bu kitapta yer alan yapay zekâ araçları zamanla deği -\nşebilir. Güncellenen ve yeni eklenen araçlar için üretici web \nsitelerinden bilgi alabilirsiniz.\n \n6.7.1. Sunum İçerik Düzenleme ve Sunum Hazırlama \nAraçları\nSunum içerik düzenleme için yapay zekâ (YZ) araçları, sunumları \ndaha etkili, profesyonel ve hızlı bir şekilde oluşturmayı sağlar. \nBu araçlar, sunumunuzu geliştirirken zaman tasarrufu sağlar, \nyaratıcılığı artırır ve verimliliği yükseltir. Aşağıda, sunum içerik \ndüzenleme konusunda popüler YZ araçları ve işlevleri hakkında \nbilgi bulabilirsiniz:\nPromeAI:\nTanım:  PromeAI, yapay zekâ destekli bir içerik üretim ve pazar -\nlama aracıdır. PromeAI, blog yazıları, sosyal medya içerikleri, \nreklam metinleri, ürün açıklamaları ve daha birçok dijital içerik \ntürünü otomatik olarak üretir. Bu araç, içerik üretimi sırasında \nzamandan tasarruf etmeyi, yaratıcı yazı ve pazarlama metin -\nleri oluşturmayı ve SEO uyumlu içerikler üretmeyi kolaylaştırır. \nHem küçük işletmeler hem de profesyonel içerik üreticileri \niçin etkili bir çözüm sunar. \nTemel Özellikler:\n ¬ Otomatik İçerik Üretimi: Yapay zekâ desteğiyle blog yazı -\nları, ürün açıklamaları, e-posta bültenleri, sosyal medya \ngönderileri gibi çeşitli içerikler oluşturur.\n ¬ SEO Uyumlu İçerik: PromeAI, arama motoru optimizas -\nyonunu göz önünde bulundurarak içerikler oluşturur ve \nkullanıcıların çevrim içi görünürlüğünü artırmaya yardımcı \nolur.\n ¬ Çoklu Platform Desteği: Üretilen içerik sosyal medya, \nblog, e-posta pazarlama ve diğer dijital platformlar için \noptimize edilebilir.\n237\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 238, "text": "¬ Kişiselleştirilmiş Öneriler: Kullanıcının markası veya sektörü \ndoğrultusunda özel içerik önerileri sunar.\n ¬ Kolay Kullanım:  Kullanıcı dostu arayüzü ile herkesin yapay \nzekâ destekli içerik üretmesini sağlar.\n ¬ Toplu İçerik Üretimi: Aynı anda birden fazla içerik oluşturma \nözelliğiyle içerik üretim süreçlerini hızlandırır.\nPromeAI’nin Eğitimde ve Profesyonel Kullanımı\n1. Blog Yazıları ve Makale Üretimi\nPromeAI, kullanıcıların blog yazıları ve makaleler üretmelerine \nyardımcı olur. Bu özellik, dijital pazarlamacılar ve içerik üreti -\ncileri için hızlı ve SEO uyumlu içerikler oluşturmayı kolaylaştırır. \nKullanıcılar, anahtar kelimeleri ve konuları belirleyerek, yapay \nzekâdan etkili ve özgün içerikler üretebilir.\nÖrnek Kullanım: Bir blog yazarı, \"2024'te Dijital Pazarlama \nTrendleri\" başlıklı bir blog yazısı üretmek için PromeAI'yi kullana -\nrak, konuyla ilgili araştırmaları ve metinleri hızlıca oluşturabilir.\n2. Sosyal Medya İçerik Üretimi\nPromeAI, sosyal medya platformları için içerikler üretir. Ins -\ntagram, Twitter, Facebook gibi platformlar için kısa, yaratıcı \nve etkili içerikler oluşturmak isteyen kullanıcılar için ideal bir \naraçtır. Kullanıcılar, belirli bir ürün veya kampanya hakkında \nyaratıcı sosyal medya gönderileri üretebilir.\nÖrnek: Bir sosyal medya yöneticisi, PromeAI'yi kullanarak bir \nmarkanın yeni ürünü hakkında Instagram gönderisi için etkili \nbir metin oluşturabilir.\n3. Pazarlama ve Reklam Metinleri\nPromeAI, reklam kampanyaları ve pazarlama metinleri üretir. \nKullanıcılar, reklam metinlerini kısa ve öz bir şekilde oluştu -\nrabilir, böylece dijital reklam kampanyaları için etkili metinler \nhazırlayabilirler.\nÖrnek: Bir pazarlama uzmanı, PromeAI'yi kullanarak bir indirim \nkampanyası için Google Ads veya Facebook reklamları için \nyaratıcı ve dönüşüm odaklı metinler yazabilir.4. Ürün Açıklamaları\nPromeAI, e-ticaret siteleri için SEO uyumlu ve müşteri odaklı \nürün açıklamaları oluşturur. Bu özellik, ürünlerin daha iyi tanı -\ntılmasını ve online mağazaların dönüşüm oranlarını artırmayı \nhedefler.\nÖrnek: Bir e-ticaret işletmesi, PromeAI'den, yeni bir teknolojik \nürün için açıklayıcı ve dikkat çekici bir ürün tanıtımı metni \noluşturmasını talep edebilir.\n5. E-posta Pazarlama İçerikleri\nPromeAI, e-posta kampanyaları için etkili ve profesyonel metin -\nler üretir. Kullanıcılar, e-posta bültenleri, promosyon e-postaları \nveya müşteri sadakat programları için içerikler oluşturabilir.\nÖrnek: Bir pazarlama ekibi, yeni bir ürün lansmanı için Prome -\nAI'yi kullanarak e-posta bülteni oluşturabilir ve hedef kitlesine \netkili bir şekilde ulaşabilir.\n6. SEO Optimizasyonu\nPromeAI, içerik üretirken SEO kurallarını dikkate alarak içe -\nrikleri optimize eder. Kullanıcılar, arama motorlarında daha \nüst sıralarda yer almak için içeriklerinde anahtar kelimeler \nkullanarak SEO stratejilerini destekleyebilirler.\nÖrnek: Bir SEO uzmanı, belirli anahtar kelimeler üzerine odak -\nlanarak PromeAI'den SEO dostu bir blog yazısı oluşturmasını \nisteyebilir.\nSonuç ve Kullanım Alanları\nPromeAI, dijital içerik üretimi ve pazarlama süreçlerini hızlan -\ndıran, kullanıcıların yaratıcı metinler ve içerikler oluşturmasına \nyardımcı olan güçlü bir yapay zekâ aracıdır. Blog yazıları, sosyal \nmedya içerikleri, reklam metinleri, ürün açıklamaları ve e-posta \npazarlama içerikleri gibi birçok alanda etkili çözümler sunar. \nPromeAI, içerik üreticilerinin iş yükünü azaltırken, markaların \ndijital varlıklarını güçlendirmelerine yardımcı olur.\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n238"}, {"page": 239, "text": "Beautiful.ai:\nTanım: Beautiful.ai, yapay zekâ destekli bir sunum oluştur -\nma platformudur. Platform, sunum tasarımı ve düzenleme -\nsini otomatikleştirerek, kullanıcılara profesyonel görünümlü \nsunumlar oluşturma imkanı sunar. Kullanıcılar sadece içeriği \ngirer ve Beautiful.ai, sunumun estetik ve düzenleme işini yapar. \nBu, özellikle zaman kazandıran ve görsel tasarım yetenekleri \ngerektirmeyen bir çözümdür. \nTemel Özellikler:\n ¬ Yapay zekâ ile desteklenen otomatik tasarım düzenlemeleri.\n ¬ Profesyonel ve estetik sunum şablonları.\n ¬ İçerik düzenleme ve yerleşim için akıllı öneriler.\n ¬ Kullanıcı dostu sürükle-bırak arayüz.\nEğitimde Kullanımı: \nBeautiful.ai, öğretmenlerin ve öğrencilerin eğitim materyalle -\nrini hızlı ve profesyonel bir şekilde sunum hâline getirmesine \nolanak tanır. Öğretmenler, ders planlarını ve içeriklerini estetik \nsunumlar hâline dönüştürebilir. Öğrenciler ise projelerini veya \naraştırmalarını etkileyici ve görsel olarak güçlü sunumlarla su -\nnabilirler. Özellikle ders anlatımları ve projelerde görsel akış ve \ntasarımın otomatik hâle getirilmesi, içerik odaklı bir eğitim sunar.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Beautiful.ai'nin web sitesine gidin: \nBeautiful.ai\n ¬ Şablon Seçimi: Eğitim, iş veya yaratıcı projeler için çeşitli \nşablonlardan birini seçin.\n ¬ İçerik Ekleme: Sunumunuza metin, görsel ve grafikler ek -\nleyin. Beautiful.ai, bu içerikleri otomatik olarak düzenler \nve estetik bir sunuma dönüştürür.\n ¬ Düzenleme ve Özelleştirme: İçerik düzenlemelerinizi ya -\npın. Yapay zekâ desteği ile sunumunuzu en iyi şekilde \noptimize edin. ¬ Sunumu Paylaşma veya İndirme: Tamamladığınız sunumu \nPDF veya PowerPoint formatında indirin veya çevrim içi \nolarak paylaşın.\nEğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Beautiful.ai, öğretmenlerin ders içeriklerini \nhızlıca sunuma dönüştürmelerine yardımcı olur. Ders an -\nlatımlarını profesyonel ve görsel açıdan zengin sunumlarla \nyapabilirler. Sunum hazırlamak için fazla zaman harca -\nmadan, ders anlatımına odaklanmak için ideal bir araçtır.\n ¬ Öğrenciler: Beautiful.ai, öğrencilerin projeleri ve araştır -\nmaları için profesyonel sunumlar hazırlamalarını sağlar. \nYapay zekâ desteği ile, sunumlar hızlıca düzenlenir ve es -\ntetik bir yapı kazanır, böylece içerik daha etkili bir şekilde \nsunulabilir.\nBeautiful.ai ile Akıllı Sunum Tasarımı Etkinliği\nDers: Türkçe / Bilişim / Sosyal Bilgiler / İngilizce\nSüre: 1 ders saati (40–45 dk)\nAraç: www.beautiful.ai\nAmaç:\nÖğrencilerin dijital sunum araçlarını etkili şekilde kullanarak \ngörsel olarak güçlü, sade ve anlatımı destekleyen sunumlar \ntasarlaması.\nEtkinlik Adımları:\n1. Konu Belirleme (5 dk):\n »Her öğrenciye ya da gruba “Küresel Isınma”, “Dijital \nVatandaşlık”, “Benim Hobilerim” gibi bir başlık verilir.\n2. Beautiful.ai Platformuna Giriş (5 dk):\n »Öğrencilere beautiful.ai sitesine giriş, hesap oluşturma \nve şablon seçimi gösterilir.\n239\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 240, "text": "3. Sunum Hazırlığı (20 dk):\n »Öğrenciler:\n∂ Başlık slaytı oluşturur\n∂ 3–4 bilgi slaytı hazırlar (metin, görsel, grafik)\n∂ AI destekli şablon önerileriyle düzenler\n∂ Renk ve yazı stillerini sade tutar\n4. Sunum ve Geri Bildirim (10–15 dk):\n »Öğrenciler sırayla kısa sunumlarını yapar.\n »Sınıf arkadaşları ve öğretmen tarafından tasarım + \nanlatım yönünden yapıcı geri bildirim verilir.\nKazanımlar:\n ¬ Görsel iletişim ve anlatım becerisi\n ¬ Sunum hazırlama teknikleri\n ¬ Bilgiyi sade ve etkili sunma yetkinliği\n ¬ Tasarım okuryazarlığıolarak organize eder ve kullanıcıların içerik oluşturma sürecini \nhızlandırır.\nTemel Özellikler:\n ¬ Yapay zekâ destekli otomatik içerik düzenleme ve slayt \noluşturma.\n ¬ Hikâye anlatımına dayalı sunum yapısı.\n ¬ Kolay kullanım için sürükle-bırak arayüz.\n ¬ Dinamik ve yaratıcı içerikler için şablonlar ve görsel öneriler.\nEğitimde Kullanımı:\nTome, öğretmenler ve öğrenciler için ders anlatımlarını ve pro -\njeleri hikâye odaklı sunumlara dönüştürmek için ideal bir araç -\ntır. Öğretmenler, ders içeriklerini hikâyeleştirerek öğrencilerin \nilgisini çekebilirler. Öğrenciler ise, projelerini daha etkileyici ve \nanlamlı bir şekilde sunabilirler. Tome, karmaşık bilgileri basit \nve etkili bir anlatı ile sunmaya yardımcı olur.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Tome'nin web sitesine gidin: Tome\n ¬ Hikâye Tabanlı Şablon Seçimi: Hikâye tabanlı sunumlar \noluşturmak için farklı şablonlardan birini seçin.\n ¬ İçerik Ekleme: Metinlerinizi, görsellerinizi ve diğer içerik -\nlerinizi ekleyin. Tome, bu içerikleri hikâye yapısına dönüş -\ntürerek organize eder.\n ¬ Düzenleme ve Özelleştirme: Slaytlarınızı isteğinize göre \nözelleştirin. Görsel ve metin düzenlemelerini yapın ve \nsunumunuzu optimize edin.\n ¬ Sunumu Paylaşma veya İndirme: Sunumunuzu tamamla -\ndıktan sonra çevrim içi paylaşabilir veya PDF, PowerPoint \nformatında indirebilirsiniz.\n ¬ Web Sayfası: https://tome.app/ \nTome\nTanım: Tome, yapay zekâ destekli bir sunum ve hikâye anlatımı \nplatformudur. Tome, kullanıcıların içeriklerini analiz ederek, \notomatik olarak slaytlar oluşturur ve düzenler. Kullanıcıların \nmetinlerini, görsellerini ve diğer materyallerini akıcı ve etkili \nbir anlatıya dönüştürür. Özellikle yaratıcı ve hikâye tabanlı su -\nnumlar için tasarlanmıştır, bu da eğitimde ve iş dünyasında \netkili bir araç olmasını sağlar. Tome, içerikleri anlatıya dayalı \nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ\n240"}, {"page": 241, "text": "Eğitimde Nasıl Kullanılır?\n ¬ Öğretmenler: Tome, öğretmenlerin ders içeriklerini et -\nkili bir şekilde organize etmelerine yardımcı olur. Hikâye \ntabanlı sunum yapısı sayesinde derslerin daha akıcı ve \nilgi çekici hâle gelmesini sağlar. Öğretmenler, ders anla -\ntımlarını hikâye anlatımıyla zenginleştirerek öğrencilerin \ndikkatini çekebilirler.\n ¬ Öğrenciler: Öğrenciler, projelerini ve araştırmalarını hikâ -\nyeleştirerek sunmak için Tome’u kullanabilirler. Yaratıcı \nsunumlar oluşturarak bilgilerini daha iyi aktarabilir ve \nsunum sürecini daha ilgi çekici hâle getirebilirler. Tome, \nöğrencilerin yaratıcılığını destekleyerek etkili sunumlar \nyapmalarına olanak tanır.\nTome ile Hikâyeleştirilmiş Sunum Tasarımı Etkinliği\nDers: Türkçe / İngilizce / Sosyal Bilgiler / Görsel Sanatlar\nSüre: 1 ders saati (40–45 dk)\nAraç: www.tome.app\nAmaç:\nÖğrencilerin metin, görsel ve anlatım bütünlüğü içinde hikâ -\nye tabanlı sunumlar oluşturarak yaratıcı ifade ve dijital içerik \nüretimi becerilerini geliştirmesi.\nEtkinlik Adımları:\n1. Konu Belirleme (5 dk):\n »Öğrencilere bir tema verilir: “Bir Günlüğüne Gelece -\nğe Yolculuk”, “Hayalimdeki Okul”, “Atatürk’ün Hayatı”, \n“Küçük Prens’le Bir Gün”.\n2. Tome’a Giriş (5 dk):\n »Öğrencilere tome.app üzerinden ücretsiz hesap oluş -\nturma ve arayüz tanıtımı yapılır.\n3. Prompt ile Sunum Oluşturma (10 dk):\n »Öğrenciler kendi konularıyla ilgili bir cümlelik prompt \nyazar (örnek: \"Hayalimdeki okulun bir gününü anlatan \nbir sunum hazırla\"). »Tome, yapay zekâ ile metin ve görsellerle sunum tas -\nlağını otomatik üretir.\n4. Düzenleme ve Yaratıcılık (15 dk):\n »Öğrenciler sayfaları kontrol eder, metinleri düzeltir, \ngörselleri değiştirir, kendi fikirlerini ekler.\n5. Sunum ve Paylaşım (10 dk):\n »Öğrenciler 2-3 dakikalık kısa sunumlar yapar.\n »Diğer öğrenciler içerik ve tasarımla ilgili kısa geri bil -\ndirim verir.\nKazanımlar:\n ¬ Yaratıcı yazma ve anlatım becerisi\n ¬ Hikâyeleştirme (storytelling) yaklaşımını öğrenme\n ¬ Görsel destekli anlatım oluşturma\n ¬ Yapay zekâyla üretim deneyimi\nPitch\nTanım: Pitch, yapay zekâ destekli modern bir sunum oluşturma \nve işbirliği platformudur. Pitch, ekiplerin işbirliği içinde sunum \noluşturmasına ve düzenlemesine olanak tanır. Profesyonel \nsunum şablonları, içerik yerleşimi ve tasarım önerileri sunar. \nAyrıca, kullanıcıların gerçek zamanlı olarak birlikte çalışabil -\nmelerine olanak tanıyan işbirliği araçlarıyla donatılmıştır. Pitch, \nhem bireylerin hem de ekiplerin içeriklerini daha hızlı ve daha \netkili bir şekilde organize etmelerine yardımcı olur.\nTemel Özellikler:\n ¬ Yapay zekâ destekli içerik düzenleme ve tasarım önerileri.\n ¬ Profesyonel sunum şablonları ve özelleştirme seçenekleri.\n241\nYAPAY ZEKÂ VE EĞİTİM: ÖĞRETMENLER İÇİN UYGULAMALI PROMPT MÜHENDİSLİĞİ VE \nÜRETKEN ARAÇLARLA YENİLİKÇİ ÖĞRENME STRATEJİLERİ"}, {"page": 242, "text": "¬ Gerçek zamanlı işbirliği araçları, ekip üyeleriyle eşzamanlı \nçalışma imkânı.\n ¬ Slayt analizi ve içerik önerileriyle optimize edilmiş sunumlar.\nEğitimde Kullanımı: \nPitch, eğitimde grup projeleri, öğretmen işbirlikleri ve ders \nsunumları için idealdir. Öğretmenler ders içeriklerini oluştu -\nrurken işbirliği yapabilir, öğrenciler ise grup projelerini pro -\nfesyonel sunumlara dönüştürebilir. Gerçek zamanlı işbirliği \nözelliği, projelerde ekiplerin daha verimli çalışmasını sağlar. \nAyrıca, içerik düzenleme ve tasarım önerileri, öğrencilerin daha \netkili sunumlar yapmasına yardımcı olur.\nNasıl Kullanılır?\n ¬ Web Sitesine Erişim: Pitch'in web sitesine gidin: Pitch\n ¬ Sunum Şablonu Seçimi: Hazır şablonlardan birini seçin \nveya kendi sunumunuzu sıfırdan oluşturun.\n ¬ İçerik Ekleme: Metinler, görseller ve grafikler ekleyin. Pit -\nc
