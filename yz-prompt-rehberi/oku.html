<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitabı Oku — Yapay Zekâ ve Eğitim</title>
  <meta name="description" content="Yapay Zekâ ve Eğitim kitabının tam metni — MEB YEGİTEK, 292 sayfa.">
  <link rel="canonical" href="https://raufenc.com/yz-prompt-rehberi/oku.html" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <link rel="stylesheet" href="/lib/design-system/tokens.css">
  <script src="/lib/design-system/theme.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Layout ── */
    .reader-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100dvh;
    }
    @media (max-width: 768px) {
      .reader-layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 100; }
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100dvh; overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: #60a5fa; margin-bottom: 10px;
    }
    .search-input {
      width: 100%; padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: var(--text);
      font-size: 0.82rem; font-family: inherit; outline: none;
    }
    .search-input:focus { border-color: #3b82f6; }
    .search-input::placeholder { color: var(--text-secondary); }

    .sidebar-nav {
      flex: 1; overflow-y: auto;
      padding: 8px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .ch-group { margin-bottom: 4px; }
    .ch-btn {
      width: 100%; text-align: left;
      padding: 7px 10px; border-radius: 8px;
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.78rem; font-weight: 700;
      color: var(--text-secondary); transition: all 0.15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ch-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .ch-btn.active { background: rgba(59,130,246,0.12); color: #60a5fa; }
    .ch-btn .pg { font-size: 0.7rem; font-weight: 400; opacity: 0.6; flex-shrink: 0; }

    .sec-list { padding-left: 8px; }
    .sec-btn {
      width: 100%; text-align: left;
      padding: 5px 8px; border-radius: 6px;
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.74rem;
      color: var(--text-secondary); transition: all 0.15s;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .sec-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sec-btn.active { color: #60a5fa; }
    .sec-btn .code { color: #3b82f6; font-weight: 700; flex-shrink: 0; font-size: 0.7rem; }

    /* ── Main ── */
    .main {
      display: flex; flex-direction: column;
      min-height: 100dvh;
    }

    /* ── Top Bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      background: rgba(var(--bg-rgb, 12,15,20), 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-secondary); text-decoration: none; font-size: 0.8rem;
      transition: all 0.15s; font-family: inherit; cursor: pointer;
    }
    .back-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    .page-nav {
      display: flex; align-items: center; gap: 8px; margin-left: auto;
    }
    .nav-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; color: var(--text); font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; font-family: inherit;
    }
    .nav-btn:hover { background: rgba(59,130,246,0.12); border-color: #3b82f6; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .page-input {
      width: 56px; text-align: center;
      padding: 6px 8px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); font-size: 0.85rem; font-family: inherit; outline: none;
    }
    .page-input:focus { border-color: #3b82f6; }
    .page-total { font-size: 0.82rem; color: var(--text-secondary); }

    .progress-bar-wrap {
      width: 100%; height: 2px; background: rgba(255,255,255,0.07);
      border-radius: 1px; flex-basis: 100%;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #3b82f6, #06b6d4);
      border-radius: 1px; transition: width 0.3s;
    }

    /* ── Page Content ── */
    .page-content {
      flex: 1;
      max-width: 760px; margin: 0 auto;
      padding: 40px 24px 80px;
      width: 100%;
    }

    .page-number-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      color: #60a5fa; background: rgba(59,130,246,0.1);
      padding: 3px 10px; border-radius: 999px; margin-bottom: 20px;
    }

    .page-chapter-label {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--text-secondary); text-transform: uppercase;
      margin-bottom: 8px;
    }

    .page-text {
      font-size: 1rem; line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Highlight search results */
    .page-text mark {
      background: rgba(245,158,11,0.3);
      color: var(--text);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* Empty page */
    .empty-page {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary); font-size: 0.9rem;
    }

    /* ── Search results panel ── */
    .search-results {
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 12px 20px; display: none;
    }
    .search-results.show { display: block; }
    .search-results-title {
      font-size: 0.78rem; font-weight: 700; color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .search-result-item {
      padding: 8px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer; margin-bottom: 4px; transition: all 0.15s;
      font-size: 0.82rem;
    }
    .search-result-item:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); }
    .search-result-page { font-weight: 700; color: #60a5fa; margin-bottom: 2px; }
    .search-result-excerpt { color: var(--text-secondary); line-height: 1.4; }

    /* ── Mobile toggle ── */
    .mob-menu-btn {
      display: none; padding: 7px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); cursor: pointer; font-size: 0.82rem; font-family: inherit;
    }
    @media (max-width: 768px) {
      .mob-menu-btn { display: flex; align-items: center; gap: 6px; }
      .sidebar-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99;
        display: none;
      }
      .sidebar-overlay.show { display: block; }
      .sidebar {
        width: 280px; max-width: 85vw; z-index: 100;
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%); transition: transform 0.3s;
      }
      .sidebar.open { transform: translateX(0); display: flex; }
    }
  </style>
</head>
<body>
  <div class="reader-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">📖 Yapay Zekâ ve Eğitim</div>
        <input type="search" class="search-input" id="sidebarSearch" placeholder="Kitapta ara..." oninput="searchBook(this.value)">
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- ── Main ── -->
    <div class="main">

      <!-- Top bar -->
      <div class="topbar">
        <button class="mob-menu-btn" onclick="toggleSidebar()">☰ Bölümler</button>
        <a href="/yz-prompt-rehberi/" class="back-btn">← Geri Dön</a>
        <div style="flex:1;min-width:0;font-size:0.82rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="currentChapterLabel"></div>
        <div class="page-nav">
          <button class="nav-btn" id="prevBtn" onclick="goPage(currentPage-1)">←</button>
          <input class="page-input" type="number" id="pageInput" min="1" max="292" onchange="goPage(parseInt(this.value))" onkeydown="if(event.key==='Enter')goPage(parseInt(this.value))">
          <span class="page-total" id="pageTotal">/ 292</span>
          <button class="nav-btn" id="nextBtn" onclick="goPage(currentPage+1)">→</button>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Search results -->
      <div class="search-results" id="searchResults">
        <div class="search-results-title" id="searchResultsTitle"></div>
        <div id="searchResultsList"></div>
      </div>

      <!-- Page content -->
      <div class="page-content" id="pageContent"></div>

      <!-- Bottom nav -->
      <div style="padding:20px;display:flex;justify-content:center;gap:12px;border-top:1px solid rgba(255,255,255,0.07)">
        <button class="back-btn" onclick="goPage(currentPage-1)">← Önceki Sayfa</button>
        <button class="back-btn" onclick="goPage(currentPage+1)">Sonraki Sayfa →</button>
      </div>

    </div><!-- /main -->
  </div><!-- /layout -->

  <!-- Chapter data (small, from DB) -->
  <script>
  const CHAPTERS = [
    {code:'0',title:'Ön Bölümler',p1:2,p2:14},
    {code:'1',title:'Giriş',p1:15,p2:16},
    {code:'2',title:'Prompt Mühendisliğine Genel Bakış',p1:17,p2:20},
    {code:'3',title:'Temel Kavramlar',p1:21,p2:24},
    {code:'4',title:'Prompt Yazma Teknikleri ve Örnek Uygulamalar',p1:25,p2:78},
    {code:'5',title:'Eğitimde Prompt Kullanımı ve YZ Araçları',p1:79,p2:140},
    {code:'6',title:'Üretken Yapay Zekâ Araçları',p1:141,p2:272},
    {code:'7',title:'Eğitimde Yapay Zekâ ve Etik',p1:273,p2:280},
    {code:'8',title:'Sonuç',p1:281,p2:292}
  ];

  const SECTIONS = [
    {code:'0.1',title:'Künye',page:2},{code:'0.2',title:'Kısaltmalar',page:8},{code:'0.3',title:'Sunuş',page:9},{code:'0.4',title:'Yönetici Özeti',page:11},{code:'0.5',title:'Kitap Özeti',page:13},
    {code:'1.1',title:'Yapay Zekâ ve Eğitim',page:15},{code:'1.2',title:'Kitabın Amacı ve Kapsamı',page:15},{code:'1.3',title:'Önemli Not: YZ Araçlarının Dinamikleri',page:16},
    {code:'2.1',title:'Tanım',page:17},{code:'2.2',title:'Prompt Mühendisliği Neden Önemli?',page:18},{code:'2.3',title:'Neden Öğretmenler İçin?',page:19},
    {code:'3.1',title:'Prompt Nedir?',page:21},{code:'3.2',title:'Yapay Zekâ ve Dil Modelleri',page:21},
    {code:'4.1',title:'Prompt Yazma Teknikleri',page:25},{code:'4.1.1',title:'İyi Bir Promptun Özellikleri',page:25},{code:'4.1.2',title:'Temel Formüller',page:28},{code:'4.1.3',title:'Basit Promptlar',page:40},{code:'4.1.4',title:'Prompting Teknikleri',page:44},{code:'4.1.5',title:'Prompt Yazma Araçları',page:67},{code:'4.1.6',title:'Teknoloji ile Entegrasyon',page:77},
    {code:'5.1',title:'Planlama ve Etkili İçerik Üretimi',page:79},{code:'5.2',title:'Öğretme ve Öğrenme Etkinlikleri',page:91},{code:'5.3',title:'Araştırma ve Veri Analizi',page:103},{code:'5.4',title:'Ölçme, Değerlendirme ve Geri Bildirim',page:125},{code:'5.5',title:'Öğrenci Motivasyonu için Promptlar',page:132},{code:'5.6',title:'ChatGPT\'nin Eğitimde Kullanımı',page:133},{code:'5.7',title:'Eğitimde Kullanılabilecek Promptlar',page:136},
    {code:'6.1',title:'Metin / Yazma Asistanları',page:141},{code:'6.2',title:'Görüntü Oluşturma',page:174},{code:'6.3',title:'Ses Oluşturma',page:201},{code:'6.4',title:'Müzik Üretme',page:209},{code:'6.5',title:'Video Oluşturma',page:215},{code:'6.6',title:'Oyunlaştırma Araçları',page:229},{code:'6.7',title:'Sunum / İçerik Düzenleme',page:237},{code:'6.8',title:'Kodlama',page:252},{code:'6.9',title:'YZ Destekli Chatbotlar',page:261},
    {code:'7.1',title:'Etik İlkeler',page:273},{code:'7.2',title:'Öğretmenlerin YZ Rolü',page:274},{code:'7.3',title:'Öğrencilere YZ Öğretmek',page:274},{code:'7.10',title:'Araç Seçimi Kriterleri',page:277},
    {code:'8.1',title:'Gelecekte Prompt Mühendisliği',page:281},{code:'8.2',title:'Kişiselleştirilmiş Öğrenme',page:281},{code:'8.4',title:'Öğretmenin Değişen Rolü',page:282}
  ];
  </script>
  <script src="/yz-prompt-rehberi/pages.js"></script>
  <script>
  let currentPage = 1;
  const TOTAL = 292;

  // ── Build sidebar ──
  function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    CHAPTERS.forEach(ch => {
      const secs = SECTIONS.filter(s => {
        const num = parseInt(s.code.split('.')[0]);
        return s.code.startsWith(ch.code + '.') || (ch.code === '0' && s.code.startsWith('0.'));
      });

      const div = document.createElement('div');
      div.className = 'ch-group';

      const btn = document.createElement('button');
      btn.className = 'ch-btn';
      btn.dataset.page = ch.p1;
      btn.innerHTML = `<span>Böl. ${ch.code === '0' ? 'Ön' : ch.code} — ${ch.title}</span><span class="pg">s.${ch.p1}</span>`;
      btn.onclick = () => { goPage(ch.p1); closeSidebar(); };
      div.appendChild(btn);

      if (secs.length) {
        const secList = document.createElement('div');
        secList.className = 'sec-list';
        secs.forEach(s => {
          const sb = document.createElement('button');
          sb.className = 'sec-btn';
          sb.dataset.page = s.page;
          sb.innerHTML = `<span class="code">${s.code}</span><span>${s.title} <span class="pg" style="font-size:0.68rem;opacity:0.5">s.${s.page}</span></span>`;
          sb.onclick = () => { goPage(s.page); closeSidebar(); };
          secList.appendChild(sb);
        });
        div.appendChild(secList);
      }

      nav.appendChild(div);
    });
  }

  // ── Render page ──
  function goPage(n) {
    n = Math.max(1, Math.min(TOTAL, n));
    currentPage = n;

    // Update input + progress
    document.getElementById('pageInput').value = n;
    document.getElementById('progressFill').style.width = ((n-1)/(TOTAL-1)*100).toFixed(1) + '%';
    document.getElementById('prevBtn').disabled = n <= 1;
    document.getElementById('nextBtn').disabled = n >= TOTAL;

    // Find chapter label
    const ch = [...CHAPTERS].reverse().find(c => n >= c.p1) || CHAPTERS[0];
    document.getElementById('currentChapterLabel').textContent = `${ch.code === '0' ? 'Ön Bölüm' : 'Bölüm ' + ch.code} — ${ch.title}`;
    document.getElementById('currentChapterLabel').title = ch.title;

    // Highlight active chapter in sidebar
    document.querySelectorAll('.ch-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.page) === ch.p1);
    });
    document.querySelectorAll('.sec-btn').forEach(b => {
      const bp = parseInt(b.dataset.page);
      const nextSec = [...document.querySelectorAll('.sec-btn')]
        .map(x => parseInt(x.dataset.page))
        .filter(p => p <= n)
        .pop();
      b.classList.toggle('active', bp === nextSec);
    });

    // Get page data
    const pageData = YZ_PAGES[n - 1];
    const content = document.getElementById('pageContent');

    if (!pageData || !pageData.text || pageData.text.length < 5) {
      content.innerHTML = `<div class="empty-page">
        <div style="font-size:2rem;margin-bottom:12px">📄</div>
        <div>Bu sayfa görsel içerik içeriyor.</div>
        <div style="margin-top:8px;font-size:0.82rem"><a href="/yz-prompt-rehberi/kitap.pdf" target="_blank" style="color:#60a5fa">PDF'den görüntülemek için tıklayın</a></div>
      </div>`;
      return;
    }

    content.innerHTML = `
      <div class="page-number-badge">📄 Sayfa ${n}</div>
      <div class="page-chapter-label">${ch.code === '0' ? 'Ön Bölüm' : 'Bölüm ' + ch.code} — ${ch.title}</div>
      <div class="page-text" id="pageText">${escapeHTML(pageData.text)}</div>`;

    // Scroll to top of content
    content.scrollIntoView({behavior:'smooth', block:'start'});

    // Update URL hash
    history.replaceState(null, '', '#s' + n);
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Search ──
  let searchTimeout = null;
  function searchBook(q) {
    clearTimeout(searchTimeout);
    const panel = document.getElementById('searchResults');
    if (!q || q.length < 3) { panel.classList.remove('show'); return; }
    searchTimeout = setTimeout(() => {
      const q_low = q.toLowerCase();
      const results = [];
      for (let i = 0; i < YZ_PAGES.length && results.length < 20; i++) {
        const p = YZ_PAGES[i];
        const idx = p.text.toLowerCase().indexOf(q_low);
        if (idx !== -1) {
          const start = Math.max(0, idx - 60);
          const end = Math.min(p.text.length, idx + 100);
          results.push({
            page: p.page,
            excerpt: (start > 0 ? '…' : '') + p.text.slice(start, end) + (end < p.text.length ? '…' : '')
          });
        }
      }

      document.getElementById('searchResultsTitle').textContent =
        results.length ? `"${q}" için ${results.length} sonuç (${results.length === 20 ? 'ilk 20' : results.length})` : `"${q}" bulunamadı`;

      document.getElementById('searchResultsList').innerHTML = results.map(r => `
        <div class="search-result-item" onclick="goPage(${r.page}); document.getElementById('sidebarSearch').value=''; document.getElementById('searchResults').classList.remove('show');">
          <div class="search-result-page">Sayfa ${r.page}</div>
          <div class="search-result-excerpt">${escapeHTML(r.excerpt).replace(new RegExp(escapeHTML(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`)}</div>
        </div>`).join('');

      panel.classList.toggle('show', results.length > 0 || q.length >= 3);
    }, 300);
  }

  // ── Sidebar toggle (mobile) ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }

  // ── Keyboard nav ──
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(currentPage + 1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPage(currentPage - 1);
  });

  // ── Init ──
  buildSidebar();
  const hash = location.hash.replace('#s','');
  const startPage = parseInt(hash) || 1;
  goPage(startPage);
  </script>
</body>
</html>
