<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DKAB Akademi — Din Kültürü Öğrenme Platformu</title>
    <meta name="description" content="4–12. sınıf Din Kültürü ve Ahlak Bilgisi için interaktif öğrenme platformu. Oyunlar, quizler, XP sistemi ve günlük seri takibi ile dini öğren.">
    <meta name="theme-color" content="#1B6B4A">

    <!-- Open Graph (WhatsApp, Telegram, Facebook, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://raufenc.com/dkab/">
    <meta property="og:title" content="DKAB Akademi — Din Kültürü Öğrenme Platformu">
    <meta property="og:description" content="807 interaktif etkinlik, XP & rozet sistemi, günlük seri takibi. 4–12. sınıf DKAB derslerini oyunla öğren!">
    <meta property="og:image" content="https://raufenc.com/dkab/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:site_name" content="Rauf Enç">

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="DKAB Akademi — Din Kültürü Öğrenme Platformu">
    <meta name="twitter:description" content="807 interaktif etkinlik, XP & rozet sistemi. 4–12. sınıf DKAB derslerini oyunla öğren!">
    <meta name="twitter:image" content="https://raufenc.com/dkab/og-image.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css?v=10">
    <link rel="stylesheet" href="css/components.css?v=10">
    <link rel="stylesheet" href="css/animations.css?v=10">
</head>
<body>
    <script>if(localStorage.getItem('dkab_dark_mode')==='1')document.body.classList.add('dark-mode');</script>
    <!-- Header -->
    <header class="app-header" id="app-header"></header>

    <!-- Sidebar -->
    <aside class="app-sidebar" id="app-sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="app-main">
        <div id="main-content">
            <div class="content-area text-center" style="margin-top: 4rem;">
                <div class="spinner" style="margin: 0 auto;"></div>
                <p class="text-muted mt-md">Yukleniyor...</p>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js?v=10"></script>
    <script>
        // Service Worker kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/dkab/sw.js', { scope: '/dkab/' })
                    .catch(() => { /* SW kaydı başarısız olursa sessizce devam et */ });
            });
        }

        // Offline/online göstergesi
        function updateOnlineStatus() {
            const el = document.getElementById('offline-banner');
            if (!el) return;
            if (!navigator.onLine) {
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        document.addEventListener('DOMContentLoaded', updateOnlineStatus);
    </script>

    <!-- Offline banneri -->
    <div id="offline-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#2d3436; color:#fff; text-align:center; padding:0.6rem 1rem; font-size:0.85rem; z-index:9999;">
        &#9888;&#65039; Çevrimdışısınız — Kayıtlı içerikler gösteriliyor
    </div>
</body>
</html>
