<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>راكب الأمواج — Sörf Yarışı</title>
<style>
@font-face{font-family:'Arakom';src:url('Arakom-Regular.ttf') format('truetype');font-weight:normal}
@font-face{font-family:'Arakom';src:url('Arakom-Bold.ttf') format('truetype');font-weight:bold}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Arakom',sans-serif;
  background:#0a1628;
  color:#fff;min-height:100vh;overflow:hidden;
  user-select:none;-webkit-user-select:none;
  position:relative;
}
.tr-text{font-family:Arial,Helvetica,sans-serif;direction:ltr;unicode-bidi:bidi-override}

/* Back button */
#backBtn{
  position:fixed;top:12px;right:12px;z-index:1000;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);
  color:#fff;font-size:22px;width:42px;height:42px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  text-decoration:none;transition:background 0.2s;
}
#backBtn:hover{background:rgba(255,255,255,0.25)}

/* ---- SCREENS ---- */
.screen{display:none;width:100%;height:100vh;position:absolute;top:0;left:0}
.screen.active{display:flex}

/* Ocean BG */
.ocean-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
  background:linear-gradient(180deg,#0a2463 0%,#1b4965 30%,#0d3b66 60%,#144272 100%);
  overflow:hidden;
}
.ocean-bg::before{
  content:'';position:absolute;bottom:0;left:-50%;width:200%;height:60%;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 40px,
    rgba(255,255,255,0.015) 40px,rgba(255,255,255,0.015) 42px
  );
  animation:oceanDrift 8s ease-in-out infinite alternate;
}
.ocean-bg::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(0,180,255,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 60%,rgba(0,200,180,0.05) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(100,100,255,0.04) 0%,transparent 50%);
}
@keyframes oceanDrift{
  0%{transform:translateX(-2%) translateY(0)}
  100%{transform:translateX(2%) translateY(-8px)}
}

/* Wave shimmer lines on BG */
.wave-line{
  position:absolute;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(100,200,255,0.08) 30%,rgba(100,200,255,0.15) 50%,rgba(100,200,255,0.08) 70%,transparent 100%);
  animation:waveShimmer var(--dur) ease-in-out infinite alternate;
}
@keyframes waveShimmer{
  0%{transform:translateX(-30px);opacity:0.3}
  100%{transform:translateX(30px);opacity:0.8}
}

/* MENU */
#menuScreen{
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
  text-align:center;padding:20px;z-index:10;
}
#menuScreen h1{
  font-size:clamp(28px,6vw,48px);margin-bottom:2px;
  text-shadow:0 0 30px rgba(0,180,255,0.5),0 0 60px rgba(0,180,255,0.2);
}
#menuScreen .subtitle{
  font-size:clamp(14px,3vw,20px);opacity:0.7;margin-bottom:8px;
}
.menu-btn{
  background:linear-gradient(135deg,#0077b6,#00b4d8);
  border:none;color:#fff;padding:16px 40px;border-radius:14px;
  font-size:clamp(16px,3.5vw,22px);font-family:'Arakom',sans-serif;
  cursor:pointer;min-width:240px;transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 20px rgba(0,119,182,0.4);
}
.menu-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(0,119,182,0.6)}
.menu-btn.secondary{background:linear-gradient(135deg,#00b894,#00cec9)}
.menu-btn.accent{background:linear-gradient(135deg,#e17055,#fdcb6e)}
.menu-info{font-size:13px;opacity:0.5;margin-top:8px}
.highscore-display{
  font-size:clamp(13px,2.5vw,16px);opacity:0.7;margin-top:4px;
  color:#ffd700;
}
.surfer-icon{font-size:clamp(50px,12vw,80px);margin-bottom:4px}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;z-index:100;
  display:none;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(0,10,30,0.7);backdrop-filter:blur(6px);
  font-size:clamp(11px,2.5vw,15px);min-height:48px;direction:ltr;
}
#hud .hud-section{display:flex;gap:8px;align-items:center;flex:1}
#hud .hud-section.center{justify-content:center;flex:2;text-align:center}
#hud .hud-section.right{justify-content:flex-end}
.target-prompt{
  font-size:clamp(14px,3vw,20px);font-weight:bold;
}
.target-emoji{font-size:clamp(18px,4vw,28px)}
.target-turkish{color:#ffd700;font-family:Arial,Helvetica,sans-serif;direction:ltr;unicode-bidi:bidi-override}
.hearts{color:#ff6b6b;font-size:clamp(14px,3vw,18px);letter-spacing:2px}
.score-text{color:#00e5ff;font-weight:bold}
.wave-count{opacity:0.6;font-size:clamp(10px,2vw,13px)}
.speed-indicator{
  display:inline-block;padding:2px 6px;border-radius:6px;font-size:10px;
  background:rgba(255,255,255,0.15);
}
.speed-indicator.fast{background:rgba(255,100,50,0.3);color:#ff6b35}

/* Target bar below HUD */
#targetBar{
  position:absolute;top:48px;left:0;right:0;z-index:90;
  display:none;text-align:center;padding:8px;direction:ltr;
  background:linear-gradient(180deg,rgba(0,20,50,0.8),rgba(0,20,50,0.4));
}
#targetBar .find-label{
  font-size:clamp(12px,2.5vw,16px);opacity:0.7;
}

/* GAME AREA */
#gameScreen{flex-direction:column;position:relative;z-index:10}
#gameArea{
  position:relative;flex:1;display:flex;overflow:hidden;
  margin-top:92px;direction:ltr;
}

/* Lanes */
.lane{
  flex:1;position:relative;
  border-left:1px solid rgba(255,255,255,0.05);
  border-right:1px solid rgba(255,255,255,0.05);
}
.lane:first-child{border-left:none}
.lane:last-child{border-right:none}

/* Wave blocks */
.wave-block{
  position:absolute;
  width:85%;left:7.5%;
  padding:14px 8px;
  border-radius:16px;
  text-align:center;
  font-size:clamp(24px,5vw,36px);
  font-weight:bold;
  background:linear-gradient(135deg,#0077b6,#00b4d8,#48cae4);
  box-shadow:0 4px 20px rgba(0,119,182,0.4),inset 0 1px 0 rgba(255,255,255,0.2);
  color:#fff;
  transition:opacity 0.2s;
  z-index:20;
  line-height:1.3;
  min-height:56px;
  display:flex;align-items:center;justify-content:center;
  direction:rtl;
}
.wave-block.gold{
  background:linear-gradient(135deg,#f9a825,#ffd54f,#ffecb3,#ffd54f);
  box-shadow:0 4px 25px rgba(249,168,37,0.6),inset 0 1px 0 rgba(255,255,255,0.4);
  color:#5d4037;
  animation:goldShimmer 1s ease-in-out infinite alternate;
}
@keyframes goldShimmer{
  0%{box-shadow:0 4px 25px rgba(249,168,37,0.6),inset 0 1px 0 rgba(255,255,255,0.4)}
  100%{box-shadow:0 4px 35px rgba(255,213,79,0.8),inset 0 1px 0 rgba(255,255,255,0.6),0 0 20px rgba(255,213,79,0.3)}
}
.wave-block.storm{
  background:linear-gradient(135deg,#2d3436,#636e72,#2d3436);
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  animation:stormShake 0.3s ease-in-out infinite;
}
@keyframes stormShake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-2px)}
  75%{transform:translateX(2px)}
}

/* Surfer */
.surfer-container{
  position:absolute;bottom:90px;z-index:50;
  transition:left 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  font-size:clamp(40px,10vw,60px);
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  text-align:center;
  pointer-events:none;
}
.surfer-container.wipeout{
  animation:wipeoutAnim 0.6s ease-out;
}
@keyframes wipeoutAnim{
  0%{transform:rotate(0) scale(1)}
  25%{transform:rotate(-30deg) scale(0.9)}
  50%{transform:rotate(25deg) scale(0.85)}
  75%{transform:rotate(-15deg) scale(0.9)}
  100%{transform:rotate(0) scale(1)}
}
.surfer-container.correct{
  animation:correctBounce 0.4s ease-out;
}
@keyframes correctBounce{
  0%{transform:scale(1) translateY(0)}
  40%{transform:scale(1.2) translateY(-10px)}
  100%{transform:scale(1) translateY(0)}
}

/* Splash particles */
.splash{
  position:absolute;z-index:60;pointer-events:none;
  width:8px;height:8px;border-radius:50%;
  background:rgba(0,200,255,0.8);
  animation:splashFly 0.6s ease-out forwards;
}
@keyframes splashFly{
  0%{opacity:1;transform:translate(0,0) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}
}
.splash.gold-splash{background:rgba(255,213,79,0.9)}

/* Feedback text */
.feedback{
  position:absolute;z-index:70;pointer-events:none;
  font-size:clamp(20px,5vw,32px);font-weight:bold;
  animation:feedbackFloat 1s ease-out forwards;
  text-shadow:0 2px 10px rgba(0,0,0,0.5);
}
@keyframes feedbackFloat{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.2)}
}

/* Screen shake */
.shake{animation:screenShake 0.4s ease-out}
@keyframes screenShake{
  0%,100%{transform:translateX(0)}
  10%{transform:translateX(-6px)}
  30%{transform:translateX(6px)}
  50%{transform:translateX(-4px)}
  70%{transform:translateX(4px)}
  90%{transform:translateX(-2px)}
}

/* Storm screen effect */
.storm-active #gameArea{
  filter:brightness(0.7) contrast(1.1);
}

/* Mobile controls */
#mobileControls{
  position:absolute;bottom:0;left:0;right:0;z-index:80;
  display:none;height:80px;direction:ltr;
}
.lane-btn{
  flex:1;border:none;
  font-size:28px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.lane-btn:nth-child(1){background:rgba(0,100,200,0.25);border-right:1px solid rgba(255,255,255,0.1)}
.lane-btn:nth-child(2){background:rgba(0,120,180,0.2)}
.lane-btn:nth-child(3){background:rgba(0,100,200,0.25);border-left:1px solid rgba(255,255,255,0.1)}
.lane-btn:active{background:rgba(0,200,255,0.35)}

/* GAME OVER */
#gameOverScreen{
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  text-align:center;padding:20px;z-index:10;
}
#gameOverScreen h2{
  font-size:clamp(24px,5vw,40px);
  text-shadow:0 0 20px rgba(255,100,100,0.5);
}
.final-score{font-size:clamp(36px,8vw,60px);color:#00e5ff;font-weight:bold}
.new-highscore{
  color:#ffd700;font-size:clamp(16px,3vw,22px);
  animation:hsGlow 1s ease-in-out infinite alternate;
}
@keyframes hsGlow{0%{text-shadow:0 0 10px rgba(255,215,0,0.3)}100%{text-shadow:0 0 25px rgba(255,215,0,0.7)}}
.stats-row{font-size:clamp(13px,2.5vw,16px);opacity:0.7}

/* 2-PLAYER LAYOUT */
#game2PScreen{flex-direction:row;position:relative;z-index:10;direction:ltr}
.player-half{
  flex:1;position:relative;overflow:hidden;
  border-right:2px solid rgba(255,255,255,0.15);
}
.player-half:last-child{border-right:none}
.player-half .p-hud{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:6px 8px;background:rgba(0,10,30,0.7);backdrop-filter:blur(4px);
  font-size:clamp(10px,2vw,13px);display:flex;justify-content:space-between;align-items:center;
  min-height:36px;
}
.player-half .p-target{
  position:absolute;top:36px;left:0;right:0;z-index:90;
  text-align:center;padding:6px;font-size:clamp(12px,2.5vw,16px);
  background:linear-gradient(180deg,rgba(0,20,50,0.8),rgba(0,20,50,0.3));
}
.player-half .p-lanes{
  position:absolute;top:76px;left:0;right:0;bottom:0;
  display:flex;direction:ltr;
}
.player-half .p-lane{
  flex:1;position:relative;
  border-left:1px solid rgba(255,255,255,0.04);
  border-right:1px solid rgba(255,255,255,0.04);
}
.player-half .p-surfer{
  position:absolute;bottom:20px;z-index:50;
  transition:left 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  font-size:clamp(28px,6vw,44px);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  text-align:center;pointer-events:none;
}
.player-half .wave-block{
  font-size:clamp(18px,3.5vw,26px);
  padding:10px 4px;min-height:44px;
}
.p-label{
  font-size:clamp(12px,2.5vw,16px);font-weight:bold;
  padding:2px 8px;border-radius:6px;
}
.p1-color{background:rgba(0,200,255,0.25);color:#00e5ff}
.p2-color{background:rgba(255,150,50,0.25);color:#ffa94d}

/* 2P Game Over overlay */
#twoPlayerOver{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,0.85);text-align:center;padding:20px;
}
#twoPlayerOver.active{display:flex}

/* Responsive */
@media(max-width:600px){
  #mobileControls{display:flex !important}
  .surfer-container{bottom:100px}
}
@media(min-width:601px){
  #mobileControls{display:none !important}
}
</style>
</head>
<body>

<!-- Ocean background -->
<div class="ocean-bg" id="oceanBg"></div>

<!-- Back button -->
<a id="backBtn" href="index.html" title="Geri">↩</a>

<!-- ======== MENU SCREEN ======== -->
<div class="screen active" id="menuScreen">
  <div class="surfer-icon">🏄</div>
  <h1>راكب الأمواج</h1>
  <div class="subtitle tr-text">Sörf Yarışı — Doğru Dalgayı Yakala!</div>
  <button class="menu-btn" onclick="startGame(1)">🌊 Tek Oyuncu</button>
  <button class="menu-btn secondary" onclick="startGame(2)">🏄‍♂️🏄‍♀️ 2 Oyuncu</button>
  <div class="highscore-display tr-text" id="menuHighscore"></div>
  <div class="menu-info tr-text">← / → veya dokunarak oyna</div>
  <div class="menu-info tr-text" style="opacity:0.35;font-size:11px">İHO 7. Sınıf Arapça</div>
</div>

<!-- ======== 1P GAME SCREEN ======== -->
<div class="screen" id="gameScreen">
  <div id="hud">
    <div class="hud-section">
      <span class="hearts" id="hearts">❤️❤️❤️</span>
    </div>
    <div class="hud-section center">
      <span class="score-text" id="scoreText">0</span>
      <span class="speed-indicator" id="speedInd">1x</span>
    </div>
    <div class="hud-section right">
      <span class="wave-count" id="waveCount">🌊 0</span>
    </div>
  </div>
  <div id="targetBar">
    <span class="target-emoji" id="targetEmoji"></span>
    <span class="target-turkish tr-text" id="targetTurkish"></span>
    <span class="find-label tr-text"> — Bu kelimeyi bul!</span>
  </div>
  <div id="gameArea">
    <div class="lane" id="lane0"></div>
    <div class="lane" id="lane1"></div>
    <div class="lane" id="lane2"></div>
    <div class="surfer-container" id="surfer">🏄</div>
  </div>
  <div id="mobileControls">
    <button class="lane-btn" onclick="moveSurfer(0)">◀</button>
    <button class="lane-btn" onclick="moveSurfer(1)">⬇</button>
    <button class="lane-btn" onclick="moveSurfer(2)">▶</button>
  </div>
</div>

<!-- ======== GAME OVER ======== -->
<div class="screen" id="gameOverScreen">
  <h2>انتهت اللعبة!</h2>
  <div class="subtitle tr-text">Oyun Bitti</div>
  <div class="final-score" id="finalScore">0</div>
  <div class="new-highscore" id="newHs" style="display:none">🏆 Yeni Rekor!</div>
  <div class="stats-row tr-text" id="statsRow"></div>
  <button class="menu-btn" onclick="startGame(1)" style="margin-top:10px">🔄 Tekrar Oyna</button>
  <button class="menu-btn secondary" onclick="showScreen('menuScreen')">🏠 Menü</button>
</div>

<!-- ======== 2P GAME SCREEN ======== -->
<div class="screen" id="game2PScreen">
  <!-- Player 1 (left) -->
  <div class="player-half" id="p1Half">
    <div class="p-hud">
      <span class="p-label p1-color">P1 (A/S/D)</span>
      <span class="hearts" id="p1Hearts">❤️❤️❤️</span>
      <span class="score-text" id="p1Score">0</span>
    </div>
    <div class="p-target" id="p1Target"></div>
    <div class="p-lanes" id="p1Lanes">
      <div class="p-lane" id="p1Lane0"></div>
      <div class="p-lane" id="p1Lane1"></div>
      <div class="p-lane" id="p1Lane2"></div>
    </div>
    <div class="p-surfer" id="p1Surfer">🏄‍♂️</div>
  </div>
  <!-- Player 2 (right) -->
  <div class="player-half" id="p2Half">
    <div class="p-hud">
      <span class="p-label p2-color">P2 (J/K/L)</span>
      <span class="hearts" id="p2Hearts">❤️❤️❤️</span>
      <span class="score-text" id="p2Score">0</span>
    </div>
    <div class="p-target" id="p2Target"></div>
    <div class="p-lanes" id="p2Lanes">
      <div class="p-lane" id="p2Lane0"></div>
      <div class="p-lane" id="p2Lane1"></div>
      <div class="p-lane" id="p2Lane2"></div>
    </div>
    <div class="p-surfer" id="p2Surfer">🏄‍♀️</div>
  </div>
  <!-- 2P over overlay -->
  <div id="twoPlayerOver">
    <h2 id="twoPlayerWinner"></h2>
    <div class="tr-text" id="twoPlayerStats"></div>
    <button class="menu-btn" onclick="startGame(2)" style="margin-top:10px">🔄 Tekrar</button>
    <button class="menu-btn secondary" onclick="showScreen('menuScreen')">🏠 Menü</button>
  </div>
</div>

<script>
/* ====== VOCABULARY ====== */
const VOCAB = {
  foods: [
    {ar:"خُبْز",e:"🍞"},{ar:"جُبْن",e:"🧀"},{ar:"أُرُز",e:"🍚"},{ar:"عَسَل",e:"🍯"},
    {ar:"شاي",e:"🍵"},{ar:"دَجاج",e:"🍗"},{ar:"لَحْم",e:"🥩"},{ar:"سَمَك",e:"🐟"},
    {ar:"بَيْض",e:"🥚"},{ar:"زُبْدَة",e:"🧈"},{ar:"كُفْتَة",e:"🧆"},{ar:"حَساء",e:"🍲"},
    {ar:"حَلِيب",e:"🥛"},{ar:"قَهْوَة",e:"☕"},{ar:"عَصِير",e:"🧃"},{ar:"زَيْتون",e:"🫒"},
    {ar:"تُفَّاح",e:"🍎"},{ar:"مَوْز",e:"🍌"}
  ],
  verbs: [
    {ar:"يَسْتَيْقِظ",e:"⏰"},{ar:"يُصَلِّي",e:"🕌"},{ar:"يَتَناوَل",e:"🍽️"},
    {ar:"يَلْبَس",e:"👔"},{ar:"يَذْهَب",e:"🚶"},{ar:"يَرْجِع",e:"🔙"},
    {ar:"يُساعِد",e:"🤝"},{ar:"يَدْرُس",e:"📖"},{ar:"يَأْكُل",e:"🍴"},
    {ar:"يَشْرَب",e:"🥤"},{ar:"يَنام",e:"😴"},{ar:"يَتَوَضَّأ",e:"💧"}
  ],
  times: [
    {ar:"الصَّباح",e:"🌅"},{ar:"الظُهر",e:"☀️"},{ar:"العصر",e:"🌤️"},
    {ar:"المساء",e:"🌆"},{ar:"الليل",e:"🌙"},{ar:"الفَجْر",e:"🌄"}
  ]
};
const ALL_WORDS = [...VOCAB.foods,...VOCAB.verbs,...VOCAB.times];
const VOCAB_TR = {
  'خُبْز':'Ekmek','جُبْن':'Peynir','أُرُز':'Pirinç','عَسَل':'Bal',
  'شاي':'Çay','دَجاج':'Tavuk','لَحْم':'Et','سَمَك':'Balık',
  'بَيْض':'Yumurta','زُبْدَة':'Tereyağı','كُفْتَة':'Köfte','حَساء':'Çorba',
  'حَلِيب':'Süt','قَهْوَة':'Kahve','عَصِير':'Meyve Suyu','زَيْتون':'Zeytin',
  'تُفَّاح':'Elma','مَوْز':'Muz',

function getTr(w){ return VOCAB_TR[w.ar]||''; }

/* ====== SOUND ====== */
let _actx;
function _ac(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();return _actx;}
function _tone(freq,dur,type,vol,delay){
  type=type||'sine';vol=vol||0.3;delay=delay||0;
  try{const c=_ac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=freq;o.type=type;
  const t=c.currentTime+delay;g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}
}
function sesSplash(){_tone(800,0.1,'sine',0.25);_tone(600,0.15,'sine',0.2,0.05);_tone(400,0.2,'sine',0.15,0.1);}
function sesWipeout(){_tone(300,0.2,'sawtooth',0.3);_tone(150,0.3,'sawtooth',0.25,0.15);_tone(80,0.4,'square',0.2,0.3);}
function sesCorrect(){_tone(523,0.1,'sine',0.3,0);_tone(659,0.1,'sine',0.3,0.1);_tone(784,0.2,'sine',0.3,0.2);}
function sesGold(){_tone(880,0.08,'sine',0.35);_tone(1100,0.08,'sine',0.3,0.06);_tone(1320,0.1,'sine',0.35,0.12);}
function sesGameOver(){_tone(400,0.2,'sine',0.3);_tone(300,0.2,'sine',0.25,0.2);_tone(200,0.3,'sine',0.2,0.4);}

/* ====== HELPERS ====== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='menuScreen') updateMenuHighscore();
}

function shuffleArray(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}

function pickDistractors(target,count){
  const pool=ALL_WORDS.filter(w=>w.ar!==target.ar);
  shuffleArray(pool);
  return pool.slice(0,count);
}

function updateMenuHighscore(){
  const hs=localStorage.getItem('sorf_highscore')||0;
  const el=document.getElementById('menuHighscore');
  if(hs>0) el.textContent='En Yüksek Skor: '+hs;
  else el.textContent='';
}

function createWaveBgLines(){
  const bg=document.getElementById('oceanBg');
  for(let i=0;i<8;i++){
    const line=document.createElement('div');
    line.className='wave-line';
    line.style.top=(15+i*10)+'%';
    line.style.setProperty('--dur',(4+Math.random()*4)+'s');
    line.style.animationDelay=(Math.random()*3)+'s';
    bg.appendChild(line);
  }
}
createWaveBgLines();
updateMenuHighscore();

/* ====== 1P GAME STATE ====== */
let gameMode=0; // 1 or 2
let g={
  active:false,
  score:0,
  hearts:3,
  currentLane:1,
  waveCount:0,
  correctCount:0,
  startTime:0,
  speed:3000, // ms for waves to travel top to bottom
  minSpeed:1500,
  target:null,
  waveSet:null, // {blocks:[], correctLane:0, y:0, gold:false, storm:false, scored:false}
  rafId:null,
  lastSpawn:0,
  spawnInterval:3500,
  minSpawnInterval:2000,
};

/* ====== START GAME ====== */
function startGame(mode){
  gameMode=mode;
  if(mode===1) start1P();
  else start2P();
}

function start1P(){
  showScreen('gameScreen');
  const hud=document.getElementById('hud');
  hud.style.display='flex';
  document.getElementById('targetBar').style.display='block';

  g.active=true;
  g.score=0;
  g.hearts=3;
  g.currentLane=1;
  g.waveCount=0;
  g.correctCount=0;
  g.startTime=performance.now();
  g.speed=3000;
  g.minSpeed=1500;
  g.target=null;
  g.waveSet=null;
  g.lastSpawn=0;
  g.spawnInterval=3500;
  g.minSpawnInterval=2000;
  g.movedThisWave=false;

  updateHearts();
  updateScore();
  updateWaveCount();
  updateSpeedInd();
  clearLanes();
  positionSurfer(1);
  spawnWaveSet();
  g.rafId=requestAnimationFrame(gameLoop);
}

function clearLanes(){
  for(let i=0;i<3;i++){
    document.getElementById('lane'+i).innerHTML='';
  }
}

function updateHearts(){
  document.getElementById('hearts').textContent='❤️'.repeat(g.hearts)+'🖤'.repeat(3-g.hearts);
}
function updateScore(){
  document.getElementById('scoreText').textContent=g.score;
}
function updateWaveCount(){
  document.getElementById('waveCount').textContent='🌊 '+g.waveCount;
}
function updateSpeedInd(){
  const el=document.getElementById('speedInd');
  const ratio=g.speed/3000;
  const level=ratio>0.8?'1x':ratio>0.6?'1.5x':ratio>0.4?'2x':'MAX';
  el.textContent=level;
  el.className='speed-indicator'+(ratio<=0.6?' fast':'');
}

function positionSurfer(lane){
  g.currentLane=lane;
  const area=document.getElementById('gameArea');
  const surfer=document.getElementById('surfer');
  const laneW=area.clientWidth/3;
  surfer.style.left=(laneW*lane+laneW/2-surfer.offsetWidth/2)+'px';
}

function moveSurfer(lane){
  if(!g.active)return;
  if(lane<0)lane=0;if(lane>2)lane=2;
  g.movedThisWave=true;
  positionSurfer(lane);
}

/* ====== SPAWN WAVE SET ====== */
function spawnWaveSet(){
  if(!g.active)return;
  g.movedThisWave=false;

  const target=pickRandom(ALL_WORDS);
  g.target=target;
  const distractors=pickDistractors(target,2);

  // Set target display
  document.getElementById('targetEmoji').textContent=target.e;
  document.getElementById('targetTurkish').textContent=getTr(target);

  // Determine special
  const isGold=Math.random()<0.12;
  const isStorm=!isGold&&Math.random()<0.15;

  // Build wave set: place correct in random lane
  const correctLane=Math.floor(Math.random()*3);
  const words=[];
  let di=0;
  for(let i=0;i<3;i++){
    if(i===correctLane) words.push(target);
    else words.push(distractors[di++]);
  }

  // Create DOM blocks
  const blocks=[];
  for(let i=0;i<3;i++){
    const el=document.createElement('div');
    el.className='wave-block';
    if(isGold) el.classList.add('gold');
    if(isStorm) el.classList.add('storm');
    el.textContent=words[i].ar;
    el.style.top='-80px';
    document.getElementById('lane'+i).appendChild(el);
    blocks.push(el);
  }

  g.waveSet={
    blocks:blocks,
    words:words,
    correctLane:correctLane,
    y:-80,
    gold:isGold,
    storm:isStorm,
    scored:false,
  };
  g.waveCount++;
  updateWaveCount();

  // Storm effect
  if(isStorm){
    document.getElementById('gameScreen').classList.add('storm-active');
  } else {
    document.getElementById('gameScreen').classList.remove('storm-active');
  }
}

/* ====== GAME LOOP ====== */
let lastFrameTime=0;
function gameLoop(ts){
  if(!g.active)return;

  if(!lastFrameTime)lastFrameTime=ts;
  const dt=ts-lastFrameTime;
  lastFrameTime=ts;

  if(g.waveSet&&!g.waveSet.scored){
    const area=document.getElementById('gameArea');
    const areaH=area.clientHeight;
    // Speed: pixels per ms
    const pxPerMs=areaH/g.speed;
    g.waveSet.y+=pxPerMs*dt;

    // Update block positions
    for(let i=0;i<3;i++){
      g.waveSet.blocks[i].style.top=g.waveSet.y+'px';
    }

    // Check if waves reached surfer zone
    const surferY=areaH-140; // approximate surfer position from top
    if(g.waveSet.y>=surferY&&!g.waveSet.scored){
      g.waveSet.scored=true;
      checkAnswer();
    }

    // If waves go off screen without being scored (shouldn't happen, but safety)
    if(g.waveSet.y>areaH+100&&!g.waveSet.scored){
      g.waveSet.scored=true;
      removeWaveSet();
      setTimeout(()=>{if(g.active)spawnWaveSet();},300);
    }
  }

  // Difficulty ramp: every 5 waves, speed up slightly
  const elapsed=(ts-g.startTime)/1000;
  g.speed=Math.max(g.minSpeed,3000-elapsed*15);
  g.spawnInterval=Math.max(g.minSpawnInterval,3500-elapsed*12);
  updateSpeedInd();

  g.rafId=requestAnimationFrame(gameLoop);
}

function checkAnswer(){
  const ws=g.waveSet;
  if(!ws)return;

  const area=document.getElementById('gameArea');
  const surfer=document.getElementById('surfer');
  const surferLane=g.currentLane;

  if(!g.movedThisWave){
    // Player didn't move — wave passes, no score, no penalty
    ws.blocks.forEach(b=>{b.style.opacity='0';});
    showFeedback(area,'...','rgba(255,255,255,0.5)');
  } else if(surferLane===ws.correctLane){
    // Correct!
    const pts=ws.gold?20:10;
    g.score+=pts;
    g.correctCount++;
    updateScore();

    if(ws.gold){sesGold();}else{sesCorrect();}
    surfer.classList.remove('correct');
    void surfer.offsetWidth;
    surfer.classList.add('correct');

    showFeedback(area,'!رائع',ws.gold?'#ffd700':'#00e5ff');
    createSplash(area,surferLane,ws.gold);

    ws.blocks.forEach(b=>{b.style.opacity='0';});
  } else {
    // Wrong!
    g.hearts--;
    updateHearts();
    sesWipeout();

    surfer.classList.remove('wipeout');
    void surfer.offsetWidth;
    surfer.classList.add('wipeout');

    area.classList.remove('shake');
    void area.offsetWidth;
    area.classList.add('shake');

    showFeedback(area,'!خطأ','#ff6b6b');

    ws.blocks.forEach(b=>{b.style.opacity='0';});

    if(g.hearts<=0){
      endGame();
      return;
    }
  }

  // Clean up and spawn next
  setTimeout(()=>{
    removeWaveSet();
    document.getElementById('gameScreen').classList.remove('storm-active');
    if(g.active) setTimeout(()=>{if(g.active)spawnWaveSet();},400);
  },350);
}

function removeWaveSet(){
  if(!g.waveSet)return;
  g.waveSet.blocks.forEach(b=>{if(b.parentNode)b.parentNode.removeChild(b);});
  g.waveSet=null;
}

function showFeedback(container,text,color){
  const el=document.createElement('div');
  el.className='feedback';
  el.textContent=text;
  el.style.color=color;
  el.style.left='50%';
  el.style.top='50%';
  el.style.transform='translate(-50%,-50%)';
  container.appendChild(el);
  setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},1000);
}

function createSplash(container,lane,isGold){
  const laneW=container.clientWidth/3;
  const cx=laneW*lane+laneW/2;
  const cy=container.clientHeight-130;
  for(let i=0;i<10;i++){
    const s=document.createElement('div');
    s.className='splash'+(isGold?' gold-splash':'');
    s.style.left=cx+'px';
    s.style.top=cy+'px';
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*50;
    s.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    container.appendChild(s);
    setTimeout(()=>{if(s.parentNode)s.parentNode.removeChild(s);},700);
  }
}

function endGame(){
  g.active=false;
  if(g.rafId)cancelAnimationFrame(g.rafId);
  lastFrameTime=0;
  sesGameOver();

  document.getElementById('hud').style.display='none';
  document.getElementById('targetBar').style.display='none';
  document.getElementById('gameScreen').classList.remove('storm-active');

  const hs=parseInt(localStorage.getItem('sorf_highscore')||'0');
  const isNew=g.score>hs;
  if(isNew) localStorage.setItem('sorf_highscore',g.score);

  document.getElementById('finalScore').textContent=g.score;
  document.getElementById('newHs').style.display=isNew?'block':'none';
  document.getElementById('statsRow').textContent=
    'Doğru: '+g.correctCount+' / '+g.waveCount+' dalga | Süre: '+
    Math.floor((performance.now()-g.startTime)/1000)+'s';

  removeWaveSet();
  clearLanes();
  showScreen('gameOverScreen');
}

/* ====== KEYBOARD CONTROLS ====== */
document.addEventListener('keydown',e=>{
  if(gameMode===1&&g.active){
    if(e.key==='ArrowLeft') moveSurfer(g.currentLane-1);
    else if(e.key==='ArrowRight') moveSurfer(g.currentLane+1);
  }
  if(gameMode===2){
    handle2PKey(e.key);
  }
});

/* ====== TOUCH / SWIPE ====== */
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(gameMode!==1||!g.active)return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>30){
    if(dx<0) moveSurfer(g.currentLane-1);
    else moveSurfer(g.currentLane+1);
  }
},{passive:true});


/* ====================================================
   ====== 2-PLAYER MODE ======
   ==================================================== */

let p1={},p2={};
let twoP={active:false,rafId:null,startTime:0,speed:3000,waveCount:0};

function start2P(){
  showScreen('game2PScreen');
  document.getElementById('twoPlayerOver').classList.remove('active');

  p1={active:true,score:0,hearts:3,lane:1,correctCount:0,target:null,waveSet:null,eliminated:false};
  p2={active:true,score:0,hearts:3,lane:1,correctCount:0,target:null,waveSet:null,eliminated:false};
  twoP={active:true,rafId:null,startTime:performance.now(),speed:3000,waveCount:0};

  update2PHud(1);update2PHud(2);
  clear2PLanes(1);clear2PLanes(2);
  position2PSurfer(1,1);position2PSurfer(2,1);
  spawn2PWaveSet();
  lastFrameTime=0;
  twoP.rafId=requestAnimationFrame(gameLoop2P);
}

function update2PHud(pn){
  const p=pn===1?p1:p2;
  document.getElementById('p'+pn+'Hearts').textContent='❤️'.repeat(p.hearts)+'🖤'.repeat(3-p.hearts);
  document.getElementById('p'+pn+'Score').textContent=p.score;
}

function clear2PLanes(pn){
  for(let i=0;i<3;i++){
    document.getElementById('p'+pn+'Lane'+i).innerHTML='';
  }
}

function position2PSurfer(pn,lane){
  const p=pn===1?p1:p2;
  p.lane=lane;
  const lanesEl=document.getElementById('p'+pn+'Lanes');
  const surfer=document.getElementById('p'+pn+'Surfer');
  const laneW=lanesEl.clientWidth/3;
  surfer.style.left=(laneW*lane+laneW/2-surfer.offsetWidth/2)+'px';
}

function move2PSurfer(pn,lane){
  const p=pn===1?p1:p2;
  if(!p.active||p.eliminated)return;
  if(lane<0)lane=0;if(lane>2)lane=2;
  position2PSurfer(pn,lane);
}

function spawn2PWaveSet(){
  if(!twoP.active)return;

  const target=pickRandom(ALL_WORDS);
  const distractors=pickDistractors(target,2);
  const correctLane=Math.floor(Math.random()*3);
  const isGold=Math.random()<0.12;
  const isStorm=!isGold&&Math.random()<0.15;

  const words=[];
  let di=0;
  for(let i=0;i<3;i++){
    if(i===correctLane) words.push(target);
    else words.push(distractors[di++]);
  }

  twoP.waveCount++;

  // Spawn for both players
  [1,2].forEach(pn=>{
    const p=pn===1?p1:p2;
    if(p.eliminated)return;

    p.target=target;
    document.getElementById('p'+pn+'Target').innerHTML=
      '<span style="font-size:1.3em">'+target.e+'</span> '+
      '<span class="tr-text" style="color:#ffd700">'+getTr(target)+'</span>';

    const blocks=[];
    for(let i=0;i<3;i++){
      const el=document.createElement('div');
      el.className='wave-block';
      if(isGold) el.classList.add('gold');
      if(isStorm) el.classList.add('storm');
      el.textContent=words[i].ar;
      el.style.top='-70px';
      document.getElementById('p'+pn+'Lane'+i).appendChild(el);
      blocks.push(el);
    }

    p.waveSet={
      blocks:blocks,words:words,correctLane:correctLane,
      y:-70,gold:isGold,storm:isStorm,scored:false
    };
  });
}

function gameLoop2P(ts){
  if(!twoP.active)return;
  if(!lastFrameTime)lastFrameTime=ts;
  const dt=ts-lastFrameTime;
  lastFrameTime=ts;

  const elapsed=(ts-twoP.startTime)/1000;
  twoP.speed=Math.max(1500,3000-elapsed*12);
  let anyActive=false;

  [1,2].forEach(pn=>{
    const p=pn===1?p1:p2;
    if(p.eliminated||!p.waveSet||p.waveSet.scored)return;
    anyActive=true;

    const lanesEl=document.getElementById('p'+pn+'Lanes');
    const areaH=lanesEl.clientHeight;
    const pxPerMs=areaH/twoP.speed;
    p.waveSet.y+=pxPerMs*dt;

    for(let i=0;i<3;i++){
      p.waveSet.blocks[i].style.top=p.waveSet.y+'px';
    }

    const surferY=areaH-70;
    if(p.waveSet.y>=surferY){
      p.waveSet.scored=true;
      check2PAnswer(pn);
    }
  });

  // Check if need new wave set
  const p1done=p1.eliminated||!p1.waveSet||p1.waveSet.scored;
  const p2done=p2.eliminated||!p2.waveSet||p2.waveSet.scored;
  if(p1done&&p2done&&twoP.active){
    // Both scored, schedule next spawn
    if(!twoP._spawning){
      twoP._spawning=true;
      setTimeout(()=>{
        remove2PWaveSet(1);remove2PWaveSet(2);
        twoP._spawning=false;
        if(twoP.active) setTimeout(()=>{if(twoP.active)spawn2PWaveSet();},300);
      },350);
    }
  }

  twoP.rafId=requestAnimationFrame(gameLoop2P);
}

function check2PAnswer(pn){
  const p=pn===1?p1:p2;
  const ws=p.waveSet;
  if(!ws)return;
  const surfer=document.getElementById('p'+pn+'Surfer');
  const lanesEl=document.getElementById('p'+pn+'Lanes');

  if(p.lane===ws.correctLane){
    const pts=ws.gold?20:10;
    p.score+=pts;
    p.correctCount++;
    if(ws.gold) sesGold(); else sesCorrect();
    surfer.classList.remove('correct');void surfer.offsetWidth;surfer.classList.add('correct');
  } else {
    p.hearts--;
    sesWipeout();
    surfer.classList.remove('wipeout');void surfer.offsetWidth;surfer.classList.add('wipeout');
    if(p.hearts<=0){
      p.active=false;
      p.eliminated=true;
      surfer.style.opacity='0.3';
    }
  }
  update2PHud(pn);
  ws.blocks.forEach(b=>{b.style.opacity='0';});

  // Check if both eliminated
  if(p1.eliminated&&p2.eliminated){
    end2PGame();
  }
}

function remove2PWaveSet(pn){
  const p=pn===1?p1:p2;
  if(!p.waveSet)return;
  p.waveSet.blocks.forEach(b=>{if(b.parentNode)b.parentNode.removeChild(b);});
  p.waveSet=null;
}

function end2PGame(){
  twoP.active=false;
  if(twoP.rafId)cancelAnimationFrame(twoP.rafId);
  lastFrameTime=0;
  sesGameOver();

  let winText='';
  if(p1.score>p2.score) winText='🏆 Oyuncu 1 Kazandı!';
  else if(p2.score>p1.score) winText='🏆 Oyuncu 2 Kazandı!';
  else winText='🤝 Berabere!';

  document.getElementById('twoPlayerWinner').textContent=winText;
  document.getElementById('twoPlayerStats').innerHTML=
    'P1: '+p1.score+' puan ('+p1.correctCount+' doğru)<br>'+
    'P2: '+p2.score+' puan ('+p2.correctCount+' doğru)<br>'+
    'Toplam: '+twoP.waveCount+' dalga';
  document.getElementById('twoPlayerOver').classList.add('active');
}

function handle2PKey(key){
  if(!twoP.active)return;
  // Player 1: A(left) S(center) D(right)
  if(key==='a'||key==='A') move2PSurfer(1,0);
  else if(key==='s'||key==='S') move2PSurfer(1,1);
  else if(key==='d'||key==='D') move2PSurfer(1,2);
  // Player 2: J(left) K(center) L(right)
  else if(key==='j'||key==='J') move2PSurfer(2,0);
  else if(key==='k'||key==='K') move2PSurfer(2,1);
  else if(key==='l'||key==='L') move2PSurfer(2,2);
}

/* ====== RESIZE HANDLER ====== */
window.addEventListener('resize',()=>{
  if(gameMode===1&&g.active){
    positionSurfer(g.currentLane);
  }
  if(gameMode===2&&twoP.active){
    position2PSurfer(1,p1.lane);
    position2PSurfer(2,p2.lane);
  }
});

/* ====== INIT ====== */
showScreen('menuScreen');
</script>
